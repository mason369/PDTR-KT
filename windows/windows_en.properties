windows.wndwandmaker.dust=Oh, I see you have the dust! Don't worry about the wraiths, I can deal with them. As I promised, you can choose one of my high quality wands.
windows.wndwandmaker.ember=Oh, I see you have the embers! I do hope the fire elemental wasn't too much trouble. As I promised, you can choose one of my high quality wands.
windows.wndwandmaker.berry=Oh, I see you have the berry! I do hope the rotberry plant didn't trouble you too much. As I promised, you can choose one of my high quality wands.
windows.wndwandmaker.farewell=Good luck in your quest, %s!


windows.wndstory.bossrushstart=When you return to the dungeon again, you find that the atmosphere has become a little unusual. \n\nThe entrance seems to have changed, and he and Naya are anxiously waiting for someone.
#windows.wndstory.bossrushstart=Relying on the power of the key sword, we opened a portal. After a flash of white light, we came to a strange place. \n\nThis is a dark pond that has not been illuminated for many years. There seems to be no breath of life around, but there is a powerful force here. What on earth is living here?
windows.wndstory.nomobs=At his request, you enter the dungeon again. What comes into view is not the familiar forest, but a world of ice and snow. \n\nThere is no breath of life here, but the supplies piled up not far away prove that someone has been here not long ago.
windows.wndstory.calaboss=The ice and snow stopped at the reappearance of the forest. \n\nThe familiar feeling came to your mind again, and you understood what these dense trees represented. The bright red fruits with intoxicating fragrance not far away also proved your guess.
windows.wndstory.sewsboss=A dark guy appears in front of you. If you are not mistaken, this should be the strange creature that exists in other dungeons - the sticky goo. \n\nThe sticky goo seems to be more dangerous than before, please proceed with caution.
windows.wndstory.skingboss=After Slime Goo died, the explosion woke up the sleeping Slime King. Its huge body blocked your way.
windows.wndstory.tenguboss=The assassin who had been dormant here has now broken free from his shackles. \n\nThe evil power did not harm it, but strengthened its body. \n\nTengu is more dangerous than before, please proceed with caution.
windows.wndstory.dimandkingboss=The shattered husk of the Mimic was recast and shaped into an emotionless fighting machine.\n\nYou feel that it is not the king you once fought, but just a replica with a superficial appearance.
windows.wndstory.dm300boss=This mining machine was eliminated by the dwarves, and is covered with rust and oil. \n\nWhy can this machine still work now?
windows.wndstory.dm720boss=DM700, a mass-produced mining machine made by the dwarves, is also equipped with an offensive defense device to smash the rocks that fall from time to time. \n\nThe DM720, equipped with the latest technology, is the last song of the dwarven city-state before its fall.
windows.wndstory.icegirlboss=The sealed witch has somehow broken the seal, and she is looking at you with bloodshot eyes.
windows.wndstory.kawboss=The former dwarf king is no longer here, and what is before you is just a walking corpse. Destroy it and let this troubled dwarf kingdom return to peace.
windows.wndstory.lkxboss=The news of the Dwarf King's death has spread to every corner of the kingdom, and an unexpected guest is on the way here.
windows.wndstory.fireboss=The Fire Witch did not hand you a cookie as usual.
windows.wndstory.zotboss=The evil forces of thousands of dungeons came together to create this terrifying monster. Yog-Zot is a true reflection of the evil in the world.
windows.wndstory.dmzero=Everything you have experienced is just a projection of the dungeon's past memories. The disrupted time is crumpled into a ball and unfolded into this crooked line. This hand that disrupted time appears in front of you.
windows.wndstory.end=Time is stagnant here. \n\nIn this extremely distorted space, DM-ZERO, a very threatening machine invaded by unknown creatures, stands in front of you. \n\nIt is an iron city, suppressing the time that cannot flow.


