####Hollow



windows.wndstory.hollow=The original temple has become an ancient castle, and an ominous atmosphere is surging here...
windows.wndstory.hollowpolt=Entering this mysterious fortress, its unusual decoration and strange monsters immediately attract your attention.\n\nBut then, you feel a headache and dizziness - in a daze, someone says: "Come in, I need your help."\n\nYou look around, nothing.


######



windows.wndstory.aientncity=Follow the light, you are led here. Fossils of ancient creatures, twisted and weird stone pillars. \nThis place is full of vines, stalactites and rock walls. Various sounds are constantly coming out of the jungle made of these rocks. \nSome unknown reason is full of the breath of life. The visible undercurrents and creaking sounds prove that there is something here. Maybe you can find a way to explore to the end of this place.


windows.wndstory.sewers=The upper floors of the dungeon actually constitute the City's sewer system.\n\nAs dark energy has crept up from below the usually harmless sewer creatures have become more and more dangerous. The city sends guard patrols down here to try and maintain safety for those above, but they are slowly failing.\n\nThis place is dangerous, but at least the evil magic at work here is weak.


windows.wndstory.sewersboss=The bottom of the forest is not like a regular forest with tangled roots, but is covered with emerald green vines. \nThey weave into a big net, supplying all the lives that accidentally fall into the valley due to illusions to the bright red fruit in the center. \nThis is the source of all vitality, this is the heart of the forest.




windows.wndstory.exboss1=The bottom of the forest is no longer a peaceful green ocean, but a quiet and dead green stage. There are no animals here, only a bright red heart beating. Vines entwine the trees, forming a rope net that blocks the sun, hanging in the air, as if it will control and restrain intruders who invade this holy land at any time. \nThe abrupt red fruit exudes a sweet fragrance, attracting those lives lost in the forest to come for food, but this is their end. The fruit is full of poison, and those overstepping creatures will always die after a short period of pain. \nThe whole forest is shrouded in darkness, full of unknown dangers and threats. Every life lost here will become the nourishment of the forest. \nThis is a forbidden area for life. Escape.


#windows.wndstory.prison=Many years ago, an underground prison was built here to house dangerous criminals. Due to its strict supervision and high security, prisoners from all over the surface were brought here to endure the torture of time. \n\nBut soon the dark miasma below spread here, twisting the minds of criminals and jailers. \n\nThe chaos that filled the prison made it completely out of order, so the city blocked the entire prison. Now no one knows what these creatures that have experienced countless deaths under these high walls look like...\n\nNow it's a mess here, and you can only kill everything.


windows.wndstory.prison=Many years ago a prison was built here to house dangerous criminals. Tightly regulated and secure, convicts from all over the land were brought here to serve time.\n\nBut soon dark miasma started to creep from below, twisting the minds of guard and prisoner alike.\n\nIn response to the mounting chaos, the city sealed off the entire prison. Nobody knows what became of those who were left for dead within these walls...




windows.wndstory.prisonboss="There is no good or bad in the world. As an assassin, you only need to serve your employer."\nHer words were engraved in Tengu's heart. \nAs the world's top assassin, who is Tengu's employer? Why did he end up here? \nNo one knows these things anymore. \nPerhaps Tengu has nothing to do with you, but the key to the mine gate is in Tengu's hand. \nAlthough I don't know the reason, Tengu doesn't intend to let you go. \nWill this be the starting point of your legend, or the end of your journey? \n--He has been waiting for a long time.


windows.wndstory.coldchest=The area where the most dangerous prisoners were originally held has changed into a different look. The surrounding atmosphere is getting colder and colder. A fierce battle is inevitable...


windows.wndstory.caves=These sparsely populated caves stretch down under the abandoned prison. Rich in minerals, they were once a center of bustling trade and industry for the dwarven society below, but they were abandoned as the dwarves became obsessed with dark magic.\n\nThe caves are now mostly inhabited by subterranean wildlife, gnolls, and derelict machinery; likely corrupted by the same power that has affected the regions above.


windows.wndstory.cavesboss=Origin, development, prosperity, decay, crisis, riot, power struggle, and destruction\n\nThis is the development process of this dwarf kingdom\n\nNow, the people of the dwarf kingdom seem to have known that you are on the way.\n\nThey have prepared a great gift for you. Have you seen the machine in front?\n\nThat is DM, a giant mining machine in the dwarf kingdom.\n\nHowever, now this machine is just guarding here.\n\nWhat is it waiting for?\n\nWhat are we doing here?\n\nAccording to the ancient books you have seen at home, this was the once prosperous dwarf kingdom.\n\nDM doesn't seem to find you. Although this is not DM's fault, you want to find the depths of the dungeon.\n\nFor this, you have to fight this machine to the death.\n\nRemember, believe in yourself and you can survive!


windows.wndstory.icedead=Death is not our end, but our beginning. \n\n-At the moment of my fall, I was cut off from the world. Who can help me now?


windows.wndstory.city=The Dwarven Metropolis was once the greatest of all dwarven city-states. In its heyday the dwarves built wondrous machines of metal and magic that allowed their city to expand rapidly.\n\nThen, one day, the city gates were barred and nobody heard from the dwarves again. The few who escaped the city as it closed told stories of a mad warlock who stole the throne, and the terrible magic he had learned to harness.


windows.wndstory.cityboss=Beat your way through the encirclement\n\nAll the way to the Dwarf King's Council Hall\n\nYou always know in your heart: "This is no longer the Dwarf Kingdom, this is the paradise of the devil"\n\nThe mastermind behind the Dwarf Kingdom should know that you are coming\n\nAnd you also know that this will be the first and last time you see the Dwarf King\n\nYou are ready, so please fight your way out!


windows.wndstory.halls=These deep halls of the Dwarven Metropolis have been twisted by dark magic. In the past these regions played host to the Dwarf King's court of elite warlocks, but now they seem to have been taken over by something even more sinister...\n\nAll sorts of horrific demonic creatures inhabit these halls, being led by some terrible dark power. If the King of Dwarves wasn't the source of the spreading corruption, whatever is down here must be.\n\nTread carefully, very few adventurers have ever descended this far...


windows.wndstory.hallsboss=There is nothing here\n\nThere is no life here\n\nThis is the beginning\n\nIt is really too quiet here\n\nBut, you understand, this is a test! \n\nBut you have to face it, are you ready?


windows.wndstory.new=After defeating the ancient god Yog, everything seems to have calmed down. \n\nBut you always feel that this matter will not end so quickly. \n\nHowever, at least for now, everything is fine. You will go down to the palace of the ancient god and take the final spoils and leave here with glory. \n\nHowever, you have always held an attitude of faith in this dungeon. \n\n\However, everything has changed when you see this castle... What else is waiting for you ahead?


windows.wndstory.forest=After passing through the violent snowstorm, you will see a quiet and peaceful town. \n\nInitially, many adventurers built their own simple huts at the entrance of the dungeon. Later, as more and more people came here, huts were built one after another, and gradually a town took shape. \n\nYou can still see the raging snow outside the town, but the magical thing is that any angry snowflakes will stop when approaching the town, turning into docile sheep, slowly shaking off their white wool. Those branches covered with snowflakes shine with silver brilliance under the sunshine. \n\nIn this kingdom of ice and snow, a warm and peaceful town is so abrupt, but so important. \n\nPerhaps you can go to the hotel to explore the information first.


windows.wndstory.aic=The former snowy town has become a ruin. None of the three giants on the earth can be found now. This is the lonely city, this is the future, both the starting point and the extreme point.


windows.wndstory.lava=When you come here, smoke and heat immediately envelope you, and you find it difficult to breathe. The reddish-brown land is full of cracks. You try to look into the distance, but you can only see the blood-red underground magma lake. You suddenly think of those guards. Their footprints may have been erased by time, and their souls have been sleeping here forever. But you don't intend to retreat. You hold your weapon tightly, and everything has just begun.


windows.wndstory.lavaboss=The most terrifying existence in the past, the source of the jungle's corruption. The lava dragon's habitat is right before our eyes. It's time for it to settle all the accounts...


windows.wndtradeitem.stole=Loot the store
windows.wndtradeitem.oks=Start a conversation
windows.wndstory.dm920=There are actually too many secrets behind the fall of Yog-Dzewa. \nBehind Yog is a DM ultimate experiment that even Yog is afraid of. \nIt is the culprit that caused the fall of the dwarf kingdom, and it is a symbol of disaster! ! ! \nIt was once the killer of the undead army, and it is the synonym of death! ! ! \nIt is DM920 that even Yog-Dzewa has to fear. \nYou need to face it, you can't escape, your journey is for this. \nThere is no way back, you can only give it a try, no matter it is true or false! ! ! \nBut you understand that if you don't defeat him, you will be the only one who dies! ! !


windows.wndgoshop.szo=Dungeon Merchant
windows.wndgoshop.ary=Oh, I noticed that you are ready to take my things. If you have any evil intentions, I advise you to give up!!! \n\nThe merchant is very vigilant to see you. If you want to rob the store, I am afraid that this floor will change strangely. \n\nSo, what is your choice for the merchant's warning? \n-Note: The robbery will lead to the Snow Canyon, and you will definitely get the exclusive witch whisper curse effect of the turbid flame witch Lina. Before teleporting, you will {remove all crosses, please do not bring them into the canyon{.
windows.wndgoshop.yes=Robbery
windows.wndgoshop.no=Give up
windows.wndgoshop.notbad=Okay, I thought you were planning on robbing the store...
windows.wndgoshop.bad=Merchant: %s, you chose to escape from Snow Canyon, so you are a loser!
windows.wndgoshop.ots=Lena has told me everything through telepathy, and now everything here is yours. \n\nHowever, I have to go back to Xuelin Canyon, and I will not appear again on the rest of the journey! \n\nThe robbery reward can only be claimed in one regular store, and other stores will be automatically removed. \n\nAre you willing to accept this reward?
windows.wndgoshop.ok=Get


windows.wndstory.drawfmaster=A solemn hall, a dead silent environment. \n\nThis used to be the largest meeting hall in the Dwarf Kingdom, but now the dead silent and terrifying atmosphere makes it look very strange. \n\nAnd it seems to be full of traps...\nThere is a shabby stone tablet that vaguely says don't step into this place, the crack will turn into the floor, and the general will wake up...\nWhat does this indicate?


