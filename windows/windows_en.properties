windows.wndblacksmith.prompt=Ok, a deal is a deal, here's what I can do for you: I can reforge 2 items and turn them into one of a better quality.
windows.wndblacksmith.pickaxe=_Pickaxe (needs %d favors):_ I thought I could give you this pickaxe I have. I have plenty of them.
windows.wndblacksmith.pickaxe_verify=You really want this piece of junk? This rock isn't like the bottom of a mine, you can't dig a hole with it.
windows.wndblacksmith.pickaxe_free=Okay, you did a great job, I'll give it to you for free.
windows.wndblacksmith.pickaxe_yes=Yes, I want it.
windows.wndblacksmith.pickaxe_no=Forget it.
windows.wndblacksmith.reforge=Reforge them
windows.wndblacksmith.harden=Harden (%d favors required): I can make the weapons and armor you have identified stronger. The enchantments left on them will be more durable.
windows.wndblacksmith.upgrade=Upgrade (%d favors required): Bring me an item you've identified that's below level +2, and I can enhance it.
windows.wndblacksmith.smith=_Forging (needs %d favors):_ I can customize a weapon or armor for you. All the customized ones are good stuff. Not only are they high-grade, but they are also mostly enhanced. I can produce more than one piece in one furnace, so you can pick and choose carefully.
windows.wndblacksmith.smith_verify=Okay, I'll light the stove first and you can pick and choose later.
windows.wndblacksmith.smith_yes=Okay, let's preheat the forge.
windows.wndblacksmith.smith_no=Never mind.
windows.wndblacksmith.cashout=_Cash Out (consume all favors):_ I can also give you some of the common gold I dug up in this cave over the years, one favor for one gold coin.
windows.wndblacksmith.cashout_verify=Okay, here are %d gold coins. Take them and we're even. Don't come to me again for begging!
windows.wndblacksmith.cashout_yes=Give me the gold.
windows.wndblacksmith.cashout_no=Never mind.
windows.wndblacksmith$wndreforge.message=Okay, I can combine two identical authenticated items into one with better quality.
