difficulty.easy_desc=Let's embark on a simple journey, we know every victory. Easy difficulty adjustment is as follows:\n\n-1. All monsters' attack speed is reduced by 50%_\n-2. All monsters' movement speed is reduced by 25%_\n-3. The hero's experience of defeating monsters will be increased by 1.5 times. If the result is not an integer, it will be rounded down.\n-4. The cold value will no longer decrease naturally (not implemented yet)
difficulty.normal_desc=This is just a normal dungeon investigation. All attributes of normal difficulty are at default values.


difficulty.hard_desc=Facing the dungeon, there is only darkness ahead. To win, we must pass this test. The difficulty adjustment is as follows:\n\n-1. All monsters' attack speed increased by 50%_\n-2. All monsters' movement speed increased by 25%_\n-3. The hero will only get 50% of the original experience when defeating the monster. If the result is not an integer, the minimum experience is 1.\n-4. The treatment effect can only get 50% of the original basis_






difficulty.impossible_desc=After all the content of Demonic Ribbon is updated and at least two endings are completed, you can unlock the Purgatory difficulty.


