windows.wndscorebreakdown.diff_multiplier=Diff Multiplier
windows.wndscorebreakdown.hard_desc=Based on the global difficulty of the game. \nEasy 0.5x, Normal 1x, Hard 2x, Developer Mode 0x. (Not implemented yet, use default value 1)
windows.wndscorebreakdown.challenge_multiplier=Challenge Multiplier
windows.wndscorebreakdown.challenge_multiplier_desc=Based on the number of challenges activated. \nChallenge multiplier = (1.25 to the power of %d(number of challenges activated)) x 20 and round to an integer, then divide by 20 to get the final multiplier
windows.wndscorebreakdown.total=Total Score
windows.wndscorebreakdown.total_desc=The total score of the whole game. \nTotal score = (Game score + Exploration score + BOSS battle score + Mission score) x Game progress multiplier (base is 1, game victory multiplier is +1, return success multiplier is +0.5) x Challenge multiplier x Seed multiplier (0.5 if using custom seed, 1 if not) x Difficulty multiplier (not implemented, use the default value 1)
windows.wndscorebreakdown.total_level=Level
windows.wndscorebreakdown.total_level_desc=The evaluation level of the whole game. \nBasic rules for evaluation level: total score is greater than or equal to the basic requirement score x challenge multiplier (the challenge multiplier required for SSS level is halved)\nBasic requirement score rules for level:\n E level: 3000\n D level: 4000\n C level: 5000\n B level: 10000\n A level: 20000\n S level: 50000\n SS level: 100000\n SSS level: 200000\n SSS+ level: 240000\nStarting from D level, failure in the game will double the required score:\n D, C, B, A: 2x\n S, SS: 3x\n SSS: 4x\n SSS+: 5x
windows.wndscorebreakdown.old_score_desc=Games started prior to v1.3 have fewer scoring categories, but progression is ~50% larger and treasure has a higher cap


