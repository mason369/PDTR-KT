windows.wnddragongirlblue.prompt=Okay, thank you for your careful investigation. Based on your investigation points, I can give you the following rewards. \n\nRewards that are gray may be due to unclaimed or already claimed pre-rewards. \n\n_Currently available investigation and research points: %d_
windows.wnddragongirlblue.random_book=_Legendary Book (%d Research Points Required):_ I can give you the book I bought from Miss Nayako.
windows.wnddragongirlblue.random_book_yes=Take this book, %s, perhaps it will make your subsequent adventures easier.




windows.wnddragongirlblue.random_misp=_Throwing Weapon Support (%d Research Points):_ I can give you a random throwing weapon of at least +1 level.
windows.wnddragongirlblue.random_misp_yes=I hope this throwing weapon can help you in your subsequent adventures!


windows.wnddragongirlblue.random_meat=Food Support (%d Research Points Required): I can give you 2 Phantom Fish Meat.
windows.wnddragongirlblue.random_meat_yes=I hope they can help you in your urgent need of food.


windows.wnddragongirlblue.bleesed=_Dragon Blessing (%d Research Points Required):_ I can heal you instantly and get you back to your best condition.
windows.wnddragongirlblue.bleesed_yes=May my power take you further.


windows.wnddragongirlblue.maxtier=_Transmutation of Divine Will (%d Research Points Required):_ I can give you an additional Transmutation Scroll and a Divine Will Inspiration Potion.
windows.wnddragongirlblue.maxtier_yes=I hope these supplies can help you.


windows.wnddragongirlblue.maxring=_Treasure Hunting Ring (%d Research Points Required):_ I can give you a +1 level identified ring that is guaranteed to be cursed.
windows.wnddragongirlblue.maxring_yes=Remember to purify this ring before using it.


windows.wnddragongirlblue.up=_Maid's Blessing (%d Research Points Required):_ My power can upgrade any of your weapons by at least 1 level.
windows.wnddragongirlblue.up_yes=I hope the upgraded weapons will be easier for you to use. You have redeemed all my rewards. I hope your subsequent adventures will be smooth sailing.


windows.wnddragongirlblue.gold=_Exchange for gold (%d research points required):_ I can give you some financial supplies.
windows.wnddragongirlblue.gold_yes=Hopefully this little bit of gold will give you more choices when buying things in the store


windows.wnddragongirlblue.pro=_Additional mission points (%d research points required):_The remaining research can be converted into 1000 mission points.
windows.wnddragongirlblue.pro_yes=Hope these points can make you better.


