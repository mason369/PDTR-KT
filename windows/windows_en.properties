windows.wnddlc.title=Select Difficulty
conducts.null = Formal investigation (default)
conducts.easy=Dungeon Tour (stay tuned)
conducts.easy_desc=Difficulty background:\n\nXXXXX


conducts.normal = Formal investigation
conducts.normal_desc=Difficulty background:\n\nThis is not a game. The winner can choose one of the three kingdoms on the surface to live. Adventurers come here to test their ideal life. The losers will be swallowed by the dungeon, and the winners can enjoy wealth and glory! But, behind this, it is not peaceful...\n\nAll data are normal values\n\nUnder the formal investigation, the score multiplier is calculated normally, and you can participate in the leaderboard and unlock badges.


conducts.hard=Face the Dungeon (stay tuned)
conducts.hard_desc=Difficulty Background:\n\nThe three kingdoms on the surface - Frostfall Empire, Abyss Magic City, Green Forest Holy Land - have reached a secret agreement long ago. In order to deal with the upcoming great disaster\n\nThey use the dungeon as a testing ground for the "Crystal Heart". The Crystal Heart is an energy body that existed in ancient times. Its power comes from the former God of Creation. The three giants on the surface screen and devour the souls of adventurers through the dungeon to maintain its eternal operation.\n\nThe loser will become the nutrient of the Crystal Heart, and the winner will be implanted with the "Soul Imprint" and become a variable to deal with disasters.\n\nDifficulty Features:\n1. Add a collection with positive + negative effects at the beginning\n2. After defeating the Boss, a mysterious NPC appears and provides a chance for transmutation\n3. On the 10th and 20th floors, there is a new chance for the Boss to drop a collection\n\nWhen facing the dungeon, the score multiplier is ×2


conducts.dev=Developer mode
conducts.dev_desc=Developer mode has moved, which also means that developers have been removed from the challenge. \n\nSimilarly, the Lonely City Challenge will be changed to part of the Hard Mode in the future. The two empty challenges will be implemented in subsequent updates. \n\nFor testing and development\n1. You can go up and down the stairs at will\n2. You can fight crickets electronically\n3. There are more, welcome to explore\n\nNote: Developer mode does not count towards the badge count, nor does it count towards the challenge badge rewards.


conducts.seed=Seed mode (do not click)
conducts.seed_desc=Special call for seeding, please do not use this mode to start the game!!!


conducts.moneyletgo = Golden Age
conducts.moneyletgo_desc=The dungeon has finally caught up with the era of gold rush. In this era of money, almost everything in the dungeon is clearly marked with a price. Merchants have made a lot of money, so they plan to give the store a 50% discount. \nHowever, behind the money is the motivation of profit. She has known the current situation of the dungeon. Now monsters may drop extra gold coins. As you go deeper into the dungeon, this ability becomes weaker and weaker. \n\n-_Only one mode can be selected for the deep investigation mode. And it cannot be counted into the multi-pick badge. _


conducts.seadlc=The Sea and the Azure Ruins (DLC)
conducts.seadlc_desc= Since the adventurers investigated the dungeon, we have experienced many events. \nBut the world is vast, and the dungeon is only a small area. In addition to the many mysteries of the dungeon itself, there are still many unsolved things in the world waiting for us to reveal. We have received a commission from the Frostfall Empire. We will go to the depths of the distant sea to investigate the blue ruins. \nIt is said that this is the sleeping place of a witch. The abandoned ruins have sunk into the deep sea, and the original living creatures have been devoured by the deep sea residents. The dark waves here are turbulent and dangerous.


