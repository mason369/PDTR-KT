windows.wndsadghost.rat=Thank you, that horrid rat is slain and I can finally rest... I wonder what twisted magic created such a foul creature...
windows.wndsadghost.gnoll=Thank you, that scheming gnoll is slain and I can finally rest... I wonder what twisted magic made it so smart...
windows.wndsadghost.crab=Thank you, that giant crab is slain and I can finally rest... I wonder what twisted magic allowed it to live so long...
windows.wndsadghost.give_item=Please take one of these items, they are useless to me now... Maybe they will help you in your journey...\n\nAlso... There is an item lost in this dungeon that is very dear to me... If you ever... find my... rose......
windows.wndsadghost.ask=Thank you, adventurer. \n\nMy lover once told me that she was very afraid of that monster...\n\nSo, even though the life and death of that monster is meaningless to me, I am still willing to ask you to defeat it. \n\nMy lover? Alas, yes, I had signed a marriage contract with her before I died, but unfortunately, I was unlucky. I thought it was just an easy task, but I didn't expect to be attacked...\n\nI regret it very much, but what's the use of regret? Defeating the monster she feared may be a little compensation for her. \n\nIt should be the Mid-Autumn Festival now, and I remembered the days when I ate moon cakes and admired the moon with her...\n\nBy the way, I baked some moon cakes, and I will give you one after you choose what you want. \n\nIt's difficult to find suitable kitchen utensils and ingredients in the dungeon, I hope you don't mind.


