windows.wndbestiary.firedragon=Boss Profile:\r\nName: Lava Fire Dragon\t\nHP: 233\t\r\nRegular Attack: 9-12\r\nDefense: 5-9\nMovement Speed: Normal Attack Speed: Normal\r\nNature: Flying Unit\t\r\nAbnormal Resistance:\nImmune to Corruption, Burning, Ghost Phosphorus, Frostfire, Ice, Stun\r\n\r\nBlock Description:\r\n\t The jungle was never so dead, until the arrival of the fire dragon changed everything. It polluted the flower of "Oklah" which was once the core of the forest, causing the guardian of the pure crystal element here to lose energy, and the core of the forest has become the "cancer" now. Now we are commissioned by the Pure Crystal Intelligence Collective to go to the lava land at the bottom of the forest to find the culprit of everything, the lava fire dragon! \r\n\r\nBoss Skill Description:\r\nGeneral Attack:\nPeriodically launch a lava shock wave, causing a flame area\r\nDirected Evolution:\nCheck the five elements in the illustration\nHealing:\nWhen the health is below 141, each directed evolution has a chance to give a certain amount of treatment to yourself\nArcane Teleport:\nPeriodically teleport to the altar to escape from the battle\nSummon Elements:\nPeriodically summon elements, and summon more frequently when the health is below 151. There are up to 6 random elements on the field


