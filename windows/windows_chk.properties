windows.wndsettings$seedfindertab.plus_desc=誠然，運氣也是生活的一部分，有一些時候你Roll的池子可能根本沒有你想要的東西，所以，強力搜查由此誕生！\n\n強力搜查模式將每隔5秒種重新進行種子池抽取，從而期望更快找到您的種子區間。\n\n不過，這一切的前提是你的查種條件符合可能出現，如果是100%無法出現的條件。強力搜查模式也可能幫不了你。\n\n另外，此模式可能對CPU算力有所要求，如果您查種卡住請立刻重啟遊戲。

