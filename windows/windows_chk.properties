windows.wndgoldburrety.message=請將需要金蝶嬗變的物品放入，然後最後在_中心插槽放入金蝶魔卷_，如果你中途再次放了嬗變的物品，那就再次在_中心插槽_放入金蝶魔卷。\n\n你的嬗變次數與你的行為密切關聯，你的任務板為Buff，上有各種委託，請思考後再做行動。\n\n【至少放入兩個才可以選擇金蝶秘卷，_雜項插槽_不可嬗變】\n由於這裡的魔力影響，嬗變也會付出等價的時間，我會給予祝福讓你不會在等待的時間被敵人襲擊。
