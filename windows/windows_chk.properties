windows.wndscorebreakdown.get_multiplier=金蝶倍率
windows.wndscorebreakdown.get_desc=金蝶模式始終得分為0
windows.wndscorebreakdown.seed_multiplier=種子處罰
windows.wndscorebreakdown.diff_multiplier=難度倍率
windows.wndscorebreakdown.good_prop=正面藏品倍率：
windows.wndscorebreakdown.bad_prop=負面藏品倍率：
windows.wndscorebreakdown.total_props=藏品總倍率
windows.wndscorebreakdown.prop_desc=正面和負面的藏品的總分，最終會在遊戲結束後和遊戲總分相乘，得到藏品加成的最終遊戲得分。
windows.wndscorebreakdown.hard_desc=基於遊戲全局難度。\n簡單0.5x，常規1x，困難2x，開發者模式0x。
windows.wndscorebreakdown.challenge_multiplier=挑戰倍率
windows.wndscorebreakdown.challenge_multiplier_desc=基於已啟用的挑戰數。\n挑戰倍率 = ( 1.25 的 %d(已啟用挑戰數) 次方) x 20並進行四捨五入得到整數，再除以20得到最終倍率
windows.wndscorebreakdown.total=總分
windows.wndscorebreakdown.total_desc=整局遊戲累計分數。\n總分 = ( 遊戲得分 + 探索得分 + BOSS戰得分 + 任務得分 ) x 遊戲進度倍率(基礎為1，遊戲勝利倍率額外+1，返程成功倍率額外+0.5) x 挑戰倍率 x 藏品總倍率 x 種子倍率(使用自訂種子為0.5，不使用為1) x 難度倍率
windows.wndscorebreakdown.total_level=等級
windows.wndscorebreakdown.total_level_desc=整局遊戲評價等級。\n評價等級基礎規則: 總分 大於等於 等級基礎需求分數 x 挑戰倍率(SSS級所需挑戰倍率減半)\n等級基礎需求分數規則:\n    E級:3000\n    D級:4000\n    C級:5000\n    B級:10000\n    A級:20000\n    S級:50000\n    SS級:100000\n    SSS級:200000\n    SSS+級:240000\n從D級開始遊戲失敗將會使得所需評分翻倍:\n    D、C、B、A : 2x\n    S、SS : 3x\n    SSS : 4x\n    SSS+ : 5x
windows.wndscorebreakdown.old_score_desc=在 v0.5 版本之前開始的遊戲得分項目較少，但來自【進度】項目的得分會增加約 50%，並且來自【尋寶】項目的得分上限也會增加。

