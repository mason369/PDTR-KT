windows.wnddragongirlblue.prompt=好的，感謝你的細心調查，根據你的調查點數，我可以給你以下獎勵。\n\n獎勵是灰色的可能是有前置獎勵未領取或已經領取了。\n\n_當前可用調查研究點數：%d_
windows.wnddragongirlblue.random_book=_傳說書籍（需%d調查研究點數）：_我可以給予你我在奈亞子小姐那裡買到的書籍。
windows.wnddragongirlblue.random_book_yes=拿上這本書吧，%s，或許它能讓你後續的冒險更加輕鬆。


windows.wnddragongirlblue.random_misp=_投擲武器支援（需%d調查研究點數）：_我可以給予你一個至少+1等級的隨機投擲武器。
windows.wnddragongirlblue.random_misp_yes=希望這個投擲武器能在後續的冒險幫助到你!

windows.wnddragongirlblue.random_meat=_食物支援（需%d調查研究點數）：_我可以給予你2個幻影魚肉。
windows.wnddragongirlblue.random_meat_yes=希望它們能在你餓肚子的燃眉之急時幫助到你。

windows.wnddragongirlblue.bleesed=_龍脈祝福（需%d調查研究點數）：_我可以立刻治療你,讓你重回最佳狀態。
windows.wnddragongirlblue.bleesed_yes=願我的力量能讓你走的更遠。

windows.wnddragongirlblue.maxtier=_蛻變神意（需%d調查研究點數）：_我可以讓你的額外得到一個蛻變卷軸和一個神意啟發合劑。
windows.wnddragongirlblue.maxtier_yes=希望這些補給能幫助到你。

windows.wnddragongirlblue.maxring=_尋寶戒指（需%d調查研究點數）：_我可以讓你獲得一個必定帶有詛咒的+1等級的已鑑定戒指。
windows.wnddragongirlblue.maxring_yes=這個戒指你記得拿去淨化後再用哦。

windows.wnddragongirlblue.up=_女僕祝福（需%d調查研究點數）：_我的力量可以讓你任意武器獲得至少1級的升級。
windows.wnddragongirlblue.up_yes=希望升級後的武器會讓你用的更順手，你已經兌換了我這裡全部獎勵，希望你後續冒險能一帆風順。

windows.wnddragongirlblue.gold=_兌現金幣（需%d調查研究點數）：_我可以給你點資金補給。
windows.wnddragongirlblue.gold_yes=希望這點金幣能讓你在商店中購買東西有更多選擇權

windows.wnddragongirlblue.pro=_額外任務積分（需%d調查研究點數）：_剩餘的調查研究可以折合成1000任務積分。
windows.wnddragongirlblue.pro_yes=希望這些積分可以讓你更好。

