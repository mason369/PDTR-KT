windows.wndblacksmith.prompt=成，按之前講好的，俺可以給你點報酬。\n\n_當前可用人情：%d_
windows.wndblacksmith.pickaxe=_十字鎬（需%d人情）：_俺尋思手頭這鎬子可以給你，畢竟俺這還多的是。
windows.wndblacksmith.pickaxe_verify=你當真要這個破爛東西？這嘎達的石頭可不像礦址下頭，你可沒辦法拿這東西挖窟窿了。
windows.wndblacksmith.pickaxe_free=行，你整的不錯，這東西俺白送你了。
windows.wndblacksmith.pickaxe_yes=是的，我想要它。
windows.wndblacksmith.pickaxe_no=算了。
windows.wndblacksmith.reforge=_重鑄（需%d人情）：_俺可以把倆一樣的已鑑定物件給你打成一件品相好些的。
windows.wndblacksmith.harden=_硬化（需%d人情）：_俺可以給你手頭鑑定過的武器護甲搞結實點，上面留著的附魔刻印會更耐用。
windows.wndblacksmith.upgrade=_升級（需%d人情）：_拿個你手頭鑑定過，低於+2等級的東西過來，俺可以給它強化一下。
windows.wndblacksmith.smith=_鍛造（需%d人情）：_俺可以給你訂製一件武器或者護甲，訂製出來的可都是好貨色，不僅階別高而且多半能帶點強化，俺這一爐子能出來不止一件，所以你可以好好挑揀挑揀。
windows.wndblacksmith.smith_verify=成，那俺先把爐子點起來，過會你可以挑揀挑揀。
windows.wndblacksmith.smith_yes=好的，預熱鍛爐吧。
windows.wndblacksmith.smith_no=算了。
windows.wndblacksmith.cashout=_兌現（消耗全部人情）：_俺也可以給你點這些年在這洞裡扒拉出來的尋常金子，一份人情一枚金幣。
windows.wndblacksmith.cashout_verify=行，這是 %d 金幣。拿走之後咱就兩清了，後面可別再死乞白賴地找俺！
windows.wndblacksmith.cashout_yes=把金幣給我。
windows.wndblacksmith.cashout_no=算了。
windows.wndblacksmith$wndreforge.message=成，俺可以把倆一樣的已鑑定物件給你打成一件品相好些的。
