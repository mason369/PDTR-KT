windows.wndscorebreakdown.title=得分詳情
windows.wndscorebreakdown.progress_title=遊戲
windows.wndscorebreakdown.progress_desc=基於最深層數與英雄等級。\n遊戲分數 = 層數分數: %d x 英雄等級分數: %d x 65\n上限為50000
windows.wndscorebreakdown.treasure_title=尋寶
windows.wndscorebreakdown.treasure_desc=基於收集的金幣與隨身物品的價值。\n尋寶分數 = 金幣收集數: %d + 所擁有物品價值: %d\n上限為20000
windows.wndscorebreakdown.treasure_desc_old=基於收集的金幣。
windows.wndscorebreakdown.explore_title=探索
windows.wndscorebreakdown.explore_desc=基於完全收集物品，發現所有秘密，並且解開所有謎題的樓層數量。\n探索分數 = 完全探索完畢的樓層數: %d x 已經歷的樓層數: %d x 50
windows.wndscorebreakdown.bosses_title=Boss戰
windows.wndscorebreakdown.bosses_desc=基於擊敗的Boss數量，承受Boss戰中可避免的傷害會降低該項得分。\nBOSS分數 = BOSS1分數: %d + BOSS2分數: %d + BOSS3分數: %d + BOSS4分數: %d + BOSS5分數: %d + BOSS6分數: %d
windows.wndscorebreakdown.quests_title=任務
windows.wndscorebreakdown.quests_desc=基於完成的任務。\n任務分數 = 任務1分數: %d + 任務2分數: %d + 任務3分數: %d + 任務4分數: %d + 任務5分數: %d
