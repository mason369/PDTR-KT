windows.wndsadghost.rat=謝謝你，那個可怕的老鼠被殺，我也終於可以安息了…不知道究竟是什麼樣畸形的魔法才能創造這樣一個骯髒的生物…
windows.wndsadghost.gnoll=謝謝你，那個詭計多端的豺狼被殺，我也終於可以安息了……不知道究竟是什麼樣畸形的魔法使它如此詭詐…
windows.wndsadghost.crab=謝謝你，那隻巨蟹被殺，我也終於可以安息了……不知道究竟是什麼樣畸形的魔法能讓它活得那麼長……
windows.wndsadghost.give_item=挑一個你喜歡的拿走吧，我再也用不著它們了...希望它們能幫助你繼續走下去...\n\n還有...我在這地牢裡弄丟了一件心愛之物...倘若你能...找到那...玫瑰...
windows.wndsadghost.ask=謝謝你，冒險者。\n\n我的愛人曾和我說過她很害怕那個怪物......\n\n所以，儘管那隻怪物的死活對我來說已經毫無意義，我仍然願意請求你擊敗它。\n\n我的愛人？唉，是的，我生前已經和她簽訂好婚約了，可惜時運不濟，我本以為這只是一個輕鬆的任務，沒想到卻遭到了偷襲......\n\n我很後悔，可後悔又能有什麼用呢。擊敗了她所懼怕的怪物，也許能算是對她的一點補償吧。\n\n現在應該已經是中秋節了，我又想起了和她一起吃月餅賞月的日子......\n\n對了，我烤製了一些月餅，選好要的東西後也給你一個吧。\n\n地牢難以找到合適的廚具和食材，希望你不要嫌棄。

