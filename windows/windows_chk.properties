windows.wndstory.deadcityend=剛剛你還在未知的空間，與墨菲厄斯決戰。\n\n然而，戰況急轉直下。\n\n在你來得及看清一切前，你失去了意識……\n\n當你甦醒時，眼前是熟悉的惡魔邊境，但這裡卻似乎空無一物……\n\n冥冥之中，你似乎聽到一個十分溫柔的聲音。\n\n“快上樓吧，離開這個混沌的空間，回到屬於你的世界，這是我給你的最後的禮物……”

