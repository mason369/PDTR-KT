windows.wndvictorycongrats.start_text=恭喜您征服了這座地牢！新的遊戲選項已經解鎖，你可以在接下來嘗試下面的東西：
windows.wndvictorycongrats.challenges=您現在可以開啟_挑戰_功能了！挑戰是一類透過各種方式為遊戲增添難度的設置選項。
windows.wndvictorycongrats.custom_mode=您現在可以通過_鈷幣_解鎖更多全新模式，金蝶，BossRush等模式等待你的探索。
windows.wndvictorycongrats.dailies=您現在可以參與_每日委託_了，每天都有一場新的委託等著你。
windows.wndvictorycongrats.stone=您現在可以瀏覽_遠拓石碑_了，它將為你記錄各個時間線的結局和它們的後續故事發展！

windows.wndvictorycongrats.thank_you=萬分感謝您能遊玩基於破碎的Mod版本_魔綾像素地牢_！
windows.wndvictorycongrats.support_prompt=請考慮和我們一同建設魔綾Wiki，如果你沒有這個打算，也祝你遊戲愉快！
