### MLPD

levels.newlastlevel.candle_name=Gold Candlestick
levels.newlastlevel.candle_desc=The candlestick has a golden luster, and is equipped with a lamp that emits a faint red flame. The flame is intertwined with a bloody spectrum, as if you are in a cage of purgatory.


levels.newlastlevel.candle_top_name=Hanging Gold Candlestick
levels.newlastlevel.candle_top_desc=The golden hanging candlestick lights up your space, just like wandering in a mysterious fairyland. Please feel the pure sun-like light and wonderful atmosphere.


levels.gardenlevel.notactivate=You are affected by an unknown magic and cannot leave here. Perhaps this is the reason why the blue ghost appears. Find the white rose that the pink ghost told you about and maybe you can leave here.


levels.zerolevel.time_name=Time Crystal
levels.zerolevel.time_desc=Paopao and Nyako use the time-space crystal to maintain the stability of this place. Compared with the very chaotic dungeon below, this place is very safe. You can start exploring after you are fully prepared!




levels.level$feeling.chasm_title=Abyssal Level
levels.level$feeling.water_title=Water Levels
levels.level$feeling.grass_title=Vegetation Layer
levels.level$feeling.dark_title=Dark Levels
levels.level$feeling.large_title=The Vast Levels
