levels.level.default_name=???
levels.level.chasm_desc=You can't see the bottom.
levels.level.water_desc=In case of burning step into the water to extinguish the fire.
levels.level.entrance_desc=Stairs lead up to the upper depth.
levels.level.exit_desc=Stairs lead down to the lower depth.
levels.level.embers_desc=Embers cover the floor.
levels.level.high_grass_desc=Dense vegetation blocks the view.
levels.level.locked_door_desc=This door is locked, you need a matching key to unlock it.
levels.level.crystal_door_desc=This locked door is made of magical crystal. You can see through, but you'll need a crystal key to open it.
levels.level.locked_exit_desc=Heavy bars block the stairs leading down.
levels.level.barricade_desc=The wooden barricade is firmly set but has dried over the years. Might it burn?
levels.level.sign_desc=You can't read the text from here.
levels.level.inactive_trap_desc=The trap has been triggered before and it's not dangerous anymore.
levels.level.statue_desc=Someone wanted to adorn this place, but failed, obviously.
levels.level.alchemy_desc=This pot is filled with magical water. Items can be mixed into the pot to create something new!
levels.level.empty_well_desc=The well has run dry.


levels.prisonlevel.water_name=Dark cold water
levels.prisonlevel.water_desc=Entering a pool of water will put out the flames on you. \nObviously, this place is full of danger, but fortunately there are still _someone protecting us_. \nHowever, in some places where magic is focused, it cannot affect you.
levels.prisonlevel.empty_deco_desc=There are old blood stains on the floor.
levels.prisonlevel.bookshelf_desc=This is probably a vestige of a prison library. Might it burn?


levels.sewerlevel.water_name=Murky water
levels.sewerlevel.water_desc=Entering the water will extinguish the flames on your body. \nApparently, the evil magic here is very weak, and you can even feel the _power of the holy realm_ protecting you when you step on the water. \nBut in some places where the magic is concentrated, it cannot affect you.


levels.sewerlevel.statue_name=The Original Watcher Statue
levels.sewerlevel.statue_desc=This stone was carved into the image of the first watcher from thousands of years ago. \nTo commemorate it and to scare away wild beasts, people left many statues of it in the jungle. \nTime has left ruthless marks on the statue, and moss has covered its eyes, but you can still feel the watch that spanned thousands of years, which is the last flame of mankind.


levels.prisonlevel.statue_name=Great Lord Statue
levels.prisonlevel.statue_desc=This is a statue of a great lord. \nShe died of a heart attack shortly after suppressing the prison, and people built her statue in this prison city, and her image will stand forever. \nFor some reason, the statue is spotless. Inadvertently, there seems to be a flash of light in the eyes carved in stone.


levels.caveslevel.statue_name=Gladiator Statue
levels.caveslevel.statue_desc=Majestic armor, sharp sword, this statue belongs to the Dwarf King's special force - the Gladiator Corps. \nThese statues can be seen everywhere in the cold mines, the chill and the cold light of the sword blend into one, in the time and space when their owners are no longer active, waiting for the moment to shine again.


levels.minilevels.dragoncavelevel.statue_name=The Crimson Sword Crypt
levels.minilevels.dragoncavelevel.statue_desc=These sword tombs record a fierce battle between the guardian of the jungle and the fire dragon, which ended with the guardian turning into a mindless pure crystal element and the fire dragon falling into a long sleep...\n\nThe remains near the sword tombs seem to tell the fierceness of the battle back then. You begin to understand that his request was so worthwhile but also tragic. Perhaps all his comrades-in-arms have fallen asleep, and only the "Captain of the Guard" is still here...




levels.sewerlevel.empty_deco_desc=Wet yellowish moss covers the floor.
levels.sewerlevel.bookshelf_desc=The bookshelf is packed with cheap useless books. Might it burn?


levels.dwarfmasterbosslevel.well_name=Mysterious Well
levels.dwarfmasterbosslevel.well_desc=The twisted power emanates from the well, perhaps it can save those trapped in dire straits...


levels.rooms.special.oilwellroom$oilwellmaker.name=Oil Well
levels.rooms.special.oilwellroom$oilwellmaker.desc=White smoke is coming out of the well. There is a pungent smell here. Maybe you can salvage some oil here to refill your lantern. \n\nIf there is no smoke, it means it has been salvaged. \n\n_You can only salvage when the oil is below 60%!!! _


levels.level.sp_mode_title=Note
levels.level.sp_mode_body=Detected that you have _%s_ on your body,\nwill automatically enter the corresponding mode.
levels.level.sp_mode_yes=Enter %s mode


levels.rooms.special.peachgodblessroom$springtilemap.name=Shrine
levels.rooms.special.peachgodblessroom$springtilemap.desc=This building stands out in this snowy prison, and doesn't fit in with the surroundings. \n\nThe energy from Him affects this small space, making the surrounding vegetation still full of vitality. \n\nYou feel that the *some kind of currency* you have might come in handy... maybe you can offer some to get His response...?




levels.level.Salt_Water_name=Salt Water Block
levels.level.salt_water_desc=The ground here has been corroded and smells of corrosion.\n\nYou should be careful not to touch it.


levels.rooms.special.goldtrapchestroom$alarmtrap.name=Treasure Trap
levels.rooms.special.goldtrapchestroom$alarmtrap.desc=By the time you discover this dangerous trap, it's already too late...
levels.rooms.special.goldtrapchestroom$alarmtrap.alarm=The trap creates a shrill alarm that echoes through the dungeon!


