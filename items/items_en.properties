items.books.playbookslist.moneymorebooks.name=《The Money God Cult's Canon》
items.books.playbookslist.moneymorebooks.desc=The Fortune Ring is the best functional ring, it has infinite possibilities, it can give you whatever you want! Come and join us! \n\nRemember: Protestants are not capable enough to control the Fortune School, so you cannot give all the upgrades to the Fortune Ring. Otherwise, you will not be able to explore the dungeon. \n\nTry to let the ghost wear the Armor of the Curse of the Doppelganger and let her play in the Fish School.
items.books.playbookslist.moneymorebooks.author=--Author:_confusion_
items.books.playbookslist.moneymorebooks.ac_read=Not yet completed


items.books.playbookslist.pinkrandombooks.name=《Random Notes》
items.books.playbookslist.pinkrandombooks.desc=On September 9th, chrysanthemums are reflected on the mountain. I climbed up to the top and looked far away, thinking of the phoenix hairpin. \nWhy is the autumn wind so sad? I feel sad after putting on the dogwood.
items.books.playbookslist.pinkrandombooks.author=--Author:_Goo Pro_
items.books.playbookslist.pinkrandombooks.ac_read=Not yet completed


items.books.playbookslist.deyizibooks.name=《We are Berlin United》
items.books.playbookslist.deyizibooks.desc=Beyond the mountains and the sea, there is a small stadium. \nThere is a group of pure football players in the stadium, they are Berlin United. Even though we have just entered the first division, we have an indomitable momentum. \nTraveler, may the iron will of Berlin United bless you.
items.books.playbookslist.deyizibooks.author=--Author:_Pedro_
items.books.playbookslist.deyizibooks.ac_read=Not yet completed


items.books.playbookslist.bzmdrbooks.name="Dungeon Speedrunning Cheats"
items.books.playbookslist.bzmdrbooks.desc=Dungeons exist for speedrunning. There's no need to go through so many twists and turns in a dungeon. I just picked up the psychic bow and started shooting blindly. I shot directly from the 1st floor to the Ancient God, 360% Thomas Spin Spiral Shot, then switched to martial arts and used the acid staff to shoot, shoot, shoot, shoot, shoot, shoot, shoot all the monsters to death, killed all the monsters in the dungeon, blew up all the wealth archers, and then sold all the artifacts, I shot, shoot, shoot, shoot, shoot, shoot
items.books.playbookslist.bzmdrbooks.author=--Author:_Bzmdr_
items.books.playbookslist.bzmdrbooks.ac_read=Not yet completed


items.mainbooks.desc=The heaviness of the book makes you afraid to open it easily, but if you don't open it, you will not be able to gain its power.
items.mainbooks.readed=You have already read this book. So you don't need to read the contents of this book again.
items.mainbooks.no=Just when you were ready to read, a force prevented you from opening the pages of the book. It seems someone wants you to take the books out of the dungeon instead of reading them.


