###bags

items.bags.bag.name=backpack


items.bags.potionbandolier.name=potion bandolier
items.bags.potionbandolier.desc=This thick bandolier fits around your chest like a sash, it has many insulated straps on it to hold potion vials.\n\nWhile inside the bandolier, your potions should be protected from the cold.


items.bags.scrollholder.name=scroll holder
items.bags.scrollholder.desc=This tubular container looks like it would hold an astronomer's tools and charts, but your scrolls will fit just as well. There's even a few side compartments which would nicely fit your spell crystals.\n\nThe holder doesn't look very flammable, so your scrolls should be safe from fire inside it.


items.bags.velvetpouch.name=velvet pouch
items.bags.velvetpouch.desc=This small velvet pouch can store many small items in it, such as seeds and runestones.


items.bags.magicalholster.name=magical holster
items.bags.magicalholster.desc=This slim holster is made from some exotic animal hide, and possesses powerful magic which lets it store a massive amount of ranged weapons.\n\nYou can simply reach into the bag and will always grab the item you were looking for.\n\nDue to the holster's magic, wands will charge slightly faster and thrown weapons will last slightly longer inside of it.






###bombs

items.bombs.arcanebomb.name=arcane bomb
items.bombs.arcanebomb.desc=This bomb has been imbued with arcane properties. It will explode into a powerful blast similar to Goo's pumped up attack. This blast penetrates armor and reaches further than a regular bomb's explosion.


items.bombs.bomb.name=bomb
items.bombs.bomb.ac_lightthrow=LIGHT & THROW
items.bombs.bomb.snuff_fuse=You quickly snuff the bomb's fuse.
items.bombs.bomb.snuff_fuse_no=You snuffed the bomb fuse quickly. The magic on the bomb is invalid. It will disappear when you pick it up. Maybe you can force it to explode with fire...
items.bombs.bomb.ondeath=Killed by an explosion
items.bombs.bomb.rankings_desc=Killed by an explosion
items.bombs.bomb.desc=A fairly hefty black powder bomb. An explosion from this would certainly do damage to anything nearby.
items.bombs.bomb.desc_fuse=It looks like the fuse will take a couple rounds to burn down once it is lit.
items.bombs.bomb.desc_burning=The bomb's fuse is burning away, keep your distance or put it out!
items.bombs.bomb$doublebomb.name=two bombs
items.bombs.bomb$doublebomb.desc=A stack of two hefty black powder bombs, looks like you get one free!


items.bombs.firebomb.name=firebomb
items.bombs.firebomb.desc=This bomb has been modified to burst into a sustained flame in a larger area when it explodes.


items.bombs.flashbang.name=flashbang
items.bombs.flashbang.desc=This customized bomb will erupt into a burst of blinding light when it explodes. Anything nearby will be disoriented based on how close it was to the bomb.


items.bombs.frostbomb.name=frost bomb
items.bombs.frostbomb.desc=This bomb has been modified to burst into a sustained gust of freezing air in a larger area when it explodes.


items.bombs.holybomb.name=holy bomb
items.bombs.holybomb.desc=This bomb has been modified to flash holy light in a larger area when it explodes, dealing bonus damage to undead and demonic enemies.


items.bombs.noisemaker.name=noisemaker
items.bombs.noisemaker.desc=This customized bomb will repeatedly make noise when its fuse runs out. When something touches the bomb, it will explode!
items.bombs.noisemaker.desc_burning=The noisemaker is ticking away, it'll explode when something gets near!


items.bombs.shockbomb.name=shock bomb
items.bombs.shockbomb.desc=This bomb has been modified to unleash bolts of electricity when it explodes. Anything nearby will be damaged and stunned based on how close it was to the bomb.


items.bombs.regrowthbomb.name=regrowth bomb
items.bombs.regrowthbomb.desc=This customized bomb will splash life-giving liquid all around it instead of exploding. The area caught in the blast will rapidly sprout grass and plants. Yourself and any allies caught in the blast will be healed.


items.bombs.shrapnelbomb.name=shrapnel bomb
items.bombs.shrapnelbomb.desc=This bomb has been modified with scraps of DM-300's metal, which will fragment and fly everywhere when it explodes, damaging anything in a huge range around the bomb. You had better hide behind something when using it...


items.bombs.woollybomb.name=woolly bomb
items.bombs.woollybomb.desc=This customized bomb will create a field of magical sheep after exploding. These sheep will block movement and persist for some time.


###prop

###Good Prop

items.props.starsachet.name=StarSachet
items.props.starsachet.desc = The sachet made of precious star flowers still exudes a special aroma. In this fragrance, you feel more conscious. \n\n Each area gains a fixed _Accuracy_ and _Dodge_ bonus_[1/2/3/4/5]_
items.props.armorscalesofbzmdr.name= Armor Scales of bzmdr
items.props.armorscalesofbzmdr.desc = This scale gives you a familiar vibe, it reminds you of the guy you occasionally see in the tavern, except you remember he never wore armor\n\n Each region gains _Fixed Damage Reduction_[1/2/3/4/5]
items.props.deliciousrecipe.name = "Delicious Recipe"
items.props.deliciousrecipe.desc = Something that says "add some Phantom Piranha meat to the pot, add a little Yangchun grass, an appropriate amount of Demon King Grass stems, and simmer for 30 minutes over low heat" is called a Huimin recipe? \n\nEach time you consume alchemical energy through alchemy, you will gain _+2 alchemical energy_
items.props.deliciousrecipe.reduce = You followed the instructions on the recipe and suddenly removed the mana supply at the last minute of alchemy... the alchemy was still successful! But you always felt that something was wrong...
items.props.emotionalaggregation.name = Emotional Aggregation
items.props.emotionalaggregation.desc = Too many adventurers have entered the dungeon, most of them died tragically somewhere in the dungeon, but their firm wills before death finally gathered together and inspired the formation of this aggregation.\n\nEvery time you are about to receive damage, there is a _10%_ chance to _ignore this damage_
items.props.emotionalaggregation.block = Just before being attacked, you feel a surge of warmth from your backpack enveloping your body... You are immune to this damage!
items.props.knightstabbingsword.name = Knight Stabbingsword
items.props.knightstabbingsword.desc = This slightly rusted but still sharp sword has been the faith of generations - and perhaps still is, but will it be yours?\n\nEvery time you are attacked you have a _25%_ chance to immediately perform a _Counterattack_ on the enemy.
items.props.knightstabbingsword.attack = The stabbing sword in your backpack suddenly flies out on its own to attack the enemy!
items.props.luckyglove.name = Lucky Gloves
items.props.luckyglove.desc = The legendary gloves used by the God of Gamblers. It is said that the God of Gamblers wore these gloves and never lost in any casino until people found out that the gloves were made of multiple layers. \n\nWhen you purchase items, there is a _10% chance that no gold coins will be consumed_.
items.props.luckyglove.lucky = Your gloves moved on their own, and while you were haggling over a price with the shopkeeper, he helped you get an item...
items.props.monocular.name = "Monocular"
items.props.monocular.desc = This is a very strange monocular telescope. It looks like it was cut from a pair of binoculars. Can it really be used normally? \n\nWhen you use a throwing weapon, the damage of this attack increases by 0~3 points for every 4 squares of distance between the target and you.
items.props.newstem.name = New Stem
items.props.newstem.desc = A dead branch with sprouts, eager to grow again.\n\nWhen not severely hungry, you gain +1 health every 10 turns.
items.props.portablewhetstone.name = Portable Whetstone
items.props.portablewhetstone.desc = This special whetstone is not only small and easy to carry, but also has a special design that allows its user to repair weapons in the shortest possible time in a rather "elegant" way. The only downside is that this whetstone doesn't seem to be very durable. \n\nYou get a fixed damage bonus of 1/3/5/7/9 in each region
items.props.rapidearthroot.name = Rapid-Growing Earthbound Root
items.props.rapidearthroot.desc = A special kind of ground root, which grows faster and has stronger vitality than ordinary ground roots. But the root strength is not as good as ordinary ground roots. Nevertheless, in a dungeon with surging magic power, it may be useful at a critical moment. \n Every 250 turns, you gain a layer of tree skin, which decays by 10 turns, with a total of [number of regions * 2] layers.
items.props.wenstudyingpaperone.name = Wenstudyingpaperone
items.props.wenstudyingpaperone.desc = "The environmental changes here are too drastic compared to other places... Is it affected by the so-called 'magic'? The answer is not clear, and further exploration is needed." \n\nYou will get a time bubble that lasts for 5 turns every 125 turns.
items.props.yanstudyingpapertwo.name =Research Manuscripts on Words - II
items.props.yanstudyingpapertwo.desc = "After two rounds of field investigation, it is certain that this place is not far away from the Broken Realm in terms of space, and can even be said to be 'very close'. As evidence, I found several people who should not be here in the other direction of the dungeon entrance. Based on experience, I think it is necessary to communicate with the local residents. In addition, you can also consider temporarily renting a place in the tavern." \n\nYou will gain a speed of 5 turns every 175 turns.


### Bad Prop

items.props.brokenbone.name = Broken Bone
items.props.brokenbone.desc = This is a relic of an unfortunate adventurer. The lower part of the broken bone has obvious water stains. What on earth did he go through... \n\nYour luck when fighting monsters is reduced by 60%
items.props.rustedgoldcoin.name = Rusted Gold Coin
items.props.rustedgoldcoin.desc = Although they are uniformly called gold coins in the dungeon, no country or organization actually uses gold to make currency. Unfortunately, although it is unknown what material they are made of, they have rusted in the dungeon. \n\n Your gold coins {reduced by 25% {
items.props.confusedmiemietalisman.name = Miemietalisman
items.props.confusedmiemietalisman.desc = Perhaps the creator intended to use the magic sheep to protect himself, but it is clear that his craftsmanship was not very good.\n\nYou have a 2% chance to trigger the Sheep Rune's effect every turn, and this effect will not be triggered again within 75 turns.
items.props.confusedmiemietalisman.sheep = The amulet suddenly glowed brightly...
items.props.thegriefofspeechless.name = The Grief of Speechless
items.props.thegriefofspeechless.desc = A yellowed diary, filled with the misfortunes and sorrows of a person born with muteness\n\nWhen using {scrolls other than upgrade scrolls{, there is a 25% chance of {use failure.
items.props.thegriefofspeechless.grief = The scroll suddenly emits a bright flash and then burns itself to ashes
items.props.blockingdrug.name = Blocking Drug
items.props.blockingdrug.desc = Just carrying this bottle of pills will block your blood circulation, making it difficult for you to regenerate life.\n\n Life in a non-starved state {Natural recovery efficiency*80%.
items.props.terrordoll.name = Terror Doll
items.props.terrordoll.desc = A doll with a very scary appearance. You always feel like it is staring at you.\n\nYour {Accuracy*75% { \n Your damaging staff has a { 10% chance of {not causing any damage
items.props.terrordollb.name = Terror Doll
items.props.terrordollb.desc =A very creepy-looking doll. You always feel like it's staring at you.\n\nYour {Accuracy*75% { \n Your damaging staff has a { 10% chance of {not causing any damage\nIt looks a little different...
items.props.terrordoll.terror = A sense of fear suddenly erupts in your heart without any reason
items.props.cloakfragmentsofbzmdr.name = Cloak Fragments of bzmdr
items.props.cloakfragmentsofbzmdr.desc = You picked up this piece of black cloth in the dungeon and it felt surprisingly familiar. When you carried it with you, you felt someone was watching you, so you had to pay some attention... \n The damage you cause per attack in each area is {fixed reduction{ [1/3/6/9/15]
items.props.emotionalaggregationb.name = Emotional Aggregation
items.props.emotionalaggregationb.desc = Too many adventurers have entered the dungeon, most of them died tragically somewhere in the dungeon, and their resentment before death formed this... product. Even if you seal it tightly, you still feel uneasy.\n\nYou will take {extra damage{ [1/3/5/7/9] when attacked in each area
items.props.heartofcrystalfractal.name = Heart of Crystal - Concept Fractal
items.props.heartofcrystalfractal.desc = The overflowing magic of the Crystal Heart finally gathered somewhere to form this strange product. Perhaps it would have brought beneficial effects to adventurers, but obviously, you don't think so... \n\n{Your Dodge*70% {
items.props.wenstudyingpapertwo.name = Wen's Research Manuscript Two
items.props.wenstudyingpapertwo.desc = "It's hard to imagine... the spatial fluctuations inside the dungeon are so complex. The so-called underground forest is nothing more than pieces of magic-wrapped fragments suspended in the turbulent space. The actual position relationship between the prison and the mine is completely opposite. Many times we are not going down, but... rising. Combined with the magical background of this place, the reason behind the dungeon should not be as simple as the Crystal Heart's natural loss of control." \n\nYou will {gain the "Illusion" effect {lasting 20 turns} every 30 turns{
items.props.yanstudyingpaperone.name = Yan's Research Paper One
items.props.yanstudyingpaperone.desc = "Obviously, the dungeon is not suitable for normal...ordinary humans. The space here changes dramatically. Even the same portal will teleport people or items to different locations at different times. But the strange thing is that after one teleportation, a two-way portal is formed for someone to use only. After checking the spatial coordinates, although the positions of the front and back portals are the same, they are no longer the same portal." \n\nWhen you step into a new floor, you have a 25% chance of losing any potion except strength/root potion.
items.props.yanstudyingpaperone.lost = Just as you were about to walk, you suddenly felt your backpack become a little lighter...
items.props.noteofbzmdr.name = bzmdr's note
items.props.noteofbzmdr.desc = When you try to read this notebook, the pages seem to be stuck and won't budge. When you try again, you feel a malevolent force clinging to you.\n\n{Your field of vision is reduced by 25%}


items.props.bottlewraith.name = Bottled Wraith
items.props.bottlewraith.desc =A magic bottle containing wraiths. The smell it emits will attract a large number of its kind.\n\nEvery time you enter a new floor, 1~2 wraiths will be summoned outside each door in the initial room.
items.props.bottlewraith.bottle_wraith_generated=The bottle of wraith is emitting a malicious aura. You feel like something is watching you from behind...


items.props.trash.trash = Xiaoye: It seems that this kind of magical transformation has been exhausted...


###food

items.food.berry.name=dungeon berry
items.food.berry.eat_msg=That berry was tasty!
items.food.berry.desc=This small berry was found by the Huntress among the dungeon's vegetation. It can be eaten quickly, restores a small amount of satiety, and might contain a usable seed!


items.food.blandfruit.name=blandfruit
items.food.blandfruit.cooked=cooked blandfruit
items.food.blandfruit.sunfruit=sunfruit
items.food.blandfruit.rotfruit=rotfruit
items.food.blandfruit.earthfruit=earthfruit
items.food.blandfruit.blindfruit=blindfruit
items.food.blandfruit.firefruit=firefruit
items.food.blandfruit.icefruit=icefruit
items.food.blandfruit.fadefruit=fadefruit
items.food.blandfruit.sorrowfruit=sorrowfruit
items.food.blandfruit.stormfruit=stormfruit
items.food.blandfruit.dreamfruit=dreamfruit
items.food.blandfruit.starfruit=starfruit
items.food.blandfruit.swiftfruit=swiftfruit


items.food.blandfruit.halofruit=halofruit
items.food.blandfruit.lightfruit=lightfruit


items.food.blandfruit.raw=You can't bear to eat it raw.
items.food.blandfruit.desc=So dry and insubstantial, perhaps stewing it with another ingredient would improve it.
items.food.blandfruit.desc_cooked=The fruit has plumped up from its time soaking in the pot and has even absorbed the properties of the seed it was cooked with. It will have the effect of whatever potion the seed corresponded to.
items.food.blandfruit.desc_eat=It looks ready to be eaten!
items.food.blandfruit.desc_throw=It seems pretty volatile, it might be best to throw it.
items.food.blandfruit$chunks.name=blandfruit chunks
items.food.blandfruit$chunks.desc=The blandfruit has exploded on impact, leaving inert chunks behind.\n\nDespite a bit of dirt, these large chunks of cooked blandfruit seem perfectly edible.


items.food.chargrilledmeat.name=chargrilled meat
items.food.chargrilledmeat.desc=It looks like a decent steak.


items.food.food.name=ration of food
items.food.food.ac_eat=EAT
items.food.food.eat_msg=That food tasted delicious!
items.food.food.desc=Nothing fancy here: dried meat, some biscuits - things like that.


items.food.frozencarpaccio.name=frozen carpaccio
items.food.frozencarpaccio.invis=You see your hands turn invisible!
items.food.frozencarpaccio.hard=You feel your skin harden!
items.food.frozencarpaccio.refresh=Refreshing!
items.food.frozencarpaccio.better=You feel better!
items.food.frozencarpaccio.desc=It's a piece of frozen raw meat. The only way to eat it is by cutting thin slices of it. And this way it's suprisingly good.
items.food.frozencarpaccio.descx=This is quick-frozen raw meat. It has magical powers and tastes surprisingly good.


items.food.phantommeat.name=Phantommeat
items.food.phantommeat.desc=This hunk of flesh cut from a phantom piranha is translucent and shimmers with strange light. This magical meat requires no cooking, fills your stomach completely, and grants a variety of defensive buffs. When consumed, it grants invisibility, bark, and a small amount of healing, and cures most harmful effects.


items.food.meatpie.name=meat pie
items.food.meatpie.eat_msg=That food was incredible!
items.food.meatpie.eat_msg_1=+1 Strength
items.food.meatpie.eat_msg_2=New strength surges through your body.


items.food.meatpie.eat_msg_4=Note: You can only get the basic bonus of all-meat pie on the Boss level.


items.food.meatpie.eat_msg_3=The power you can obtain from food on this layer has reached the upper limit. The upper limit you can obtain on this layer is %d times.


items.food.meatpie.desc=A delicious pie filled with savory meat. This will satisfy you far more than any other meal.
items.food.meatpie.descx=A tempting pie filled with delicious meat fillings. It seems to contain powerful power, and after eating it, you will feel fuller than other foods.


items.food.mysterymeat.name=mystery meat
items.food.mysterymeat.eat_msg=That food tasted... strange.
items.food.mysterymeat.hot=Oh it's hot!
items.food.mysterymeat.legs=You can't feel your legs!
items.food.mysterymeat.not_well=You are not feeling well.
items.food.mysterymeat.stuffed=You are stuffed.
items.food.mysterymeat.desc=Eat at your own risk!
items.food.mysterymeat$placeholder.name=meat


items.food.pasty.pasty=pasty
items.food.pasty.pie=pumpkin pie
items.food.pasty.cane=candy cane
items.food.pasty.pasty_desc=An authentic Cornish pasty with a traditional filling of beef and potato. Delicious!
items.food.pasty.pie_desc=A great big slice of pumpkin pie! Its sweet and spicy flavor will fill you up and give you a tiny bit of healing.\n\nHappy Halloween!
items.food.pasty.cane_desc=A huge sugary sweet candy cane! It's big enough to fill you up, and the sugar might give your wands a tiny bit of extra charge too.\n\nHappy Holidays!


items.food.smallration.name=small food ration
items.food.smallration.eat_msg=That food tasted ok.
items.food.smallration.desc=It looks exactly like a standard ration of food but smaller.
items.food.smallration.descx=It looks different from normal rations, just a little bigger.


items.food.smallration$blackmoon.name=Small Moon Cake
items.food.smallration$blackmoon.desc=A small mooncake. One side is burnt black, probably due to improper heat control. \n\nThere are a few words written on the dough, but they are not clear. \n\nYou are not sure what is inside... The filling looks a bit like completely solidified curry. \n\nIt smells a bit strange, but it should be edible.
items.food.smallration$blackmoon.eat_msg=To your surprise, the filling is baked potato flavored and quite tasty.


items.food.stewedmeat.name=stewed meat
items.food.stewedmeat.eat_msg=That food tasted ok.
items.food.stewedmeat.desc=Stewing the meat has cleansed it of any disease or parasites. It should be safe to eat.




##journal items

items.journal.documentpage.name=torn page
items.journal.documentpage.desc=A lone page, probably torn from a book of some sort. You'll need to pick it up to read it.


items.journal.alchemypage.name=torn alchemy book page
items.journal.alchemypage.desc=A torn page from a guidebook on alchemy.\n\nMost of the text is too small to read at a distance, but you can make out the title of the page:\n\n_"%s"_


items.journal.guidebook.name=tome of dungeon mastery
items.journal.guidebook.hint=Your guidebook has advice for you!
items.journal.guidebook.desc=An adventurer's guidebook, left here by someone who decided adventuring wasn't for them! This particular book is magical, and can prompt adventurers to read a page at the right moment.\n\nDespite that functionality, the book is most popular because of the big words "Don't Panic!" written in large friendly letters on the cover.


items.journal.guidepage.name=torn guidebook page
items.journal.guidepage.desc=A torn page from an adventuring guidebook.\n\nMost of the text is too small to read at a distance, but you can make out the title of the page:\n\n_"%s"_




###keys



items.keys.key.locksword=The Locksword of Revelation has absorbed the residual magic of the Dungeon Key, and you feel that it seems to have become more powerful.


items.keys.goldenkey.name=golden key
items.keys.goldenkey.desc=The notches on this golden key are tiny and intricate. Perhaps it will open a locked chest?


items.keys.crystalkey.name=Crystal key
items.keys.crystalkey.desc=The cut surfaces of this crystalline key shimmer in the darkness. Perhaps it will open something made of crystal?


items.keys.ironkey.name=iron key
items.keys.ironkey.desc=The notches on this ancient iron key are well worn; its leather lanyard is battered by age. What door might it open?


items.keys.skeletonkey.name=skeleton key
items.keys.skeletonkey.desc=This key looks serious: its head is shaped like a skull. Probably it can open some serious door.






###potions

###potions

items.potions.potion.ac_drink=DRINK
items.potions.potion.turquoise=turquoise potion
items.potions.potion.crimson=crimson potion
items.potions.potion.azure=azure potion
items.potions.potion.jade=jade potion
items.potions.potion.golden=golden potion
items.potions.potion.magenta=magenta potion
