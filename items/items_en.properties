items.artifacts.chaliceofblood.yes=Yes, I know what I'm doing
items.artifacts.chaliceofblood.no=No, I changed my mind
items.artifacts.chaliceofblood.tip=Note: The Chalice of blood must be unequipped to participate in alchemy.
items.artifacts.chaliceofblood.prick_warn=Each time you use the chalice it will drain more life energy, if you are not careful this can easily kill you.\n\nAre you sure you want to offer it more life energy?
items.artifacts.chaliceofblood.onprick=You prick yourself, and your life essence drains into the chalice.
items.artifacts.chaliceofblood.ondeath=The Chalice sucks your life essence dry...
items.artifacts.chaliceofblood.desc=This shining silver chalice is oddly adorned with sharp gems at the rim.
items.artifacts.chaliceofblood.desc_cursed=The cursed chalice has bound itself to your hand, and is inhibiting your ability to regenerate health.
items.artifacts.chaliceofblood.desc_1=As you hold the chalice, you feel oddly compelled to prick yourself on the sharp gems.
items.artifacts.chaliceofblood.desc_2=Some of your blood is pooled into the chalice, you can subtly feel the chalice feeding life energy into you. You still want to cut yourself on the chalice, even though you know it will hurt.
items.artifacts.chaliceofblood.desc_3=The chalice is filled to the brim with your life essence. You can feel the chalice pouring life energy back into you.
items.artifacts.chaliceofblood.desc_4=\n\nThe theoretical maximum damage the Chalice can cause next time is:
items.artifacts.chaliceofblood.desc_5=\n\nThe damage caused by the Holy Grail can be offset by various forms of defense. Note: The damage caused by the Holy Grail at level 0 is 1!


items.artifacts.cloakofshadows.name=cloak of shadows
items.artifacts.cloakofshadows.ac_stealth=STEALTH
items.artifacts.cloakofshadows.cooldown=Your cloak needs %d more rounds to re-energize.
items.artifacts.cloakofshadows.cursed=You cannot use a cursed cloak.
items.artifacts.cloakofshadows.no_charge=Your cloak hasn't recharged enough to be usable yet.
items.artifacts.cloakofshadows.desc=A priceless magical cloak, stolen from the royal armory many years ago by the Rogue. When worn, it can be used to turn completely invisible for a short time.\n\nThe more the cloak is used, the stronger it will become, allowing the Rogue to become invisible more frequently and for longer durations.
items.artifacts.cloakofshadows$cloakstealth.no_charge=Your cloak has run out of energy.
items.artifacts.cloakofshadows$cloakstealth.levelup=Your cloak grows stronger!
items.artifacts.cloakofshadows$cloakstealth.name=Cloaked
items.artifacts.cloakofshadows$cloakstealth.desc=Your cloak of shadows is granting you invisibility while you are shrouded by it.\n\nWhile you are invisible enemies are unable to attack or follow you. Physical attacks and magical effects (such as scrolls and wands) will immediately cancel invisibility.\n\nYou will remain cloaked until it is cancelled or your cloak runs out of charge.
items.artifacts.cloakofshadows.ac_bloodbat=Summon Bat


items.artifacts.driedrose.name=dried rose
items.artifacts.driedrose.ac_summon=SUMMON
items.artifacts.driedrose.sorry=Adventurer, I'm going to be with my love......
items.artifacts.driedrose.ac_direct=DIRECT
items.artifacts.driedrose.ac_outfit=OUTFIT
items.artifacts.driedrose.no_spawned=A powerful stream of magic prevents you from summoning a ghost.
items.artifacts.driedrose.spawned=You have already summoned the ghost.
items.artifacts.driedrose.no_charge=Your rose isn't fully charged yet.
items.artifacts.driedrose.cursed=You cannot use a cursed rose.
items.artifacts.driedrose.no_space=There is no free space near you.
items.artifacts.driedrose.charged=Your rose is fully charged!
items.artifacts.driedrose.desc=Is this the rose that the ghost mentioned before disappearing? It seems to hold some spiritual power, perhaps it can be used to channel the energy of that lost warrior.
items.artifacts.driedrose.desc_no_quest=A dried aged rose that is somehow still holding together despite its age.\n\nIt seems to have some spiritual power, but you have no idea how to use it right now.
items.artifacts.driedrose.desc_hint=It seems to be missing some petals. Perhaps reattaching them will strengthen the rose.
items.artifacts.driedrose.desc_cursed=The cursed rose is bound to your hand, it feels eerily cold.
items.artifacts.driedrose.desc_weapon=Ghost's weapon: %s.
items.artifacts.driedrose.desc_armor=Ghost's armor: %s.
items.artifacts.driedrose.desc_strength=Ghost's strength: %s.
items.artifacts.driedrose$petal.name=dried petal
items.artifacts.driedrose$petal.no_rose=You have no rose to add this petal to.
items.artifacts.driedrose$petal.no_room=There is no room left for this petal, so you discard it.
items.artifacts.driedrose$petal.maxlevel=The rose is completed!
items.artifacts.driedrose$petal.levelup=You add the petal to the rose.
items.artifacts.driedrose$petal.desc=A frail dried up petal, which has somehow survived this far into the dungeon.
items.artifacts.driedrose$wndghosthero.title=Ghost's Equipment
items.artifacts.driedrose$wndghosthero.desc=The ghost is weak on their own, but their form is solid enough to be equipped with a weapon and armor. They will be able to use these items just like you do.\n\nThe ghost can currently equip items requiring up to _%d strength._
items.artifacts.driedrose$wndghosthero.weapon_prompt=Select a weapon
items.artifacts.driedrose$wndghosthero.armor_prompt=Select an armor
items.artifacts.driedrose$wndghosthero.cant_unique=The ghost can't use unique items.
items.artifacts.driedrose$wndghosthero.cant_unidentified=You don't know enough about that item.
items.artifacts.driedrose$wndghosthero.cant_cursed=You can't give the ghost cursed equipment.
items.artifacts.driedrose$wndghosthero.cant_strength=The ghost is not strong enough to use that.


##ghost hero

items.artifacts.driedrose$ghosthero.name=sad ghost
items.artifacts.driedrose$ghosthero.def_verb=evaded


items.artifacts.driedrose$ghosthero.hello=Hello again %s.
items.artifacts.driedrose$ghosthero.introduce=My spirit is bound to this rose, it was very precious to me, a gift from my love whom I left on the surface.\n\nI cannot return to him, but thanks to you I have a second chance to complete my journey. When I am able I will respond to your call and fight with you.\n\nAs long as you have the rose I can hear your voice, so you can use it to direct me from afar.\n\nHopefully you may succeed where I failed...


items.artifacts.driedrose$ghosthero.dialogue_sewers_1=These sewers used to be safe, people even lived here in the winter.
items.artifacts.driedrose$ghosthero.dialogue_sewers_2=I wonder what happened to the guard patrols, did they give up?
items.artifacts.driedrose$ghosthero.dialogue_sewers_3=I had family on the surface, I hope they're safe.
items.artifacts.driedrose$ghosthero.dialogue_sewers_4=The guards couldn't defeat these monsters, but maybe we can.
items.artifacts.driedrose$ghosthero.dialogue_sewers_5=If even the sewers are this dangerous, I wonder what's below...
items.artifacts.driedrose$ghosthero.dialogue_sewers_6=What could have caused these rats and crabs to grow so large?
items.artifacts.driedrose$ghosthero.dialogue_prison_1=I've heard stories about this place, nothing good.
items.artifacts.driedrose$ghosthero.dialogue_prison_2=This place was always more of a dungeon than a prison.
items.artifacts.driedrose$ghosthero.dialogue_prison_3=I can't imagine what went on when this place was abandoned.
items.artifacts.driedrose$ghosthero.dialogue_prison_4=It seems both the prisoners and guards have been turned into monsters.
items.artifacts.driedrose$ghosthero.dialogue_prison_5=What could be responsible for all these skeletons?
items.artifacts.driedrose$ghosthero.dialogue_prison_6=These people didn't have to end up like this...
items.artifacts.driedrose$ghosthero.dialogue_caves_1=No human or dwarf has been here for a very long time.
items.artifacts.driedrose$ghosthero.dialogue_caves_2=What would cause the dwarves to abandon a gold mine?
items.artifacts.driedrose$ghosthero.dialogue_caves_3=It's a shame all the gold here is useless on the surface.
items.artifacts.driedrose$ghosthero.dialogue_caves_4=The creatures here are twisted, just like in the sewers.
items.artifacts.driedrose$ghosthero.dialogue_caves_5=Even the bats are bloodthirsty here.
items.artifacts.driedrose$ghosthero.dialogue_caves_6=No sign of any mining equipment, did the dwarves reclaim it all?
items.artifacts.driedrose$ghosthero.dialogue_city_1=The dwarves were industrious, but greedy.
items.artifacts.driedrose$ghosthero.dialogue_city_2=So the dwarven metropolis really has fallen.
items.artifacts.driedrose$ghosthero.dialogue_city_3=I hope the surface never ends up like this place.
items.artifacts.driedrose$ghosthero.dialogue_city_4=Dwarves aren't supposed to look so pale.
items.artifacts.driedrose$ghosthero.dialogue_city_5=I don't know what's worse, the dwarves, or their creations.
items.artifacts.driedrose$ghosthero.dialogue_city_6=It seems the dwarves are mindless monsters now as well.
items.artifacts.driedrose$ghosthero.dialogue_halls_1=What is this place?
items.artifacts.driedrose$ghosthero.dialogue_halls_2=This place is terrifying...
items.artifacts.driedrose$ghosthero.dialogue_halls_3=What were the dwarves thinking, toying with power like this?
items.artifacts.driedrose$ghosthero.dialogue_halls_4=The monsters here are otherworldly, where did they come from?
items.artifacts.driedrose$ghosthero.dialogue_halls_5=Can you feel it? It's like something is watching us.
items.artifacts.driedrose$ghosthero.dialogue_halls_6=Thank goodness there are torches, it's so dark here!

items.artifacts.driedrose$ghosthero.seen_crivuefruit_1=It seems that this is the culprit for the overgrowth of the forest...
items.artifacts.driedrose$ghosthero.seen_crivuefruit_2=We must kill this monster.
items.artifacts.driedrose$ghosthero.seen_crivuefruit_3=Your days of eating apples at every turn are over! The Fruit of Crivue!


items.artifacts.driedrose$ghosthero.seen_mimick_1=That must be the Mimic King. There is such a terrifying power under the ice prison.
items.artifacts.driedrose$ghosthero.seen_mimick_2=It seems that you have killed a lot of treasure monsters, and their "parents" are causing trouble for us.
items.artifacts.driedrose$ghosthero.seen_mimick_3=The King of Mimics, said to be the leader of the treasure box monsters. It is the only one that has a human form because of absorbing magic power for a long time.


items.artifacts.driedrose$ghosthero.seen_tengu_1=The one prisoner left is a deadly assassin. Of course...
items.artifacts.driedrose$ghosthero.seen_tengu_2=He's trapped us!
items.artifacts.driedrose$ghosthero.seen_tengu_3=I've heard horror stories about that mask...


items.artifacts.driedrose$ghosthero.seen_dm720_1=Is this the last weapon the dwarves had against the disaster?
items.artifacts.driedrose$ghosthero.seen_dm720_2=That is DM720, said to be a mass-produced experimental model of DM300. But the most threatening thing is the driver who has already lost his mind.
items.artifacts.driedrose$ghosthero.seen_dm720_3=Fortunately, the dwarves only mass-produced a few of these for experiments, and the only one has long forgotten its duty.


items.artifacts.driedrose$ghosthero.seen_dm300_1=Only dwarves would build a mining machine that kills intruders.
items.artifacts.driedrose$ghosthero.seen_dm300_2=That thing is huge...
items.artifacts.driedrose$ghosthero.seen_dm300_3=How has this thing stayed active for so long?


items.artifacts.driedrose$ghosthero.seen_girl_1=I feel a huge power from this girl. She must be the former Ice Princess.
items.artifacts.driedrose$ghosthero.seen_girl_2=The Ice Princess failed to purify this place and became a puppet instead.
items.artifacts.driedrose$ghosthero.seen_girl_3=She was in her prime, but she became a witch. This reminds me that I am no longer human.


items.artifacts.driedrose$ghosthero.seen_king_1=When people say power corrupts, this is what they mean.
items.artifacts.driedrose$ghosthero.seen_king_2=He's more of a lich than a king now.
items.artifacts.driedrose$ghosthero.seen_king_3=Even in death the dwarves obey their master.


items.artifacts.driedrose$ghosthero.seen_yog_1=Oh, this doesn't look good.
items.artifacts.driedrose$ghosthero.seen_yog_2=So that's what a god looks like?
items.artifacts.driedrose$ghosthero.seen_yog_3=This is going to hurt...


items.artifacts.driedrose$ghosthero.seen_doge_1=%s, run away, this is something from hell.
items.artifacts.driedrose$ghosthero.seen_doge_2=Oh no, this is a being more powerful than the Old God! %s, I will do my best to help.
items.artifacts.driedrose$ghosthero.seen_doge_3=The air around it is filled with the breath of death...


items.artifacts.driedrose$ghosthero.seen_frgirl_1=Is this the guardian of Snow Riven Valley?
items.artifacts.driedrose$ghosthero.seen_frgirl_2==I feel like she's really angry...
items.artifacts.driedrose$ghosthero.seen_frgirl_3=She is making the air strange...


items.artifacts.driedrose$ghosthero.defeated_by_enemy_1=Good luck...
items.artifacts.driedrose$ghosthero.defeated_by_enemy_2=Tired... for now...
items.artifacts.driedrose$ghosthero.defeated_by_enemy_3=I will return...
items.artifacts.driedrose$ghosthero.defeated_by_boss_1=I'm sorry... good luck...
items.artifacts.driedrose$ghosthero.defeated_by_boss_2=Finish it off... without me...
items.artifacts.driedrose$ghosthero.defeated_by_boss_3=No... I can't...
items.artifacts.driedrose$ghosthero.blessed_ankh_1=How did you survive that?
items.artifacts.driedrose$ghosthero.blessed_ankh_2=I wish I had one of those...
items.artifacts.driedrose$ghosthero.blessed_ankh_3=Oh my! You're still alive!
items.artifacts.driedrose$ghosthero.player_killed_1=No!...
items.artifacts.driedrose$ghosthero.player_killed_2=I couldn't help them...
items.artifacts.driedrose$ghosthero.player_killed_3=Not like this...


items.artifacts.driedrose$ghosthero.direct_prompt=What should I do?
items.artifacts.driedrose$ghosthero.directed_follow_1=Okay, I'll follow you.
items.artifacts.driedrose$ghosthero.directed_follow_2=I'll fall in behind you.
items.artifacts.driedrose$ghosthero.directed_follow_3=Following you...
items.artifacts.driedrose$ghosthero.directed_follow_4=Okay, let's go!
items.artifacts.driedrose$ghosthero.directed_follow_5=I've got your back.
items.artifacts.driedrose$ghosthero.directed_attack_1=Okay, I'll attack that one.
items.artifacts.driedrose$ghosthero.directed_attack_2=I'll get that one.
items.artifacts.driedrose$ghosthero.directed_attack_3=Engaging...
items.artifacts.driedrose$ghosthero.directed_attack_4=Let's get them!
items.artifacts.driedrose$ghosthero.directed_attack_5=I've got that one.
items.artifacts.driedrose$ghosthero.directed_position_1=Okay, I'll hold that position.
items.artifacts.driedrose$ghosthero.directed_position_2=I'll go there and defend.
items.artifacts.driedrose$ghosthero.directed_position_3=Repositioning...
items.artifacts.driedrose$ghosthero.directed_position_4=On my way!
items.artifacts.driedrose$ghosthero.directed_position_5=I'll head over there.


items.artifacts.driedrose$ghosthero.desc=A frail looking ethereal figure with a humanoid shape. Their power seems tied to the rose you have.\n\nThis ghost may not be much, they seem to be your only true friend down here.


##back to artifacts

