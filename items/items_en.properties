items.weapon.melee.endingblade.low_hp=Your health is not yet below 30%, so you cannot use it.


items.weapon.melee.washcrime.name=washcrime
items.weapon.melee.washcrime.desc=A huge sickle is tied to the end of the chain, and the {blood stains{ on it have rusted. \nHit has a chance to release |Unrested Dead Souls| to assist in the battle, and apply |Cripple| effect to the enemy. Weapon damage increases with the number of kills, but stops increasing after a certain threshold. \n\n_This weapon has an additional attack range but a very slow attack speed_


items.weapon.melee.washcrime$diedghost.name=The Unresting Ghost
items.weapon.melee.washcrime$diedghost.desc=The body has passed away, but the soul has not yet found rest. The mind obeys the will of the master until true death comes.


items.weapon.melee.bloodthirstythorn.name=Bloodthirstythorn
items.weapon.melee.bloodthirstythorn.desc=The thorn of the hanging tree left by blood corrosion. Abandoning the remaining order, leaving only rage and chaos. \n-When attacking, there is a chance to inflict {bleeding and fear{ effects on the enemy. \n-Features: The upgrade mechanism is the same as the blood-accumulating holy grail\n_This is a very accurate weapon_
items.weapon.melee.bloodthirstythorn.stats_desc=This plant no longer resists you, and has undergone some changes
items.weapon.melee.bloodthirstythorn.stats_descx=\n\nThis plant has grown to its limit, and may give back in some way.
items.weapon.melee.bloodthirstythorn.good=Your life essence has completely permeated us. In return for your loyalty, you will receive a {cursed but containing 1~3 level holy grail{ as compensation.


items.weapon.melee.bloodthirstythorn.ac_prick=Blood Thirstythorn
items.weapon.melee.bloodthirstythorn.yes=Yes, I know what I'm doing
items.weapon.melee.bloodthirstythorn.no=No, I changed my mind
items.weapon.melee.bloodthirstythorn.prick_warn=Each use of a Blood Rite consumes more Life Energy, and can easily kill you if you're not careful.\n\nAre you sure you want to give it more Life Energy?
items.weapon.melee.bloodthirstythorn.onprick=You prick your finger, and your life essence flows into this nightmarish thorn plant.
items.weapon.melee.bloodthirstythorn.ondeath=This nightmarish plant has drained the life essence from you...


items.weapon.melee.magictorch.name=Magic Torch
items.weapon.melee.magictorch.desc=Sizzle. Hiss... Hiss..., the blazing flames on the grey crystal seem to have no intention of extinguishing.\n-When it hits, it will definitely inflict burning on the target and give the holder a permanent lighting effect.\n_-This weapon cannot be used for sneak attacks_
items.weapon.melee.magictorch.mustload=You already have other light effects. The Magic Torch's effects will not take effect until those effects are canceled or deactivated.


items.weapon.melee.magictorch$magiclight.name=Magic Light
items.weapon.melee.magictorch$magiclight.desc=A permanent light source derived from a magic torch, providing 2/3 the range of normal light.






