items.kindofweapon.equip_cursed=Your grip involuntarily tightens around the weapon.
items.kindofweapon.swift_equip=You quickly equip your weapon.


items.kingscrown.name=Dwarf King's crown
items.kingscrown.ac_wear=WEAR
items.kingscrown.naked=Unfortunately, the crown cannot transform your underwear.
items.kingscrown.upgraded=The crown glows brightly and then disintegrates as your armor transforms!
items.kingscrown.ratgraded=Rat King's paws glow brightly as your armor transforms!
items.kingscrown.desc=The crown of the last dwarven king, it glows with tremendous magical energy.\n\nWhen worn, the crown's magic will flow into the armor you're currently wearing, transforming it into a _unique epic armor with special abilities._ The new armor will keep all the properties of the original armor.


items.liquidmetal.name=liquid metal
items.liquidmetal.ac_apply=APPLY
items.liquidmetal.prompt=Select a thrown weapon
items.liquidmetal.already_fixed=That thrown weapon is already in perfect condition!
items.liquidmetal.apply=You use %d liquid metal to repair your thrown weapon.
items.liquidmetal.desc=When poured over a thrown weapon, this magical liquid will fill into the cracks and tears from use, restoring the thrown weapon to perfect condition!\n\nA tier 1 weapon requires 10 liquid metal to be fully repaired, a tier 5 weapon requires 30. Each upgrade also doubles the amount of metal needed.\n\nLiquid metal cannot be used to repair the tips on tipped darts.


items.lostbackpack.name=lost backpack
items.lostbackpack.desc=This is your lost inventory. Collect it to reclaim all the items you lost!


items.merchantsbeacon.name=merchant's beacon
items.merchantsbeacon.ac_use=USE
items.merchantsbeacon.desc=This odd piece of dwarven technology allows you to communicate from great distances.\n\nAfter being activated, this beacon will let you sell items to Pixel Mart from anywhere in the dungeon.\n\nHowever, the magic within the beacon will only last for one session, so use it wisely.


items.stylus.name=arcane stylus
items.stylus.ac_inscribe=INSCRIBE
items.stylus.prompt=Select an armor
items.stylus.identify=You must identify that armor first.
items.stylus.cursed=The stylus's magic will not work on cursed armor.
items.stylus.inscribed=You inscribed your armor with the stylus.
items.stylus.desc=This arcane stylus is made of some dark, very hard stone. Using it you can inscribe a magical glyph on your armor, but you have no power over choosing what glyph it will be, the stylus will decide it for you.


items.tengusmask.name=Tengu's mask
items.tengusmask.ac_wear=WEAR
items.tengusmask.used=The mask disintegrates as its power flows into you!
items.tengusmask.desc=This mask fell off Tengu's face as he died, you can feel great magical power emanating from it. Was the mask Tengu's source of strength?\n\nWhen worn, the tremendous power of the mask will be transferred into you, enabling you to _choose a subclass for your hero._\n\nWhich subclass will you choose?


items.torch.name=torch
items.torch.ac_light=LIGHT
items.torch.lanterfireactive=When lit by a lantern, your torch is fed by the lantern, and you can add %1$s%% of the fuel provided by the torch by reloading.
items.torch.mustload=You already have other light effects. You cannot use torches until they are canceled or deactivated.
items.torch.desc=An adventuring staple, when a dungeon goes dark, a torch can help lead the way.
items.torch.youmustload=You must have a lantern equipped to load the torch in a lighting environment.
items.torch.youshield=You have explored deep into the dungeon, and torches can only provide you with 15 points of arcane shield energy.
items.torch.youshield2=You already have the Arcane Shield effect. You cannot use torches to add shields until the effect expires.
items.waterskin.name=waterskin
items.waterskin.ac_drink=DRINK
items.waterskin.collected=You collect the dewdrop into your waterskin.
items.waterskin.full=Your waterskin is full!
items.waterskin.empty=Your waterskin is empty!
items.waterskin.desc=A container for liquid, made from leather and string, sealed with a cork stopper.
items.waterskin.desc_water=Right now the waterskin just contains some plain drinking water. Surely there is something in the dungeon that the waterskin could store instead.
items.waterskin.desc_heal=The waterskin is currently being used to store healing water. The more full the waterskin is, the more you will be instantly healed when drinking from it. You will only drink as much as you need.
items.waterskin.desc_full=The full waterskin seems to radiate energy, perhaps it can be used to bless another survival item?


items.amulet.ascent_title=Crystal Will
items.amulet.ascent_desc=You begin to feel the powerful and terrifying power overflowing from the Crystal Will. Climbing up from the bottom of this dungeon to the surface with a mere mortal body will be much more difficult than you think! \n\nIf you continue to return upwards while holding the Crystal Heart, the dungeon will become more dangerous. Transmission between levels will be suppressed, and killing enemies along the way and returning to the surface will become your only way to survive! \n\nIf you have no intention of accepting such a challenge, you can leave the Crystal Heart here and return alone, or you can choose to use the amulet to end the game normally.
items.amulet.ascent_yes=It's not over yet!
items.amulet.ascent_no=You can stop here


items.amulet.xascent_title=The Lonely City Falls...
items.amulet.xascent_desc=After defeating YogZot, the lonely city is in danger and begins to collapse everywhere. Just when you think you are about to fall into the abyss, Naya grabs you...
items.amulet.xascent_yes=Return to the main city with her
items.amulet.xascent_no=Stay a little longer...


items.dlcitem.bossrushbloodgold.name=Blood Gold - [BossRush]
items.dlcitem.bossrushbloodgold.desc=Yes, this is the place where the monsters are lurking. It is full of dangers and crises. \n\nIf you want to go here, I will also provide you with some corresponding support on the way.
items.dlcitem.bossrushbloodgold.dlc_desc=Note: Cobalt coins cannot be obtained in BR mode\nThis DLC package contains three basic difficulties, which are as follows:\nA. Basic Image - Easy\n1. Normal values, BR standard gameplay\n2. Get _Global Damage Reduction 20%_ bonus, but cannot use the ability of _Legendary Book_\n\nB. Trial Image - Normal\n1. BR standard difficulty, compete with a large number of bosses\n2. BOSS Randomly obtain a _Mutation Entry_\n3. The terrain of the 7th and 14th floors changes, _Shadow_ and _Sky Mark_ appear\n\nC. Purgatory Image - Difficult\n1. Boss randomly obtains _Mutation + Elite_ double entries\n2. The terrain of the 7th and 14th floors changes, _Shadow_ and _Sky Mark_ appear\n\nEX. Nightmare Image - Nightmare (Content Expansion)\n1. Boss randomly obtains _Mutation + Elite_ double entries and _Immune to Fear_\n2. The terrain of the 7th and 14th floors changes, monsters are generated on the supply floor but the monsters will not respawn
items.dlcitem.bossrushbloodgold.ac_read=View the details of this add-on
items.dlcitem.bossrushbloodgold.rankings_desc=BR Space Investigator-Newcomer


items.dlcitem.rushmobscrollofrandom.name=Golden Butterfly Scroll-[RandMode]
items.dlcitem.rushmobscrollofrandom.desc=The magic of the Golden Butterfly Scroll is very powerful. You will use its power to conduct an in-depth investigation in this commission.\n\nMay you move forward bravely with the blessing of the Golden Butterfly!!!
items.dlcitem.rushmobscrollofrandom.dlc_desc=In this investigation, the power of the Golden Butterfly Scroll will affect you.\n\n1. Each level will add a _Transmutation Well_\n\n2. Near the entrance of each area, a mysterious NPC will join. She will evaluate your Golden Butterfly journey and give you corresponding rewards.\n\n3. Starting from the second level, the boss you encounter is no longer fixed, and any _Boss_ will appear. (But you won't get the _Final Boss_)\n\n4. The first floor adds _Those memory shops_, and the memory shops also sell _Root Bone Secret Medicine_ and _Muscle Memory Potion_\n\n5. All transmutable items can be transmuted. Talk to the mysterious NPC and use the new Golden Butterfly Transmutation Array\n\n6. _Artifacts/Rings/Accessories/Weapons/Staffs_ will get the effect of _Upgrade Scrolls_ when they are transmuted for the first time in each floor\n\n7. More _New Enemies_ are coming, and artifacts can be repeated!!!\n\nLet's transform together in the _Golden Butterfly Magic Scroll_ magic!
items.dlcitem.rushmobscrollofrandom.ac_read=Read more about this add-on
items.dlcitem.rushmobscrollofrandom.rankings_desc=A Journey of Randomness
items.dlcitem.rushmobscrollofrandom.recycled=The magic of the Golden Butterfly radiates from your backpack... You feel the world has changed in an instant...
items.dlcitem.rushmobscrollofrandom.mode=Rushmobscrollofrandom




items.wands.wandoffirebolt.name={Phosphorus Flame Staff{


items.weapon.melee.assassinsblade.typical_ability_desc=Melee can _Sneak_ while holding the Assassin's Blade. This ability allows Melee to instantly flash up to 3 blocks away, and typically grants Invisibility for _%d turns_.
items.weapon.melee.battleaxe.typical_ability_desc=Ainolina can use her battleaxe to perform a _Critical Attack_. This powerful attack usually deals _%1$d~%2$d damage_ and staggers the enemy for 5 turns, reducing their accuracy and evasion by 50%% if the enemy is ambushed. A critical hit always hits, but only deals normal damage if the enemy is not ambushed.


items.weapon.melee.dagger.upgrade_ability_stat_name=Weapon Duration
items.weapon.melee.crossbow.typical_ability_desc=Ainolina can _Charge_ her Crossbow. This weapon skill makes the next attack a guaranteed hit, and will trigger one of three effects depending on the situation: melee attacks will knock back enemies; unattended darts typically deal _%1$d extra damage_, while tagged darts will trigger the effect in a 7x7 area and typically increase the number of uses_.
items.weapon.melee.dirk.typical_ability_desc=Ainolina can _Sneak_ while holding the long dagger. This ability allows Ainolina to instantly flash up to 4 blocks away, and typically grants invisibility for _%d turns_.


items.weapon.melee.flail.typical_ability_desc=Ainolina can _swing_ her flail to build up power for a short period of time. Each time she swings, her flail typically deals _%d extra damage_, up to a maximum of 3 times. A swing of the flail is guaranteed to hit. Only the initial swing of the flail consumes 1 charge.


items.weapon.melee.glaive.typical_ability_desc=Ainolina uses the tip of the Guandao to stab back enemies within range but not adjacent to her, usually causing _%1$d~%2$d points of damage_, knocking the enemy back and guaranteeing a hit.


items.weapon.melee.gloves.typical_ability_desc=Inolina can perform a _Combo_ with her studded gloves. This attack is guaranteed to hit, and typically increases the damage of this attack by _%d points_ for every successful hit with melee or thrown weapons Inolina has made in the last 5 turns.


items.weapon.melee.greataxe.typical_ability_desc=When Enolina's health drops below 50%, she can use her greataxe to perform a _retaliatory_ attack. This devastating attack is guaranteed to hit, and typically deals _%1$d~%2$d damage_. If it kills an enemy, the attack does not take time.


items.weapon.melee.greatshield.typical_ability_desc=Ainolina can _protect_ herself with a giant square shield, which will usually completely block physical or magical attacks against her for _%d turns_. Once Ainolina has blocked an attack, any counterattack or spellcasting will end the protection.


items.weapon.melee.greatsword.typical_ability_desc=Inolina can _cleave_ her enemies with her greatsword. This typically deals _%1$d~%2$d damage_ and is guaranteed to hit. If the cleave kills an enemy, the attack does not consume time, and Inolina can use an additional cleave without consuming charges within 5 turns.
items.weapon.melee.handaxe.typical_ability_desc=Ainolina can use her handaxe to perform a _Critical Attack_. This powerful attack will typically deal _%1$d~%2$d damage_ and stagger for 5 turns if the enemy is ambushed, reducing their accuracy and evasion by 50%. The Critical Attack is guaranteed to hit, but will only deal normal damage if the enemy is not ambushed.


items.weapon.melee.katana.typical_ability_desc=Ainolina can use her katana to perform a _Lunge Thrust_ on enemies 1 block away. This attack will lunge at the enemy, typically dealing _%1$d~%2$d damage_, and is guaranteed to hit.


items.weapon.melee.longsword.typical_ability_desc=Inolina can _cleave_ her enemies with her longsword. This typically deals _%1$d~%2$d damage_ and is guaranteed to hit. If the cleave kills an enemy, the attack does not consume time, and Inolina can use an additional cleave without consuming charges within 5 turns.


items.weapon.melee.mace.typical_ability_desc=Ainolina can use her Mace to perform a _Critical Hit_. This powerful attack usually deals _%1$d~%2$d damage_ and staggers the enemy for 5 turns, reducing their accuracy and evasion by 50%% if the enemy is ambushed. The Critical Hit always hits, but only deals normal damage if the enemy is not ambushed.
items.weapon.melee.shortsword.typical_ability_desc=Ainolina can _cleave_ her enemies with her shortsword. This typically deals _%1$d~%2$d damage_ and is guaranteed to hit. If the cleave kills an enemy, the attack does not consume time, and Ainolina can use the cleave once more within 5 turns without consuming a charge.
items.weapon.melee.quarterstaff.typical_ability_desc=Ainolina can enter a _Defensive Stance_ with the Iron Head. Entering this stance takes no time, and typically triples her Dodge for _%d turns_.


items.weapon.melee.rapier.typical_ability_desc=Ainolina can use her rapier to perform a _Lunge Thrust_ on an enemy 1 block away. This attack will charge at the enemy, typically dealing _%1$d~%2$d damage_, and is guaranteed to hit.
items.weapon.melee.roundshield.typical_ability_desc=Ainolina can _protect_ herself with her round shield, which will normally completely block physical or magical attacks against her for _%d turns_. Once Ainolina has blocked an attack, further counterattacks or spellcasting will end the protection.
items.weapon.melee.runicblade.typical_ability_desc=Ainolina can use her Runic Blade to perform a _Rune Slash_. This attack is guaranteed to hit and typically has _+%d%% Enchanted Power_.
items.weapon.melee.sai.typical_ability_desc=Ainolina can perform a _Combo_ with her Vampire Knife. This attack is guaranteed to hit, and for every successful hit with melee or thrown weapons in the last 5 rounds, this attack's damage is typically _increased by %d points_.


items.weapon.melee.scimitar.typical_ability_desc=Ainolina can use her scimitar to enter _Sword Dance_. Entering this stance takes no time and grants Ainolina +60%% attack speed and +50%% accuracy for _%d turns_.
items.weapon.melee.sickle.typical_ability_desc=Ainolina can _Reap_ enemies with her short-handled sickle. This devastating blow is guaranteed to hit, and typically deals _%d damage_. If the enemy is not immune to bleeding, the damage dealt is converted into a bleeding effect of equal value.
items.weapon.melee.spear.typical_ability_desc=Ainolina stabs back enemies within range but not adjacent to her with the tip of her spear, dealing _%1$d~%2$d damage_, knocking the enemy back and guaranteeing a hit.


items.weapon.melee.sword.typical_ability_desc=Ainolina can _cleave_ her enemies with her one-handed sword. This typically deals _%1$d~%2$d damage_ and is guaranteed to hit. If the cleave kills an enemy, the attack does not consume time, and Ainolina can use the cleave once more within 5 turns without consuming a charge.


items.weapon.melee.warscythe.typical_ability_desc=Ainolina can use her War Scythe to _Reap_ enemies. This devastating blow is guaranteed to hit, and typically deals _%d damage_. If the enemy is not immune to Bleeding, the damage dealt is converted into a Bleeding effect of equal value.


items.weapon.melee.wornshortsword.typical_ability_desc=Ainolina can _cleave_ her enemies with her worn shortsword. This typically deals _%1$d~%2$d damage_ and is guaranteed to hit. If the cleave kills an enemy, Ainolina can use an additional cleave without cost within 5 turns.


items.weapon.melee.dagger.typical_ability_desc=Ainolina can _Sneak_ while holding a dagger. This ability allows Ainolina to instantly flash up to 5 blocks away, and typically grants invisibility for _%d turns_.
items.weapon.melee.gauntlet.typical_ability_desc=Inorina can _Combo_ with the Jade Grey Gauntlets. This attack is guaranteed to hit, and for every successful hit with melee or thrown weapons Inorina has made in the last 5 turns, this attack's damage is typically _increased by %d points_.




items.quest.dragonwater.name=Dragon Water
items.quest.dragonwater.desc=A drop of water dropped by a lava dragon before it died. The power from the ancient dragons can fill the water bag directly, or you can drink it directly for emergency treatment.\n\nDragon tears are extremely fragile, so they cannot be put in a backpack. You can either drink it directly or put it in a water bag.


#### Hollow

items.potions.potionofholywater.name=Potion of Holy Water
items.potions.potionofholywater.desc=Why is there holy water in the castle? This is a puzzle, but it can help you weaken the monsters in the castle. Just throw it out!
items.potions.potionofholywater.zombie_noreset=The resurrection power of the Zombie Golem has been purified by holy water. Now it cannot be resurrected!
items.potions.potionofholywater.hollow=The holy water purified the monster in the All Saints' Temple, but the curse in the monster was too strong to be purified and thus became a fatal blow!
items.potions.potionofholywater.vampire_reset=The vampire has ascended to heaven under the power of holy water...

