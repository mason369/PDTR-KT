items.quest.devitem.magicbook.name=Unfinished Stories
items.quest.devitem.magicbook.desc=There are quite a few unfinished stories noted above, some just beginning, some near the end. \nBased on the time stamps written on the pages, it seemed that every day someone added a few more strokes to these stories. \n On the end page of this book, there are a few words that have obviously just been written:\n _“All see here, wish me a happy birthday meow!!!”_ \n\nCarrying this item will give you a special effect when you act at night, valid from 5.14-5.21 every year (Gregorian Calendar)


items.quest.skinitem$skin_wa.name=Motion Moment
items.quest.skinitem$skin_wa.desc=One of Rei Zero's private clothes, light blue clothes symbolize my optimistic and cheerful character, and it must be very comfortable to use this set of clothes in the dungeon.


items.scrolls.extra.scrollofteletation.inv_title=Select the desired Transmutation-[Cursed & Upgraded]
items.scrolls.extra.scrollofteletation.name=Golden Butterfly Transmutation
items.scrolls.extra.scrollofteletation.desc=Looks very similar to a certain special mode of Gold Butterfly, but works the same way as a transmutation scroll, but transmutation upgrades and curses any item that is upgraded + cursed, what with the healing potion +1? \n\nLeaving tier 0 will dissipate automatically ......




items.spells.alchemize.refoge=You have successfully alchemized:
items.spells.alchemize.no_desc=<#7e7e7e>The Rhombus Crystal has lost its luster, and there is a mysterious force that prevents the alchemical energy from being received by it<RGB>\n\nThis should be caused by the interference of the BR Universe's <#7e7e7e>mysterious force<RGB> ......\n\n_in_BossRush_Mode Cannot be used in BossRush mode_


items.quest.skinitem$skin_ma.name=Exotic Wind Lady
items.quest.skinitem$skin_ma.desc=One of Jasmine's private clothes, the mysterious fashion gives a kind of elusive feeling, enchanting and sexy feeling is emanating in every place, even the monster saw may fall into a daze.


items.quest.skinitem$skin_ra.name=Bat's Row
items.quest.skinitem$skin_ra.desc=One of Ling Red's personal clothes, rumored to be a new dress for shaving her hair while still in the royal family. This dress is also her only royal dress.


items.quest.skinitem$skin_ha.name=Witchy Witch Encounter
items.quest.skinitem$skin_ha.desc=One of Mei's personal costumes, supposedly a costume played for the purpose of Cosplaying a certain character, thestaff with  paper streamers her hand makes it seem like she really does have witchy magic, but in fact, the secret weapon is her proudly enchanted bow.


items.quest.skinitem$skin_da.name=Unknown error
items.quest.skinitem$skin_da.desc=????? What's Up? One of Einorina's peculiar dresses is said to be called a “placeholder”.


items.quest.skinitem$skin_wb.name=Saye's Song
items.quest.skinitem$skin_wb.desc=Playing as “Sayaka Miki”,linked fashion.


items.quest.skinitem$skin_mb.name=Circle of Reasons
items.quest.skinitem$skin_mb.desc=Playing as Magical Girl “Madoka Kaname”,linked fashion.


items.quest.skinitem$skin_rb.name=Time Paradox
items.quest.skinitem$skin_rb.desc=Playing the role of Magical Girl “Homura Akemi”,linked fashion.


items.quest.skinitem$skin_hb.name=End of Knowledge
items.quest.skinitem$skin_hb.desc=Playing the role of Magical Girl “Mami Tomoe”,linked fashion.


items.quest.skinitem$skin_db.name=TrueEye Judgment
items.quest.skinitem$skin_db.desc=Playing as Magical Girl “Kyouko Sakura”,linked fashion.


###trinkets

items.trinkets.chaoticcenser.name=chaotic censer
items.trinkets.chaoticcenser.desc=After some time in the alchemy pot this incense-burning censer appears to be producing smoke all on its own! These gasses build up and will spew forth from the censer in random directions and semi-random intervals. It seems capable of producing all sorts of gasses, but the position they shoot out in seems to be more likely to be in your favour at least.
items.trinkets.chaoticcenser.typical_stats_desc=Typically this trinket will spawn a harmful gas nearby roughly every _%d_ turns. The gas is more likely to appear when enemies are present, and less likely to appear in enclosed spaces. At higher levels these gases are more likely to be exotic and powerful.
items.trinkets.chaoticcenser.stats_desc=At its current level, this trinket will spawn a harmful gas nearby roughly every _%d_ turns. The gas is more likely to appear when enemies are present, and less likely to appear in enclosed spaces. At higher levels these gases are more likely to be exotic and powerful.


items.trinkets.dimensionalsundial.name=dimensional sundial
items.trinkets.dimensionalsundial.warning=Your sundial isn't casting a shadow, you feel uneasy.
items.trinkets.dimensionalsundial.desc=This small handheld sundial is somehow able to cast a shadow in the depths of the dungeon, even if you aren't holding it upright. Even more strangely, the shadow's position seems to have no relation to the sun in this world. When no shadow is cast, the sundial seems to attract danger.
items.trinkets.dimensionalsundial.typical_stats_desc=Typically this trinket will reduce the spawning rate of enemies by _%1$d%%_ during the daytime in real life (8am-8pm), and increase the spawning rate of enemies by _%2$d%%_ at nighttime (8pm-8am).
items.trinkets.dimensionalsundial.stats_desc=At its current level, this trinket will reduce the spawning rate of enemies by _%1$d%%_ during the daytime in real life (8am-8pm), and increase the spawning rate of enemies by _%2$d%%_ at nighttime (8pm-8am).


items.trinkets.exoticcrystals.name=exotic crystals
items.trinkets.exoticcrystals.desc=These small pink crystals have the same shape as crystals of alchemical energy. While they can't be used for energy directly, they seem to be somehow influencing the potions and scrolls you find.
items.trinkets.exoticcrystals.typical_stats_desc=Typically this trinket will replace _%s%%_ of potion or scroll drops with their exotic equivalents. This does not affect potions of strength, scrolls of upgrade, or items that are generated to help solve hazard rooms.
items.trinkets.exoticcrystals.stats_desc=At its current level this trinket will replace _%s%%_ of potion or scroll drops with their exotic equivalents. This does not affect potions of strength, scrolls of upgrade, or items that are generated to help solve hazard rooms.


items.trinkets.eyeofnewt.name=eye of newt
items.trinkets.eyeofnewt.desc=This golden and black newt's eye is a common ingredient, now enhanced into a trinket. The eye seems to be reducing your vision in exchange for letting you see things in other ways.
items.trinkets.eyeofnewt.typical_stats_desc=Typically this trinket will reduce your vision range by _%1$s%%_, but will also grant you mind vision on enemies within _%2$d_ tiles.
items.trinkets.eyeofnewt.stats_desc=At its current level this trinket will reduce your vision range by _%1$s%%_, but will also grant you mind vision on enemies within _%2$d_ tiles.


items.trinkets.mimictooth.name=mimic tooth
items.trinkets.mimictooth.desc=This large sharp tooth must have been pulled from a very unhappy mimic. It seems to be influencing the mimics of the dungeon, making them more frequent and dangerous.
items.trinkets.mimictooth.typical_stats_desc=Typically this trinket will make all kinds of mimic _%1$sx_ more common and much more difficult to detect, but will also increase the amount of loot they drop. Each dungeon floor will also have a _%2$s%%_ chance to contain an extra stealthy ebony mimic.
items.trinkets.mimictooth.stats_desc=At its current level this trinket will make all kinds of mimic _%1$sx_ more common and much more difficult to detect, but will also increase the amount of loot they drop. Each dungeon floor will also have a _%2$s%%_ chance to contain an extra stealthy ebony mimic.


items.trinkets.mossyclump.name=mossy clump
items.trinkets.mossyclump.desc=This clump of wet moss seems to hold onto its moisture no matter how hard you squeeze it. It seems to be magically tied to the dungeon itself, making grass and water more likely to appear.
items.trinkets.mossyclump.typical_stats_desc=Typically this trinket will make _%d%%_ of regular floors become filled with either water or grass instead.\n\nThis trinket costs a very large amount of energy to upgrade.
items.trinkets.mossyclump.stats_desc=At its current level this trinket will make _%d%%_ of regular floors become filled with either water or grass instead.\n\nThis trinket costs a very large amount of energy to upgrade.


items.trinkets.parchmentscrap.name=parchment scrap
items.trinkets.parchmentscrap.desc=This little scrap of parchment looks like it came from a scroll. It has retained some of its magic, and it seems to be influencing weapons and armor found in the dungeon.
items.trinkets.parchmentscrap.typical_stats_desc=Typically this trinket will make enchantments and glyphs _%dx_ as common, and curses on weapons and armor _%sx_ as common. Curses on wands, rings, or artifacts are not affected.\n\nThis trinket costs a moderately large amount of energy to upgrade.
items.trinkets.parchmentscrap.stats_desc=At its current level this trinket will make enchantments and glyphs _%dx_ as common, and curses on weapons and armor _%sx_ as common. Curses on wands, rings, or artifacts are not affected.\n\nThis trinket costs a moderately large amount of energy to upgrade.


items.trinkets.petrifiedseed.name=petrified seed
items.trinkets.petrifiedseed.desc=This seed has been fossilised, either by slow geological processes or by magic. The seed seems to be magically influencing the flora of the dungeon, occasionally replacing plant seeds with runestones.
items.trinkets.petrifiedseed.typical_stats_desc=Typically this trinket will cause trampled grass to drop runestones instead of seeds _%1$s%%_ of the time, and will also cause high grass to drop items _%2$s%%_ more often.
items.trinkets.petrifiedseed.stats_desc=At its current level this trinket will cause trampled grass to drop runestones instead of seeds _%1$s%%_ of the time, and will also cause high grass to drop items _%2$s%%_ more often.


items.trinkets.ratskull.name=rat skull
items.trinkets.ratskull.desc=This macabre trinket isn't much larger than the skull of a normal rat, which is somehow a rarity down in this dungeon. The skull's magical influence seems to attract the more rare denizens of the dungeon, making them appear far more often.
items.trinkets.ratskull.typical_stats_desc=Typically this trinket will make rare exotic enemies _%dx_ as likely to appear. The skull is only half as effective at attracting crystal mimics and armored statues, however.
items.trinkets.ratskull.stats_desc=At its current level this trinket will make rare exotic enemies _%dx_ as likely to appear. The skull is only half as effective at attracting crystal mimics and armored statues, however.


items.trinkets.saltcube.name=salt cube
items.trinkets.saltcube.desc=This large salt crystal was cut into an almost perfect cube shape, and it somehow managed to drain half the water from the alchemy pot instead of dissolving. It seems to be magically dehydrating and preserving the food you eat, extending the satiety you get, but also lessening your health restoration when not starving.
items.trinkets.saltcube.typical_stats_desc=Typically this trinket will increase the amount of time before you grow hungry by _%1$s%%_, but will also reduce your rate of health regeneration by _%2$s%%_.
items.trinkets.saltcube.stats_desc=At its current level this trinket will increase the amount of time before you grow hungry by _%1$s%%_, but will also reduce your rate of health regeneration by _%2$s%%_.


items.trinkets.shardofoblivion.name=shard of oblivion
items.trinkets.shardofoblivion.desc=After stewing in the alchemy pot, this small shard of cursed metal has changed to be made of... nothing? Light seems to bend around it, and it hovers in place when you aren't holding it. The shard seems to be magically drawing power from your ignorance, so it's probably best to not think about it too much.
items.trinkets.shardofoblivion.typical_stats_desc=Typically this trinket will increase the rate that enemies drop loot by 20%% for each unidentified item you have equipped or recently used, to a max of _%d item(s)_. The shard will also prevent you from automatically identifying equipment, but can be used to manually identify items that are ready for it.
items.trinkets.shardofoblivion.stats_desc=At its current level this trinket will increase the rate that enemies drop loot by 20%% for each unidentified item you have equipped or recently used, to a max of _%d item(s)_. The shard will also prevent you from automatically identifying equipment, but can be used to manually identify items that are ready for it.
items.trinkets.shardofoblivion.ac_identify=IDENTIFY
items.trinkets.shardofoblivion.identify_prompt=Identify an Item
items.trinkets.shardofoblivion.identify_ready=An item is ready to identify: %s.
items.trinkets.shardofoblivion.identify_not_yet=That item isn't ready to be identified yet.
items.trinkets.shardofoblivion.identify=You identify the item!
items.trinkets.shardofoblivion$wandusetracker.name=Unidentified Wand Used
items.trinkets.shardofoblivion$wandusetracker.desc=You have recently used an unidentified wand, which counts as one piece of used unidentified equipment for the shard of oblivion for a little while.\n\nTurns remaining: %s


items.trinkets.thirteenleafclover.name=thirteen leaf clover
items.trinkets.thirteenleafclover.desc=Somehow stewing in the alchemy pot has caused this clover to grow a bunch of extra leaves! It's not really clear if this trinket is lucky or unlucky, perhaps this trinket will make your luck more chaotic?
items.trinkets.thirteenleafclover.typical_stats_desc=Normally when the hero deals damage, numbers closer to the average are more common. Typically this trinket has a _%d%%_ chance to invert this, making your attacks much more likely to deal the maximum or minimum damage instead.\n\nThis trinket costs relatively little energy to upgrade.
items.trinkets.thirteenleafclover.stats_desc=Normally when the hero deals damage, numbers closer to the average are more common. At its current level this trinket has a _%d%%_ chance to invert this, making your attacks much more likely to deal the maximum or minimum damage instead.\n\nThis trinket costs relatively little energy to upgrade.


items.trinkets.trapmechanism.name=trap mechanism
items.trinkets.trapmechanism.desc=The core mechanism of one of the dungeon's pitfall traps, carefully carved out of the floor so it can be carried. It seems to be magically tied to the dungeon itself, making terrain more hazardous for you and the dungeon's inhabitants.
items.trinkets.trapmechanism.typical_stats_desc=Typically this trinket will make _%d%%_ of regular floors become filled with either traps or chasms instead.\n\nThis trinket costs relatively little energy to upgrade.
items.trinkets.trapmechanism.stats_desc=At its current level this trinket will make _%d%%_ of regular floors become filled with either traps or chasms instead.\n\nThis trinket costs relatively little energy to upgrade.


items.trinkets.vialofblood.name=vial of blood
items.trinkets.vialofblood.desc=This thin vial contains the blood of some denizen of the dungeon, it moves slowly as you rotate the vial. It seems to be magically enhancing stronger healing effects, but also delaying them.
items.trinkets.vialofblood.typical_stats_desc=Typically this trinket will increase the overall health you gain from drinking potions of healing, waterskins, or wells of health by _%1$s%%_. However, these healing effects will also occur more slowly, regenerating a maximum of _%2$s_ HP per turn (this scales with hero level).
items.trinkets.vialofblood.stats_desc=At its current level this trinket will increase the overall health you gain from drinking potions of healing, waterskins, or wells of health by _%1$s%%_. However, these healing effects will also occur more slowly, regenerating a maximum of _%2$s_ HP per turn (this scales with hero level).


items.trinkets.wondrousresin.name=wondrous resin
items.trinkets.wondrousresin.desc=This shimmering blue resin appears to have the distilled essence of a cursed wand's magic. The magic from the alchemy pot has seemed to stabilize it somewhat, and it's now affecting your wands.
items.trinkets.wondrousresin.typical_stats_desc=Typically this trinket will force cursed wand effects to become neutral or positive _%1$s%%_ of the time, and will cause uncursed wands to fire an additional neutral or positive cursed zap _%2$s%%_ of the time.\n\nThis trinket costs a moderately large amount of energy to upgrade.
items.trinkets.wondrousresin.stats_desc=At its current level this trinket will force cursed wand effects to become neutral or positive _%1$s%%_ of the time, and will cause uncursed wands to fire an additional neutral or positive cursed zap _%2$s%%_ of the time.\n\nThis trinket costs a moderately large amount of energy to upgrade.


items.trinkets.trinketcatalyst.name=magical catalyst
items.trinkets.trinketcatalyst.window_text=The water begins to glow as you add the catalyst. There are a few nearby items you could imbue with energy to turn into a magical trinket.
items.trinkets.trinketcatalyst.desc=This ball of magical golden dust glimmers in the darkness of the dungeon. This catalyst can be used at an alchemy pot with a little alchemical energy to produce a unique trinket item.\n\nTrinkets provide various different effects that slightly alter the dungeon or its inhabitants. Trinkets can be upgraded with more energy to make their effect more powerful, or dropped to forego the effect entirely.
items.trinkets.trinketcatalyst$randomtrinket.name=random trinket
items.trinkets.trinketcatalyst$randomtrinket.desc=One nearby item is stuck inside a pouch that you can't get open.\n\nThe alchemy process will dissolve the pouch away, but you won't know what trinket you'll get until you do it!


items.trinkets.trinket$placeholder.name=trinket


###FD

items.quest.lingjing.name=Prism
items.quest.lingjing.desc=When the item is in the backpack and at full health, it will generate 25 shield points every 15 turns.\n\nOnly works before the maximum depth reaches 10 layers.


items.quest.smalllightheader.name=Smalllight Guide
items.quest.smalllightheader.desc=Good experiments lead to good results. This little creature born from the alchemical cauldron can find the entrance to the next level for its owner.
items.quest.smalllightheader.ac_summonfish=Summon Small Light
items.quest.smalllightheader.thanks=_-_ Design: Mercury Lamp\n\n_-_ Track: Alchemy Paradise\n\n_-_ Award: _Feiyan Award_--Second place in the track\n\n_-_ [Competition year: The first Jinghong Cup DIY Competition[




items.quest.clearcrystal.name=Faint Clearcrystal Fragment
items.quest.clearcrystal.desc=The fragment found in the sword tomb, you don't know what it is used for...


items.quest.clearhstal.name=Blue Pure Crystal Element
items.quest.clearhstal.desc=After the battle with the dragon, the previously dim fragments became brighter. Does this mean something?


items.quest.dragonheart.name=Dragonheart
items.quest.dragonheart.desc=The heart of a fire dragon, still a little hot to the touch. \n\nSome traces of corrosion can also be seen on it...


items.weapon.melee.dragonshiled.name=Dragonshiled
items.weapon.melee.dragonshiled.typical_stats_desc=This weapon can normally block 0~%d damage. Upgrading it can block more damage.
items.weapon.melee.dragonshiled.stats_desc=This weapon can block 0~%d damage. Upgrading it can increase the amount of damage blocked.
items.weapon.melee.dragonshiled.desc=A part of a dragon's scale. The temperature of the scale is still there. Fortunately, the back of the scale is not too hot. Maybe it can be used as a shield. When holding it, you feel a mysterious magic protecting you.

items.weapon.melee.thanks.grilledherring.name=Grilled Herring
items.weapon.melee.thanks.grilledherring.desc=Spicy, sizzling, and steaming. You're pretty sure this weapon isn't your average grilled herring, but it looks delicious.
items.weapon.melee.thanks.grilledherring.typical_stats_desc=You can eat this grilled herring _%d times_, each time restoring 50 satiety points. After the number of times is exhausted, it turns into fish bones.\n\nYou can only eat grilled herring that is _identified and not cursed_. }\nEach upgrade of the grilled herring will increase its number of times.}
items.weapon.melee.thanks.grilledherring.ac_eatfish=A Small Nibble
items.weapon.melee.thanks.grilledherring.eat_msg=This weapon smells so good that you can't help but take a bite. Although it can't fill your stomach, it can at least relieve your hunger...
items.weapon.melee.thanks.grilledherring.stats_desc=You finally failed to withstand the test of hunger. Fortunately, it was really delicious. Now it has become a fish bone. Although it is not as sharp as before, it can cause {50% of the damage value per attack{effect to the enemy. \n}If you upgrade it now, each upgrade of grilled herring will increase its consumption by 1.}


items.weapon.melee.thanks.grilledherring.thanks=_-_ Design: W\n\n_-_ Track: Tempered into Steel\n\n_-_ Award: _Jinghong Award_--First Place in Track\n\n_-_ [Competition Year: The First Jinghong Cup DIY Competition[


items.thanks.distresssignalnesting.name=Distress Signal Nesting
items.thanks.distresssignalnesting.desc=A sniper team of three legendary snipers is peddling these in the area. When you light up the crystals and fire a usable flare into the sky, they'll help you from the shadows. The appearance fee is the price of this small box.


items.thanks.flarebullet.name=Flare
items.thanks.flarebullet.desc=Send a flare. They will come immediately after seeing your distress signal.


items.thanks.distresssignalnesting.level_0=An oak box containing a magic crystal. Remember to light the crystal before setting off the signal flare, otherwise it will not count.
items.thanks.distresssignalnesting.level_1=Compared to the standard version, the crystal inside the wooden box has become more transparent, and the edge of the wooden box is inlaid with golden patterns.
items.thanks.distresssignalnesting.level_2=A finely carved mahogany box containing a red magic crystal nestled in velvet.
items.thanks.distresssignalnesting.level_3=A finely crafted crystal box, with a red magic crystal lying on velvet. On the back of the box lid is written the Platinum Collector's Edition special hidden package they offer.


############THANKS############



items.weapon.melee.seekingspear.name=Seeking Spear
items.weapon.melee.seekingspear.stats_desc=This weapon is extremely deadly, especially against unaware enemies.\nThis weapon has additional attack range. This weapon has a critical hit effect.
items.weapon.melee.seekingspear.desc=The red spear blade seems to be thirsting for blood, and when the spear body becomes restless, you are more certain of this.
items.weapon.melee.seekingspear.crit=Critical Hit

items.heap.grave=Hero's Gravestone
items.heap.rip=Rest in peace
bones.here_lies_nameless=Here lies the nameless %s.
bones.here_lies_named=Here lies %1$s
bones.pacifist=Remembered as a peaceful walker, who never killed a living being before his demise.
bones.rats=A respected rat exterminator who killed %d enemies before dying.
bones.crabs=A trained crab smasher who killed %d enemies before dying.
bones.undead=Represents fear among skeletons, killed %d enemies before dying.
bones.thieves=A crazed thief hunter who killed %d enemies before dying.
bones.bats=A Bat Strangler that killed %d enemies before dying.
bones.brutes=A Jackal Brutalist that killed %d enemies before dying.
bones.monks=Has extensive experience fighting Dwarven Monks, killing %d enemies before dying.
bones.golems=A dwarven destroyer of artifacts that killed %d enemies before dying.
bones.demons=A legendary Demon Hunter who killed %d enemies before falling.
bones.yog=Challenger of the Demon God, killed %d enemies before perishing.
bones.forgot_nukecole=Regrettably, in his desperate struggle against death, he forgot the magical bottle of Nuka-Cola given to him by the Red Dragon King.
bones.forgot_watersoul=Unfortunately, when he was struggling on the brink of life and death, he forgot to use the Water Soul Potion, which could have helped him to rely on its power to survive the test of death.
bones.forgot_waterskin=Unfortunately he forgot to remember the dew in his waterskin as he lay dying.
bones.forgot_potion=Unfortunately he forgot to take a potion of healing potion when he was dying.
bones.rest_in_peace=He left all his possessions behind in this world, and departed forever, hoping that another hero would not suffer his tragic fate.


items.food.pasty.fish_name=Steamed Fish with Lotus Leaf
items.food.pasty.fish_desc=Steamed sea bass wrapped in lotus leaves and magically preserved. In this year, there is a custom of leaving fish to be eaten, which means there will be surplus every year, so you decided not to eat the steamed fish all at once. \n\nHappy New Year!


items.food.pasty$fishleftover.name=The remaining fish
items.food.pasty$fishleftover.eat_msg=Tastes OK.
items.food.pasty$fishleftover.desc=Leftover fish from your previous meal. You can eat it at any time, and it will restore a small amount of your hunger.


items.food.pasty.qk_name=Qingming Fruit
items.food.pasty.qk_desc=The Qingming fruit oil is as green as jade, soft and sticky, and has a refreshing fragrance. It makes people want to eat it in one bite. It is hard to imagine that there is such a perfect food in the dungeon. \n\nQingming Festival is here. Pay tribute to the ancestors and be grateful. May their spirits rest in peace. It is a remembrance and a journey forward. May we welcome a better future with respect for the past. \n\n——"Qingming Festival"\n\n_Get Spiritual Vision + Arcane Shield after eating_


items.food.pasty$qingkong.name=Half a Qingming fruit
items.food.pasty$qingkong.eat_msg=It tastes okay.
items.food.pasty$qingkong.desc=The Qingming fruit you had last time, looks like you can eat it again. \n\nYou can eat it anytime, it will restore a small amount of your satiety. \n\n_Gain Clairvoyance + Arcane Shield after eating_

items.icecyanbluesquarecoin.name=Cobalt Coin
items.icecyanbluesquarecoin.desc=Issued by the order of the Frostfall Empire's Empress Leng, this special currency is called Ice Blue Square Coin. It is said that only the strong can own it. \n\nThis currency can be used in a variety of special trading occasions and is the basic currency for the continuous operation of the funds of the three giants on the surface.
items.icecyanbluesquarecoin.no=NOTE: While in Developer or Special Mode, Cobalt Coins will not be added to your storage.


items.kinggold.name=Time and Space Gold Ticket
items.kinggold.desc=This is a golden card, printed from very thin soft metal, with a smooth feel. On one side is Ron's head portrait, and on the other side is the logo of the Chamber of Commerce. In this time and space, gold coins are no longer the best friend of merchants, but if you have this kind of gold voucher, they are still willing to provide you with some help, provided that you can find these "cute" cards. \n\nIt can be used to exchange some useful items in stores in different time and space. In a sense, this thing is much more precious than gold coins. \n\nIt is covered with the breath of some merchant lord Ron and the turbid flame witch Lianna, perhaps this is why merchants are willing to accept it. \n\nExchange ratio: 50 gold coins = 1 gold voucher, 5 stacked items of the same type = 1 gold voucher
items.kinggold.ling=This time you received %d gold coupons

items.books.questbookslist.hollowcitybook.quest_start_prompt=Hello, welcome to my castle. Do you think you can be invincible if you defeat Him? But not, because the things in this world are much more complicated than you think. If you want to give it a try, please come to my castle.
items.books.questbookslist.hollowcitybook.enter_yes=Accept invitation
items.books.questbookslist.hollowcitybook.enter_no=I'll think about it


items.weapon.melee.legend.moondao.name=Moon Blade
items.weapon.melee.legend.moondao.desc=These crescent-shaped double knives can be swung at an incredibly fast speed. Once they hit a vital point, the victim will surely die.
items.weapon.melee.legend.moondao.stats_info=This weapon is more effective when used on sneak attacks, and has a 100% chance of chilling the target on a successful sneak attack. This is a fast pair of weapons, and this weapon has the Parry enchantment when attacking.
items.weapon.melee.legend.moondao.ability_name=Arcane Shield Double Blade
items.weapon.melee.legend.moondao.ability_desc=When Inorina's health is below 80%, she can use her Moon Blades to perform an _Arcane Shield Dual Blade_ attack. This attack is guaranteed to hit, deals +40% damage, and Inorina gains _10 Arcane Shield_.


items.weapon.melee.legend.ricesword.name=RiceSword
items.weapon.melee.legend.ricesword.desc=You can smell the aroma of sticky rice from this great sword. The attribute growth of this sword changes according to your hunger. This weapon has an additional attack distance.


items.weapon.melee.whiteblastsword.name=Whiteblastsword
items.weapon.melee.whiteblastsword.desc=The sword shines with cold light and has a pure jade heart. You can feel the determination and hope in it.
items.weapon.melee.whiteblastsword.action_name=Whiteblast·Judgment
items.weapon.melee.whiteblastsword.quest_start_prompt=Deal physical damage equal to 120%% of your attack power to the target centered on you and stun all enemies around you for 8 turns, then poison all enemies around you with %s layers of poison.
items.weapon.melee.whiteblastsword.open_attack=Release Skill
items.weapon.melee.whiteblastsword.not=Not released yet


items.weapon.melee.whiteblastsword.roll1=My lamp will cleanse evil!
items.weapon.melee.whiteblastsword.roll2=My sword will split the tides!
items.weapon.melee.whiteblastsword.roll3=My heart will judge.




items.weapon.melee.legend.saiplus.name=Sai Plus
items.weapon.melee.legend.saiplus.desc=You can faintly sense the murderous aura emanating from this dagger, as terrifying as the god of death.
items.weapon.melee.legend.saiplus.success=%s's sneak attack successfully restored health!
items.weapon.melee.legend.saiplus.stats_info=This weapon causes higher damage when sneaking, and has a chance to restore health when sneaking successfully. It has a chance to trigger the Death enchantment to instantly kill enemies with low health.


items.weapon.melee.legend.goldlonggun.name=Gold Longgun
items.weapon.melee.legend.goldlonggun.desc=A weapon that only those favored by Tyche can find, granting its wielder an unparalleled blessing.\n\nThis weapon has an additional attack range.
items.weapon.melee.legend.goldlonggun.ability_name=Golden Piercing
items.weapon.melee.legend.goldlonggun.ability_desc=Ainolina can use the Golden Longgun to hit an enemy with Golden Pierce. Golden Pierce will hit the enemy for sure, and will inflict Vulnerability for 2 rounds, and will deal double damage to enemies with hard skin. If you kill the enemy this time, you will get a certain amount of gold coins as a reward!
items.weapon.melee.legend.goldlonggun.gold=Gold Piercing allows you to kill an enemy, and you gain %d gold.
items.weapon.melee.legend.goldlonggun.ability_target_range=The target is too far away...


items.books.questbookslist.hollowcitybook.name="Unsigned" invitation
items.books.questbookslist.hollowcitybook.desc=Everyone, I sincerely invite you to my castle for a carnival feast.
items.books.questbookslist.hollowcitybook.ac_read=Read


items.weapon.melee.icedewvialsword.name=Dew Vialsword - Ice
items.weapon.melee.icedewvialsword.desc=WIP


items.quest.randomchest.name=Supply Chest
items.quest.randomchest.desc=It's hard to tell what's inside. You'll know after you open it.
items.quest.randomchest.ac_kitem=Let’s bet!
items.quest.randomchest.look_msg=You have opened a supply chest.


items.quest.blessingnecklace.name=Blessing Necklace
items.quest.blessingnecklace.desc=There is no time to make it, so I will just give you a blessing cross.




items.quest.red.name=White Rose
items.quest.red.desc=In this dangerous and gloomy dungeon, this white rose seems to pierce through the surrounding darkness, showing you the power called "humanity".
items.quest.red.ac_interlevel_tp=Return to Main Depth


items.potions.potionofpurity$potionofpurityling.name=Poison Gas Neutralizing Potion
items.potions.potionofpurity$potionofpurityling.desc=You suddenly realized that a group of earlier adventurers had been here. Unfortunately, they did not survive. \n\nThis bottle of poison gas neutralizing potion was made by other adventurers from the essence of jungle plants. It can neutralize the dangerous poison gas in the deepest part of the jungle. \n\nI hope you can inherit the spirit and will of other adventurers and eradicate the cancer of the jungle!


items.quest.devitem.crystalling.name=Crystal Necklace
items.quest.devitem.crystalling.desc=Under this purple necklace hangs a piece of blue-purple colored glass. When light passes through the crystal, the center of the crystal seems to light up. \n\nAccording to historical records, Yi Ling used the Holy Heart to create the world. After dividing half of its power among the three messengers, he asked them to cast the other half into the Crystal Heart. \n\nThe Holy Heart does not have a physical body in the conventional sense. Although no one has ever seen the Crystal Heart, people still copied this necklace according to the legendary appearance. \n\nThey made this crystal necklace on Yi Ling's birthday to seek the blessing of the God of Creation. At least they are also seeking their own future in their own way. \n\nYou know that this crystal can't bring you anything, but when you hold this crystal, you still feel much more at ease. \n\n_You can feel the breath of Mio on it. Carrying this necklace can make your wounds heal faster. _


items.quest.devitem.crystalling.active=\n\nThis is the birthday item of Ling, the main developer of the MLPD production team\n\nEffective bonus time: 8.22-8.25 (Lunar calendar)
items.quest.devitem.crystalling.end=\n\nDeveloper Ling's birthday event has ended, and all additional bonuses of this item are invalid.
items.quest.devitem.crystalling.last=\n\nToday is the last day the Crystal Necklace is valid. Don't miss this opportunity.


items.quest.redwhiterose.name="A carrier"
items.quest.redwhiterose.desc=They never left, and these two bouquets of roses are not worthy of them. \n\nEmotions need no carrier, and wills need no proof. \n\nAnd you never gave up.


items.weapon.melee.fiveren.name=Five-Ren Mooncake
items.weapon.melee.fiveren.stats_desc=This is a very slow weapon. \nThis weapon has extra attack range. \nThis weapon has a chance to corrupt the enemy.
items.weapon.melee.fiveren.desc=Happy Mid-Autumn Festival to all players. \n\nMooncakes have a long history in ancient times. In fact, the original prototype of mooncakes was called "bingbai". \nJia Gongyan: "Wine is used to make cakes, and now it is glue cakes." Most records of eating mooncakes during the Mid-Autumn Festival can be found in the Ming and Qing Dynasties. \nTian Rucheng of the Ming Dynasty said in "Xiyou Tour Zhiyu": "August 15 is called Mid-Autumn Festival. People give mooncakes as a gift to express reunion." Because the ancients called Mid-Autumn Festival "Reunion Festival", mooncakes are also called "Reunion Cakes". \nDuring the Ming and Qing Dynasties, the custom of eating mooncakes during the Mid-Autumn Festival was quite popular. Fu Cha Dunchong of the Qing Dynasty said in "Yanjing Sui Shi Ji": "Mid-Autumn mooncakes, those in Zhimeizhai in the front door are the best in the capital, and they are not enough to eat in other places. As for mooncakes, they are available everywhere. The big ones are more than one foot long, with the shape of the moon palace toad and rabbit painted on them. Some people eat them after the sacrifice, and some keep them until New Year's Eve to eat them. They are called reunion cakes." In addition to being an essential food for the Mid-Autumn Festival, mooncakes are also a holiday gift for relatives and friends. \n\nWith the passage of time, mooncakes have gradually changed from being handmade at home to a professional production, with increasing varieties and improving quality. In the Ming and Qing dynasties, they had developed into a traditional pastry form.

items.weapon.melee.legend.legendweapon.typical_stats_desc=This is a _%1$s tier_ legendary weapon. The skill of this legendary weapon usually deals: %2$s\nThis skill usually deals _%3$s~%4$s damage_.
items.weapon.melee.legend.legendweapon.stats_desc=This is a _%1$s tier_ legendary weapon. The skill of this legendary weapon is: %2$s\nThis skill can currently cause _%3$s~%4$s damage_.


items.weapon.melee.legend.diedcrossbow.name=Heavy Crossbow
items.weapon.melee.legend.diedcrossbow.desc=This is a very sophisticated device that can fire several small dart-like arrows at a very high speed. This heavy crossbow is very heavy, and if the user is not strong enough, the device may malfunction and affect themselves. It is also quite deadly in itself and can be very useful in hand-to-hand combat.
items.weapon.melee.legend.diedcrossbow.king_desc=_Tactical Fan-Shaped Explosive Crossbow_\n\nWhen fully charged, you can fire the explosive crossbow. You need to reload after firing, and you can reduce the reload time by upgrading. \n\nAt the end of the shot or when encountering a hostile target, it will immediately explode and deal area damage. The crossbow needs to be reloaded after each explosion. The crossbow damage will scale with its level. \n\nThis weapon will greatly increase the damage of darts when equipped. It can even grant its own enchantments to the darts it fires.
items.weapon.melee.legend.diedcrossbow.ac_king=Tactical Fan-Shaped Explosive Crossbow
items.weapon.melee.legend.diedcrossbow.no_cooldown=The Crossbow is reloading. Please wait...
items.weapon.melee.legend.diedcrossbow.no_equip=The Heavy Ballista must be equipped to use this.
items.weapon.melee.legend.diedcrossbow.ondeath=You were blown to pieces by the explosive crossbow...


items.weapon.melee.sdbsword.name=Diamond Great Sword
items.weapon.melee.sdbsword.desc=A strange sword made of diamonds. Now that it has been given enough energy, it has returned to its peak.\nThe sword body still retains the magic of the Diamond Treasure King, so it has an inexplicable affinity with other magic. Compared with other weapons, this weapon will increase more damage as the level increases.\nThis weapon has an extremely slow attack speed, but it is extremely accurate.\nThis weapon has returned to its peak and can emit sword energy. (This weapon is not yet completed, do not use it)


items.quest.sakafishsketon.name=Sakaban Turtle Skeleton
items.quest.sakafishsketon.desc=This poor creature has been here for many years, and its body is already broken. It seems that it just wants to return to the ground to take a look..., this item seems to be very attractive to merchants. \n\nAfter returning from the ancient ruins, you feel that this bone seems to have life, but it seems to be missing something. This little life seems to need water. After all, water is the source of life.


items.quest.sakafishsketon.saka=Reborn?
items.quest.sakafishsketon.wnd_body=This little life is trying to break out of its bones. You just need to give it a healing potion to help it.
items.quest.sakafishsketon.wnd_set=Give Help
items.quest.sakafishsketon.wnd_return=Not given yet


items.quest.sakafishsketon.you_must_potion=You must carry at least one healing potion in your inventory to proceed.


items.quest.sakafishsketon.saka2=Silence again?
items.quest.sakafishsketon.wnd2_body=Are you sure you want to put the Sakaban turtle baby to sleep again? You will gain some supplies, but will be on a long cooldown.
items.quest.sakafishsketon.wnd2_set=Execute immediately
items.quest.sakafishsketon.wnd2_return=My hand slipped


items.quest.sakafishsketon.ac_summonfish=Awaken
items.quest.sakafishsketon.ac_summonfishdied=Sleep
items.quest.sakafishsketon.you_active=You inject the essence of the healing potion into the bones, and you feel the fish bones are emitting a dark yellow glow...
items.quest.sakafishsketon.pets_died=The baby Sakafishsketon is becoming more and more transparent..., but you find it holding a stone in its mouth before it disappears.
items.quest.sakafishsketon$cooldownstonerecharge.name=Regenerative Cooldown
items.quest.sakafishsketon$cooldownstonerecharge.desc=Since you have just put the Sakaban Turtle Baby to sleep, it will take some time for the Sakaban Turtle Baby to gather strength again.\n\nRemaining charging time: %s turns.
items.quest.sakafishsketon.charged=Your Sakafish Sketon has been charged!




items.food.redcrab.name=Cooked Crab
items.food.redcrab.desc=This is a fully cooked crab. Judging from its color, it should be very delicious. This is a gift from the girl to you. Eating it can restore a lot of hunger.


items.food.sakameat.name=Sakaban Turtle Loin
items.food.sakameat.desc=Oh... well, it turns out this ancient creature is edible after all.
items.food.sakameat.oks=You ate the Sakameat Turtle Fillet, and you felt a stream of blessing flowing into your body!


items.wands.wandofanmy.name=Symbiosis Staff
items.wands.wandofanmy.desc=This staff is driven by mysterious energy. When the energy is sufficient, it will make the monsters in the dungeon submit to you (except the Boss). \n\nThis staff cannot be automatically upgraded or discarded, and will dissipate when the mysterious energy dissipates...
items.wands.wandofanmy.stats_desc=This staff can shoot out mind control waves, which do not cause any damage, but can instantly control a monster to become an ally.
items.wands.wandofanmy.error=Cannot affect Boss.


items.wands.wandofanmy$allytorestart.name=Symbiotic Thinking
items.wands.wandofanmy$allytorestart.desc=Cooperation may be a better way to resolve the issue. Perhaps we shouldn't be enemies with humans...
items.wands.wandofanmy$allytorestartok.name=Symbiotic Thinking


items.books.questbookslist.dimandbook.name=Book of Snowy
items.books.questbookslist.dimandbook.action=You have accepted the challenge of an unknown foe... Good luck!
items.books.questbookslist.dimandbook.desc=You... killed... my offspring... do you... dare to... fight me? \n\nYou sense an ominous power in this book. Make sure you are fully prepared before you challenge it.
items.books.questbookslist.dimandbook.fuck_desc=You have defeated my sons several times, and now you want to fight for the victory. I admire your courage and strength, and I want to test your ability myself. \n\nYou can go to the sacred battlefield and start a knight's fight for honor. In the arena, the strength will be determined to determine the true strong. \n\nIf you accept the challenge, we will create a legendary battle. I await your arrival.


items.books.questbookslist.hollowcitybook.author
items.books.questbookslist.dimandbook.author


items.books.questbookslist.dimandbook.ac_read=Accept the Challenge
items.books.questbookslist.dimandbook.action_s=It seems that his will to fight you has been reduced a lot... Your Book of Snow Ying has also been destroyed. \n\nTo challenge the unknown enemy, you must read this book before the 10th floor is generated!


items.books.bookslist.testbooks.name=Test Books
items.books.bookslist.testbooks.desc=Reading this book will grant you permanent invincibility. Reading it again will cancel the invincibility.
items.books.bookslist.testbooks.ac_read=Read
items.books.bookslist.testbooks.author=Author: Ling
items.books.bookslist.testbooks.godmode_on=God Mode is on!
items.books.bookslist.testbooks.godmode_off=God Mode is off!




items.quest.mime$gold_one.name=Crescent Moon Gem
items.quest.mime$gold_one.desc=An item from another world, shaped like a crescent moon with a gem in the middle. Although it cannot produce its original function in this world, its precious value is enough to make the merchant's eyes light up.


items.quest.mime$gold_two.name=Emerald
items.quest.mime$gold_two.desc=Gemstones can often store energy, and this one is no exception. You can get a certain amount of gold coins by selling it to a merchant, but it may be useful to carry it with you for other purposes. \n\n_When carrying this item, the player will immediately become invisible when the health drops below 20%. _


items.quest.mime$gold_three.name=Unknown Dust
items.quest.mime$gold_three.desc=This item is not from this world. The flow of sand seems to drag time. It looks ordinary but actually has a high collection value. It can be sold to merchants in exchange for a certain amount of gold coins. \n\n_When carrying this item, the player's movement speed increases by 20%. _


items.quest.mime$gold_four.name=Blue Seal
items.quest.mime$gold_four.desc=This item does not belong to this timeline, and it emits strange energy. The blue inscription seems to record something, but it is impossible to verify. It should be exchanged for a certain amount of gold coins from the merchant.


items.quest.mime$gold_five.name=Heart of the Creator
items.quest.mime$gold_five.desc=In order to commemorate the Creator, people carved this artifact. Today, no one makes this artifact anymore, and no one remembers it anymore. This may be the only authentic one in existence. You can feel the power of the Creator still remaining on it. You can get a good price if you sell it to a merchant, but if you carry it in your backpack, you may get the blessing of the Creator. \n\n_When carrying this item, the player's healing effect is doubled, and when the health is less than 1/4, the player will be invincible for several rounds and enter the Creator's Wrath state. (This item always takes precedence over the cross)_


items.weapon.melee.lifetreesword.name="Upside-down Tree of Life"
items.weapon.melee.lifetreesword.desc=When the Fruit of Cleves is broken, the surrounding vines entangle the exposed seeds to form a sword shape. When the sword touches a creature, it will absorb their life force and provide it to the seed, hoping that it will bear scarlet fruit again. \n\nThis is a relatively accurate weapon. \n\nSpecial note: Fruit of Cleves Boss exclusive weapon, every kill _75 monsters_ can use special weapon skills and reset the kill count. \n\nKill points:
items.weapon.melee.lifetreesword.ac_summon=Summon Blue Vines
items.weapon.melee.lifetreesword$placeholder.error=Note: The Upside-Down Life Tree must be unequipped to participate in alchemy
items.weapon.melee.lifetreesword$crivusfruitsfriend$1.crivusfruitslasher_title=Do you want to destroy this blue vine?
items.weapon.melee.lifetreesword$crivusfruitsfriend$1.crivusfruitslasher_body=Once you destroy the vines, it will die instantly, but will return 70 kill points to you.
items.weapon.melee.lifetreesword$crivusfruitsfriend$1.crivusfruitslasher_confirm=Yes, I am sure!
items.weapon.melee.lifetreesword$crivusfruitsfriend$1.crivusfruitslasher_cancel=No, I changed my mind.
items.weapon.melee.lifetreesword.not_chare=Not enough kill points to use the weapon's special move.
items.weapon.melee.lifetreesword$crivusfruitsfriend.name=Crivus Fruits
items.weapon.melee.lifetreesword$crivusfruitsfriend.desc=This must be the seedling of the Crivusfruit that caused you so much trouble. It seems that it regards you as its parent. It will help you destroy all the bad things.
items.weapon.melee.lifetreesword.badlocation=Cannot place vines on walls, cracks, or meaningless tiles!
items.weapon.melee.lifetreesword.nolongrange=Cannot summon vines because the location to summon them is too far away.
items.wands.wand.summon=Select the location to summon


items.food.crivusfruitsfood.name=Crivus Fruits
items.food.crivusfruitsfood.desc=Fruits dropped from the "upside-down tree of life", taste slightly bloody.
items.food.crivusfruitsfood.eat_msg2=You feel it tastes very good, sweet and delicious, with an endless aftertaste...


items.quest.crivusfruitsflake.name=Crivusfruitsflake
items.quest.crivusfruitsflake.desc=When the Crivus Fruit is broken, it explodes into pieces, but it probably looks inedible. \n\nThe item itself has no practical use, but the long-term absorption of magic power has given it a mysterious power, perhaps it can brighten the eyes of merchants. It can also be used for alchemy to make some good things. At the very least, it can provide considerable alchemical energy.


items.weapon.melee.legend.kingaxe.name=King's Peace
items.weapon.melee.legend.kingaxe.stats_desc=This is a relatively accurate weapon.
items.weapon.melee.legend.kingaxe.desc=The weapon used by Thorin when he was alive, the axe blade is soaked with deep red blood. He was a soldier, a warrior, a hero, but there were times when he was desperate. You seem to have established a connection with this weapon, maybe you are also fellow travelers in a sense. \n\nEach attack accumulates points. After the points reach 5, the next attack changes to regular + spell damage and the user gains the void status effect for 5 rounds (spell damage is 25% of the total damage)\n\nCurrent attack points:
items.weapon.melee.legend.kingaxe$armornofear.name=Nothing
items.weapon.melee.legend.kingaxe$armornofear.desc=The power of nothingness envelops you. In the state of nothingness, you gain 30%%% damage reduction.\n\nRemaining effect duration: %s turns

items.wands.hightwand.wandofhighthunderstorm.name=Wand of Highthunderstorm
items.wands.hightwand.wandofhighthunderstorm.staff_name=Wand of Highthunderstorm
items.wands.hightwand.wandofhighthunderstorm.ondeath=You killed yourself with your Wand of Highthunderstorm...
items.wands.hightwand.wandofhighthunderstorm.desc=This wand is made of mysterious crystal, thunder staff and some alchemical reaction materials. It is inlaid with purple gems on the top, and arcs of electricity are jumping between the two inward-curved tines on the top.
items.wands.hightwand.wandofhighthunderstorm.stats_desc=This staff shoots an extremely powerful arc of electricity at whatever it is aimed at, creating a mist of water nearby, dealing _%1$d~%2$d damage_. The lightning can jump between multiple nearby targets, is more powerful in water, and can add a chain reaction of lightning to the user. If you get too close, you may also be shocked, but not your companions.
items.wands.hightwand.wandofhighthunderstorm.bmage_desc=When a Battle Mage attacks a target in melee combat with Wand of Highthunderstorm, he has a chance to unleash an arc of lightning to attack nearby targets as if he had the Shock enchantment, and gains additional Arcane Shield.
items.wands.hightwand.wandofhighthunderstorm.eleblast_desc=The Wand of Highthunderstorm's elemental storm deals 15% damage, stuns the target for 8 turns, and electrifies water.


items.wands.hightwand.wandofbluefuck.name=Wand of Bluefuck
items.wands.hightwand.wandofbluefuck.staff_name=Wand of Bluefuck
items.wands.hightwand.wandofbluefuck.desc=This staff is made of pine wood and adorned with purple gems, giving it a rather stately appearance. Its tip crackles and hisses, eager to unleash its powerful magic.
items.wands.hightwand.wandofbluefuck.stats_desc=This wand creates a powerful cone of phosphorous flame when used. The next time it is used it will consume _%1$d charges_ and deal _%2$d~%3$d damage_. The more charges the wand consumes, the greater or more powerful its range and power.
items.wands.hightwand.wandofbluefuck.bmage_desc=When a Battlemage attacks a target in melee combat with a Wand of Bluefuck, there is a chance that the target will be set on fire as if the target was enchanted with Bluefuck.


items.wands.wandofgodice.name=Winter Spirit Frost Staff
items.wands.wandofgodice.staff_name=Staff of Godice
items.wands.wandofgodice.desc=This staff has a bright golden gem on the top of its azure-colored stem.\n\nIt can emit a freezing shock wave, creating a blizzard at the target point. All targets within this range will have their movement and attack speeds reduced.\n\nIf there is a water block under the blizzard, it will freeze immediately for _%s turns_. If you encounter an elite or leader enemy, an electric shock effect will be generated at the target point after the blizzard is generated.


items.wands.wandofgodice.normal_desc=This staff has a bright golden gem on the top of its azure-colored stem.\n\nIt can emit a freezing shock wave, creating a blizzard at the target point. The movement and attack speed of all targets within this range will be reduced.\n\nIf there is a water block under the blizzard, normally, the creatures on it will be frozen immediately for _%s turns_. If you encounter an elite or leader enemy, an electric shock effect will be generated at the target point after the blizzard is generated.
items.wands.wandofgodice.stats_desc=This staff deals _%1$d~%2$d damage_.
items.wands.wandofgodice.bmage_desc=When a Battle Mage attacks a target with the Wand of Godice in melee combat, there is a chance that the Luck enchantment will be triggered.
items.wands.wandofgodice.eleblast_desc=The Wand of Godice's elemental storm deals 100% damage, unleashing a blizzard and extinguishing fires.




items.wands.hightwand.wandofvenom.name=Venom-Infected Wand
items.wands.hightwand.wandofvenom.staff_name=Wand of Venom
items.wands.hightwand.wandofvenom.desc=This staff is carved from venom wood, with a bright green gem protruding from its top.
items.wands.hightwand.wandofvenom.stats_desc=This staff fires a ball that explodes into a crimson mist at the target location, releasing a highly corrosive gas. Any unit that enters the crimson mist will continue to take damage starting at _%1$d points_ and accumulate toxins. When the cumulative damage taken by the same unit reaches _%2$d_, it will continue to be blinded in the mist. When it reaches _%3$d_, it will continue to be paralyzed in the mist.\n\n Taking a healing potion or a comprehensive purification mixture can clear the accumulated toxins.\n\nEnemies that are strong enough will clear all accumulated toxins after leaving the mist.
items.wands.hightwand.wandofvenom.bmage_desc=When a Battle Mage uses the Wand of Venom to attack a target in melee combat, it will act like it has the Chaos enchantment and has a certain charge effect.


items.wands.wandofsun.name = Wand of the Sun
items.wands.wandofsun.ac_dismiss = Dispel Mini Sun
items.wands.wandofsun.dissun = Mini Sun is not selected!
items.wands.wandofsun.solid = You can't summon a mini sun in that location
items.wands.wandofsun.staff_name = Wand of Sun
items.wands.wandofsun.stats_desc=This staff summons a mini sun at the target location. The mini sun reveals a 7*7 radius around it, and deals _%1$d~%2$d damage_ to nearby enemies. \n\nEnemy within a mini sun will receive additional damage from other mini suns. \n\nThe damage dealt by the mini sun decreases as it is farther away from the enemy.
items.wands.wandofsun.bmage_desc=When a Battlemage melee attacks a target with a Wandofsun Staff, it increases the duration of all existing Mini-Suns by one turn.
items.wands.wandofsun.hassun = You dispelled the mini sun
items.wands.wandofsun$minisun.desc = \n\nThere is a mini sun standing at this location, which will last for %d turns\n\n{Due to a technical problem in the dungeon's basement, the sun cannot be saved. It will disappear after leaving the dungeon}
items.wands.wandofsun.desc = The first person who tried to bring the sun underground didn't realize that the dead and demons weren't that scared of the fake sun.
items.wands.wandofsun.thanks=_-_ Design: Cai Yulu\n\n_-_ Track: Magic Moment\n\n_-_ Award: _Jinghong Award_--First Place in Track\n\n_-_ [Competition Year: The First Jinghong Cup DIY Competition[




###MLPD

items.lightblack.oilpotion.name= oil bottle
items.lightblack.oilpotion.desc=This contains the substance the lantern needs. It can always be refilled and make the lantern glow again before it goes out.
items.lightblack.oilpotion.ac_refill=Refill




items.lightblack.oillantern.name = Lantern
items.lightblack.oillantern.desc = This lantern made of hardened glass is an indispensable item in the dark dungeons. \n\nEven in the darkest dungeons, this simple lantern can light your way, as long as you have an oil bottle to keep it lit. \n\nWhen you are lonely, it is the best place to stay by your side. \n\nCurrently filled with _%1$s_ spare oil bottles and _%2$s_ torch-converted lantern wicks, which can replenish the oil in the lantern to keep it bright. \n\nTorch recharge depends on the floor exploration progress and the number of challenges counted: \n\nYour current deepest exploration is: _%3$s_ floors, \n\nCurrent torch supported recharge: _%4$s%%_ (minimum 10%% recharge guaranteed).
