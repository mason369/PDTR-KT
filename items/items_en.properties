items.artifacts.wraithamulet.must_nocursed=You must cleanse the amulet of its curse before you can use its abilities.
items.artifacts.wraithamulet.drink_cursed=Just as you were about to drink the potion, the cursed dark gold gem amulet emitted an invisible barrier that prevented you from drinking the potion.


items.artifacts.wraithamulet$wraithrecharge.ondeath=The amulet has drained away your soul...
items.artifacts.wraithamulet$wraithrecharge.cursed=I will let your soul stay here forever...
