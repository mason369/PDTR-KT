items.bags.bookbag.desc=This is a dusty leather book bag that can hold a lot of books.
items.bags.lingbag.name=Lingbag Pocket
items.bags.lingbag.desc=Carry some special items
items.bags.herbbag.name=Herb Bag
items.bags.herbbag.desc=A small bag to carry your food.


items.bags.kingbag.name=Kingbag Backpack
items.bags.kingbag.desc=A large backpack specially designed for storing melee weapons/armor, made with the long-lost mysterious magic of the Frostfall Empire.
items.bags.propbag.name = Prop Bag
items.bags.propbag.desc = A small bag for storing accessories


items.weapon.melee.runicblade.name=runic blade
items.weapon.melee.runicblade.stats_desc=This weapon benefits more from upgrades.
items.weapon.melee.runicblade.cooldown=The Sage's Sword is recharging its mana. Its melee damage will be increased while it's recharging.\nThe Sage's Sword will be fully recharged in %s turns.
items.weapon.melee.runicblade.ac_zap=Release
items.weapon.melee.runicblade.fizzles=Your Melee Runic Blade fizzles; there must not be enough power.
items.weapon.melee.runicblade.no_magic=Your melee runicblade sizzles; you can no longer cast spells while immune to magic.
items.weapon.melee.runicblade.prompt=Select target
items.weapon.melee.runicblade.no_equip=You need to have the Melee Blade equipped to cast spells.
items.weapon.melee.runicblade.desc=A mysterious weapon from a distant land, with a bright blue blade.


items.weapon.melee.locksword.name=Melee Locksword
items.weapon.melee.locksword.desc=A lost sword from a mysterious country, shaped like a giant key. It is said that this sword can gain more experience by absorbing keys, and may also be used as a prop in some special places to consume a certain amount of energy to open some entrances, I don't know if it is true. \n\nNote: When there are multiple return key swords in the backpack, the key that absorbs the magic power will be the first return key sword picked up;\nIf you are not sure about the order, please make sure there is only one return key sword before absorbing it, otherwise you will take your own consequences. \n\nCurrent experience value:
items.weapon.melee.locksword.stats_desc=This weapon will accumulate experience as you pick up keys. When it reaches a certain stage, it will change its appearance, grant or strengthen the effects of the Chaos enchantment, and increase fixed damage.
items.weapon.melee.locksword.ac_interlevel_tp=Ancient Relics
items.weapon.melee.locksword.go_interlevel=Beyond Exploration
items.weapon.melee.locksword.go_desc=There seem to be several symbols on the Melee Keysword. You can choose one of them. \n\nYou have chosen the A symbol. An ancient ruin is mapped in your mind. Do you really want to go there? \n\nYou can go at any time, but if the Melee Keysword has no energy, it will become useless after you arrive.
items.weapon.melee.locksword.okay=Go explore
items.weapon.melee.locksword.cancel=Forget it


items.weapon.melee.locksword.ability_name=Melee at the Door
items.weapon.melee.locksword.ability_desc=Inorina can use the Keyblade of Regression to perform a _Wise Door Attack_. This attack is guaranteed to hit, and deals +40% damage and triggers a Chaos enchantment, and Inorina gains _40 turns of Universal Lockpicking_, during which time she can directly unlock Crystal Doors and Iron Doors, requiring 5 Charges.




items.weapon.melee.boomsword.name=Bombsword
items.weapon.melee.boomsword.desc=This magical dagger is combined with a bomb...\n\nI have a dagger, I have a bomb, ah~\n_"Bomb Dagger"_
items.weapon.melee.boomsword.stats_desc=This weapon will accumulate energy when killing enemies. After accumulating a certain amount of energy, it will immediately launch a random harmful bomb in the visible range (cannot pass through walls). By upgrading this weapon, the energy requirement can be reduced, and it may also launch more powerful bombs.


items.weapon.melee.dairikyan.name=Melee Dairikyan Battle Axe
items.weapon.melee.dairikyan.stats_desc=This pair of weapons is fast.
items.weapon.melee.dairikyan.desc=A pair of sturdy, powerful axes of equal size, allowing for faster chopping.


items.weapon.melee.redbloodmoon.name=Red Blood Moon Sword
items.weapon.melee.redbloodmoon.desc=You feel some strange hissing sounds inside this sword\nAccording to ancient records, this is most likely the Red Devil Blazing Sword! \nThis sword can summon Red Devil Guards, who are famous for burning everything! \n\nSummon up to 2 Red Devil Guards per level, and you can unlock powerful powers after training the weapon\n\nYou can only summon it when it is equipped in the hero's weapon slot. Removing the weapon will immediately kill all summoned units!


items.weapon.melee.redbloodmoon$redmagicdied.name=Blood Moon Torch Red Magic Died
items.weapon.melee.redbloodmoon$redmagicdied.desc=These half-appearing puppets were once the guards of the Crystal City. Because of your persistence, they now fight alongside you. \nNow you are their new master, and they will defend you to the death! \n\nDue to the unstable nature of the phantom, each successful attack will cause a certain amount of life deduction.


###armor curses

items.armor.curses.antientropy.name=%s of anti-entropy
items.armor.curses.antientropy.desc=Anti-Entropy Curses go against the laws of the universe, transferring heat energy from the attacker to the wearer. This causes the attacker to be frozen for a short period of time, and the wearer to burn.


items.armor.curses.bulk.name=%s of bulk
items.armor.curses.bulk.desc=Armor of bulk looks larger and more imposing, but doesn't actually have enhanced defense. Even worse, the added size makes moving through doorways very difficult.


items.armor.curses.corrosion.name=%s of corrosion
items.armor.curses.corrosion.desc=Armor of corrosion is capable of bursting with corrosive fluid, coating everything in the area with sticky acidic ooze.


items.armor.curses.displacement.name=%s of displacement
items.armor.curses.displacement.desc=The curse of displacement attempts to move the wearer to safety when they are attacked. It is a bit too effective however, randomly teleporting the user around the level.


items.armor.curses.metabolism.name=%s of metabolism
items.armor.curses.metabolism.desc=The metabolism curse directly converts satiety into health when the wearer is injured, providing a boost of healing, but quickly causing starvation.


items.armor.curses.multiplicity.name=%s of multiplicity
items.armor.curses.multiplicity.desc=Armor cursed with multiplicity contains dangerous duplication magic. It will sometimes create a mirror image of the wearer, but is equally likely to duplicate the attacker!


items.armor.curses.overgrowth.name=%s of overgrowth
items.armor.curses.overgrowth.desc=Armor of overgrowth is covered in various blooming plants. While this effect certainly looks interesting, it does nothing for defense, and these plants will randomly activate in combat!


items.armor.curses.stench.name=%s of stench
items.armor.curses.stench.desc=Armor cursed with stench will release clouds of noxious gas, which is hazardous to everything caught in the cloud.




###glyphs

items.armor.glyphs.affection.name=%s of affection
items.armor.glyphs.affection.desc=This powerful glyph manipulates the mind of attackers, charming them temporarily.


items.armor.glyphs.antimagic.name=%s of anti-magic
items.armor.glyphs.antimagic.desc=This powerful glyph allows armor to defend its wearer against magical attacks as well as physical ones. This magical defence is not affected by the armor's tier.


items.armor.glyphs.brimstone.name=%s of brimstone
items.armor.glyphs.brimstone.desc=This glyph shields the wearer and their belongings from fire, completely nullifying its damage and negative effects.


items.armor.glyphs.camouflage.name=%s of camouflage
items.armor.glyphs.camouflage.desc=This glyph allows the wearer to blend into tall grass, granting them temporary invisibility.


items.armor.glyphs.entanglement.name=%s of entanglement
items.armor.glyphs.entanglement.desc=This glyph grows earthen armor around the wearer to absorb damage, but this armor will break if the wearer moves.


items.armor.glyphs.flow.name=%s of flow
items.armor.glyphs.flow.desc=This glyph manipulates the flow of water around the wearer, making them much faster when moving through it.


items.armor.glyphs.obfuscation.name=%s of obfuscation
items.armor.glyphs.obfuscation.desc=This glyph obscures the wearer, making them more difficult to detect.


items.armor.glyphs.potential.name=%s of potential
items.armor.glyphs.potential.rankings_desc=Killed by: glyph of potential
items.armor.glyphs.potential.desc=This glyph builds energy when struck, granting charge to the wearer's wand when it activates.


items.armor.glyphs.repulsion.name=%s of repulsion
items.armor.glyphs.repulsion.desc=This glyph rebounds force against attackers, sending them flying back.


items.armor.glyphs.stone.name=%s of stone
items.armor.glyphs.stone.desc=This glyph surrounds the armor with heavy magical stone that makes dodging impossible, but blocks damage in proportion with evasion.


items.armor.glyphs.swiftness.name=%s of swiftness
items.armor.glyphs.swiftness.desc=This glyph enhances the speed of the wearer whenever they aren't near to an enemy.


items.armor.glyphs.thorns.name=%s of thorns
items.armor.glyphs.thorns.desc=This powerful glyph harms attackers, causing them to slowly bleed when they attack the wearer.


items.armor.glyphs.viscosity.name=%s of viscosity
items.armor.glyphs.viscosity.deferred=deferred %d
