items.food.alldrink.name=All-Healing Drink
items.food.alldrink.eat_msg=You feel like you are back to full health.
items.food.alldrink.desc=This all-purpose healing drink is made by recollecting three healing potions using a special technique. \nThe user will be healed for a period of time and will be full.


items.scrolls.scrollofflamecursed.name=Scroll of Flame Nightmare
items.scrolls.scrollofflamecursed.desc=The Scroll of Flame Nightmares can produce extremely dangerous frostfire, causing fatal damage to any visible enemy.\n\nSince this scroll has a unique mark, it does not need to be identified.
