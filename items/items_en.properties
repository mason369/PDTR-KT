items.potions.elixirs.elixirofnukecole.desc=Nukaku-Cola is a great buy. Everyone says it's good! \n\nAfter drinking it, you gain healing + Judgment of Phosphorus + Speed + a little satiety + Arcane Shield.


items.books.bookslist.indexbooks.name=Dungeon Explorer's Guide 3rd Edition
items.books.bookslist.indexbooks.desc=If this is your first time playing the pixel dungeon of Mo Ling, this guide may be able to help you. \n\nJust do it!!!
items.books.bookslist.indexbooks.author=--Author:_JDSA-Ling_
items.books.bookslist.indexbooks.ac_read=Open and read


items.books.books.your_character=You have triggered a Heroic Elite Blessing effect and cannot read other legendary books for the time being. (Lights Out and BR Simple Mode also count as Heroic Elite Blessing)


items.books.bookslist.yellowsunbooks.name=《History of the Rising Sun Cult - Dr. BloodMoon Chronicle 326 Year Volume 2》
items.books.bookslist.yellowsunbooks.desc=The author of this book pledged his loyalty to the leader of the original surface forces, the Rising Sun Cult, with his blood and life, and promised that he would never deceive.\n\n…But after the incident 300 years ago, the Rising Sun Cult gradually declined due to poor management and disappeared from then on. Its original status and reputation were divided between the Abyss Demon City and the Polar Holy Land.\n\nThe managers of the two sides sealed the deepest entrance of the dungeon together, and suppressed her crystal power. In the 17th year of Dr. BloodMoon, she was sealed in the Golden City Crystal Laboratory.\n\n…More than 300 years have passed since the sealing day. As her power increased, the crystal has become extremely unstable…\n\n…In mid-April of the 326th year of Dr. BloodMoon, a remnant of the Rising Sun Cult requested to meet with the manager…and claimed that the Rising Sun Cult could help them kill her completely…
items.books.bookslist.yellowsunbooks.author=--Author: Kiley-Alien
items.books.bookslist.yellowsunbooks.ac_read=Read books
items.books.bookslist.yellowsunbooks.blees=You read books and feel a surge of power!
items.books.bookslist.yellowsunbooks.anmazing=You decipher the mysteries in the books, and you comprehend the power of the enemy!


items.books.bookslist.icecitybooks.name=《Travels in the Ice Sanctuary》
items.books.bookslist.icecitybooks.desc=This is a large city located in the former ice zone. It seems that the danger of severe cold has been driven away, and I am standing here now. \nIt is now managed by "a mysterious person". \n\nThe people here live a leisurely life, and it seems that they welcome work with an attitude of enjoyment. In the winter, when it snows at the end of December, the residents will hold a large-scale festival to celebrate. \n\nIt seems that everyone has forgotten what happened three hundred years ago...
items.books.bookslist.icecitybooks.author=--Author: LunRes
items.books.bookslist.icecitybooks.ac_read=Read books
items.books.bookslist.icecitybooks.blees=You read books and feel a surge of power!
items.books.bookslist.icecitybooks.anmazing=You decipher the mysteries in the books, and you realize the power of flames!


items.books.bookslist.deepbloodbooks.name=《Chronicles of the Deepblood Demon City》
items.books.bookslist.deepbloodbooks.desc=This biography is for reference only and may contain a lot of personal thoughts. \n\n... A girl came to the Magic City and successfully revived the Magic City. ... Three days later, the Dungeon Investigation Team sent a report about the strong flow of magic power deep in the dungeon. \n\nDungeon Level ? ? ?: \nMagic Strength: DEAD\nMeasures Taken: None\nDanger Assessment: DEAD NOBACK\n... The above assessment report is for reference only.
items.books.bookslist.deepbloodbooks.author=--Author: Dr. Blood Moon
items.books.bookslist.deepbloodbooks.ac_read=Read books
items.books.bookslist.deepbloodbooks.blees=You read books and feel a surge of power!
items.books.bookslist.deepbloodbooks.anmazing=You decipher the mysteries in the books, and you realize the power of searching for enemies!


items.books.bookslist.grasskingbooks.name=《Green Forest Sacred Land Rules》
items.books.bookslist.grasskingbooks.desc=1. No matter it is a natural disaster or a man-made disaster, please do not be afraid. We have enough strength to protect you. \n\n2. Residents please do not approach the Forest Courtyard, which is the meeting room of the highest level of surface forces\n\n……5. Please take the newborn baby to the Source Spring for baptism to gain magic power. \n\n……7. Foreign travelers or immigrants please consciously ignore all the arrogance, arrogance, coldness, ruthlessness, selfishness, and inequality you think. Everything that happens here is normal. Don't try to make changes and learn to integrate with us. \n\n8. Please wait for the supplement of the 13th high-level meeting for other regulations.
items.books.bookslist.grasskingbooks.author=--Author: Mudan Luohua
items.books.bookslist.grasskingbooks.ac_read=Reading books
items.books.bookslist.grasskingbooks.blees=You read books and feel a surge of power!
items.books.bookslist.grasskingbooks.anmazing=You decipher the mysteries in the books, and you realize the power of fearlessness!


items.books.bookslist.brokenbooks.name=《Strange File Bag》
items.books.bookslist.brokenbooks.desc=It was stained with water and dirt, and the bright red words "Fire Case" and the form marked with the investigators seemed to have faded a bit. \n\nSurvivor: "The fire ravaged this dungeon and devoured everything that could be devoured... including humans. This can only be caused by magic!"\n\n...Our investigation results are indeed true. The charred floor, the remaining pages of the scroll, and the melted glass medicine bottle basically ruled out the possibility of negligent fire. \n\n...Team α searched for a molten metal armband, which seemed to have retained fire magic.
items.books.bookslist.brokenbooks.author=--Author: Unknown
items.books.bookslist.brokenbooks.ac_read=Read books
items.books.bookslist.brokenbooks.blees=You read books and feel a surge of power!
items.books.bookslist.brokenbooks.anmazing=You decipher the mysteries in the books, and you realize the power of heroes!


items.books.bookslist.magicgirlbooks.name=《Witch's Notes with Gold Border》
items.books.bookslist.magicgirlbooks.desc=(The first few pages seem to be torn off)... It was the third day after the fire, and I opened the window as usual. \n\nThe miasma-like magic power poured into the room, there was no way... I couldn't fight it...\n\nBefore I was completely swallowed up by this magic power, before it took over my body, I had to prepare something to fight it...\n\nHatred, conspiracy, plan, disaster is coming. (The handwriting of the last few words seemed to have changed to that of another person)
items.books.bookslist.magicgirlbooks.author=--Author: Rin
items.books.bookslist.magicgirlbooks.ac_read=Read books
items.books.bookslist.magicgirlbooks.blees=You read books and feel a surge of power!
items.books.bookslist.magicgirlbooks.anmazing=You decipher the mysteries in the books, and you realize the power of God's blessing!


items.books.bookslist.nokingmobbooks.name=《Investigation of the Mutation》
items.books.bookslist.nokingmobbooks.desc=Recently, I have always felt a force surging from underground. I was ordered to go underground to investigate. \n\nUnexpectedly, I found something surprising this time. \n\nMice can talk, there are more new unknown creatures, and some highly intelligent monsters. It seems that everything has nothing to do with the fire. \n\nWho is behind all this? Who is the real culprit of the change? \n\nI will continue to investigate until I find the answer.
items.books.bookslist.nokingmobbooks.author=--Author:Demain-Pixel
items.books.bookslist.nokingmobbooks.ac_read=Read books
items.books.bookslist.nokingmobbooks.blees=You read books and feel a surge of power!
items.books.bookslist.nokingmobbooks.anmazing=You deciphered the mysteries in the book, and you realized the power of ghost phosphorus!


