items.weapon.melee.icefishsword.name=Cold Imperial Sword
items.weapon.melee.icefishsword.desc=Mysterious fish of unknown origin.\n\nCauses frostbite and bleeding effects to visible enemies, but seems to have a fishy effect.
items.weapon.melee.icefishsword.cook=%sAfter being ravaged by the cold, it has once again turned back into the icy Imperial Sword...


items.weapon.melee.firefishsword.name=Cooked Imperial Sword
items.weapon.melee.firefishsword.desc=Mysterious fish of unknown origin.\n\nCauses burning and hallucination effects on visible enemies. Smells delicious.
items.weapon.melee.firefishsword.resetling=%s has been cooked by the flames, but it seems a little fuzzy... but the blade looks sharper.


