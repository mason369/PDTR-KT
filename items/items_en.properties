items.scrolls.scrollofflamecursed.one=This scroll produces a dazzling phantom blue light and %s ignites!
items.scrolls.scrollofflamecursed.many=This scroll creates a blinding blue light and monsters are set on fire!
items.scrolls.scrollofflamecursed.null=Scroll of Flame Nightmare


items.potions.exotic.potionofholyfuror.name=Flask of Holy Furor
items.potions.exotic.potionofholyfuror.desc=Divine energy concentrated into liquid form, this potion grants you blessings for a longer period of time.


items.weapon.melee.magicbluesword.name=Sword of the Sage
items.weapon.melee.magicbluesword.stats_desc=This weapon gains more damage from upgrades.
items.weapon.melee.magicbluesword.desc=A mysterious weapon from the Lost Lands, with a bright blue blade.


items.wands.wandofscale.name=Wand of Extreme Wind Fear
items.wands.wandofscale.staff_name=Staff of Stormwind
items.wands.wandofscale.desc=This staff has a purple stem topped with a bright black gem.
items.wands.wandofscale.stats_desc=This staff can emit fear waves, which will frighten nearby enemies. It can also generate a storm that will disable all surrounding traps and turn the ground into water. \nIt will cause _%1$d~%2$d damage_.
items.wands.wandofscale.bmage_desc=When a Battle Mage attacks a target with the Wand of Scale in melee combat, there is a chance that the target will bleed.
items.wands.wandofscale.eleblast_desc=The eleblast of the Storm Wand.


items.quest.goldbao.name=Golden Treasure
items.quest.goldbao.desc=The item guarded by the Diamond Chest King is said to be the merchant's favorite product. \n\nNo matter what, the treasure is now in your hands and you have defeated the Diamond Chest King. \nTip: The bid amount may be different from the actual amount, because the merchant may change his mind at any time.


items.weapon.melee.skyshield.name=Kite Shield
items.weapon.melee.skyshield.typical_stats_desc=This weapon can usually block 0~%d damage. Upgrading it can block more damage.
items.weapon.melee.skyshield.stats_desc=This weapon can block 0~%d damage. Upgrading it can increase the amount of damage it blocks.
items.weapon.melee.skyshield.desc=This is a product of the "Frostfall Empire", developed and supervised by the "Frostfall Queen" herself.


items.weapon.melee.greensword.name=Jungle Stinger
items.weapon.melee.greensword.desc=A natural product from the "Maple Forest"\n\nIt absorbs the essence of heaven and earth\n\nIt can summon powerful jungle guards when attacking people


items.weapon.pistol.name=The Emperor's Pistol
items.weapon.pistol.ac_shoot=Shoot
items.weapon.pistol.ac_reload=Reload
items.weapon.pistol.reloading=You reloaded your pistol.
items.weapon.pistol.prompt=Select a target.
items.weapon.pistol.stats=Each shot deals _%1$d-%2$d_ points of damage, and bullets can pass through plants and doors. After each _%3$d/%4$d_ shot, you need _%5$s_ turns to reload. Its accuracy does not change with distance.
items.weapon.pistol.desc=The Emperor's new pistol, so rarely discovered because it doesn't exist.
items.weapon.pistol.no_ring=Due to the complex mechanics of this weapon, it does not benefit from the Ring of Fury or Ring of Deadeye, nor does it gain damage increased by your Strength.


items.weapon.melee.icesan.name=Ice San
items.weapon.melee.icesan.desc=Right now, it is the _time of freezing_! \nIgnorant humans, your future has long since disappeared! \nThis is the _text_ you see on this fan. How powerful is this divine fan? \nYou don't know, but you know that this thing must not be an ordinary thing!


items.weapon.missiles.klin.name=Boomerang (Exclusive version for Elaine Meier)
items.weapon.missiles.klin.desc=After being thrown at an enemy, this flat, curved wooden missile automatically returns to the thrower.
items.weapon.missiles.klin.durability=This boomerang is made very sturdily and will not wear out after use.


items.weapon.melee.blackdog.name=Black Dog Paw
items.weapon.melee.blackdog.desc=Look at me grabbing like crazy!


items.potions.potionofnowater.name=Quicklime Solid Ideal Reagent
items.potions.potionofnowater.desc=Reacts with water to remove water. Can completely react with water in a 2x2 area in 8 directions to remove it. \nThe reaction is an extremely ideal complete reaction, which cannot be understood by common sense. \n\n_Disadvantages_ _Generates a lot of heat_, enough to ignite the surroundings_, and has a _blinding effect_ when thrown on the face of creatures. \nPachuli proposed the formula, made in China. \n}Source code from: Gu Ming Ji Jue Dungeon}


items.superdewvial.name=Fluorescent Dew Vial
items.superdewvial.desc=This fluorescent dewvial can hold 200 dew drops.\nIts maximum capacity is _200_ dew drops.\nCan bless the cross ten times! Good stuff!
