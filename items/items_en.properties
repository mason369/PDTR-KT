items.kindofmisc.unequip_message=You must unequip one of these items first. Select an item to swap with.
items.kindofweapon.which_equip_msg=Which weapon slot do you want to equip this weapon to? \n\nThe Combat Master can only use the main-hand weapon for normal attacks, but both the main-hand and off-hand weapons can perform martial arts. The recharge of the main-hand and off-hand weapons is independent of each other. \n\nThe Combat Master can also switch between the main-hand and off-hand weapons instantly.
items.kindofweapon.which_equip_primary=Main hand (%s)
items.kindofweapon.which_equip_secondary=Deputy (%s)
