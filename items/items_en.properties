items.artifacts.goldiron.name=Gold Iron Hammer (Unfinished)
items.artifacts.goldiron.ac_stonegold=stonegold
items.artifacts.goldiron.ac_onedingyi=onedingyi
items.artifacts.goldiron.ac_condontxa=condontxa
items.artifacts.goldiron.desc=This was once the hammer of a troll blacksmith, and it contains magical power. \n\nBecause you accidentally lost the troll pickaxe, the troll commissioned you to kill his dark side. \n\nNow that you have completed the troll's commission, this gold-plated hammer is the troll's gift to you...


items.bombs.laserpython.name=Laser Cross Crystal Column Summoner
items.bombs.laserpython.desc=This summon will instantly create a cross pillar upon explosion.
items.bombs.laserpython.didnot_pick=You couldn't pick up this item...


items.food.pasty.moon=Mooncake
items.food.pasty.moonling=The taste of moon cakes is so delicious that you will never forget it. You feel very happy.
items.food.pasty.moon_desc=Mooncakes symbolize reunion and happiness. Eating the product of this festive season will fill the dangerous dungeon with a happy atmosphere during the Mid-Autumn Festival. Happy Mid-Autumn Festival, %s!


items.scrolls.exotic.scrollofpolymorph.name=Scroll of Polymorph
items.scrolls.exotic.scrollofpolymorph.desc=This scroll is full of powerful transformation abilities. When used, all units within the user's field of vision will be transformed into a magical sheep! \n\nThis transformation is irreversible, but not all enemies will be affected. Stronger enemies will resist this magic. Also, items on the target enemy will disappear after the transformation.


items.potions.elixirs.watersoul.name=Water Soul Elixir
items.potions.elixirs.watersoul.desc=Water Soul Elixir made from healing potions and frozen meat, can make you immune to the curse of the water god for a certain period of time. \nAt the same time, as an equivalent exchange, it can also bring equivalent healing effects and replenish a certain amount of hunger. \n\nDrinking it will immediately dispel all debuffs from the curse of the water god. \n\nAfter drinking 3 bottles in the fear drug challenge, the healing will be invalid. Only regular bonuses will be provided afterwards.


items.food.lightfood.name=Lightning Rice Ball
items.food.lightfood.eat_msg=This food tastes amazing!
items.food.lightfood.desc=Lightning Rice Ball is a combination of frozen meat, lightning seeds and rations. It not only heals the hero, but also instantly restores hunger and grants the Thunder Blessing of the Rice Ball.


items.food.cake.name=Strawberry Cream Cake
items.food.cake.eat_good=The energy of this food stimulates your potential, your strength +1!
items.food.cake.eat_good2=The energy from this food has already stretched your potential, but you can still use this power. You convert it into Arcane Shield.
items.food.cake.desc=Cake is the rarest food in the dungeon. Eating it can instantly remove all negative effects and make you full of energy. Cake also has a very small chance of stimulating your potential...


items.food.switch.name=Magic Sandwich
items.food.switch.desc=Sandwiches can quickly eliminate hunger and gain a certain amount of arcane shield. The downside is that after eating it, other things you eat may not taste as good.




items.food.ricedumplings.eat_msg_good=This rice dumpling tastes great!\nYou feel a mysterious force completely clearing most of the negative magic in your body.


items.food.ricedumplings$ricedumplingsred.name=Sweet Rice Dumplings with Candied Dates
items.food.ricedumplings$ricedumplingsred.desc=Rice dumpling is a symbol of the festival. Eating it can immediately remove most negative effects and make you full of vitality. Different rice dumplings have different corresponding effects. \n\nThis is a sweet rice dumpling with candied dates. Eating it can gain a certain healing effect. And in the case of drug phobia, it will not gain the poisoning effect, but the healing effect will be halved. \n\n[Happy Festival! [


items.food.ricedumplings$ricedumplingspink.name=Red Bean Paste Dumpling
items.food.ricedumplings$ricedumplingspink.desc=Rice dumpling is a symbol of the festival. Eating it can immediately remove most negative effects and make you full of vitality. Different rice dumplings have different corresponding effects. \n\nThis is a red bean paste rice dumpling. Eating it can gain a certain arcane shield effect. \n\n[Happy Festival! [


items.food.ricedumplings$ricedumplingsorange.name=Potato Riced Rice Dumpling
items.food.ricedumplings$ricedumplingsorange.desc=Rice dumpling is a symbol of the festival. Eating it can immediately remove most negative effects and make you full of energy. Different rice dumplings have different corresponding effects. \n\nThis is an original rice dumpling with original flavor. Eating it can gain a certain artifact charging effect. \n\n[Happy Festival! [


items.food.ricedumplings$ricedumplingslink.name=Salted Egg Yolk Rice Dumpling
items.food.ricedumplings$ricedumplingslink.desc=Zongzi is a symbol of the festival. Eating it can immediately remove most negative effects and make you full of vitality. Different Zongzi have different corresponding effects. \n\nThis is a salted egg yolk Zongzi. Eating it can gain a certain hormone surge + effect. \n\n[Happy Festival! [


items.food.ricedumplings$ricedumplingsbottle.name=Pork Rice Dumplings
items.food.ricedumplings$ricedumplingsbottle.desc=Rice dumpling is a symbol of the festival. Eating it can immediately remove most negative effects and make you full of vitality. Different rice dumplings have different corresponding effects. \n\nThis is a pork salty rice dumpling. Eating it can gain permanent strength bonus + earth power + phosphorus fire judgment. \n\n[Happy Festival! [




items.weapon.missiles.darts.halodart.name=Halodart
items.weapon.missiles.darts.halodart.desc=These darts are coated with a drug made from halodart flowers, causing them to ignite with halodart flames upon impact.


items.weapon.missiles.darts.lightdart.name=Lightdart
items.weapon.missiles.darts.lightdart.desc=These darts are coated with a drug made from lightning flowers that will unleash the potential of their target upon impact.


items.scrolls.exotic.scrollofaffection.name=Scroll of Affection
items.scrolls.exotic.scrollofaffection.desc=Reading this scroll releases an alluring sound that enchants all who hear it.


items.scrolls.exotic.scrollofconfusion.name=Scroll of Confusion
items.scrolls.exotic.scrollofconfusion.desc=When reading this scroll, all creatures within your sight will be stunned and blinded.


items.scrolls.exotic.scrollofpetrification.name=Scroll of Petrification
items.scrolls.exotic.scrollofpetrification.desc=A flash of strange red light that overwhelms the minds of creatures within the user's visual range with terror and freezes them in place.








items.potions.exotic.potionofdragonkingbreath.name=Potion of Dragon King's Blessing
items.potions.exotic.potionofdragonkingbreath.desc=The strange compound in the bottle comes from _Dragon King-Phosphorus_. It will stimulate the power of weapons and armor after contacting them (gaining a random enchantment) and quickly dissipate into the air. At the same time, it will also produce a large area of phosphorous fire.
items.potions.elixirs.elixirofdragonking.name=Wrath of the Dragon King
items.potions.elixirs.elixirofdragonking.desc=When consumed, this elixir fills the drinker's veins with the power of phosphorescence. This effect makes the drinker completely immune to all fire, and allows them to ignite enemies with phosphorescence through physical attacks.
items.potions.potionofliquidflamex.name=Potion of liquidflamex
items.potions.potionofliquidflamex.desc=This potion contains a highly unstable compound that will burst into flames violently upon exposure to air.\n\n_Compared to regular liquid flames, this one is far more dangerous and deadly!




items.potions.potionoflightningshiledx.name=Potion of Lightning
items.potions.potionoflightningshiledx.desc=This potion combines the chemical effects of lightning flowers and electricity, making the player completely immune to electric shock damage for a period of time.




