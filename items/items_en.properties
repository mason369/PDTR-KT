items.food.potionoflightningshiled.name=Potion of Lightning Shield
items.food.potionoflightningshiled.desc=After drinking this strangely sweet liquid, a huge burst of energy will burst out of your body, allowing you to ignore electrical damage for a period of time.
items.food.potionoflightningshiled.ac_oat=Drinkable Potion
items.food.potionoflightningshiled.look_msg=You feel the electricity coalescing within you...you temporarily neutralize the shock response.


items.potions.exotic.potionoflightstromcloud.name=Flask of Lightstromcloud
items.potions.exotic.potionoflightstromcloud.desc=The strange unstable energy in the bottle comes from the energy of lightning. It can allow the user to gain the power to control lightning for a period of time and become a _Lightning King_.


items.weapon.melee.endingblade.name=Endingblade
items.weapon.melee.endingblade.desc=A disassembled clapperboard from nowhere, seems to be stained with the curse of flame, and will randomly produce a curse with strong corrosive ability. Once equipped with it, you can't get rid of it...\n\nThis weapon can absorb a certain amount of turbid flame energy when attacking the enemy. After absorbing a certain amount of turbid flame energy, it will generate new abilities and self-upgrade.\n\nCurrent turbid flame energy:
items.weapon.melee.endingblade.desc_2=\n\n(Reduced by hitting the enemy) The current cooldown of Death Announcement is:
items.weapon.melee.endingblade.cursed=When you equip this weapon, an invisible force binds you...
items.weapon.melee.endingblade.donot_eqip=The curse of the End has stained your body, and you are powerless to remove it.
items.weapon.melee.endingblade.procced=Ending: Judge everything and return to nothingness!!!
items.weapon.melee.endingblade.ac_lastcrystal={Laser Crystal Column{
items.weapon.melee.endingblade.ac_diedghost=|Death Announcement|
items.weapon.melee.endingblade.ac_healreset=_Thousands of Miles Chasing Soul_
items.weapon.melee.endingblade.bag=You suddenly feel your backpack is bulging...
items.weapon.melee.endingblade.unused=You have not used the laser beam yet, so you cannot use it again
items.weapon.melee.endingblade.low_level=Not enough level, required level is 3
