custom.seedfinder.wndseedtextinput$1.read=\n\nFor format examples and search suggestions, please refer to the following:\n\n1. Do not modify the _floor end_ in the first line. Sliding the depth will cause the _text box content to reset_. At the same time, starting from the second line, one item is required per line, for example:\n_5 floor end\nPlate+3_\n\n2. The search depth is adjusted through the _sliding component_. The depth information will be displayed below. For example, at 1 floor, it means the end is 1 floor, that is, ignoring 1 floor\n\n3. The _trophy button_ of the seed search terminal will jump to the challenge selection interface for you. Check the challenge here, and your challenge code will change. Some challenges will affect the generation\n\n4. If you search for items with levels, it will search for items with levels. Note: If you cannot find items with levels, you can try to enter the item name directly (that is, the information log will be output immediately after the item is found). Trying your luck is also a good choice. \n\n5. Due to the characteristics of the dungeon, too strict search rules may cause timeouts. The terminal still retains the timeout feature and adds a 30s timeout after 0.7.5. For example, find +3, +4 before the 5th floor. And unreasonable rules may also be timed out. \n\n6. Please use standard names for item names, such as _Ring of Fortune_, you cannot write _Ring of Fortune_. For information about most items, you can view it in _Developer Mode_. \n\n7. Unpredictable Because the seed will change when the terrain is changed, it is listed as a Class B seed. Special modes such as BossRush cannot be searched for the time being. \n\n8. If you encounter the problem of being unable to slide, long press _Search Seed_ on the main interface to enter the special interface and search according to the wizard.


custom.seedfinder.seedfinder.result=Search has timed out, please re-enter the value.\n\nPossible problems:\n\n1. Unreasonable generation (e.g. looking for +4 equipment on the first floor)\n2. Wrong item name (please query the corresponding item name according to the current language, you can query through the developer mode)\n3. The conditions are too harsh (please adjust the search conditions reasonably, if you need a wider range of search, please modify the default timeout (the default is 4s))\n4. If there are levels that are difficult to find, you can use fuzzy search. For example, directly_Flame Wave Staff_\n\nMLPD-SEED-FINDER Version 0.0.4\n\nThis searcher is based on the optimization and modification of Broken Annotation V2.3.0


custom.seedfinder.seedfinder.css=Challenge code:


custom.seedfinder.seedanalysisscene.title=If you can't find the seed you need or the seed you find cannot be swiped, you can also try this little tool. Enter your seed and you can completely traverse the contents of this seed (the sub-layer is invalid)\n\nThe normal search is a non-challenge environment. If you check the challenge,\nthe seeds will be searched according to the checked challenge.\nYou can use this technique to query seeds in any state.\n\nThe queried seeds will be automatically pasted into the seed value and the seed bureau will be automatically enabled.\n\n_Since direct search is abnormal, please use this analyzer temporarily. _


