custom.seedfinder.seedfinderscene.body2=MLPD seed search terminal welcomes you. Note that it will time out if no seed is found. \n\n\n\n\n_Please read the instructions on the upper right carefully. If you do not enter anything, a random seed search will be performed based on the depth_\nCurrent challenge code: %1$s Current timeout duration: %2$s seconds
