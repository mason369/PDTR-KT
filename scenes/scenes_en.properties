scenes.titlescene$5.lntp_desc=We cannot access the Internet and cannot verify the effective matching of local time and NTP server. \n\nTherefore, no activities related to Magic Ribbon will be effective. \n\nWe will enable the local activities that come with Broken by default, if any. \n\n[If you confirm that there are activities related to Magic Ribbon in the near future, please connect to a valid network and restart the game to re-verify. ]


scenes.titlescene$5.ntp_error=Warning: NTP verification failed
scenes.titlescene$5.ntp_desc=Network time: %1$s\n\nDevice time: %2$s\n\nYou may have modified the local time (LCA) without authorization, or your device time has not been calibrated, or you have used the simulator environment to enable it (please use the desktop version if you have a computer, some simulators do not support it.)\n\nTherefore, this is different from the time on the server (NTP), so activities related to Magic Ribbon will not take effect. \n\nWe will enable the local activities that come with Broken by default, if any. \n\n[If you confirm that there are Magic Ribbon related activities recently, please calibrate the time and restart the game to re-verify. ]
scenes.titlescene$5.ok=I understand


