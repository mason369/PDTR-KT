scenes.eulascene.desc=Magic Ling Pixel Dungeon End User License Agreement\nEffective Date: September 1, 2025\n\nPlease read this agreement carefully. By installing, copying, or using this software, you agree to be bound by its terms. If you do not agree, cease using this software immediately.\n\nI. License Grant\ n1.1 The Developer (“Licensor”) grants you (‘Licensee’) a non-exclusive, non-transferable, limited license for personal, non-commercial use, permitting you to: \nInstall and use Magic Ling Pixel Dungeon (hereinafter referred to as “the Software”) on your device, provided you comply with the terms of this Agreement. \n\nII. Usage Restrictions\nYou agree not to engage in the following activities (including directly or indirectly assisting third parties): \ n1. Technical Cracking: Reverse engineering, decompiling, disassembling, or modifying the software code through unofficial interfaces;\n2. Identification Tampering: Removing, obscuring, or forging copyright notices, digital watermarks, or technical protection measures within the software;\n3. Feature Abuse: Exploiting software vulnerabilities to create/distribute cheat tools or disrupt other users' normal experience; \n4. Commercial exploitation: Using the software for commercial purposes in any form, including sales, rentals, advertising placements, or monetizing traffic;\n5. Illegal distribution: Disseminating the software or derivative content through unofficial channels (including but not limited to cracking platforms, private servers, or mod bundles).\n\nIII. Privacy Data\nThis software collects the following data via the Google Firebase SDK, strictly adhering to the principle of minimal necessity:\n\nA. Basic Data (Android only)\nDevice Information: Brand, model, OS version, screen resolution, RAM/storage capacity, root status;\nRuntime Diagnostics: Crash logs, error stack traces, session duration, event trigger frequency;\nStatistical Profiling: User geographic distribution analysis via IP address (fuzzy-located to provincial-level administrative regions);\nUsage Habits: Daily/monthly active users, feature module usage duration (analyzed in real-time via Firebase Realtime Database). \n\nB. Game Data (Android Only) \nProgress Records: Number of cleared levels, DLC/side story completion rate, boss defeat count; \nChallenge Statistics: Completion status of challenges at difficulty level 13 and above; \nAI Analysis: Anonymized analysis of player behavior patterns using Gemini AI models for game balance adjustments and development decisions. \n\nC. Data Processing Rules\nAnonymization: All data undergoes hash-based de-identification and is not directly linked to personal identities;\nThird-Party Transmission: Data is hosted by Google Firebase and governed by its privacy policy (see firebase.google.com/terms);\nUser Rights: Data collection can be disabled via software settings (some core features may be restricted). \n\nIV. Third-Party Library Usage Notes\nWhen using this software, the following third-party dependencies provide services. Unless indicated in brackets for Windows, these represent core functionalities of the dependency. \nListed below: \nAndroid: Android devices \nWindows: Standard Microsoft PCs \nWatch: Smartwatches \n\nSummary of Software Third-Party Dependencies: \nNetiHarderBase64 Parsing Library (Android/Windows)\nCore Functionality: Provides Base64 encoding and decoding capabilities. \nPrimary Purpose: Used for data encryption and decryption to ensure secure data transmission. \nPrivacy Policy: This library does not directly collect any user data. \n\nGMSV4.4.2 (Android)\nCore Functionality: Provides Google Play Services support for app updates, notification delivery, etc. Primary Purpose: Enhances user experience and optimizes application performance. Privacy Policy: Google Play Services collects certain user data in accordance with its privacy policy. For details, refer to Google's Privacy Policy. \n\nFirebase Crashlytics BOM V3.3 (Android) Core Functionality: Collects application crash data and provides detailed reports to assist developers in debugging. \nPrimary Purpose: Improves app stability and resolves issues. \nPrivacy Policy: Crash logs collected by Crashlytics are anonymous and do not include personally identifiable information. Data transmission follows Firebase's privacy policy. \n\nFirebase-Bom V33.13.0 (Android)\nCore Functionality: Firebase's foundational dependency library for integrating Firebase SDKs. \nPrimary Purpose: Supports features like Realtime Database and Authentication. \nPrivacy Policy: Firebase processes data, including device information and usage, according to its privacy policy. \n\n6TailLunar:1.7.4 (Lunar Calendar Library) (Android/Windows)\nCore Functionality: Provides lunar calendar calculations and date conversion. Primary Purpose: Used for displaying and calculating lunar calendar dates. Privacy Policy: This library does not involve the collection of user personal data. LibGDX v1.12.0 (Android/Windows) Core Functionality: Game development framework providing graphics, physics engines, input handling, and more.Primary Purpose: Facilitates the development of 2D and 3D games by providing graphics processing, sound effects, and physics simulation. Privacy Policy: The LibGDX library itself does not collect user data. Appcompat V1.6.1 (Watch) Core Functionality: Provides compatibility support for applications, ensuring consistent performance across different versions of Android devices. Primary Purpose: Provides cross-version UI compatibility and supports smartwatch devices. Privacy Policy: This library does not collect any user data. BlankUtilCodex (Android/Windows) Core Functionality: Offers a utility library simplifying development processes. Primary Purpose: Includes common development features like string processing and data storage. \nPrivacy Policy: This library does not involve user data collection. \n\nJenly1314.AppUpdater:app-updater:1.2.0(Android/Windows)\nCore Functionality: Automatically checks for and updates applications. \nPrimary Purpose: Ensures applications can update automatically, providing the latest features and fixes. \nPrivacy Policy: The library itself does not collect user data, but may require network connectivity for updates. \n\nFastxmlJacksonV2.14.3(Android/Windows)\nCore Functionality: Provides JSON data parsing and generation capabilities.\nPrimary Purpose: Handles data exchange in JSON format.\nPrivacy Policy: This library does not involve the collection or processing of personal data. \n\nLuaJava (Android/Windows)\nCore Functionality: Provides Lua language parsing\nPrimary Purpose: Parses Lua scripts to optimize code and prepare for mod management\nPrivacy Policy: This library does not involve the collection or processing of personal data. Force majeure under this Agreement includes: natural disasters; changes in laws, regulations, or government directives; factors inherent to network service characteristics, such as failures of domestic or international telecommunications operators, computer or internet-related technical defects, limitations in internet coverage, computer viruses, hacker attacks, and other unforeseeable, unavoidable, and insurmountable objective circumstances. \n\n2. All section headings in this Agreement are for convenience only and have no substantive meaning. They shall not be used as a basis for interpreting the meaning of this Agreement or its relevant provisions. \n\n3. If any provision of this Agreement is deemed wholly or partially invalid or unenforceable for any reason, the remaining provisions of this Agreement shall remain valid and enforceable. \n\n4. This Agreement shall take effect upon its release date, constituting the entire agreement between you and Huimeng Moqing Branch regarding its use, and superseding any prior agreements or understandings between the parties concerning the same matters. \n\n5. If you have any comments or suggestions regarding this Agreement or