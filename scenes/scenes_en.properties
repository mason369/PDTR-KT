scenes.jamuletscene.text=Never Give UP!\n\nThe young man is thinking about peaches\n\nDo you still want to pass the developer mode? Daydreaming!
scenes.jamuletscene.text_le=Never Give UP!\n\nGreedy? Just be greedy, be more careful next time. \n\nJust give the Crystal Heart? You can have anything in your dream!!!


scenes.kamuletscene.stay=Reversal of Forgiveness
scenes.kamuletscene.exit=Set out on the journey
scenes.kamuletscene.text=Pride, jealousy, anger, sadness, greed, gluttony, lust\n\nPeople's ugliness is revealed here. Now, you have come to a dilemma. Accept the trial and disappear from history? Or erase all memories and pave the way for you again. \n\nI am not God, but I am God's spokesperson. Please make a choice!


scenes.guidescene.title=Magic Pixel Dungeon Guide Book
scenes.guidescene.pages=12
scenes.guidescene.title_0=Written at the front
scenes.guidescene.page_0=Welcome to the pixel dungeon of Mo Ling, this dungeon is based on 1.2.3 Broken. \n\nHere is a must-read guide for beginners. \n\nIf this is your first time playing this dungeon, please be sure to read this guide first. \n\n}It will definitely be helpful for your future play.
scenes.guidescene.title_1=About Difficulty
scenes.guidescene.page_1=It is admittedly difficult, but it is certainly not as difficult as the Twelve Trials of Hercules. \n\n In fact, its difficulty is considered to be controlled at an acceptable level. If you are not used to it or feel it is too difficult, it is probably because you are not familiar with its more unique mechanism. You may need more detailed and flexible strategies and tactics to be invincible in the dungeon, so the following content will help you well. \n\n Relax, although its requirements are a bit high, it is not necessary for mortals to complete it.
scenes.guidescene.title_2=Identify Items
scenes.guidescene.page_2=Ignorance is fearless, but more often incompetent. \n\n The colors of potions and runes of scrolls and their effects vary in each dungeon. Before you use or identify them, knowledge is still in chaos. \n\n The equipment in the dungeon may absorb power over a long period of time, but it may also be worn out or even cursed with vicious curses. Wearing a cursed equipment will put you in a disadvantageous situation, but it will not immediately sentence you to death. \n\n Through means such as upgrading, identification and exorcism, you can easily avoid these risks and be prepared.
scenes.guidescene.title_3=Search
scenes.guidescene.page_3=The truth is often not obvious, especially to the careless. \n\n Remember to stop and rest or look around at any time to find the best solution. {It may be brave to rush into the enemy camp recklessly, but it is not wise. { \n\n Don't forget to search, the dungeon is full of secret doors and traps, double-click the magnifying glass button to discover their secrets_.
scenes.guidescene.title_4=Book Blessing
scenes.guidescene.page_4=In the dungeon, you will always see various books. \n\n-They record some changes in the dungeon and some shocking stories. _\n\n-Of course, if you want to use the power of books, you need some methods. \n\n-Identify your books so that you can read them. Different books will have different effects. Happy fighting!
scenes.guidescene.title_5=Mission System
scenes.guidescene.page_5=In the dungeon, you will always meet various NPCs. \n\n-They will give you some tasks more or less. \n\n_Completing the tasks will give you certain rewards, which will allow you to gain more benefits in your subsequent adventures. _
scenes.guidescene.title_6=Wind on the Water
scenes.guidescene.page_6=During your adventure, some mysterious forces are protecting you. \n\n-They will bless you when you step on the water. \n\nBut be careful, as the magic power infects them, they will become extremely evil...
scenes.guidescene.title_7=Robbery of the Store
scenes.guidescene.page_7=Admittedly, robbing a store is an unnecessary measure. \n\nAlthough, you can get everything if you succeed in the robbery. \n\nYes, stores can be robbed, of course, you must be fully prepared. \n\n-Otherwise, you may be executed by a mysterious girl. Good luck
scenes.guidescene.title_8=Bloodstained Gold Coins
scenes.guidescene.page_8=The power of the dungeon is now complex and changeable, which also makes the dungeon bosses either very strong or very weak. \n\nFor this reason, we found a gold coin engraved with a skull in the Ice Sanctuary. The blood stains made this gold coin attached with magic that can change time and space. Toss the gold coin to disturb the magic flow of the dungeon. \n\n-By tossing the gold coin, you can select the boss you need. \n\nSpecial note: DM720 has a 20% chance of spawning when the witch is not selected.
scenes.guidescene.title_9=0 layer bonus
scenes.guidescene.page_9=When you complete some special challenges, the four bases on the 0th floor will add more supplies. \n\n-Please be careful, the challenge is very difficult, but once you win the challenge, it will be a great sense of accomplishment, right! \n\n-At the same time, more NPCs will appear as you explore the 0th floor, and they will benefit you more in your subsequent exploration.
scenes.guidescene.title_10=Cold System
scenes.guidescene.page_10=Starting from the prison, a blizzard will begin to blow through the dungeon. Of course, fate is also looking after us. \n\nThere is a bonfire room in the prison, where you can get warmth and resist the cold.
scenes.guidescene.title_11=DLC Mode
scenes.guidescene.page_11=Tired of the regular mode and want to play more modes? \n\nDLC mode welcomes you! Click the _Lantern_ on the right side of the hero selection interface to enter.


