scenes.gamescene.copied=If you are getting an infinite loop error, please send it to me! I have already got your clipboard! If there is no infinite loop, please do not send it to me! Thanks to the heroic author for the debugging information example! \n\nJDSALing#3793 Discord\n\nQQ:2735951230


scenes.gamescene.died_1= Failure is only temporary, victory is still waiting for you!\n\nWith repeated practice, you will succeed, come on!!!
scenes.gamescene.died_2= Before making a choice, you must consider whether your combat power is sufficient\n\nOtherwise, the consequences will be unbearable!!!
scenes.gamescene.died_3= Each Boss has weaknesses and mechanisms.\n\nOnly by understanding their weaknesses and mechanisms can you completely defeat them!!!
scenes.gamescene.died_4= Rushing forward blindly may lead to irreversible consequences.\n\nOnly by making the right choices rationally can you survive!!!
scenes.gamescene.died_5= The dungeon environment is complex and ever-changing. Only careful people can win. \n\nCome on, next time, you will be one step closer to success!!!


scenes.interlevelscene.dialog_1=Use items rationally to achieve final victory!
scenes.interlevelscene.dialog_2=Did you know? \n\nThe magnifying glass in the lower left corner is a good thing
scenes.interlevelscene.dialog_3=Good kids who often check the _Update Log_ will not be confused by the _New Changes_.
scenes.interlevelscene.dialog_4=Magic Pixel Dungeon-Started in _February 2021_,\n\nThanks to the guide _Ren_ and {Red Dragon{.
scenes.interlevelscene.dialog_5=Sometimes, facing failure head-on is not a bad thing.
scenes.interlevelscene.dialog_6=_Beware of the profiteer!!!_\n\nHe won't even sell you _uncursed items_!
scenes.interlevelscene.dialog_7=}Seed} is a good thing,\n\n_The key is whether you can use it
scenes.interlevelscene.dialog_8=Your luck is often one of the necessary things to pass the level. Of course, you can try custom seeds to have a more satisfying game!
scenes.interlevelscene.dialog_9=Hey, hey, hey,\n\nHave you heard the rumors about the [Crystal City[]?
scenes.interlevelscene.dialog_10=_Always die suddenly?_ This may not be your problem. \n\n[In short, don't be discouraged, just practice more if you are not good at it.
scenes.interlevelscene.dialog_11=In the Magic Pixel Dungeon, despair and hope coexist.
scenes.interlevelscene.dialog_12=Search for the _Red Dragon King_, and\n\neliminate the _elite enemies_.
scenes.interlevelscene.dialog_13=Not Shi Shen:\n\nPlease {Be careful of Gugu! ! !
scenes.interlevelscene.dialog_14=萌新岚:\n\nWelcome to the {Huoyanyanyi{dungeon. This dungeon is a complete{quit smoking.\n\nPlease do not smoke in the {corridor, wooden door, and dungeon room.\n\nThank you for your cooperation. I wish you a happy adventure}.
scenes.interlevelscene.dialog_15=Did you know? \n\nThe first dungeon the author played was \n\nA Fei's Mysterious Dungeon.
scenes.interlevelscene.dialog_16=_Too hard to beat? Try something new_\n\nMake your enemies run for their lives!
scenes.interlevelscene.dialog_17=_Snowy Canyon_, the merchants' headquarters
scenes.interlevelscene.dialog_18=It's the fourth anniversary of the Moling Dungeon. We will continue to move forward with you.
scenes.interlevelscene.dialog_19=The Fruit of Cleves, the source of the darkness in the forest?
scenes.interlevelscene.dialog_20=Thanks for the memories and Robbie's support
scenes.interlevelscene.dialog_21=Hod:\n\nThe water is clean but it's still electrified. How despicable.
scenes.interlevelscene.dialog_22=Just laugh:\n\nThe staff will be surprisingly useful, do you dare to bet?
scenes.interlevelscene.dialog_23=lmk3: \n\nWhy can't the Imperial Sword be eaten?
scenes.interlevelscene.dialog_24=The scenery outside the dungeon may also be worth a look.
scenes.interlevelscene.dialog_25=U3D:\n\nDrink the necessary amount of healing water. Don't skimp.
scenes.interlevelscene.dialog_26=Observer:\n\nDeath is not the end, the end is the beginning.
scenes.interlevelscene.dialog_27=楪祈喵:\n\nWelcome to Mo Ling, enjoy this feast.
scenes.interlevelscene.dialog_28=Beyond:\n\nToday we will refine copper! Tomorrow we will refine copper! Forever we will refine copper!
scenes.interlevelscene.dialog_29=Tao Lin:\n\nEvery step you take may be the final destination of an ancestor.
scenes.interlevelscene.dialog_30=Nettle Mood:\n\nThe boss is too tanky to be defeated? Why not try potions?
scenes.interlevelscene.dialog_31=Nettle Mood: \n\nDon't be discouraged if you die halfway, after all, authors will also fail ()\n\nLing: Listen to me, thank you for warming the four seasons.
scenes.interlevelscene.dialog_32=Nettle Mood:\n\nPull Ling to play Left 4 Dead 2, so you can't update ()
scenes.interlevelscene.dialog_33=DMZERO, the mastermind behind another timeline.
scenes.interlevelscene.dialog_34=Rice Jar:\n\nMaking pancakes with Black Cat, Nya~
scenes.interlevelscene.dialog_35=Ahaha, guess who I am? :\n\nIf you fail, just get up again
scenes.interlevelscene.dialog_36=楪祈喵:\n\nDo you want to refine copper? Do you want to be bitter? Do you want to be bitter? Elbow, come with me to the police station to explain.
scenes.interlevelscene.dialog_37=The truth about the jungle is not what you think.
scenes.interlevelscene.dialog_38=Si Chun Guang:\n\nIf you are new, just practice more.
scenes.interlevelscene.dialog_39=(:\n\nDo you know that eating ling painted cakes for breakfast will make playing dungeons more effective?
scenes.interlevelscene.dialog_40=bzmdr:\n\nIf you can't find anything to do, just set off on your journey.
scenes.interlevelscene.dialog_41=I am Big Gray Wolf 12:\n\nThe developer mode in the challenge allows you to test the monster boss's ability.
scenes.interlevelscene.dialog_42=I've always wanted to eat pigeons:\n\nEating is fun! Fighting is fun! Martial arts is fun!
scenes.interlevelscene.dialog_43=Seagull: \n\nAppreciate what you have...
scenes.interlevelscene.dialog_44=Deep Blue Salamander:\n\nSalamander, activate!
scenes.interlevelscene.dialog_45=Tian:\n\nThank you for following Tian on B station喵ヾ(´∀｀。ヾ)
scenes.interlevelscene.dialog_46=Xinyu:\n\nStudents from a high school innovation class in Jiangsu wish MLPD a happy third anniversary~
scenes.interlevelscene.dialog_47=An old friend:\n\nEvery year when the peach blossoms bloom, I will think of that chicken. He used to like basketball very much.
scenes.interlevelscene.dialog_48=Lao Da:\n\nKids, I'm back!
scenes.interlevelscene.dialog_49=Xiaoye:\n\nThe balance of the Moling Dungeon will be normal under my leadership!
scenes.interlevelscene.dialog_50=AI - Frostmorning: \n\nSome weapons may be extremely powerful, especially after upgrading: how can you know until you try?
scenes.interlevelscene.dialog_51=Suggested order of picking: Boss, Shattered, Unpredictable, Hysteria, Cluster, Elite, Mutation, Other
scenes.interlevelscene.dialog_52=Nanjo Harasu\n\nA treasure chest, or maybe a treasure chest monster.
scenes.interlevelscene.dialog_53=Axi:\n\nThe trap room in the secret garden is very dangerous! Don't believe it, hehehe...
scenes.interlevelscene.dialog_54=I am Gray Wolf 12: \n\nWhen you come across a cross-shaped tombstone room, make sure you have the ability to teleport away!
scenes.interlevelscene.dialog_55=Qingfeng:\n\nMy mind is full of lousy plots, what should I do?
scenes.interlevelscene.dialog_56=Cheese Rat King: \n\nPale Tombstone: Hehehehe, elbow, follow me into the house~~
scenes.interlevelscene.dialog_57=bzmdr: \n\nIt is said that the DM720 has a very dangerous driver.
scenes.interlevelscene.dialog_58=Interlevel:\n\nStack up your armor. As long as you stack up your armor, you will have everything.
scenes.interlevelscene.dialog_59=Void Fantasy:\n\nMake a mixture in the alchemy box artifact and then decompose it to extract the alchemical energy in the artifact.
scenes.interlevelscene.dialog_60=Deep Sea:\n\nMiscellaneous Fish~Miscellaneous Fish~Did you get all the Unpredictable Exploration Points today?


