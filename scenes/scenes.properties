scenes.eulascene.title=MLPD-EULA
scenes.eulascene.desc=Magic Ling Pixel Dungeon 最终用户许可协议\n生效日期：2025年9月1日\n\n请仔细阅读本协议。安装、复制或使用本软件即表示您同意遵守本协议条款。如不同意，请立即停止使用本软件。\n\n一、 许可授予\n1.1 开发者（\"许可方\"）授予您（\"被许可方\"）非独占、不可转让、有限的个人非商业使用许可，允许您在符合本协议条款的前提下：\n在您的设备上安装并使用《Magic Ling Pixel Dungeon》（下称“本软件”）\n\n二、使用限制\n您承诺不得从事以下行为（包括直接或间接协助第三方）：\n1、技术破解：反向工程、反编译、反汇编或通过非官方接口修改软件代码；\n2、标识篡改：移除、遮挡或伪造软件内版权标识、数字水印或技术保护措施；\n3、滥用功能：利用软件漏洞制作/传播作弊工具，或干扰其他用户正常体验；\n4、商业利用：以销售、租赁、广告植入、流量变现等任何形式进行商业性使用；\n5、非法分发：通过非官方渠道（包括但不限于破解平台、私服、模组整合包）传播软件或衍生内容。\n\n三、隐私数据\n本软件通过Google Firebase SDK收集以下数据，严格遵循最小必要原则：\n\nA. 基础数据（仅Android）\n设备信息：品牌、型号、操作系统版本、屏幕分辨率、内存/存储空间、Root状态；\n运行诊断：崩溃日志、错误堆栈跟踪、会话时长、事件触发频率；\n统计画像：通过IP地址模糊定位至省级行政区的用户地域分布分析；\n使用习惯：日/月活跃度、功能模块使用时长（通过Firebase Realtime Database实时分析）。\n\nB. 游戏数据（仅Android）\n进度记录：通关关卡数、DLC/外传章节完成率、Boss击败次数；\n挑战统计：13级及以上难度挑战的完成情况；\nAI分析：通过Gemini AI模型匿名化分析玩家行为模式，用于游戏平衡性调整及开发决策。\n\nC. 数据处理规则\n匿名化处理：所有数据均经哈希脱敏，不与个人身份直接关联；\n第三方传输：数据由Google Firebase托管，受其隐私政策约束（详见firebase.google.com/terms）；\n用户权利：可通过软件设置关闭数据收集（部分核心功能可能受限）。\n\n四、第三方库调用说明\n在你使用本软件，以下第三方依赖库会为你服务，除Windows在方框中代表才生效外，\n其他代表该依赖库服务的核心。\n其列表如下：\nAndroid:安卓 \nWindows:常规微软电脑\nWatch:手表\n\n软件第三方依赖库使用列表汇总：\nNetiHarderBase64解析库(Android/Windows)\n核心功能：提供Base64编码和解码功能。\n主要用途：用于数据加密和解密，确保数据传输安全。\n隐私政策：本库不直接收集任何用户数据。\n\nGMSV4.4.2(Android)\n核心功能：提供GooglePlay服务支持，帮助进行应用的更新和通知推送等。\n主要用途：增强用户体验和优化应用性能。\n隐私政策：GooglePlay服务会根据其隐私政策收集部分用户数据，具体内容可参考Google隐私政策。\n\nFirebaseCrashlyticsBomV3.3(Android)\n核心功能：收集应用崩溃数据并提供详细报告，帮助开发者修复bug。\n主要用途：提升应用稳定性和修复问题。\n隐私政策：Crashlytics收集的崩溃日志是匿名的，不会收集个人身份信息。数据传输遵循Firebase的隐私政策。\n\nFirebase-Bom V33.13.0(Android)\n核心功能：Firebase的基本依赖库，用于集成FirebaseSDK。\n主要用途：支持实时数据库、身份验证等功能。\n隐私政策：Firebase会根据其隐私政策处理数据，包括设备信息和使用情况。\n\n6TailLunar:1.7.4(农历库计算)(Android/Windows)\n核心功能：提供农历计算和日期转换功能。\n主要用途：用于显示和计算农历日期。\n隐私政策：该库不涉及用户个人数据的收集。\n\nLibGDXV1.12.0(Android/Windows)\n核心功能：游戏开发框架，提供图形、物理引擎、输入处理等功能。\n主要用途：帮助开发2D和3D游戏，提供图形处理、音效和物理模拟。\n隐私政策：LibGDX库本身不收集用户数据。\n\nAppcompatV1.6.1(Watch)\n核心功能：为应用提供兼容性支持，确保不同版本的Android设备上都有一致的表现。\n主要用途：提供跨版本的UI兼容性，兼容手表设备。\n隐私政策：此库不收集任何用户数据。\n\nBlankUtilCodex(Android/Windows)\n核心功能：提供常用的工具类库，简化开发过程。\n主要用途：包括字符串处理、数据存储等常见开发功能。\n隐私政策：此库不涉及用户数据的收集。\n\nJenly1314.AppUpdater:app-updater:1.2.0(Android/Windows)\n核心功能：自动检查并更新应用程序。\n主要用途：确保应用能够进行自动更新，提供最新版本的功能和修复。\n隐私政策：该库本身不会收集用户数据，但可能会要求连接到网络进行更新。\n\nFastxmlJacksonV2.14.3(Android/Windows)\n核心功能：提供JSON数据解析和生成的功能。\n主要用途：处理JSON格式的数据交换。\n隐私政策：此库不涉及个人数据的收集或处理。\n\nLuaJava(Android/Windows)\n核心功能：提供Lua语言解析\n主要用途：解析lua脚本，为更加优化代码和Mod管理做准备\n隐私政策：此库不涉及个人数据的收集或处理。\n\n五、其他约定\n1、辉梦魔绫分部对不可抗力导致的损失不承担责任。本协议所指不可抗力包括：天灾、法律法规或政府指令的变更，因网络服务特性而特有的原因，例如境内外基础电信运营商的故障、计算机或互联网相关技术缺陷、互联网覆盖范围限制、计算机病毒、黑客攻击等因素，及其他不能预见、不能避免并不能克服的客观情况。\n\n2、本协议所有条款的标题仅为方便阅读，本身并无实际涵义，不能作为本协议及相关条款涵义解释的依据。\n\n3、如本协议中的任何条款因任何原因被判定为完全或部分无效或不具有执行力的，本协议的其他条款仍应有效并且有执行力。\n\n4、本协议自发布之日起实施，构成您和辉梦魔绫分部之间就使用的全部共识，并取代双方此前就相同事项达成的任何约定和理解。\n\n5、如果您对本协议或本服务有意见或建议，请发送邮件至我们的客服邮箱: _clingsd@gmail.com_\n\n6、有关非Android端的数据收集仍在制作，日后若有新的服务，也会在本协议中更新并再次要求用户阅读\n\n重要提示：\n数据关闭指引：Android用户可在「设置-网络相关设置-FireBase数据分析」中禁用数据收集；\n\n如你尚未同意本协议，游戏将立刻退出。_如你想同意后关闭数据收集，则参考上方重要提示_。
