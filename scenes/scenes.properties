scenes.gamescene.died_1= 失败只是暂时的,胜利还在前方等着你!\n\n在一次一次的磨练中，你会成功的，加油!!!
scenes.gamescene.died_2= 在做出选择之前一定要考虑自己战力是否足够\n\n否则，带来的后果将不堪重负!!!
scenes.gamescene.died_3= 每个Boss都有缺点和机制\n\n摸清他们的缺点与机制，才能将他们完全击败!!!
scenes.gamescene.died_4= 一味的向前冲可能会导致无法挽回的后果,\n\n只有理智的做出正确的选择，才能活下去!!!
scenes.gamescene.died_5= 地牢的环境复杂多变，只有细心之人才能获得胜利。\n\n加油吧，下一次，你会离成功更近一步的!!!

scenes.interlevelscene.dialog_1=合理_运用物品_，\n\n获取_最终胜利_！
scenes.interlevelscene.dialog_2=你知道吗？\n\n_左下角的放大镜_是一个好东西
scenes.interlevelscene.dialog_3=常去看_更新记录_的好孩子,\n\n就不会因为_新改动_而茫然.
scenes.interlevelscene.dialog_4=魔绫像素地牢-始于_2021年2月_，\n\n感谢引导者_Ren_和{红龙{。
scenes.interlevelscene.dialog_5=有些时候_直面失败_,\n\n或许并不是什么坏事
scenes.interlevelscene.dialog_6=_小心奸商！！！_\n\n他甚至不会卖给你_未诅咒的物品_！
scenes.interlevelscene.dialog_7=}种子}是个好东西，\n\n_关键看你_会不会用
scenes.interlevelscene.dialog_8=你的运气常常是通关的必要东西之一，当然你可以试试自定义种子来盘爽局！
scenes.interlevelscene.dialog_9=呐呐呐，\n\n你听说过[水晶之城[的谣言吗？
scenes.interlevelscene.dialog_10=_总是暴毙?_这可能并不是你的问题。\n\n[总之，不要气馁，菜就多练练[。
scenes.interlevelscene.dialog_11=魔绫像素地牢，绝望与希望并存。
scenes.interlevelscene.dialog_12=寻找_红龙之王_，\n\n剿灭_精英敌人_。
scenes.interlevelscene.dialog_13=不是史神:\n\n请{小心咕咕！！！
scenes.interlevelscene.dialog_14=萌新岚:\n\n欢迎来到{火炎焱燚{地牢，本地牢{全面{戒烟.\n\n请不要在{过道内、木门口、地牢房间{吸烟。\n\n谢谢合作，祝您}冒险愉快}呢。
scenes.interlevelscene.dialog_15=你知道吗？\n\n作者游玩的第一个地牢\n\n是}阿飞的不思议地牢}呢。
scenes.interlevelscene.dialog_16=_太难打了?试着做一些新东西_\n\n让你的敌人只能抱头鼠窜!
scenes.interlevelscene.dialog_17=_雪凛峡谷_，商人们的总部
scenes.interlevelscene.dialog_18=五载同行，不负相伴。\n\n魔绫地牢五周岁生日快乐！
scenes.interlevelscene.dialog_19=克里弗斯之果，森林黑暗的源头？
scenes.interlevelscene.dialog_20=感谢_那些回忆_和_罗贝里_的大力支持
scenes.interlevelscene.dialog_21=Hod:\n\n明明清了水却还带电，太屑了。
scenes.interlevelscene.dialog_22=笑笑就好：\n\n咒杖会意想不到的好用，敢赌吗?
scenes.interlevelscene.dialog_23=lmk3：\n\n话说，为什么尚方宝剑不能吃呢？
scenes.interlevelscene.dialog_24=地牢之外的风景，或许也值得一看。
scenes.interlevelscene.dialog_25=U3D:\n\n治疗该喝就得喝，别省。
scenes.interlevelscene.dialog_26=观察者：\n\n死亡不是终点，结束即为开始。
scenes.interlevelscene.dialog_27=楪祈喵：\n\n欢迎来到魔绫，享受这场狂宴吧。
scenes.interlevelscene.dialog_28=Beyond:\n\n今天要炼铜！明天要炼铜！永远要炼铜！
scenes.interlevelscene.dialog_29=桃林:\n\n你走过的每一步，都或许是某位先辈的归宿。
scenes.interlevelscene.dialog_30=荨麻心绪：\n\nBOSS太肉无法解决？为什么不试试药水呢。
scenes.interlevelscene.dialog_31=荨麻心绪：\n\n半路暴毙也不用灰心，毕竟作者也会翻车（）\n\n绫:听我说，谢谢你，温暖了四季。
scenes.interlevelscene.dialog_32=荨麻心绪：\n\n拉Ling去打求生之路2，这样就不能更新啦（）
scenes.interlevelscene.dialog_33=DMZERO,另一个时间线的幕后黑手。
scenes.interlevelscene.dialog_34=米缸：\n\n和黑猫一起做薄煎饼，Nya～
scenes.interlevelscene.dialog_35=啊哈，猜猜我是谁？：\n\n失败了再爬起来就行了
scenes.interlevelscene.dialog_36=楪祈喵：\n\n想不想炼铜？想不想涩涩？想是吧？肘，跟我去警察局解释吧
scenes.interlevelscene.dialog_37=丛林的真相，并不是你想象的那样。
scenes.interlevelscene.dialog_38=思春光:\n\n菜，就多练。
scenes.interlevelscene.dialog_39=(:\n\n知道吗早餐起来吃ling画的饼玩地牢效果更好
scenes.interlevelscene.dialog_40=bzmdr：\n\n找不到事情做就快点踏上征途
scenes.interlevelscene.dialog_41=我是灰太狼12：\n\n挑战里的开发者模式能让你测试怪物boss能力哦
scenes.interlevelscene.dialog_42=我老想吃鸽子了:\n\n吃饭，爽！战斗，爽！武道，爽！
scenes.interlevelscene.dialog_43=海鸥：\n\n珍视你所拥有的一切……
scenes.interlevelscene.dialog_44=深蓝蝾螈：\n\n螈神，启动！
scenes.interlevelscene.dialog_45=田某：\n\nB站关注田某谢谢喵ヾ(´∀｀。ヾ)
scenes.interlevelscene.dialog_46=快速艺术酱：\n\n浮生若梦
scenes.interlevelscene.dialog_47=某位故人：\n\n每年桃花开的时候我都会想起那只鸡，他曾经也很喜欢篮球。
scenes.interlevelscene.dialog_48=牢大：\n\n孩子们，我回来了！
scenes.interlevelscene.dialog_49=小叶：\n\n魔绫地牢的平衡会正常的，在我的领导之下！
scenes.interlevelscene.dialog_50=人工智能——霜晨：\n\n某些武器可能特别强大，尤其是在升级后：不试试怎么知道呢？
scenes.interlevelscene.dialog_51=建议开挑顺序：头目、破碎、莫测、癔症、集群、精英、突变、其他
scenes.interlevelscene.dialog_52=南条哈啦咻：\n\n宝箱，也有可能是宝箱怪啊
scenes.interlevelscene.dialog_53=阿汐：\n\n秘境花园中的陷阱房十分危险！不信嘛，嘿嘿嘿……
scenes.interlevelscene.dialog_54=我是灰太狼12：\n\n当你碰到十字型墓碑房，一定要确保自己有能传送走的能力哦！
scenes.interlevelscene.dialog_55=青枫:\n\n满脑子只有烂梗了怎么办喵
scenes.interlevelscene.dialog_56=芝士鼠王：\n\n苍白墓碑：桀桀桀桀，肘，跟我进屋~~
scenes.interlevelscene.dialog_57=Bzmdr：\n\n据说DM720有一个非常危险的驾驶员
scenes.interlevelscene.dialog_58=寄境:\n\n叠甲吧，只要你叠甲，什么都会有的。
scenes.interlevelscene.dialog_59=虚空幻乐：\n\n在炼金箱神器做合剂在分解可以提炼神器里的炼金能量哦
scenes.interlevelscene.dialog_60=深海∶\n\n杂鱼～杂鱼～你今天变化莫测的探索分拿满了嘛？
scenes.interlevelscene.dialog_61=芙兰黛娅：\n\n一定要打冰雪女王恨来自D720
scenes.interlevelscene.dialog_62=路人A：\n\nbzmdr怎么这么坏啊
scenes.interlevelscene.dialog_63=日上：\n\n冬玲是个好女孩请不要伤害她
scenes.interlevelscene.dialog_64=Uomi罐头：\n\n鬼磷苍蝇你不要过来了啊！
scenes.interlevelscene.dialog_65=霜狼：\n\n卷轴做成符石既省空间，又能鉴定效果
scenes.interlevelscene.dialog_66=桃屋猫：\n\n祝各位能和饭桶一样吃饱不胖啦~
scenes.interlevelscene.dialog_67=仁玖大王：\n\n地牢有魔绫，冒险永不停！
scenes.interlevelscene.dialog_68=南京盐水鸭：\n\n建议把盐水鸭加入moling菜谱
scenes.interlevelscene.dialog_69=小叶：\n\n可以向你的朋友推荐下魔绫地牢，玩家多多益善。
scenes.interlevelscene.dialog_70=狂战士：\n\n彻底疯狂！
scenes.interlevelscene.dialog_71=至尊松涛：\n\n不要忘了集中精神喵，小心周遭一切哦
scenes.interlevelscene.dialog_72=枫心：\n\n玩狂战一定要记住，平a衔接普攻
scenes.interlevelscene.dialog_73=迅：\n\n感谢_JDSALing_在我开发地牢路上的指导～
scenes.interlevelscene.dialog_74=阿里：\n\n法师之手我们联合。你拿烈阳，我拿爆破笛。定叫对面大败而归。
scenes.interlevelscene.dialog_75=与风醉：\n\n黑色宝箱和金色宝箱有机会合成暗金色宝箱哦！
scenes.interlevelscene.dialog_76=大眼突变体：\n\n看我把你们一个一个都扫上，东西给你们碎一地天
scenes.interlevelscene.dialog_77=牢大：\n\n想我了就来玩牙
scenes.interlevelscene.dialog_78=费离楚：\n\n财富，你在哪里？你根本不在金蝶池子里！
scenes.interlevelscene.dialog_79=太上忘情：\n\n玩腻了，就试试制作与使用自定义材质包吧
scenes.interlevelscene.dialog_80=坤巴：\n\n楼层内暗藏玄坤
scenes.interlevelscene.dialog_81=青枫：\n\n药水和卷轴该交就交，控制战损
scenes.interlevelscene.dialog_82=摸鱼溪：\n\n漂浮药剂做成的水爆可以让你移动两格覆盖陷阱并灭火，这很有用
scenes.interlevelscene.dialog_83=彩虹宝箱怪：\n\n传说中魔Ling地牢的主人是笨蛋哦（笑）
scenes.interlevelscene.dialog_84=法师高丸：\n\n五周年了？！时间好快呀
scenes.interlevelscene.dialog_85=拔辣吶：\n\n涤罪不磨重相當於西方沒有耶路撒冷
scenes.interlevelscene.dialog_86=麻瓜瓜Maguagua：\n\n每次下去前记得去看看萝卜子哦awa~
scenes.interlevelscene.dialog_87=圣杯＝等级的平方×3+5：\n\n死于，这把稳了。
scenes.interlevelscene.dialog_88=苏怒万叶笑：\n\n给南瓜姜饼人配个曲，他能卡点蹦个迪
scenes.interlevelscene.dialog_89=渴望抛瓦的骑士：\n\n古堡，一定要用拿着烈阳法杖+12的噬魂少女打啊。
scenes.interlevelscene.dialog_90=星咩：\n\n发育不良遇强敌？查道具，用法杖，善用技能或暂撤。
scenes.interlevelscene.dialog_91=随凡：\n\n祝大家面对困难时也能有“钢铁意志”并能"手起刀落”的解决它
scenes.interlevelscene.dialog_92=晓梦：\n\n打开信念护体，享受清凉地牢
scenes.interlevelscene.dialog_93=Xinyu：\n\n五载同游处\n\n古堡共舞时\n\n弃旧图新\n\n提灯前行
scenes.interlevelscene.dialog_94=发霉辣椒酱：\n\n我说毒杖超进化射出来会很爽有没有懂的
scenes.interlevelscene.dialog_95=出门左转幻想乡：\n\n开门一定要小心，你永远不知道门后有什么东西
scenes.interlevelscene.dialog_96=左飞蝶：\n\n哥哥还没用升级卷轴？不会是在等财富戒指吧～不会吧不会吧～
scenes.interlevelscene.dialog_97=3FLYFISH：\n\n死因：这局稳了
scenes.interlevelscene.dialog_98=盒装飞屋：\n\n我只是个会飞的屋子

