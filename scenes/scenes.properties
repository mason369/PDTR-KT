scenes.titlescene$5.ntp_desc=网络时间：%1$s\n\n设备时间：%2$s\n\n你可能擅自修改了本地时间(LCA)，或您设备时间尚未被校准，或使用了模拟器环境启用(有电脑请使用桌面版本，部分模拟器不支持。)\n\n故而这与服务器上的时间(NTP)不同，所以与魔绫相关的活动都不会生效。\n\n我们会默认启用破碎自带的本地活动，如果有的话。\n\n[如您确认近期有魔绫相关活动，请校准时间后重启游戏以重新验证。]
