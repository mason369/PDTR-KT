scenes.titlescene$5.lntp_desc=我们无法访问到互联网，无法验证本地时间与NTP服务器的有效匹配性。\n\n因此与魔绫相关的活动都不会生效。\n\n我们会默认启用破碎自带的本地活动，如果有的话。\n\n[如您确认近期有魔绫相关活动，请链接到有效网络后再重启游戏以重新验证。]

