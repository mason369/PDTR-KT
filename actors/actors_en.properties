actors.mobs.npcs.nulldied.name=Merchant Lord
actors.mobs.npcs.nulldied.desc=The merchant lord of Snow Ridge Canyon, he is the one who established the merchant force.

actors.mobs.npcs.nulldiedto.talk_x=Yes, now is your time to choose the goods.

actors.mobs.npcs.nulldiedto.name=Merchant Lord
actors.mobs.npcs.nulldiedto.desc=Merchant Lord of Snow Ridge, it was he who established the merchant force.
actors.mobs.npcs.nulldiedto.leave=Adventurer, quickly leave here through the Crystal Heart...



actors.mobs.npcs.nulldiedto.namex=Crystal Will
actors.mobs.npcs.nulldiedto.descx=He is not the Merchant Lord, but the will of the Crystal Heart. He is waiting for you!

actors.mobs.npcs.nulldiedto.talk_a=There are still people alive here? Oh, it's you!
actors.mobs.npcs.nulldiedto.talk_b=Adventurer, there is an evil, sinister and powerful force overflowing. It seems that only you can change this situation.
actors.mobs.npcs.nulldiedto.talk_c=There are no creatures below. Maybe it is caused by that force. Only those with certain strength survived.
actors.mobs.npcs.nulldiedto.talk_d=The Crystal Heart is resisting this force. The entrance has become like this because of this resistance.
actors.mobs.npcs.nulldiedto.talk_e=The terrain below may be different. These are the specific manifestations of the resistance.
actors.mobs.npcs.nulldiedto.talk_f=Good luck, adventurer. I also provide some things to help you suppress the unknown force - of course, you have to pay for it.

actors.mobs.npcs.nulldiedto.talk_g=Adventurer, we meet again. I'm worried about your next journey, so I'm here to help you again.
actors.mobs.npcs.nulldiedto.talk_h=Good luck, adventurer. I also provide you with something to help you suppress the unknown power - of course, it costs money.

actors.mobs.npcs.nulldiedto.talk_i=Adventurer, as I said before. There is an evil, cold and powerful force overflowing, and the energy point is deeper below.
actors.mobs.npcs.nulldiedto.talk_j=But due to the arrival of someone, you can't go there to die now, so don't rush there for the time being...

actors.mobs.npcs.nulldiedto.talk_k=DMZERO has been completely destroyed, adventurer, well done.
actors.mobs.npcs.nulldiedto.talk_l=Adventurer, maybe you are really his savior.
actors.mobs.npcs.nulldiedto.talk_m=Thank you for your dungeon investigation. I will restore this place to its original state soon.
actors.mobs.npcs.nulldiedto.talk_n=Adventurer, this is just the beginning. Your future hard and bumpy road is coming!
actors.mobs.npcs.nulldiedto.talk_o=Adventurer, you can now leave here through the Crystal Heart. Thank you for your help this time. I will tell you about your great achievements when he comes back.

