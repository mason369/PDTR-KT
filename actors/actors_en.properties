###Gold Mobs

actors.mobs.gold.goldmob.infos=_Special monsters in Golden Butterfly mode, need to be handled with caution. _

actors.mobs.gold.giantworm.name=Giant worm
actors.mobs.gold.giantworm.desc=As the pollution in the jungle becomes more serious, these worms become so huge that their attacks have a chance to tear the enemy's wounds and restore a certain amount of health.

actors.mobs.gold.mayfly.name=Mayfly
actors.mobs.gold.mayfly.desc=These wandering creatures will generously heal other targets, and the fight will not end until they die. \n\nMayflies will apply a weak healing effect to nearby friendly forces.

actors.mobs.gold.prisoner.name=Prisoners
actors.mobs.gold.prisoner.desc=The main service objects of the underground prison, these big guys were temporarily freed from the cells after the order was out of control, but they still couldn't escape the fate of fighting with the prison guards, although they were not as rational as before. \n\nThe prisoner still remembers the police in the prison. If they happen to be present, his target will not be directed at you for the time being.
actors.mobs.gold.prisoner.kill=You were beaten by the prisoners...

actors.mobs.gold.drake.name=Underground Drake
actors.mobs.gold.drake.desc=A kind of dragon born from the combination of dragons and lizard-like creatures. They like to sleep underground, but they are very irritable when they wake up. \n\nNone of your attack methods can reach the soil.
actors.mobs.gold.drake.kill=The Underground Dragon killed you...
actors.mobs.gold.drake.rock_punk_kill=The Underground Dragon killed you with the rocks it dug out...
actors.mobs.gold.drake.reveal=You have angered this dragon, run away!
actors.mobs.gold.drake.get_close=When you get close to this place, you find that the floor under your feet is a little loose, it is better not to approach the crack
actors.mobs.gold.drake.shock= %s was repelled by the Underground Dragon's drilling!
actors.mobs.gold.drake.revealing=You can feel something coming...

actors.mobs.gold.artillerist.name=Dwarven Gunner
actors.mobs.gold.artillerist.desc=A different breed of dwarven army, they are more adept at tinkering with gunpowder than fighting off enemies and casting spells with their bare hands, but fortunately they are quite powerful and accurate. \n\nWatch out for their heavy artillery! \n\nThey will use portable mortars to bombard you.
actors.mobs.gold.artillerist.kill=You were killed by a dwarven gunner...
actors.mobs.gold.artillerist.bomb_party_kill=You were blown away by artillery fire...

actors.mobs.gold.gnolltwilight.name=Twilight Jackal
actors.mobs.gold.gnolltwilight.desc=No matter how you look at it, this monster doesn't look like a jackal. Its eyes flashed a creepy blue, and its skin was pale, gleaming slightly in the shadows of the dungeon. In its satchel was a large number of darts filled with different poisons. These poisons would not harm the human body, but would definitely make you live a life worse than death...

actors.mobs.gold.boomskull.name=Boomskull
actors.mobs.gold.boomskull.desc=Boomskulls are formed from the aggregate of the bones of those tragic adventurers and the natives of the dungeon. The evil power from the lower dungeon awakened them from death. They are very fragile, so they usually use self-detonation to attack intruders. \n\nSince they are transformed from evil spirits, no creature can lie dormant in front of them.


actors.mobs.gold.royalguard.name=King's Guard
actors.mobs.gold.royalguard.desc=The most elite guards of the Dwarf King, they are equipped with a variety of weapons in the treasury, and they only serve the only king of the Dwarf Kingdom until their death.
actors.mobs.gold.royalguard.equipment=You can see they have _%s_ in their hands, so be careful.
actors.mobs.gold.royalguard.kill=You were killed by a guard holding %s...

actors.mobs.gold.gnollblind.name=Old Gnoll
actors.mobs.gold.gnollblind.desc=Gnolls are hyena-like humanoids. They roam the jungles and dungeons, occasionally moving upwards to attack the surface. Some gnolls have reduced vision due to jungle infection or old age, which means they are easy to sneak up on or ambush.

actors.mobs.gold.goblinshaman.name=Goblin Shaman
actors.mobs.gold.goblinshaman$shamanshield.desc=Shamans are often considered the most powerful of the goblins... but not the goblins themselves. Since magic is common in dungeons, many goblins have begun to use it. This goblin's magic can increase the defense of nearby allies.
actors.mobs.gold.goblinshaman$shamanstrength.desc=Priests are often considered the strongest of goblins... but goblins are not. Since magic is common in dungeons, many goblins have begun to use it. This goblin's magic can increase the strength of nearby allies, making their attacks more deadly.
actors.mobs.gold.goblinshaman$shamanregen.desc=Priests are often considered the strongest of goblins... but goblins are not. Since magic is common in dungeons, many goblins have begun to use it. This goblin's magic can heal nearby allies.
actors.mobs.gold.goblinshaman$shamanfake.desc=Priests are often considered the strongest of goblins... but goblins are not. Since magic is common in dungeons, many goblins have begun to use it. This goblin's magic is not real magic, he seems to be imitating the "magic sound" to show his intelligence. In other words, he is just making up the numbers, and it is useless otherwise.

actors.mobs.gold.hermitcrab.name=Hermit Crab
actors.mobs.gold.hermitcrab.desc=A crab that has found a large shell to live in. These crabs are much tougher than normal crabs, and their shells protect them from blows, making the crabs immune to even the weakest attacks. But once the shell is broken, the crab's defense drops to 0, allowing you to kill it easily.
actors.mobs.gold.hermitcrabnoshell.name=Hermit Crab
actors.mobs.gold.hermitcrabnoshell.desc=A completely defenseless hermit crab that has had its shell broken. Any hermit crab will experience primal fear for a short time after the shell break occurs.

actors.mobs.gold.demonlord.name=Demon Lord
actors.mobs.gold.demonlord.desc=High-ranking servants of the Old Gods, they command all demons below the Old Gods. Facing a demon lord is not pure and dangerous, but no adventurer can face the old god directly, which shows that this is a dilemma.
actors.mobs.gold.demonlord.kill=The demon lord killed you easily...
actors.mobs.gold.demonlord.damage_boost=Current demon lord damage boost _%d_ %%.

actors.mobs.gold.gnollthrower.name=Gnoll Sentinel
actors.mobs.gold.gnollthrower.desc=Gnolls are hyena-like humanoids. They roam jungles and dungeons, and from time to time move upwards to try to attack the surface. Gnoll Sentinels are more agile gnolls. They can use stones to attack from a distance and usually play a guarding role in the gnoll pack.

actors.mobs.gold.tribemanold.name=Jackal Bandit
actors.mobs.gold.tribemanold.desc=The cold area is a good place for them to train. It is said that the weapons in their hands are the design prototypes of Guan Dao. Be careful!

actors.mobs.npcs.extra.pinkfox.name=Xia Yu Wuming
actors.mobs.npcs.extra.pinkfox.desc=A nine-tailed fox that transforms into a human form. It is said that he masters the magic of the golden butterfly and can provide you with the golden butterfly array to provide you with the law of transmutation.

actors.mobs.npcs.extra.pinkfox.message1=Hello, I am Xia Yu Wuming. It looks like you have a Golden Butterfly Secret Scroll in your hand. This is hers, but I don't know why it's with you now...
actors.mobs.npcs.extra.pinkfox.message2=And, it seems that you have been chosen by her. She is watching whether you can make it through this trial...
actors.mobs.npcs.extra.pinkfox.message3=I will evaluate your _Golden Butterfly Transmutation Times_ based on your journey. I will give you two at the beginning. You will get a Golden Butterfly Transmutation opportunity every time you defeat a powerful enemy... You can check your transmutation times and task board status according to your status bar!
actors.mobs.npcs.extra.pinkfox.message4=You will see me many times later, but I will not greet you at the entrance later. Anyway, I wish you a smooth journey!

actors.mobs.npcs.extra.pinkfox.message5=I'm sorry that you don't have any transmutation times now. I have also fulfilled the contract with her. If you violate the contract privately, she may be very unhappy! \n\nPlease complete the tasks on the task board and get more transmutations before coming to me!

actors.buffs.status.questgold.name=Kingdee Commission Task Board
actors.buffs.status.questgold.desc=All kinds of commissions are here. Complete the commissions to get more transmutation times!

actors.buffs.status.questgold.ghost=\nBasic quest: _Add 1 transmutation after completion_\n\nSad Ghost Commission: Hunting Operation-_Unfinished_
actors.buffs.status.questgold.ghost_yes=\nBasic quest: _Add 1 transmutation after completion_\n\nSad Ghost Commission: Hunting Operation-_Completed_

