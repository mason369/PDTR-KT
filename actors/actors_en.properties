actors.mobs.srpdhblr.desc = These bounty hunters once wanted to come to this dungeon to end the final darkness, but now they are corrupted by the dark magic in the dark of the dungeon. Now they are insane, these creatures wander around the prison, waiting for the next poor person to come to this dungeon.

actors.mobs.randombluefire.name = Weird Phosphorus Soul (Frenzy)
actors.mobs.randombluefire.attack_msg_1 = Why are you invading here?
actors.mobs.randombluefire.attack_msg_2 = No, you can't leave here
actors.mobs.randombluefire.attack_msg_3 = You are not my king
actors.mobs.randombluefire.death_msg_1 = Death is the end!
actors.mobs.randombluefire.died = Finally, finally freed...
actors.mobs.randombluefire.desc = Weird creatures born from the dead souls of the dwarf kingdom and the magic overflowing from the depths of the dungeon. They have terrifying abilities, and will go berserk at half health. Their phantoms may exist here, and will only disappear after they are defeated.
actors.mobs.randombluefire.notice = Do you want to experience the pain brought by phosphorus fire?
actors.mobs.randombluefirede.name = Weird Phosphorus Soul
actors.mobs.randombluefirede.attack_msg_1 = ...
actors.mobs.randombluefirede.attack_msg_2 = Cannot go against the will of God
actors.mobs.randombluefirede.attack_msg_3 = Ignorance is innocent
actors.mobs.randombluefirede.death_msg_1 = There is no sorrow for me, you have completely angered me!
actors.mobs.randombluefirede.desc = Weird creatures born from the dead souls of the dwarf kingdom and the magic overflowing from the depths of the dungeon. They have terrifying abilities, and will go berserk at half health. But they have no eyesight, so just don't disturb them. However, the alarm in the dungeon will also alert them. Please proceed with caution!
actors.mobs.randombluefirede.fuck=The ignorant indulge in lust, what qualifications do you have to save us?

actors.mobs.ogpdnqhz.name = Robust Rat
actors.mobs.ogpdnqhz.desc = This rat is very strong and may give you a fatal blow at some point

actors.mobs.kagenonusujin.name=Shadow Thief
actors.mobs.kagenonusujin.desc=This evil thief wanders here to steal something valuable. He has learned the dark magic from the abyss, and can turn into a shadow in the dark and hide in the darkness, and then disappear immediately. \n\nThis monster will try to steal the player's items, then teleport itself to another place on the map, and be bleed by the magic backlash while causing a thunderstorm effect on the enemy point. \n\nIf you fail, you will go crazy due to the backlash of magic and cause nearby rocks to fall!

actors.mobs.fireghost.name=Red Ghost
actors.mobs.fireghost.desc=This red ghost was awakened from the flames by the necromancers deep in the dungeon. Although they are not as powerful as fire elements, they are infinitely close. \n\nThis monster will burn you.

actors.mobs.blackhost.name=Black Ghost (old version)
actors.mobs.blackhost.desc=This black ghost is formed by the miasma deep in the dungeon affecting the ghosts. Although they are fragile, they can poison you, bleed, and burn you. But their eyesight is very poor. \n\nThis monster is very dangerous.

actors.mobs.newblackhost.name=Black Ghost
actors.mobs.newblackhost.desc=This ghost with black body is formed by the miasma deep in the dungeon. They can periodically release holy curse flames. Enemies in it have a chance to gain a certain shield, while players have a chance to be cursed and weakened. \n\nThis monster is very dangerous.
actors.mobs.newblackhost.charging=The Black Ghost is preparing to release the holy curse flame

actors.blobs.curseddiedblos.desc=A ball of holy curse flame is raging here\n\nHeroes in it will have a chance to be weakened for 4 turns (if weakness already exists, it will not be added) and there is a chance that the equipped weapon will be cursed\n\nMonsters in it have a chance to gain an additional non-decaying 6-20 shield.

actors.mobs.ogpdlls.name = Old Mouse
actors.mobs.ogpdlls.desc = This mouse has entered middle age, so its accuracy is very high!

actors.mobs.flameb01.name = Flame-B01
actors.mobs.flameb01.desc = Once a flame robot created by the Heretic Cult to stop the _darkness of the underground_. Now the Heretic Cult is nowhere to be found, but the evil they left behind is still here. \nThe pressure of the flamethrower is %s degrees.

actors.mobs.flamec01.name = Flame-C01
actors.mobs.flamec01.desc = Once a flame robot created by the Heretic Cult to stop the _darkness of the underground_. Now the Heretic Cult is nowhere to be found, but the evil they left behind is still here. \nThe pressure of the flamethrower is %s degrees.\n\nC01 is rarely seen, usually hired by merchants or summoned!

actors.mobs.flamec02.name = Flame-C02
actors.mobs.flamec02.desc = This was a flame robot created by the Heretic Cult to stop the darkness in the underground. Now the Heretic Cult is nowhere to be found, but the evil they left behind is still here. \nThe pressure of the flamethrower is %s degrees.\n\nC01 is rarely seen, usually hired by merchants or summoned!

actors.mobs.xtg100.name=Tengu-100
actors.mobs.xtg100.desc=An illusion that looks similar to Daitengu, but with only a quarter of Daitengu's health. You have completely angered them. They can still use flamethrowers, but the ammunition is not infinite. \n\\uFFE5��There are _%s rounds of ammunition left.

actors.mobs.xtg200.name=Tengu-100
actors.mobs.xtg200.desc=A phantom that looks similar to Tengu-100, but has only a quarter of the health of Tengu.

actors.mobs.sb.name=Dwarf Country Demise
actors.mobs.sb.notice=How dare you show off your skills in front of an expert
actors.mobs.sb.defeated=You can't kill me, %s... I am... immortal...
actors.mobs.sb.def_verb=Parry
actors.mobs.sb.arise=In my name, revive! Slaves!
actors.mobs.sb.rankings_desc=Fall before the dwarven kingdom
actors.mobs.shaman.zap_kill=The lightning ball will kill you completely...
actors.mobs.sb.desc=This is the spirit of the dwarven king. Now it is on the 24th floor waiting for the next adventurer to come.

###blobs
actors.blobs.blizzard.desc=A blizzard is swirling here.

actors.blobs.magicfire.good=Your weapon or armor is engulfed in magical fire, creating a new enchantment. It is:

actors.blobs.confusiongas.desc=A cloud of confusion gas is swirling here.

actors.blobs.electricity.desc=A field of electricity is sparking brightly here.
actors.blobs.electricity.rankings_desc=Electrocuted
actors.blobs.electricity.ondeath=You were shocked to death...

actors.blobs.fire.desc=A fire is raging here.

actors.blobs.foliage.desc=Shafts of light pierce the gloom of the underground garden.

actors.blobs.freezing.desc=The air is unnaturally frigid here.

actors.blobs.worstblizzardfx.desc=A snowstorm is raging here.

actors.blobs.goowarn.desc=Specks of dark energy are swarming here!

actors.blobs.inferno.desc=An inferno is raging here.

actors.blobs.paralyticgas.desc=A cloud of paralytic gas is swirling here.

actors.blobs.sacrificialfire.desc=There is an altar here with a sacrificial fire burning atop it. Any creature that's killed here will be consumed as an offering to the spirits of the dungeon.\n\nPerhaps a reward will be given if enough sacrifices are made?
actors.blobs.sacrificialfire.worthy=The fire consumes your offering and grows stronger.
actors.blobs.sacrificialfire.unworthy=The fire consumes your offering, but doesn't change.
actors.blobs.sacrificialfire.reward=The fire flares and then dissipates, leaving a reward behind!

actors.blobs.smokescreen.desc=A cloud of thick black smoke is swirling here.

actors.blobs.stenchgas.desc=A cloud of fetid stench is swirling here.

actors.blobs.stormcloud.desc=A cloud of billowing water vapor is swirling here.

actors.blobs.worststormcloud.desc=A cloud of billowing water vapor is swirling here.

actors.blobs.toxicgas.desc=A greenish cloud of toxic gas is swirling here.
actors.blobs.toxicgas.rankings_desc=Suffocated
actors.blobs.toxicgas.ondeath=You died from the toxic gas...

actors.blobs.corrosivegas.desc=A cloud of deadly caustic gas is swirling here.

actors.blobs.waterofawareness.procced=As you take a sip, you feel knowledge pour into your mind.
actors.blobs.waterofawareness.desc=Power of knowledge radiates from the water of this well. Take a sip from it to reveal all secrets of equipped items and reveal all items on the current floor.

actors.blobs.waterofhealth.procced=As you take a sip, you feel your wounds heal completely.
actors.blobs.waterofhealth.desc=Power of health radiates from the water of this well. Take a sip from it to heal your wounds and satisfy hunger.

actors.blobs.wateroftransmutation.desc=Power of change radiates from the water of this well. Throw an item into the well to turn it into something else.

actors.blobs.waterofoil.desc=The oil in this well can provide a certain amount of oil for the lantern.
actors.blobs.waterofoil.clear=You put the lantern into the oil well, and your remaining oil has increased.
actors.blobs.waterofoil.cl6=You can't fill your lantern since it's more than 60% full.

actors.blobs.web.desc=A thick web is covering everything here. Anything that touches or is thrown through the web will break it, but will also be stuck in place.

actors.buffs.venom.name=Venom Infection
actors.buffs.venom.heromsg=You are suffocating!
actors.buffs.venom.ondeath=You died from the scarlet gas...
actors.buffs.venom..rankings_desc=Suffocated to death...
actors.buffs.venom.desc=The highly toxic gas will burn the respiratory tract of the creature at an alarming rate.\n\nEach time the poison is damaged, the toxin will accumulate in the body. In the highly poisoned state, the target will go blind. If it falls into a severely poisoned state, the target will continue to suffocate and fall into a paralyzed state until death. \n\nRemaining poison amount: %1$s. \n\nCurrent venom damage: %2$d.





###buffs

actors.buffs.killer.name = Luck doesn't favor fools!
actors.buffs.killer.desc = Any melee damage you deal will kill non-boss units directly \n\nThis buff will last for %s turns

actors.buffs.goodluck.name = Good Luck
actors.buffs.goodluck.desc = The next monster you kill will trigger an additional drop of a non-highest rarity \n\nThis buff will last for %s turns

actors.buffs.adrenaline.name=Adrenaline
actors.buffs.adrenaline.desc=A surge of physical power, adrenaline enhanced both attack and movement speed.\n\nAdrenaline allows its target to run at 2x speed, and attack at 1.5x speed.\n\nTurns remaining: %s.

actors.buffs.adrenalinesurge.name=Adrenaline Surge
actors.buffs.adrenalinesurge.desc=A surge of great might, but sadly not permanent.\n\nStrength boost: +%d.\nTurns until boost weakens: %s.

actors.buffs.amok.name=Amok
actors.buffs.amok.desc=Amok causes a state of great rage and confusion in its target.\n\nWhen a creature is amoked, they will attack whatever is near them, whether they be friend or foe.\n\nTurns of amok remaining: %s.

actors.buffs.invulnerability.name=Invulnerability
actors.buffs.invulnerability.desc=Your Cross of Rebirth has consumed its energy, restoring your health and granting you a brief period of invulnerability! \n\nNumber of turns remaining: %s.

actors.buffs.invulnerability$goddied.name=The Wrath of the Creator God
actors.buffs.invulnerability$goddied.desc=The forgotten past, what are they hiding? For the sake of her people, she was willing to exile herself to bring peace. But who remembers her now? Is it time that has forgotten the pain of the past, or people who have forgotten her? \nStrange voices surround you, and you feel the same anger. In this state, physical damage is increased to 225%, damage of damaging staffs is x2, movement speed is increased by 2 times, and you are completely invincible.

actors.buffs.arcanearmor.name=Arcane Armor
actors.buffs.arcanearmor.desc=A thin shield is surrounding you, blocking some of the damage from magical attacks.\n\nYour magical armor is currently boosted by: 0-%d.\n\nTurns until arcane armor weakens: %s.

actors.buffs.artifactrecharge.name=Artifact Recharging
actors.buffs.artifactrecharge.desc=Energy is coursing through you, increasing the rate your equipped artifacts charge.\n\nEach artifact is affected a little differently, but they will all gain charge much faster than normal.\n\nTurns remaining: %s.

actors.buffs.barkskin.name=Barkskin
actors.buffs.barkskin.desc=Your skin is hardened, it feels rough and solid like bark.\n\nThe hardened skin increases your effective armor, allowing you to better defend against physical attack.\n\nYour armor is currently increased by: 0-%d.\nTurns until barkskin weakens: %s.

actors.buffs.barrier.name=Barrier
actors.buffs.barrier.desc=A durable bubble of force which blocks all damage.\n\nThe barrier will take damage for whatever it is protecting so long as there is shielding left. The shielding will also slowly decay over time.\n\nShielding remaining: %d.

actors.buffs.berserk.angered=Angered
actors.buffs.berserk.berserk=Berserking
actors.buffs.berserk.exhausted=Exhausted
actors.buffs.berserk.recovering=Recovering
actors.buffs.berserk.angered_desc=The severity of the berserker's injuries strengthen his blows. As the berserker takes physical damage, his rage will build, granting him bonus damage. Damage which is blocked by armor still counts towards building rage.\n\nRage will fade over time. The lower the berserker's health, the longer it will last.\n\nIf the berserker is brought to 0 hp while at full rage, and is wearing his seal, he will go berserk and _refuse to die_ for a short time.\n\nCurrent Rage: _%.0f%%_\n_+%.0f%%_ damage
actors.buffs.berserk.berserk_desc=At the brink of death, fear and uncertainty bleed away, leaving only anger. In this state of near-death the berserker is extremely powerful _dealing +50% damage, gaining bonus shielding, and refusing to die._\n\nThis bonus shielding is stronger the better the berserker's armor, and will deplete over time. When this shielding is reduced to 0, the berserker will give in and die.\n\nAny form of healing will return the berserker to stability, but he will be exhausted. While exhausted, the berserker will need to gain experience before being able to build rage again.
actors.buffs.berserk.recovering_desc=Inner strength has its limits. The berserker must rest before using his rage again.\n\nWhile recovering the berserker does not build any rage from taking damage.\n\nLevels until recovered: _%.2f_
actors.buffs.berserk.no_rages=Berserking will also permanently wear on him, reducing his max health each time.
actors.buffs.berserk.past_rages=Times berserker has raged: _%d_\nMax health reduced to: _%d%%_
actors.buffs.berserk.rankings_desc=Berserked to Death
actors.buffs.berserk.recovering_desc_turns=Recovering turns: %d
actors.buffs.berserk.recovering_desc_levels=---------------------
actors.buffs.berserk.action_name=Berserk
actors.buffs.berserk.no_seal=You need your Broken Seal to enter Berserk!

actors.buffs.bleeding.name=Bleeding
actors.buffs.bleeding.ondeath=You bled to death...
actors.buffs.bleeding.heromsg=You are bleeding!
actors.buffs.bleeding.rankings_desc=Bled to Death
actors.buffs.bleeding.desc=That wound is leaking a worrisome amount of blood.\n\nBleeding causes damage every turn. Each turn the damage decreases by a random amount, until the bleeding eventually stops.\n\nCurrent bleed damage: %d.

actors.buffs.bless.name=Blessed
actors.buffs.bless.desc=A great burst of focus, some say it is inspired by the gods.\n\nBlessing increases accuracy and evasion by 25%%, making the blessed much more effective in combat.\n\nTurns of bless remaining: %s.

actors.buffs.blindness.name=Blinded
actors.buffs.blindness.heromsg=You are blinded!
actors.buffs.blindness.desc=Blinding turns the surrounding world into a dark haze.\n\nWhile blinded, a character can't see more than one tile infront of themselves, rendering ranged attacks useless and making it very easy to lose track of distant enemies. Additionally, a blinded hero is unable to read scrolls or books.\n\nTurns of blindness remaining: %s.

actors.buffs.burning.name=Burning
actors.buffs.burning.heromsg=You catch fire!
actors.buffs.burning.burnsup=%s burns up!
actors.buffs.burning.ondeath=You burned to death...
actors.buffs.burning.rankings_desc=Burned to Ash
actors.buffs.burning.desc=Few things are more distressing than being engulfed in flames.\n\nFire will deal damage every turn until it is put out by water or it expires. Fire can be extinquished by stepping into water, or from the splash of a shattering potion.\n\nAdditionally, the fire may ignite flammable terrain or items that it comes into contact with.\n\nTurns of burning remaining: %s.

actors.buffs.championenemy.warn=You sense a deadly presence.
actors.buffs.championenemy$blazing.name=blazing champion
actors.buffs.championenemy$blazing.desc=Blazing champions deal 25% more melee damage, ignite enemies they attack, are immune to fire, and spread fire around them as they die.
actors.buffs.championenemy$projecting.name=projecting champion
actors.buffs.championenemy$projecting.desc=Projecting champions deal 25% more melee damage, and are able to attack any enemy that they can see.
actors.buffs.championenemy$antimagic.name=antimagic champion
actors.buffs.championenemy$antimagic.desc=Antimagic champions take 25% less damage and are completely immune to magical effects.
actors.buffs.championenemy$giant.name=giant champion
actors.buffs.championenemy$giant.desc=Giant champions take 75% less damage and have +1 attack range, but cannot move through enclosed spaces.
actors.buffs.championenemy$blessed.name=blessed champion
actors.buffs.championenemy$blessed.desc=Blessed champions have 200% more accuracy and evasion.
actors.buffs.championenemy$growing.name=growing champion
actors.buffs.championenemy$growing.desc=Growing champions gain a steadily increasing bonus to accuracy, evasion, melee damage, and a reduction to damage taken.\n\nCurrent acc/eva/dmg boost: %1$d%%\nCurrent damage reduction: %2$d%%


actors.buffs.championenemy$alonecity.name=Alone City Mark
actors.buffs.championenemy$alonecity.desc=The monsters wandering in the lonely city are the most powerful souls ever. \n\nThe Alone City Mark has steadily increasing additional accuracy, dodge, melee damage and damage reduction, as well as initial health increase. \n\nCurrent accuracy, dodge, melee damage bonus: %1$d%%\nCurrent initial health increase: %2$d%% (if the health is not an integer, it will not be added)

actors.buffs.championenemy$halo.name=Ghost Phosphorus Elite
actors.buffs.championenemy$halo.desc=Ghost Phosphorus Elite causes 15% additional melee damage, will use more powerful phosphorus fire to ignite the target, immune to fire, immune to phosphorus fire.

actors.buffs.championenemy$delaymob.name=Pain Elite
actors.buffs.championenemy$delaymob.desc=Pain Elite can release the damage in time, with 45% additional melee damage and 60% damage reduction.

actors.buffs.championenemy$king.name=Infernal Elite
actors.buffs.championenemy$king.desc=Infernal Elite causes 45% additional melee damage and 30% damage reduction. Attacking has a chance to summon an enemy on the same level to attack.


actors.buffs.championenemy.warn2=Killing and ominous meanings shroud the entire dungeon...

actors.buffs.championenemy$small.name=Failed Mutation
actors.buffs.championenemy$small.desc=Global movement speed increases by 30%, and attack decreases by 35%. \n\nThe fate of failed mutations is usually tragic. They may end up being cannibalized by their own kind, or completely leave the world due to exhaustion during the process of re-mutation...

actors.buffs.championenemy$bomber.name=Mutation Explosion
actors.buffs.championenemy$bomber.desc=Generally speaking, the initial movement speed is 0.5, the attack power is reduced by 30%, and death causes a lot of explosion damage, so you need to be careful. \n\nMutation Explosions are born to explode. They are corroded by mysterious forces, so the explosion damage is extremely strong.

actors.buffs.championenemy$middle.name=Full Mutation
actors.buffs.championenemy$middle.desc=Global movement speed increased by 50%, attack power increased by 25%, and has 30% damage reduction\n\nFull Mutation seems to have no disadvantages, but the problem is that the success of some individuals does not mean that we can compete with her...

actors.buffs.championenemy$big.name=Dangerous Mutation
actors.buffs.championenemy$big.desc=Attack power increased by 20%, and attacks have a 20% chance of causing bleeding. There is a 5% chance of immediately sending an alarm to this floor when dying. \n\nDangerous Mutation is just like its name, full of a sense of crisis. It is not a good thing to meet it here... It is recommended to take a detour.

actors.buffs.championenemy$healright.name=Phase Mutant
actors.buffs.championenemy$healright.desc=This mutant will teleport randomly after hitting an enemy with the first 4 attacks, and will slowly regenerate health when not in your sight\n\nCurrent cumulative teleport times: %d

actors.buffs.championenemy$longsider.name=Mutant Smoke
actors.buffs.championenemy$longsider.desc=Attack power reduced by 10%, attack range +2, 10% chance to stun enemies when attacking...\n\nMutant Smoke likes to harass enemies from a distance, he comes and goes like smoke...

actors.buffs.championenemy$sider.name=Mutant Acid
actors.buffs.championenemy$sider.desc=Enemy with this entry gains ranged attack, attack range +2, deals 20% of the damage you can deal as extra spell damage and has a chance to randomly generate a harmful smoke. \n\nMutant Acid likes to use acid to attack enemies, their acid instability can cause a lot of damage, but this deadly acid takes time to prepare, so their attack speed will be reduced by _300%_. \n\nTheir acid is not infinite, if there is no acid, they will start regular attacks. \n\nSome enemies mutate into acid liquid and perform multiple combos to cause huge damage.
actors.buffs.championenemy$sider.death=You are corroded to death by the poisonous mist released by the acid liquid...

actors.buffs.charm.name=Charmed
actors.buffs.charm.heromsg=You are charmed!
actors.buffs.charm.desc=A charm is manipulative magic that can make enemies temporarily adore each other.\n\nCharacters affected by charm are unable to directly attack the enemy they are charmed by. Attacking other targets is still possible however. The shock of pain will lessen the duration of charm.\n\nTurns of charm remaining: %s.

actors.buffs.charm$charmling.name=Absolute Charm
actors.buffs.charm$charmling.desc=Absolute Charm is a vicious and ancient magic.\n\nCharmed units will not be able to perform any damage on the charmer, and physical damage is reduced by 25%.\n\nPain will anger the charmed unit, reducing the duration of the Absolute Charm state.\n\nAbsolute Charm remaining duration: %s rounds.

actors.buffs.chill.name=Chilled
actors.buffs.chill.freezes=%s freezes!
actors.buffs.chill.desc=Not quite frozen, but still much too cold.\n\nChilled targets perform all actions more slowly, depending on how many turns are left in the effect. At its worst, this is equivalent to being slowed.\n\nTurns of chill remaining: %1$s.\nSpeed is reduced by: %2$s%%

actors.buffs.worstblizzard.name=Worst Blizzard
actors.buffs.worstblizzard.desc=No one can hold on in a blizzard. In colder areas, the impact of the blizzard will be more severe. \n\nAll actions of the target in the wind and snow will be slower. \n\nCurrently reduced action speed: %d%%\n\nYou are not currently in a cold area, so there will be no additional special effects on the target.
actors.buffs.worstblizzard.effect=No one can hold on in a blizzard. In colder areas, the impact of the blizzard will be more severe. \n\nAll actions of the target in the wind and snow will be slower. \n\nCurrently reduced action speed: %d%%\n\nYou are not currently in a cold area, so there will be no additional special effects on the target. \n\nCurrently reduced action speed: %1$s%%\n\nYou are currently in a cold area, the target's defense and accuracy will be greatly reduced, details are as follows:\n\nTarget defense reduction: %2$s%%\nTarget hit reduction: %3$s%%

actors.buffs.combo.name=Combo
actors.buffs.combo.action_name=combo attack
actors.buffs.combo.combo=%d hit combo!
actors.buffs.combo.bad_target=You must target an enemy in attack range.
actors.buffs.combo.prompt=Select a target to attack.
actors.buffs.combo.desc=The gladiator builds momentum as they land successful blows. Each attack increases the combo counter by one, but taking too long between hits will reset the combo counter to 0.\n\nBuilding combo unlocks special combo attacks that cannot miss! A different attack is unlocked at 2, 4, 6, 8, and 10 combo count. Some moves reset combo and some do not, but each move can only be used once per combo session.\n\nCurrent combo: %1$d.\n\nTurns until Combo is lost: %2$s.
actors.buffs.combo$combomove.crush.name=Shock
actors.buffs.combo$combomove.crush.desc=Deal 60%% damage to the target and surrounding units. This attack ignores armor and is guaranteed to hit.
actors.buffs.combo$combomove.crush.finish_desc=Deal _%d%%_(combo count*15%%) damage to the target and all enemies within a 7*7 range. This attack ignores armor and is guaranteed to hit.
actors.buffs.combo$combomove.parry.name=Parry
actors.buffs.combo$combomove.parry.desc=Parry the first attack received in the next round and immediately launch a counterattack.
actors.buffs.combo$combomove.parry.finish_desc=Parry all attacks received in the next round and launch a counterattack. The counterattack deals _%d%%_(combo number*20%%) damage and is guaranteed to hit.
actors.buffs.combo$combomove.cleave.name=Cleave
actors.buffs.combo$combomove.cleave.desc=Launch a guaranteed attack on the target. If the target is killed, increase the combo by 2 points.
actors.buffs.combo$combomove.cleave.finish_desc=Deal _%d%%_(combo number*25%%) damage to the target. If the target is killed, half of the combo count is immediately refunded.
actors.buffs.combo$combomove.fury.name=Fury
actors.buffs.combo$combomove.fury.desc=Hit the target twice quickly with lower accuracy, each attack deals 75%% damage and can trigger enchantments.
actors.buffs.combo$combomove.fury.finish_desc=Hit the target _%d_(combo count) times quickly with lower accuracy, each attack deals 75%% damage and can trigger enchantments.
actors.buffs.combo$combomove.spurt.name=Spurt
actors.buffs.combo$combomove.spurt.desc=Sprint to a location 4 blocks away. Cannot pass through enemies and obstacles, but can jump over chasms.
actors.buffs.combo$combomove.spurt.finish_desc=Dash to a location _%1$d_(combo count/2) blocks away and gain _%2$d_(combo count/2) turns of steroids.
actors.buffs.combo$combomove.finish.name=Finish
actors.buffs.combo$combomove.finish.desc=Convert all skills into finishing moves. Finishing moves gain combo count bonus and reset combo when cast.
actors.buffs.combo$combomove.calm.name=Calm
actors.buffs.combo$combomove.calm.finish_desc=Clear most negative effects and gain slow recovery of current lost health equal to _%1$d%%_(combo count*2%%).

actors.buffs.corruption.name=Corrupted
actors.buffs.corruption.desc=Corruption seeps into the essence of a being, twisting them against their former nature.\n\nCorrupted creatures will attack their allies, and ignore their former enemies. Corruption is damaging as well, and will slowly cause its target to succumb.\n\nCorruption is permanent, its effects only end in death.

actors.buffs.cripple.name=Crippled
actors.buffs.cripple.heromsg=You are crippled!
actors.buffs.cripple.desc=You're pretty sure legs aren't meant to bend that way.\n\nCrippled halves movement speed, making moving a tile usually take two turns instead of one.\n\nTurns of cripple remaining: %s.

actors.buffs.degrade.name=Degraded
actors.buffs.degrade.heromsg=Your equipment feels weaker!
actors.buffs.degrade.desc=Powerful dark magic is sapping the strength that scrolls of upgrade have applied to your equipment!\n\nWhile degraded, upgraded gear will be treated as if it is a lower level than it actually is. _Every upgrade after +3 becomes exponentially weaker than the last one._ The descriptions of your items will change to reflect their reduced power level.\n\nDegradation does not affect strength requirements, wand charges, durability of thrown weapons, or artifacts.\n\nTurns of degradation remaining: %s. Using a scroll of upgrade or remove curse will end degradation immediately.

actors.buffs.doom.name=Doomed
actors.buffs.doom.desc=It's hard to keep going when it seems like the universe wants you dead.\n\nDoomed characters will receive double damage from all sources.\n\nDoom is permanent, its effects only end in death.

actors.buffs.dread.name=Dread
actors.buffs.dread.desc=A terror so great that it will cause its target to flee the dungeon entirely!\n\nCreatures affected by dread will run from their opponent at high speed, and will disappear from the dungeon entirely once they are out of sight. Enemies that are defeated this way award half experience and drop no items. The shock of pain will lessen the duration of dread.\n\nTurns of dread remaining: %d.

actors.buffs.drowsy.name=Drowsy
actors.buffs.drowsy.desc=A magical force is making it difficult to stay awake.\n\nThe hero can resist drowsiness by taking damage or by being at full health.\n\nAfter a few turns, the target will fall into a deep magical sleep.

actors.buffs.earthimbue.name=Imbued with Earth
actors.buffs.earthimbue.desc=You are imbued with the power of earth!\n\nAll physical attacks will shift the earth under the enemy, crippling them for a short time.\n\nTurns of earth imbue remaining: %s.

actors.buffs.enhancedrings.name=Enhanced Rings
actors.buffs.enhancedrings.desc=The Rogue's recently used artifact is empowering his rings. Granting them +1 upgrade for %d more turns.

actors.buffs.fireimbue.name=Imbued with Fire
actors.buffs.fireimbue.desc=You are imbued with the power of fire!\n\nAll physical attacks will have a chance to light enemies ablaze. Additionally, you are completely immune to the effects of fire.\n\nTurns of fire imbue remaining: %s.

actors.buffs.foresight.name=Foresight
actors.buffs.foresight.desc=You are somehow able to see the layout of surrounding terrain with your mind.\n\nWhile under the effect of foresight all tiles in a wide radius are revealed to you, including any secret traps or doors.\n\nTurns of foresight remaining: %s.

actors.buffs.frost.name=Frozen
actors.buffs.frost.freezes=%s freezes!
actors.buffs.frost.desc=Not to be confused with freezing solid, this more benign freezing simply encases the target in ice.\n\nFreezing acts similarly to paralysis, making it impossible for the target to act. Unlike paralysis, freezing is immediately cancelled if the target takes damage, as the ice will shatter.\n\nTurns of freeze remaining: %s.

actors.buffs.frostimbue.name=Imbued with Frost
actors.buffs.frostimbue.desc=You are imbued with icy power!\n\nAll physical attacks will steadily stack chill on enemies. Additionally, you are completely immune to the cold.\n\nTurns of frost imbue remaining: %s.

actors.buffs.fury.name=Furious
actors.buffs.fury.heromsg=You become furious!
actors.buffs.fury.desc=You are angry, enemies won't like you when you're angry.\n\nA great rage burns within you, increasing the damage you deal with physical attacks by 50%%.\n\nThis rage will last as long as you are injured below 50%% health.

actors.buffs.blobimmunity.name=Purification Barrier
actors.buffs.blobimmunity.desc=Some strange force is encasing you in a thin protective barrier, blocking out all harmful airborne effects.\n\nYou are immune to all area-bound effects while this barrier lasts.\n\nTurns of immunity remaining: %s.

actors.buffs.haste.name=Haste
actors.buffs.haste.desc=Energy courses through your muscles, allowing you to run at incredible speeds!\n\nWhile under the effects of haste you will run at 3x speed, but will perform all other actions at normal speed.\n\nTurns of haste remaining: %s.

actors.buffs.healing.name=Healing
actors.buffs.healing.desc=A magical remedy is causing wounds to close and flesh to knit.\n\nEvery turn health will steadily regenerate until the healing effect expires. The amount of healing may fade over time.\n\nNext heal: %d.\n\nHealing remaining: %d.

actors.buffs.hex.name=Hexed
actors.buffs.hex.heromsg=You have been hexed!
actors.buffs.hex.desc=Dark magic which saps focus, making the target slightly disoriented.\n\nHexing reduces accuracy and evasion by 20%%, making the target less effective in combat.\n\nTurns of hex remaining: %s.

actors.buffs.holdfast.name=Hold Fast
actors.buffs.holdfast.desc=The Warrior is holding his position, increasing his armor by 0-%d. This will last until he moves.

actors.buffs.hunger.hungry=Hungry
actors.buffs.hunger.starving=Starving
actors.buffs.hunger.onhungry=You are hungry.
actors.buffs.hunger.onstarving=You are starving!
actors.buffs.hunger.ondeath=You starved to death...
actors.buffs.hunger.cursedhorn=The cursed horn steals some of the food energy as you eat.
actors.buffs.hunger.rankings_desc=Starved to Death
actors.buffs.hunger.desc_intro_hungry=You can feel your stomach calling out for food, but it's not too urgent yet.
actors.buffs.hunger.desc_intro_starving=You're so hungry it hurts.
actors.buffs.hunger.desc=\n\nHunger slowly increases as you spend time in the dungeon, eventually you will begin to starve. While starving you will slowly lose health instead of regenerating it.\n\nRationing is important! If you have health to spare starving isn't a bad idea if it means there will be more food later. Effective rationing can make food last a lot longer!

actors.buffs.invisibility.name=Invisible
actors.buffs.invisibility.desc=You are completely blended into the surrounding terrain, making you impossible to see.\n\nWhile you are invisible enemies are unable to attack or follow you. Physical attacks and magical effects (such as scrolls and wands) will immediately cancel invisibility.\n\nTurns of invisibility remaining: %s.

actors.buffs.levitation.name=Levitating
actors.buffs.levitation.desc=A magical force is levitating you over the ground, making you feel weightless.\n\nWhile levitating you ignore all ground-based effects. Traps won't trigger, water won't put out fire, plants won't be trampled, roots will miss you, and you will hover right over pits. Be careful, as all these things can come into effect the second the levitation ends!\n\nTurns of levitation remaining: %s.

actors.buffs.lifelink.name=Life Link
actors.buffs.lifelink.desc=This characters's life force is linked to another character nearby. Any damage taken is shared between them.\n\nWhenever this character takes damage, half of it will be dealt to the life link target instead.\n\nTurns of life link remaining: %s, or until the linked character dies.

actors.buffs.light.name=Illuminated
actors.buffs.light.desc=Even in the Darkest Dungeon, a steady light at your side is always comforting.\n\nLight helps keep darkness at bay, allowing you to see a reasonable distance despite the environment.\n\nTurns of illumination remaining: %s.

actors.buffs.lockedfloor.name=Floor is Locked
actors.buffs.lockedfloor.desc=The current floor is locked, and you are unable to leave it!\n\nWhile a floor is locked, you will not gain hunger or take damage from starving. In addition, if you do not work towards defeating this floor's boss, passive regeneration effects will also stop.\n\nAdditionally, if you are revived by an unblessed ankh while the floor is locked, then it will reset.\n\nKill this floor's boss to break the lock.

actors.buffs.lostinventory.name=Lost Inventory
actors.buffs.lostinventory.desc=Your inventory has been lost somewhere in the dungeon! You won't be able to pick up or use most items until you retrieve it.

actors.buffs.magicalsight.name=Magical Sight
actors.buffs.magicalsight.desc=Somehow you are able to see with your mind, rather than your eyes.\n\nAll terrain or effects which reduce or block vision are broken while magical sight is active, and your vision range is increased by 50%%.\n\nTurns of magical sight remaining: %s.

actors.buffs.magicalsleep.name=Magical Sleep
actors.buffs.magicalsleep.toohealthy=You are too healthy, and resist the urge to sleep.
actors.buffs.magicalsleep.fallasleep=You fall into a deep magical sleep.
actors.buffs.magicalsleep.wakeup=You wake up feeling refreshed and healthy.
actors.buffs.magicalsleep.desc=This character has fallen into a deep magical sleep which they will not wake from naturally.\n\nMagical sleep is similar to regular sleep, except that only damage will cause the target to wake up.\n\nFor the hero, magical sleep has some restorative properties, allowing them to rapidly heal while resting.

actors.buffs.magicimmune.name=Immune to Magic
actors.buffs.magicimmune.desc=All magical effects have lost their hold on you, you are completely impervious to them.\n\nWhile magic immune all harmful and helpful magical effects will not apply to you, including curses, enchants, wands, scrolls, etc.\n\nTurns of magic immunity remaining: %s.

actors.buffs.mindvision.name=Mind vision
actors.buffs.mindvision.desc=Somehow you are able to see all creatures on this floor through your mind. It's a weird feeling.\n\nAll characters on this floor are visible to you as long as you have mind vision. Seeing a creature through mind vision counts as it being seen or nearby for the purposes of many magical effects.\n\nTurns of mind vision remaining: %s.

actors.buffs.momentum.momentum=Building Momentum
actors.buffs.momentum.running=Freerunning
actors.buffs.momentum.resting=Recovering
actors.buffs.momentum.action_name=freerun
actors.buffs.momentum.momentum_desc=As he moves, the Freerunner builds momentum, which he can spend to start freerunning.\n\nEach charge of momentum grants two turns of freerunning, and the Freerunner can build up to 10 charges. Momentum is rapidly lost when the Freerunner stops moving.\n\nCurrent momentum charge: %d.
actors.buffs.momentum.running_desc=As he moves, the Freerunner builds momentum, which he can spend to start freerunning.\n\nWhile freerunning, the Freerunner moves at double speed and gains bonus evasion based on his level.\n\nTurns remaining: %d.
actors.buffs.momentum.resting_desc=As he moves, the Freerunner builds momentum, which he can spend to start freerunning.\n\nThe Freerunner needs time to regain his stamina before building momentum again.\n\nTurns remaining: %d.

actors.buffs.ooze.name=Caustic ooze
actors.buffs.ooze.heromsg=Caustic ooze eats your flesh. Wash it away!
actors.buffs.ooze.ondeath=You melt away...
actors.buffs.ooze.rankings_desc=Dissolved
actors.buffs.ooze.desc=This sticky acid clings to flesh, slowly melting it away.\n\nOoze will deal consistent damage over time, but can be immediately washed off in water.\n\nTurns of ooze remaining: %s.

actors.buffs.paralysis.name=Paralysed
actors.buffs.paralysis.heromsg=You are paralysed!
actors.buffs.paralysis.out=resisted paralysis
actors.buffs.paralysis.desc=Oftentimes the worst thing to do is nothing at all.\n\nParalysis completely halts all actions, forcing the target to wait until the effect wears off. The pain from taking damage can cause characters to resist paralysis, breaking them out of the effect.\n\nTurns of paralysis remaining: %s.

actors.buffs.pincushion.name=Pincushion
actors.buffs.pincushion.desc=The thrown weapons you have used against this character are currently stuck to them and will fall to the floor after they are defeated.\n\nThe following items are currently attached:

actors.buffs.poison.name=Poisoned
actors.buffs.poison.heromsg=You are poisoned!
actors.buffs.poison.ondeath=You died from poison...
actors.buffs.poison.rankings_desc=Succumbed to Poison
actors.buffs.poison.desc=Poison works its way through the body, slowly impairing its internal functioning.\n\nPoison deals damage each turn proportional to how long until it expires.\n\nTurns of poison remaining: %s.

actors.buffs.preparation.name=Preparation
actors.buffs.preparation.action_name=prepared strike
actors.buffs.preparation.desc=The Assassin is waiting patiently, preparing to strike from the shadows.
actors.buffs.preparation.desc_dmg=His next attack will deal _%1$d%% bonus damage_, and will execute regular enemies below _%2$d%% health_, or bosses below _%3$d%% health_.
actors.buffs.preparation.desc_dmg_likely=The attack will also be more likely to deal a larger amount of damage.
actors.buffs.preparation.desc_blink=He is able to blink towards an enemy before striking them, with a max distance of _%d._
actors.buffs.preparation.desc_invis_time=Turns spent invisible: _%d._
actors.buffs.preparation.desc_invis_next=Turns for stronger attack: _%d._
actors.buffs.preparation.prompt=Select a target to attack!\nMax blink distance: %d
actors.buffs.preparation.no_target=There's nothing to attack there.
actors.buffs.preparation.out_of_reach=That target is out of reach.
actors.buffs.preparation.assassinated=assassinated

actors.buffs.prismaticguard.name=Prismatic Guard
actors.buffs.prismaticguard.desc=You are being guarded by a prismatic image which is currently inactive. When enemies are present the prismatic image will spring to action and protect you!\n\nWhile inactive, the prismatic image will steadily recover from any damage it has taken.\n\nCurrent HP: %d/%d.

actors.buffs.recharging.name=Recharging
actors.buffs.recharging.desc=Energy is coursing through you, improving the rate that your wands and staffs charge.\n\nEach turn this buff will increase current charge by one quarter, in addition to regular recharge.\n\nTurns of recharging remaining: %s.

actors.buffs.revealedarea.name=Revealed Area
actors.buffs.revealedarea.desc=An area of the dungeon has been temporarily revealed to the hero, They will see it no matter where they are.\n\nTurns remaining: %s.

actors.buffs.revealedchar.name=Revealed
actors.buffs.revealedchar.desc=This character is revealed to the hero, They will be visible no matter where they are.\n\nTurns remaining: %s.

actors.buffs.roots.name=Rooted
actors.buffs.roots.heromsg=You can't move!
actors.buffs.roots.desc=Roots (magical or natural) grab at the feet, forcing them down to the ground.\n\nRoots lock a target in place, making it impossible for them to move, but other actions are not affected.\n\nTurns of root remaining: %s.

actors.buffs.scrollempower.name=Scroll Empower
actors.buffs.scrollempower.desc=The energy from the Mage's recently read scroll is empowering his wands!\n\nLevel Boost: +%1$d.\nZaps remaining: %2$d.

actors.buffs.shadows.name=Shadowmelded
actors.buffs.shadows.desc=You are blended into the shadows around you, granting you invisibility and slowing your metabolism.\n\nWhile you are invisible enemies are unable to attack or follow you. Most physical attacks and magical effects (such as scrolls and wands) will immediately cancel invisibility. Additionally, while shadowmelded, your rate of hunger is slowed.\n\nYou will remain shadowmelded until you leave the shadows or an enemy comes into contact with you.

actors.buffs.slow.name=Slowed
actors.buffs.slow.desc=Slowing magic affects the target's rate of time, to them everything is moving super-fast.\n\nA slowed character performs all actions in twice the amount of time they would normally take.\n\nTurns of slow remaining: %s.

actors.buffs.snipersmark.name=Sniper's mark
actors.buffs.snipersmark.action_name_snapshot=snapshot
actors.buffs.snipersmark.action_name_volley=volley
actors.buffs.snipersmark.action_name_sniper=sniper shot
actors.buffs.snipersmark.desc=The Sniper is honed in on the target she most recently attacked. She is able to perform a special attack with her bow which will vary based on how the bow is augmented.\n\nAn unaugmented bow will fire a _snapshot,_ which deals reduced damage but does not take any time to fire.\n\nA bow augmented for speed will fire a _volley_ of three arrows. Each arrow will deal reduced damage, but can still activate enchantment. This volley takes 1 turn to shoot.\n\nA bow augmented for damage will fire a _sniper shot._ This shot is guaranteed to hit, deals bonus damage based on distance from the target, and takes 2 turns to fire.

actors.buffs.soulmark.name=Soul Marked
actors.buffs.soulmark.desc=The warlock has tapped into the soul of this creature, allowing him to heal as it takes physical damage.\n\nTurns of soul mark remaining: %s.

actors.buffs.stamina.name=Stamina
actors.buffs.stamina.desc=You have unending stamina, allowing for faster movement!\n\nWhile under the effects of stamina you will run at +50%% speed, but will perform all other actions at normal speed.\n\nTurns of stamina remaining: %s.

actors.buffs.vulnerable.name=Vulnerable
actors.buffs.vulnerable.heromsg=You feel fragile!
actors.buffs.vulnerable.desc=Vulnerability magic increases all physical damage that a character takes by 33%%, after that damage has been reduced by armor.\n\nTurns of vulnerable remaining: %s.

actors.buffs.nyctophobia$noroadmobs.name=Death Cycle
actors.buffs.nyctophobia$noroadmobs.desc=If you can't even defend the light in your own heart, how can you save others? \n\nBecause your light energy is too low, a witch has cursed you. To get rid of the curse, you need to increase your light as soon as possible. \n\nPeriodically teleport some enemies to the hero. Only by increasing the light can you get rid of this curse.
actors.buffs.nyctophobia.dead=Death is just a moment. Your light is 0 and you will receive real damage periodically!
actors.buffs.nyctophobia.damage=Current light deduction: %s points\n
actors.buffs.nyctophobia.lanter=Current light deduction round cycle: %s rounds

actors.buffs.terror.name=Terrified
actors.buffs.terror.desc=Terror is manipulative magic which forces its target into an uncontrollable panic.\n\nTerrified characters are forced to run away from their opponent, trying to put as many doors and walls between them as possible. The shock of pain will lessen the duration of terror, however.\n\nTurns of terror remaining: %s.

actors.buffs.toxicimbue.name=Imbued with Toxicity
actors.buffs.toxicimbue.desc=You are imbued with poisonous energy!\n\nAs you move around toxic gas will constantly billow forth from you, damaging your enemies. You are immune to toxic gas and poison for the duration of the effect.\n\nTurns of toxic imbue remaining: %s.

actors.buffs.corrosion.name=Corrosion
actors.buffs.corrosion.heromsg=You are melting!
actors.buffs.corrosion.ondeath=You melt away...
actors.buffs.corrosion.rankings_desc=Dissolved
actors.buffs.corrosion.desc=Powerful acid melts away flesh, metal, and bone at an alarming rate.\n\nCorrosion damage increases over time, as the target continues to melt away.\n\nTurns of corrosion remaining: %1$s.\nCurrent corrosion damage: %2$d.

actors.buffs.vertigo.name=Vertigo
actors.buffs.vertigo.desc=Walking in a straight line can be difficult when the whole world is spinning.\n\nWhile under the effects of vertigo, characters who attempt to move will go in a random direction, instead of the one they intended to go in.\n\nTurns of vertigo remaining: %s.

actors.buffs.wandempower.name=Wands Empowered
actors.buffs.wandempower.desc=Your damage-dealing wands have been empowered, increasing the amount of damage they deal for a few zaps.\n\nBonus damage: %1$d.\nZaps remaining: %2$d.

actors.buffs.weakness.name=Weakened
actors.buffs.weakness.heromsg=You feel weakened!
actors.buffs.weakness.desc=Everything suddenly seems much heavier.\n\nWeakening magic reduces a character's physical strength, causing them to deal 33%% reduced damage.\n\nTurns of weakness remaining: %s.

actors.buffs.wellfed.name=Well Fed
actors.buffs.wellfed.desc=You feel quite satisfied and full.\n\nWhile well fed, your hunger will not increase, and you will heal an additional amount of health over time.\n\nTurns remaining: %d.



###hero

##abilities
actors.hero.abilities.armorability.self_target=You can't target yourself!
actors.hero.abilities.armorability.no_target=There's nothing to target there!
actors.hero.abilities.armorability.prompt=Choose a location to target
actors.hero.abilities.armorability.cost=Charge cost: _%d_

actors.hero.abilities.warrior.heroicleap.name=heroic leap
actors.hero.abilities.warrior.heroicleap.prompt=Choose direction to leap
actors.hero.abilities.warrior.heroicleap.short_desc=The Warrior performs a _Heroic Leap_ towards a targeted location, sailing above enemies and hazards.
actors.hero.abilities.warrior.heroicleap.desc=The Warrior leaps toward a targeted location, going over any enemies or hazards in the way. He cannot leap over walls or other solid terrain however.
actors.hero.abilities.warrior.shockwave.name=shockwave
actors.hero.abilities.warrior.shockwave.short_desc=The Warrior releases a _Shockwave_ in a conical AOE by slamming the ground. Enemies caught in the shockwave are damaged and crippled.
actors.hero.abilities.warrior.shockwave.desc=The Warrior slams the ground, producing a shockwave that travels up to 5 tiles in a 60 degree cone.\n\nEnemies caught in this shockwave are crippled for 5 turns. They also take 5-10 damage, plus an additional 1-2 damage for every point of strength the Warrior has above 10.
actors.hero.abilities.warrior.endure.name=endure
actors.hero.abilities.warrior.endure$enduretracker.name=Endurance
actors.hero.abilities.warrior.endure$enduretracker.desc=The Warrior is now dealing bonus damage based on the damage he endured.\n\nBonus Damage: %1$d\nHits Left: %2$d
actors.hero.abilities.warrior.endure.short_desc=The Warrior _Endures_, skipping several turns but gaining high damage resistance. He then deals bonus damage based on what he endured.
actors.hero.abilities.warrior.endure.desc=The Warrior endures for 3 turns, taking half damage from all sources. This reduction is applied before damage resisting effects like armor.\n\nAfter enduring, the warrior's next hit within 10 turns gains bonus damage. This bonus damage is equal to one third of all the damage inflicted on him while enduring, before any damage reduction effects!\n\nIf the warrior has any combo, using this ability increases its remaining time by 3 turns.

actors.hero.abilities.mage.elementalblast.name=elemental blast
actors.hero.abilities.mage.elementalblast.short_desc=The Mage emits an _Elemental Blast_ from his staff, covering a large area around him in an effect that varies based on the wand in his staff.
actors.hero.abilities.mage.elementalblast.desc=The Mage emits a blast of magic, which covers a circular region up to 4 tiles away and deals up to 15-25 damage. The specific effect of elemental blast will vary by the wand imbued in the Mage's staff.
actors.hero.abilities.mage.elementalblast.generic_desc=The effect of elemental blast will be similar to the effect of the wand when zapped at an enemy or ally.
actors.hero.abilities.mage.wildmagic.name=wild magic
actors.hero.abilities.mage.wildmagic.no_wands=You have no wands to zap with!
actors.hero.abilities.mage.wildmagic.short_desc=The Mage unleashes the _Wild Magic_ contained in his wands, randomly firing them multiple times at a chosen target over a single turn.
actors.hero.abilities.mage.wildmagic.desc=The Mage unleashes the power in his wands, randomly firing them up to 4 times in a single turn. The Mage's staff is not included in this effect.\n\nEach wand also has its level boosted by 1, up to +2. This ability does consume wand charges, and no one wand can be fired more than 2 times.
actors.hero.abilities.mage.warpbeacon.name=warp beacon
actors.hero.abilities.mage.warpbeacon.depths=You can't warp between depths!
actors.hero.abilities.mage.warpbeacon.locked_floor=You cannot leave a locked floor!
actors.hero.abilities.mage.warpbeacon.too_far=That location is too far!
actors.hero.abilities.mage.warpbeacon.invalid_beacon=You can't place a beacon there!
actors.hero.abilities.mage.warpbeacon.window_desc=Your beacon is currently placed on floor %d.
actors.hero.abilities.mage.warpbeacon.window_tele=teleport to beacon
actors.hero.abilities.mage.warpbeacon.window_clear=clear beacon
actors.hero.abilities.mage.warpbeacon.window_cancel=cancel
actors.hero.abilities.mage.warpbeacon.short_desc=The Mage places a _Warping Beacon_ at his current location, which he can instantly teleport back to.
actors.hero.abilities.mage.warpbeacon.desc=The Mage places a beacon, which can then be warped to at will. Placing the beacon takes 1 turn, but warping to it is instantaneous.\n\nThe Mage cannot warp between floors by default, or use the beacon to reach inaccessible places such as locked rooms. The Mage can teleport into enemies, which will push them aside.

actors.hero.abilities.rogue.smokebomb.name=smoke bomb
actors.hero.abilities.rogue.smokebomb.fov=You can only jump to an empty location in your field of view
actors.hero.abilities.rogue.smokebomb.prompt=Choose a location to jump to
actors.hero.abilities.rogue.smokebomb$ninjalog.name=wooden decoy
actors.hero.abilities.rogue.smokebomb$ninjalog.desc=Somehow, enemies are easily convinced that this wooden decoy is the real Rogue!
actors.hero.abilities.rogue.smokebomb.short_desc=The Rogue throws down a _Smoke Bomb_ while blinking away. He blinds enemies near his old location.
actors.hero.abilities.rogue.smokebomb.desc=The Rogue throws down a smoke bomb and blinks up to 6 tiles away. He can blink through hazards and enemies, but not through solid terrain like walls.\n\nEnemies that are adjacent to the Rogue's old position will be blinded for 5 turns.
actors.hero.abilities.rogue.deathmark.name=death mark
actors.hero.abilities.rogue.deathmark.ally_target=You can only mark enemies
actors.hero.abilities.rogue.deathmark.short_desc=The Rogue places a _Death Mark_ on a chosen enemy. Marked enemies take bonus damage, but cannot die until the mark ends.
actors.hero.abilities.rogue.deathmark.desc=The Rogue places a mark on a chosen enemy, causing them to take 25% extra damage. The mark is applied instantly and lasts for 5 turns.\n\nMarked enemies take bonus damage but are unable to die until the mark expires. If an enemy has 0 HP when the mark ends, they will immediately die.
actors.hero.abilities.rogue.deathmark$deathmarktracker.name=Marked for Death
actors.hero.abilities.rogue.deathmark$deathmarktracker.desc=This enemy has been marked, causing them to take 25%% bonus damage, but also rendering them unable to die until the mark ends.\n\nTurns remaining: %s.
actors.hero.abilities.rogue.shadowclone.name=shadow clone
actors.hero.abilities.rogue.shadowclone.short_desc=The Rogue summons a _Shadow Clone_, which can be directed to aid him in combat.
actors.hero.abilities.rogue.shadowclone.desc=The Rogue summons a shadowy mimic of himself, which can be directed to aid him in combat. Directing the shadow clone does not cost any charge.\n\nThe clone has 100 HP, no armor, and deals 10-20 damage. All of these traits can be improved with talents, such that the clone benefits from weapons and armor the hero has.
actors.hero.abilities.rogue.shadowclone$shadowally.name=shadow rogue
actors.hero.abilities.rogue.shadowclone$shadowally.direct_follow=Your clone moves to follow you.
actors.hero.abilities.rogue.shadowclone$shadowally.direct_attack=Your clone moves to attack!
actors.hero.abilities.rogue.shadowclone$shadowally.desc=A copy of the Rogue, made from shadowy darkness. It stands stock still, with empty eyes and tiny wisps of darkness rising from it like steam.\n\nThe clone is not a perfect copy of the Rogue, but is still a decent fighter, and can benefit from the Rogue's equipment with the right talents.

actors.hero.abilities.huntress.spectralblades.name=spectral blades
actors.hero.abilities.huntress.spectralblades.short_desc=The Huntress throws _Spectral Blades_ at a target, inflicting damage depending on her currently equipped melee weapon.
actors.hero.abilities.huntress.spectralblades.desc=The Huntress throws out a spectral blade at an enemy, which acts like a ranged strike from her melee weapon. All of the normal effects of a melee weapon will activate, including enchantments.
actors.hero.abilities.huntress.naturespower.name=nature's power
actors.hero.abilities.huntress.naturespower.short_desc=The Huntress calls upon _Nature's Power_, increasing her movement speed and her bow's rate of fire for a short time.
actors.hero.abilities.huntress.naturespower.desc=The Huntress temporarily empowers herself and her bow with the power of nature! This lasts for 8 turns.\n\nDuring this time, the Huntress moves at 2x speed, and attacks 33% faster with her bow. The bonus bow effects do not trigger if the Sniper is using her special attacks.
actors.hero.abilities.huntress.naturespower$naturespowertracker.name=nature's power
actors.hero.abilities.huntress.naturespower$naturespowertracker.desc=The Huntress is briefly empowered, increasing her movement speed and attack speed with her bow.\n\nTurns remaining: %s.
actors.hero.abilities.huntress.spirithawk.name=spirit hawk
actors.hero.abilities.huntress.spirithawk.no_space=There is no free space near you.
actors.hero.abilities.huntress.spirithawk.short_desc=The Huntress summons a _Spirit Hawk_ familiar, which can help her scout locations and distract enemies.
actors.hero.abilities.huntress.spirithawk.desc=The Huntress summons a spirit hawk familiar, which can be directed by using the ability again while it is summoned. The hawk lasts for 100 turns, directing the hawk does not cost any charge.\n\nThe hawk has minimal health and attacking power, but is fast, evasive, and accurate. It shares its entire field of vision with the Huntress at all times. It is immune to all area-bound effects, such as fire and poison gas. It will not attack unless specifically directed to.
actors.hero.abilities.huntress.spirithawk$hawkally.name=spirit hawk
actors.hero.abilities.huntress.spirithawk$hawkally.direct_follow=Your hawk moves to follow you.
actors.hero.abilities.huntress.spirithawk$hawkally.direct_attack=Your hawk moves to attack!
actors.hero.abilities.huntress.spirithawk$hawkally.desc=A magical hawk, summoned by the Huntress. It glows a bright ethereal blue, its head constantly shifts around as it surveys the area.\n\nWhile it isn't much of a fighter its speed and vision make it excellent for scouting and distracting enemies.\n\nTurns remaining: %d.
actors.hero.abilities.huntress.spirithawk$hawkally.desc_dodges=Guaranteed dodges remaining: %d.

actors.hero.abilities.ratmogrify.name=ratmogrify
actors.hero.abilities.ratmogrify.cant_transform=You can't ratmogrify that!
actors.hero.abilities.ratmogrify.too_strong=That enemy is too strong to ratmogrify!
actors.hero.abilities.ratmogrify.short_desc=The hero _Ratmogrifies_ an enemy! This temporarily turns them into a rat with no abilities.
actors.hero.abilities.ratmogrify.desc=The hero transforms an enemy into a rat for 6 turns! Bosses, allies, and rats cannot be ratmogrified.\n\nRatmogrified enemies retain their original stats, but do not have any abilities.
actors.hero.abilities.ratmogrify$transmograt.name=ratmogrified %s
actors.hero.abilities.ratmogrify$transmograt.desc=This enemy has been transformed into a rat. A big improvement, if you ask me! - Rat King
actors.hero.abilities.ratmogrify$transmograt.rankings_desc=Slain by: ratmogrified enemy

##main hero
actors.hero.hero.name=you
actors.hero.hero.leave=You can't leave yet, the rest of the dungeon awaits below!
actors.hero.hero.leave_chest=This is the alternate dimension of the Mimic King. The entrance and exit are blocked. Maybe you can escape by killing the patrolling treasure chest monster...
actors.hero.hero.leave3=You can't go there yet. You haven't picked up the crystal heart yet.
actors.hero.hero.leave2=You can't leave yet. The fame and fortune buried under the dungeon are calling you!

actors.hero.hero.hollow_1=The castle has not been fully developed yet. Thanks to all the testers for testing!

actors.hero.hero.dlc_name=Phantom Blue Teleportation Array

actors.hero.hero.leave_more_dead=You tried to activate this teleportation array, but it didn't work...\n\nYou need a teleportation medium, and you can only activate the teleportation array if you have not been put into prison in this game. \n\n_The transport medium can be purchased from the merchant lord on the left. This may require some _special currency_ support. If your town does not have a merchant lord, you need to go to the normal mode to _rob the store] and defeat Lianna.


actors.hero.hero.acs=Adventurer, you should know the danger of the dungeon, so we sealed it. \nIf you are sure you want to go to the dungeon, this magic entrance will take you into the dangerous dungeon. \nOnce you are ready, you can move forward! \nOf course, take what you need to go, because you can't turn back after you go...

actors.hero.hero.acsx=Adventurer, you should know that the bottom is very chaotic, I hope you are ready before moving forward! \n\nOnce you defeat the center of the deepest time and space chaos, I will come to take you home. \n\nIn addition, if you need to go to other time and space, you should go to the small room on the right and get the teleportation medium from Ron below...

actors.hero.hero.level_up=Level up!
actors.hero.hero.new_level=Level up! +Accuracy, +Evasion, +5 HP!
actors.hero.hero.new_talent=+1 Talent Point!
actors.hero.hero.unspent=You have unspent talent points!
actors.hero.hero.level_cap=You cannot grow stronger, but your experiences do give you a surge of power!
actors.hero.hero.you_now_have=You picked up: %s.
actors.hero.hero.you_cant_have=You can't carry: %s.
actors.hero.hero.locked_chest=This chest is locked and you don't have a matching key.
actors.hero.hero.locked_door=You don't have a matching key.
actors.hero.hero.noticed_smth=You noticed something.
actors.hero.hero.wait=...
actors.hero.hero.search=search
actors.hero.hero.search_distracted=It's hard to concentrate, searching is exhausting.
actors.hero.hero.pain_resist=The pain helps you resist the urge to sleep.
actors.hero.hero.revive=The ankh explodes with life-giving energy!
actors.hero.hero.died=Your cross is useless..., you are completely dead here...
actors.hero.hero.error_no=This is the sub-layer depth, you can't jump off the building. \n\nIf you are floating, please manually use the wait button to update the round.

actors.blobs.frostfire.desc=This is a mixture of ice and fire. You will feel the interweaving of cold and heat. It will be very painful if you are unfortunately burned by the fire.


##classes
actors.hero.heroclass.warrior=warrior
actors.hero.heroclass.warrior_desc_item=The Warrior starts with a unique broken emblem that can be attached to armor. _\n\nWhen the warrior wears armor with her Broken Seal attached, she will generate a shield value above her health over time. \n\nEmblems can be transferred between armors and can be upgraded one level. \n\nThe Warrior can eat seeds to restore a small amount of hunger. This feature is not affected by the On Diet Challenge (?).
actors.hero.heroclass.warrior_desc_loadout=The Warrior starts with a broken short sword. _This weapon has the highest direct melee damage of all starting weapons. \n\nThe Warrior starts with three stones. _The stones can be thrown to attack from a distance, causing a certain amount of small damage. \n\nLei Ling An Jie starts with a potion rack that can store various potions and protect the potion bottles from being frozen. _\n\nThe warrior starts with a non-consumable _Summoning Crystal Pillar_
actors.hero.heroclass.warrior_desc_misc=The Warrior can recover a small amount of health each time she eats food. \n\nThe items that Lei Ling An Jie identifies at the beginning are:\n- Scroll of Identification\n- Potion of Healing\n- Wrath Scroll
actors.hero.heroclass.warrior_desc_subclasses=After killing the second boss, you can choose a specialization. Lei Ling An Jie can choose one of two specializations:

actors.hero.heroclass.warrior_story=The warrior - Tactical Strategy\n\nShe was born in the Frostfall Empire, where the wind is biting all year round. The warrior is an outstanding student who graduated from the Tactical Academy. She does not advocate the use of magic, but prefers to use shrewd tactics to defeat the enemy. Her family has been famous for its tactical strategies for generations. Her family is one of the few families in the Frostfall Empire that does not use magic or special abilities but still has a place in the empire. Now, under the temptation of the huge bounty offered by the three giants on the surface, she came here to investigate the dungeon.

actors.hero.heroclass.huntress_story=Yilian Meiyan--Elf Blood\n\nYilian Meiyan was born in the Green Forest Holy Land, where elves gather, and her mother is the highest administrator there. However, she yearned for the outside world and did not want to spend her whole life under the protection of her mother and the barrier of the holy land, so she opened the barrier privately. This brought a terrible disaster. In the end, although her mother repaired the barrier again, Yilian Meiyan herself disappeared from the holy land. The highest administrator actually knew everything, but did not send anyone to look for her...\n\n Many years later, she came here to improve her strength and look for treasures deep in the dungeon. What she didn't know was that she was the last elf bloodline...

actors.hero.heroclass.rogue_story=Kokukage Suzuhong--Miscellaneous Girl\n\nKokukage Suzuhong was born in the royal family of the Abyss Demon City and has pure royal blood. However, every time she went out, she would see that the people at the bottom were deeply tortured by life and that the nobles discriminated against them to the bone. These phenomena brought a huge impact on her pure mind. Since then, there has always been a shadow black in the royal family who steals things, and this black shadow steals food every time, and the royal family has never succeeded in catching this black shadow. When the royal family leaders were patrolling outside, they heard people at the bottom talking about a veiled woman giving them food. The royal family leaders naturally thought of that black shadow...but no one knew it was her. After hearing that the things in the deepest part of the dungeon could fulfill wishes, she persuaded her father to come here. Her father implanted a dark seed in her cloak, which would protect her when necessary. necessary.

actors.hero.heroclass.mage_story=Jalie's birthplace was not this land, but a mysterious land far away in the horizon. There was overflowing magic power, and everyone could become a top magician. But because of some changes, she had to leave her hometown and come to the area governed by the three giants on the surface. Years of advanced studies in the Mage Academy made her understand the powerful magic of ice and fire, and could adapt to the situation in battle. But because she did not belong here, the magic here was rejecting her, so her true power never appeared. In order to investigate the mystery of the Crystal Heart, she had to come to this dungeon in a weak state...

actors.hero.heroclass.mage=mage
actors.hero.heroclass.mage_unlock=The Mage is an expert with wands, and carries a _unique magical staff._\n\nTo unlock him _use a scroll of upgrade to make an item stronger._
actors.hero.heroclass.mage_desc_item=The Mage starts with a _unique wand that can be infused with the magic of various wands. _\n\nThe wand recharges faster than the staff, and has 1 extra maximum charge. \n\nThe wand is already infused with magic missiles at the beginning. \nAnd she also carries 2 random flame waves and ice staffs up to level 3!
actors.hero.heroclass.mage_desc_loadout=The Mage starts with her wand as a melee weapon. The wand has the lowest melee damage of all the starting weapons. \n\nMolly Ilo can use the wand to launch ranged magic attacks. \n\nMolly Ilo starts with a _Scroll Can that can store various scrolls and protect them from fire damage. _
actors.hero.heroclass.mage_desc_misc=The Mage can initially identify the staff when she uses it for the first time. \n\nMolly Ilo will restore a small amount of charge to her staff and wand when eating food. \n\nThe items that Molly Ilo identifies at the beginning are: \n- Identification Scroll\n- Liquid Fire Potion\n- Upgrade Scroll
actors.hero.heroclass.mage_desc_subclasses=After killing the second boss, you can choose a specialization. Jasmine can choose between two specializations:

actors.hero.heroclass.rogue=rogue
actors.hero.heroclass.rogue_unlock=The Rogue can control the flow of battle and strike from invisibility using his _unique cloak of shadows._\n\nTo unlock him _perform 10 surprise attacks in one game._
actors.hero.heroclass.rogue_desc_item=The Rogue starts with a unique artifact: the _cloak of shadows. _ Once worn, the Rogue can turn himself invisible at any time. \n\nLike other artifacts, the cloak of shadows cannot be directly enhanced by upgrade scrolls. The cloak of shadows will level up as the Rogue is used.
actors.hero.heroclass.rogue_desc_loadout=The Rogue starts with a _dagger. _ Using this dagger to ambush enemies will cause additional damage. \n\nThe Rogue starts with _three throwing knives. _The throwing knives can be thrown to attack from a distance, and ambushing enemies with throwing knives will cause additional damage. \n\nThe Rogue starts with _a velvet bag that can store small items such as seeds and runes. _
actors.hero.heroclass.rogue_desc_misc=The Rogue can detect secrets and traps farther away. \n\nThe Rogue can find more secrets in the dungeon. \n\nThe items that the Rogue can identify at the beginning are: \n- Identification Scroll\n- Invisibility Potion\n- Earth Scroll
actors.hero.heroclass.rogue_desc_subclasses=After killing the second boss, you can choose a specialization. Huntress can choose between two specializations:

actors.hero.heroclass.huntress=huntress
actors.hero.heroclass.huntress_unlock=The Huntress is a master of thrown weapons, and has a _unique magical bow_ with infinite arrows.\n\nTo unlock her _hit 10 different enemies with thrown weapons in one game._
actors.hero.heroclass.huntress_desc_item=The Huntress starts with a _unique psychic bow_ and an unlimited use bow that fires infinite magical arrows.\n\nThis bow becomes increasingly powerful as the Huntress levels up, and can be modified or enchanted.
actors.hero.heroclass.huntress_desc_loadout=The Huntress starts with a pair of _studded gloves_ that are much faster than her other starting weapons. \n\nYilian Meijian starts with a ranged weapon, a psychic bow. \n\nYilian Meijian starts with a _velvet bag_ that can hold small items such as seeds and runes.
actors.hero.heroclass.huntress_desc_misc=The Huntress can move freely through tall grass instead of trampling it to the ground. \n\nYilian Meijian's thrown weapons have higher durability. \n\nYilian Meijian can detect enemies hiding behind obstacles. \n\nYilian Meijian starts with the following items: \n- Identification Scroll\n- Clairvoyance Potion\n- Hypnosis Scroll


actors.hero.heroclass.duelist=duelist
actors.hero.heroclass.duelist_desc_short=The Duelist is a weapons master who can use her weapon to trigger a _special weapon ability._ This special ability is _different for every weapon._
actors.hero.heroclass.duelist_desc=The Duelist starts with a _unique rapier_ with a special ability that recharges over time.\n\nEvery weapon in the game has a _different special ability_ that the Duelist can use.\n\nThe Duelist also starts with _two throwing spikes_, cloth armor, a waterskin, and a velvet pouch.\n\nThe Duelist automatically identifies:\n_-_ Scrolls of Identify\n_-_ Potions of Strength\n_-_ Scrolls of Mirror Image
actors.hero.heroclass.duelist_unlock=To unlock the Duelist _equip a tier 2 or higher weapon with no strength penalty._

actors.hero.heroclass.duelist_story=Ainolina - The Wanderer\n\nAs a traveler and knight from another world, although she has the ability to fight for justice, she chooses to remain neutral. \n\nSuch a decision allows her to better analyze problems and resolve conflicts in a more comprehensive and rational way. \n\nShe focuses on thinking about the root causes of problems and strives to find more effective solutions to achieve fair and balanced results. \n\nThis attitude allows her to protect herself and the people she cherishes, and remain objective in complex situations. \n\nShe was born in a place that does not belong to this world. As early as her childhood, she won the honor of fighting level 3. Now, she likes to explore various dimensions. \n\nBut because she always encounters some unanswered questions during the exploration, she came to the dungeon here, trying to find her own answers through the rumored crystal heart in this dimension... (but can she really find her answer?)


actors.hero.heroclass.huntress_desc_subclasses=You can choose a specialization after killing the second boss. Yi Lian Mei Hao can choose one of two specializations:

actors.hero.herosubclass.gladiator=gladiator
actors.hero.herosubclass.gladiator_desc=The Gladiator builds one point of combo every time he makes a successful attack with a melee or thrown weapon. If the Gladiator does not make a successful attack within 5 turns, his combo is reset.\n\nAs combo builds it unlocks a variety of combo abilities. A new ability becomes available at 2, 4, 6, 8, and 10 combo. Some abilities help build more combo, while others let the Gladiator spend his combo on powerful attacks.

actors.hero.herosubclass.berserker=berserker
actors.hero.herosubclass.berserker_desc=The Berserker gains rage as he takes physical damage, including damage that gets blocked by his armor! Rage steadily fades over time, but fades more slowly if he is at low HP.\n\nThe Berserker deals up to +50% damage at 100% rage. When at 0 health and 100% rage, the Berserker will briefly gain 8x his normal maximum shielding and will refuse to die as long as he has shielding left. The Berserker needs time to recover after he defies death however.

actors.hero.herosubclass.berserker_short_desc=The _Berserker_ builds rage as he takes damage. Rage increases his damage, and can let him briefly cheat death.
actors.hero.herosubclass.gladiator_short_desc=The _Gladiator_ builds combo when he makes successful attacks. He can spend combo to use unique abilities.

actors.hero.herosubclass.warlock=warlock
actors.hero.herosubclass.warlock_desc=The Warlock has a chance to inflict a soul mark on characters when he uses wands on them. The chance to apply a soul mark and its duration increase with wand level.\n\nWhen an enemy is soul marked, the Warlock will heal 2 hp for every 5 damage he deals to them, but only with attacks from melee or thrown weapons, not from wands!
actors.hero.herosubclass.battlemage=battlemage
actors.hero.herosubclass.battlemage_desc=The Battlemage gains a bonus effect whenever he strikes in melee with his staff, as if his staff had an additional enchantment. These effects depend on the wand his staff is imbued with, every wand has its own effect. In addition to the wand effects, the Battlemage's staff will also gain 0.5 charges when he strikes with it.
actors.hero.herosubclass.assassin=assassin
actors.hero.herosubclass.assassin_desc=The Assassin prepares his next strike when he becomes invisible. The longer he prepares for, the more powerful his next attack will be. Preparation builds for up to 9 turns.\n\nAfter preparation, the Assassin deals bonus damage on his next attack, can blink to his target, and can even instantly kill enemies who are weak enough.
actors.hero.herosubclass.freerunner=freerunner
actors.hero.herosubclass.freerunner_desc=As the Freerunner moves he builds stacks of momentum. He can gain up to 10 momentum after running for 10 turns, but rapidly loses it if he stops moving. The freerunner can use up his momentum to start freerunning, for 2 turns per point of momentum.\n\nWhen freerunning the Freerunner moves at 2x speed, and gains bonus evasion in proportion to his level. Once free ends there is a cooldown before momentum can be built again.
actors.hero.herosubclass.sniper=sniper
actors.hero.herosubclass.sniper_desc=The Sniper is a master of ranged combat, whose ranged attacks pierce enemy armor. When she attacks an enemy with a thrown weapon, she places a sniper's mark on them, which lets her follow up with a special attack from her bow. This special attack varies based on how her bow is augmented.\n\nAn unaugmented bow will fire a snapshot which deals reduced damage but fires instantly. A speed bow will fire a volley of three arrows which deal reduced damage, can still activate enchantments, and take 1 turn to fire. A damage bow will fire a sniper shot which is guaranteed to hit, deals bonus damage based on distance, and takes 2 turns to fire.
actors.hero.herosubclass.warden=warden
actors.hero.herosubclass.warden_desc=The Warden has a strong connection to nature which grants her a variety of bonus effects relating to grass and plants. She is able to see through tall and furrowed grass as if it were empty space.\n\nThe warden causes grass to sprout up around any seed she throws or plants, and gains special effects when trampling plants. These special effects replace the regular plant effects, meaning that no plant is harmful for her to step on.

actors.hero.herosubclass.champion=champion
actors.hero.herosubclass.champion_short_desc=The _Champion_ can wield two weapons. Her regular attacks use her primary weapon, but she can swap weapons and use either weapon's ability.
actors.hero.herosubclass.champion_desc=The Champion is a master of melee weapons who can equip a secondary weapon in addition to her primary one. Her regular attacks use her primary weapon, but she can swap her primary weapon instantly.\n\nThe secondary weapon's ability can be used at any time and has its own ability charges. Her secondary weapon charges have a 50% reduced charge cap and charge speed.
actors.hero.herosubclass.monk=monk
actors.hero.herosubclass.monk_short_desc=The _Monk_ builds energy while fighting. This energy can be spent on a variety of unique abilities.
actors.hero.herosubclass.monk_desc=The Monk is a master of physical technique. As she defeats enemies, she gains energy which can be used on a variety of defensive and utlity-focused abilities. This energy does not fade over time, but has a cap based on the Monk's level.

actors.hero.heroclass.warrior_desc=The Warrior starts with a _unique broken seal_ that generates shielding over his health. The seal can be moved between armors, and can _transfer a single upgrade_ with it.\n\nThe Warrior also starts with a _worn shortsword_, _three throwing stones_, cloth armor, a waterskin, and a velvet pouch.\n\nThe Warrior automatically identifies:\n_-_ Scrolls of Identify\n_-_ Potions of Healing\n_-_ Scrolls of Rage

actors.hero.heroclass.mage_desc=The Mage starts with a _unique staff_, which recharges significantly faster than a wand and has 1 more charge. The staff _can be imbued with any wand_ the mage finds in the dungeon.\n\nThe Mage also starts with a _wand of magic missile_ imbued in his staff, cloth armor, a waterskin, and a velvet pouch.\n\nThe Mage automatically identifies:\n_-_ Scrolls of Identify\n_-_ Potions of Liquid Flame\n_-_ Scrolls of Upgrade
actors.hero.heroclass.rogue_desc=The Rogue starts with a unique _Cloak of Shadows_, which he can use to become invisible at will.\n\nThe Rogue can _detect secrets and traps_ from a greater distance.\n\nThe Rogue also starts with _a dagger_, _three throwing knives_, cloth armor, a waterskin, and a velvet pouch.\n\nThe Rogue automatically identifies:\n_-_ Scrolls of Identify\n_-_ Potions of Invisibility\n_-_ Scrolls of Magic Mapping
actors.hero.heroclass.huntress_desc=The Huntress starts with a _unique spirit bow,_ which can fire an infinite number of conjured arrows.\n\nThe Huntress can travel through tall grass _without trampling it_.\n\nThe Huntress also starts with _studded gloves_, cloth armor, a waterskin, and a velvet pouch.\n\nThe Huntress automatically identifies:\n_-_ Scrolls of Identify\n_-_ Potions of Mind Vision\n_-_ Scrolls of Lullaby

actors.hero.herosubclass.battlemage_short_desc=The _Battlemage_ conjures bonus effects when fighting in melee with his staff. These effects depend on the wand his staff is imbued with.
actors.hero.herosubclass.warlock_short_desc=The _Warlock_ has a chance to soul mark characters when using wands on them. He will heal whenever he deals physical damage to marked enemies.
actors.hero.herosubclass.assassin_short_desc=The _Assassin_ can prepare a deadly strike while he is invisible. The longer he waits, the more powerful the attack will be.
actors.hero.herosubclass.freerunner_short_desc=The _Freerunner_ builds momentum as he runs, which can be used to start freerunning. This grants him bonus speed and evasion for a short while.
actors.hero.herosubclass.sniper_short_desc=The _Sniper_ can pierce armor with her ranged attacks. After striking with a thrown weapon she can follow up with a special attack from her bow.
actors.hero.herosubclass.warden_short_desc=The _Warden_ can see through tall grass and gains bonus effects when she plants seeds and tramples plants.


