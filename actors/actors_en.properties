###PETS

actors.mobs.pets.minisaka.name=Sakaban Turtle Baby
actors.mobs.pets.minisaka.desc=In that ancient ruins decisive battle, it had exhausted all its strength. Now it has regained its life, but it has forgotten everything. \nThe first person it saw was you, and it must have recognized you as its master. \nThat's good, this way, no one knows about the ancient ruins, and no one knows about the former king of the ocean. \n\nIt yearns for the ocean, and you can definitely take it out. \n\n_This pet is an ornamental pet. Enemies will not attack it, and it will not attack enemies, but it can hinder the enemy's vision, and it will always follow you.

actors.mobs.pets.smalllight.name=Glimmer Guide
actors.mobs.pets.smalllight.desc=Shares vision with the player. After being generated, it will automatically find and go to the path closest to the exit. If it encounters a monster blocking the way, it will pull the monster behind it and put it to sleep. It will die after reaching the exit and light up the vision of the exit room.

###HOLLOW
actors.mobs.bosses.morphs.unknown=???
actors.mobs.bosses.morphs.name=Mephius
actors.mobs.bosses.morphs.desc=An unknown entity that is free from the world and does not belong here. Any attack in front of it will be invalidated. Who is it? \n\nThe show is about to begin. Can you complete this grand show?

actors.mobs.npcs.hollow.deathrong.name=Charon
actors.mobs.npcs.hollow.deathrong.desc=If you want to step into the gate of hell, the Styx is your last obstacle. \n\nShe is here to protect everything. You only need to pay some of your belongings, and she can ensure that you can cross the Styx safely.

actors.mobs.npcs.hollow.deathrongshop.name=Charon
actors.mobs.npcs.hollow.deathrongshop.desc=She found that business in the River Styx was getting harder and harder, so she now opened a shop in the Hall of All Hallows, and soon she was making a lot of money.
actors.mobs.npcs.hollow.deathrongshop.talk=Talk
actors.mobs.npcs.hollow.deathrongshop.buyback=Ms. Charon readily returned the corresponding merchandise.
actors.mobs.npcs.hollow.deathrongshop.talk_prison_intro=Hello, welcome to my shop.
actors.mobs.npcs.hollow.deathrongshop.talk_prison_warrior=You know, the Pantheon here is not really real... Well, you can just take it as a joke.
actors.mobs.npcs.hollow.deathrongshop.talk_prison_mage=Are you a mage as well? I hope you won't degenerate into a witch in the end. The witches in the hall are the best examples...
actors.mobs.npcs.hollow.deathrongshop.talk_prison_rogue=I have seen you before, Miss, but you didn't see me then. I didn't expect you to have grown up so much, I hope you still know the purpose of your visit.
actors.mobs.npcs.hollow.deathrongshop.talk_prison_huntress=Hello, Miss. You have the blood of an elf... Are you his descendant? Or am I overthinking...
actors.mobs.npcs.hollow.deathrongshop.talk_prison_duelist=Hello, Miss! You don't seem to belong to this world, are you one of the visitors?

levels.rooms.standard.bigeyeroom.name=Think Twice Before You Act
levels.rooms.standard.bigeyeroom.start_prompt=Attention, this is a special room, and if you really want to enter this room make sure you have at least one Iron Key. Otherwise do not enter!
levels.rooms.standard.bigeyeroom.enter_yes=Yes, I am sure
levels.rooms.standard.bigeyeroom.enter_no=No, I changed my mind

actors.mobs.npcs.typhon.name=Typhon
actors.mobs.npcs.typhon.desc=The ancestor of all monsters, even Charon is afraid of him. She must have something to tell you when she came here. Cerberus was reduced to ashes in her merciless fire...
actors.mobs.npcs.typhon.dog_home=Cerberus, it's time to go home...
actors.mobs.npcs.typhon.rankings_desc=Conqueror of the Castle
actors.mobs.npcs.typhon.now_letgo=Typhon said nothing...

custom.utils.typhonplot.message1=%sHello, I'm Typhon. I'm sorry that my pet has caused you trouble.
custom.utils.typhonplot.message2=Actually, it doesn't want to attack you directly. It's mainly because someone opened the gate of hell. When it appeared, it saw you...
custom.utils.typhonplot.message3=Well... So it thinks you are the culprit who opened the gate of hell...
custom.utils.typhonplot.message4=Fortunately, you are very powerful. And I arrived in time...
custom.utils.typhonplot.message5=I have investigated the person who opened the gate of hell.
custom.utils.typhonplot.message6=He is... Morpheus..., an outer god from a world that does not belong to this world.
custom.utils.typhonplot.message7=I didn't expect that the ancestor of all monsters would care about such trivial matters...
custom.utils.typhonplot.message8=That's right, %s. I am the Lord of Shadow Realm - Morpheus. I built this castle without telling the three beings on the surface.
custom.utils.typhonplot.message9=Although the plan to open the gate of hell failed this time, we will meet again..., but without my power, the castle is all an illusion...
custom.utils.typhonplot.message10=%s, this place is about to collapse. Thank you for everything you have done here, but it is time for us to say goodbye...
custom.utils.typhonplot.message11=The turmoil in the castle will not end like this, and you have encountered something more difficult than the Crystal Heart. You can only find the answer in reincarnation...
custom.utils.typhonplot.message12=I hope that the next time I see you, you can find the true purpose of Morpheus. Goodbye! %s!

custom.utils.plot.hollow.hollowcityplot.name=Strange Sound
custom.utils.plot.hollow.hollowcityplot.message1=Under the shining of the blood moon, the crystal heart that was once placed in the temple has undergone strange changes.
custom.utils.plot.hollow.hollowcityplot.message2=The temple has become a strange and weird ancient castle entrance, and the crystal heart is not easy to fly, and an ominous and evil breath emanates from the entrance of the castle.
custom.utils.plot.hollow.hollowcityplot.message3=It seems that you have been selected, keep going forward, we are waiting for you at the end of the castle!
custom.utils.plot.hollow.hollowcityplot.message4=The crystal heart does not seem to be here, so you can only choose to move forward! This is a very dangerous location.

actors.mobs.npcs.hollow.deathrong.message1=Ah~ I have to go to work again...
actors.mobs.npcs.hollow.deathrong.message2=Huh? It's a living person?
actors.mobs.npcs.hollow.deathrong.message3=I didn't expect to meet a living person while on duty here...
actors.mobs.npcs.hollow.deathrong.message4=Are you here to visit relatives or to seek revenge?\n\n【This is a branch option, you must make a choice! 】

actors.mobs.npcs.hollow.deathrong.choice1=I am an adventurer.

actors.mobs.npcs.hollow.deathrong.message5=Investigation?
actors.mobs.npcs.hollow.deathrong.message6=Interesting, but I don't know if the guard will let you pass with this reason.
actors.mobs.npcs.hollow.deathrong.message7=Get on the boat. I'm in a good mood today. I'll get 6.66 million gold coins for crossing the river once. Hehe.

actors.mobs.npcs.hollow.deathrong.message8=Do you want to pay 6660000 gold coins?

actors.mobs.npcs.hollow.deathrong.button2a=Yes
actors.mobs.npcs.hollow.deathrong.button2b=No

actors.mobs.npcs.hollow.deathrong.message9a_1=Okay......
actors.mobs.npcs.hollow.deathrong.message9a_2=Wait, you really brought 6.66 million gold coins?
actors.mobs.npcs.hollow.deathrong.message9a_3=You......
actors.mobs.npcs.hollow.deathrong.message9a_4=No no no, it's nothing, I'll take you there right now.
actors.mobs.npcs.hollow.deathrong.message9a_5=After giving a signal, you boarded Charon's boat with a huge amount of gold coins.
actors.mobs.npcs.hollow.deathrong.message9a_6=Charon's boat was originally designed only to transport the dead, but now it bears a weight several times the designed load.
actors.mobs.npcs.hollow.deathrong.message9a_7=When traveling to the middle of the river, Charon felt more and more powerless, and finally, the whole boat suddenly turned over.
actors.mobs.npcs.hollow.deathrong.message9a_8=Charon grabbed the boat, and you, with the bag and scattered gold coins, were sinking together.
actors.mobs.npcs.hollow.deathrong.message9a_9=Is it hell or just an ordinary riverbed under this river?
actors.mobs.npcs.hollow.deathrong.message9a_10=You didn't know in the end. But what is certain is that the water here is still freezing cold.
actors.mobs.npcs.hollow.deathrong.message9a_11=_Game Over - Sinking into the Acheron River_

actors.mobs.npcs.hollow.deathrong.message9b_1=Okay, okay, I'm just kidding. It's been a long time since I saw a living person.
actors.mobs.npcs.hollow.deathrong.message9b_2=Come up, I won't charge you this time.
actors.mobs.npcs.hollow.deathrong.message9b_3=Anyway, you don't get paid for picking up dead bodies.

actors.buffs.trueinvisibiity.name=Let's go!!!

actors.mobs.npcs.zeroboat.name=Styx Ferry
actors.mobs.npcs.zeroboat.desc=Take the soul ferry, cross the border between the Styx and the human world, and forget everything...


actors.mobs.bosses.morphs.message1=%s, hello. Welcome to my mansion, I am the owner here.
actors.mobs.bosses.morphs.message2=Your battle with Him was very exciting, I admire you very much. However, if you want to survive in this dark and turbulent world, this is far from enough.
actors.mobs.bosses.morphs.message3=The ancient god you defeated is just a fragment of Him. In the void that cannot be measured by time, this fragment betrayed Him and came here to create disasters.
actors.mobs.bosses.morphs.message4=You want to know who I am? Don't worry, I have prepared a unique journey for you. This castle is my test for you.
actors.mobs.bosses.morphs.message5=........................
actors.mobs.bosses.morphs.message6=I am looking forward to your performance. Don't let us down. I hope you can complete this grand performance... Now, it's up to you...
actors.mobs.bosses.morphs.message7=%s, this is not... death is... real... Please make sure...
actors.mobs.bosses.morphs.message8=Don't fall into his trap...

levels.cerdogbosslevel$yellowstar.name=Dusk Crystal
levels.cerdogbosslevel$yellowstar.desc=This crystal emits a peaceful but strange light. It is now waiting for the arrival of invaders...

actors.mobs.bosses.cerberus.name=Cerberus
actors.mobs.bosses.cerberus.desc=Cerberus, the gatekeeper dog of the underworld. It stares around, its eyes full of malice and threats. \nThe environment around it is unusually silent and lifeless. Cerberus represents death and despair, possesses immense power, and can be called the embodiment of death.
actors.mobs.bosses.cerberus.notice=Death will eventually come to everyone, and you are the next!
actors.mobs.bosses.cerberus.dreamdied=The nightmare will eventually find you...
actors.mobs.bosses.cerberus.charging=Sacrifice your soul essence to me!
actors.mobs.bosses.cerberus.firewall=Feel the passion of the evil spirit firewall!
actors.mobs.bosses.cerberus$rage.name=Return from Hell
actors.mobs.bosses.cerberus$rage.desc=Cerberus' death is inevitable, but he wants to take you with him! \n\nThe passage of time or external damage will wear down the shield. When the shield is completely dissipated, Cerberus will be completely destroyed. \n\nRemaining shield: %d.
actors.mobs.bosses.cerberus.firewall_last5=Firewall will be rekindled in 5 turns.
actors.mobs.bosses.cerberus$notbrokenwall.desc=While Firewall exists, nothing can escape its clutches. After being caught by Firewall, they will be sent to the central area.
actors.mobs.bosses.cerberus$souldiedblobs.desc=Soul Draining Field will cause inner demon damage to the target... and has a chance to add Arcane Shield to the caster. \n\nIf the target is a sneak, an additional Arcane Shield equal to the caster is added.
actors.mobs.bosses.cerberus$webblob.desc=Nightmare Coil will entangle all targets in range after a short delay and cause true damage...
actors.mobs.bosses.cerberus.your_must_died=Died...Reborn...Destroyed...
actors.mobs.bosses.cerberus.defeated=%s, I'll remember you...
actors.mobs.bosses.cerberus$dogguard.scorpion=Hmph? Trying to escape?
actors.mobs.bosses.cerberus$dogguard.name=Death Guard
actors.mobs.bosses.cerberus$dogguard.desc=Cerberus is in very bad health, prompting it to summon a Death Guard to help. \n\nWhile the guard exists, it will automatically grab the target every 15 turns.

actors.mobs.bosses.hollow.deaddogcerberus.name=Cerberus
actors.mobs.bosses.hollow.deaddogcerberus.desc=Cerberus is the gatekeeper dog of the underworld. He stares around with malicious and threatening eyes. \nThe environment around him is extremely quiet and lifeless. Cerberus represents death and despair, and has great power. He can be called the embodiment of death.
actors.mobs.bosses.hollow.deaddogcerberus.notice=Death will come to everyone, and you are the next one!
actors.mobs.bosses.hollow.deaddogcerberus.dog_skills_one=Cerberus is sharpening his claws!
actors.mobs.bosses.hollow.deaddogcerberus.combo_attack_hit=Take a taste of the power of the combo bite...

actors.mobs.bosses.hollow.deaddogcerberus$noarmordamage_bleedingnomalattack.name=Gnashing teeth and sucking blood
actors.mobs.bosses.hollow.deaddogcerberus$noarmordamage_bleedingnomalattack.desc=In this state, Cerberus ignores the target's _50%%% defense_, and each attack will cause <#f00>25%% of its own damage to bleed <RGB>. \n\nRemaining effect duration: %s.
actors.mobs.bosses.hollow.deaddogcerberus.dog_see_you=It seems that you are ready to accept death..., %s!
actors.mobs.bosses.hollow.deaddogcerberus$deadhalofire.desc=While in Hellfire, the target will continue to take <#f00>true damage<RGB>. If the target is Cerberus, it will instead receive _Power Bonus_.

actors.mobs.bosses.hollow.deaddogcerberus$souldead.name=Soul Shock
actors.mobs.bosses.hollow.deaddogcerberus$souldead.desc=Your soul has been sucked into Hell. From now on, each of its attacks will cause <#f00>an additional 5 Heart Devil damage<RGB> to the target...\n\nBeing soul-shocked, you feel <#f00>your legs become heavier.<RGB>...

actors.mobs.bosses.hollow.deaddogcerberus$superattack.name=Death Struggle
actors.mobs.bosses.hollow.deaddogcerberus$superattack.desc=Cerberus is furious. He will gain _200%%% attack power bonus_ and _100%%% attack speed bonus_\n\nRemaining effect duration: %s.

actors.mobs.bosses.hollow.deaddogcerberus$cerberusbless.name=Hunting Ready
actors.mobs.bosses.hollow.deaddogcerberus$cerberusbless.desc=Cerberus has sharpened his claws and now ignores the target's <#FF0>50%%% Defense<RGB> and gains an additional <#FF0>50%% Extra Accuracy<RGB> until this effect expires. \n\nRemaining effect duration: %s.

actors.mobs.bosses.hollow.firesuperdr.name=Phosphorus Regeneration
actors.mobs.bosses.hollow.firesuperdr.desc=Cerberus is from Hell, and therefore cannot be harmed by his <#0ff>Special Phosphorus<RGB>, and has a <#F00>Greatly Increased Defense<RGB> and slowly <#0F0>Regenerates Health<RGB> each turn. \n\nImportant reminder: Regenerated health will not <#F00>set Cerberus's stage back<RGB>, so if Cerberus recovers more health in the subsequent stages, it will <#F00>become more threatening! <RGB>\n\nRemaining effect duration: %s.

actors.mobs.bosses.hollow.deaddogcerberus.leap=Cerberus prepares to leap!

actors.mobs.bosses.hollow.bleedcrystal.name=Blood Crystal
actors.mobs.bosses.hollow.bleedcrystal.desc=When attacking a target, Cerberus extracts the target's blood into blood crystals, which will have serious consequences if not destroyed as soon as possible ......

actors.mobs.bosses.hollow.deaddogcerberus$bleedingsummoncoolown.name=Coagulation Crystal Summoning Blockade
actors.mobs.bosses.hollow.deaddogcerberus$bleedingsummoncoolown.desc=Cerberus has summoned a <#F00>Blood Crystal<RGB>. If the <#F00>Blood Crystal<RGB> still exists after the effect ends, Cerberus will absorb it and become stronger, causing <#F00>more damage<RGB> to the target. \n\nRemaining effect duration: %s.


#No Zuo No Die

actors.mobs.hollow.apprenticewitch.name=Apprentice Witch
actors.mobs.hollow.apprenticewitch.desc=A failed wizard from the magic academy. While some would learn from their mistakes and study harder, she lost control. Now, she preys on the souls of passers-by.
actors.mobs.hollow.apprenticewitch.bye=Bye~
actors.mobs.hollow.apprenticewitch.die=Go to hell!
actors.mobs.hollow.apprenticewitch.oh_no=Oh no...

actors.mobs.hollow.frankenstein.name=Dream Puppet
actors.mobs.hollow.frankenstein.desc=Unfinished puppets wandering around the Halloween Temple. It is said their masters, who made them, abandoned them because of their failed appearance and slow speed. They now wander aimlessly, tearing apart the souls of the living. \n\n_-_ Will cause additional _elemental damage_, with a chance of _multiple resurrections, up to two times_ \n_-_ Type: Heart Demon Damage

actors.mobs.hollow.ghost_halloween.name=Ghost
actors.mobs.hollow.ghost_halloween.desc=Ghosts wandering around the Halloween Temple. Although they cannot cause damage to the enemy, they can cause mental damage. \n\nGhosts may be former adventurers, or they may be unknown things. \n\nAttacks in stealth mode will cause 9 heart demon damage\n_-_ Type: Heart demon damage
actors.mobs.hollow.ghost_halloween.hello=Hey, hello!

actors.mobs.hollow.pumking_ghost.name=Pumpkin Head Ghost
actors.mobs.hollow.pumking_ghost.desc=The pumpkin head ghost wandering in the Halloween Temple can't cause damage to the enemy, but it can cause mental damage. \n\nThe pumpkin head ghost is a product of evil energy transformation. It is more threatening than a ghost. \n\nAttacks in stealth mode will cause 12 heart demon damage and 5 rounds of blindness\n_-_ Type: Heart demon damage
actors.mobs.hollow.pumking_ghost.hello=Hey, hello!

actors.mobs.hollow.pumkingbomber.name=Pumpkin Gingerbread Man
actors.mobs.hollow.pumkingbomber.leap=Pumpkin Gingerbread Man prepares to leap!
actors.mobs.hollow.pumkingbomber.desc=It is said that this Gingerbread Man was once a doctor. He once tried to combine TNT and Gingerbread Man, but apparently, the experiment failed and the doctor's soul is attached to this alien. \n\nPumpkin Gingerbread Man will lock onto the target and then jump. When it reaches the target point, it will explode immediately, causing a huge range of explosion damage.

actors.mobs.hollow.vampire.name=Vampire Bat
actors.mobs.hollow.vampire.desc=These agile and tough cave vault creatures are more terrible than they look. They regenerate health with each successful attack, allowing them to defeat opponents much larger than themselves.

actors.mobs.hollow.vampire.true_name=Vampire
actors.mobs.hollow.vampire.true_desc=In the dark depths of the castle, there lurks an extremely dangerous being, often disguised as a vampire bat, flying silently in the shadows. Only when it senses the breath of human beings will it reveal its true face. Its form is terrifying and twisted, like a human and a beast, with a mouth full of fangs, and a blood-red light flashing in its eyes. \n\nAttacks will definitely cause heart damage, and may have other negative effects. \n_-_ Type: Heart Damage

actors.mobs.hollow.hollowmimic.minames=Pumpkin Lanterns
actors.mobs.hollow.hollowmimic.midescs=Pumpkin lanterns can be seen everywhere in the castle. You can see that it is smiling at you, which makes you feel creepy.

actors.mobs.hollow.hollowmimic.cspx_name=Wall of Nothingness
actors.mobs.hollow.hollowmimic.cspx_desc=It looks like the ground, but it is actually the mysterious power of the castle that distorts the wall. Absurdity and incomprehensibility are the charm of the castle! \n\nNarrator: Wait, this seems familiar, I seem to... uh... (Mysterious voice: Okay, okay, don't let the explorer know too much)

actors.mobs.hollow.hollowmimic.name=Pumpkin Wall Monster
actors.mobs.hollow.hollowmimic.desc=Pumpkin Wall Monster is also a member of the Mimic family, but they are different from their treasure chest monster relatives in that they don't like to lure adventurers into the trap with treasure chests. \n\nThey prefer to let adventurers relax their vigilance and lean against the wall to scare adventurers from behind. Combined with the power of the castle, the damage to the adventurer's inner demon will increase rapidly! ! !

levels.cerdogbosslevel$diedcrused.name=Blessing of the Dead
levels.cerdogbosslevel$diedcrused.desc=Charon was very unhappy because you sneaked to the other side. She used one tenth of her power to strengthen Cerberus. \n\nDuring the existence of Blessing of the Dead, the boss gains 50 shields + arcane shields every 50 rounds, and this effect will decay over time. And all attacks of Cerberus will have 2-4 additional inner demon damage, and the damage is increased by 20%.

actors.mobs.hollow.butcher.name=Chainsaw Maniac
actors.mobs.hollow.butcher.desc=Chainsaw Maniac was once an adventurer, but now he has lost his mind for various reasons. It wanders around the castle, looking for everything that can be torn apart. \n\n_-_ will cause additional _elemental damage_ \n_-_ type: inner demon damage

actors.mobs.hollow.crumb.name=Gingerbread Man
actors.mobs.hollow.crumb.desc=This is a happy gingerbread man, wandering around the castle. If he finds an enemy, he will "share" his happiness. \n\nIts attack will have a chance to increase the hero's _hunger_, and there is a chance that it will steal the hero's food and eat it in a place where no one can see. \n\nDefeat the gingerbread man can effectively relieve hunger, but it may also increase hunger.
actors.mobs.hollow.crumb.stole_food=Your %s was stolen by the naughty gingerbread man!
actors.mobs.hollow.crumb.carries=\n\nThis gingerbread man carries a _%s_. Obviously it came from you...
actors.mobs.hollow.crumb.escapes=The Gingerbread Man ate your %s in the dark and escaped!

actors.mobs.npcs.hollow.morphsnpc.name=？ ？ ？
actors.mobs.npcs.hollow.morphsnpc.desc=It doesn't look like something from this world. It seems to be waiting for something...
actors.mobs.npcs.hollow.morphsnpc.message1=Well, ladies and gentlemen, thank you very much for attending the play I planned.
actors.mobs.npcs.hollow.morphsnpc.message2=Now that the audience is here, then.
actors.mobs.npcs.hollow.morphsnpc.message3=The show officially begins!
actors.mobs.npcs.hollow.morphsnpc.message4=Morpheus is there!
actors.mobs.npcs.hollow.morphsnpc.message5=Adventurer, adventurer?


actors.buffs.elementalbuff.basebuff.scarybuff.name=Inner Demon Damage
actors.buffs.elementalbuff.basebuff.scarybuff.desc=An unknown evil force lingers in the All Saints' Hall. This force will gradually consume the target's mind, causing the target to continue to suffer from inner demon damage.\n\nThe scars caused by the damage will gradually recover over time. \nCurrent total percentage of inner demon damage: _%1$s%%_ (Out of control index: 100%%)\n\n
actors.buffs.elementalbuff.basebuff.scarybuff.no_effect=Although you are infected by the inner demon damage, you are still relatively rational now
actors.buffs.elementalbuff.basebuff.scarybuff.effect_1=The inner demon damage is making you feel unconfident, your _physical damage drops to 70%_
actors.buffs.elementalbuff.basebuff.scarybuff.effect_2=The inner demon damage is making you feel scared, your _physical damage drops to 65%_
actors.buffs.elementalbuff.basebuff.scarybuff.effect_3=The inner demon damage is making you feel scared, your _physical damage drops to 65%_ Inner Damage is distracting you, you can no longer use the magic of your staff.
actors.buffs.elementalbuff.basebuff.scarybuff.effect_4=Inner Damage is making you desperate, your Strength is reduced by 3 points.

actors.buffs.elementalbuff.basebuff.scarybuff.enemyname=Inner Corruption

actors.buffs.elementalbuff.basebuff.scarybuff.enemydesc=Inner Damage's curse corrupts your enemies, reducing the physical damage of any corrupted enemy to 80%. When Inner Damage fully erupts, the enemy will be affected by Withering. \n\nNote: The effect of elemental damage inflicted on the enemy will be reduced, and this elemental damage will be reduced by 1 point every 7 rounds. \n\nCurrent total percentage of demon damage: %1$s%% \n\n(Out of control index: 60%%)

actors.buffs.elementalbuff.damagebuff.scarydamagebuff.name=Frightened Heart
actors.buffs.elementalbuff.damagebuff.scarydamagebuff.desc=Long-term demon damage makes your mind almost collapse, and the thought of stabbing yourself with a weapon is always in your mind. \n\nYou feel very anxious and uneasy, as if the shadow is surging towards your position. \n\nIn this state, Strength -4, continuous withering state! Drinking purification or healing potions can remove the damage! \n\nThe remaining demon damage abnormal duration: %s rounds

actors.buffs.elementalbuff.damagebuff.scarydamagebuff.on_kill=Your mind has reached a critical point, and your inner demons have finally devoured you...

actors.buffs.elementalbuff.immunities.scaryimmunitiesbuff.name=Calmness of Mind
actors.buffs.elementalbuff.immunities.scaryimmunitiesbuff.desc=Reason finally triumphed over the desire to harm yourself. \n\nYou tighten your grip on your weapon, once again. \n\nRemaining immunity time: %s rounds.

###HOLLOWEND

actors.mobs.npcs.dragongirlblue.name=Half-dragon maid - Xiaolan
actors.mobs.npcs.dragongirlblue.desc=Wearing a blue dress, she stands under the Dreamcatcher magic circle. She is praying here...
actors.mobs.npcs.dragongirlblue.message1=Thank you for talking to me, %s.
actors.mobs.npcs.dragongirlblue.message2=He is a fierce god. He has survived in more dangerous environments than this. His power will surely help you get through this.
actors.mobs.npcs.dragongirlblue.message3=The woodland grows outside the walls of Mansu, but everyone who studies history knows that Mansu has no walls.
actors.mobs.npcs.dragongirlblue.message4=Mansu has no walls, and love has no boundaries.
actors.mobs.npcs.dragongirlblue.quest_start_prompt=The entrance to the ancient ruins has been opened. If you are ready, let me know. \n\nRemember, I will protect you. You can leave the dangerous ancient ruins at any time. Don't force yourself. Do what you can.
actors.mobs.npcs.dragongirlblue.enter_yes=I'm ready, Xiaolan!
actors.mobs.npcs.dragongirlblue.enter_no=Not yet, let me wait.
actors.mobs.npcs.dragongirlblue.not_locked=You don't have the key sword here, I can't help you open the entrance to the ancient ruins.
actors.mobs.npcs.dragongirlblue.exit_warn_none=Adventurer, is it too dangerous here? Are you ready to leave the ancient ruins?
actors.mobs.npcs.dragongirlblue.exit_yes=Yes, I am ready to leave.
actors.mobs.npcs.dragongirlblue.exit_no=No, I just want to go upstairs-_(Sub-level primary is invalid)_
actors.mobs.npcs.dragongirlblue.exit_yes_2=I have confirmed that I want to leave here.
actors.mobs.npcs.dragongirlblue.exit_no_2=I just clicked the wrong button.

actors.mobs.npcs.dragongirlblue.cashout_verify=Okay, here are your %d gold coins. I don't have anything to give you anymore, I wish you a safe journey.
actors.mobs.npcs.dragongirlblue.cashout_yes=Yes, give me the gold.
actors.mobs.npcs.dragongirlblue.cashout_no=No, I'll think about it.

actors.mobs.npcs.dragongirlblue.no_anymore=Adventurer, this is all I have, I wish you a safe journey.

actors.mobs.npcs.dragongirlblue.exit_boss_none=Adventurer, you have hunted Him. Now you can choose to stay or leave here. \n\nRemember to come to me, I will give you the reward you deserve.
actors.mobs.npcs.dragongirlblue.exit_yes_3=Yes, I want to leave here.
actors.mobs.npcs.dragongirlblue.exit_no_3=I still want to stay here for a while.

actors.mobs.npcs.dragongirlblue.b_message1=Yes, you want to witness the ancient times? Okay... I respect anyone's wishes.
actors.mobs.npcs.dragongirlblue.b_message2=We call on the Night Watchman, the god who guides the way forward. But before that, I need a prop that looks like a key sword to help.

actors.mobs.npcs.dragongirlblue.c_message1=Adventurer, welcome to the place where He lives.
actors.mobs.npcs.dragongirlblue.c_message2=Many years ago, a huge tsunami hit here, and He and them were washed here. After the tide receded, they could never return to the sea.
actors.mobs.npcs.dragongirlblue.c_message3=He has been sleeping for thousands of years. After you wake Him up, a fierce battle is inevitable. If you can cleverly avoid some of its avoidable attacks, I will give you the highest evaluation.
actors.mobs.npcs.dragongirlblue.c_message4=There are two wells here. They contain teleportation magic. Proper use can avoid most of the damage. The pillars in the venue can also help you cleverly avoid those vicious magics. I will give you a lenient time, but you must not be hit by Him.
actors.mobs.npcs.dragongirlblue.c_message5=Happy hunting!!! Also, if you are successful, its body would like you to bring it back to the surface.


actors.mobs.ancity.anomalocaris.name=Anomalocaris
actors.mobs.ancity.anomalocaris.desc=A strange creature that survived from ancient times, recorded as a shrimp, but in fact it is not...\n\nThey have a very focused power for hunting, but due to their bulky body, they cannot cross narrow places.
actors.mobs.ancity.anomalocaris.true=The first attack damage is increased by 300%, and this monster has not used this effect yet.

actors.mobs.ancity.threeleafbug.name=Trilobite
actors.mobs.ancity.threeleafbug.desc=Weak creatures that survived from ancient times, how did they survive until now? \n\nThey are very focused on hunting, and after perseverance, their claws will tear everything apart.
actors.mobs.ancity.threeleafbug.true=Each attack damage and movement speed increase, reaching the maximum after 7 attacks and the movement speed is greatly increased. It begins to gradually decay after leaving the battle. \n\nCurrent stacked attack count: %1$s\n\nCurrent average damage: %2$s

actors.mobs.ancity.turtle.name=Jungle Turtle
actors.mobs.ancity.turtle.desc=A strange creature that survived from ancient times. It is said that pharmacists like them very much...\n\nIt has no special abilities, but it is said that it has a chance to drop seeds.



actors.mobs.flowerslime.name=Jungle Flower Slime
actors.mobs.flowerslime.desc=A creature that can be found everywhere in the jungle. It should have been a relatively docile creature. Perhaps affected by the dungeon curse, they also began to actively attack passing humans. \n\nThe body of the slime is very sticky. Obviously, this slime is covered with plants in this area, and there may be some seeds on it.

actors.mobs.olddm300.name=DM275-Prototype
actors.mobs.olddm300.desc=This machine is a prototype test machine developed by the Dwarf Kingdom before the mass production of DM300. Due to its heavy weight, the prototype has been abandoned. The one you see now should be the last one! \n\nIt can carry out a wide range of long-range attacks before the fuel is exhausted. It can self-repair and refill a certain amount of fuel when moving on the water surface, but it will evaporate the water surface. When the health volume is lower than a certain ratio, it will immediately absorb the energy of all DM201 on this floor to generate a shield for itself. At the same time, the DM201 whose energy is absorbed will be immediately shut down.
actors.mobs.olddm300.notice=Intruder detected...
actors.mobs.olddm300.defeated=The system is insufficient in energy and automatically shuts down...
actors.mobs.olddm300.repair=Self-repair

#Spical

actors.mobs.spical.skydead.name=Skydead
actors.mobs.spical.skydead.desc=It is a more substantial ghost. Their bodies are corroded after death, leaving only skeletons. Their unyielding will seems to guide them to be reborn, but they are now more like the god of death due to the influence of the evil magic of the dungeon.
actors.mobs.spical.skydead.reason=Adventurer, we meet again. \n\nDeep in this well, there is an extremely dangerous existence. I strongly advise you not to go there, and once you go down, if you don't defeat it, you will die without a burial place. \n\nIf you are ready, please dive deep!
actors.mobs.spical.skydead.cant_enter_a=The road leading to the secret realm has been completely covered by water, and its body has been submerged in the water deep in this dungeon...
actors.mobs.spical.skydead.cant_enter_1=The water flow here is very strong. You can't leave here for the time being...
actors.mobs.spical.skydead.desc_fire=Skydead has not yet successfully made its first ranged attack, and will therefore have _100% global damage resistance_.
actors.mobs.spical.skydead.enter_yes=Deep Dive
actors.mobs.spical.skydead.tp=Escape will not solve any problem!
actors.mobs.spical.skydead.no_tele=Skydead: You want to teleport me?!
actors.mobs.spical.skydead.enter_no=I'll talk to you later
actors.mobs.spical.skydead.exit_warn_none=You're still alive? The water is coming up, I can get you out of here!
actors.mobs.spical.skydead.exit_yes=Leave the secret realm
actors.mobs.spical.skydead.exit_no=I'll talk to you later
actors.mobs.spical.skydead.notice=Pain will change your desires, the dead are the ones to tell.
actors.mobs.spical.skydead.defeated=..., I am free...
actors.mobs.spical.skydead.dodge_warning=Tips：If you get 0 for multiple attacks, you should use a magnifying glass to look at the text introduction to Heaven's Punishment.

actors.mobs.spical.greenslting.name=Greenslting
actors.mobs.spical.greenslting.desc=The plant elves in the jungle have no good feelings towards invaders...including you!!!

actors.mobs.spical.gnollhero.name=Gnoll Warrior
actors.mobs.spical.gnollhero.desc=With the mark of the tribe painted on his face, this is a fearless warrior from the Gnoll family, the most powerful of the Gnolls. Their power comes from faith, they believe that they are the incarnation of the god of the Gnolls, so their power is infinite. \n\nHe is quite dangerous, so you'd better not let him get close to you.

actors.mobs.spical.dm275.name=DM275-RPG Experimental Mech
actors.mobs.spical.dm275.desc=DM275-RPG Experimental Mech is a transitional city defense device before the Dwarves developed DM300. It was originally used to protect the Dwarven miners in the mines and the city below. Compared with the second generation, they are much larger and heavier, and use powerful hydraulic hammers and terrifying RPGs to crush every invader. \n\nThis long-abandoned war machine is still in operation even today. Its buzzing hydraulic drills and rocket launchers show that it is not easy to mess with.

actors.mobs.blackmimic.name=Dark Gold Mimic Box
actors.mobs.blackmimic.desc=Treasure Box Monsters are magical creatures that can change their appearance at will. In dungeons, they almost always appear in the form of treasure boxes, because this is more attractive to unsuspecting adventurers. \n\nThe Dark Gold Mimic Box is more cunning and aggressive than its cousins, and will try to seize an item and use it for its own benefit.

actors.mobs.spical.succubusqueen.name=Succubus Queen
actors.mobs.spical.succubusqueen.desc=Succubus are a type of shapeshifting demon that is good at manipulating the minds of their enemies. These demons draw their power from people's desires, and can use their beauty to attract enemies and then manipulate their minds. \n\nThe Succubus Queen is the leader of the Succubus. When attacking, she can use _Absolute Charm_ to control the enemy, making the enemy completely unable to attack for a certain period of time and being continuously absorbed by the Succubus Queen. In the _Absolute Charm_ state, the damage received by the charmed party is increased by 25%.



actors.mobs.npcs.typhon.quest_start_prompt=Adventurer, it seems that he has left. Do you want me to take you back, or embark on the return journey?
actors.mobs.npcs.typhon.enter_yes=Yes, I want to return.
actors.mobs.npcs.typhon.enter_no=No.
actors.mobs.npcs.typhon.goodluck=Good luck on your journey, %s!


#Spical End

actors.mobs.npcs.pinkghost.name=Pink Ghost
actors.mobs.npcs.pinkghost.desc=This ghost is emitting a beautiful light, like a lamp of hope in the dungeon. A bright smile appeared on her face...

actors.mobs.npcs.ghostnpc.name=Sad Ghost
actors.mobs.npcs.ghostnpc.desc=This ghost is almost invisible. It looks like a shapeless dim light and a sad face.

actors.mobs.npcs.pinkghostnpc.name=Pink Ghost
actors.mobs.npcs.pinkghostnpc.desc=This ghost is emitting a very beautiful light, like a lamp of hope in the dungeon. A bright smile appeared on her face...

actors.mobs.npcs.pinkghost.hello=Hello, adventurer, ah, please don't be afraid of me, I was once one of you.
actors.mobs.npcs.pinkghost.hello_1=Can you do me a favor? There is a hidden garden in this dungeon. I can't remember where it is. Anyway, there is a white rose in it. I planted it some time ago. It should have bloomed now. It's not easy to collect rose seeds in a dungeon. In addition, there are some ghosts wandering in that garden. They are different from me. They are terrible ghosts.
actors.mobs.npcs.pinkghost.hello_2=Can you help me find that flower? If you can, I have something that may be useful. I will exchange it with you.
actors.mobs.npcs.pinkghost.hello_3=If you are ready later, talk to me again and I will use my power to let you go there.
actors.mobs.npcs.pinkghost.good_desc=Ah, thank you. I thought I would never see this rose again. \n\nGive me the rose, I've brought something for you, I hope it will be helpful for your next journey.
actors.mobs.npcs.pinkghost.why_red=You've come back, but you don't have a white rose here, did you throw it away?
actors.mobs.npcs.pinkghost.giverose=Give a white rose
actors.mobs.npcs.pinkghost.givemoon=Give a mooncake
actors.mobs.npcs.pinkghost.whatmoon=Ah, thank you, ghosts don't need to eat mooncakes, I accept your kindness.
actors.mobs.npcs.pinkghost.moonname=Wait, this mooncake... why is there my name on it?\n\nWhat, a ghost gave it to you? Could it be that he...did he really...
actors.mobs.npcs.pinkghost.moonlost=The pink ghost disappeared with the mooncake...
actors.mobs.npcs.pinkghost.goodluck=Good luck on your journey, adventurer!
actors.mobs.npcs.pinkghost.not_sorry=Sorry, adventurer, I let you see how sad I am...
actors.mobs.npcs.pinkghost.not_sorry_1=I said before that I am also an adventurer, but I gave up my identity before I entered the dungeon. The reason I became like this in the dungeon is for my lover.
actors.mobs.npcs.pinkghost.not_sorry_2=My lover went into the dungeon one last time before marrying me. I remember it was to collect materials in the shallow level of the dungeon. But after several days, he didn't come back. I was very anxious, but I couldn't enter the dungeon without the permission of the Adventurer's Guild or the guarantee of the adventurer, so I found _Laurence_, who was a dwarf craftsman and not a member of the Adventurer's Guild. But he helped me find a way to avoid the guards, and finally, we successfully entered the dungeon.
actors.mobs.npcs.pinkghost.not_sorry_3=After entering the dungeon, Lawrence disappeared, and I had to explore alone. \n\nHowever, I couldn't find him in the first few floors. I guessed that he might have gone to a deeper place, so I continued to explore until I finally fell in the poisonous gas... But fortunately, a man in a brown cloak saved me, but my body was too seriously injured, so he had to freeze my body first, allowing me to continue wandering in this dark dungeon as a soul... But I still couldn't find any clues about him. I guessed that I might be too anxious, and he should have gone back a long time ago, just going to the town next door to rest for two days. But, I can't turn back.
actors.mobs.npcs.pinkghost.not_sorry_4=Since you got this mooncake from a ghost, it means that he also met with an accident... But I will continue to look for him. Even if we can never return to the ground, never sleep in each other's arms like before, and never clumsily bake mooncakes with unknown fillings for each other, I will still look for him.
actors.mobs.npcs.pinkghost.talk_desc=I believe he is still waiting for me there. \n\nAnyway, thank you. \n\nBy the way, I forgot to give you these things. I sincerely hope that they can help you. \n\nThe white rose will be left for you as a souvenir...
actors.mobs.npcs.pinkghost.givego=Take the items
actors.mobs.npcs.pinkghost.take=He is here!
actors.mobs.npcs.pinkghost.whathere=Ah, he is not here. Thank you for comforting me...
actors.mobs.npcs.pinkghost.rose=Wait, this is... the rose I gave him! It's been so long, and it hasn't withered yet...\n\nCould it be that, he, he is nearby?

actors.mobs.npcs.pinkghost.love&love=They embraced each other again in a non-existent form. The white rose and the red rose fell gently from their hands. An indescribable emotion filled your heart.

actors.mobs.npcs.ghostnpc.love=Dear, it's me.....
actors.mobs.npcs.pinkghost.oh_no=Oh my God! You... how did you become like this?
actors.mobs.npcs.ghostnpc.sorry=I'm sorry, I... neglected.
actors.mobs.npcs.pinkghost.linklove=No, I should be sorry, I should have gone with you...

actors.mobs.npcs.pinkghost.thanks=Adventurer, I am very grateful for your help.
actors.mobs.npcs.pinkghost.thanks_1=Without you, I can't reunite with my lover.
actors.mobs.npcs.pinkghost.thanks_2=My savior is calling me, and my lover will go with me to see him.
actors.mobs.npcs.pinkghost.thanks_3=Perhaps in the future reincarnation journey, I will meet you and my lover less often. But please tell him in reincarnation that I am always by his side.
actors.mobs.npcs.pinkghost.thanks_4=Goodbye, %s.
actors.mobs.npcs.pinkghost.thanks_5=They disappeared into the air, and only a bunch of white and red roses with red light witnessed their love...

actors.mobs.bluewraith.name=Blue Wraith
actors.mobs.bluewraith.desc=This wraith was once a leader in exploring dungeons like you, but was trapped here for some reason and eventually met death...

actors.mobs.bosses.sakafishboss.name=Sakaban Turtle
actors.mobs.bosses.sakafishboss.desc=Once the king of the sea in ancient times, he entered the dark pool underground and fell asleep when the inevitable doomsday came. He thought of returning to the sea one day, but with the magic transformation of the dungeon and the changes in the sea itself, it can never return to that ideal sea.
actors.mobs.bosses.sakafishboss.notice=sakasaka...saka? Ni...xi...what? !
actors.mobs.bosses.sakafishboss.attack=Bata-bata-woo...I miss the scenery and bottom-dwelling creatures above
actors.mobs.bosses.sakafishboss.leap=Sakaban Turtle is accumulating power to hit the dump truck! Oh--Chuangsi--Li--!!!
actors.mobs.bosses.sakafishboss.laserwarning=Sakaban Turtle is summoning the surrounding dark energy to release the death gaze...
actors.mobs.bosses.sakafishboss.king=Mount Tai is pressing down on me! biu--
actors.mobs.bosses.sakafishboss.interesting=Let me show you the posture of the ancient top predator!
actors.mobs.bosses.sakafishboss.angry=Damn human beings! Why did you destroy our homeland? ! Damn, damn, damn, damn, damn, damn, go to hell with my compatriots!
actors.mobs.bosses.sakafishboss.defeated=Wuwuwu... I... I... I..., still can't return to the sea...
actors.mobs.bosses.sakafishboss.dictcar_kill=%s was blown away by Sakaban and left the world...
actors.mobs.bosses.sakafishboss.deathgaze_kill=%s was frightened to death by Sakaban's death gaze...
actors.mobs.bosses.sakafishboss.rankings_desc=Became the food of Sakaban turtles...

actors.mobs.bosses.sakafishboss$hunting$1.rankings_desc=Became the food of the Sakaban turtle...

actors.mobs.bosses.dictfish.name=Plate-footed horseshoe crab
actors.mobs.bosses.dictfish.desc=A top predator living on the bottom, its huge claws and jaws can crush your armor. \n\nIt is symbiotic with _Cornerstone_, so after death, Cornerstone will go berserk, and the special attack it gains has impact, which can repel enemies and cause a lot of damage. And it is immune to fire.
actors.mobs.bosses.dictfish.notice=Plate-footed horseshoe crab: Big brother!
actors.mobs.bosses.dictfish.death=Big brother, the next step is up to you!
actors.mobs.bosses.dictfish.angry=Plate-footed horseshoe crab: Big brother! Damn human! I want you to pay the price!
actors.mobs.bosses.dictfish.rankings_desc=Became food for the Sakaban turtle...

actors.mobs.bosses.roomstone.name=Cornerstone
actors.mobs.bosses.roomstone.desc=An ancient top predator, its beak and carapace can easily pierce your body. \n\nIt is symbiotic with the _Eubroglossus_, so after death, the _Eubroglossus will go berserk, gaining 35 rounds of hormone surge and temporary invincibility for 10 rounds, and each attack will definitely cause vulnerability, and the speed will be greatly increased after leaving the water.
actors.mobs.bosses.roomstone.notice=Cornerstone: Second brother!
actors.mobs.bosses.roomstone.allget=We are brothers! We can break metal with our strength! For our homeland!
actors.mobs.bosses.roomstone.angry=Cornerstone: Second brother! Damn humans! I will grind you into meat paste!
actors.mobs.bosses.roomstone.leap=Cornerstone: Humans, use your blood to commemorate our homeland!
actors.mobs.bosses.roomstone.rankings_desc=Became the food of the Sakaban turtle...

actors.mobs.npcs.nxhy.talk=Talk
actors.mobs.npcs.nxhy.buyback=Memories readily returned the corresponding goods.

actors.mobs.npcs.nxhy.talk_prison_intro=Adventurer, welcome to this dangerous dungeon.
actors.mobs.npcs.nxhy.talk_prison_warrior=Leiling Anjie, are you also here to find the Crystal Heart? Oh, well, I know that I know the actions of the three giants on the surface, but I don't want to get involved in these things anymore. Now, it's best for me to be a businessman.
actors.mobs.npcs.nxhy.talk_prison_mage=Sister Jasmine, I know that the purpose of your coming here is not to find that thing, but to hear the call for help from the abyss. But what I can tell you is, don't get involved in their affairs. After all, this is not your home, and your power cannot be fully displayed.
actors.mobs.npcs.nxhy.talk_prison_rogue=Oh, isn't this the royal thief that everyone praises? Are you going to steal something from me? Hahaha, I'm kidding. In fact, I admire you very much. For the poor, you are willing to give up your royal blood to share the joys and sorrows with the poor. Your father may have known it a long time ago. If you don't believe it, your cloak has been secretly transformed by him. What, you don't know yet? Hahaha, why do I know, this is a secret!
actors.mobs.npcs.nxhy.talk_prison_huntress=I used to be a knight like the lady, but it changed in an instant. I no longer pursue these things. Miss, do you know that since you left, your tribe has... Oh, don't point the bow at me, I won't tell you. I still hope that the lady can find her own goal in the trial in the dungeon.

actors.mobs.npcs.nxhy.talk_prison_duelist=Miss, you don't look like someone from this world. You must be from another place. Of course, you can choose any of my products here, as long as the money is in place.

actors.mobs.npcs.nxhy.talk_caves=The mine caves here are always so cold, but they were not like this before. There was once a blue-haired girl who left a book here. Since then, the mine caves have become so cold, but the girl has never been seen again...
actors.mobs.npcs.nxhy.talk_city=Dwarf City is the last material transfer station I gave you. Going down, it is no longer an area I can cover. It used to be prosperous here, but after that incident, everything changed...

actors.mobs.npcs.nxhy.guards=It seems that you need a more difficult trial.
actors.mobs.npcs.nxhy.thief=It seems that you need a more difficult trial.
actors.mobs.npcs.nxhy.why=Robbery? You're so funny!

actors.mobs.npcs.nxhy.sell=Select an item to sell
actors.mobs.npcs.nxhy.name=Those Memories
actors.mobs.npcs.nxhy.desc=This is a merchant with many things, his name is Those Memories. It is said that he knows what happened in this dungeon 300 years ago, and he is waiting for every adventurer here. He will give adventurers corresponding supplies, but he never tells adventurers how dangerous this dungeon is. Rumor has it that he used to be a knight, but now he has become a merchant.
actors.mobs.npcs.nxhy.greetings=Hello, %s. Welcome to my big shop.

actors.hero.hero.heartdied=Death is not the end, but a new beginning.
actors.hero.hero.nitch=Non-body layer does not allow jumping action.
actors.hero.hero.no_item=Warm Tips:\n\nIn each game of Snow Town, you can get items from NPCs up to 4 times. You have used up the times, and the next time it will be converted into 1 gold coin.

actors.hero.hero.quest_start_prompt=The flash aimed at the bullseye is ready. What is your choice? \n\nNote: If the target location of the flash is the abyss, and you have no immunity effects such as floating, you will fall directly.
actors.hero.hero.enter_yes=Flash to the target location
actors.hero.hero.enter_no=Abandon this flash

actors.buffs.stormclouddied.name=Lightning Chain Reaction
actors.buffs.stormclouddied.desc=You temporarily control the power of thunder and lightning. In the next period of time, anything that appears in front of you will be judged by thunder. \n\nWith your current control ability, each lightning chain can cause %1$s damage\n\nYou currently have %2$s lightning chains left. \n\nTotal damage caused by remaining lightning chains: %3$s damage\n\nDamage type: True (Thunderstorm)


actors.mobs.brutebot.name=Heavy Armor Jackal
actors.mobs.brutebot.desc=Gnolls get armor from defeated adventurers. It seems that gnolls finally realized that shields are really useless...\n\nAlthough heavy armor jackals are a great threat to adventurers, their heavy armor makes them slow...\n\nGenerally speaking, dwarves will hire some of these jackals to help them do work. Heavy armor jackals like to hit people with weapons, but their weapons are not very strong, so they often break their weapons and then ask the dwarves for new weapons.
actors.mobs.brutebot$brutebotrage.name=Dying Struggle
actors.mobs.brutebot$brutebotrage.desc=The death of this heavy armor jackal is inevitable, but it wants to take you with it! \n\nThe passage of time or external damage will wear down the shield. When the shields are gone, the Jackal will be completely destroyed. However, be careful, during this phase the Jackal will deal heavy damage with ranged and melee attacks, and the time between attacks is greatly reduced! \n\nRemaining shields: %d.
actors.mobs.brutebot.enraged=Enraged
actors.mobs.brutebot.died=You have enraged the Jackal, and it will do its best to attack you before it dies! It has also called in all enemies on this floor.
actors.mobs.brutebot$focus.name=Red Eye Gaze
actors.mobs.brutebot$focus.desc=This Jackal has completely focused on its target's every move, seemingly anticipating its next move. \n\nA Jackal in Red Eye Gaze will always block the next physical attack. Blocking will distract the Jackal, and it will take them a while to refocus to successfully block the attack. When moving, the brute bot recovers relatively quickly.
actors.mobs.brutebot.def_verb=Block
actors.mobs.brutebot.parried=Shield
actors.mobs.brutebot.ondeath=You were killed by the brute bot..., please be careful next time...

actors.mobs.bosses.diamondknight.name=King of Mimicry
actors.mobs.bosses.diamondknight.notice=Human... You shouldn't cross my bottom line...
actors.mobs.bosses.diamondknight.desc=The ultimate result of mimicry is to be infinitely close to humans. \n The outer shell of the diamond treasure chest, which was originally used for mimicry, turned into armor, covering the king-like inner shell. \n He is the king of all mimics - at least he thinks so. \n The king will fight to the last moment, until he is shattered to pieces.
actors.mobs.bosses.diamondknight.rankings_desc=The Mimic King has made you a treasure...
actors.mobs.bosses.diamondknight.ondeath=Your qualifications are average.
actors.mobs.bosses.diamondknight.tpdoor=The Mimic King invites you to the Treasure Labyrinth. This may be a Hongmen Banquet, but you have no choice...
actors.mobs.bosses.diamondknight.now_go=What an interesting guy. I will show you my Treasure Labyrinth. Interactive portal to enter the second stage...

actors.mobs.bosses.tpdoor$1.name=Go to the Treasure Labyrinth?
actors.mobs.bosses.tpdoor$1.quest_start_prompt=The Treasure Labyrinth is patrolled by various treasure chest monsters, but there are treasures saved by the Mimic King. Go and have a look now! \n\nQuest objective: _ Defeat five treasure chests except the diamond treasure chest, then find the "mysterious portal" to leave here. _\n\nWhen the portal appears, you will resonate with it!
actors.mobs.bosses.tpdoor$1.quest_start_ender=The treasure maze is collapsing, but fortunately you found the portal..., enter the portal and leave here quickly!
actors.mobs.bosses.tpdoor$1.enter_yes=Yes, take me back!
actors.mobs.bosses.tpdoor$1.enter_no=No, I want to stay a little longer.
actors.mobs.bosses.tpdoor.display=You have destroyed the balance here, and the portal has appeared again..., find and interact with it to leave here...
actors.mobs.bosses.tpdoor$1.leave=Escape from the treasure maze?

actors.mobs.bosses.firedragon.name=Lava Dragon
actors.mobs.bosses.firedragon.desc=The center of jungle corruption, the mastermind behind the jungle. \n\nThe temperature of the lava cave is getting higher and higher, and the fire dragon's attack is fierce. \n\nAs the flames burn, the sky is red. We must repel it and let the jungle gain temporary stability. \n\n_The fire dragon will mark a range to create a magic fire wall at the beginning of the battle, but it will eliminate this threat after hunting. You can also stand on the low-temperature magma without being affected. _
actors.mobs.bosses.firedragon.notice=The fire dragon noticed you. A flame spread around here, and the raging fire surrounded this place. Now there is no way to retreat!
actors.mobs.bosses.firedragon.scorpion=Hunting, feeding. My slaves, it's time!
actors.mobs.bosses.firedragon.elemental=Minions, wake up...
actors.mobs.bosses.firedragon.toy=Lava Dragon: It's time to show you my real skills! The fire dragon teleported away in an instant...
actors.mobs.bosses.firedragon.healing=My minions, heal me quickly!
actors.mobs.bosses.firedragon.defeated=After the fire dragon roared in pain, it fell here...
actors.mobs.bosses.firedragon.clear=You feel something extinguished, and a repressive force is dissipating from here.
actors.mobs.bosses.firedragon.lingjing=The prism shattered in the fire dragon's painful roar...
actors.mobs.bosses.firedragon.car=Note: The dragon car is coming soon, please pay attention!

actors.mobs.bosses.firedragon.dragon_majesty=The dragon race will not yield to anyone, we are the masters here!
actors.mobs.bosses.firedragon.dragon_rituals=No hostile targets have been found yet, and the mysterious rituals have begun to prepare for war...
actors.mobs.bosses.firedragon.scorpion_enemy=Erosion, curse, everything is the era of the dragon race!

actors.mobs.bosses.firedragon$vertigoeffect.name=Directed Evolution·Unyielding
actors.mobs.bosses.firedragon$vertigoeffect.desc=The road to find is long, and those who get lost will eventually be swallowed up\n\n Fire dragon's physical defense is increased to 120%%\n\n There are still: %s rounds before the effect decays.

actors.mobs.bosses.firedragon$hasteeffect.name=Directed Evolution·Storm
actors.mobs.bosses.firedragon$hasteeffect.desc=The only martial arts in the world that cannot be broken is speed! No matter how good your martial arts are, you are still afraid of a kitchen knife\n\nThe base speed of the fire dragon is increased to 200%%\n\nThe distance effect decays in: %s rounds.

actors.mobs.bosses.firedragon$toxicgaseffect.name=Directed Evolution·Toxic
actors.mobs.bosses.firedragon$toxicgaseffect.desc=It infects everything. This jungle is not worthy of His salvation\n\nA large amount of poisonous gas is generated near the fire dragon\n\nThe distance effect decays in: %s rounds.

actors.mobs.bosses.firedragon$damageupeffect.name=Directed Evolution·Hunting
actors.mobs.bosses.firedragon$damageupeffect.desc=Hunting everything, killing the jungle\n\nFiredragon's global damage increased to 140%, attack speed increased by 50%%\n\nThe effect decays in %s rounds.

actors.mobs.bosses.firedragon$bleedingeffect.name=Directed Evolution·Bloodthirstiness
actors.mobs.bosses.firedragon$bleedingeffect.desc=Hunting everything, killing the jungle\n\nFiredragon's normal attack causes bleeding effect\n\nThe effect decays in %s rounds.

actors.mobs.aoreadydragon.name=Oerzu Dragon
actors.mobs.aoreadydragon.desc=After the Fire Dragon disaster, the figures of the dragons quietly emerged, as if hidden in layers of fog. Everything about these ancient beings is still an unknown mystery.
actors.mobs.aoreadydragon.leave=Leave...Leave...
actors.mobs.aoreadydragon.flower=Oklah...Doomsday...The dragons must be saved...

actors.mobs.bosses.notsync.diedclearelemet.friend=After the Fire Dragon incident, these mysterious elements finally regained their freedom. Now, at the end of the jungle, they work together to open up a bright road for their former benefactors, guiding the hope and future ahead.

actors.mobs.bosses.notsync.diedclearelemet$clearelemetalblood.name=Blood Crystal Element
actors.mobs.bosses.notsync.diedclearelemet$clearelemetalblood.desc=The power of the fire dragon has polluted these former guardians. Although they are innocent, you must make a choice. \n\nBlood Crystal Element will have a chance to cause {bleeding{ effect when attacking the target. If it is preyed by the fire dragon, the fire dragon's normal attack will cause bleeding effect, which lasts for 30 rounds.

actors.mobs.bosses.notsync.diedclearelemet$clearelemetalgreen.name=Poison Crystal Element
actors.mobs.bosses.notsync.diedclearelemet$clearelemetalgreen.desc=The power of the fire dragon has polluted these former guardians. Although they are innocent, you must make a choice. \n\nWhen attacking a target, the poison crystal element will have a chance to produce a large amount of poison gas. If it is preyed on by a fire dragon, a large amount of poison gas will be produced around the fire dragon itself, which will last for 70 rounds.

actors.mobs.bosses.notsync.diedclearelemet$clearelemetaldark.name=Dark Crystal Element
actors.mobs.bosses.notsync.diedclearelemet$clearelemetaldark.desc=The power of the fire dragon has polluted these former guardians. Although they are innocent, you must make a choice. \n\nWhen attacking a target, the Dark Crystal Element will have a chance to cause the |Cripple| effect. If it is eaten by a Fire Dragon, the Fire Dragon's global damage will be increased to 140%, and the attack speed will be increased by 50%, which will last for 50 rounds.

actors.mobs.bosses.notsync.diedclearelemet$clearelemetalpure.name=Charm Crystal Element
actors.mobs.bosses.notsync.diedclearelemet$clearelemetalpure.desc=The power of the Fire Dragon has polluted these former guardians. Although they are innocent, you must make a choice. \n\nWhen attacking a target, the Charm Crystal Element will have a chance to cause the [Illusion] effect. If eaten by a Fire Dragon, the Fire Dragon's defense will be increased to 120% for 80 rounds.

actors.mobs.bosses.notsync.diedclearelemet$clearelemetalgold.name=Phosphorus Crystal Element
actors.mobs.bosses.notsync.diedclearelemet$clearelemetalgold.desc=The power of the Fire Dragon has polluted these former guardians. Although they are innocent, you must make a choice. \n\nWhen attacking a target, the Phosphorus Crystal Element will have a chance to generate 60 points of [Phosphorus Fire[ gas. If eaten by a Fire Dragon, the Fire Dragon's base speed will be increased to 200% for 20 rounds.

actors.mobs.bosses.dwarfgeneral.name=Dwarf General
actors.mobs.bosses.dwarfgeneral.desc=Once the strongest general in the Dwarf Kingdom, but now he has become a ghost. \n\nPerhaps in the long night, he has been confused, lost, and regretful...\n\nWhat kind of wandering can make all this more worthwhile? He said nothing, and you said nothing.
actors.mobs.bosses.dwarfgeneral.charging=It seems that you still have some tricks, so try this. Collapse Mountain Slash!!!
actors.mobs.bosses.dwarfgeneral.message1=......Oh?
actors.mobs.bosses.dwarfgeneral.message2=Oh, it seems that we can have some fun again.
actors.mobs.bosses.dwarfgeneral.message3=Then let me see how good you are!
actors.mobs.bosses.dwarfgeneral.story=After the first battle with the Dwarf General, you must have a follow-up conversation to leave here!
actors.mobs.bosses.dwarfsolider.name=Dwarf Gladiator
actors.mobs.bosses.dwarfsolider.desc=Dwarf Gladiators were once the general's personal guards. Even after being corrupted, they are still loyal to their master, the Dwarf General. \n\nAttacks have a chance to knock the player's weapons away

actors.mobs.bosses.dwarfsolider.attack_msg_1 = Defend the dignity of the Dwarves to the death
actors.mobs.bosses.dwarfsolider.attack_msg_2 = Get out of here! You don't belong here!
actors.mobs.bosses.dwarfsolider.attack_msg_3 = We are the last barrier of the dynasty!
actors.mobs.bosses.dwarfsolider.attack_msg_4 = The general is still here, the dwarves are still here, but the dynasty is gone forever...
actors.mobs.bosses.dwarfsolider.attack_msg_5 = Your Highness Lawrence, where are you?
actors.mobs.bosses.dwarfsolider.attack_msg_6 = Our last hope has also been shattered...
actors.mobs.bosses.dwarfsolider.attack_msg_7 = General, can we still see the future of the Dwarf Empire?
actors.mobs.bosses.dwarfsolider.kicked = Your weapon was knocked away by the Dwarf Gladiator...

actors.mobs.bosses.dwarffuze.name=Dwarf Fuze
actors.mobs.bosses.dwarffuze.desc=The remnant of the "Fuze", the most powerful force in the Dwarf Empire. Because of the subsequent recruitment and the Dwarf General, they work together.\n\nAttacks have a chance to cause bleeding half of their own damage, and will not attack in close combat.

actors.mobs.bosses.dwarfsolider$focus.name=Foresee the Future
actors.mobs.bosses.dwarfsolider$focus.desc=This gladiator has completely focused on the target's every move, and seems to be able to predict the target's next move. \n\nThe gladiator who foresees the future will definitely block the next physical attack. If the foresight is successful, they will gain 20 points of arcane shield. The foresight will automatically disappear after the Dwarf Gladiator attacks the target. Foresight recovers relatively quickly when moving. \n\nThe effect disappears after leaving combat or attacking the target.
actors.mobs.bosses.dwarfsolider.parried=+20 Arcane Shield
actors.mobs.bosses.dwarfsolider.future=Foresee the future successfully!

actors.buffs.brokenarmor.name=Useless Shield
actors.buffs.brokenarmor.desc=Your defense is affected by the "Dwarf General" magic, and the maximum and minimum armor values ​​are instead _a quarter_ of your _weapon damage_. \n\nWithout a weapon, the _minimum defense is 0_, and the highest defense is for heroes _one third_ of the damage done by bare hands_. Only heroes are affected by this effect. \n\nRemaining effect duration: %s turns

actors.blobs.brokenarmorfire.desc=Useless and strange flames are glittering here, and creatures that are not protected will be cursed with the useless shield effect.

actors.mobs.bosses.dwarfgeneral$armoreffect.name=Void Stance
actors.mobs.bosses.dwarfgeneral$armoreffect.desc=It is only my ghost that is hit. When the general is in Void Stance, any attack he receives is limited to 1, and his dodge is greatly reduced. \n\nWhen the general receives 5 damages cumulatively, he will immediately summon two _Dwarf Gladiators_ and clean up the previous gladiators, and exit the Void Stance at the same time, and the cooldown of this effect will be greatly extended. \n\nAfter leaving this effect, the cumulative damage times will not be reset to zero, and will continue to be calculated after the next effect is triggered. \n\nRemaining effect duration: %s rounds

actors.mobs.bosses.dwarfgeneral$nohealdied.name=Bloodthirsty Form
actors.mobs.bosses.dwarfgeneral$nohealdied.desc=When the dwarf general enters the bloodthirsty form, each attack has a chance to heal. \n\nBut the threshold will not exceed 800 health (the starting point of the second stage)\n\nRemaining effect duration: %s rounds

actors.mobs.bosses.dwarfgeneral$magicattack.name=Magic Form
actors.mobs.bosses.dwarfgeneral$magicattack.desc=After entering the magic form, the dwarf general has a chance to make the enemy wither with each attack. But it will definitely cause a downgrade effect. \n\nRemaining effect duration: %s rounds.

actors.mobs.bosses.dwarfgeneral$wither.name=Wither
actors.mobs.bosses.dwarfgeneral$wither.desc=Your life is being withered by evil magic... You must take emergency measures! \n\nIn the wither state, you will not get the healing effect when using a healing potion. Instead, it will dispel the wither, which is also effective in challenges. \n\nRemaining effect duration: %s rounds
actors.mobs.bosses.dwarfgeneral$wither.on_kill=Your life is fading away...

actors.mobs.bosses.dwarfgeneral.leap=I see the target! There better be no one there!

actors.mobs.bosses.dwarfgeneral.fuze=As the saying goes, one for all, one for all. Come out, my comrades, and make this show a little more grand.
actors.mobs.bosses.dwarfgeneral.normal=It seems you are going to fight me, Challenger, I follow your advice. Then, help me clean up the "portal".

actors.mobs.bosses.dwarfgeneral.spear_warn=Oh, it seems I hit the bull's eye!
actors.mobs.bosses.dwarfgeneral.notice=Can the future of the world and the dwarves be handed over to you? Let me do a "quality inspection".

actors.mobs.bosses.dwarfgeneral.wtf=You actually hurt my comrades, I can't forgive you!
actors.mobs.bosses.dwarfgeneral.gotime=The power of nothingness is beyond your reach...
actors.mobs.bosses.dwarfgeneral.support=Dwarf Gladiator: Our master is threatened, go to support!
actors.mobs.bosses.dwarfgeneral.wow=You are still here? Well, challenger, it seems that things are getting interesting...

actors.mobs.bosses.dwarfgeneral.army_one=Arm your troops, assemble your troops!!!
actors.mobs.bosses.dwarfgeneral.army_two=Everyone, assemble immediately!!!
actors.mobs.bosses.dwarfgeneral.army_three=You can't leave here!!!
actors.mobs.bosses.dwarfgeneral.defeated=The Dwarf General has been defeated... no, his wounds have healed suddenly. . He seems to have something to say to you.

actors.mobs.bosses.dwarfgeneral.died=......%s, will you always fight for your beliefs?

actors.mobs.bosses.armyflag.name=Royal Court Army Flag
actors.mobs.bosses.armyflag.desc=The flag of the Dwarf Empire symbolizes the former glory of the empire. \n\nThe former Dwarf Empire, but now only ruins and ghosts tell of her former glory. \n\n_During the existence of the flag, the Dwarf General becomes invincible_\n\nAnd the surrounding enemies and friends periodically gain _Hormone Surge Buff_ and _Slow_ effects.

actors.mobs.bosses.armyflag$noenter.name=Defending Stance
actors.mobs.bosses.armyflag$noenter.desc=During the effect, the self gains 90% damage reduction. \n\nRemaining effect duration: %s rounds

actors.mobs.bosses.dwarfgeneralnpc.name=Dwarf General
actors.mobs.bosses.dwarfgeneralnpc.desc=???

actors.mobs.bosses.dwarfgeneralntnpc.name=Thorin
actors.mobs.bosses.dwarfgeneralntnpc.desc=Once a general, now a ghost. But in the long journey, he never regretted... The way of the general is in it...

actors.mobs.bosses.dwarfgeneralntnpc.goodbye=Goodbye, %s.
actors.mobs.bosses.dwarfgeneralntnpc.xms=He has never left. He is the past and the future...

actors.mobs.bosses.dwarfgeneral.message6=Good job, %s.
actors.mobs.bosses.dwarfgeneral.message7=You: How did your scar disappear?
actors.mobs.bosses.dwarfgeneral.message8=......Hahahaha, it seems that the little devil didn't tell you.
actors.mobs.bosses.dwarfgeneral.message9=A simple common sense: you can't kill a dead person.
actors.mobs.bosses.dwarfgeneral.message10=You: Dead people? !
actors.mobs.bosses.dwarfgeneral.message11=Yes, this is my commission for the little devil.
actors.mobs.bosses.dwarfgeneral.message12=The little devil will look for a powerful adventurer and bring him or her to 'me'. As long as he or she can defeat me, he or she can get some equipment.
actors.mobs.bosses.dwarfgeneral.message13=As for me, I can also have some fun, and maybe find new comrades.
actors.mobs.bosses.dwarfgeneral.message14=You: About yourself?
actors.mobs.bosses.dwarfgeneral.message15=My name is not important.
actors.mobs.bosses.dwarfgeneral.message16=I am a dwarf general, I was and I am.
actors.mobs.bosses.dwarfgeneral.message17=You: About your death......
actors.mobs.bosses.dwarfgeneral.message18=I am not sure if there is any research on the Dwarf Empire in the past few decades on the ground.
actors.mobs.bosses.dwarfgeneral.message19=The current king has no relationship with the real royal family.
actors.mobs.bosses.dwarfgeneral.message20=Decades ago, a highly capable necromancer assassinated almost all members of the royal family, controlled the ministers, and proclaimed himself emperor.
actors.mobs.bosses.dwarfgeneral.message21=Under his rule, the once prosperous Dwarf Empire began to fall into decline.
actors.mobs.bosses.dwarfgeneral.message22=His ruling style depends on his mood. He is the dictator of everything. He kills whoever he wants. All the ministers who have opinions about him eventually died.
actors.mobs.bosses.dwarfgeneral.message23=Until I and another group of like-minded people formed a resistance army. That day, we fought our way into the palace at all costs.
actors.mobs.bosses.dwarfgeneral.message24=Unfortunately, the necromancer army finally surrounded us. At that time, we also knew our own ending.
actors.mobs.bosses.dwarfgeneral.message25=But we still didn't give up. We fought hard until the end. The Necromancer suddenly stopped attacking, and their sergeants were still trying to persuade us to surrender.
actors.mobs.bosses.dwarfgeneral.message26=You definitely didn't agree.
actors.mobs.bosses.dwarfgeneral.message27=Well, so I only asked them for one right.
actors.mobs.bosses.dwarfgeneral.message28=You: What right?
actors.mobs.bosses.dwarfgeneral.message29=The right to commit suicide.
actors.mobs.bosses.dwarfgeneral.message30=.............
actors.mobs.bosses.dwarfgeneral.message31=Where we are standing now is where we killed the enemy for the last time.
actors.mobs.bosses.dwarfgeneral.message32=You: Maybe, I can try to challenge him.
actors.mobs.bosses.dwarfgeneral.message33=.....No.
actors.mobs.bosses.dwarfgeneral.message34=Anyway, you are a sinner who killed countless dwarves. In this respect, you are no different from that tyrant.
actors.mobs.bosses.dwarfgeneral.message35=I can't let you tarnish the Dwarf Empire, even if it is now riddled with holes.
actors.mobs.bosses.dwarfgeneral.message36=About the future of the Dwarf Empire......
actors.mobs.bosses.dwarfgeneral.message37=......I was born in the heyday of the Dwarf Empire and saw her at her most beautiful.
actors.mobs.bosses.dwarfgeneral.message38=Of course, I also understand how miserable the Dwarf Empire is now.
actors.mobs.bosses.dwarfgeneral.message39=We, the Dwarves who are living in fear and poverty, the comrades who died together.
actors.mobs.bosses.dwarfgeneral.message40=We are all looking for and looking forward to her changes.
actors.mobs.bosses.dwarfgeneral.message41=The history of the Dwarf Empire is not over yet, and we will open a new chapter for her.
actors.mobs.bosses.dwarfgeneral.message42=......I have no regrets even if I die.
actors.mobs.bosses.dwarfgeneral.message43=Well, it's about time.
actors.mobs.bosses.dwarfgeneral.message44=By the way, I'll tell you my name: My name is Thorin. If you can get out... can you help me write a legend or something?
actors.mobs.bosses.dwarfgeneral.message45=Anyway, let's meet again if there is still a chance...
#=======================================


actors.mobs.bosses.diamondknight.notice_2=I have reminded you many times not to kill my offspring, but you did not listen to my advice. Today, I will teach you a lesson!
actors.mobs.bosses.diamondknight.now_go_2=So, do you really think you can compete with God? Let's give it a try!

actors.mobs.bosses.diamondknight.war_go=It's been a long time since I was so excited! Challenger, maybe you are the only light here
actors.mobs.bosses.diamondknight.iswar_go=The biggest enemy is often yourself. Are you ready to fight to the death with yourself?
actors.mobs.bosses.diamondknight.ok_go=Okay, let's end this contest with the most simple battle.


actors.mobs.bosses.diamondknight.defeated_2=It seems that you still have some skills, but the account of killing my offspring will be settled one day! In addition, I killed an assassin on the way here, and his mask is handed over to you...
actors.mobs.bosses.diamondknight.defeated=It's an interesting battle, challenger, you win this time! In addition, I killed an assassin on the way here, and his mask is handed over to you...

actors.mobs.bosses.dcrystal.name=Deep Blue Crystal
actors.mobs.bosses.dcrystal.desc=The Deep Blue Crystal will slowly heal the Treasure Chest King, please pay attention.

actors.mobs.bosses.tpdoor.name=Mysterious Portal
actors.mobs.bosses.tpdoor.desc=The power of the mysterious portal is inextricably linked to the Mimic King, and a mysterious space is reflected inside...
actors.mobs.bosses.tpdoor.lowdamage=The damage you caused to the portal is too low, perhaps you need a stronger force to break it. (Single damage is at least 20 or more)
actors.mobs.bosses.tpdoor.quest_bad_game=Pirated game!!! \n\nYou may be playing a pirated version of Mo Ling Pixel Dungeon with volume +2525. To ensure your gaming experience, please use the genuine Mo Ling Pixel Dungeon. Click the link below to learn more.
actors.mobs.bosses.tpdoor.enter_yes_game=Visit the official website and close the game
actors.mobs.bosses.tpdoor.quest_tengu_prompt=Well, it seems that you are not fully prepared. It doesn't matter. I am just testing you. If I can't break my door, I can try again. \n\nWhat do you think?
actors.mobs.bosses.tpdoor.enter_yes=Reset time
actors.mobs.bosses.tpdoor.enter_no=I will think about it
actors.mobs.bosses.diamondknight.ten=I will give you another try.
actors.mobs.bosses.tpdoor.quest_tengu_really=Are you sure you want to go?

actors.mobs.katydid.name=Poison Spraying Flower
actors.mobs.katydid.desc=Animated plants in the jungle, which have become extremely violent due to the changes in the jungle. They often spray venom at invaders. Their venom is extremely corrosive, so it is very dangerous. They are also quite flexible, so they must be killed when they are not prepared.

actors.mobs.salamander.name=Deep Blue Salamander
actors.mobs.salamander.desc=Small creatures from the forest, due to the erosion of the evil power below, they have changed from being docile to being fierce. \nTheir sharp tails can penetrate the enemy. They are very smart and extremely flexible, so they must be killed when they are not prepared.

actors.mobs.clearelemental.name=Pure Crystal Element
actors.mobs.clearelemental.desc=The essence of the forest itself, but due to the constant invasion of the evil power below, their own power has been consumed a lot. Although they no longer have the ability to attack, in order to ensure that the forest is not completely eroded in the end, they will use their remaining strength to drive away every uninvited guest that invades the forest.

actors.mobs.bosses.notsync.crivusstarfruits.name=Crivus-Forest Will
actors.mobs.bosses.notsync.crivusstarfruits.desc=This huge fruit is the most beautiful trap in the jungle. It will release a substance that confuses all creatures around it and makes them lose themselves. \n\nThe tentacles beside it will also strangle the small animals that accidentally walk into it, and corrupt them into miasma that entangles them. \n\nAccording to the relevant research of surface botanists, it is a variant of "Crivus Fruit". Because of its very beautiful appearance, surface botanists also call it "Crivus Fruit" and jokingly call it the sister of Crivus Fruit. \n\nVery few adventurers can describe this plant. From the few words you get, the only thing you can be sure of is that "it is the darkest center of the forest." \n\nIn addition, according to the latest investigation, it is also the will of the forest...
actors.mobs.bosses.notsync.crivusstarfruits.notice=It is beating continuously, like a living heart...
actors.mobs.bosses.notsync.crivusstarfruits.died=Just before you think it is going to explode, all the vines begin to inject energy into it..., it seems that they are very united. Destroy these vines, otherwise the consequences will be disastrous...
actors.mobs.bosses.notsync.crivusstarfruits.ondeath=You missed the best opportunity, it finally got completely angry, you were entangled by the vines and can no longer move...

actors.mobs.bosses.notsync.crivusstarfruitslasher.name=Crystallized Vine
actors.mobs.bosses.notsync.crivusstarfruitslasher.desc=The vines have no intelligence, their existence value is to protect the fruit. Whether it is the "small animals" that accidentally approach the fruit, or the adventurers who try to clear the dead vines to go further, they are strangled by these vines and become fertilizer for the fruit. \n\nThey will periodically release poisonous gas to the target, and periodically use vines to catch the target for hunting. Unlike its close relatives, the Demonic Vine was once rated as a level one threat by the Surface Xiyue Association because it can volatilize more powerful acidic gas! ! !
actors.mobs.bosses.notsync.crivusstarfruitslasher.scorpion=Prey, feed...
actors.mobs.bosses.notsync.crivusstarfruits.anargy=Just when all the tentacles died, you found that the fruit in the center became extremely violent...

actors.mobs.bosses.notsync.crivusstarfruitslasher.xling=_After the Fruit of Crinos became violent, a group of new vines emerged from the ground and became more threatening. However, unlike last time, this time, because the main body is constantly transmitting energy to the tentacles, the new batch of crystal vines cannot be destroyed at all. The only way is to destroy its main body..._
actors.mobs.bosses.notsync.crivusstarfruitslasher.xlin=_Since the main body is now weak, the tribe needs to give it new power. Since the power is being injected into the main body, it makes them indestructible and vulnerable. You can attack them now. _\n\nHowever, since they have hunted many creatures in the past, they are resistant to magic and you cannot harm them with magic.

actors.mobs.bosses.notsync.crivusstarfruits.goodbye_1=Do you really think you can save the forest?
actors.mobs.bosses.notsync.crivusstarfruits.goodbye_2=In fact, we are all guilty, and none of us can escape the coming real doomsday...
actors.mobs.bosses.notsync.crivusstarfruits.goodbye_3=Corruption, destruction... Your sins will eventually be exposed...
actors.mobs.bosses.notsync.crivusstarfruits.goodbye_4=The fate of the forest is no longer decided by you and me...
actors.mobs.bosses.notsync.crivusstarfruits.goodbye_5=The forest is now in a state of balance, why do you want to break it?
actors.mobs.bosses.notsync.crivusstarfruits.goodbye_6=The pure crystal sealed the root of corruption, and you are trying to unlock it...
actors.mobs.bosses.notsync.crivusstarfruits.goodbye_7=I am the will of the forest, you can't go any further...

actors.mobs.bosses.notsync.crivusstarfruits.dead_1=You who helped destroy the balance of the forest have already lost your mind.
actors.mobs.bosses.notsync.crivusstarfruits.dead_2=Your sins will always accompany your soul.
actors.mobs.bosses.notsync.crivusstarfruits.dead_3=You should be in hell, not in the forest.

actors.mobs.bosses.notsync.crivusstarfruits.dead=Where will the fate of the forest go?

actors.mobs.bosses.notsync.crivusstarfruits.explo_kill=You were killed by the explosion of Crinus...
actors.mobs.bosses.notsync.crivusstarfruits$rage.name=Clan Awareness
actors.mobs.bosses.notsync.crivusstarfruits$rage.desc=Its offspring are giving their energy to the main body. You feel that the energy nearby is very bad. You should destroy its offspring as soon as possible! Or itself! ! ! \n\nIn the final stage, if the clan makes it return to 93 health or above, once the hero is discovered, every 16 rounds, encounter the _Forest Questioning_ skill, the skill will cause}Spell Damage} \n\nNon-hero ally units, every 8 rounds encounter the _Forest Judgment_ skill, the skill will cause {True Damage{

actors.mobs.bosses.notsync.clearelemtguard.name=Captain of the Pure Crystal Guard
actors.mobs.bosses.notsync.clearelemtguard.desc=This is a fully armed human, equipped with sophisticated armor, looks quite tough and difficult to deal with. \n\nThe greatsword in his hand seems to warn you to stay away from him. But when you look closely at his appearance, you can't help but think of the pure crystal element in the jungle. \n\nIt seems that his current condition is not very good, perhaps a powerful scroll can help him...
actors.mobs.bosses.notsync.clearelemtguard.clear_1=You tried to purify him, but still saw black gas coming out of him, maybe more exorcism scrolls are needed
actors.mobs.bosses.notsync.clearelemtguard.clear_2=You finally purified him, but he still seems to be in a state of confusion, it seems that a fight is needed...
actors.mobs.bosses.notsync.clearelemtguard.attack=You are...! Damn it, even if I die, I will stop you here!!!
actors.mobs.bosses.notsync.clearelemtguard.kill=Finally... it's too late to save him...

actors.mobs.bosses.notsync.clearelemtguardnpc.name=Fayina
actors.mobs.bosses.notsync.clearelemtguardnpc.desc=This is a fully armed human, equipped with sophisticated armor, looks quite tough and difficult to deal with. \n\nThe big sword in his hand seems to warn you to stay away from him. But when you look closely at his face, you can't help but think of the pure crystal elements of the jungle.

actors.mobs.bosses.notsync.fayina.name=Fayina
actors.mobs.bosses.notsync.fayina.desc=Is this the fully armed him just now? I didn't expect the face under the armor to be so beautiful.
actors.mobs.bosses.notsync.fayina.message1=This armor is really heavy, I'll take it off first... eh?
actors.mobs.bosses.notsync.fayina.message2=You managed to come back? How do you feel? What, you defeated the dragon? Don't be ridiculous, it's a miracle that you came back alive.

actors.mobs.bosses.notsync.fayina.info=If you really defeated the Fire Dragon, you should have a Fire Dragon Heart...
actors.mobs.bosses.notsync.fayina.take_firedragon_heart=Give Fire Dragon Heart
actors.mobs.bosses.notsync.fayina.message3=Is this the Fire Dragon Heart?! %s, did you really defeat the Fire Dragon?

actors.mobs.bosses.notsync.fayina.info_2=On the way, did you see...the bodies of the guards in the past?
actors.mobs.bosses.notsync.fayina.take_cry=No
actors.mobs.bosses.notsync.fayina.look=Please look at this

actors.mobs.bosses.notsync.fayina.message4a=......Ah, yes, it's been a long time, their bodies may have sunk.
actors.mobs.bosses.notsync.fayina.message4b=This is... Pure Crystal Element... Have you found them?
actors.mobs.bosses.notsync.fayina.message5=....Okay, thank you. I will find a suitable place to bury them. Anyway, %s, on behalf of the Green Forest, I thank you. Your bravery and achievements will be remembered by us forever. I will tell the other pure crystal guards, and they will help you in the future. Now, please leave me alone for a while...
actors.mobs.bosses.notsync.fayina.info_3=So, can you tell the truth now?
actors.mobs.bosses.notsync.fayina.i=Continue the conversation

actors.mobs.bosses.notsync.fayina.message6=What? I'm telling the truth! I really have no reason to lie to you!
actors.mobs.bosses.notsync.fayina.message7=Oh, forget it, let me be quiet for now.
actors.mobs.bosses.notsync.fayina.message8=She doesn't look like she's lying, but there's definitely something wrong...

actors.mobs.npcs.zero.zerotomb.name=Pale Sword Tomb
actors.mobs.npcs.zero.zerotomb.desc=A series of names are engraved on it\n\nThe jungle has been cleansed. We will meet again, comrades.



actors.mobs.bosses.notsync.fayina.roll1=The fire dragon is not really dead, adventurer, you still have a long way to go.
actors.mobs.bosses.notsync.fayina.roll2=Oklah wants to see you, but I think it's too early.
actors.mobs.bosses.notsync.fayina.roll3=May their souls rest in peace, and may the jungle be forever green.
actors.mobs.bosses.notsync.fayina.roll4=Adventurer, you are the bravest person I have ever seen.
actors.mobs.bosses.notsync.fayina.roll5=The president of the Frost Moon Association seems to be missing, maybe she is also trapped in the dungeon.
actors.mobs.bosses.notsync.fayina.roll6=I haven't seen the surface for a long time, adventurer, thank you...
actors.mobs.bosses.notsync.fayina.roll7=Do you see this tombstone? All my comrades were here...
actors.mobs.bosses.notsync.fayina.roll8=If you still want to defeat the fire dragon, my prism may be able to help.

actors.mobs.bosses.notsync.clearelemtguard.cant_enter_a=You need to find the Pure Crystal Guard Captain, only he knows how to remove the seal...
actors.mobs.bosses.notsync.clearelemtguard.cant_kill_fire=You can't leave here before dealing with the threat...
actors.mobs.bosses.notsync.clearelemtguard.cant_enter_b=The exploration depth of this game has exceeded 11 layers, and you can no longer go to the Lava Fire Forest...
actors.mobs.bosses.notsync.clearelemtguard.cant_enter_c=The cave has collapsed, please don't fight the whole battle before crusading against the fire dragon
actors.mobs.bosses.notsync.clearelemtguard.message1=.....You won, kill me...

actors.mobs.bosses.notsync.clearelemtguard.message2=You...wait, you are an adventurer?
actors.mobs.bosses.notsync.clearelemtguard.message3=Sorry...thank you for saving me, my memory still stays at that time, and I regard you as an enemy.
actors.mobs.bosses.notsync.clearelemtguard.message4=I am the guard leader of the Holy Forest. You can call me Faina.
actors.mobs.bosses.notsync.clearelemtguard.message5=We found that the flower of "Oklah" seemed to be corroded some time ago. Tracing back to the source, we found that the power of corrosion came from the bottom of the Holy Forest, that is, the lava area.
actors.mobs.bosses.notsync.clearelemtguard.message6=I went down there with several pure crystal elements and found that the fire dragon, which was said to have been sleeping for ten thousand years, had awakened and occupied the place as its nest.
actors.mobs.bosses.notsync.clearelemtguard.message7=The creatures that originally lived there were also affected by the corrosion and turned into zombies that only obeyed the orders of the fire dragon.
actors.mobs.bosses.notsync.clearelemtguard.message8=We were surrounded after we got there. Although I selected the most elite guards among us, we were outnumbered and all fell there. In the end, I was the only one left.
actors.mobs.bosses.notsync.clearelemtguard.message9=I don't remember what happened at the end. The last thing I remember was that I was sealed by something, and then I saw you here...
actors.mobs.bosses.notsync.clearelemtguard.message10=By the way, I'm really sorry for the attack just now...

actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt=Do you want to kill "Crystal Guard"?
actors.mobs.bosses.notsync.clearelemtguard.enter_yes=Kill him
actors.mobs.bosses.notsync.clearelemtguard.enter_no=Help him up

actors.mobs.bosses.notsync.clearelemtguard.reason_ling=%s, before you really head to the Lava Fire Forest, I have to tell you that the Fire Dragon is very dangerous and it is dead silent inside. \n\nYou must be extremely careful. In addition, that was where my comrades and I fought. If possible, I hope you can find the "Sword Tomb" and bring them back...
actors.mobs.bosses.notsync.clearelemtguard.enter_letsgo=Go now
actors.mobs.bosses.notsync.clearelemtguard.enter_nonx=Not going yet

actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt2=Faced with his words...
actors.mobs.bosses.notsync.clearelemtguard.enter_yes2=How unfortunate!
actors.mobs.bosses.notsync.clearelemtguard.enter_no2=You are lying!

actors.mobs.bosses.notsync.clearelemtguard.sad_a=You stabbed the weapon into his chest, and he never fell down.
actors.mobs.bosses.notsync.clearelemtguard.pro_a=You gently lifted him up...


actors.mobs.bosses.notsync.clearelemtguard.sad_b=Yeah, alas, what's the point of me surviving... Well, thank you anyway. Here you go, as a small apology from me.
actors.mobs.bosses.notsync.clearelemtguard.pro_b=What? I don't need to lie to you, I'm telling the truth.

actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt3=But, what you said sounds strange.
actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt4=I'll go.
actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt5=Tell me how to get down.
actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt6=Otherwise, the Sanctuary Forest will turn into a Corrupted Forest.
actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt7=The Sanctuary Forest will also be polluted.
actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt8=Is this what you want to see?

actors.mobs.bosses.notsync.clearelemtguard.enter=Continue the conversation

actors.mobs.bosses.notsync.clearelemtguard.pro_c=If you don't want to believe it, forget it. Anyway, it has already happened. The Holy Forest can't escape the doom...
actors.mobs.bosses.notsync.clearelemtguard.pro_d=Don't be ridiculous. You are just going to die with this equipment.
actors.mobs.bosses.notsync.clearelemtguard.pro_e=No, how can I watch others walk towards death?
actors.mobs.bosses.notsync.clearelemtguard.pro_f=..................
actors.mobs.bosses.notsync.clearelemtguard.pro_g=........................
actors.mobs.bosses.notsync.clearelemtguard.pro_h=....................................

actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt9=Once, I met an adventurer who told me to find the legendary Crystal Heart, but in the end, he was ambushed and fell in front of the "Oklah" flower. \n\nI also met another adventurer who told me that she wanted to suppress the curse of the dungeon, but in the end, she was cursed and let the frost sweep the dungeon. \n\nAdventurer, I admire your courage, but I don't want such a tragedy to happen again...Are you really determined to leave?
actors.mobs.bosses.notsync.clearelemtguard.yesgo=Yes

actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt10=Okay, by the way, adventurer, what's your name?
actors.mobs.bosses.notsync.clearelemtguard.myname=%s
actors.mobs.bosses.notsync.clearelemtguard.thanks=%s, on behalf of all the pure crystal guards in the Holy Forest, thank you for your help!
actors.mobs.bosses.notsync.clearelemtguard.thanks2=%s, the seal leading to the lava forest has been lifted, please find the entrance on this floor, be careful, I hope you can come back alive...

actors.mobs.bosses.notsync.clearelemtguard.no_road=%s, am I blocking your way? Sorry...

actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt11=There is a secret passage in the stairs downstairs on this floor. I have already unsealed it. In addition, since we have fought it before, there should be some supplies on the way that may help you. \n\nBy the way, this is for you. It is a small help provided by me on behalf of the Forest Guard.
actors.mobs.bosses.notsync.clearelemtguard.let=Let's go

actors.mobs.bosses.notsync.clearelemtguard.namex=Give help?
actors.mobs.bosses.notsync.clearelemtguard.cashout_verify=It seems that he is not in a good condition now. Perhaps the Scroll of Remove Curse can help him...
actors.mobs.bosses.notsync.clearelemtguard.cashout_yes=Yes, give it!
actors.mobs.bosses.notsync.clearelemtguard.cashout_no=No, I don't want to at this time.
actors.mobs.bosses.notsync.clearelemtguard.cashout_none=You have no more Scrolls of Remove Curse in your inventory...

