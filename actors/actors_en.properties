actors.mobs.npcs.zero.question.give_up=Give up the game?
actors.mobs.npcs.zero.question.title_4_3=The bullet is already loaded.
actors.mobs.npcs.zero.question.wait=Wait
actors.mobs.npcs.zero.question.title_4_4=So, how much do you want to bet?
actors.mobs.npcs.zero.question.title_4_5=You rolled _%1$s %2$s %3$s_
actors.mobs.npcs.zero.question.throw=Reroll
actors.mobs.npcs.zero.question.stop=Determine the number.
actors.mobs.npcs.zero.question.no_money=You have no more money!
actors.mobs.npcs.zero.question.warning_1=You should know... gambling is illegal.
actors.mobs.npcs.zero.question.warning_2=You don't have enough money. Are you sure you want to gamble? This may kill you.
actors.mobs.npcs.zero.question.warning_3=Madman... I will take away your greedy soul.
actors.mobs.npcs.zero.question.warning_4=Okay... I will bet the same chips, so that it won't be too embarrassing to lose
actors.mobs.npcs.zero.question.message1_1=I really don't know what you think, the purpose of coming to this town is to go to the dungeon to die.
actors.mobs.npcs.zero.question.message1_2=Just to get the crystal heart? I thought my battle was about to begin...
actors.mobs.npcs.zero.question.message1_3=Did I die again...?
actors.mobs.npcs.zero.question.message2_1=...
actors.mobs.npcs.zero.question.message2_2=Are you serious?
actors.mobs.npcs.zero.question.message2_3=Okay, but if you want something, you have to pay with money. Of course, you can also play a few games with me.
actors.mobs.npcs.zero.question.message4_1=I have no interest in people who cheat, please go back.
actors.mobs.npcs.zero.question.message4_2=Is that so...
actors.mobs.npcs.zero.question.message4_3=...? Are you kidding?!
actors.mobs.npcs.zero.question.message4_4=I agree to your request.
actors.mobs.npcs.zero.question.message4_5=Then, let's get started.
actors.mobs.npcs.zero.question.message5_1=Don't ask about my business...
actors.mobs.npcs.zero.question.message5_2=...I don't know him, is he another god?
actors.mobs.npcs.zero.question.message5_3=Just a traveler who drifted here by accident.
actors.mobs.npcs.zero.question.message5_4=To be honest, many people have gone down this dungeon, but is it really useful? (Hurry up and play the Mound Dungeon!)
actors.mobs.npcs.zero.question.no_more_1=Sorry.
actors.mobs.npcs.zero.question.no_more_2=Let's stop playing this game today.
actors.mobs.npcs.zero.question.win=...You, actually won?
actors.mobs.npcs.zero.question.lose=As expected... I advise you to stay away from gambling.
actors.mobs.npcs.zero.question.draw=A draw? How unusual.
actors.mobs.npcs.zero.question.chance=They're real guns... I missed the target just now, it's your turn.

actors.mobs.npcs.zero.bluecj.name=Little Blue
actors.mobs.npcs.zero.bluecj.desc=A little dragon girl with blue hair, she changed into a red dress for the New Year, she must be the future Dragon King ()
actors.mobs.npcs.zero.bluecj.a_message1=Huh? You ask me why I came here? I also need a holiday, okay!
actors.mobs.npcs.zero.bluecj.a_message2=Heart, the principle of pulsation and activity.
actors.mobs.npcs.zero.bluecj.a_message3=bro, you are welcome to give a red envelope to a child.
actors.mobs.npcs.zero.bluecj.b_message1=Winter, the principle of silence.
actors.mobs.npcs.zero.bluecj.b_message2=Your new clothes are so handsome!
actors.mobs.npcs.zero.bluecj.b_message3=It's so cold!

actors.mobs.npcs.zero.bzmdr.name=Bzmdr
actors.mobs.npcs.zero.bzmdr.desc=A mysterious man, dressed in all black and insociable. He's often in the inn, maybe you could have a chat with him.
actors.mobs.npcs.zero.bzmdr.a_message1=Hello, are you heading to the dungeon? Good luck then.
actors.mobs.npcs.zero.bzmdr.b_message1= Here's some stuff I found for you.
actors.mobs.npcs.zero.bzmdr.c_message1=It looks like you're in for a good ride.
actors.mobs.npcs.zero.bzmdr.c_message2=Be careful to keep your lamp bright.
actors.mobs.npcs.zero.bzmdr.c_message3=Maybe you could try something.
actors.mobs.npcs.zero.bzmdr.d_message1=The dungeon will be treacherous, come on.
actors.mobs.npcs.zero.bzmdr.d_message2=Many adventurers have never returned from the dungeon. Why should you go?
actors.mobs.npcs.zero.bzmdr.d_message3=Seems like you're very confident, good luck.
actors.mobs.npcs.zero.bzmdr.e_message1=It looks like you made it.
actors.mobs.npcs.zero.bzmdr.e_message2=Some people will come after you, so be careful.
actors.mobs.npcs.zero.bzmdr.e_message3=You shouldn't be able to do anything bad with it, but it's not really my business.
actors.mobs.npcs.zero.bzmdr.def_verb_1=What do you want to do ......
actors.mobs.npcs.zero.bzmdr.def_verb_2=If you can't find anything to do, get on your journey.
actors.mobs.npcs.zero.bzmdr.rankings_desc=Died to _Bzmdr_'s Imminent Attack Thinning

actors.mobs.npcs.zero.bzmdrland.name=Bzmdr
actors.mobs.npcs.zero.bzmdrland.desc=Who knows why he's staying here instead of going to the hotel? Maybe he's waiting for someone?
actors.mobs.npcs.zero.bzmdrland.message1=Hello ...... why don't you go to the hotel.
actors.mobs.npcs.zero.bzmdrland.message2=Do you want a fire too...... This one is for you.

actors.mobs.npcs.zero.bzmdrland.a_message1=How did I get here, you ask? Don't be so curious.
actors.mobs.npcs.zero.bzmdrland.a_message2=Because I wanted to, so here I am.
actors.mobs.npcs.zero.bzmdrland.a_message3=Here's some rocks I picked up, take them if you want.

actors.mobs.npcs.zero.bzmdrland.c_message1=It looks like you've come back with a unique mode of transportation.
actors.mobs.npcs.zero.bzmdrland.c_message2=The dungeon is falling apart, so get out.

actors.mobs.npcs.zero.bzmdrdungeon.name=Bzmdr
actors.mobs.npcs.zero.bzmdrdungeon.desc=?????

actors.mobs.npcs.zero.bzmdrland.x_message1=Great, just one last step in your journey! Go defeat Him.
actors.mobs.npcs.zero.bzmdrland.x_message2=You're asking me if I'll help you? Come on, you don't want to get something for nothing.
actors.mobs.npcs.zero.bzmdrland.x_message3=Well, take this, that's all I'm going to help you with.



actors.mobs.npcs.zero.jit.name=Jijing
actors.mobs.npcs.zero.jit.desc=This masked weirdo sits by the campfire as if waiting for something, but when you take the food from him, you can't help but think of the lady in the cafeteria.
actors.mobs.npcs.zero.jit.message1=Another adventurer who is risking his life. Take it. This is all the help I can give you.
actors.mobs.npcs.zero.jit.message2=Hmm? Adventurer, what are you looking for? Crystal Heart? That thing is not as good as you think. Have you considered what price you have to pay?
actors.mobs.npcs.zero.jit.message3=Mask? It's not good for you to explore other people's privacy.
actors.mobs.npcs.zero.jit.no1=It seems that you are itching for trouble.
actors.mobs.npcs.zero.jit.no2=Another one who was driven crazy by the crystal.
actors.mobs.npcs.zero.jit.message4=Stay away from me with that thing, I don't want to happen again...
actors.mobs.npcs.zero.jit.message5=Stay away from me!

actors.mobs.npcs.zero.deepsea.name=Deep Sea
actors.mobs.npcs.zero.deepsea.desc=A fisher. He's often at the beach with a lot of pancakes on him, because someone complained to the owner of the inn about the smell.
actors.mobs.npcs.zero.deepsea.a_message1=Hello! You're going to the dungeon too? Good luck~
actors.mobs.npcs.zero.deepsea.b_message1=I don't have anything to give you. What? You want a pancake? No, I still need to eat. Go find one yourself.
actors.mobs.npcs.zero.deepsea.c_message1=Are you here for a spring outing? Trash~
actors.mobs.npcs.zero.deepsea.c_message2=It is said that a teacher of the Diejia Cult has issued a bounty for this reason. The reward is quite rich. Unfortunately, I was blocked by a mysterious force and could not catch up...
actors.mobs.npcs.zero.deepsea.c_message3=Do you want to go down and die? Hmm? Are you confident that you can survive? OK... Good luck...
actors.mobs.npcs.zero.deepsea.d_message1=Trash~ Trash~ Can you get full exploration points today?
actors.mobs.npcs.zero.deepsea.e_message1=Torches are good things. You should not have forgotten to open anything, right?
actors.mobs.npcs.zero.deepsea.e_message2=You seem to have forgotten to bring something. Remember to bring it next time. The dungeon is very dark.
actors.mobs.npcs.zero.deepsea.f_message1=I seem to have been to this place before. Huh? Are you...?
actors.mobs.npcs.zero.deepsea.g_message1=That thing turned out to be in your hand. I was wondering why I couldn't find it. Damn, it's my bad luck. Then you can take it away.
actors.mobs.npcs.zero.deepsea.g_message2=Did you see Xiaolan down there? I heard that the Sakaban turtle was taken away by someone... huh? Why is it you again!
actors.mobs.npcs.zero.deepsea.g_message3=I hope you can keep it safe and don't let anyone rob it. Don't look at me, I won't help you.
actors.mobs.npcs.zero.deepsea.dx_message1=What's the fun in doing this?
actors.mobs.npcs.zero.deepsea.dx_message2=Help me! Mr. Sakaban Turtle!
actors.mobs.npcs.zero.deepsea.dx_message3=Little Turtle is not here today, so I'll let you go with reluctance.
actors.mobs.npcs.zero.deepsea.dx_message4=You want to hurt me with this little power? Where did this trash come from~

actors.mobs.npcs.zero.moonlow.name=Moonlow
actors.mobs.npcs.zero.moonlow.desc=This creature looks like an ordinary human child, but it seems to have some power that you can't understand... maybe.
actors.mobs.npcs.zero.moonlow.a_message1=Hello, I am Moonlow, welcome to the snow town, a place with infinite possibilities.

actors.mobs.npcs.zero.moonlow.b_message1=Happy New Year! ...Is that what you said?
actors.mobs.npcs.zero.moonlow.b_message2=So I said that you humans are all idiots...Celebrating that your planet has revolved around your star? I don't understand...
actors.mobs.npcs.zero.moonlow.b_message3=Although I don't understand what you are happy about, as long as no one turns me into a sheep, I will be happy too.
actors.mobs.npcs.zero.moonlow.b_message4=Well, forget it. I hope this peaceful atmosphere can bring you the warmest blessings, and a happy Year of the Snake!

actors.mobs.npcs.zero.moonlow.not=I can say a few more blessings to you, but I have nothing else to give you.

actors.mobs.npcs.zero.moonlow.c_message1=Have a nice trip~~
actors.mobs.npcs.zero.moonlow.c_message2=I can feel...something has changed...
actors.mobs.npcs.zero.moonlow.c_message3=Good luck to come back alive.
actors.mobs.npcs.zero.moonlow.f_message1=We have seen countless adventurers like you, they came, they left, and they never came back. \n\nBut I can feel...you are a little different from them, but I can't tell why...maybe you will have hope? Come on.


actors.mobs.npcs.zero.moonlow.g_message1=Welcome back~
actors.mobs.npcs.zero.moonlow.g_message2=I wanted to offer you some rewards, but I guess you can't use them now.
actors.mobs.npcs.zero.moonlow.g_message3=Next...what will you do? Your journey is not over yet, but you have already possessed extraordinary power. I am curious about what you will do with this power...
actors.mobs.npcs.zero.moonlow.g_message4=We will keep an eye on you, kid.
actors.mobs.npcs.zero.moonlow.g_message5=*Text missing

actors.mobs.npcs.zero.moonlow.dx_message1=You are really passionate about this kind of thing, little cutie~
actors.mobs.npcs.zero.moonlow.dx_message3=What a small fish~

