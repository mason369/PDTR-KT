actors.buffs.invisibilityring.name=Imaginary
actors.buffs.invisibilityring.desc=You blend completely with the surrounding terrain, making you impossible to see. At the same time, you will restore 1 drop of health every 10 turns. \n\nEnemy cannot track or attack you while you are invisible. Most physical attacks and magic (such as scrolls and staves) will immediately remove the invisibility effect. \n\nRemaining invisibility duration: %s turns
###LANTERFIRE

actors.mobs.npcs.lanfire.name=Bonfire
actors.mobs.npcs.lanfire.desc=A warm bonfire can reduce the cold and give adventurers a bright hope.
actors.mobs.npcs.lanfire.meattitle=Want to grill meat?
actors.mobs.npcs.lanfire.meatdesc=Grilling meat on a bonfire will take some time, but you can restore the temperature after the grilling is finished.
actors.mobs.npcs.lanfire.one_meat=Cook one piece of meat_(3 rounds)_
actors.mobs.npcs.lanfire.three_meat=Cook three pieces of meat_(9 rounds)_
actors.mobs.npcs.lanfire.all_meat=Cook all meat_(
actors.mobs.npcs.lanfire.cancel=Cancel roasting
actors.mobs.npcs.lanfire.round=round)_
actors.mobs.npcs.lanfire.cook_one=You cooked a mystery meat, restoring a small amount of temperature.
actors.mobs.npcs.lanfire.cook_three=You cooked three mystery meats, restoring some temperature.
actors.mobs.npcs.lanfire.cook_none=You don't have 3 mystery meats!
actors.mobs.npcs.lanfire.cook_all=You cooked all mystery meats, restoring a large amount of temperature.
actors.mobs.npcs.lanfire.enter=The warmth of the campfire illuminates every adventurer who is hiking in the cold. In the cold and harsh dungeon, this is the only rest stop.
actors.mobs.npcs.lanfire.leave=Leaving the warm campfire rest stop, the cold wind is coming towards us again.

actors.buffs.icesworddown.name=Blade Frost
actors.buffs.icesworddown.desc=The coldness of the dungeon has begun to affect your weapons. Now your physical damage will be reduced to a certain extent. The higher the coldness value, the greater the damage reduction. \n\nThe coldness of the dungeon is driven by the dark energy deep inside. As you continue to go deeper into the dungeon, the coldness will penetrate deeper and deeper into your bones, causing a more severe threat. To reduce the coldness, you can look for a bonfire room, which is an area that can slowly restore the temperature. Of course, in the later exploration, you will also find more ways to reduce the coldness.
actors.buffs.icesworddown.ice=\n\nCurrent player physical damage is: _

actors.buffs.nyctophobia.name=The Path of Light
actors.buffs.nyctophobia.name2=The Lights Flicker
actors.buffs.nyctophobia.name3=The Dim Light
actors.buffs.nyctophobia.name4=The Beam of Tranquility
actors.buffs.nyctophobia.name5=The Darkness Devours
actors.buffs.nyctophobia.name6=Dead as Desolation

actors.buffs.nyctophobia.ondeath=Endless darkness flooded into your consciousness, and you were eventually dragged into the abyss by the darkness...

actors.buffs.nyctophobia.desc=The lights are moving forward, and you are full of confidence.
actors.buffs.nyctophobia.desc2=The lights are flickering, but you are still fearless.
actors.buffs.nyctophobia.desc3=The lights are getting weaker and weaker, and you begin to doubt your faith.
actors.buffs.nyctophobia.desc4=The light beams have gone silent, and you feel the life draining away from you. \n\nDebuffs are more likely to trigger at low lights.
actors.buffs.nyctophobia.desc5=The lights are getting weaker and weaker, and you feel like you are doomed!
actors.buffs.nyctophobia.desc6=The lights are completely out, what awaits you ahead?

actors.buffs.lighs.name=Lantern of Faith
actors.buffs.lighs.desc=Even in the darkest dungeons, the warm glow of a lantern will keep you going. \n\nWhile a lantern is active, your light bar will continue to regenerate.
actors.buffs.lighs.tip=Cannot light lantern in relic state

actors.buffs.puresoul.lanter=Light ahead
actors.buffs.puresoul.desc_intro_lanter=Your faith is like your lamp, shining and bright. \n\nCurrent lamp value: %s points\n\n
actors.buffs.puresoul.desc=Light ahead, light ahead. Nothing can affect you.

### Magic Say debuffs
actors.buffs.magicgirldebuff.magicgirlsaynostr.name=Witch's Whisper - Powerlessness
actors.buffs.magicgirldebuff.magicgirlsaynostr.desc=Powerlessness will devour you, while the mastermind is still laughing behind your back. \n\nThe power of this layer will be -1 point, and the next layer will be restored.

actors.buffs.magicgirldebuff.magicgirlsaycursed.name=Witch's Whisper - Binding
actors.buffs.magicgirldebuff.magicgirlsaycursed.desc=Binding is just a test from me, and you who have lost confidence. It must be more terrible than my test. \n\nThe equipment will be cursed, and the effect will be invalid. The equipment (weapon/armor) will be purified but will be given a 10-turn downgrade.

actors.buffs.magicgirldebuff.magicgirlsaykill.name=Witch's Whisper - Judgment
actors.buffs.magicgirldebuff.magicgirlsaykill.desc=The lights flicker, and in the dim light you seem to see a witch swinging a sword at you. (You have brought this upon yourself)\n\nThe melee damage of heroes on this floor is reduced to 90%.

actors.buffs.magicgirldebuff.magicgirlsayslowy.name=Witch's Whisper - Slow
actors.buffs.magicgirldebuff.magicgirlsayslowy.desc=Slowly walk towards death...\n\nEvery time a hero on this floor moves 10 rounds, he will be disabled for 3 rounds.

actors.buffs.magicgirldebuff.magicgirlsaymoneymore.name=Witch's Whisper - Greed
actors.buffs.magicgirldebuff.magicgirlsaymoneymore.desc=Greedy desire is the nature of human beings\n\nThe prices of shops in this floor are normal except for ankhs, food and healing potions, which are increased by 2.5 times.

actors.buffs.magicgirldebuff.magicgirlsaytimelast.name=Witch's Whisper - Passing
actors.buffs.magicgirldebuff.magicgirlsaytimelast.desc=Time passes, but the appearance of the dungeon remains unchanged. \n\nEvery once in a while, the hero in this floor will get one of three random debuffs: burning, poisoned and bleeding.

### Good Blees Buffs
actors.buffs.clearbleesdgoodbuff.blessgoodstr.name=Pure Blessing - Perseverance
actors.buffs.clearbleesdgoodbuff.blessgoodstr.desc=Perseverance is our unyielding fighting spirit!\n\nThis floor adds 2 extra strength to players.

actors.buffs.clearbleesdgoodbuff.blessnomoney.name=Pure Blessing - Abundance
actors.buffs.clearbleesdgoodbuff.blessnomoney.desc=The breath of the witch lingers around us, and merchants will definitely respect you. \n\nThis floor has a 40% discount on all stores.

actors.buffs.clearbleesdgoodbuff.blessmobdied.name=Pure Blessing - Rest
actors.buffs.clearbleesdgoodbuff.blessmobdied.desc=Rest in peace! Monsters!!!\n\nThis tier hero gains x1.5 physical damage!

actors.buffs.clearbleesdgoodbuff.blessmixshiled.name=Pure Blessing - Guardian
actors.buffs.clearbleesdgoodbuff.blessmixshiled.desc=Guard our last seed! \n\nThis tier hero gains some shield every 270 turns when at full health and without Lantern Shield.
actors.buffs.clearbleesdgoodbuff.blessmixshiled.tip=Your health is full, rewarding you with %s shield points.

actors.buffs.clearbleesdgoodbuff.blessmixshiled$xsbarrier.name=Lantern Shield
actors.buffs.clearbleesdgoodbuff.blessmixshiled$xsbarrier.desc=A ball of energy barrier that blocks all damage. \n\nAs long as the Lantern Shield has energy, it will completely block any damage taken by the unit. Shields will slowly regenerate when not taking damage. \n\nShield energy remaining: %d.

actors.buffs.clearbleesdgoodbuff.blesslingjing.name=Prismatic Field
actors.buffs.clearbleesdgoodbuff.blesslingjing.desc=Generates a 25-point shield every 15 turns.

actors.buffs.clearbleesdgoodbuff.blesslingjing$xsbarrier.name=Jungle Guardian Shield
actors.buffs.clearbleesdgoodbuff.blesslingjing$xsbarrier.desc=A ball of energy barrier that blocks all damage. \n\nAs long as the shield energy remains, it will completely block any damage taken by the unit. Shields will slowly regenerate when not taking damage. \n\nShield energy remaining: %d.

actors.buffs.clearbleesdgoodbuff.blessimmune.name=Pure Blessing - Disappearance
actors.buffs.clearbleesdgoodbuff.blessimmune.desc=Disappearing in the crowd, we are extraordinary individuals\n\nThis layer of heroes is immune to magic effects and reduces all damage by 25%, and ignores the damage of Scarlet Sentinel. \n\nBut the light deduction will be slightly accelerated.

actors.buffs.clearbleesdgoodbuff.blessgoread.name=Pure Blessing - The Way Ahead
actors.buffs.clearbleesdgoodbuff.blessgoread.desc=Walking in this terrifying dungeon, the light is the guide to the way forward\n\nWhen the light value of this layer of heroes is above 90% and they are not extremely hungry, they will recover extra life every 3 rounds. (If the extinguishing light is turned on, 60 full lights will take effect)
actors.buffs.clearbleesdgoodbuff.blessgoread.desc_rest=Walking in this terrifying dungeon, the light is the guide for the way ahead\n\nYou are now in a state of extreme hunger, and the effect of the way ahead has been temporarily invalidated.
actors.buffs.clearbleesdgoodbuff.blessgoread.desc_lanter=Walking in this terrifying dungeon, the light is the guide for the way ahead\n\nYou are now in a state of light below 90, if it is extinguishing light, it needs to be 60, and the effect of the way ahead has been temporarily invalidated.

actors.buffs.clearbleesdgoodbuff.blessanmy.name=Pure Blessing - Symbiosis
actors.buffs.clearbleesdgoodbuff.blessanmy.desc=In a dim dungeon, you can still coexist. \n\nPlayers on this floor get the "Symbiosis Staff", and can choose a monster on each floor to become your ally. The staff cannot be upgraded, and it will automatically disappear after the buff effect disappears. (Symbiosis is just for survival, all we do is save ourselves)

actors.buffs.propbuff.name = Ornament Projection
actors.buffs.propbuff.desc = You feel that some of the accessories on your body are gradually getting warmer, and it seems that they will give you different powers every once in a while.

actors.buffs.smoking.name = Smoking
actors.buffs.smoking.desc = You are using the fifth generation of Rui Ke, emitting a large amount of smoke that can block your vision.

