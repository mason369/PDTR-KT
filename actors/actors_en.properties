actors.mobs.yogreal.defeated=...
actors.mobs.yogreal.rankings_desc=Devoured by Yog-Zot



actors.mobs.yogreal.desc=Yog-Zot is an ancient god; a gigantic monster that extends its power to the mortal world and devours it to fuel its endless growth. The dwarf must have been playing with dark magic when he caught the attention of this great horror, and has been trying to control him ever since, keeping him from invading the outside world. \n\nThe Old God originated from a primordial dimension of magic and chaos, and was unable to bring his true form into this world. As a result, he created an avatar of himself and summoned demons to serve as his minions to do his bidding. \n\nThe Eye is the focal point of the Old God's power in this world. While the Eye itself is immovable, it is able to shoot powerful beams of magical energy and summon various demonic minions to its aid.
actors.mobs.yogreal.desc_spawners=You feel demonic energy pouring into the Eye from above. What you left alive up there is feeding energy back to the Old God. _The Old God will use this energy to summon more powerful minions! _
actors.mobs.yogreal.destroy_tile=Something seems to be happening nearby!
actors.mobs.yogreal$larva.name=Old God Larva
actors.mobs.yogreal$larva.rankings_desc=Blocked by Yog-Zot, no way out
actors.mobs.yogreal$larva.desc=These little creations of the Old God are simple creatures that are easy to make. While individually fragile, they can be created quickly and become difficult to resist in large numbers. \n\n_Greatly reduces damage taken when around the Old God_.
actors.mobs.yogreal$yogrealripper.desc = This terrifying creature was created by demons using the remains of many dwarven corpses left here. The Demon Ripper looks like a pale and emaciated dwarf, with a mutilated torso and sharp, slender bone claws. \n\nDemon Rippers are not strong enough to withstand heavy blows, but they are swift and dangerous. They can leap over great distances in an instant and then pierce their targets with their bone claws. \n\n_Greatly reduces damage taken when around the Old Gods_.

actors.mobs.yogreal$yogrealripper.rankings_desc=Blocked by Yog-Zot, no way back
