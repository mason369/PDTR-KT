actors.mobs.bosses.qliphoth.name=Fruit of Cleves
actors.mobs.bosses.qliphoth.explo_kill=At the last moment, the huge explosion of the Fruit of Cleves will blow you to pieces...
actors.mobs.bosses.qliphoth.desc=This bright red fruit turns all living things around it into its own nutrients. The tentacles beside it will strangle small animals that accidentally walk into it, and corrupt them into miasma that entangles the surroundings. But when they feel the lantern in your hand, they show fear of fire. \n\nFew adventurers can describe this plant. In the few words you get, the only thing you can be sure of is that "it is the darkest center of the forest."
actors.mobs.bosses.qliphoth.notice=The tentacles are constantly squirming, trying to get closer to you.
actors.mobs.bosses.qliphoth.summon=The fruit in the middle hits the ground, and new vines come back.
actors.mobs.bosses.qliphoth.an_argy=All vines are destroyed, and the fruit hits the ground angrily, it seems to be attacking you!
actors.mobs.bosses.qliphoth.dead=Nutrients... absorption... failed..., the sound of the fruit breaking seems to be mixed with a hint of sorrow.
actors.mobs.bosses.qliphoth.onlyfish=_Before the phantom fish dies, the fruit is invincible. _
actors.mobs.bosses.qliphothlasher.name=Cleaver's Vine
actors.mobs.bosses.qliphothlasher.desc=The vines have no wisdom, their existence value is to protect the fruit. Whether it is the "small animals" that accidentally approach the fruit, or the adventurers who try to clear the dead vines to go further, they will be strangled by these vines and become fertilizer for the fruit. \n\n_This vine will periodically attack the visible heroes within 4 squares, causing a crippling effect and restoring 2 health points per round. _\n\nFor non-hero units, the tentacles will extend their branches to capture and eat them.
actors.mobs.bosses.qliphothlasher.rankings_desc=Suffocated by the vines of Crivus Fruit.....
actors.mobs.bosses.crivusfruits$diedblobs.rankings_desc=Suffocated by the red mist gas of Crivus Fruit.......
actors.mobs.bosses.crivusfruits$diedblobs.name= Deadly Red Fog
actors.mobs.bosses.qliphoth$invisibility_fogs.desc=A miasma area formed by creatures strangled by the fruit. You may feel nauseous, so your vision will be reduced. But the gas formed by these corpses may make the vines of the fruit think you are dead.
actors.mobs.bosses.crivusfruits.name=Crivus Fruit
actors.mobs.bosses.crivusfruits.desc=This bright red fruit turns all living things around it into its own nutrients. The tentacles around it will strangle the small animals that accidentally walk into it, and corrupt them into miasma that lingers around. But when they feel the lantern in your hand, they show fear of fire. \n\nFew adventurers can describe this plant. In the few words you get, the only thing you can be sure of is that "it is the darkest center of the forest."
actors.mobs.bosses.crivusfruits.notice=The tentacles are constantly wriggling, trying to get closer to you
actors.mobs.bosses.crivusfruits.anargy=The tentacles' wriggling turns into violent twitching, releasing more poisonous gas during the slapping
actors.mobs.bosses.crivusfruits.died!!!=All vines have stopped twitching, and the color of the fruit seems to be brighter red
actors.mobs.bosses.crivusfruits.!!!=The Crivus Fruit is absorbing magic power to release a larger red poisonous mist!
actors.mobs.bosses.crivusfruits.dead=Nutrients... absorbing... failed..., and the sound of the fruit breaking seems to be mixed with a hint of grief.
actors.mobs.bosses.crivusfruits.weapon=You have not obtained the Tree of Life for 3 consecutive rounds, triggering the guaranteed mechanism, and your guaranteed mechanism times are reset to 0.

actors.mobs.bosses.crivusfruits$diedblobs.desc=A cloud of red poisonous mist emanates from the surroundings of the Crivus Fruit. Your subconscious mind tells you that this thing will cause great harm to you.
actors.mobs.bosses.crivusfruits$diedblobs.csed=After the fruit explodes, some red gas with a fresh smell is emitted. It seems to be quite good to use it as an air freshener.

actors.mobs.bosses.crivusfruitslasher.name=Magic Vine
actors.mobs.bosses.crivusfruitslasher.desc=The vines have no wisdom. Their existence value is to protect the fruit. Whether it is the "small animals" that accidentally approach the fruit, or the adventurers who try to clean up the dead vines, they are strangled by these vines and become fertilizer for the fruit.
actors.mobs.bosses.crivusfruitslasher.frost_kill=The acidic mist from the fruit of Crivus has completely killed you...
