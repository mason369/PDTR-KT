levels.rooms.special.skeletonfishroom$bluestonedoor.name=Bluestone-α
levels.rooms.special.skeletonfishroom$bluestonedoor.desc=Through the resonance of the blue crystal, you discover that there are mysterious areas here waiting for your exploration...

levels.rooms.special.skeletonfishroom$bluealtstonedoor.name=Azure Crystal-Ω
levels.rooms.special.skeletonfishroom$bluealtstonedoor.desc=Through the resonance of the azure crystals, you discover that there are mysterious areas here waiting for your exploration...


actors.buffs.status.foundchest.name=Treasure Hunt
actors.buffs.status.foundchest.desc=You have come to the Mimic's treasure area. It looks like you can still search for _%s/5_ Mimics, and then this place will become unstable, causing other Mimics to flee in fear! \n\nOccasionally, you can still see the Mimic's young form, but you can't kill it due to the time and space confusion here...

actors.buffs.herodisguise.name=Disguise
actors.buffs.herodisguise.desc=Illusion magic has changed your appearance! Although this effect is purely cosmetic, it still feels strange anyway. \n\nDisguise effect remaining time: %s turns

actors.mobs.bosses.peach.whiteyan.name=White Yan
actors.mobs.bosses.peach.whiteyan.desc=The mysterious girl in Taoyuan Island, it is said that she is the patron saint believed by the people here.

actors.mobs.bosses.galaxy.servantavgomon.name=Servant of Avergomon
actors.mobs.bosses.galaxy.servantavgomon.desc=An unknown race that believes in Avergomon. Although they believe in Avergomon, a considerable number of their followers will follow Tavel because Avergomon is too furious.
actors.mobs.bosses.galaxy.servantavgomon.scorpion=Escape is a wrong choice!

actors.mobs.bosses.galaxy.fourstone$magicfourstone.name=Cobalt Yellow Stone Tablet
actors.mobs.bosses.galaxy.fourstone$magicfourstone.desc=It contains the power of magic. What will happen if you interact with it?

actors.mobs.bosses.galaxy.fourstone.name=Blood Red Stone Tablet
actors.mobs.bosses.galaxy.fourstone.desc=It contains the power of dragon blood. What will happen if you interact with it?

actors.mobs.bosses.galaxy.fourstone$frostfourstone.name=Frostfourstone
actors.mobs.bosses.galaxy.fourstone$frostfourstone.desc=It contains the power of ice. What will happen if you interact with it?

actors.mobs.bosses.galaxy.fourstone$poisonfourstone.name=Greenstone
actors.mobs.bosses.galaxy.fourstone$poisonfourstone.desc=It contains the power of poison. What will happen if you interact with it?


actors.mobs.bosses.galaxy.endyog.name=Yog-Sothoth
actors.mobs.bosses.galaxy.endyog.desc=Yog-Sothoth knows where the gate is. Because Yog-Sothoth is the gate, Yog-Sothoth is the key, and the gatekeeper. The past is in Him, the present is in Him, and the future is in Him, because everything is in Yog-Sothoth. "
actors.mobs.bosses.galaxy.endyog.message1=It seems that I was right. You do have the potential to touch the "door". Then I will abide by the agreement and let you see the real appearance of this key.
actors.mobs.bosses.galaxy.endyog.message2=I will continue to watch you.

actors.mobs.bosses.galaxy.sliverlocksword.name=Silver Key
actors.mobs.bosses.galaxy.sliverlocksword.desc=You finally saw the original appearance of this key. The key is covered with Arabic vine patterns like a code, but there is no clear and readable explanation or description. Perhaps it symbolizes the purpose and secrets in this objective and purposeless universe. But you have no way of knowing. But you can feel that this key contains a powerful force that can even change the world. \n\nThis weapon comes with the Chaos enchantment\n\nThe upper limit of this weapon is 12\nAt +3, the accuracy modifier increases from 1 to 2\nAt +6, the attack range increases from 1 to 2\nAt +9, hits will cause slowness

actors.mobs.npcs.zero.yetyog.scroll=Now you should be able to touch deeper wisdom, take it, I hope it will be helpful to you.


actors.mobs.bosses.galaxy.sothothlasher.name=Tavel's Touch
actors.mobs.bosses.galaxy.sothothlasher.desc=An unknown creature controlled by Tavel's consciousness, it looks like a tentacle. Although it looks very aggressive, it is no different from a pet to Tavel.


actors.mobs.npcs.extra.trueyog.name=Bubbles
actors.mobs.npcs.extra.trueyog.desc=For some reason, you vaguely feel that the girl in front of you has some subtle relationship with the existence in the deepest part of the dungeon? But at least now, she looks like just a mysterious girl.
custom.utils.plot.trueyogplot.name=Bubbles
custom.utils.plot.trueyogplot.message1=Oh, you have arrived too.
custom.utils.plot.trueyogplot.message2=Why am I here? I can exist in any time and space, don't be surprised. \n\nMy fragments have taken root and wreaked havoc here. I didn't expect you to be able to defeat it by yourself. It's really unexpected.

actors.mobs.npcs.extra.trueyog.quest_start_prompt=Now that the matter has come to an end, do you want to return with me?

actors.mobs.npcs.extra.trueyog.quest_boss_prompt=Are you ready to start the trial?

actors.mobs.npcs.extra.trueyog.enter_yes=Yes
actors.mobs.npcs.extra.trueyog.enter_no=No

actors.mobs.npcs.extra.peachgodstate.name = Baiyan Statue
actors.mobs.npcs.extra.peachgodstate.desc = A statue that suddenly appeared here\n\nThis carefully carved statue seems to have been here for a long time, but it seems that the snow and dust around it cannot get close to it. Somehow, you feel like you've seen its prototype before...
actors.mobs.npcs.extra.peachgodstate.title = Wish
actors.mobs.npcs.extra.peachgodstate.notenough = You don't have enough cobalt coins.
actors.mobs.npcs.extra.peachgodstate.lucky_desc = There are some offerings in front of the statue. It seems that offering a little cobalt can gain the blessing of the gods, why not give it a try? \n\n You have now performed %s sacrifices.
actors.mobs.npcs.extra.peachgodstate.you_now_have = When you put the cobalt coins into the tribute plate... you found something extra in your backpack, you got:
actors.mobs.npcs.extra.peachgodstate.single = One offering. (50 cobalt coins)
actors.mobs.npcs.extra.peachgodstate.ten_shots = Ten offerings! (500 Cobalt Coins)
actors.mobs.npcs.extra.peachgodstate.cancel = I am short of money, I will definitely do it next time.
actors.mobs.npcs.extra.peachgodstate.touchtop = You found that the cobalt coins you put in did not disappear. You've reached the maximum number of sacrifices.
actors.mobs.npcs.extra.peachgodstate.surplus = You found that only a part of the cobalt coins you put in disappeared. You've reached the maximum number of sacrifices.
actors.mobs.npcs.extra.peachgodstate.gold=Golden Legend!!!
actors.mobs.npcs.extra.peachgodstate.lends=Myth Reappears!!!
actors.mobs.npcs.extra.peachgodstate.hello=〖Unusual warmth fills this room.〗
actors.mobs.npcs.smallleafharddungeon.cancelselect=Statue:......

custom.utils.plot.trueyogplot.message3a=Now that the matter has come to an end, do you want to return with me?
custom.utils.plot.trueyogplot.message4a=Is that so? Do you still want to continue to pursue deeper secrets?

actors.mobs.bosses.galaxy.sothothnpc.name=Tavier at Umr Yog-Sothoth

actors.mobs.bosses.galaxy.sothotheyedied.name=Tavier at Umr Yog-Sothoth
actors.mobs.bosses.galaxy.sothotheyedied.desc="Yog-Sothoth knows where the gate is. Because Yog-Sothoth is the gate, key, and the gatekeeper. The past is in Him, the present is in Him, and the future is also in Him, because everything is in Yog-Sothoth."\nHe is looking at you, He can see through everything about you, but there is no malice or murderous intent in His eyes, only a trace of unfathomable depth. After all, as He said, this is just a trial without life-threatening danger, but you still can't take it lightly. \nThe chaotic energy gathers in His palm. He is omniscient and omnipotent, and never fails. \nHe will extract power from the destruction of creations, and when a certain number of creations are destroyed, he will launch a huge space-time fluctuation. If you hesitate and fail to escape in time, you will be reduced to dust in a moment.

actors.mobs.bosses.galaxy.abyssbook.name=The Book of the Abyss
actors.mobs.bosses.galaxy.abyssbook.desc=You have long heard that the Book of the Dead records all unknown things, and you have long been prepared to be bitten by endless knowledge, but when you open it, you find that what is sandwiched in the middle of the Book of the Dead is... a comic book. Only then do you realize that the god you just fought was just slacking off the whole time. \n\nBut at least the part you can understand can still allow you to control a tiny part of the power at will. \n\n"It is not the dead who sleep forever, even death itself will disappear in the mysterious eternity."\n\n--Abdullah Alhazad
actors.mobs.bosses.galaxy.abyssbook.book_blessed=Choose the blessing you need: XXXX

actors.mobs.bosses.galaxy.sothotheyedied.galaxy=It is not good to kill too many of my friends!
actors.mobs.bosses.galaxy.sothotheyedied.deadsling=This is the end, you should not fall down when you are one step away from victory.

actors.mobs.bosses.galaxy.sothothnpc.message1=By the way, I haven't introduced myself completely yet.
actors.mobs.bosses.galaxy.sothothnpc.message2=I am Tavier At-Umr Yog-Sothoth, I am the One of All, fight me with all your might in this rift of time and space, %s!



custom.utils.plot.trueyogplot.message3b=Interesting, I can sense a familiar wave in you, do you have the energy to spend some time with me?
custom.utils.plot.trueyogplot.message4b=Although it has undergone several changes, the key in your hand has not yet returned to its original state. I can make it return to its original appearance, but at the same time it will also test whether you can control it without being destroyed in endless wisdom.
custom.utils.plot.trueyogplot.message5b=Don't worry, there is no danger to your life, but I also hope that you will be fully prepared before coming back, how about it? Have you made up your mind?
custom.utils.plot.trueyogplot.message6b=Maybe one day you will encounter a situation where you can use this key, but then, what kind of existence will you see?

actors.mobs.bosses.galaxy.sothoth.name=Tavier At-Umr
actors.mobs.bosses.galaxy.sothoth.desc="Yog-Sothoth knows where the gate is. Because Yog-Sothoth is the gate, Yog-Sothoth is the key, and the gatekeeper. The past is in Him, the present is in Him, and the future is also in Him, because everything is in Yog-Sothoth."\nHe is looking at you, He can see through everything about you, but there is no malice or murderous intent in His eyes, only a trace of unfathomable depth. After all, as He said, this is just a trial without life-threatening danger, but you still can't take it lightly. \n Chaotic energy gathers in His palm. He is omniscient and omnipotent, and never fails. \nHe will extract power from the destruction of creations, and when a certain number of creations are destroyed, he will launch a huge space-time fluctuation. If he hesitates and fails to escape in time, he will be reduced to dust in a moment.
actors.mobs.bosses.galaxy.sothoth.notice=I am Tavier At Umr Yog-Sothoth, I am the One of All Things, do your best to fight me in this rift between time and space, %s.
actors.mobs.bosses.galaxy.sothoth.message=The light of wisdom is coming!
actors.mobs.bosses.galaxy.sothoth.defeated=It's incredible, you are much stronger than I thought, so I will use a little more strength.

###TRK
actors.mobs.ebonymimic.name=Ebony Mimic
actors.mobs.ebonymimic.reveal=There's an ebony mimic!
actors.mobs.ebonymimic.hidden_name=Suspicious Outline
actors.mobs.ebonymimic.hidden_desc=There seems to be something there, but it's almost completely transparent.
actors.mobs.ebonymimic.desc=Mimics are magical creatures that can change their appearance at will. They almost always appear in the form of treasure chests in the dungeons, because this always attracts unsuspecting adventurers. \n\nEbony Mimics are extremely powerful Mimics that can make themselves almost invisible. They lurk on things that adventurers might interact with, but they also contain treasures of their own.


actors.mobs.dragon.piraland.name=Mutated Piranha
actors.mobs.dragon.piraland.desc=These originally gentle animals have become violent and dangerous due to abnormal energy fluctuations. Now they can even leave the water and prey on all living things around them as food. \n\n_Special Effect: Move 10% faster when walking on water_

actors.mobs.dragon.ricerat.name=Glutinous Rice Mouse
actors.mobs.dragon.ricerat.desc=The mutation from underground has infected even mice. Now they seem to smell like glutinous rice, but they are still very threatening. \n\nThe source of the mutation must be found and dealt with to solve this mutation.
actors.mobs.dragon.ricerat.frost_kill=A mysterious force will smash you to pieces...

actors.mobs.dragon.pirahaking.name=Pirahaking
actors.mobs.dragon.pirahaking.desc=The original piranha. What you have failed is irreversible. Close your eyes and embrace the darkness. \n\nWith a sigh, let despair spread. \n\nFame, responsibility, ideals, everything ends here. \n\nIt seems to have a variety of emotions mixed together, perhaps this is the root cause of the mutation. Defeat Pirahaking and let everything return to silence.
actors.mobs.dragon.pirahaking.spear=The cold will "accompany you".
actors.mobs.dragon.pirahaking.nowater=Pirahaking is stranded! But it has teleported!
actors.mobs.dragon.pirahaking.notice=I will let your soul dance with us!
actors.mobs.dragon.pirahaking.leap=Just wait for the destruction to come.
actors.mobs.dragon.pirahaking.teleport_away=Any area is proof of my walking!
actors.mobs.dragon.pirahaking.defeated=............

levels.rooms.standard.bloodcrystalroom$bloodcrt.name=Scarlet Crystal
levels.rooms.standard.bloodcrystalroom$bloodcrt.desc=Scarlet Crystal will periodically give all enemies various amplification effects, drawn from the following effects\n\n_-_1. Rage: A fierce rage burns in your body, increasing your physical attack damage by 50%. \n_-_2. Arcane Shield 20 points, which can decay over time. \n_-_3. Phosphorus Fire Judgment 10 turns, which can decay over time. \n_-_4. Immune to magic effects 10 turns, which can decay over time. \n_-_5. Fire power for 15 turns, can decay over time. \n_-_6. Crystal touch power for 15 turns, can decay over time.
levels.rooms.standard.bloodcrystalroom$bloodcrt.desc_info=The crystal on the current floor will buff all enemies _every %s turns_

actors.mobs.npcs.zero.zerodreamshop.name=Fashion Merchant
actors.mobs.npcs.zero.zerodreamshop.desc=A fashion merchant of unknown origin, selling fashions that can transform you.
actors.mobs.npcs.zero.zerodreamshop.message1=Hello, welcome to my fashion shop.
actors.mobs.npcs.zero.zerodreamshop.message2=You want to know who I am, but I can't tell you yet.
actors.mobs.npcs.zero.zerodreamshop.message3=To buy costumes, you need to exchange a blue cobalt coin with me.
actors.mobs.npcs.zero.zerodreamshop.message4=Different products have different cobalt coins, you are welcome to choose.

actors.mobs.npcs.zero.zerodreamshop.descx=Please feel free to choose, more costumes will be updated in the future. \n\nAfter activating the costume, please switch the skin in the character selection interface. \n\nOnce the skin takes effect, it will take effect globally, and armor can no longer affect the skin status.
actors.mobs.npcs.zero.zerodreamshop.no=You don't have enough cobalt coins, please come back to buy when you have enough cobalt coins.

###
actors.buffs.clearbleesdgoodbuff.blessunlock.name=The All-Seeing Eye
actors.buffs.clearbleesdgoodbuff.blessunlock.desc=The Keyblade of Regression has activated your ability. You can now open a Crystal Gate/Iron Gate before the end of the turn. The effect will automatically expire after opening. \n\nThe effect will decay in %s turns.

### BOSSRUSH

actors.buffs.clearbleesdgoodbuff.blessbossrushlow.name=Mark of the Witch - Blessing of the Turbid Flame
actors.buffs.clearbleesdgoodbuff.blessbossrushlow.desc=He will protect you. During the existence of Blessing of the Turbid Flame, all damage will be reduced by 20%.

actors.mobs.bosses.bossrush.rival.name=%s?
actors.mobs.bosses.bossrush.rival.namex="You"
actors.mobs.bosses.bossrush.rival.arise=My compatriots, come and help me!
actors.mobs.bosses.bossrush.rival.mustone=%s: How dare you load the save file? I will not allow it. "You" are resetting here...
actors.mobs.bosses.bossrush.rival.desc=You come from another timeline and have turned evil. The Necromancer Cult has asked you to wait here. You must defeat "yourself" to continue investigating here...
actors.mobs.bosses.bossrush.rival.died_kill=The power from "you" completely devoured you!
actors.mobs.bosses.bossrush.rival$darkbolt.rankings_desc="You" pulled you into the abyss...
actors.mobs.bosses.bossrush.rival.rankings_desc="You" pulled you into the abyss...
actors.mobs.bosses.bossrush.rival.revive=The Cross of Rebirth is bursting with life-giving energy!
actors.mobs.bosses.bossrush.rival.weapon=\n\nThe main weapon "you" are carrying is _%s_.
actors.mobs.bosses.bossrush.rival.armor=\n\nThe armor "you" are wearing is _%s_.
actors.mobs.bosses.bossrush.rival.ring=\n\nThe ring "you" are wearing is _%s_.
actors.mobs.bosses.bossrush.rival.wand=\n\nThe staff "you" are using is _%s_.
actors.mobs.bosses.bossrush.rival.missile=\n\nThe throwing weapon "you" are carrying is _%s_.
actors.mobs.bosses.bossrush.rival.ankhs=\n\nYou are carrying 4 blessed crosses of rebirth.
actors.mobs.bosses.bossrush.rival.protected=%s: You will regret your decision soon!
actors.mobs.bosses.bossrush.rival.question=Get out of here...
actors.mobs.bosses.bossrush.rival.exclamation=You have no idea what you are doing!
actors.mobs.bosses.bossrush.rival.interrobang=You are me from another timeline?!
actors.mobs.bosses.bossrush.rival.ellipsis=Perhaps, you can save this place...

actors.mobs.bosses.bossrush.skygoo.blob=Blood Mist Gas\nThis place emits an extremely pungent gas, which neither you nor the monsters can stand. It is better to get out of the gas as soon as possible.
actors.mobs.bosses.bossrush.skygoo.rd=The end of despair is the light of hope.
actors.mobs.bosses.bossrush.skygoo.ss=Exchange your blood for my rebirth!
actors.mobs.bosses.bossrush.skygoo.zl=Destroy in flames and lightning!
actors.mobs.bosses.bossrush.skygoo.leap=We'll be at your door soon...
actors.mobs.bosses.bossrush.skygoo.name=Skygoo
actors.mobs.bosses.bossrush.skygoo.notice=Intruder spotted, all exits closed! \nAll on alert, ready for battle.
actors.mobs.bosses.bossrush.skygoo.slime=Come out, my army! I leave it to you!
actors.mobs.bosses.bossrush.skygoo.defeated=You are the first rival I have ever seen who can match me. I know your purpose, and we will meet again! \nYou have no idea what _terrible things_ are _deep_ underground! \nI look forward to seeing you again!
actors.mobs.bosses.bossrush.skygoo.run=Skygoo has ended this battle and let you go.
actors.mobs.bosses.bossrush.skygoo.!!!=You!
actors.mobs.bosses.bossrush.skygoo.pumpup=I don't know what your purpose is, but you must be executed!
actors.mobs.bosses.bossrush.skygoo.enraged=You have completely pissed me off!
actors.mobs.bosses.bossrush.skygoo.lj=That's it? That's it? Rubbish, go home and take a shower!
actors.mobs.bosses.bossrush.skygoo.gluuurp=Why did you ask me to break the contract?
actors.mobs.bosses.bossrush.skygoo.rankings_desc=Being saved by Tianhen Zhangu!
actors.mobs.bosses.bossrush.skygoo.desc=After that catastrophic event, the jungle began to grow wildly, and the jungle was gradually forgotten. However, this did not make it give up everything. In this special investigation, you met this old friend... \n\nBossRush Special Boss
actors.mobs.bosses.bossrush.skygoo.zap_kill=The lightning bolt will kill you completely...
actors.mobs.bosses.bossrush.skygoo.$lightningbolt.rankings_desc=The lightning bolt was used by Tianhen Zhangu!

actors.mobs.npcs.hkd.name=Little Knight
actors.mobs.npcs.hkd.desc=Visitors from another dimension are resting in the hotel...
actors.mobs.npcs.hkd.id_1=Wow, you are here too, what, why am I here? Because this dungeon looks interesting, I came down too.
actors.mobs.npcs.hkd.id_2=If I go deeper, the risk seems too high, and I'm not in good condition, it's time to return. I don't need this thing anymore, so I'll give it to you.
actors.mobs.npcs.hkd.id_3=The road ahead is bumpy, and we'll meet again in the future.

### ZERO
actors.mobs.npcs.zero.hollowknight.name=Little Knight
actors.mobs.npcs.zero.hollowknight.desc=A visitor from another dimension, resting here in the inn...
actors.mobs.npcs.zero.hollowknight.message1=Another adventurer? It's so lively here... I've only been here for a while, and there are so many adventurers here.
actors.mobs.npcs.zero.hollowknight.message2=By the way, why do I feel you look familiar? Oh, maybe I made a mistake. After all, I've seen so many people, and there must be someone who looks like you among them. Well, since you look familiar, I'll give you this thing.
actors.mobs.npcs.zero.hollowknight.message2b=By the way, why do I feel you look familiar? Oh, maybe I made a mistake. After all, I have seen so many people. There must be someone who looks like you among them. Well, since you look familiar, I will give you this _1 gold coin_.
actors.mobs.npcs.zero.hollowknight.message3=Are you going to the dungeon like the other adventurers?
actors.mobs.npcs.zero.hollowknight.message4=Oh, you are still here, why don't you go to the dungeon? Ah, why am I here? I am a traveler. I came here after wandering all the way. I am here to rest. Maybe I will leave after a while?
actors.mobs.npcs.zero.hollowknight.message5=Why are you still listening to me? If you are really bored, you should go to the dungeon, right?
actors.mobs.npcs.zero.hollowknight.message6=Wow, you are really persistent. If you are so free, do you want to listen to my travel experience? No, just kidding. If I really talk about it, I can't finish it in a day and a night.
actors.mobs.npcs.zero.hollowknight.message7=I am tired of talking... You are really patient. OK, OK, start your journey quickly and stop chatting with me.

actors.mobs.npcs.zero.hollowknight.d1=I will leave!
actors.mobs.npcs.zero.hollowknight.d2=I will endure
actors.mobs.npcs.zero.hollowknight.d3=What's wrong? Are you in a bad mood?
actors.mobs.npcs.zero.hollowknight.d4=Even if you are in a bad mood, you should have vented enough by now, right?
actors.mobs.npcs.zero.hollowknight.d5=I tell you, although I have a good temper, I also have my limits
actors.mobs.npcs.zero.hollowknight.d6=die!
actors.mobs.npcs.zero.hollowknight.kill=A force of nothingness erodes you...
actors.mobs.npcs.zero.hollowknight.rankings_desc=|Died from being eroded by the void|

actors.mobs.npcs.zero.waloke.name=Ron

actors.mobs.npcs.zero.waloke.desc=After your first visit to Snow Ridge, he came here...\n\nYou may be able to communicate with him.
actors.mobs.npcs.zero.waloke.message1=Hello, %s. We meet again...
actors.mobs.npcs.zero.waloke.message2=My name is Ron, and I am the lord of the merchants. After you passed the trial of Lena last time, she asked me to come to this town to wait for you.
actors.mobs.npcs.zero.waloke.message3=Lena was once the agent of the five witches, until that incident, everything changed...
actors.mobs.npcs.zero.waloke.message4=Now, this town is far more dangerous than you think. The timeline is even more complicated...
actors.mobs.npcs.zero.waloke.message5=Do you think you know this world well enough? If you think so, I have some regional investigations arranged by Lena for you...You can go there through the teleportation platform in the upper right corner of the town.
actors.mobs.npcs.zero.waloke.message6=Strictly speaking, it is a reflection of the multiverse. There is more than one you in this world. In parallel worlds, you may experience more...
actors.mobs.npcs.zero.waloke.message7=You need to investigate these parallel universes and find the source of energy, because the arson was not an accident. Lena knows everything, but she can't speak now...
actors.mobs.npcs.zero.waloke.message8=That's all. In addition, since I am a merchant lord, I will still charge a little service fee. The currency will be the currency issued by that woman...
actors.mobs.npcs.zero.waloke.message9=Well, when you investigate more things in the future, I will continue to talk to you... Now, I wish you good luck in exploring the other world and parallel universe...

actors.mobs.npcs.zero.waloke.descx=This is the investigation of each timeline. Since Lena's power is still relatively weak, there are not many places to go at present. \n\nIn addition, if you go to the place where the powerful monsters are hovering, Lena there is a real witch, so you must remember to be extremely careful. \n\nAfter activation, you still need to select the image before you can start the investigation.


actors.mobs.npcs.zero.waloke.quest_start_prompt=Before you can start the formal investigation, you need to make some choices...
actors.mobs.npcs.zero.waloke.easy=Basic Image - Easy
actors.mobs.npcs.zero.waloke.normal=Trial Image - Normal
actors.mobs.npcs.zero.waloke.hard=Purgatory Image - Hard
actors.mobs.npcs.zero.waloke.hell=Nightmare Image - Nightmare
actors.mobs.npcs.zero.waloke.br_no_clear=You must play a game of BossRush and get the _Starting One_ hidden badge before you can play the nightmare difficulty.

actors.mobs.npcs.zero.waloke.quest_start2_prompt=You are about to start a new round of in-depth investigation. Good luck!
actors.mobs.npcs.zero.waloke.randmode=Go now

actors.mobs.npcs.zero.luowhite.name=Luobai
actors.mobs.npcs.zero.luowhite.desc=A man wearing a square hat and a cloak is said to be a famous collector. He runs a weapon shop here. Let's go and see if we can buy anything useful.
actors.mobs.npcs.zero.luowhite.message_ice=Welcome, adventurer. It looks like this is your first time here. Here are 30 cobalt coins as a gift.
actors.mobs.npcs.zero.luowhite.message_ice2=Welcome, adventurer. It looks like this world has changed again. These %d cobalt coins are my gift.
actors.mobs.npcs.zero.luowhite.message1=Welcome, adventurer. Do you want to buy anything?
actors.mobs.npcs.zero.luowhite.descx=Welcome, %s, what would you like to buy? \n\nThe store has only these goods, but as a bonus, when you unlock a legendary weapon, you will get a damaged version for free. First come first served, no returns.
actors.mobs.npcs.zero.luowhite.message3=You are late, adventurer, this is sold out.

actors.mobs.npcs.zero.whiteyan.name=Bai Yan
actors.mobs.npcs.zero.whiteyan.desc=A white-haired girl, her hair is so long that it affects her movements. She seems naive and friendly.
actors.mobs.npcs.zero.whiteyan.message1=Haha~, have I not seen you before, friend? What do you want to talk to me about~
actors.mobs.npcs.zero.whiteyan.message2=Why do you want to go into the dungeon? Don't you value your life?
actors.mobs.npcs.zero.whiteyan.message3=Why is my hair so long, you ask? Doesn't it look good this way?
actors.mobs.npcs.zero.whiteyan.message4=I look different from others? Then everyone must be different!
actors.mobs.npcs.zero.whiteyan.message5=Specially different? Isn't it cuter?
actors.mobs.npcs.zero.whiteyan.message6=Are you not going to go down? You have time to talk to me?
actors.mobs.npcs.zero.whiteyan.message7=Oh! You want to ask for something from me, like everyone else
actors.mobs.npcs.zero.whiteyan.message8=Hmm? How do I know you took something from someone else? That's not important.
actors.mobs.npcs.zero.whiteyan.message9=Hey, why do you think I must have something to take? I obviously have nothing.
actors.mobs.npcs.zero.whiteyan.message10=I really don't have anything. I can't give it to you even if you ask me.
actors.mobs.npcs.zero.whiteyan.message11=I really don't have anything. Don't make such a fuss.
actors.mobs.npcs.zero.whiteyan.message12=I...
actors.mobs.npcs.zero.whiteyan.message13=......


actors.mobs.npcs.zero.yetyog.name=Bubbles
actors.mobs.npcs.zero.yetyog.desc=Somehow you feel that this girl is subtly related to the deepest depths of the dungeon. She's mysterious.
actors.mobs.npcs.zero.yetyog.message1=I am omniscient, omnipotent, and all-seeing. Do you also want to touch the door of time and space?
actors.mobs.npcs.zero.yetyog.message2=What are you pursuing? The essence of the world, the forbidden knowledge, or the supreme power?
actors.mobs.npcs.zero.yetyog.message3=Perhaps it is too early for you to touch the wisdom of another dimension. At this time, perhaps the partial disclosure of reality will be more valuable to you.
actors.mobs.npcs.zero.yetyog.message4=I will always watch you, child.
actors.mobs.npcs.zero.yetyog.def_verb_1=When everything returns to dust...
actors.mobs.npcs.zero.yetyog.def_verb_2=Naya's store is doing really well...
actors.mobs.npcs.zero.yetyog.def_verb_3=Don't be afraid, kid, we will always be watching you...

actors.mobs.npcs.zero.mint.n=The sleeping cat
actors.mobs.npcs.zero.mint.name=Mint
actors.mobs.npcs.zero.mint.x=I hope this book can help you~, I wish you a smooth adventure~
actors.mobs.npcs.zero.mint.d=It is pressing an old hardcover book. No one knows whether this book will bite people before it is actually bitten.
actors.mobs.npcs.zero.mint.desc=The beast-eared girl from another world is expressing her doubts about the person who disturbed her sleep.
actors.mobs.npcs.zero.mint.message1=Have you ever asked yourself, where does your obsession come from?
actors.mobs.npcs.zero.mint.message2=It seems that you have nothing, do you want me to perform a magic trick? Just... give you a book.
actors.mobs.npcs.zero.mint.message3=Don't blink, let me show you a magic trick.
actors.mobs.npcs.zero.mint.message4=This book I created has the mark of this world, it should be able to help you. Hehe, why should I help you, I feel you are a little like him, of course this is a secret between us. You must not tell anyone.
actors.mobs.npcs.zero.mint.message5=Have a nice trip, %s. How do I know your name? It's a secret~~

actors.mobs.npcs.zero.whiteling.name=Miao
actors.mobs.npcs.zero.whiteling.desc=No one knows where she comes from, she occasionally comes to the Snow View Hotel to rest. \n\nIf you meet her, why not try to chat with her.
actors.mobs.npcs.zero.whiteling.message1=Hello, %s. Welcome to the Snow View Inn.
actors.mobs.npcs.zero.whiteling.message2=Who am I? Who knows? But I come here to rest occasionally and bless every adventurer here.
actors.mobs.npcs.zero.whiteling.message3=But I'm sorry, due to some changes, I have become weaker and weaker. I can't help you completely with my current strength.
actors.mobs.npcs.zero.whiteling.message4=I found some supplies in the snow outside the hotel, maybe they can help you.......
actors.mobs.npcs.zero.whiteling.a_message5=Oh, by the way, meeting is fate, I have a necklace here, I will give it to you. Please wear it, I hope this meager power can help you.
actors.mobs.npcs.zero.whiteling.b_message5=This supply may help you, I hope you like it.
actors.mobs.npcs.zero.whiteling.message6=It's about time. See you next time, %s. Good luck...
actors.mobs.npcs.zero.whiteling.c_message1=She has ignored you and looks like she is asleep...
actors.mobs.npcs.zero.whiteling.c_message2=Crystal particles are swirling around her, as if protecting her.
actors.mobs.npcs.zero.whiteling.c_message3=It's better not to bother her anymore...
actors.mobs.npcs.zero.whiteling.def_verb_1=May the world bless you...
actors.mobs.npcs.zero.whiteling.def_verb_2=Will you be redeemed?

actors.mobs.npcs.zero.zako.name=Zako
actors.mobs.npcs.zero.zako.desc=A cute tengu girl, one of the pets of the Radish Dungeon. Her mission in this dungeon is to sell food. Try it if you pass by. \n\nBy the way, don't call her fish sauce. Be careful that she will get angry.
###First
actors.mobs.npcs.zero.zako.message1=You are so annoying! Are you going to the dungeon too? Uh--it's very dangerous there, so be careful.
###Second
actors.mobs.npcs.zero.zako.message2=Oh, by the way, this is for you.
actors.mobs.npcs.zero.zako.message3=Ah, what? A little wet?
actors.mobs.npcs.zero.zako.message4=Hmm... It seems like I drooled while sleeping\n\nDamn it! I'm not a small fish!
###SRD
actors.mobs.npcs.zero.zako.message5=Grr, I'm not a small fish!
actors.mobs.npcs.zero.zako.message6=Damn it... If you call me a small fish again...
actors.mobs.npcs.zero.zako.message7=Hmm? Are you leaving?\n\nIf... If you come back, I'll allow you to call me a small fish
###Amulet
actors.mobs.npcs.zero.zako.message8=Hmm! I'm back! Forget it, just be happy, even if you still call me a small fish...

actors.mobs.npcs.zero.mooncat.name=Moonlight
actors.mobs.npcs.zero.mooncat.desc=This is a cat-like humanoid creature, all smooth and white. According to rumors, it was once a shield guard or a scrap dealer, but it seems that he has nothing.
actors.mobs.npcs.zero.mooncat.amulet_desc=A cat-like humanoid creature, but he is holding a huge shield.
actors.mobs.npcs.zero.mooncat.def_verb_1=What are you doing!
actors.mobs.npcs.zero.mooncat.def_verb_2=You kid!
actors.mobs.npcs.zero.mooncat.message1=I used to be a shield guard, until my shield was stolen.
actors.mobs.npcs.zero.mooncat.message2=Actually, I also have a one-handed sword, but it was also stolen.
actors.mobs.npcs.zero.mooncat.message3=Here's to you, I hope you can use it.
actors.mobs.npcs.zero.mooncat.message4=Good luck, adventurer.

actors.mobs.npcs.zero.gudazi.name=Gudazi
actors.mobs.npcs.zero.gudazi.desc=A hero from a foreign land, he has come all the way from Chaldea in Rodel. Perhaps he's searching for something.
actors.mobs.npcs.zero.gudazi.message1=Hello, we meet again.
actors.mobs.npcs.zero.gudazi.message2=If you are not in a hurry, warm up by the campfire with us.
actors.mobs.npcs.zero.gudazi.message3=Oh, by the way, we are grilling meat now. Do you want a piece?
actors.mobs.npcs.zero.gudazi.message4=Do you think this town is too desolate? It doesn't matter. More people will come later.
actors.mobs.npcs.zero.gudazi.message5=Oh, by the way, the most dangerous place is not the dungeon, but the ground.
actors.mobs.npcs.zero.gudazi.message6=It's a pity that there is no tavern here, otherwise I can draw cards...
actors.mobs.npcs.zero.gudazi.message7=Ah~ I really want to draw cards...
actors.mobs.npcs.zero.gudazi.message8=I don't have anything to give you anymore, but maybe you can talk to others and maybe they will have something to give you.

actors.mobs.npcs.zero.gudazi.message9=Wait, I see you have a lot of money. Can you lend me 300 gold? I should pay you back.
actors.mobs.npcs.zero.gudazi.message10=If you give me some money, I will give you some help on the way.

actors.mobs.npcs.zero.gudazi.message11=You are really strong, %s, you can reach this place!
actors.mobs.npcs.zero.gudazi.message12=I won't be able to go down. Something's stopping me.
actors.mobs.npcs.zero.gudazi.message13=But thanks to you, I have enough firewood!
actors.mobs.npcs.zero.gudazi.message14=Be careful. The road ahead is very dark, and I can't accompany you on the road ahead, see you later, %s.
actors.mobs.npcs.zero.gudazi.def_verb_1=Huh?
actors.mobs.npcs.zero.gudazi.def_verb_2=Hmm...
actors.mobs.npcs.zero.gudazi.level4=Nice to meet you again. This is the thank you gift we agreed on. Well, I have something else to do. See you later. Bye!
actors.mobs.npcs.zero.gudazi.level9=Ah, you are here too. Thanks to the money you gave me, I got a lot of good stuff. I will give you these two stones. I hope they can help you in the future. I will leave first. See you next time!
actors.mobs.npcs.zero.gudazi.level14=Ah, what a coincidence that you are here too. I just made some things so I will give you some. Well, I have to leave too. See you later.
actors.mobs.npcs.zero.gudazi.dead=Gudazi has been repatriated......
actors.mobs.npcs.heallanfire.name=The Fire of Life
actors.mobs.npcs.heallanfire.desc=The bonfire left by Gudazi can save your life in a critical moment!
actors.mobs.npcs.heallanfire.ssss=You have absorbed the power of the Fire of Life, and you feel that your wounds have completely healed!

actors.mobs.npcs.zero.gudazi.quest_start_prompt=Adventurer, are you willing to give me 300 gold coins?
actors.mobs.npcs.zero.gudazi.enter_yes=Give it!
actors.mobs.npcs.zero.gudazi.enter_no=You don't have enough money.

actors.mobs.npcs.zero.gudazi.good=Thanks! See you later, I'll be waiting for you down below.
actors.mobs.npcs.zero.gudazi.not=That's fine, I wish you a safe journey.

actors.mobs.npcs.zero.kongfu.name=Pigeon
actors.mobs.npcs.zero.kongfu.desc=You don't know where this pale man comes from or what his name is, you just know that people call him "Pigeon".
actors.mobs.npcs.zero.kongfu.a_message1=I've been craving pigeons. I've been tortured by pies lately, and I've been craving pigeons... But there are too many pies... By the way, do you like meat pies? If you do, I'll share some with you...
actors.mobs.npcs.zero.kongfu.b_message1=:Hmm? You've got the Crystal Heart? Congratulations. By the way, I have an unsolicited request, I hope you can go to the surface and bring me some pigeons, I've been craving pigeons...
actors.mobs.npcs.zero.kongfu.c_message1=What's wrong, adventurer? Do you still want to eat meat pie? You can't eat too much food, one is enough! Well, I'm going to continue wasting time on that damn pie, I wish you good luck, adventurer.
actors.mobs.npcs.zero.kongfu.def_verb_1=You're messing with cotton if you mess with me.

actors.mobs.npcs.zero.moruos.name=Moruos
actors.mobs.npcs.zero.moruos.desc=The proprietress of the Snow View Inn. It is said that she has seen countless adventurers come to this dungeon. Most of them never return, but some can return with glory...
actors.mobs.npcs.zero.moruos.message1=Adventurers, welcome to the Snow View Town. I am the proprietress here.
actors.mobs.npcs.zero.moruos.message2=Is the blizzard still falling outside? If you feel tired, you can go to the 2nd floor of the inn to rest.
actors.mobs.npcs.zero.moruos.message3=There are some guests on the 2nd floor of the inn who are avoiding the blizzard. You may be able to talk to them...\n\nIn addition, I know you are also in the Mobius loop, so I will give you supplies according to your journey. They are all on the counter.
actors.mobs.npcs.zero.moruos.roll1=We are called Snow Town because the blizzards here never stop...
actors.mobs.npcs.zero.moruos.roll2=I once saw a blue-haired girl, she said she wanted to save the dungeon, but when she left, she never came back...
actors.mobs.npcs.zero.moruos.roll3=Occasionally, a white-haired maid may come to the inn to rest, but she has a mysterious power, you may meet her...
actors.mobs.npcs.zero.moruos.roll4=The town of Snowscape is a core plot of land in one of the surface triad Frostfall empires, and the entrance to the dungeon is also in the upper right corner of the town ......
actors.mobs.npcs.zero.moruos.roll5=Sometimes, I think about a question: "Why would an adventurer like you go to the dungeon? I suspect there is a silent truth behind it." Of course, I may be overthinking, just pretend I didn't say anything~
actors.mobs.npcs.zero.moruos.roll6=%s, be careful on the road..., you must come back alive~
actors.mobs.npcs.zero.moruos.roll7=Have you seen pure crystal elements? They used to be warriors, but now they have become like this...
actors.mobs.npcs.zero.moruos.roll8=If you meet the pure crystal guard leader, please save her and don't let her despair...

actors.mobs.npcs.zero.qinyuewolf.name=Qin Yue
actors.mobs.npcs.zero.qinyuewolf.desc=A boy with animal ears, judging by the color of his fur... should he be a werewolf? He looks easy to deceive.
actors.mobs.npcs.zero.qinyuewolf.a_message1=Hello, um... you are an adventurer, right?
actors.mobs.npcs.zero.qinyuewolf.a_message2=I am Qin Yue, a traveler who is traveling around the world, and also a writer.
actors.mobs.npcs.zero.qinyuewolf.a_message3=I hope you have a smooth journey.
actors.mobs.npcs.zero.qinyuewolf.b_message1=Oh, by the way, I bought a few potions when I came here. Meeting is fate, so I will give you one.
actors.mobs.npcs.zero.qinyuewolf.b_message2=Since you have accepted this potion, you must come back and tell me your story in the dungeon.
actors.mobs.npcs.zero.qinyuewolf.b_message3=......You must come back as a "human".
actors.mobs.npcs.zero.qinyuewolf.c_message1=Be careful on the road, see you later.
actors.mobs.npcs.zero.qinyuewolf.d_message1=Welcome back! It has been several days since you entered the dungeon.
actors.mobs.npcs.zero.qinyuewolf.d_message2=Since you have obtained the Crystal Heart, take a good rest first.
actors.mobs.npcs.zero.qinyuewolf.e_message1=Is this the Crystal Heart......? ......Forget it, it's nothing.

actors.mobs.npcs.zero.qinyuewolf.bd_message1=Um...ah, it's %s
actors.mobs.npcs.zero.qinyuewolf.bd_message2=Just now I was thinking about something...um, I was thinking about a story, I'm a novelist.
actors.mobs.npcs.zero.qinyuewolf.bd_message3=But even though I said that, I have written some short articles, but I still don't have any works of my own. I have a lot of works planned.
actors.mobs.npcs.zero.qinyuewolf.bd_message4=By the way, you are ready to go on an adventure, come here, this is for you.
actors.mobs.npcs.zero.qinyuewolf.bd_message5=The above are my unfinished works and travel notes, you can read them to relax when you take a break from adventure.
actors.mobs.npcs.zero.qinyuewolf.bd_message6=When you come back, remember to give me some inspiration!
actors.mobs.npcs.zero.qinyuewolf.bd_message7=I hope there are no typos...Ah, it doesn't matter if you lose it, the manuscript is still here, and it was copied with magic.
actors.mobs.npcs.zero.qinyuewolf.bd_message8=Then, I'll wait for you to come back.

actors.buffs.clearbleesdgoodbuff.blessqinyue.name=Night Owl
actors.buffs.clearbleesdgoodbuff.blessqinyue.desc=When you move at night, you get the buff 'Night Owl', movement speed +25%, dodge rate increased by 10%, and you are indeed more energetic when you stay up late...\n\nWell, anyway, it's better to go to bed early.


actors.mobs.npcs.zero.smallleaf.name=Xiaoye
actors.mobs.npcs.zero.smallleaf.desc=One of the most famous adventurers in the world above. It is said that she has survived many dungeons. There are rumors that she is actually the creator of a small world... but you have not seen her inhumanity.
actors.mobs.npcs.zero.smallleaf.amulet_desc=The strong wind blows the windbreaker and the girl in front of you seems to have a unique temperament.
actors.mobs.npcs.zero.smallleaf.descofpropchange = We meet again, adventurer. You seem to have some strange things on you. Can you let me see them?
actors.mobs.npcs.zero.smallleaf.message1=Hello, adventurer. I welcome you as a member of the Snow Town for the time being.

actors.mobs.npcs.zero.smallleaf.a_message2=Your short sword... I have never seen such a rare enchantment.
actors.mobs.npcs.zero.smallleaf.b_message2=It is really exquisite.
actors.mobs.npcs.zero.smallleaf.c_message2=Strange cloak, it seems to be closely connected with some kind of life.
actors.mobs.npcs.zero.smallleaf.d_message2=Well, it feels natural.
actors.mobs.npcs.zero.smallleaf.e_message2=Excellent sword.


actors.mobs.npcs.zero.smallleaf.amulet_message3=I have always believed in your ability.
actors.mobs.npcs.zero.smallleaf.amulet_message4=Huh, I'm a little tired too...
actors.mobs.npcs.zero.smallleaf.amulet_message5=It's time to rest and prepare for the next more glorious journey.

actors.mobs.npcs.zero.smallleaf.message3=Get ready, it's time for me to set off...
actors.mobs.npcs.zero.smallleaf.message4=Sister, why are you here? ! I'll be back soon, soon, ah~
actors.mobs.npcs.zero.smallleaf.message5=My clothes are lost, did they fall here? We can only know when we go down and take a look.
actors.mobs.npcs.zero.smallleaf.message6=Even if you hold the staff tightly, the charge will not increase immediately. Arrange everything well and you can live better.
actors.mobs.npcs.zero.smallleaf.message7=Adventurers, be careful.
actors.mobs.npcs.zero.smallleaf.def_verb_1=Now is not the time...
actors.mobs.npcs.zero.smallleaf.def_verb_2=Did it go off?

actors.mobs.npcs.zero.smallleaf.victory=A glorious victory.
actors.mobs.npcs.zero.smallleaf.wtf_sister=These, and these... are all for you! Take them quickly, I don't want these to be found by my sister.

actors.mobs.npcs.smallleafharddungeon.name = Xiaoye
actors.mobs.npcs.smallleafharddungeon.title = Xiaoye's Thoughts
actors.mobs.npcs.smallleafharddungeon.desc = There are two very unique magical powers intertwined on these items... Do you want me to try to activate one of them? The first one may transmute the item, and the second one may create two transmuted items, or one item of the opposite type.
actors.mobs.npcs.smallleafharddungeon.change = Trigger the power of transmutation?
actors.mobs.npcs.smallleafharddungeon.gamble = Trigger the power of distortion?
actors.mobs.npcs.smallleafharddungeon.cancel = Do nothing
actors.mobs.npcs.smallleafharddungeon.cancelchange = Xiaoye: In that case, adventurer, we will meet again if we are lucky.
actors.mobs.npcs.smallleafharddungeon.changed = Xiaoye: Phew... I am so tired, then we will meet again if we are lucky, traveler.

actors.mobs.npcs.smallleafharddungeon$wndchangeprop.message = Then, choose one for me next.
actors.mobs.npcs.smallleafharddungeon$wndchangeprop.change = I've chosen.
actors.mobs.npcs.smallleafharddungeon$wndchangeprop$3.select = Select a collection



actors.mobs.npcs.zero.pianole.name=Kotori
actors.mobs.npcs.zero.pianole.desc=There's a strange breeze around this girl, making people feel comfortable and warm. She feels very friendly.
actors.mobs.npcs.zero.pianole.message1=Another adventurer? As far as I am concerned, it would be great if you could go home as soon as possible.
actors.mobs.npcs.zero.pianole.message2=Always worrying...
actors.mobs.npcs.zero.pianole.message3=Don't run away. I'll be watching here. Really, don't look at me like that. Ah... Oh, sorry, adventurer, I wasn't talking to you.
actors.mobs.npcs.zero.pianole.message4=This town isn't as peaceful as it looks. You should be careful.
actors.mobs.npcs.zero.pianole.message5=There is no need to waste food if you are not hungry.
actors.mobs.npcs.zero.pianole.quest_start_prompt=Want to try my magic?
actors.mobs.npcs.zero.pianole.quest_start_prompt_2=Not enough fun?
actors.mobs.npcs.zero.pianole.quest_start_prompt_3=Do you want to continue?
actors.mobs.npcs.zero.pianole.enter_yes=Yes
actors.mobs.npcs.zero.pianole.enter_no=No
actors.mobs.npcs.zero.pianole.not_magic=I am out of strength, Xiaoye, help me down...
actors.mobs.npcs.zero.pianole.amulet=Although the result is good, but... Never mind, I will only bless you at this time.

actors.mobs.npcs.zero.pianole.def_verb_1=Bad behavior...
actors.mobs.npcs.zero.pianole.def_verb_2=Have you become a warmonger?

actors.mobs.npcs.zero.atri.name=Atri
actors.mobs.npcs.zero.atri.desc=Looks like an ordinary girl, seems to be fishing for something...
actors.mobs.npcs.zero.atri.message1=Intruder! Rocket Torpedo Punch!
actors.mobs.npcs.zero.atri.message2=Can you give me this one that looks delicious? In exchange, I'll give you this one! It's delicious! Delicious means happy!
actors.mobs.npcs.zero.atri.message3=Eat well to have the strength to work, you should eat more too!
actors.mobs.npcs.zero.atri.rankings_desc=Blasted to pieces by Atri's rocket torpedo punch...

actors.mobs.npcs.zero.question.name=Question Mark
actors.mobs.npcs.zero.question.desc=This person doesn't seem to belong here. He has been standing quietly by the water...
actors.mobs.npcs.zero.question.title=...Is there anything?
actors.mobs.npcs.zero.question.option_nothing=Nothing
actors.mobs.npcs.zero.question.option_chat=Chat
actors.mobs.npcs.zero.question.option_enquire=Enquire
actors.mobs.npcs.zero.question.option_request=Request
actors.mobs.npcs.zero.question.option_duel=Duel
actors.mobs.npcs.zero.question.option_game=Game
actors.mobs.npcs.zero.question.title_1=What do you want to ask?
actors.mobs.npcs.zero.question.ling="Ling"
actors.mobs.npcs.zero.question.birth=Birth
actors.mobs.npcs.zero.question.dungeon=Dungeon
actors.mobs.npcs.zero.question.title_5=...Are you serious?
actors.mobs.npcs.zero.question.true=Seriously?
actors.mobs.npcs.zero.question.false=Just kidding.
actors.mobs.npcs.zero.question.title_4=Just a reminder, all the games here cost money.
actors.mobs.npcs.zero.question.fgame=Compare size
