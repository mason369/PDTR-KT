actors.mobs.yogrealfirst.invuln_warn=The Fist cannot be damaged while adjacent to the Eye of the Old One!
actors.mobs.yogrealfirst.rankings_desc=Ingested by Yog-Zot
actors.mobs.yogrealfirst.desc=This Fist is a partial manifestation of the power of the Old Ones. These Fists are linked to the power of the Old Ones, and are immune to all damage when near the Eye of the Old Ones.
actors.mobs.yogrealfirst$burningfist.name=The Burning Fist
actors.mobs.yogrealfirst$burningfist.desc=The Burning Fist is made of the fiery magic of Chaos. It ignites the surroundings as it moves. It can also fire blasts of fire energy that engulf the target in flames. \n\nThe Burning Fist's ability to ignite the environment is suppressed when near water, but the heat is so great that the surrounding water will quickly evaporate!
actors.mobs.yogrealfirst$soiledfist.name=Soiled Fist
actors.mobs.yogrealfirst$soiledfist.desc=The Soiled Fist is formed from chaotic earth magic. As it moves, it constantly causes vegetation to grow around it. It can also fire precise earth blasts, trapping its target in rapidly growing vines and roots! \n\nThe Soiled Fist draws power from plant life, and can resist damage based on the amount of vegetation around it!
actors.mobs.yogrealfirst$rottingfist.name=Rotting Fist
actors.mobs.yogrealfirst$rottingfist.desc=The Rotting Fist is made of living corruption. A towering mass of rotten flesh, it can splatter corrosive ooze in melee combat, and spew poisonous gas as a ranged attack. Worse still, the Rotting Fist's immense mass causes it to bleed when attacked, rather than taking direct damage. \n\nCorroded Sludge can be washed away by water, but the Fist of Corruption can also heal itself by absorbing water! Additionally, damaging the Fist of Corruption while it is bleeding will only refresh the bleeding state instead of increasing the effect!
actors.mobs.yogrealfirst$rustedfist.name=Rusted Fist
actors.mobs.yogrealfirst$rustedfist.desc=The Rusted Fist is formed from a single piece of living metal. It is a towering, moving mass of metal that has powerful melee abilities, as well as ranged attacks that can cripple targets from a distance. Due to its massive mass, damage dealt to the Fist of Corruption is delayed rather than being applied immediately. \n\nHowever, the Fist of Corruption's inflexible nature prevents it from being able to fit into narrow corridors. Additionally, while the Fist of Corruption takes damage slowly, the delayed damage continues to stack if it is hit multiple times.
actors.mobs.yogrealfirst$brightfist.name=Bright Fist
actors.mobs.yogrealfirst$brightfist.teleport=Bright Fist teleports in a flash that severely blinds you!
actors.mobs.yogrealfirst$brightfist.desc=Bright Fist is made of pure light energy. It fires a powerful, blinding beam every round! These beams deal massive damage and temporarily blind you. Bright Fist can also fire a blinding full-area flash to escape! \nBright Fist has no special abilities in melee combat.
actors.mobs.yogrealfirst$darkfist.name=Shadow Fist
actors.mobs.yogrealfirst$darkfist.teleport=Shadow Fist teleports in a pitch black that extinguishes your light source!
actors.mobs.yogrealfirst$darkfist.desc=Shadow Fist is made of pure dark energy. It can fire powerful dark spells every round! In addition to dealing massive damage, these spells will also weaken your light sources. Shadow Fist can also instantly plunge the entire field into darkness in order to escape! \n\nShadow Fist has no special abilities in melee combat.

levels.yoggodhardbosslevel.well_name = Well of Space
levels.yoggodhardbosslevel.well_desc = The magic of space surges in the well. Perhaps it points to somewhere?


actors.mobs.magicgirldead.name = Ice Witch
actors.mobs.magicgirldead.desc = Ice Witch was once the guardian of Yi Ling. Because of the dungeon incident, she was corrupted by black magic and became a witch.\n\nNow she hates everything. You are very unlucky to step into her territory.\n\nEither you die or I live.\n\nShe is very difficult to deal with and has lost her mind. If you are not prepared, she will definitely beat you up.\n_Don't let her step on water, otherwise she will be very dangerous.\n\nIf there is a tower, the damage to the Ice Witch will be reduced in proportion. And attacking the Ice Witch when there is a tower will cause the Ice Witch to receive a certain damage ratio. After the tower directly finds the target and shoots directly.
actors.mobs.magicgirldead.run = ...Are you trying to escape using this method?
actors.mobs.magicgirldead.arise=Come out, my puppet!
actors.mobs.magicgirldead.damaged = Crystal barrier, judge this ignorant person!
actors.mobs.magicgirldead.arise2=Come out, my puppet!
actors.mobs.magicgirldead.shield2 = Water is the source of life, but it can also kill people
actors.mobs.magicgirldead.shield = Psychedelic water, please give me strength!
actors.mobs.magicgirldead.notice = Human! You shouldn't come here!
actors.mobs.magicgirldead.die = I can finally see you again!!!
actors.mobs.magicgirldead.def_verb = Magic barrier
actors.mobs.magicgirldead.ranking_desc = Judged forever by the Ice Witch
spellcaster$frostcaster.name = Fantasy barrier crystal - Pride
spellcaster$frostcaster.desc = The long-range spell barrier platform summoned by the Ice Witch will launch long-range attacks on the target at intervals. \n\nAttack mode: Fire a ray at the target location. The target location fires missiles in four positive directions in the next round. Causes _Cold_. \n\n-The crystal ignores ranged damage and can only be damaged after being activated!
spellcaster$explosioncaster.name = Fantasy Barrier Crystal-Jealousy
spellcaster$explosioncaster.desc = The long-range spell barrier platform summoned by the Ice Witch will launch long-range attacks on the target at intervals. \n\nAttack mode: Fire a ray at the target location, affecting the cross area centered on the target location. The target location fires rays in four diagonal directions in the next round. The first attack causes _Mark_. \n\nThe mark effect will greatly increase the damage the target receives from all spell turrets.
spellcaster$lightcaster.name = Fantasy Barrier Crystal-Rage
spellcaster$lightcaster.desc = The long-range spell barrier platform summoned by the Ice Witch will launch long-range attacks on the target at intervals. \n\nAttack mode: Fire a beam to the target location, update the target location in the next round, and fire three scattered beams from the turret. Causes _blindness_. \n\nThis turret has a higher benefit from being marked.
spellcaster$bouncecaster.name =Fantasy Ward Crystal-Laziness
spellcaster$bouncecaster.desc =A long-range spell ward platform summoned by the Ice Witch, which will launch long-range attacks on the target at intervals. \n\nAttack mode: Fire a beam to the target location, update the target location in the next round, and fire a beam from the last hit location. Causes _marking_. \n\nThe marking effect will greatly increase the damage the target receives from all spell turrets.
spellcaster$halofirecaster.name =Fantasy Ward Crystal-Gluttony
spellcaster$halofirecaster.desc =A long-range spell ward platform summoned by the Ice Witch, which will launch long-range attacks on the target at intervals. \n\nAttack mode: Fire a ray to the target location, update the target location next turn, fire a ray from the last hit location. Causes _Phosphorus_. \n\nMarking the target will greatly increase the damage it receives from all spell turrets.
spellcaster$halofirecaster.status = Gluttony


spellcaster$degradecaster.name = Fantasy Ward Crystal - Greed
spellcaster$degradecaster.desc = A long-range spell ward platform summoned by the Ice Witch, which will launch a long-range attack on the target at intervals. \n\nAttack mode: Fire a ray to the target location, update the target location in the next round, and fire a ray from the last hit location. Causes _Degradation_. \n\nThe mark effect will greatly increase the damage the target receives from all spell turrets.
spellcaster$degradecaster.status = Greed

spellcaster$deadlingcaster.name = Fantasy Ward Crystal - Death
spellcaster$deadlingcaster.desc = A long-range spell ward platform summoned by the Ice Witch, which will launch a long-range attack on the target at intervals. \n\nAttack mode: Fire a ray to the target location, update the target location in the next round, and fire a ray from the last hit location. Causes _Destiny_. \n\nThe mark effect will greatly increase the damage the target receives from all spell turrets.
spellcaster$deadlingcaster.status = Dead

spellcaster.marked = Marked


actors.mobs.npcs.reddragon.name=Red Dragon King
actors.mobs.npcs.reddragon.gnollshiled_1=Hey, that guy over there. Yes, that's you. See that jackal cub? He's been blasting me with his potion flask these days. I want you to help me kill it. \nOf course, if you succeed, I'll give you something good.
actors.mobs.npcs.reddragon.gnollshiled_2=Is its potion flask dangerous? Don't worry, this is a test for you! I called them over here, just do your best and don't thank me!
actors.mobs.npcs.reddragon.skullshaman_1=Hey, that guy over there! \nYes, it's you! Have you noticed that there's always something flashing in this cave? It's too blinding. It's the little jackal cub holding a broken mask and scaring people everywhere. Hurry up and kill him!
actors.mobs.npcs.reddragon.skullshaman_2=Is its mask dangerous? Don't worry, this is a test for you! I called them over here, you just do your best, no need to thank me!
actors.mobs.npcs.reddragon.flamec01_1=Hey, that one over there! Yes, it's you! \nDo you hear that rustling metal sound? It's that broken copper and iron, crackling all day long, and it doesn't let the dragon sleep? I want you to help me dismantle it, go quickly!
actors.mobs.npcs.reddragon.flamec01_2=Is its flamethrower dangerous? Don't worry, this is a test for you! I called them over here, you just do your best, no need to thank me!
actors.mobs.npcs.reddragon.find_me=Thanks for your help, I'll come find you right away.
actors.mobs.npcs.reddragon.desc=The dignified appearance, surrounded by an invincible rose barrier and terrifying phosphorescence, is patrolling everywhere. It looks like it's looking for someone, maybe, it's looking for you!

actors.mobs.redmurderer.name=Red Murderer
actors.mobs.redmurderer.stole=Red Murderer stole your %s! And immediately created a magic circle and teleported away.
actors.mobs.redmurderer.carries=\n\nThis Red Murderer is carrying a _%s_. Obviously stolen.
actors.mobs.redmurderer.escapes=Red Murderer sold your %s for a good price, she's still not satisfied, you'll meet her again.
actors.mobs.redmurderer.desc=The Scarlet Murderer is a dangerous monster that escaped from prison. They were misled to the Dwarven Kingdom by the magic of the dungeon. \n\nThe Dwarven King gave them terrible abilities. \n-Anyway, they are definitely not good guys, try not to confront them head-on! \n\n{ One thing you must remember is that their desire to steal is bottomless {.

actors.mobs.brownbat.name=Brown Bat
actors.mobs.brownbat.desc=These fragile bats don't seem to want you to disturb them. \n\nBecause they are agile, you must use _sneak attack_ to attack them. You are likely to get stabbed in the eye by their _claws_\n\nThey will sound an alarm before they die, so be careful.
actors.mobs.brownbat.warning=The bats made a hissing sound before they died, and the monsters nearby noticed it!

actors.mobs.icegolem.name=Frost Golem
actors.mobs.icegolem.frost_kill=The golem's icy power imprisons you, trapping you forever.
actors.mobs.icegolem.desc=Frost Golems are the product of the dwarven elites who tried to use new applications of magic to make up for the long-standing shortcomings of mechanical equipment. Although they are not as large and bulky as DM-300, they still have a destructive power that cannot be underestimated. \n\nFrost Golems are different from ordinary golems. Because they are more flexible and shorter, they can pass through doors and use the power of ice to catch every adventurer off guard.

actors.mobs.icegolem$darkbolt.rankings_desc=Ice magic freezes you forever!

actors.mobs.gnollshiled.name=Gnoll Alchemist Elder
actors.mobs.gnollshiled.desc=Gnolls are hyena-like humanoid creatures. They wander around the dungeon, occasionally moving upwards to attack the surface. The Jackal Alchemy Elders are the elites among the Jackals, and they are good at using alchemical catalysts to randomly debuff intruders.

actors.mobs.shopguarddead.name=Shop Guard - Graviton
actors.mobs.shopguarddead.desc=When you try to buy something for free at the store, this {uninvited guest{} comes to you. You know that you are in {big trouble{. \n\nThe statue is equipped with sophisticated armor and looks quite hard and difficult to deal with. \n\nAlthough the statue itself is made of stone, it is equipped with _%1$s_ and _%2$s_. \n\n_Gravityton has the power to master gravity. They have the ability to manipulate gravity, and they are bound to kill all those who try to buy something for free at the store. _
actors.mobs.shopguarddead.kil=It's useless. Don't try to use the floating ability. I control gravity, don't move an inch!

actors.mobs.shopguard.name=Shop Guard - Punisher
actors.mobs.shopguard.desc=When you try to buy something for free in the shop, this {uninvited guest{ comes to you. You know you are in {big trouble{. \n\nThe statue is well-equipped with armor and looks quite tough. \n\nAlthough the statue itself is made of stone, it is equipped with _%1$s_ and _%2$s_. \n\nThe Punisher is the most basic guard, they have the most basic ability to suppress healing, they are bound to kill everyone who tries to buy something for free in the shop. _
actors.mobs.shopguard.noha=It's useless, don't try to use healing abilities. You have violated the rules of the dungeon shop, and your healing abilities will be taken away!

actors.mobs.shopguardeye.name=Shop Guard - True Eye
actors.mobs.shopguardeye.desc=When you try to buy something in the shop, this {uninvited guest{} comes to you. You know you are in {big trouble{. \n\nThe statue is well-armored and looks tough. \n\nAlthough the statue itself is made of stone, it is equipped with _%1$s_ and _%2$s_. \n\nThe True Eye will ignore any invisible players and will kill anyone who tries to buy something in the shop. _
actors.mobs.shopguardeye.nois=It's useless, don't try to use the invisibility ability. We can see you!

actors.buffs.roseshiled.name=Rose Ward
actors.buffs.roseshiled.heromsg=The magic of the rose protects you!
actors.buffs.roseshiled.desc=You will not be harmed while in the Rose Ward. \n\nThe energy of the Rose Boundary is still: %s points.

actors.mobs.skullshaman.name=Elder Jackal Shaman
actors.mobs.skullshaman.desc=An old jackal living in the mines. Just by looking at this skull, you can tell that this thing is not easy to deal with. Fortunately, it seems to have fallen into a deep sleep due to its old age. Maybe you can get away with it.

actors.buffs.hunger.warning=You feel extremely hungry, which is not a good sign.
actors.mobs.pyloncs.name=Power Tower-EX
actors.mobs.pyloncs.desc_inactive=This is an energy tower used to distribute electricity to machinery in the area. \n\nThis energy tower is not activated and cannot be damaged at present.
actors.mobs.pyloncs.desc_active=This is an energy tower used to distribute electricity to machinery in the area. At this moment, the energy tower is surging with electricity, which must be charging DM-720!
actors.mobs.pyloncs.crazy=Module damaged, emergency mode activated. Please do not attack the energy tower!

actors.mobs.newdm720.name=DM-720
actors.mobs.newdm720.notice=Unauthorized Unit Detected!
actors.mobs.newdm720.shield=DM-720 draws power from exposed pipes and wraps itself in a shield!
actors.mobs.newdm720.vent=DM-720 vents toxic exhaust from its jets!
actors.mobs.newdm720.rocks=DM-720 slams the ground, loosening the rock from the cavernous dome!
actors.mobs.newdm720.charging=Taking Damage! Activating the Power Tower!
actors.mobs.newdm720.charging_hint=DM-720 cannot be damaged while receiving power from a Power Tower!
actors.mobs.newdm720.supercharged=Supercharger! Supercharger! Supercharger! Supercharger!
actors.mobs.newdm720.charge_lost=Power Tower Lost! Reswitching back to its own power!
actors.mobs.newdm720.pylons_destroyed=Warning! Power Grid Failure Detected!
actors.mobs.newdm720.rankings_desc=Executed by DM-720!
actors.mobs.newdm720.def_verb=Nanoshield! Boy!
actors.mobs.newdm720.defeated=Deadly Damage! Activating Destruction Sequence! Will Destroy in 3 Turns!
actors.mobs.newdm720.desc=The DM-720 is the most powerful "defense machine" ever invented this century. Such a formidable machine is extremely difficult to build, so the creators only built a few to guard the entrances to their underground metropolis.\n\nIt is equipped with vents that spew out toxic exhaust and a high-powered drill that can be used to attack and destroy the earth. DM-720 can also be connected to an energy grid, further enhancing its power. \n\n_DM720 is a super weapon set up by a dwarven craftsman. It not only breathes fire, but is also more powerful than the DM300. The craftsman also uses the conductive properties of water, and there is a bounty hunter who has lost his mind inside to control it. Almost every adventurer will never return. _
actors.mobs.newdm720.desc_supercharged=DM-720 is now fully charged. In this state, DM-720 will be immune to external damage and move at double the speed! In addition, its electric drill can _drill through the wall_ at a very slow speed in this state. \n\nIt is completely meaningless to attack DM-720 directly in this state, but destroying _the nearby device that provides it with energy_ may relieve this state.
actors.mobs.newdm720$fallingrocks.desc=Loose rocks are rolling down from the top of the layer, and it seems to be collapsing!
actors.mobs.newdm720.repair=Activate backup energy! DM-720 repaired itself.
actors.mobs.newdm720.explo_kill=DM720's self-destruction was not avoided in time, and you were blown to pieces!

actors.mobs.rednecromancer.name=Jackal Priest
actors.mobs.rednecromancer.desc=Jackal Priest can summon the most powerful jackal mobs to fight. It is said that its necromancy is very dangerous.
actors.mobs.rednecromancer$necroskeleton.name="Jackal Mob"
actors.mobs.rednecromancer$necroskeleton.desc=This jackal mob was summoned by the jackal priest. Its abilities and habits are completely different from those of ordinary jackals, so you need to be careful.

actors.mobs.coldmagicrat.name=Frost Magic Rat
actors.mobs.coldmagicrat.frost_kill=Frost magic will freeze you into a popsicle...
actors.mobs.coldmagicrat.desc=A creature created by the polar regions and unknown magic. They are extremely hostile to adventurers, and their bodies are full of magic because they have been influenced by unknown magic for a long time. They will use their own way to stop adventurers from moving forward. These rats have mutated in the polar regions for many years, and they will use long-range ice magic bullets to catch the enemy off guard.
actors.mobs.coldmagicrat$darkbolt.rankings_desc=Frost magic will freeze you forever!

actors.mobs.fireghostdead.name=Fire Ghost
actors.mobs.fireghostdead.frost_kill=After the flame wave, there is nothingness!
actors.mobs.fireghostdead.desc=This red ghost was awakened from the flames by the necromancers deep in the dungeon. Although they are not as powerful as fire elementals, they are still very dangerous. \n\nThis monster will set you on fire and use ranged attacks.
actors.mobs.fireghostdead$darkbolt.rankings_desc=After the flames, there is nothingness!

actors.hero.waterondeath=You are cursed to death by the power of water
actors.hero.ondeath=You are dead...

actors.mobs.redswarm.name=Red Swarm
actors.mobs.redswarm.desc=The giant fly that has been frozen red and affected by the dark magic of the dungeon has become extremely dangerous. You must be careful. \n They will prove who is the boss here with their actions.
actors.mobs.redswarm.fire_kill=Under the attack of ice and fire, you "happily" died...
actors.mobs.redswarm$darkbolt.rankings_desc=Died under the blood-red flame wave...


custom.utils.script.name_ren=REN-33
custom.utils.script.name_smallb=Half-dragon maid-Xiao Lan




actors.mobs.npcs.ren.name=REN-33
actors.mobs.npcs.ren.desc=The traveler who came from an unknown distance, carrying the friendly words of Luo Yue and Siam, and holding the fragrance of lotus ears, greets you.
actors.mobs.npcs.ren.message1=Hello, I am REN-33! I am the only individual... Have you ever wondered what happened in this world? Actually, you should try to relax, that's the best way for you!
actors.mobs.npcs.ren.message2=I have always known that more disasters are happening. Are you also the one who lost a close friend in a disaster?
actors.mobs.npcs.ren.message3=The shotgun killed the starling community in the sky above the dome. At this point, you can overlook the stars, observe Tianjin Star Square, and reach the lighthouse overlooking the sea, praying for it.
actors.mobs.npcs.ren.roll1=Today, tomorrow, yesterday Every day I worry, every day I fear Mad Indra is watching you, coveting your radiance
actors.mobs.npcs.ren.roll2=Days and months spent in the disaster of vomiting, ah That cruel machine, named 'δ' The catastrophe is about to come
actors.mobs.npcs.ren.roll3=You who still cannot understand will eventually understand this noble support phrase

actors.mobs.npcs.ren.roll4=I always feel that the "vending machine" in this dungeon is smarter than the one in my world, after all, we don't have a welcoming service there.
actors.mobs.npcs.ren.roll5=The reason why I was first known by residents of other worlds was a "wine aroma journal" that I left in a dungeon full of nut vines when I was young... I can't wait to tear up all the copies that have been spread out. God, those are all my black history.
actors.mobs.npcs.ren.roll6=Would you like to try "Chuuo"? That is a "new dungeon" I recently opened in the void of the dungeon world. Do you want to know the mysterious digital code? Hmm, "■■■■■■■■■■■", just answer "from the next dungeon" to the question.
actors.mobs.npcs.ren.roll7=Beep, beep.
actors.mobs.npcs.ren.roll8=Hey guys, hey guys.
actors.mobs.npcs.ren.roll9=Sorry, I just had a glitch and I'm trying to get my wires back into my fingers.
actors.mobs.npcs.ren.def_verb=Huh?


actors.mobs.npcs.goonpc.name=Sticky

actors.mobs.npcs.slyl.name=Cold
actors.mobs.npcs.slyl.message1=Hello! Adventurer!
actors.mobs.npcs.slyl.message2=The darkest part of the dungeon...seems a little forgotten. But it is said that adventurers have recently discovered a new batch of special books in the dungeon, which are more or less stained with magic.
actors.mobs.npcs.slyl.message3=Thousands of adventurers have gone to the dungeon for the "Crystal Heart", but no one has returned...I don't know if his approach is right, but the storm is coming...We have no choice, we can only continue like this...
actors.mobs.npcs.slyl.tips=Warm Tips: The Boss Terminal is temporarily disabled, please look forward to the subsequent version.
actors.mobs.npcs.slyl.readbooks=Warm Tip: The tutorial book is being renovated, please look forward to the next version.
actors.mobs.npcs.slyl.other_1=The instigator is...
actors.mobs.npcs.slyl.other_2=Are we really doing the right thing?
actors.mobs.npcs.slyl.other_3=The storm is coming, where will our end be?

actors.mobs.npcs.slyl.def_verb=The storm is coming
actors.mobs.npcs.slyl.desc=_Leng_ is a witch who masters the power of ice and was the manager of _Ice Holy City_ 300 years ago. \n Due to the continuous appearance of underground anomalies, she came here to investigate the cause of the anomalies. \n It seems that she is slacking off.
actors.mobs.npcs.slyl.howuse=Hello, I am Leng. \n\nWelcome to use our _Ice Holy City_ magic coins that can disrupt the _magic flow_. Through it, we can see _specific bosses_. \n\nAmong them, _throwing once_ will appear _Tianhen Sticky Goo (5th floor), Tengu (10th floor), DM300 (15th floor), Dwarf King (20th floor), Yog (25th floor)_\n]Throwing twice] is _Slime King (5th floor), Diamond Treasure King (10th floor), DM720 (15th floor), Dwarf General (20th floor), Yog-Zot (25th floor)_\n[Throwing three times] is _(15th floor Ice Witch)_(Throwing three times is only displayed on _specific floors_)\n\nAt the same time, it is only displayed on the floor before the Boss. The last throw of each time will determine the generation of the next floor Boss. \n\nOkay, the above is the _method and introduction_, I wish you a happy dungeon adventure_.

actors.mobs.npcs.renshop.guards=It seems that you are not a good person.
actors.mobs.npcs.renshop.thief=It seems that you have a bad fate.
actors.mobs.npcs.renshop.sell=Select an item to sell
actors.mobs.npcs.renshop.name=REN-33
actors.mobs.npcs.renshop.desc=Do you think she is insane? In fact, she is a witness to the whole Yiling incident. Now she has opened a staff shop here, which is the best proof. But she will not tell you clues easily.
actors.mobs.npcs.renshop.greetings=Hello, %s! We meet again!

actors.mobs.npcs.nyz.guards=You actually attacked me, I will not let you get a penny.
actors.mobs.npcs.nyz.thief=Stealing things? You don't look like a good person!
actors.mobs.npcs.nyz.sell=Select an item to sell
actors.mobs.npcs.nyz.name=Nayako
actors.mobs.npcs.nyz.desc=A merchant who has been investigating the dungeon since the Tsubasa incident. Mainly sells bomb products and some mysterious books.
actors.mobs.npcs.nyz.greetings=Nayako: Good morning, good afternoon, and good evening, adventurer. Welcome to this dangerous and mysterious dungeon.



actors.mobs.npcs.nyz$2.talk_ascent=Oh, %s, my friend, you don't look well. I'll give you a 30% discount on the things I bought from the terminal.

actors.mobs.npcs.nyz.chat_1=Adventurer, we meet again.
actors.mobs.npcs.nyz.chat_2=I don't have a terminal here. You can take a look at the items on the stalls.
actors.mobs.npcs.nyz.chat_3=Good luck on your journey, adventurer.
actors.mobs.npcs.nyz.chat_4=Snow Town should be our last chance...

actors.mobs.npcs.nyz.dhat_1=%s, Happy New Year!
actors.mobs.npcs.nyz.dhat_2=What, why do I know your name? Hahaha, %s, you are still too young. \n\nBut don't worry, I am here to protect you.
actors.mobs.npcs.nyz.dhat_3=Happy New Year, there are food prepared for you next to the counter, I wish you a happy adventure on the road of reincarnation.

actors.mobs.npcs.nyz.xhat_1=%s, welcome here.
actors.mobs.npcs.nyz.xhat_2=This is the distant future. This is a gap in time and space created by the virtual consciousness created by me and Bubble. It allows you to take a short rest...
actors.mobs.npcs.nyz.xhat_3=I have some supplies here that may help you. Bubble is up there. You can get other supplies from her. Remember, this is very dangerous. Be very careful!

actors.mobs.npcs.nyz.xhat_4=...Crawling Chaos... I am at the end... I will tell you, listen to the void...\n\n Well, what's wrong? Don't understand? Hahaha, don't worry. Also, good luck to you, %s.

actors.mobs.npcs.nyz.xhat_5=In the dark corner, I watch the ups and downs of every life. They don't know that they are just my playthings. \n\n%s, remember, the lonely city is just your dark side, the real crisis still exists in the sea..., soon, you will go to the lotus...

actors.mobs.npcs.nxhynpc.name=Those Memories
actors.mobs.npcs.nxhynpc.message1=If you are going to the dungeon, don't worry about the supply problem!
actors.mobs.npcs.nxhynpc.message2=If you are short of supplies in the dungeon, come to me. My big store is on each floor of the dungeon, and you are welcome to come at any time. \n\nBut if you want to do something bad, you will be doomed!
actors.mobs.npcs.nxhynpc.def_verb=......
actors.mobs.npcs.nxhynpc.desc=This is a merchant with many things, his name is Those Memories. It is said that he knows what happened in this dungeon 300 years ago, and he is waiting for every adventurer to come here. He will give adventurers the corresponding supplies, but he never tells them how dangerous this dungeon is. Rumor has it that he was once a knight, but now he has become a businessman.
actors.mobs.npcs.nxhynpc.other_1=Do you know? I have a sister who is lost in the dungeon. Her name is Charlotte. I hope you can find her! \n
actors.mobs.npcs.nxhynpc.other_2=I remember I still have an ancestral sword, but I left it somewhere in the dungeon. I hope you can be invincible in the dungeon.

actors.mobs.npcs.obsir.name=ZIOM_Observe-sir
actors.mobs.npcs.obsir.message1=I don't belong to this world, but I have been thinking about the meaning of life and death
actors.mobs.npcs.obsir.message2=It's more about the drive of interests! Young man, have you not seen through the coming of the crisis?
actors.mobs.npcs.obsir.def_verb=Oh! Interesting!!!
actors.mobs.npcs.obsir.desc=A mysterious man in a black suit, with a hat of various colors on his head, and his skin doesn't look like a human at all. \nIt is said that he has some interesting things with the "profiteer". \nThis man himself does not exist in this world, but why he is here is always a mystery. \n--Death is not the end
actors.mobs.npcs.obsir.other_1=Oh, interesting, I start to imagine your adventure.
actors.mobs.npcs.obsir.other_2=Be careful on the road!!!
actors.mobs.npcs.obsir.other_3=When investigating the dungeon, don't forget your family

actors.mobs.jdsdz.name=Jungle Guard
actors.mobs.jdsdz.desc="Jungle Guard from Maple Forest. It is said that they made DM200. \n\nOccasionally, they will give the enemy a poisonous effect! \n\nThe deeper the dungeon floor, the stronger the Jungle Guard.

actors.mobs.slime_red.name=Blood Red Slime
actors.mobs.slime_red.desc=A highly intelligent creature gathered from unknown energy in the forest. It is said that it once imitated the attack habits of white mice before its birth, so it has a certain probability of causing the target to bleed.

actors.mobs.slime_orange.name=Dusk Slime
actors.mobs.slime_orange.desc=A highly intelligent creature gathered from unknown energy in the forest. It is said that it once absorbed the essence of the Flame Flower before its birth, so it has a certain probability of causing the target to burn.

actors.mobs.slime_qs.name=Green Slime
actors.mobs.slime_qs.desc=A highly intelligent creature that was gathered from unknown energy in the forest. It is said that it had absorbed the essence of earth-binding roots before it was born, so it has a certain probability of causing the target to be entangled.

actors.mobs.slime_sn.name=Azure Slime
actors.mobs.slime_sn.desc=A highly intelligent creature that was gathered from unknown energy in the forest. It is said that it was affected by evil magic before it was born, so it has a certain probability of causing the target to be degraded.


actors.mobs.slime_lt.name=Slime-Thunder Guardian
actors.mobs.slime_lt.desc=The Thunder Messenger, one of the seven guardians of Slime\nThe attack it sends has a chance to cause the invader to be paralyzed!



actors.mobs.slime_lg.name=Slime-Blue Pigeon Guardian
actors.mobs.slime_lg.desc=The Blue Pigeon Messenger among the seven guardians of Slime\nThe attacks it sends out have a chance to make the invader suffer from the _weak effect_!

actors.mobs.slime_sz.name=Slime-Saint Purple Guardian
actors.mobs.slime_sz.desc=The Saint Purple Messenger among the seven guardians of Slime\nThe attacks it sends out have a chance to make the invader suffer from the _slow effect_!

actors.mobs.slimeking.name=Slime Prince
actors.mobs.slimeking.attack_msg_1 = Trivial tricks
actors.mobs.slimeking.attack_msg_2 = Showing off one's skills before an expert
actors.mobs.slimeking.attack_msg_3 = GAMEOVER
actors.mobs.slimeking.desc=Slime Prince, the agent of the slime tribe, no one can get through it alive. You may be wondering why it exists, in fact, this is also a problem that the slime tribe needs to solve. [Design Prototype: Terraria]

actors.mobs.spical.slimekingmob.name=Slime Prince
actors.mobs.spical.slimekingmob.attack_msg_1 = Trivial tricks
actors.mobs.spical.slimekingmob.attack_msg_2 = Showing off one's skills before an expert
actors.mobs.spical.slimekingmob.attack_msg_3 = GAMEOVER
actors.mobs.spical.slimekingmob.desc=Slime Prince, the agent of the slime tribe, no one can get through it alive. You may be questioning why it exists, in fact, this is also a problem that the slime tribe needs to solve. \n\nMonster Design Prototype: Terraria

actors.mobs.slimeking.notice=Do you know who you are fighting against?
actors.mobs.slimeking.defeated=No... this is impossible...
actors.mobs.slimeking.arise=Disrespectful! I will do anything for anything
actors.mobs.slimeking.rankings_desc=Subdue the Slime Prince
actors.mobs.slimeking.scorpion=Did I tell you to leave?
actors.mobs.slimeking$hunting.cus=You are such an overconfident little devil, I will show you the absolute judgment!
actors.mobs.slimeking.fuck=Very well, I may not be able to stop you, but you will encounter something more terrifying next.

