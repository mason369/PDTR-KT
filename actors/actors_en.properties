actors.mobs.molotovhuntsman.death_msg_8 = For her...
actors.mobs.molotovhuntsman.desc = These are extremely twisted bounty hunters infected by the evil magic deep in the dungeon. They have lost their minds and only want to kill every intruder with a sword.

