actors.mobs.npcs.zero.xiayuan.name=Xiayuan
actors.mobs.npcs.zero.xiayuan.desc=A mysterious man in a cloak seems to be talking about a dungeon duel...
actors.mobs.npcs.zero.xiayuan.a_message1=New face, come and play some dungeon cards? Oh, you don't have a deck.
actors.mobs.npcs.zero.xiayuan.a_message2=No problem, I'll give you a card pack
actors.mobs.npcs.zero.xiayuan.a_message3=Hope you have a smooth journey.

actors.mobs.npcs.zero.xiayuan.b_message1=I wish you a safe journey in the dungeon. If we have a chance to meet again, I must play some dungeon cards.

actors.mobs.npcs.zero.xiayuan.b_message2=The bonfire is really warm. I haven't been back to the Windless Forest for a long time.

actors.mobs.npcs.zero.xiayuan.c_message1=Congratulations, anyone who can come back from the dungeon must be an outstanding person, come to Wufenglin when you have time.

actors.mobs.npcs.zero.dreamlezi.desc=A visitor from an unknown world...
actors.mobs.npcs.zero.dreamlezi.name=Xiao Meng
actors.mobs.npcs.zero.dreamlezi.no_gold=Forfeit 720 gold
actors.mobs.npcs.zero.dreamlezi.tr_sx=Transmute it! But this one will surely curse you! And it can only be used on tier 0!

# Gorgon
actors.mobs.gold.gorgon.name=Gorgon
actors.mobs.gold.gorgon.desc=A high-risk creature that was once exiled to hell, her originally sharp and petrifying sight has been eroded by hell to only one tenth of its power, but many demons and adventurers dare not rashly invade her.
actors.mobs.gold.gorgon.kill=You are killed by the sharp gaze...
actors.mobs.gold.gorgon$petrification.ondeath=You have been completely petrified...
actors.mobs.gold.gorgon$petrification.name=Petrification
actors.mobs.gold.gorgon$petrification.desc=You can feel your body getting heavier... if petrification reaches 100%, you will die. \n\n Current petrification level: _%d_ %%



