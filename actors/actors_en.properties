actors.mobs.shieldhuntsman.tlk=You are hit hard by the hunter's shield. You are paralyzed and can't breathe. At the same time, you can feel a ball of fire burning from your body!
actors.mobs.shieldhuntsman$focus.name=Focus
actors.mobs.shieldhuntsman$focus.desc=This hunter is completely focused on the target's every move, and seems to be able to anticipate the target's next move.\n\nA focused hunter will definitely block the next physical attack. Blocking distracts the hunter, making them need a moment to refocus in order to successfully block the attack. Hunters recover faster when moving.
actors.mobs.shieldhuntsman.parried=parried

actors.mobs.murderer.name=Devil Thief
actors.mobs.murderer.desc=Dangerous monsters wearing orange thief uniforms, they have lost the ability to steal things, and the black magic they use instead will make every adventurer go without return.
actors.mobs.murderer.bolt_kill=The shadowy energies are draining your life out...

actors.blobs.halomethanefire.desc=A ball of halomethanefire is raging here.
actors.blobs.superfire.desc=A ball of halomethanefire is raging here.
