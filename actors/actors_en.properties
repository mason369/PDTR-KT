actors.mobs.npcs.firemagicdiednpc.desc=She was once one of Yi Ling's guardians. Because of the fire incident, she was suspected by the three giants on the surface and fled to Xuelin Canyon...\n\nShe was adopted by the merchant lord at that time. Now, she is the guardian of Xuelin Canyon...
actors.mobs.npcs.firemagicdiednpc.talk_1=%s, your fighting skills really impressed me.
actors.mobs.npcs.firemagicdiednpc.talk_2=However, I hope you won't do things like robbing stores next time.
