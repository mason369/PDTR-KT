actors.mobs.molohr.desc = DM720's operator, get rid of him quickly. \n\n This is an extremely twisted bounty hunter infected by the evil magic deep in the dungeon. They have lost their minds and only want to kill every intruder with a sword. \n\n Unlike the Blood Moon Flame Bounty Hunter, he is more evasive.
actors.mobs.molohr.notice = Who are you! ?
actors.mobs.molohr.attack_lost = Blood Moon Bounty Hunter Elder: Awakened, time to hunt!

actors.mobs.ogpdzsls.name=Brown Rat
actors.mobs.ogpdzsls.desc=They will bite, but only in large numbers will they endanger life. This rat looks stronger than the ordinary ones!

