actors.mobs.bosses.dmzero.name=DMZERO
actors.mobs.bosses.dmzero.desc=DMZERO is a prototype magic machine made by the necromancer to imitate the dwarven technology with dark magic in order to seize the power of the former dwarven king. \n\nDue to the influence of the Crystal Heart, DMZERO is imprisoned in another dimension and cannot affect the timeline where the dungeon is located. \n\n{If the battle round is too long, the _Annihilation Judgment_ will be released, causing fatal damage to the player. The damage will be greatly increased after half blood. \n\nAccording to the information given by the merchant, its high-intelligence radiation waves have affected this dungeon. Seal, destroy, or repatriate. Let this place return to its original state.
actors.mobs.bosses.dmzero.notice=Unauthorized unit detected...! !
actors.mobs.bosses.dmzero.defeated=Energy load 6%...

actors.mobs.bosses.dmzero$dm300attackmode.name=DMZERO-Dark Color
actors.mobs.bosses.dmzero$dm300attackmode.desc= The dark energy inside DMZERO gradually fills up, dyeing the body dark black. \n\nDark Color is just a description of the color. \n\nIn the dark state, DMZERO will use _Corrosive Poison Mist_ to attack, and can launch shock waves to knock enemies away. \n\nIn the dark form, DMZERO will throw dark energy bombs and actively stay away from any creature. If you get too close, you may be paralyzed by the overflowing dark energy. \n\n{If the battle round is too long, _Annihilation Judgment_ will be released, causing fatal damage to the player.
actors.mobs.bosses.dmzero$dm300attackmode.notice=Unauthorized units detected...
actors.mobs.bosses.dmzero$dm300attackmode.defeated=Fuel ​​filled 66%...

actors.mobs.bosses.dmzero$dm300spidermode.name=DMZERO-Red
actors.mobs.bosses.dmzero$dm300spidermode.desc=DMZERO converts all fuel into scarlet energy to cover the body surface. The materialized scarlet energy has strong magic absorption and driving properties. \n\nRed is like blood. \n\nIn the red state, dmzero will use _Acid Erosion Mist_ to attack and can shoot spider silk to trap the enemy. \n\nIn the red state, dmzero will be completely immune to magic damage, and the damage of normal attacks will be increased. \n\n{If the battle round is too long, _Annihilation Judgment_ will be released, causing fatal damage to the player.
actors.mobs.bosses.dmzero$dm300spidermode.notice=Unauthorized units detected...
actors.mobs.bosses.dmzero$dm300spidermode.defeated=The Scarlet Cocoon is complete...

actors.mobs.bosses.dmzero$dm300deathball.name=DMZERO-Steel
actors.mobs.bosses.dmzero$dm300deathball.desc=DMZERO breaks the blood cocoon, and melts the scarlet fragments and stored dark gold into a new shell. \n\nThe steel color has a hint of dullness and a hint of red. \n\nIn the steel state, DMZERO will use _Acid Mist and Poison Mist_ attacks, and the body is completely immune to acid and poison\n\nIn the steel state, DMZERO will slowly repair damage and recover extra when passing through water. At this time, DMZERO is completely immune to magic damage and has higher accuracy. \n\nAt this time, DMZERO will continue to strengthen itself. If the battle round is too long, it will be completely out of control.
actors.mobs.bosses.dmzero$dm300deathball.notice=Unauthorized units detected...
actors.mobs.bosses.dmzero$dm300deathball.defeated=Transformation failed... System shut down

