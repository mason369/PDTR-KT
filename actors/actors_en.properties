levels.rooms.special.boilerroom$candleactivepoint.name=Candlestick
levels.rooms.special.boilerroom$candleactivepoint.desc=This candlestick seems to be useful for something..., you should try touching it...
levels.rooms.special.boilerroom$candleactivepoint.yell=The Trial Contract has been completed, He is waiting for your arrival...
levels.rooms.special.boilerroom$boilertilemap.name=Boiler
levels.rooms.special.boilerroom$boilertilemap.desc=A mysterious boiler is placed here, with a candlestick in the middle... It seems to have some use...

actors.mobs.bosses.hollow.morphs.name=Morphs
actors.mobs.bosses.hollow.morphs.desc=Unable to understand, unable to parse. An error occurred in the cognitive module and the data could not be parsed. \n\nThe true host of the castle, but also one of the indescribable Outer Gods. \n\nHe wanted to pull you to become a god, but you resolutely refused! \n\nSince you saw the face of God, you can't get out alive! Now, you must face Him directly\n\n<#772F9C>Completely invincible, but you can weaken His power by defeating nearby towers<RGB>
actors.mobs.bosses.hollow.morphs.notice=%s, that is so stupid!
actors.mobs.bosses.hollow.morphs.four_tone_active=Surrounded by demons and gods,all beings are mad ......
actors.mobs.bosses.hollow.morphs.phase_tone_active=Sinking the way to come, traversing the stars ......

actors.mobs.bosses.hollow.mycoreheart.name=Galaxy Heart
actors.mobs.bosses.hollow.mycoreheart.desc=A vast core containing the mysteries and energies of the universe. \n\n Morphs is attempting to corrupt the core for its own use, He must not be allowed to succeed!!!! \n\nFriendly units, non-heroes attacking the core immediately deal true damage to the enemy's own maximum life, and damage dealt to the Cosmic Core is fixed at 1 each time. \n\nImmune to all gases and anomalies.

actors.mobs.bosses.hollow.towergods.name=Pillars of the Gods
actors.mobs.bosses.hollow.towergods.desc=A towering stone pillar, showing the appearance of a holy cross. \nThe gods originated here, and the Zhoutian faith gathered here. \n"God, the embodiment of the will and authority of the universe." \nThe universe is speechless, only the gods can show you this sublimity. Do not hesitate about your own insignificance, follow their footsteps together. \n\nThose who come from afar, ignore this arrogant lie. \nHe thinks highly of himself, but he does not know that he is not worth mentioning in the universe. \nGo and defeat this arrogance and justify the name of the word God.

actors.mobs.bosses.hollow.towertime.name=Pillar of Time
actors.mobs.bosses.hollow.towertime.desc=A towering stone pillar, showing the appearance of distorted time. \nThe torrent of history condenses here, telling the memory of the universe. \n"Time, the constant and unchanging thing in the universe."\nThe motto is engraved on the stone pillar. \nSince the universe has memory, time has been with it. From the other end of time to here, it is still moving forward silently. \n\nPeople who come from afar, don't be fooled by appearances. \nTime has never spoken of itself, paradox is a lie of God. \nPlease clear away the falsehood for us and find the original alignment of time.

actors.mobs.bosses.hollow.towermachine.name=Mechanical Pillar
actors.mobs.bosses.hollow.towermachine.desc=A towering stone pillar, showing the appearance of a gear machine. \nIt uses the interlacing of gears to explain order, showing the huge energy of the original rhythm. \n"Machinery, a symbol of technology and order." \nA universe with only entropy is empty and chaotic, only order can point out the right path for all things in the universe. \n\nPeople who come from afar, abandon this useless thing. \nMachinery begins with human ingenuity, not gods, and order is also maintained by itself. \nCome to demolish this stolen creation and define order for yourself.

actors.mobs.bosses.hollow.towermind.name=Hollow Tower Mind
actors.mobs.bosses.hollow.towermind.desc=A towering stone pillar, showing the appearance of impermanent thoughts. \nThe light of the universe gathers here, telling the thoughts of the universe. \n"Thought, the greatest power in the universe."\nThe motto is engraved on the stone pillar. \nIn the past, matter dominated the direction of the universe. Starting from an idea, the universe has its own thoughts and will, and truly has life. \n\nPeople who come from afar, ignore this hypocrisy. \nThe gods impose their thoughts on the universe, and those who overstep their boundaries are all talking nonsense. \nPlease clear up the fallacy for us and clarify the thoughts of the universe.

actors.mobs.bosses.hollow.shubniggurath.name=ShubNiggurath
actors.mobs.bosses.hollow.shubniggurath.desc=It is the mother of all, the wife of the ineffable. It has been claimed that it gave birth to almost all of the old dominions, including Cthulhu, and indeed all life, and even all spells to repair, restore, and nurture life may be related to it. \n\nThis is one of its incarnations in this universe, but the soul is long gone, and He uses it to spread plagues and spread despair ......
actors.mobs.bosses.hollow.shubniggurath.galaxy=It seems to be calling out to the depths of the universe ......

actors.mobs.bosses.hollow.shubniggurath$diedgalaxy$bombitem.name=Stone of Order
actors.mobs.bosses.hollow.shubniggurath$diedgalaxy$bombitem.desc=The wise know that all the symbols of the world are not empty, and that what is shown here is one of them ...... This power is unnameable, ineffable, and incomprehensible to the common man; it can exist only under some veil which conceals its nature, in some poetical and bizarre story

actors.mobs.bosses.hollow.shubniggurath$diedgalaxy$bombitem.cant_pickup=You can't pick up this Stone of Order!

actors.mobs.bosses.hollow.nyarlathotep.name=Nyarlathotep
actors.mobs.bosses.hollow.nyarlathotep.desc=Transcending beyond the realms of light and darkness, right into the unquenchable void of the great void; right here in this hidden universe, sickening graveyard, from the darkened chambers beyond time, beyond imagination, came the sound of the frantic beating of a huge drum, and the subtle, monotonous, profane tones of a flute. In answer to this abominable pounding and blowing, the huge, dark gods of the Ultimate - the blind, mute, demented tomes - were dancing slowly, clumsily, absurdly. And their soul is Naiarlathotep. \n\nThis is one of its incarnations in this universe, but the soul is long gone, and He uses it to spread chaos, to spread demented stupidity ......

actors.mobs.mob.name_old=Old Sun Shadows
actors.mobs.mob.desc_old=Monsters summoned from Mephius whose forms are highly similar to those of the dungeons. However, they will prioritize targeting the Heart of the Universe for attack, so please make sure you defend it!!!!

actors.mobs.bosses.follow.yogsoul.name=Sothoth
actors.mobs.bosses.follow.yogsoul.desc=Jug Sotos knows where the gate is. For Yog-Sothoth is the door, and Yog-Sothoth is the key to the door, the gatekeeper. The past is in her, the present is in her, and the future is in her, for all things are in Jugg-Sothoth. She knows where the Old Dominion has broken through, and she knows where the Old Dominion will break through again. She knows the lands of the world that have been ravaged by Him, and she knows the lands that still bear His trampling, and she knows why no one has ever seen His face when He has trampled on the land of the afflicted. ...... Jug Sotos is the key to the door through which the countless dimensions of space are brought together. \n\nThis is one of its incarnations in this universe, but the soul is long gone, and He uses it to enforce order and pass on the rules ......

actors.mobs.bosses.hollow.towermachine$starcanon.name=Starcanon
actors.mobs.bosses.hollow.towermachine$starcanon.desc=The explosive bombs fired by the mechanical pillars seem to be able to detonate the starry sky. However, due to the long-term disrepair of the mechanical pillars, the power of the explosive bombs has been greatly reduced. Although it cannot detonate the starry sky, it is still no problem to kill a few ordinary creatures. \n\nAre you still reading the description? Run away, you fool! ! ! Otherwise, you can only wait to die here!

actors.mobs.bosses.hollow.towertime$dreamfireghost.name=DreamfireGhost
actors.mobs.bosses.hollow.towertime$dreamfireghost.desc=A ghost created by the Pillar of Time that can cause phosphorous fire damage.

actors.mobs.bosses.hollow.towermachine$deadalive.name=Dead Alive
actors.mobs.bosses.hollow.towermachine$deadalive.desc=This creature has been resurrected by the Pillar of Machine, but due to the incomplete power of the Pillar of Machine, it will soon return to the embrace of the universe.\n\nThis creature will completely disappear in %s turns.

actors.mobs.bosses.hollow.towermachine$machineattackcooleddown.name=Reloading...
actors.mobs.bosses.hollow.towermachine$machineattackcooleddown.desc=The Tower is reloading its ammunition. It cannot attack during this time.\n\nThe Tower will be fully reloaded in %s turns.

actors.mobs.bosses.hollow.towergods$attackup_palf.name=Holy Judgment
actors.mobs.bosses.hollow.towergods$attackup_palf.desc=The power granted by the Pillar of God will increase your damage by 50%.\n\nRemaining effect duration: %s turns

actors.mobs.bosses.hollow.double_towergods$attackup_palf.name=Holy Judgment
actors.mobs.bosses.hollow.double_towergods$attackup_palf.desc=The power granted by the Pillar of God will increase your damage by 100%.\n\nRemaining effect duration: %s turns

actors.mobs.bosses.hollow.towermind$mindcore.name=Mind Chaos Module
actors.mobs.bosses.hollow.towermind$mindcore.desc=Chaotic Mind, allows you to experience the chaos at the beginning of the universe.
actors.mobs.bosses.hollow.towermind$mindcore.desc_items=There is already a disarmed item on this module: _%s_.

actors.mobs.bosses.hollow.towermind.yell_steal_item=The mind is eating away at you, you feel your %s being disarmed!

actors.mobs.bosses.hollow.towerparalysis.name=Hollow Tower Paralysis
actors.mobs.bosses.hollow.towerparalysis.desc=Because other pillars have been destroyed, these pillars will be paralyzed for a period of time. During this period, the pillars will not be able to use any skills, and the damage they receive will be increased by 25%.\n\nRemaining effect duration: %s turns

custom.utils.gregorian.dwj=Activity-Dragon Boat Festival
custom.utils.gregorian.dwj_desc=During the Dragon Boat Festival, different types of _Zongzi_ will be generated in the dungeon.\nPlayers who have not completed the _Murloc_ will go there through the Troll Blacksmith.\n\nPlayers who have completed the _Murloc_ will not go there again.\n<#299947>Happy Dragon Boat Festival to everyone! Have fun! <RGB>

custom.utils.gregorian.none=Mo Ling Activity Board
custom.utils.gregorian.none_desc=There is no active session at the moment, or the network failed when you started the game.\n\nIf it is the second case, please keep the network open before starting the game to get the latest activity data.

actors.mobs.npcs.zero.whitelingland.name=Mio
actors.mobs.npcs.zero.whitelingland.desc=In your adventures, she has seen your efforts. She is now standing in the blizzard, but the wind and snow around her are unusually calm. \n\nIf you meet her, you might as well try to chat with her.
actors.mobs.npcs.zero.whitelingland.message1=Hello, %s. Welcome to Whitelingland again.
actors.mobs.npcs.zero.whitelingland.message2=My real identity? Sorry, I can't tell you right now.
actors.mobs.npcs.zero.whitelingland.message3=Why isn't there any snowstorm near me? I don't know, maybe it's just because I don't care...
actors.mobs.npcs.zero.whitelingland.message4=I found some supplies in the snow outside the hotel, maybe they can help you.......\n\nIn addition to this supply, I have more supplies here, but I need you to pay a certain fee.
actors.mobs.npcs.zero.whitelingland.a_message5=Oh, by the way, meeting is destiny, I have a necklace here, I will give it to you. Please wear it, I hope this little power can help you.
actors.mobs.npcs.zero.whitelingland.b_message5=This supply may be of help to you. I hope you like it.
actors.mobs.npcs.zero.whitelingland.message6=It's about time. See you next time, %s. Good luck...
actors.mobs.npcs.zero.whitelingland.c_message1=She has stopped talking to you and looks like she is asleep...
actors.mobs.npcs.zero.whitelingland.c_message2=Crystal particles swirled around her, as if protecting her.
actors.mobs.npcs.zero.whitelingland.c_message3=It is better not to bother her anymore.......
actors.mobs.npcs.zero.whitelingland.def_verb_1=May the world bless you...
actors.mobs.npcs.zero.whitelingland.def_verb_2=Will you be redeemed?

actors.buffs.status.ankhcount.name=Respawn Limit
actors.buffs.status.ankhcount.desc=You have been cursed by the Witch, and the Rebirth Cross in your hand has been temporarily retrieved by the Witch, and can only be regained upon death or defeat of the Witch. \n\nCurrent number of crosses: %s

actors.buffs.status.whiteblastswordstatus.name=WhiteBlast - DeadSword
actors.buffs.status.whiteblastswordstatus.desc=Deals physical damage equal to 120%% of Attack Power centered on itself and stuns all enemies around it for 8 turns, then grants all enemies around it %s layers of Poison.
