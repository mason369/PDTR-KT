actors.buffs.superfire.ondeath=You are burning to death...
actors.buffs.superfire.rankings_desc=Burn to death
actors.buffs.superfire.desc=Nothing is more painful than being engulfed in flames. \n\nAnd this is even more unpleasant than halomethanefire. \n\nRemaining burn time: %s turns

