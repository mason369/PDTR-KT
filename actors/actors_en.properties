actors.mobs.bosses.dwarfmaster.desc=Former regular army of the Dwarf Kingdom, now corrupted and assimilated by evil magic. \n\nHe still remembers the former glory of the Dwarf Kingdom, and also remembers the final demise of the Dwarf Kingdom. He obviously thinks that you are an invader, so be careful. As the former leader of the regular army of the Dwarf Kingdom, his style is often more brutal than the current Dwarf King. \n\nFailure does not mean everything, and death does not mean the end.
