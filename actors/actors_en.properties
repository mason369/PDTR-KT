actors.buffs.status.oozestatuedead.desc=Sludge is corroding your body. You should leave the <#006400>Sludge Block<RGB> as soon as possible, otherwise the consequences will be disastrous! \n\nWith the influence of the rich nutrients in the sludge, you will be corroded after _%1$s_ points of indicators, and gain _%2$s_ points of <#006400>Corroded Sludge<RGB> negative effects.
