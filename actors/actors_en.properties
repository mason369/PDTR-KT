### RLPT
actors.mobs.rlpt.gunhuntsman.name=Blood Moon Beast Hunter
actors.mobs.rlpt.gunhuntsman.desc=A half-human, half-beast bounty hunter who lost his mind in the dungeon. His shotgun fires powerful incendiary bullets.
actors.mobs.rlpt.gunhuntsman.reload_desc=The hunter is reloading. He will avoid you when reloading. \n_-_Remaining ammo for this reload: %s rounds.
actors.mobs.rlpt.gunhuntsman.reload=Reloading...
actors.mobs.rlpt.gunhuntsman.fuck=Go to hell...

actors.mobs.rlpt.drterror.name=Dr. Terror
actors.mobs.rlpt.drterror.desc=A famous doctor exiled by the three giants of the surface after a forbidden experiment. Unfortunately, after being exiled, he was trapped in a distorted timeline, and only a few people can see this doctor...\n\n Saving him or killing him is a kind of relief for him...
actors.mobs.rlpt.drterror.thanks=Thank you... I'm finally free...

actors.mobs.rlpt.drterror$bombtech.name=Self-destruction image
actors.mobs.rlpt.drterror$bombtech.desc=Dr. Terror was cursed after coming here. If you try to attack him, the curse will be activated and a cursed image will be generated. \n\n To completely save or defeat Dr. Horror, perhaps you need a stronger power to purify the curse to help this poor man or physically transcend.

### NIGHT

actors.buffs.status.nightorday.name3=Morning
actors.buffs.status.nightorday.desc3=The sun rises, and the dark night for monsters is over. At the same time, some monsters' abilities will disappear at night. \n\nMovement speed increased by 10%, physical damage increased by 10%, and damage reduction by 8%

actors.buffs.status.nightorday.name2=Noon
actors.buffs.status.nightorday.desc2=The sun is high, and you feel very warm. \n\nMovement speed increased by 10%, physical damage increased by 10%, and damage reduction by 8%

actors.buffs.status.nightorday.name=Dusk
actors.buffs.status.nightorday.desc=The sun is setting, and the moon is rising. \n\nMovement speed increased by 10%, physical damage increased by 5%, damage reduction by 4%

actors.buffs.status.nightorday.name4=Night
actors.buffs.status.nightorday.desc4=Night has fallen, and some monsters will become more powerful. \n\nNight status:\n\n1. Undead creatures can cause an additional 1/3 of the current damage to bleed\n\n2. Elemental creatures gain additional vision\n\n3. The attack speed of bosses and mini-bosses increases by 25%\n\n4. Demon creatures have a chance to gain additional shields when attacking\n\nAll of the above situations will disappear after dawn. \n\nRegular bonus: movement speed increased by 10%


