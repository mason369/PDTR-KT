actors.mobs.greenstingcv.desc=Once the king of the jungle, due to the disaster in this timeline, gradually migrated to the bottom of the dwarf capital to survive, and united with the original elemental tribe and jackal tribe to annihilate the dwarves. \n\nThe necromancer who once pretended to be the king of the dwarves has disappeared... It is said that _two dwarves_ withdrew with the remaining army to the territory where the demon once was...\n\nAnd it is honored as the king by the elements and jackals..., even the creatures in the mines are respectful to it.
