actors.buffs.halomethaneburning.name=Phosphorus Fire Haunting
actors.buffs.halomethaneburning.heromsg=Phosphorus Fire is wrapped around you like a demon!
actors.buffs.halomethaneburning.burnsup=%s is burned to ashes!
actors.buffs.halomethaneburning.ondeath=You are on deathly death due to the burning of Phosphorus...
actors.buffs.halomethaneburning.rankings_desc=There is no escape from the agony of Phosphorusburning
actors.buffs.halomethaneburning.desc=Nothing is more painful than being on deathly death. \n\nPhosphorusburning causes damage every turn until it is extinguished by liquid or dissipates on its own. Phosphorusburning goes out when you enter water, and the same applies to Phosphorusburning caused by breaking a vial. \n\nIn addition, Phosphorusburning ignites any flammable terrain (and flammable objects on flammable terrain) it comes into contact with. \n\nRemaining Burning Effect Duration: %s turns\n\n]Compared to normal fire, phosphorus fire is more dangerous and deadly]

actors.buffs.sunfire.name = Sunfire Mark
actors.buffs.sunfire.desc = This enemy is being burned by the sun, and takes increased damage from other mini-suns


actors.buffs.frostburning.name=Frostburning
actors.buffs.frostburning.heromsg=Frostburning covers you, you are freezing!
actors.buffs.frostburning.burnsup=%s is frozen to death by Frostburning!
actors.buffs.frostburning.ondeath=You are frozen to death by Frostburning...
actors.buffs.frostburning.rankings_desc=Frostburning freezes you to death...
actors.buffs.frostburning.desc=Nothing is more painful than being frostburned. \n\nFrostfire will cause damage every turn until it is extinguished by liquid or dissipates on its own, and will slow down the burner. Frostfire cannot be extinguished with water, and the same effect is applied to frostfires created by breaking a potion bottle. \n\nRemaining burning effect duration: %s turns\n\n_Compared to normal fire, frostfire is more deadly and more dangerous_

