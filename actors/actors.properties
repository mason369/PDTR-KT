actors.hero.hero.leave_more_dead=你尝试启用这个传送阵，但并没有任何效果……\n\n你需要传送介质，并且必须是本局没有进行下牢才能启动传送阵。\n\n_传送介质_在左边的商人领主处购买，这可能需要一些_特殊货币_支持，如果你的小镇还没有]商人领主]入驻，你需要去常规模式中]抢劫商店]并击败莲娜。


actors.hero.hero.acs=冒险者，你应该知道地牢的危险，所以我们封印了入口。\n这是地牢的稳定入口之一，你可以穿过眼前的结界进入圣境密林。\n如果你已下定决心，就可以继续前进了！\n当然，出发前把所需要的东西带上，因为你去了后就没法轻易回头了……

actors.hero.hero.acsx=冒险者，你应该知道下方十分混沌，我希望你准备好后再前进！\n\n一旦你击败了最深处时空混沌的中心，我会来接你回家的。\n\n另外，如果你需要前往其他时空，应该到右边那个小房间，并且需要在下方罗恩那里领取传送介质……

