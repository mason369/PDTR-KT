actors.mobs.bosses.galaxy.endyog.name=犹格·索托斯
actors.mobs.bosses.galaxy.endyog.desc=犹格·索托斯知晓大门所在。因为犹格·索托斯即是门，犹格·索托斯即是门匙，即是看门者。过去在祂，现在在祂，未来亦在祂，因为万物皆在犹格·索托斯。”
actors.mobs.bosses.galaxy.endyog.message1=看来我没猜错，你确实有触及“门”的潜质，那我就遵守约定，让你看看这枚钥匙的真正样貌好了。
actors.mobs.bosses.galaxy.endyog.message2=我会继续注视着你的。

actors.mobs.bosses.galaxy.sliverlocksword.name=银之匙
actors.mobs.bosses.galaxy.sliverlocksword.desc=你终于见到了这枚钥匙原本的样貌，这柄钥匙上覆盖着密码一般的阿拉伯藤蔓花纹，却没有任何清晰可读的解释和说明，也许那之中象征着这个客观而又漫无目的的宇宙中的目的与秘密也说不定，但你无从得知。不过你能感觉得到，这枚钥匙中蕴含着甚至可以改变世界的强大力量。\n\n这把武器附带紊乱附魔\n\n这把武器的等级上限为12\n+3时精准修正从1增加到2\n+6时攻击距离从1增加到2\n+9时命中会造成迟缓

actors.mobs.npcs.zero.yetyog.scroll=现在的你应该可以触及更深邃的智慧了，收下吧，希望对你有帮助。


actors.mobs.bosses.galaxy.sothothlasher.name=塔维尔之触
actors.mobs.bosses.galaxy.sothothlasher.desc=由塔维尔的意识支配的不明生物，外表像是触手，虽然看起来极具攻击性，但对塔维尔来说，它与宠物并无二致。


actors.mobs.npcs.extra.trueyog.name=泡泡
actors.mobs.npcs.extra.trueyog.desc=不知为何，你隐约觉得眼前的少女和地牢最深处的存在有某种微妙的关系？不过至少现在，她看起来只是一位有些神秘的少女而已。
custom.utils.plot.trueyogplot.name=泡泡
custom.utils.plot.trueyogplot.message1=哎呀，你也抵达了啊。
custom.utils.plot.trueyogplot.message2=我为何在此？我可以存在于任何时间，空间之中，不必惊讶。\n\n我的残片在此处扎根肆虐，没想到你竟能凭一己之力将其击溃，真是出乎意料。

actors.mobs.npcs.extra.trueyog.quest_start_prompt=既然事情已经告一段落，要与我一同返回吗？

actors.mobs.npcs.extra.trueyog.quest_boss_prompt=你准备好开始试炼了吗？

actors.mobs.npcs.extra.trueyog.enter_yes=是
actors.mobs.npcs.extra.trueyog.enter_no=否

actors.mobs.npcs.extra.peachgodstate.name = 白宴神像
actors.mobs.npcs.extra.peachgodstate.desc = 一个突然出现在此地的神像\n\n这座精心雕琢的神像似乎放在这里很久了，但似乎周边扬起的雪花和尘埃都无法靠近其分毫。不知为何，你感觉你见过它的原型……
actors.mobs.npcs.extra.peachgodstate.title = 祈愿
actors.mobs.npcs.extra.peachgodstate.notenough = 兜里没有多少钴币了呢……
actors.mobs.npcs.extra.peachgodstate.lucky_desc = 神像面前摆着些贡品。似乎献祭一点钴币就能获得神明的赐福，为什么不试试呢？ \n\n 你目前已经进行了%s次献祭
actors.mobs.npcs.extra.peachgodstate.you_now_have = 在你将钴币放入贡品盘内时……你发现背包里多了些东西，你获得了：
actors.mobs.npcs.extra.peachgodstate.single = 来一次(50钴币)
actors.mobs.npcs.extra.peachgodstate.ten_shots = 我要来——十次！(500钴币)
actors.mobs.npcs.extra.peachgodstate.cancel = 囊中羞涩，下次一定
actors.mobs.npcs.extra.peachgodstate.touchtop = 你发现放入其中的钴币并没有消失，看来献祭次数已经到上限了
actors.mobs.npcs.extra.peachgodstate.surplus = 你发现放入其中的钴币只消失了一部分，看来献祭次数已经到上限了
actors.mobs.npcs.extra.peachgodstate.gold=金色传说！！！
actors.mobs.npcs.extra.peachgodstate.lends=神话再现！！！
actors.mobs.npcs.extra.peachgodstate.hello=〖不寻常的温暖洋溢在这个房间中。〗
actors.mobs.npcs.smallleafharddungeon.cancelselect=神像：……

custom.utils.plot.trueyogplot.message3a=既然事情已经告一段落，要与我一同返回吗？
custom.utils.plot.trueyogplot.message4a=这样啊，你还想继续追寻更深处的隐秘吗？

actors.mobs.bosses.galaxy.sothothnpc.name=塔维尔·亚特·乌姆尔·犹格·索托斯

actors.mobs.bosses.galaxy.sothotheyedied.name=塔维尔·亚特·乌姆尔·犹格·索托斯
actors.mobs.bosses.galaxy.sothotheyedied.desc=“犹格·索托斯知晓大门所在。因为犹格·索托斯即是门，犹格·索托斯即是门匙，即是看门者。过去在祂，现在在祂，未来亦在祂，因为万物皆在犹格·索托斯。”\n祂注视着你，祂可以看穿你的一切，但祂的眼中并无恶意和杀意，有的只有一抹看不到底的深邃。毕竟如祂所说，这只是一场没有生命危险的试炼罢了，但你依然不可掉以轻心。\n紊乱的能量汇聚在祂的手心。祂全知全能，从不失手。\n祂会从造物的毁灭中提取力量，并在其消灭达到一定数量时发动巨大的时空波动，若是犹豫而未及时逃脱，片刻之间便会化为齑粉。

actors.mobs.bosses.galaxy.abyssbook.name=深渊之书
actors.mobs.bosses.galaxy.abyssbook.desc=你早就听闻死灵之书记录着一切未知之物，你也早就做好了被无尽知识反噬的觉悟，但当你翻开它的时候你发现在死灵之书中间夹着的是……一本漫画书。这时你才意识到你刚刚鏖战的神祇全程只不过是在摸鱼而已。\n\n但至少你能看懂的部分依然可以让你随心驾驭其中微乎其微的一部分力量。\n\n“那永恒长眠的并非亡者，在诡秘的万古中即便死亡本身亦会消逝。”\n\n——阿卜杜拉·阿尔哈萨德
actors.mobs.bosses.galaxy.abyssbook.book_blessed=选择你需要的祝福：XXXX

actors.mobs.bosses.galaxy.sothotheyedied.galaxy=消灭我太多的朋友可是不好的哦！
actors.mobs.bosses.galaxy.sothotheyedied.deadsling=这就是最后了，你应该不会在距离胜利一步之遥的时候倒下吧。

actors.mobs.bosses.galaxy.sothothnpc.message1=对了，还没有完整的做过自我介绍呢。
actors.mobs.bosses.galaxy.sothothnpc.message2=吾乃塔维尔·亚特·乌姆尔·犹格·索托斯，吾即万物归一者，在这时间与空间的裂痕中倾尽全力与吾抗衡吧，%s！



custom.utils.plot.trueyogplot.message3b=有趣，我能感受到你身上有一缕熟悉的波动，你是否还有余力陪我消遣片刻？
custom.utils.plot.trueyogplot.message4b=虽历经数次变化，但你手中那枚钥匙仍未取回最初的姿态，我可以让它变回原本的样貌，但同时也要考验你是否能驾驭它而不至于在无尽的智慧之中毁灭。
custom.utils.plot.trueyogplot.message5b=放心，并无性命之虞，但我也希望你做好充足的准备再来，如何？做好决定了吗？
custom.utils.plot.trueyogplot.message6b=也许有一天你会遇到能用得上这把钥匙的情况，但那时，你窥见的又会是什么样的存在呢？

actors.mobs.bosses.galaxy.sothoth.name=塔维尔·亚特·乌姆尔
actors.mobs.bosses.galaxy.sothoth.desc=“犹格·索托斯知晓大门所在。因为犹格·索托斯即是门，犹格·索托斯即是门匙，即是看门者。过去在祂，现在在祂，未来亦在祂，因为万物皆在犹格·索托斯。”\n祂注视着你，祂可以看穿你的一切，但祂的眼中并无恶意和杀意，有的只有一抹看不到底的深邃。毕竟如祂所说，这只是一场没有生命危险的试炼罢了，但你依然不可掉以轻心。\n紊乱的能量汇聚在祂的手心。祂全知全能，从不失手。\n祂会从造物的毁灭中提取力量，并在其消灭达到一定数量时发动巨大的时空波动，若是犹豫而未及时逃脱，片刻之间便会化为齑粉。
actors.mobs.bosses.galaxy.sothoth.notice=吾乃塔维尔·亚特·乌姆尔·犹格·索托斯，吾即万物归一者，在这时间与空间的裂痕中倾尽全力与吾抗衡吧，%s。
actors.mobs.bosses.galaxy.sothoth.message=慧能之光即将到来！
actors.mobs.bosses.galaxy.sothoth.defeated=真是不可思议，你比我想象中要强大许多，那我就稍微再用几分实力好了。
actors.mobs.bosses.galaxy.sothoth.dead=索托斯：真是遗憾，不过下次也有机会，做好准备再来尝试吧。

