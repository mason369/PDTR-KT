actors.mobs.npcs.zero.question.chance=是真枪实弹呢……刚刚我打偏了，轮到你了！

actors.mobs.npcs.zero.bluecj.name=小蓝
actors.mobs.npcs.zero.bluecj.desc=一位蓝发的一位小龙女，新年还换上了一套红衣服，一定是未来的龙皇吧（）
actors.mobs.npcs.zero.bluecj.a_message1=哈？你问我为什么来这？我也是需要放假的好吧！
actors.mobs.npcs.zero.bluecj.a_message2=心，脉动与活跃之准则。
actors.mobs.npcs.zero.bluecj.a_message3=bro，给小孩发个红包不用谢
actors.mobs.npcs.zero.bluecj.b_message1=冬，静默之准则
actors.mobs.npcs.zero.bluecj.b_message2=你的新衣服真帅！
actors.mobs.npcs.zero.bluecj.b_message3=好冷啊！

actors.mobs.npcs.zero.bzmdr.name=Bzmdr
actors.mobs.npcs.zero.bzmdr.desc=一位神秘的少年，穿一身黑，看起来不太好相处，他常常出现在旅馆，或许你可以和他聊一聊。
actors.mobs.npcs.zero.bzmdr.a_message1=你好，你要前往地牢吗，那祝你顺利。
actors.mobs.npcs.zero.bzmdr.b_message1=这是我找到的一些东西，这个给你。
actors.mobs.npcs.zero.bzmdr.c_message1=看来你的旅程会很顺利。
actors.mobs.npcs.zero.bzmdr.c_message2=注意保持你提灯的亮度。
actors.mobs.npcs.zero.bzmdr.c_message3=或许你可以试试某种东西。
actors.mobs.npcs.zero.bzmdr.d_message1=地牢会很凶险，加油。
actors.mobs.npcs.zero.bzmdr.d_message2=地牢已经被众多冒险家探索过了，不过他们都没回来，为什么你还要前往呢。
actors.mobs.npcs.zero.bzmdr.d_message3=看起来你非常的有信心，祝你好运。
actors.mobs.npcs.zero.bzmdr.e_message1=看来你成功了。
actors.mobs.npcs.zero.bzmdr.e_message2=有一些人会找上你，小心行事。
actors.mobs.npcs.zero.bzmdr.e_message3=你应该不会拿它干什么不好的事情吧，不过这和我没什么关系就是了。
actors.mobs.npcs.zero.bzmdr.def_verb_1=你想干什么……
actors.mobs.npcs.zero.bzmdr.def_verb_2=找不到事情做就快点踏上征途。
actors.mobs.npcs.zero.bzmdr.rankings_desc=被_Bzmdr_的即死攻击薄纱

actors.mobs.npcs.zero.bzmdrland.name=Bzmdr
actors.mobs.npcs.zero.bzmdrland.desc=鬼知道为什么他不去旅馆反而待在这里，或许可能是在等人？
actors.mobs.npcs.zero.bzmdrland.message1=你好……，你为什么不去旅馆呢。
actors.mobs.npcs.zero.bzmdrland.message2=你也要烤火吗……，……这个给你。

actors.mobs.npcs.zero.bzmdrland.message3=看起来你已经去过古堡了，干得不错，但这还远远不够。
actors.mobs.npcs.zero.bzmdrland.message4=警惕一点，深渊正注视着你，如果你有注意到因黑暗而诞生的另一面的“你”……
actors.mobs.npcs.zero.bzmdrland.message5=我有一份“礼物”给你，合理利用它，你应该能提前适应更危险的环境。
actors.mobs.npcs.zero.bzmdrland.message6=选择权在于你，祝好运。

actors.mobs.npcs.zero.bzmdrland.a_message1=你问我怎么来的这里？好奇心别这么重。
actors.mobs.npcs.zero.bzmdrland.a_message2=因为我想，所以我在这了。
actors.mobs.npcs.zero.bzmdrland.a_message3=这里有一些顺手捡的石头之类的，你想要就拿着吧。

actors.mobs.npcs.zero.bzmdrland.c_message1=看起来你回来的“交通工具”挺独特的。
actors.mobs.npcs.zero.bzmdrland.c_message2=地牢正在分崩离析，快离开吧。

actors.mobs.npcs.zero.bzmdrdungeon.name=Bzmdr
actors.mobs.npcs.zero.bzmdrdungeon.desc=???

actors.mobs.npcs.zero.bzmdrland.x_message1=很好，你的旅途只差最后一步了 去打败祂吧。
actors.mobs.npcs.zero.bzmdrland.x_message2=你问我会不会帮你？拜托，你不会想不劳而获吧。
actors.mobs.npcs.zero.bzmdrland.x_message3=好吧，拿着这个，我只会帮你这点了。



actors.mobs.npcs.zero.jit.name=寄境
actors.mobs.npcs.zero.jit.desc=这个戴着面具的怪人坐在篝火旁边仿佛在等待着什么，但是当你从他手中接过食物的时候，不由自主的联想到了食堂大妈。
actors.mobs.npcs.zero.jit.message1=又一个玩命的冒险者，拿着吧，这是我能给你的全部帮助了。
actors.mobs.npcs.zero.jit.message2=嗯？冒险者，你在寻找什么？水晶之心？那玩意可没你想的那么好。考虑过要付出什么样的代价了吗？
actors.mobs.npcs.zero.jit.message3=面具？探寻别人的隐私对你可没什么好处。
actors.mobs.npcs.zero.jit.no1=看来你是皮痒了。
actors.mobs.npcs.zero.jit.no2=又一个被水晶弄疯的。
actors.mobs.npcs.zero.jit.message4=拿着那玩意离我远点，我可不想再来一次……
actors.mobs.npcs.zero.jit.message5=我看起来可没那么平易近人，没看我拿着武器吗，离我远一点吧。

actors.mobs.npcs.zero.deepsea.name=深海
actors.mobs.npcs.zero.deepsea.desc=这是一只正在摸鱼的家伙，时常在海边出现，身上似乎有不少大饼，因为有人向旅馆老板娘投诉，大饼的香味在旅馆都能闻到。
actors.mobs.npcs.zero.deepsea.a_message1=你好？你也要去地牢玩玩吗？祝你好运~
actors.mobs.npcs.zero.deepsea.b_message1=我可没什么东西可以给你了，什么？大饼？不行的我还要吃呢，自己找去。
actors.mobs.npcs.zero.deepsea.c_message1=你是来春游的吧？杂鱼~
actors.mobs.npcs.zero.deepsea.c_message2=据说叠甲神教的某位教员因此发布了一场悬赏，奖励相当丰富，可惜我被神秘的力量阻碍在半路上没能赶上......
actors.mobs.npcs.zero.deepsea.c_message3=你想下去送死么？嗯？你有自信活下去？好......祝你好运......
actors.mobs.npcs.zero.deepsea.d_message1=杂鱼~杂鱼~你今天变化莫测的探索分能拿满嘛？
actors.mobs.npcs.zero.deepsea.e_message1=火把是不错的东西，你应该没有忘记开启些什么吧？
actors.mobs.npcs.zero.deepsea.e_message2=你好像忘记带什么了，下次记得带上，地牢很暗的。
actors.mobs.npcs.zero.deepsea.f_message1=这地方我似乎来过，咦？你是......？
actors.mobs.npcs.zero.deepsea.g_message1=那东西原来在你手上，我说我怎么没找到，可恶，算我倒霉，那你就带着它离开吧。
actors.mobs.npcs.zero.deepsea.g_message2=你在下面见到小蓝了嘛？听她说萨卡班甲鱼被人带走了......啊？怎么又是你！
actors.mobs.npcs.zero.deepsea.g_message3=希望你能保管好它，别半路被人劫去了，别看着我啊，我不会帮你的。
actors.mobs.npcs.zero.deepsea.dx_message1=这么做有什么乐趣么？
actors.mobs.npcs.zero.deepsea.dx_message2=帮帮我！萨卡班甲鱼先生！
actors.mobs.npcs.zero.deepsea.dx_message3=今天小甲鱼不在，就勉为其难的放你一马吧。
actors.mobs.npcs.zero.deepsea.dx_message4=这点力量也想伤害我？哪来的杂鱼~

actors.mobs.npcs.zero.moonlow.name=浅月深白
actors.mobs.npcs.zero.moonlow.desc=这个生物看起来只是个普通的人类小孩，但它似乎有着什么你难以理解的力量...大概吧。
actors.mobs.npcs.zero.moonlow.a_message1=你好啊，我是浅月深白，欢迎你来到雪景小镇。来到这里有着无限可能的地方。

actors.mobs.npcs.zero.moonlow.b_message1=过去一年，我们前往了矮人将军的议事厅，也前往了神秘的古堡……
actors.mobs.npcs.zero.moonlow.b_message2=已离去的，已获得的，你所期待的，究竟是什么？
actors.mobs.npcs.zero.moonlow.b_message3=虽然我不明白你们在开心什么，不过只要没人把我变成绵羊，那我就也很开心。
actors.mobs.npcs.zero.moonlow.b_message4=嘛，算了。希望这祥和的气氛能带给你最温暖的祝福。拿着这药水吧，应该能帮到你。

actors.mobs.npcs.zero.moonlow.not=我可以再祝福你几句，但我已经没别的东西给你了。

actors.mobs.npcs.zero.moonlow.c_message1=旅途愉快~~
actors.mobs.npcs.zero.moonlow.c_message2=我能感受到...有什么东西改变了...
actors.mobs.npcs.zero.moonlow.c_message3=活着回来，祝你好运。
actors.mobs.npcs.zero.moonlow.f_message1=我们看到过无数像你一样的冒险者，他们来到，他们离去，他们再也没有回来过。\n\n但我能感觉到...你和他们有一点不一样，但我说不上来..也许你会有希望？加油吧。


actors.mobs.npcs.zero.moonlow.g_message1=欢迎回来~
actors.mobs.npcs.zero.moonlow.g_message2=我原本想为你提供一些奖励的，但我估计你现在也用不上了。
actors.mobs.npcs.zero.moonlow.g_message3=接下来...你会去做什么呢？你的旅途还没有结束，但你已经拥有了超乎常人的力量，我很好奇你会用这份力量做什么...
actors.mobs.npcs.zero.moonlow.g_message4=我们会注视着你的，孩子。
actors.mobs.npcs.zero.moonlow.g_message5=*文本丢失

actors.mobs.npcs.zero.moonlow.dx_message1=你真的对这种事很热衷呢小可爱~
#actors.mobs.npcs.zero.moonlow.dx_message2=我并不反对你为我挠下痒，但你差不多该踏上征途了吧~
actors.mobs.npcs.zero.moonlow.dx_message3=真是杂鱼~（小声

