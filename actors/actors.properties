custom.seedfinder.seedalrlogscene.initial_value=请删除这一行，并输入任意字符分析它的种子
custom.seedfinder.seedalrlogscene.clear=以种子查找物品

custom.gift.you_now_have = 你获得了: %s x %d。
custom.gift.buff = 你激活了Buff: %s 。
custom.gift.giftbuff.god = 无可匹敌的力量

###Gold Mobs

actors.mobs.gold.goldmob.infos=_金蝶模式特殊怪物，需要小心应对。_

actors.mobs.gold.giantworm.name=巨型蠕虫
actors.mobs.gold.giantworm.desc=丛林的污染愈发严重，这些蠕虫变得如此巨大，它们的攻击有概率撕碎敌人的伤口，并恢复一定的血量。

actors.mobs.gold.mayfly.name=蜉蝣
actors.mobs.gold.mayfly.desc=这些游行生物会慷慨的为其他目标施以治疗，不死不休。\n\n蜉蝣会对周围的友军施加微弱的治疗效果。

actors.mobs.gold.prisoner.name=囚犯
actors.mobs.gold.prisoner.desc=地下监狱的主要服务对象，在秩序失控后这些大块头得以暂时从牢房中解脱，不过还是难逃与狱警们互相对抗的宿命，尽管他们都不像原来一样那么理智了。\n\n囚犯还记得监狱里的警察们，如果他们碰巧一同在场，则他的目标暂时不会指向你。
actors.mobs.gold.prisoner.kill=你被囚犯痛殴…

actors.mobs.gold.drake.name=地底亚龙
actors.mobs.gold.drake.desc=龙与类蜥蜴型生物结合而生出的亚龙种，喜欢埋在地底睡觉，但起床气不小。\n\n你的任何攻击手段都没法伸到土里。
actors.mobs.gold.drake.kill=地底亚龙杀害了你…
actors.mobs.gold.drake.rock_punk_kill=地底亚龙钻地拱出的土石杀害了你…
actors.mobs.gold.drake.reveal=你触怒了这条亚龙，赶快逃开！
actors.mobs.gold.drake.get_close=当靠近此地时，你发觉脚下的地板有些松动，还是不要接近那个裂缝比较好
actors.mobs.gold.drake.shock= %s 被地底亚龙的钻地击退了！
actors.mobs.gold.drake.revealing=你能感觉到什么东西要来了......

actors.mobs.gold.artillerist.name=矮人炮手
actors.mobs.gold.artillerist.desc=矮人军队中的另类，他们更擅长鼓捣火药而非去空手御敌和释放法术，幸运的是威力不俗，准头也尚可。\n\n小心他们的重炮！\n\n会操纵便携迫击炮来对以你为中心的位置施行炮击。
actors.mobs.gold.artillerist.kill=你被矮人炮手杀害…
actors.mobs.gold.artillerist.bomb_party_kill=你被炮火轰飞…

actors.mobs.gold.gnolltwilight.name=暮光豺狼
actors.mobs.gold.gnolltwilight.desc=无论你怎么看，这个怪物都不像豺狼。它的眼睛闪烁着令人毛骨悚然的蓝色，皮肤苍白，在地牢的阴影中微微闪烁。它的挎包里有一大堆飞镖，上面装有不同的毒药。这些毒药不会对人体造成伤害，但一定会让你生不如死...

actors.mobs.gold.boomskull.name=亡魂残躯
actors.mobs.gold.boomskull.desc=亡魂残躯是从那些悲惨的冒险者及地牢原住民尸骨的聚合物产生的，来自下层地牢的邪恶力量将它们从死亡中唤起。它们十分脆弱，因此通常使用自爆袭击入侵者。\n\n它们由于是恶灵转变而成，因此任何生物都不可能在它面前蛰伏。


actors.mobs.gold.royalguard.name=国王卫兵
actors.mobs.gold.royalguard.desc=矮人国王的最精锐卫队，他们配备着国库中各式各样的武器，只对矮人王国唯一的国王誓死效力。
actors.mobs.gold.royalguard.equipment=你能看到他们手中拿着 _%s_  ，还是小心为上。
actors.mobs.gold.royalguard.kill=你被持有 %s 的卫兵屠戮…

actors.mobs.gold.gnollblind.name=老年豺狼
actors.mobs.gold.gnollblind.desc=豺狼是鬣狗状的类人生物。它们在丛林和地牢游荡，不时向上行动试图向地表发起进攻。有些豺狼因为丛林的感染或过于年老而视力下降，这意味着要偷袭或伏击它们非常容易。

actors.mobs.gold.goblinshaman.name=哥布林祭司
actors.mobs.gold.goblinshaman$shamanshield.desc=祭司通常被认为是哥布林中最强大的个体......但哥布林却不是。由于魔法在地牢中很常见，很多哥布林都开始利用魔法。这个哥布林的魔法可以增加附近盟友的防御力。
actors.mobs.gold.goblinshaman$shamanstrength.desc=祭司通常被认为是哥布林中最强大的个体......但哥布林却不是。由于魔法在地牢中很常见，很多哥布林都开始利用魔法。这个哥布林的魔法可以增强附近盟友的力量，使他们的攻击更加致命。
actors.mobs.gold.goblinshaman$shamanregen.desc=祭司通常被认为是哥布林中最强大的个体......但哥布林却不是。由于魔法在地牢中很常见，很多哥布林都开始利用魔法。这个哥布林的魔法能治愈附近的盟友。
actors.mobs.gold.goblinshaman$shamanfake.desc=祭司通常被认为是哥布林中最强大的个体......但哥布林却不是。由于魔法在地牢中很常见，很多哥布林都开始利用魔法。这只哥布林的魔法并非真正的魔法，他似乎是在模仿 "魔音"，以显示自己的聪明。也就是它在滥竽充数，除此之外毫无用处。

actors.mobs.gold.hermitcrab.name=寄居蟹
actors.mobs.gold.hermitcrab.desc=螃蟹找到了一个巨大的壳来生存。这些螃蟹比普通的螃蟹要坚硬得多，它们的外壳可以保护它们免受打击，甚至可以让螃蟹免疫最微弱的攻击。但一旦外壳被打破，螃蟹的防御力就会降到 0，让你可以轻松地杀死它。
actors.mobs.gold.hermitcrabnoshell.name=寄居蟹
actors.mobs.gold.hermitcrabnoshell.desc=一只完全没有防卫能力的寄居蟹，它的壳被打破了。任何寄居蟹都会在壳破裂发生后的短时间内体验到最原始的恐惧。

actors.mobs.gold.demonlord.name=恶魔领主
actors.mobs.gold.demonlord.desc=古神的高级奴仆，它们统领着古神之下的一切恶魔。面对恶魔领主的时候不纯粹即是危险，但是没有任何冒险者能就这样直面古神，说明这是个两难的难题。
actors.mobs.gold.demonlord.kill=恶魔领主轻易的杀死了你…
actors.mobs.gold.demonlord.damage_boost=当前恶魔领主伤害增幅 _%d_ %%。

actors.mobs.gold.gnollthrower.name=豺狼前哨兵
actors.mobs.gold.gnollthrower.desc=豺狼是鬣狗状的类人生物。它们在丛林和地牢游荡，不时向上行动试图向地表发起进攻。豺狼前哨兵是更加敏捷的豺狼，他们可以使用石头从远处攻击，通常在豺狼族群中扮演守卫的角色。

actors.mobs.gold.tribemanold.name=豺狼悍匪
actors.mobs.gold.tribemanold.desc=寒冷的地带正是它们锻炼的好地方，据说它们手中的武器就是关刀的设计原形，切记小心！

actors.mobs.npcs.extra.pinkfox.name=夏渔雾溟
actors.mobs.npcs.extra.pinkfox.desc=一位幻化为人型的九尾狐狸，据说掌握金蝶的魔法，可以提供金蝶法阵为你提供嬗变法则。

actors.mobs.npcs.extra.pinkfox.message1=你好，我是夏渔雾溟。看起来你手里有一个金蝶秘卷，这是她的东西，但不知道为什么现在在你这里……\n\n另外，此次冒险危机四伏，我将立刻给予你三个0级饰品。
actors.mobs.npcs.extra.pinkfox.message2=并且，你似乎被她选中了，她正在看着你是否能趟过这次试炼之路……
actors.mobs.npcs.extra.pinkfox.message3=我会根据你的路程评估你的_金蝶嬗变次数_，初始送你两次，你每击败一个强大的敌人获得一次金蝶嬗变机会……，你可以根据你的状态栏查阅你的嬗变次数以及任务板状态！
actors.mobs.npcs.extra.pinkfox.message4=你在之后还会多次见到我，但是我后面不会在入口迎接你，无论如何，祝你一路顺利！

actors.mobs.npcs.extra.pinkfox.message5=很抱歉你现在没有任何嬗变次数，我也是和她履行了契约了的，私自违约她可能会很不高兴！\n\n请你完成任务板上的任务后获得更多嬗变次数再来找我！

actors.buffs.status.questgold.name=金蝶委托任务板
