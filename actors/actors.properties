### RLPT
actors.mobs.rlpt.gunhuntsman.name=血月兽型猎人
actors.mobs.rlpt.gunhuntsman.desc=半人半兽的残暴生物。手中持有一把猎枪，可以发射出极具威力的燃烧弹，如果命中敌人将会造成燃烧效果。\n\n他曾是一名正常的赏金猎人。地牢中的恐怖之物将他侵蚀，在意识溃散殆尽后，这里只剩仅存癫狂的人形野兽。
actors.mobs.rlpt.gunhuntsman.reload_desc=猎人正在重新装弹,在装弹时他会避开你。\n_-_本次装弹剩余：%s回合.
actors.mobs.rlpt.gunhuntsman.reload=重新装弹中……
actors.mobs.rlpt.gunhuntsman.fuck=你TM的见鬼去吧……

actors.mobs.rlpt.drterror.name=恐怖博士
actors.mobs.rlpt.drterror.desc=这位可怜人曾经是一位赫赫有名的博士，因为一次禁忌实验，他被地表三巨头流放到了这里。而很不幸的是，他被流放后被困在了一个扭曲的时间线，只有极少数人才能看见这位博士……\n\n拯救他或是杀死他，对他而言都是一种解脱吧……
actors.mobs.rlpt.drterror.thanks=谢谢你……我终于得到解脱了……

actors.mobs.rlpt.drterror$bombtech.name=自爆意象体
actors.mobs.rlpt.drterror$bombtech.desc=恐怖博士来到这里后遭到了恐怖的诅咒，如果你尝试去攻击他，诅咒就会被启动，产生一个诅咒意象体。\n\n要想彻底拯救或者击败恐怖博士，或许你需要更强的净化诅咒的力量才能帮助这位可怜人亦或者是物 理 超 度 。

### NIGHT

actors.buffs.status.nightorday.name3=早晨
actors.buffs.status.nightorday.desc3=太阳升起，属于怪物的黑夜已经过去。同时夜晚部分怪物的能力将消失。\n\n英雄移速提升10%，物理伤害提升10%，伤害减免8%

actors.buffs.status.nightorday.name2=正午
actors.buffs.status.nightorday.desc2=太阳高挂，你感觉非常暖和。\n\n英雄移速提升10%，物理伤害提升10%，伤害减免8%

actors.buffs.status.nightorday.name=黄昏
actors.buffs.status.nightorday.desc=太阳渐渐西沉，月亮正在渐渐升起。\n\n英雄移速提升10%，物理伤害提升5%，伤害减免4%

actors.buffs.status.nightorday.name4=夜晚
actors.buffs.status.nightorday.desc4=夜幕已然降临，部分怪物将会变得更加强大。\n\n夜晚怪物增益说明:\n\n_-_ 亡灵生物可以额外造成本次伤害1/3的流血或中毒\n_-_ 头目和小头目攻速提高25%\n_-_ 恶魔生物在攻击时如自身没有护盾，则有概率获得额外护盾\n\n夜晚英雄增益说明：\n\n_-_ 移速提升10%\n\n以上所有情况在天亮后均会变化或消失。


### OOzeStateDead
actors.buffs.status.oozestatuedead.name=污泥浸染
actors.buffs.status.oozestatuedead.desc=污泥正在侵蚀你的身体，你应当尽快脱离<#006400>污泥地块<RGB>，否则后果不堪设想！\n\n以现在污泥内部富营养的影响，你在_%1$s_点指标后将会遭到腐蚀，获得_%2$s_点<#006400>腐蚀淤泥<RGB>负面效果。
actors.buffs.status.oozestatuedead.desc_level=当前<#6495ED>侵蚀指标<RGB>：%s。
actors.buffs.status.oozestatuedead.desc_interval=当前<#006400>淤泥效果<RGB>强度：%s。


###PETS

actors.mobs.pets.minisaka.name=萨卡班甲鱼宝宝
actors.mobs.pets.minisaka.desc=在那次远古遗迹决战中，它已经耗尽了所有力量。现在它重获了新生，但它已经忘记了一切。\n它第一眼见到的是你，它一定把你认成它的主人了。\n也好，这样，没有人再知道远古遗迹，也没有人知道曾经的海洋王者。\n\n它向往海洋，你一定能带它出去。\n\n_这个宠物是一个观赏性宠物，敌人不会攻击它，它也不会攻击敌人，但可以妨碍敌人视线，并且它将一直追踪你的路线。_

actors.mobs.pets.smalllight.name=微光向导
actors.mobs.pets.smalllight.desc=与玩家共享视野，生成后会自动寻找并前往离出口最近的路径，遇到怪物挡路会将怪物牵拉至身后并使它陷入沉睡，到达出口后死亡并点亮出口房间的视野。

###HOLLOW
actors.mobs.bosses.morphs.unknown=???
actors.mobs.bosses.morphs.name=墨菲厄斯
actors.mobs.bosses.morphs.desc=游离于世界之外的未知实体,不属于这里的存在。在它面前任何攻击都会被无效化，它究竟是谁？\n\n演出即将开始，你能完成这场盛大的演出吗？

actors.mobs.npcs.hollow.deathrong.name=卡戎
actors.mobs.npcs.hollow.deathrong.desc=若要踏入地狱之大门，冥河便是你最后的阻碍。\n\n她在这里守护着一切，你只需要付出一些身外之物，她就能保你安全渡过冥河。

actors.mobs.npcs.hollow.deathrongshop.name=卡戎
actors.mobs.npcs.hollow.deathrongshop.desc=她发现冥河的生意越来越难做，所以现在在万圣大厅开起了商店，不久她就赚的盆满钵满。
actors.mobs.npcs.hollow.deathrongshop.talk=交谈
actors.mobs.npcs.hollow.deathrongshop.buyback=卡戎小姐很爽快的退还了相应的商品。
actors.mobs.npcs.hollow.deathrongshop.talk_prison_intro=你好啊，欢迎来到我的商店。
actors.mobs.npcs.hollow.deathrongshop.talk_prison_warrior=你知道吗，这里的万圣大殿其实不太真实……嘛，你当我说笑也行哦。
actors.mobs.npcs.hollow.deathrongshop.talk_prison_mage=你也是法师吗？希望你最后不要堕落为魔女，大殿里面那些魔女就是最好的例子……
actors.mobs.npcs.hollow.deathrongshop.talk_prison_rogue=我曾经见过你，小姐，只不过，你当时没见过我。没想到你已经长这么大了，希望你还能知道你此行的目的。
actors.mobs.npcs.hollow.deathrongshop.talk_prison_huntress=小姐你好，你的身上有一种精灵的血脉……你莫非是祂的后代？或者是我多虑了……
actors.mobs.npcs.hollow.deathrongshop.talk_prison_duelist=小姐，你好！你似乎不属于这个世界，你是访问者之一吗？

levels.rooms.standard.bigeyeroom.name=三思而后行
levels.rooms.standard.bigeyeroom.start_prompt=注意，这是一个特殊房间，并且你着实要进入此房间请确保有至少一把铁钥匙。否则请不要进入！
levels.rooms.standard.bigeyeroom.enter_yes=是的，我确定了
levels.rooms.standard.bigeyeroom.enter_no=不，我改变主意了

actors.mobs.npcs.hollow.typhon.name=提丰
actors.mobs.npcs.hollow.typhon.desc=万妖之母，就连卡戎也惧怕三分。她来到这里一定是有事情告诉你……
actors.mobs.npcs.hollow.typhon.rankings_desc=古堡征服者
actors.mobs.npcs.hollow.typhon.now_letgo=提丰一言不发……

custom.utils.plot.typhonplot.message1=你好，%s。
custom.utils.plot.typhonplot.message2=谢谢你帮我处理麻烦，这孩子不知道为什么突然烦躁了起来，刚刚遇到了点急事，只能让你独自解决了。
custom.utils.plot.typhonplot.message3=说起来好久没在这见到生者了，不过很可惜，今天冥土不开放拜访，请回吧。
custom.utils.plot.typhonplot.message4=那么，我刚刚的事情还没处理完，有缘再会吧。
custom.utils.plot.typhonplot.message5=等等，那这座古堡......
custom.utils.plot.typhonplot.message6=这座古堡?哼，我现在就在调查这个，如果不出意外的话，这鬼地方就是墨菲厄斯—
custom.utils.plot.typhonplot.message7=嗨呀，堂堂万妖之母，竟有心思管这等闲事......
custom.utils.plot.typhonplot.message8=墨菲厄斯，你还胆敢过来？
custom.utils.plot.typhonplot.message9=有何不敢?提丰大人啊，我可不是来找麻烦的。
custom.utils.plot.typhonplot.message10=你已经把北边的省份搅的一团遭了，众神难道还没让你吸取教训？
custom.utils.plot.typhonplot.message11=不不不，我回来只是想邀请我的一些老朋友——包括您，来欣赏我们安排的几场戏剧。
custom.utils.plot.typhonplot.message12=你在胡说八道什么？
custom.utils.plot.typhonplot.message13=我可没胡说八道，来，这是您的邀请函。时间和地点，您看邀请函上就知道了。还有您，重创了刻耳柏洛斯的勇士，这是您的一份。
custom.utils.plot.typhonplot.message14=我还要安排戏剧，就先走一步啦，哈哈哈哈哈!
custom.utils.plot.typhonplot.message15=真是个奇怪的人。
custom.utils.plot.typhonplot.message16=那么，冒险者，后会有期了。

custom.utils.plot.hollow.hollowcityplot.name=奇怪的声音
custom.utils.plot.hollow.hollowcityplot.message1=在血月的照耀下，曾经放在圣殿的水晶之心发生了奇特的变化。
custom.utils.plot.hollow.hollowcityplot.message2=圣殿变成了诡异古怪的古代城堡入口，而水晶之心也不翼而飞，一股不祥和邪恶的气息从古堡入口中散发出来。
custom.utils.plot.hollow.hollowcityplot.message3=看来你被选中了，继续前进吧，我们在古堡的尽头等待你！
custom.utils.plot.hollow.hollowcityplot.message4=水晶之心似乎不在这里，只有继续选择前进了！但这里并没有那么太平，切记万分小心！！！

actors.mobs.npcs.hollow.deathrong.message1=哈啊~又得上班了......
actors.mobs.npcs.hollow.deathrong.message2=咦?竟然是活人?
actors.mobs.npcs.hollow.deathrong.message3=没想到来这值班还能碰见生者......
actors.mobs.npcs.hollow.deathrong.message4=你是来探亲的，还是来寻仇的?\n\n【此为分支选项，必须做出抉择！】

actors.mobs.npcs.hollow.deathrong.choice1=我是冒险家

actors.mobs.npcs.hollow.deathrong.message5=调查?
actors.mobs.npcs.hollow.deathrong.message6=有点意思，不过我可不知道用这个理由门卫会不会让你过去。
actors.mobs.npcs.hollow.deathrong.message7=上船吧，今天心情好，渡一次河就收 666万金币吧，哼哼。

actors.mobs.npcs.hollow.deathrong.message8=是否支付 6660000 金币?

actors.mobs.npcs.hollow.deathrong.button2a=是
actors.mobs.npcs.hollow.deathrong.button2b=否

actors.mobs.npcs.hollow.deathrong.message9a_1=好啦......
actors.mobs.npcs.hollow.deathrong.message9a_2=等等，你真的带了666万金币?
actors.mobs.npcs.hollow.deathrong.message9a_3=你......
actors.mobs.npcs.hollow.deathrong.message9a_4=不不不，没什么，我这就带你过去。
actors.mobs.npcs.hollow.deathrong.message9a_5=示意之后，你带着巨量金币走上了卡戎的船。
actors.mobs.npcs.hollow.deathrong.message9a_6=卡戎的船本来只是为了运送死者而设计的，而现在，它承受了相当于设计载重的数倍的重量。
actors.mobs.npcs.hollow.deathrong.message9a_7=行进到河中央时，卡戎越来越感觉力不从心，终于，整个船突然翻了过来。
actors.mobs.npcs.hollow.deathrong.message9a_8=卡戎抓住了船，而你，正和袋子与散落的金币一起下沉。
actors.mobs.npcs.hollow.deathrong.message9a_9=在这河水的下面，是地狱，还是只是个普通的河床?
actors.mobs.npcs.hollow.deathrong.message9a_10=你最后也没有知道。不过能够确定的是，这里的水仍然冰冷刺骨。
actors.mobs.npcs.hollow.deathrong.message9a_11=_游戏结束 - 沉入阿刻戎河_

actors.mobs.npcs.hollow.deathrong.message9b_1=好啦好啦，我就开个玩笑，真的已经好久没见到活人了。
actors.mobs.npcs.hollow.deathrong.message9b_2=上来吧，这次就不收你钱了。
actors.mobs.npcs.hollow.deathrong.message9b_3=反正平时接死人也不给钱，切。

custom.utils.plot.boatplot_end.message1=唉，我听门那边好像挺热闹的，和那个臭骷髅法师打起来啦？
custom.utils.plot.boatplot_end.message2=向卡戎讲述刚刚发生的事。
custom.utils.plot.boatplot_end.message3=你是说，你打败了刻耳柏洛斯，还见到了提丰和墨菲厄斯？
custom.utils.plot.boatplot_end.message4=戏剧......什么戏剧？我从来没听说过......
custom.utils.plot.boatplot_end.message5=关于冥土外的古堡，你知道些什么吗？
custom.utils.plot.boatplot_end.message6=我不知道唉，我们摆渡人在冥土里面有休息站，一般不会走到外面。
custom.utils.plot.boatplot_end.message7=但是你说外面连到了一座古堡？不应该啊......
custom.utils.plot.boatplot_end.message8=好吧，我也不想掺和这些事，他给你的邀请函你先拿回去吧……
custom.utils.plot.boatplot_end.message9=我还有事，先走了。祝你好运，%s。期待和你的下次见面！

actors.buffs.trueinvisibiity.name=让我们出发吧！！！
actors.mobs.npcs.hollow.zeroboat.name=冥河摆渡船
actors.mobs.npcs.hollow.zeroboat.desc=乘上灵魂摆渡船，跨过冥河与人间的交界处，忘却一切吧……

actors.mobs.bosses.morphs.message1=%s,你好。欢迎来到我的宅邸，我就是这里的主人。
actors.mobs.bosses.morphs.message2=你与祂的战斗非常精彩，我表示非常的敬佩。然而，要想在这暗涛汹涌的世界中生存下来，光靠这样是远远不够的。
actors.mobs.bosses.morphs.message3=你击败的古神不过是祂万万分之一的碎片，在无法用时间衡量的虚空之中，这个碎片背叛了祂，来到这里制造灾祸。
actors.mobs.bosses.morphs.message4=阁下想知道我是谁？不用担心，我为阁下准备了一场别开生面的旅行。这座古堡就是我对你的考验。
actors.mobs.bosses.morphs.message5=……………………
actors.mobs.bosses.morphs.message6=我很期待你的表现，不要让我们失望，希望你能完成这场盛大的演出……现在，就将时间交给你了……
actors.mobs.bosses.morphs.message7=%s，这不是……死亡是……真实的…… 请你一定要……
actors.mobs.bosses.morphs.message8=不要掉入他的圈套……

levels.hollow.cerdogbosslevel$yellowstar.name=黄昏结晶
levels.hollow.cerdogbosslevel$yellowstar.desc=这枚结晶散发着安宁却诡谲的光芒，它现在正在等待入侵者的到来……\n\n如果你未激活检查点，点击手动激活Boss检查点。

actors.mobs.bosses.cerberus.name=刻耳柏洛斯
actors.mobs.bosses.cerberus.desc=刻耳柏洛斯，隶属于冥界的守门恶犬。它凝视周围，目光充满恶意和威胁。\n它身边的环境异常寂静，毫无生机。刻耳柏洛斯是死亡和绝望的代表，具有无比的威力，堪称死亡的化身。
actors.mobs.bosses.cerberus.notice=死亡终将来到每一个人身边，而你，是下一个！
actors.mobs.bosses.cerberus.dreamdied=噩梦终究会寻找到你的身上……
actors.mobs.bosses.cerberus.charging=将你的灵魂精华献祭给我！
actors.mobs.bosses.cerberus.firewall=感受一下恶灵火墙的热情！
actors.mobs.bosses.cerberus$rage.name=地狱归来
actors.mobs.bosses.cerberus$rage.desc=刻耳柏洛斯的死亡已经不可避免，但它想拉你作为陪葬品！\n\n时间的推移或是外界的伤害都会消磨护盾。在护盾消散殆尽之际，刻耳柏洛斯会彻底消亡。\n\n剩余的护盾：%d。
actors.mobs.bosses.cerberus.firewall_last5=恶灵火墙还有5回合将再次重燃。
actors.mobs.bosses.cerberus$notbrokenwall.desc=恶灵火墙存在期间，任何东西都无法逃离它的魔爪。在被恶灵火墙抓到后，将会被送往中心区域。
actors.mobs.bosses.cerberus$souldiedblobs.desc=灵魂汲取领域将对目标造成心魔损伤……，并且有概率给施法者添加奥术护盾。\n\n如果目标是偷渡过来的，则额外追加施法者相等体量的秘法护盾。
actors.mobs.bosses.cerberus$webblob.desc=噩梦缠绕将会在短暂延迟后缠绕所有范围内的目标并造成真实伤害……
actors.mobs.bosses.cerberus.your_must_died=死亡……再生……毁灭……
actors.mobs.bosses.cerberus.defeated=%s,我记住你了……
actors.mobs.bosses.cerberus$dogguard.scorpion=哼？想逃？
actors.mobs.bosses.cerberus$dogguard.name=死魂守卫
actors.mobs.bosses.cerberus$dogguard.desc=刻耳柏洛斯的状态已经非常不健康，这促使它召唤一个死魂守卫来助战。\n\n守卫存在期间，每15回合自动抓取目标。

actors.mobs.bosses.hollow.deaddogcerberus.name=刻耳柏洛斯
actors.mobs.bosses.hollow.deaddogcerberus.desc=刻耳柏洛斯，隶属于冥界的守门恶犬。它凝视周围，目光充满恶意和威胁。\n它身边的环境异常寂静，毫无生机。刻耳柏洛斯是死亡和绝望的代表，具有无比的威力，堪称死亡的化身。
actors.mobs.bosses.hollow.deaddogcerberus.notice=死亡终将来到每一个人身边，而你，是下一个！
actors.mobs.bosses.hollow.deaddogcerberus.dog_skills_one=刻耳柏洛斯正在打磨它的爪子！
actors.mobs.bosses.hollow.deaddogcerberus.combo_attack_hit=尝尝连环嘶咬的威力……

actors.mobs.bosses.hollow.deaddogcerberus$noarmordamage_bleedingnomalattack.name=磨牙吮血
actors.mobs.bosses.hollow.deaddogcerberus$noarmordamage_bleedingnomalattack.desc=刻耳柏洛斯在此状态下，无视目标_50%%防御_，且每次攻击都会造成<#f00>自身伤害的25%%的流血效果<RGB>。\n\n剩余效果时长：%s。
actors.mobs.bosses.hollow.deaddogcerberus.dog_see_you=看来你已经准备好接受死亡了……，%s！
actors.mobs.bosses.hollow.deaddogcerberus$deadhalofire.desc=在狱火中，目标将持续受到<#f00>真实伤害<RGB>。如果是目标是刻耳柏洛斯，则会受到_强力加成_。

actors.mobs.bosses.hollow.deaddogcerberus$souldead.name=灵魂震慑
actors.mobs.bosses.hollow.deaddogcerberus$souldead.desc=你的灵魂已经被吸入地狱，接下来，它的每次攻击将会对目标造成<#f00>额外5点心魔损伤<RGB>……\n\n被灵魂震慑的你，感到<#f00>脚步非常沉重<RGB>……

actors.mobs.bosses.hollow.deaddogcerberus$superattack.name=殊死一搏
actors.mobs.bosses.hollow.deaddogcerberus$superattack.desc=看起来刻耳柏洛斯想对你发起全面攻击，它将获得_200%%攻击力加成_和_100%%攻速加成_\n\n剩余效果时长：%s。

actors.mobs.bosses.hollow.deaddogcerberus$cerberusbless.name=狩猎准备
actors.mobs.bosses.hollow.deaddogcerberus$cerberusbless.desc=刻耳柏洛斯已经磨好了它的爪子，现在在此效果结束前，它将无视目标<#FF0>50%%防御<RGB>和额外获得<#FF0>50%%额外精准<RGB>。\n\n剩余效果时长：%s。

actors.mobs.bosses.hollow.firesuperdr.name=磷火再生
actors.mobs.bosses.hollow.firesuperdr.desc=刻耳柏洛斯来自地狱，因此在自己的<#0ff>特殊磷火<RGB>中不会受到伤害，并且<#F00>防御大幅提升<RGB>以及每回合缓慢<#0F0>恢复生命<RGB>。\n\n重要提醒：再生的生命值也不会让<#F00>刻耳柏洛斯的阶段回退<RGB>，因此如果在后续阶段刻耳柏洛斯恢复了更多生命值，则它将<#F00>更加具有威胁！<RGB>\n\n剩余效果时长：%s。

actors.mobs.bosses.hollow.deaddogcerberus.leap=刻耳柏洛斯正在准备扑向你……

actors.mobs.bosses.hollow.bleedcrystal.name=凝血晶体
actors.mobs.bosses.hollow.bleedcrystal.desc=刻耳柏洛斯攻击目标时将目标血液提取出来成为血晶，如果不尽快摧毁，将会带来严重的后果……

actors.mobs.bosses.hollow.deaddogcerberus$bleedingsummoncoolown.name=凝血晶体召唤阻断
actors.mobs.bosses.hollow.deaddogcerberus$bleedingsummoncoolown.desc=刻耳柏洛斯已经召唤了一个<#F00>凝血晶体<RGB>，如果在效果结束后<#F00>凝血晶体<RGB>仍然存在，则刻耳柏洛斯会将其吸收并变得更强，将会对目标造成<#F00>更高的伤害<RGB>。\n\n剩余效果时长：%s。


custom.utils.plot.hollow.hollowendstoryplot.message1=呃啊，冒险家，你果然身手不凡。
custom.utils.plot.hollow.hollowendstoryplot.message2=但是，与我作对并不会给你带来任何好处，我劝你还是......
custom.utils.plot.hollow.hollowendstoryplot.message3=墨菲厄斯，别做梦了。
custom.utils.plot.hollow.hollowendstoryplot.message4=幽寂......哼，我就知道冒险家身上的祝福是你给予的。
custom.utils.plot.hollow.hollowendstoryplot.message5=收手吧，你明知这一切不过是一场不切实际的梦，为何如此执着?
custom.utils.plot.hollow.hollowendstoryplot.message6=住嘴，你这个不折不扣的失败品，你有什么资格议论我的事业?!
custom.utils.plot.hollow.hollowendstoryplot.message7=屏障终破，提丰大人快要来了。
custom.utils.plot.hollow.hollowendstoryplot.message8=好，好啊。
custom.utils.plot.hollow.hollowendstoryplot.message9=那么，你们，就都给我一起沉睡下去吧，哈哈哈哈——
custom.utils.plot.hollow.hollowendstoryplot.message10=%s，这里就是最后了。
custom.utils.plot.hollow.hollowendstoryplot.message11=我......很高兴能和你同行，但，你终归不属于这里。
custom.utils.plot.hollow.hollowendstoryplot.message12=快醒来吧......你的故事，还在等待着你书写......

#No Zuo No Die

actors.mobs.hollow.apprenticewitch.name=见习魔女
actors.mobs.hollow.apprenticewitch.desc=她曾是某魔法学院的学生，因为太过顽皮，没能通过魔法考试，所以无法成为一名合格的法师。\n\n有些人会吸取教训，继续努力学习成为出色的法师，但她却渐渐失去了对魔力的控制，境况逐渐堕落。如今，她只能作为一名见习魔女游荡在荒野之外，以捕食 过路人 的灵魂为乐。
actors.mobs.hollow.apprenticewitch.bye=拜拜~
actors.mobs.hollow.apprenticewitch.die=去死吧！
actors.mobs.hollow.apprenticewitch.oh_no=啊偶……
actors.mobs.hollow.apprenticewitch.love=这个见习魔女_至多再吃%s颗糖果_即可成为我方盟友。

actors.mobs.hollow.frankenstein.name=残梦魔偶
actors.mobs.hollow.frankenstein.desc=游荡在万圣大殿的未完成人偶，据说制作它们的主人因为它们失败的外型和缓慢的速度最终抛弃了它们。它们已经陷入了癫狂之中，会寻找一切活着的生命，并撕碎他们的灵魂。\n\n_-_ 会额外造成 _元素损伤_，有概率进行_多次复活，至多两次_ \n_-_ 类型:心魔损伤
actors.mobs.hollow.frankenstein.die_yes=#$%^&*%$#%&

actors.mobs.hollow.ghost_halloween.name=鬼魂
actors.mobs.hollow.ghost_halloween.desc=游荡在万圣大殿的鬼魂，虽然无法对敌人造成伤害，但可以造成精神摧残。\n\n鬼魂可能是曾经的冒险家，也有可能是未知的东西。\n\n隐身状态下攻击会携带9点心魔损伤\n_-_ 类型:心魔损伤
actors.mobs.hollow.ghost_halloween.hello=嘿，你好！

actors.mobs.hollow.pumking_ghost.name=南瓜头鬼魂
actors.mobs.hollow.pumking_ghost.desc=游荡在万圣大殿的南瓜头鬼魂，虽然无法对敌人造成伤害，但可以造成精神摧残。\n\n南瓜头鬼魂是由邪恶能量转变而成的产物，它比鬼魂更具威胁。\n\n隐身状态下攻击会携带12点心魔损伤和5回合失明\n_-_ 类型:心魔损伤
actors.mobs.hollow.pumking_ghost.hello=嘿，你好！

actors.mobs.hollow.pumkingbomber.name=南瓜姜饼人
actors.mobs.hollow.pumkingbomber.leap=南瓜姜饼人正准备瞄准目标
actors.mobs.hollow.pumkingbomber.desc=据说这姜饼人曾经是一位博士。他曾经尝试将TNT和姜饼人进行结合，但显然，实验失败了，这位博士的灵魂依附在这异形体上。\n\n南瓜姜饼人将会锁定目标后进行跳跃，到达目标点立刻自爆，造成巨大范围爆炸伤害。

actors.mobs.hollow.vampire.name=吸血蝙蝠
actors.mobs.hollow.vampire.desc=这些敏捷且坚韧的洞穴穹顶生物比看上去可怕地多。它们会通过每次成功的攻击来恢复生命，从而击败比它们大得多的对手。

actors.mobs.hollow.vampire.true_name=吸血鬼
actors.mobs.hollow.vampire.true_desc=在古堡的幽暗深处，潜伏着一种极为危险的存在，它常常伪装成吸血蝙蝠，悄无声息地在阴影中飞行。只有在感知到人类气息的瞬间，它才会揭开真实面目。其形态恐怖而扭曲，似人似兽，满口尖牙，眼中闪烁着摄人的血色光芒。\n\n攻击必定造成心魔损伤，且可能含有其他负面效果。\n_-_ 类型:心魔损伤

actors.mobs.hollow.hollowmimic.minames=南瓜灯
actors.mobs.hollow.hollowmimic.midescs=古堡中随处可见的南瓜灯，你能看见它正在对你微笑，这让你不免毛骨悚然。

actors.mobs.hollow.hollowmimic.cspx_name=虚无之墙
actors.mobs.hollow.hollowmimic.cspx_desc=外表看起来像地面，实则是古堡的神秘力量扭曲了墙壁。荒谬与无法理解就是古堡的魅力所在！\n\n旁白：等等这话似乎似曾相识，我好像唔……唔……（神秘的声音：好啦好啦，别让探索者知道的太多了哦）

actors.mobs.hollow.hollowmimic.name=南瓜墙怪
actors.mobs.hollow.hollowmimic.desc=南瓜墙怪也是拟态怪家族的一员，只不过，它们与它的宝箱怪近亲不同的地方在于它们并不喜欢用宝箱勾引冒险者上钩。\n\n它们更加喜欢让冒险家放松警惕时倚靠墙壁时从背后来惊吓冒险者，结合古堡的力量，冒险家的心魔损伤将迅速增长！！！

levels.cerdogbosslevel$diedcrused.name=亡魂祝福
levels.cerdogbosslevel$diedcrused.desc=因为你私自偷渡到对面，这让卡戎很不高兴。她使用了她的十分之一力量对刻耳柏洛斯进行了强化。\n\n亡魂祝福存在期间，Boss每隔50回合获得50点护盾+秘法护盾，该效果会随着时间而衰减。且刻耳柏洛斯的所有攻击均附带2-4点额外心魔损伤,伤害提升20%。

actors.mobs.hollow.butcher.name=电锯狂人
actors.mobs.hollow.butcher.desc=电锯狂人曾经也是一个冒险者，可现在由于各种原因，他已失去了神智。它徘徊这古堡周围，寻找一切可以被撕碎的东西。\n\n_-_ 会额外造成 _元素损伤_ \n_-_ 类型:心魔损伤

actors.mobs.hollow.crumb.name=姜饼人
actors.mobs.hollow.crumb.desc=这是一个快乐的姜饼人，它徘徊在古堡中，倘若寻找到敌人，它就会”分享“它的快乐。\n\n它的攻击将有概率加剧英雄的_饥饿_，且有概率偷取英雄的食物后逃到无人可看见的地方吃掉。\n\n击败姜饼人可以有效缓解饥饿，但也有可能加剧饥饿。
actors.mobs.hollow.crumb.stole_food=你的 %s 被调皮的姜饼人偷走了！
actors.mobs.hollow.crumb.carries=\n\n这个姜饼人携带着一个_%s_。明显是从你身上摸来的……
actors.mobs.hollow.crumb.escapes=姜饼人在暗处吃掉了你的 %s ,并逃走了！

actors.mobs.npcs.hollow.morphsnpc.name=？？？
actors.mobs.npcs.hollow.morphsnpc.sname=
actors.mobs.npcs.hollow.morphsnpc.namex=墨菲厄斯
actors.mobs.npcs.hollow.morphsnpc.lingbag=来访者，先把我给你的特殊口袋拾取起来再与我对话！
actors.mobs.npcs.hollow.morphsnpc.desc=看起来不像是这个世界的东西，它似乎正在等待着什么……
actors.mobs.npcs.hollow.morphsnpc.message1=好了，女士们，先生们，十分感谢你们能赏脸参加我筹划的戏剧。
actors.mobs.npcs.hollow.morphsnpc.message2=既然观众已经到齐——那么。
actors.mobs.npcs.hollow.morphsnpc.message3=演出正式开始！
actors.mobs.npcs.hollow.morphsnpc.message4=墨菲厄斯就在那里！
actors.mobs.npcs.hollow.morphsnpc.message5=冒险家，冒险家？
actors.mobs.npcs.hollow.morphsnpc.message6=<#f00>转瞬之间，你感觉自己的意识脱离了身体......你突然置身于舞台之上！<RGB>

actors.buffs.status.scorebuff.name=小游戏计分版-吃豆人
actors.buffs.status.scorebuff.desc=当前积分：%s分\n\n普通豆子还剩：%s个\n\n大豆子还剩：%s个\n\n拾取全部豆子，完成该小游戏。

actors.buffs.status.scorebuff.name2=小游戏计分版-推箱子
actors.buffs.status.scorebuff.desc2=当前积分：%s分\n\n当前消耗回合：%s\n\n此地图，在_%s回合_前不扣分\n\n你还剩%s回合后开始扣分，_每回合-1分_，_每50回合的倍数-100分_。\n\n箱子全部移到目的位置，或者得分降为0。则完成该小游戏。

actors.buffs.status.scorebuff.name3=小游戏计分版-全面搜查
actors.buffs.status.scorebuff.desc3=当前积分：%s分\n\n搜查已经开始！\n\n你需要在这危机四伏的区域搜寻高价值物资，强大的敌人正蛰伏在阴影中巡逻。\n\n切勿恋战！在限定回合内找到基站、发送撤离信号 —— 唯有如此，才能顺利离开这片险地！\n\n注意：在本图，除钥匙，所有物品拾取后将会转化为价值，各类物品价值为自身价格的1/2；金币价值为拾取量的1/4。\n\n在本地区死亡将立刻计算物品总价值，但获取量只有先前的一半，行动超时也是如此。

custom.utils.plot.hollow.minigame.morphsallendplot.message1a=…………
custom.utils.plot.hollow.minigame.morphsallendplot.message2a=真是出人意料的……差劲。
custom.utils.plot.hollow.minigame.morphsallendplot.message3a=有听到那来自观众席的嗤笑么？
custom.utils.plot.hollow.minigame.morphsallendplot.message4a=……你并没有在认真的对待演出。
custom.utils.plot.hollow.minigame.morphsallendplot.message5a=我邀请了这么多观众，不是为了让他们看这些。
custom.utils.plot.hollow.minigame.morphsallendplot.message6a=是时候做出补救了……为演出再添一幕。

custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmannormalplot.message1b=…………
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmannormalplot.message2b=你是否意识到，你先前的表现并没什么观赏性？
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmannormalplot.message3b=我很难判断你是否花了心思。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmannormalplot.message4b=尽管如此，感谢你的参与。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmannormalplot.message5b=这何尝不算一场滑稽戏呢？总归还是有点乐趣。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmannormalplot.message6b=虽然我不准备让你空手而归，但你也不能为演出画上句号。

custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanendplot.message1c=…………
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanendplot.message2c=演出落幕了。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanendplot.message3c=或许你认为，你证明了你拥有一位演员应有的素养。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanendplot.message4c=观众们为您献上了掌声，我代表观众们为您赠礼。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanendplot.message5c=但是，幕布落下，不代表演出结束。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanendplot.message6c=我认为你的演出乏善可陈，所以，我会亲自指导你。

custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmangoodplot.message1d=…………
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmangoodplot.message2d=啊哈，你的演出看来广受好评。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmangoodplot.message3d=观众们的热情回应证明了你确实在演出上有着过人之处。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmangoodplot.message4d=你怎么看，大明星？
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmangoodplot.message5d=或许你赢得了一部分观众的心，但远未达到我的要求。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmangoodplot.message6d=所以，休息时间取消！

custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanverygoodlplot.message1e=…………
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanverygoodlplot.message2e=我想，对于你和观众来说，这都是一个令人印象深刻的夜晚。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanverygoodlplot.message3e=而我不止看到了一场盛大的演出。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanverygoodlplot.message4e=我看到了一颗冉冉升起的新星。你是值得投资的对象。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanverygoodlplot.message5e=所以，容我多言。

custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanpeactplot.message1f=…………
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanpeactplot.message2f=看来，演出结束了，但观众们还没从中走出来。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanpeactplot.message3f=今夜令所有人都难以忘怀，包括我。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanpeactplot.message4f=你的演出已成艺术，此方天地之间恐无人能与您相较。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanpeactplot.message5f=……尽管如此，你从未从“舞台”中走出。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanpeactplot.message6f=拥有如此实力，却受限于他人搭建的“舞台”，实在可惜。
custom.utils.plot.hollow.minigame.morphsallendplot$morphspacmanpeactplot.message7f=所以，我有一些更好的建议。

custom.utils.plot.hollow.morphsendtheaterplot.message1=先前勉强的演出，令我失望。
custom.utils.plot.hollow.morphsendtheaterplot.message2=不过还能强撑到表演结束，算你有些本事。
custom.utils.plot.hollow.morphsendtheaterplot.message3=所以来吧，%s，让我们完成最后一幕！

custom.utils.plot.hollow.galaxyheartdeadendplot.message1=无论是什么样的冒险者，凡人，不应触碰你无法理解之物！
custom.utils.plot.hollow.galaxyheartdeadendplot.message2=结束的时间到了。
custom.utils.plot.hollow.galaxyheartdeadendplot$redend.rankings_desc=古堡结局：猩红谢幕

custom.utils.plot.hollow.morphsgodendtheaterplot.message1=冒险者，不，现在我应该用敬称来称呼您。居然能如此完美的完成演出，不愧是被选中之人。
custom.utils.plot.hollow.morphsgodendtheaterplot.message2=……
custom.utils.plot.hollow.morphsgodendtheaterplot.message3=我想邀请您成为我的“一部分”，您意下如何？
custom.utils.plot.hollow.morphsgodendtheaterplot.choice1=是
custom.utils.plot.hollow.morphsgodendtheaterplot.choice2=否
custom.utils.plot.hollow.morphsgodendtheaterplot.message4=哈哈哈，好，我也期待与您完成更多的表演。那么现在，闭幕！
custom.utils.plot.hollow.morphsgodendtheaterplot.message5=……您当真以为，您有拒绝我的资本？看来，需要让您亲身体会什么是虚无了！

custom.utils.plot.hollow.morphsgodendtheaterplot$shadow.rankings_desc=古堡结局：暗影邀约

levels.rooms.special.boilerroom.name=渊落古堡外传
levels.rooms.special.boilerroom.quest_start_prompt=首先祝贺你，%s，找到了此外传章节的真结局。不过，重复游玩，做出不同的选择，也许会发现此外传的更多故事。你想游玩哪一分支？\n\n游玩冥河惊魂剧情线，你将讨伐刻耳柏洛斯，体验和它相关的剧情。\n\n游玩猩红剧院剧情线，你将讨伐墨菲厄斯，体验和祂相关的剧情。
levels.rooms.special.boilerroom.enter_1=冥河惊魂剧情线
levels.rooms.special.boilerroom.enter_2=猩红剧院剧情线
levels.rooms.special.boilerroom.enter_no=稍后抉择

actors.mobs.hollow.allsearch.helpteleportpoint.name=传送法阵基点
actors.mobs.hollow.allsearch.helpteleportpoint.desc=激活全部传送法阵基点，_A/B传送法阵基点_均处于开启状态后激活撤离的传送法阵。\n\n此基点_最多激活两次_，所有基点激活后需要在_200回合内_到达撤离点。否则将需要_重新激活_。

ui.virtualcontrols.reload=局内重置
ui.virtualcontrols.down_score=你使用了局内重置，分数将扣减100分。
ui.virtualcontrols.skip=跳过

actors.buffs.elementalbuff.basebuff.scarybuff.name=心魔损伤
actors.buffs.elementalbuff.basebuff.scarybuff.desc=万圣大殿盘踞着一股邪恶的未知力量，这种力量会渐渐消耗目标的心智，使目标持续受到心魔损伤\n\n损伤带来的伤痕会随着时间的印记渐渐恢复。\n当前心魔损伤总占比：_%1$s%%_ (失控指标:100%%)\n\n
actors.buffs.elementalbuff.basebuff.scarybuff.no_effect=虽然有着心魔损伤的侵染，但你现在还算比较理智
actors.buffs.elementalbuff.basebuff.scarybuff.effect_1=心魔损伤正在让你感到不自信，你的_精准下降至70%_
actors.buffs.elementalbuff.basebuff.scarybuff.effect_2=心魔损伤正在让你感到恐惧，你的_物理伤害下降至65%_
actors.buffs.elementalbuff.basebuff.scarybuff.effect_3=心魔损伤正在让你步履蹒跚，你的_全局移速下降20%_
actors.buffs.elementalbuff.basebuff.scarybuff.effect_4=心魔损伤正在让你感到绝望，你的_力量下降2点_

actors.buffs.elementalbuff.basebuff.scarybuff.enemyname=心魔腐蚀

actors.buffs.elementalbuff.basebuff.scarybuff.enemydesc=心魔的诅咒腐蚀着你的敌人，任何被腐蚀的敌人_物理伤害_都会降低至80%%。当心魔损伤彻底爆发时，敌人将会受到_凋零_效果。\n\n注意：对敌方造成的元素损伤效果会降低，这个元素损伤每7回合降低1点。\n\n当前心魔损伤总占比：%1$s%% \n\n(失控指标:60%%)

actors.buffs.elementalbuff.damagebuff.scarydamagebuff.name=惊惶蚀心
actors.buffs.elementalbuff.damagebuff.scarydamagebuff.desc=长时间的心魔损伤让你的心智几近崩溃，将武器刺向自己的念头无时无刻不在你脑海中盘旋。\n\n你感到十分焦虑与不安，似乎暗影正朝你的位置涌动。\n\n在此状态下，力量-4，持续受到凋零状态！饮用净化或者治疗药剂可解除损伤！\n\n剩余心魔损伤异常时长：%s回合。

actors.buffs.elementalbuff.damagebuff.scarydamagebuff.on_kill=你的心智达到了临界点，心魔最终还是吞噬了你……

actors.buffs.elementalbuff.immunities.scaryimmunitiesbuff.name=禅心静定
actors.buffs.elementalbuff.immunities.scaryimmunitiesbuff.desc=理性终究战胜了自残的念头。\n\n你握紧了武器，再一次。\n\n剩余免疫时间：%s回合。

###HOLLOWEND

actors.mobs.npcs.dragongirlblue.name=半龙女仆-小蓝
actors.mobs.npcs.dragongirlblue.desc=身穿蓝色礼服，站在捕梦幻境法阵之下。她正在这里进行着祈祷……
actors.mobs.npcs.dragongirlblue.message1=感谢您来与我交谈，%s。
actors.mobs.npcs.dragongirlblue.message2=祂是一位凶狠的神，祂曾在比这危险的多的环境生存了下去，晾祂的力量必能祝你度过此关。
actors.mobs.npcs.dragongirlblue.message3=林地生长于漫宿墙外，但每一个研学史学的人皆知，漫宿无墙。
actors.mobs.npcs.dragongirlblue.message4=漫宿无墙，爱亦无疆。
actors.mobs.npcs.dragongirlblue.quest_start_prompt=通往远古遗迹的入口已经打开,如果你准备好了,就告诉我。\n\n记住，我会守护你。你可以随时离开危险的远古遗迹，千万不要勉强自己，量力而行。
actors.mobs.npcs.dragongirlblue.enter_yes=我准备好了,小蓝！
actors.mobs.npcs.dragongirlblue.enter_no=还没有，让我再缓缓。
actors.mobs.npcs.dragongirlblue.not_locked=你这里还没有钥匙剑，我无法帮你开启远古遗迹的入口。
actors.mobs.npcs.dragongirlblue.exit_warn_none=冒险者，是不是这里太危险了？你是准备离开远古遗迹了吗？
actors.mobs.npcs.dragongirlblue.exit_yes=是的，我确实准备离开。
actors.mobs.npcs.dragongirlblue.exit_no=不，我只是想上楼-_(子层初级无效)_
actors.mobs.npcs.dragongirlblue.exit_yes_2=我已确认想离开这里。
actors.mobs.npcs.dragongirlblue.exit_no_2=我只是点错了。

actors.mobs.npcs.dragongirlblue.cashout=_兑现（消耗全部调查点）：_，10调查点 = 一枚金币。
actors.mobs.npcs.dragongirlblue.cashout_verify=好的，这是你的 %d 金币。我已经没有什么东西给你了，祝你旅途顺利。
actors.mobs.npcs.dragongirlblue.cashout_yes=给我金币吧
actors.mobs.npcs.dragongirlblue.cashout_no=我再想想看

actors.mobs.npcs.dragongirlblue.no_anymore=冒险者，这就是我的全部了，祝你旅途顺利。

actors.mobs.npcs.dragongirlblue.exit_boss_none=冒险者，您已猎杀了祂。现在你可以选择继续逗留或者离开这里。\n\n记得来找我，我会给你应有的报酬。
actors.mobs.npcs.dragongirlblue.exit_yes_3=是的，我想离开这里了。
actors.mobs.npcs.dragongirlblue.exit_no_3=我还想在这里逗留一会儿。

actors.mobs.npcs.dragongirlblue.b_message1=是的 您要见证那远古时代？好的……我尊重任何人的意愿。
actors.mobs.npcs.dragongirlblue.b_message2=我们拜请守夜人，指引前路之神。但在那之前，我需要一个长得像钥匙剑的道具帮忙。

actors.mobs.npcs.dragongirlblue.c_message1=冒险者，欢迎来到祂的居住之地。
actors.mobs.npcs.dragongirlblue.c_message2=许多年前，一场巨大的海啸向这里袭来，祂和它们被冲到了这里，退潮之后，它们再也无法回到大海。
actors.mobs.npcs.dragongirlblue.c_message3=祂已经沉睡千年，你唤醒祂后一场恶战不可避免，如果你能巧妙的躲开它的一些可避开的攻击，我会给你最高评价。
actors.mobs.npcs.dragongirlblue.c_message4=在这里有两个井，它们含有传送的魔力，合理利用可以规避大多数伤害。场地中的柱子也可以帮你巧妙躲过那些恶毒的魔法。我会宽限你一次，但你千万不能被祂撞个正着。
actors.mobs.npcs.dragongirlblue.c_message5=祝你狩猎愉快!!!另外，如果你狩猎成功，祂的遗体希望你能帮祂带回地表。


actors.mobs.ancity.anomalocaris.name=奇虾
actors.mobs.ancity.anomalocaris.desc=古代存活至今的奇怪生物，记载为虾，实际上根本不是……\n\n它们对于猎杀有着十分专注的力量，但由于其笨重的体格无法跨过狭窄的地方。
actors.mobs.ancity.anomalocaris.true=首次攻击伤害提升300%,此怪物还尚未使用此效果。

actors.mobs.ancity.threeleafbug.name=三叶虫
actors.mobs.ancity.threeleafbug.desc=古代存活至今的弱小生物 ，他们是怎么活到现在的？\n\n它们对于猎杀非常专注，在持之以恒之后，它们的利爪将撕裂一切。
actors.mobs.ancity.threeleafbug.true=每次攻击伤害和移速提升，7次攻击后提升到最高并且移速额外大幅度提升。脱战后开始渐渐衰减。\n\n当前叠加攻击数:%1$s\n\n当前平均伤害:%2$s

actors.mobs.ancity.turtle.name=丛林土鳖
actors.mobs.ancity.turtle.desc=古代存活至今的奇怪生物，据说药剂师们非常喜欢它们……\n\n没有任何特殊能力，但据说它有概率掉落种子。



actors.mobs.flowerslime.name=丛林繁花史莱姆
actors.mobs.flowerslime.desc= 在丛林中随处可见的生物，原本应该是比较温顺的一种生物，可能是受到地牢诅咒影响，它们也开始主动袭击过往的人类。\n\n史莱姆的身体富有粘性，很显然，这个史莱姆身上沾满了这片地区的植物，也许上面还有些种子。

actors.mobs.olddm300.name=DM275-原型机
actors.mobs.olddm300.desc=这台机器是DM300量产前，矮人王国研发的原型试验机，由于其较为笨重的原因，原型机已被废弃，你现在看见的这台应该是最后一台！\n\n在燃料耗尽前可以进行极大范围的远程攻击，在水面移动时可以进行自我修复并填装一定的燃料但会蒸发水面。血量低于一定比例后立刻吸收本层所有DM201的能量给自己生成护盾，同时被吸收能量的DM201也会立刻被关闭。
actors.mobs.olddm300.notice=侦察到入侵者……
actors.mobs.olddm300.defeated=系统能量不足，自动关……
actors.mobs.olddm300.repair=自我修复

#Spical

actors.mobs.spical.skydead.name=天罚
actors.mobs.spical.skydead.desc=它是一种更加实体化的幽灵，它们的肉身在死后被腐蚀殆尽，只留下了骸骨一具，不屈的意志似乎指引着它们重生，但被地牢的邪恶魔力的影响，现在的它们更像是死神。
actors.mobs.spical.skydead.reason=冒险者，我们又见面了。\n\n这个井的深处，有着一个这层极其危险的存在。我十分不建议你前往，而且一旦下去，没有击败它，你将会死无葬身之地。\n\n如果你准备好了，就请深潜吧！
actors.mobs.spical.skydead.cant_enter_a=通往秘境的道路已经被水完全覆盖，连同它的尸体一起被淹没在这地牢深处的水底……
actors.mobs.spical.skydead.cant_enter_1=这里水流相当的急，你暂时无法离开这里……
actors.mobs.spical.skydead.desc_fire=天罚尚未成功进行第一次远程攻击，因此将会拥有_100%全局伤害抗性_。
actors.mobs.spical.skydead.enter_yes=深潜秘境
actors.mobs.spical.skydead.tp=逃避，不能解决任何问题！
actors.mobs.spical.skydead.no_tele=天罚：你妄想传送我？！
actors.mobs.spical.skydead.enter_no=稍后再说
actors.mobs.spical.skydead.exit_warn_none=你居然还活着？水快要漫上来了，我可以带你离开这里！
actors.mobs.spical.skydead.exit_yes=离开秘境
actors.mobs.spical.skydead.exit_no=稍后再说
actors.mobs.spical.skydead.notice=痛苦会转变你的欲望，亡魂是诉说的对象。
actors.mobs.spical.skydead.defeated=……，我解脱了……
actors.mobs.spical.skydead.dodge_warning=Tips：如果多次攻击都为0，你应该用放大镜看看天罚的文本介绍。

actors.mobs.spical.greenslting.name=绿野精灵
actors.mobs.spical.greenslting.desc=丛林中的植物精灵，对入侵者没有任何好感……也包括你!!!

actors.mobs.spical.gnollhero.name=豺狼勇士
actors.mobs.spical.gnollhero.desc=脸上涂着部族的印记，这是一名来着豺狼家族的无畏勇士，是豺狼族中最强大的一群。他们的力量来自于信仰，他们相信自己是豺狼族的神的化身，因此力量也是无穷的。\n\n他相当的危险，所以你最好不要让他靠近你。

actors.mobs.spical.dm275.name=DM275-RPG实验机甲型
actors.mobs.spical.dm275.desc=DM275-RPG实验机甲型是矮人研发DM300前的过渡城防器械，最初用来保护矿洞中的矮人矿工与下方的城市。比起第二代它们相当庞大笨重，并利用强力的液压锤碾压和恐怖的RPG对让每一个入侵者都有去无回。\n\n这台早已被废弃的战争机器就算到了今日竟然依旧在运作，它嗡嗡作响的液压钻和火箭炮表明了它并不好惹。

actors.mobs.blackmimic.name=暗金拟态魔箱
actors.mobs.blackmimic.desc=宝箱怪是一种能随意改变外形的魔法生物。在地牢里它们几乎总会以宝箱形态出现，因为这样更能吸引不防备的冒险者。\n\n暗金拟态魔箱相比于它们的近亲更为狡猾且更为好斗，会尝试夺取一个物品并为他所用。

actors.mobs.spical.succubusqueen.name=魅魔女王
actors.mobs.spical.succubusqueen.desc=魅魔一族是一种善于操纵敌人精神的变形恶魔。这些恶魔的力量来源于人们的欲望，她们可以通过自己的美貌来吸引敌人，然后操纵他们的精神。\n\n魅魔女王是魅魔中的领袖，在攻击时，她能够使用_绝对魅惑_来控制敌人，使敌人在一定时间内完全无法攻击且会被魅魔女王持续吸收生命精华，并且在_绝对魅惑_状态下，被魅惑方受到的伤害提升25%。



actors.mobs.npcs.typhon.quest_start_prompt=冒险家，看来他已经走了，你是想我送你回去，还是踏上返程呢？
actors.mobs.npcs.typhon.enter_yes=带我回去
actors.mobs.npcs.typhon.enter_no=我要返程
actors.mobs.npcs.typhon.goodluck=祝你一路顺风，%s！


#Spical End

actors.mobs.npcs.pinkghost.name=粉色幽灵
actors.mobs.npcs.pinkghost.desc=这个幽灵正在发出靓丽的光芒，在地牢中就像一盏希望的明灯。她脸上露出了灿烂的笑容……

actors.mobs.npcs.ghostnpc.name=悲伤幽灵
actors.mobs.npcs.ghostnpc.desc=这个幽灵几乎不能被看见。它看起来像是由一片无形的昏暗光斑和一张悲痛的面孔所组成的。

actors.mobs.npcs.pinkghostnpc.name=粉色幽灵
actors.mobs.npcs.pinkghostnpc.desc=这个幽灵正在发出非常靓丽的光芒，在地牢中就像一盏希望的明灯。这个幽灵的脸上露出了灿烂的笑容……

actors.mobs.npcs.pinkghost.hello=你好呀，冒险家，啊，请不要害怕我，我曾经也是你们的一员。
actors.mobs.npcs.pinkghost.hello_1=你能帮我一个忙吗？在这层地牢里有个隐藏的花园，在哪里我记不太清了，总之，里面有一朵白色的玫瑰，那是前一段时间我种下的，现在应该已经开花了。说起来，在地牢里收集玫瑰种子真不容易。另外，在那个花园有一些游走的幽灵，它们与我不一样，它们是可怕的怨灵。
actors.mobs.npcs.pinkghost.hello_2=你可以帮我找回那朵花吗？如果可以的话，我这里有些可能有用的东西，到时候就和你交换好了。
actors.mobs.npcs.pinkghost.hello_3=如果你后面准备好了，就再次和我对话，我会使用我的力量让你前往那里的。
actors.mobs.npcs.pinkghost.good_desc=啊呀，谢谢你，我还以为我再也见不到这朵玫瑰了呢。\n\n把玫瑰给我吧，给你的东西我已经带过来了，希望对你接下来的旅途能有所帮助。
actors.mobs.npcs.pinkghost.why_red=你已经回来了，但你这里并没有白玫瑰，你丢掉它了吗？
actors.mobs.npcs.pinkghost.giverose=给予白玫瑰
actors.mobs.npcs.pinkghost.givemoon=给予小月饼
actors.mobs.npcs.pinkghost.whatmoon=啊拉，谢谢你，幽灵是不用吃月饼的，你的心意我就收下了。
actors.mobs.npcs.pinkghost.moonname=等等，这个月饼......上面为什么会有我的名字?\n\n什么，是一个幽灵给你的？难道他......他真的......
actors.mobs.npcs.pinkghost.moonlost=粉色的幽灵带着月饼消失了......
actors.mobs.npcs.pinkghost.goodluck=祝你一路顺风，冒险家！
actors.mobs.npcs.pinkghost.not_sorry=抱歉，冒险家，让你看见了我伤心的样子......
actors.mobs.npcs.pinkghost.not_sorry_1=我之前说过，我也是冒险家，不过在我进地牢前就已经放弃了冒险家的身份了。我之所以在地牢里变成这副样子，是为了我的爱人。
actors.mobs.npcs.pinkghost.not_sorry_2=我的爱人准备与我结婚前最后完成一件任务，我记得是在地牢浅层收集材料。可是过了好几天也不见他回来，我很着急，但是没有冒险家协会的许可或冒险家的担保的话是无法进入地牢的，所以我找到了_罗伦斯_，他是一名矮人工匠，并不是冒险家协会的成员。但是他帮我找到了一条能够避开守卫的路，最终，我们成功进入了地牢。
actors.mobs.npcs.pinkghost.not_sorry_3=进入地牢后，罗伦斯便不知所踪，我只得一个人探索。\n\n但是，我没能在前几层找到他，我猜想可能是他去到了更深的地方，便继续探索，直到我最终不幸倒在了毒气里......但是万幸，有位穿棕色斗篷的人救了我，只是我的肉体受伤太严重，他只得先冰封我的肉体，让我以灵魂姿态继续游荡在这黑暗的地牢......可是，我还是没能寻到他的线索。我便猜想，我可能太着急了，他应该早就回去了，只是先去旁边的镇子休整两天而已。可是，我已经没法再回头了。
actors.mobs.npcs.pinkghost.not_sorry_4=既然你从一位幽灵那里拿到了这块月饼，那说明他也遭遇了不测......但我还会继续寻找他的。哪怕我们再也无法回到地面，再也无法像以前一样相拥而眠，再也无法笨拙地给对方烤制不知道什么馅的月饼，我也会寻找他的。
actors.mobs.npcs.pinkghost.talk_desc=我相信他还在那里等我。\n\n总之，谢谢你。\n\n对了，这些东西忘记给你了，真诚的希望能帮上你的忙。\n\n白玫瑰就留给你做纪念了……
actors.mobs.npcs.pinkghost.givego=收下物品
actors.mobs.npcs.pinkghost.take=他就在这里！
actors.mobs.npcs.pinkghost.whathere=啊，他不在这里的。谢谢你安慰我……
actors.mobs.npcs.pinkghost.rose=等等，这是......我送他的玫瑰！这么久了，竟然还没枯死吗......\n\n难道，他，他就在这附近?

actors.mobs.npcs.pinkghost.love&love=他们以不存在的形体再次拥抱在一起。白玫瑰和红玫瑰轻轻地从他们手中落下。一种说不上来的情感布满了你的心头。

actors.mobs.npcs.ghostnpc.love=亲爱的，是我.....
actors.mobs.npcs.pinkghost.oh_no=天啊！你......你怎么也变成这副模样了？
actors.mobs.npcs.ghostnpc.sorry=对不起，我......疏忽了。
actors.mobs.npcs.pinkghost.linklove=不，该说抱歉的是我，我应该和你一起去的......

actors.mobs.npcs.pinkghost.thanks=冒险家，我非常感谢您的帮助。
actors.mobs.npcs.pinkghost.thanks_1=没有你，我无法和我的爱人重逢。
actors.mobs.npcs.pinkghost.thanks_2=我的救命恩人在召唤我了，我的爱人也会和我一起去见祂。
actors.mobs.npcs.pinkghost.thanks_3=或许在今后的轮回旅途中，我和你以及我的爱人见面次数会更少。但请告诉轮回中的他，我一直都在他旁边。
actors.mobs.npcs.pinkghost.thanks_4=再见,%s。
actors.mobs.npcs.pinkghost.thanks_5=它们消失在了空气中，只有一束白玫瑰和红玫瑰并发着红色光芒见证它们的挚爱之情……

actors.mobs.bluewraith.name=蓝色怨灵
actors.mobs.bluewraith.desc=这个怨灵曾经与你一样都是探索地牢的佼佼者，由于一些原因被困在了这里，并最终迎接了死亡……

actors.mobs.bosses.sakafishboss.name=萨卡班甲鱼
actors.mobs.bosses.sakafishboss.desc=曾经远古时代的海洋王者,因为不可避免的末日来临时，潜入了地底的阴暗水潭进入了沉睡。想着有朝一日回到大海，然而随着地牢的魔力改造和大海本身的变化，它再也不可能回到那片理想的海洋。
actors.mobs.bosses.sakafishboss.notice=sakasaka……saka？腻……系……甚磨？！
actors.mobs.bosses.sakafishboss.attack=吧嗒吧嗒—呜呜……好怀念上面的风景和底栖生物
actors.mobs.bosses.sakafishboss.leap=萨卡班甲鱼正在蓄力泥头车冲撞！哦——创似——李——!!!
actors.mobs.bosses.sakafishboss.laserwarning=萨卡班甲鱼正在召集周围的黑暗能量以释放死亡凝视……
actors.mobs.bosses.sakafishboss.king=泰山压顶！biu——
actors.mobs.bosses.sakafishboss.interesting=让你瞧瞧远古顶级掠食者的姿态！
actors.mobs.bosses.sakafishboss.angry=可恶的人类！你们为什么要毁掉我们的家园？！可恶可恶可恶可恶，陪我的同胞一起下地狱吧！
actors.mobs.bosses.sakafishboss.defeated=呜呜呜……我……我……我……,仍然无法回到大海……
actors.mobs.bosses.sakafishboss.dictcar_kill=%s被萨卡班创飞,离开了人间……
actors.mobs.bosses.sakafishboss.deathgaze_kill=%s被萨卡班的死亡凝视吓死了……
actors.mobs.bosses.sakafishboss.rankings_desc=成为了萨卡班甲鱼的食物……

actors.mobs.bosses.sakafishboss$hunting$1.rankings_desc=成为了萨卡班甲鱼的食物……

actors.mobs.bosses.dictfish.name=板足鲎
actors.mobs.bosses.dictfish.desc=底栖顶级捕食者，他的巨鳌和巨颚可以碾碎你的铠甲。\n\n与_房角石_是共生互助，因此死后房角石会狂暴，获得的特殊攻击带有冲击，可以击退敌人造成大量伤害。且免疫火焰。
actors.mobs.bosses.dictfish.notice=板足鲎:大哥！
actors.mobs.bosses.dictfish.death=大哥，接下来就交给你了！
actors.mobs.bosses.dictfish.angry=板足鲎:大哥！该死的人类！我要你们付出代价！
actors.mobs.bosses.dictfish.rankings_desc=成为了萨卡班甲鱼的食物……

actors.mobs.bosses.roomstone.name=房角石
actors.mobs.bosses.roomstone.desc=远古顶级掠食者，他的喙和甲壳可以轻易刺穿你的身材。\n\n与_板足鲎_是共生互助，因此死后板足鲎会狂暴，获得35回合激素涌动和暂时无敌10回合，并且每次攻击必定造成易伤，离开水面后速度大幅度提升。
actors.mobs.bosses.roomstone.notice=房角石:二弟!
actors.mobs.bosses.roomstone.allget=我们兄弟齐心！力断其金！为了我们的家园！
actors.mobs.bosses.roomstone.angry=房角石:二弟！该死的人类！我要把你们碾成肉酱！
actors.mobs.bosses.roomstone.leap=房角石:人类，用你的血来祭奠我们的家园吧！
actors.mobs.bosses.roomstone.rankings_desc=成为了萨卡班甲鱼的食物……

actors.mobs.npcs.nxhy.talk=交谈
actors.mobs.npcs.nxhy.buyback=回忆很爽快的退还了相应的商品。

actors.mobs.npcs.nxhy.talk_prison_intro=冒险者，欢迎来到这个危机四伏的地牢。
actors.mobs.npcs.nxhy.talk_prison_warrior=蕾零安洁，你也是前往这里寻找水晶之心的吗？哦，嗯，我知道，地表三巨头的行动我可是了如指掌的，但本人已经不想参与这些事情，现在，我还是当个商人最好吧。
actors.mobs.npcs.nxhy.talk_prison_mage=茉莉姐，我知道你来到这里的目的不是寻找那个东西，而是听到了来自深渊的求救。但我能告诉你的事，别去参和他们的事情，这里毕竟不是你的家，你的力量无法完全展露的。
actors.mobs.npcs.nxhy.talk_prison_rogue=哦，这不是人人歌颂的皇家盗贼吗？你打算在我这里偷点东西吗？哈哈哈，骗你的，事实上，我很敬佩你，为了穷人，你不惜舍去皇室血脉也要和穷人一起同甘共苦。你的父王可能早就知道了，不信的话，你的斗篷已经被他秘密改造了，什么，你还不知道？哈哈哈，我为什么知道，这是秘密哦！
actors.mobs.npcs.nxhy.talk_prison_huntress=我曾经和小姐一样也是一位侠客，只不过瞬时变迁，我现在已经不再追求这些。小姐，你知道自从你走后你的部族就发生……，哎呀，别拿弓指着我，我不说就是了。还是希望小姐能在地牢中试炼中找到自己的目标吧。

actors.mobs.npcs.nxhy.talk_prison_duelist=小姐的样子不像是这个世界的人，你应该来自于其他的地方吧。当然，我这里的商品任你挑选，只要金钱到位就行。

actors.mobs.npcs.nxhy.talk_caves=这里的矿洞常年都是这么的冷，但曾经并不是这样。曾经有一位蓝发少女在我这里留了一本书，此后矿洞就变得如此寒冷，但那位少女再也找不到人影……
actors.mobs.npcs.nxhy.talk_city=矮人都市是我最后给你的物资中转站，再往下，已经不是我可以涉及的区域，曾经这里也是一片繁华，但是那场事变后，一切都变了……

actors.mobs.npcs.nxhy.guards=看来你需要更加艰难的试炼了。
actors.mobs.npcs.nxhy.thief=看来你需要更加艰难的试炼了。
actors.mobs.npcs.nxhy.why=抢劫商店？你可真有趣!

actors.mobs.npcs.nxhy.sell=选择一件要出售的物品
actors.mobs.npcs.nxhy.name=那些回忆
actors.mobs.npcs.nxhy.desc=这是一个拥有很多东西的商人，他的名字叫那些回忆。据说他知道300年前这地牢究竟发生了什么事情的，他在这里等着每一位冒险者的前来。他会给予冒险者相应的补给，但是他从来不告诉冒险者这个地牢的危险程度是多么的高。传言说，他曾经是一个侠客，只不过现在他已经成为了一个商人了。
actors.mobs.npcs.nxhy.greetings=你好，%s。欢迎来到我的大商店。

actors.hero.hero.heartdied=死亡不是终点，而是新的开始。
actors.hero.hero.lanterfire_warning=十字架崩碎，灯火黯淡，心智被黑暗吞噬！你的暗影化身已然降临，击溃它！低灯火状态下，黑魂将会诞生。
actors.hero.hero.nitch=非本体层不允许执行跳楼行动。
actors.hero.hero.no_item=温馨提示：\n\n雪景小镇每局最多在NPC处获取4次物品，你已消耗完次数，后续将变为10金币。

actors.hero.hero.quest_start_prompt=靶心瞄准的闪现已就绪，你的选择是？\n\n注意：如果闪现的目标位置为深渊，且你没有浮空等免疫效果，你会直接摔下去。
actors.hero.hero.enter_yes=闪现到目标位置
actors.hero.hero.enter_no=放弃本次闪现

actors.buffs.stormclouddied.name=闪电链式反应
actors.buffs.stormclouddied.desc=你暂时掌控了雷电的力量，在接下来的时间里，任何出现在你眼前的事物都会被雷霆审判。\n\n以你现在的掌控能力，每条闪电链可以造成%1$s伤害\n\n你当前还剩余：%2$s个闪电链。\n\n剩余闪电链可造成的总伤：%3$s伤害\n\n伤害类型:真实(雷暴)


actors.mobs.brutebot.name=重甲豺狼
actors.mobs.brutebot.desc=豺狼人从击败的冒险者身上获得了盔甲，看来豺狼人们终于意识到拿个盾真的没有什么用了……\n\n虽然重甲豺狼对冒险家的威胁极大，但沉重的装甲使他们行动缓慢……\n\n通常来说矮人们会雇佣一些这种豺狼来帮他们干活。重甲豺狼非常喜欢用武器砸人，但是他们的武器并不是很结实，所以他们会经常把武器砸坏，然后再去找矮人们要新的武器。
actors.mobs.brutebot$brutebotrage.name=临死一搏
actors.mobs.brutebot$brutebotrage.desc=这个重甲豺狼的死亡已经不可避免，但它想拉你作为陪葬品！\n\n时间的推移或是外界的伤害都会消磨护盾。在护盾消散殆尽之际，重甲豺狼会彻底消亡。然而，一定要小心，在这一阶段重甲豺狼远程和近战会造成巨额伤害,且攻击间隔大幅度缩减 ！\n\n剩余的护盾：%d。
actors.mobs.brutebot.enraged=激怒
actors.mobs.brutebot.died=你激怒了重甲豺狼，它将会在死亡前尽全力攻击你！并且它呼唤了本层的所有敌人。
actors.mobs.brutebot$focus.name=红眼凝视
actors.mobs.brutebot$focus.desc=这个重甲豺狼已经完全凝视于目标的一举一动，似乎能预料到目标的下一步动作。\n\n红眼凝视中的重甲豺狼一定会格挡下一次物理攻击。格挡会分散重甲豺狼的注意力，使得他们需要一段时间重新集中精力来成功格挡攻击。在移动时重甲豺狼恢复地相对更快。
actors.mobs.brutebot.def_verb=格挡
actors.mobs.brutebot.parried=盾反
actors.mobs.brutebot.ondeath=你被重甲豺狼杀死了……,下次请小心……

actors.mobs.bosses.diamondknight.name=拟态之王
actors.mobs.bosses.diamondknight.notice=%s，我已等候多时了。为保证公平决斗，你的十字架类型物品已暂时放在了我的子嗣处。
actors.mobs.bosses.diamondknight.desc=拟态的最终结果就是无限接近人类。\n原本作用拟形的钻石宝箱外壳化作盔甲，包裹住如王般的内在。\n衪是所有拟形怪的王——至少衪是这么认为的。\n王会战斗到最后一刻，直到粉身碎骨。
actors.mobs.bosses.diamondknight.rankings_desc=拟态之王将你制作成了宝藏……
actors.mobs.bosses.diamondknight.ondeath=资 质 平 平 。
actors.mobs.bosses.diamondknight.tpdoor=拟态王邀请你前往宝藏迷宫，这可能是场鸿门宴，但你别无选择……
actors.mobs.bosses.diamondknight.now_go=真是有趣的家伙，本王带你看看我的宝藏迷宫吧。互动传送门以进入第二阶段……

actors.mobs.bosses.tpdoor$1.name=前往宝藏迷宫？
actors.mobs.bosses.tpdoor$1.quest_start_prompt=宝藏迷宫有着各种宝箱怪进行巡逻，但里面有拟态之王存下来的宝藏，立刻前往看看吧！\n\n任务目标：_除钻石宝箱怪外，击败五个宝箱怪，然后寻找“神秘传送门”离开这里。_\n\n当传送门显现时，你将与它共鸣！
actors.mobs.bosses.tpdoor$1.quest_start_ender=宝藏迷宫正在崩塌，所幸你发现了传送门……，赶紧进入传送门离开这里吧！
actors.mobs.bosses.tpdoor$1.enter_yes=进入传送门
actors.mobs.bosses.tpdoor$1.enter_no=暂时不要
actors.mobs.bosses.tpdoor.display=你已经破坏了这里的平衡，传送门已再次显露出来……，寻找并与它互动离开这里……
actors.mobs.bosses.tpdoor$1.leave=逃离宝藏迷宫？

actors.mobs.bosses.firedragon.name=熔岩火龙
actors.mobs.bosses.firedragon.desc=丛林腐化的中心，丛林幕后的主谋。\n\n熔岩洞穴的温度越来越高，火龙的攻势来势汹汹。\n\n在火焰的熊熊燃烧中，烈焰映红了天空，我们必须击退它，让丛林获得暂时的安定。\n\n_火龙在战斗开始时会划定一个范围制作魔法火墙，但它在捕食后会解除这一威胁,你也可以站在低温岩浆上不被影响。_
actors.mobs.bosses.firedragon.notice=火龙注意到了你。一道烈焰散发在这周围，熊熊烈火包围了这里，现在已经无路可退！
actors.mobs.bosses.firedragon.scorpion=捕食，给养。我的奴仆们，是时候了！
actors.mobs.bosses.firedragon.elemental=奴仆们，苏醒吧……
actors.mobs.bosses.firedragon.toy=熔岩火龙：是时候给点真本事给你瞧瞧了！火龙一瞬间就传送不见了……
actors.mobs.bosses.firedragon.healing=我的奴仆们，快治愈我吧！
actors.mobs.bosses.firedragon.defeated=随着火龙痛苦的嘶吼后，它倒在了这里……
actors.mobs.bosses.firedragon.clear=你感到有什么东西熄灭了,一股压抑的力量正在从这里散去。
actors.mobs.bosses.firedragon.lingjing=棱镜在火龙痛苦的嘶鸣声中碎裂开了……
actors.mobs.bosses.firedragon.car=注：龙车即将到来，请留意！

actors.mobs.bosses.firedragon.dragon_majesty=龙族不会屈服于任何一个人，我们才是这里的主人！
actors.mobs.bosses.firedragon.dragon_rituals=尚未发现敌对目标，开始进行神秘仪式备战……
actors.mobs.bosses.firedragon.scorpion_enemy=蚕食，诅咒，一切都是龙族的时代！

actors.mobs.bosses.firedragon$vertigoeffect.name=定向进化·不屈
actors.mobs.bosses.firedragon$vertigoeffect.desc=寻路漫漫，而迷路者终将被吞没\n\n火龙物理防御提升至120%%\n\n距离效果衰减还有：%s回合。

actors.mobs.bosses.firedragon$hasteeffect.name=定向进化·暴风
actors.mobs.bosses.firedragon$hasteeffect.desc=天下武功唯快不破！功夫再高，也怕菜刀\n\n火龙基准移速提升至200%%\n\n距离效果衰减还有：%s回合。

actors.mobs.bosses.firedragon$toxicgaseffect.name=定向进化·剧毒
actors.mobs.bosses.firedragon$toxicgaseffect.desc=浸染一切，这片丛林不值得祂的救赎\n\n火龙自身附近产生大量毒气\n\n距离效果衰减还有：%s回合。

actors.mobs.bosses.firedragon$damageupeffect.name=定向进化·猎杀
actors.mobs.bosses.firedragon$damageupeffect.desc=猎杀一切，杀死丛林\n\n火龙全局伤害提升至140%%，攻速提升50%%\n\n距离效果衰减还有：%s回合。

actors.mobs.bosses.firedragon$bleedingeffect.name=定向进化·嗜血
actors.mobs.bosses.firedragon$bleedingeffect.desc=猎杀一切，杀死丛林\n\n火龙的普通攻击造成流血效果\n\n距离效果衰减还有：%s回合。

actors.mobs.bosses.notsync.diedclearelemet.friend=火龙事件之后，这些神秘元素终于重获自由。如今，它们在丛林的尽头，齐心协力为曾经的恩人开辟出一条光明之路，指引着前行的希望与未来。

actors.mobs.bosses.notsync.diedclearelemet$clearelemetalblood.name=血晶元素
actors.mobs.bosses.notsync.diedclearelemet$clearelemetalblood.desc=火龙的力量污染了这些曾经的守卫者，虽然它们本身是无辜的，但你必须做出抉择。\n\n血晶元素攻击目标时将有概率造成{流血{效果，_如果被火龙捕食，火龙的普通攻击造成流血效果，持续30回合_

actors.mobs.bosses.notsync.diedclearelemet$clearelemetalgreen.name=毒晶元素
actors.mobs.bosses.notsync.diedclearelemet$clearelemetalgreen.desc=火龙的力量污染了这些曾经的守卫者，虽然它们本身是无辜的，但你必须做出抉择。\n\n毒晶元素攻击目标时将有概率产生大量}毒气}气体，_如果被火龙捕食，火龙自身附近产生大量毒气，持续70回合_

actors.mobs.bosses.notsync.diedclearelemet$clearelemetaldark.name=暗晶元素
actors.mobs.bosses.notsync.diedclearelemet$clearelemetaldark.desc=火龙的力量污染了这些曾经的守卫者，虽然它们本身是无辜的，但你必须做出抉择。\n\n暗晶元素攻击目标时将有概率造成|残废|效果，_如果被火龙捕食，火龙全局伤害提升至140%，攻速提升50%，持续50回合_

actors.mobs.bosses.notsync.diedclearelemet$clearelemetalpure.name=魅晶元素
actors.mobs.bosses.notsync.diedclearelemet$clearelemetalpure.desc=火龙的力量污染了这些曾经的守卫者，虽然它们本身是无辜的，但你必须做出抉择。\n\n魅晶元素攻击目标时将有概率造成]幻惑]效果，_如果被火龙捕食，火龙防御提升至120%，持续80回合_

actors.mobs.bosses.notsync.diedclearelemet$clearelemetalgold.name=磷晶元素
actors.mobs.bosses.notsync.diedclearelemet$clearelemetalgold.desc=火龙的力量污染了这些曾经的守卫者，虽然它们本身是无辜的，但你必须做出抉择。\n\n磷晶元素攻击目标时将有概率产生60点[磷火[气体，_如果被火龙捕食，火龙基准移速提升至200%，持续20回合_

actors.mobs.bosses.dwarfgeneral.name=矮人将军
actors.mobs.bosses.dwarfgeneral.desc=曾经矮人王国最强的将军，而如今变成了亡魂的模样。\n\n或许在漫漫长夜中，他有过迷茫，有过失落，有过悔恨……\n\n究竟怎样的颠沛流离，才能让这一切变得更加值得呢？他不言，尔不语。
actors.mobs.bosses.dwarfgeneral.charging=看来你还有两下子嘛，那么，尝尝这个吧。崩山斩！！！
actors.mobs.bosses.dwarfgeneral.message1=......哦？
actors.mobs.bosses.dwarfgeneral.message2=呵，看来又能找点乐子了。
actors.mobs.bosses.dwarfgeneral.message3=那就让我看看，你有几斤几两吧！
actors.mobs.bosses.dwarfgeneral.story=首次与矮人将军战斗后，必须进行后续对话才能离开这里！
actors.mobs.bosses.dwarfsolider.name=矮人角斗士
actors.mobs.bosses.dwarfsolider.desc=矮人角斗士是曾经将军身边的贴身侍卫，即便在被腐化后，仍然效忠于他们的主人矮人将军。\n\n攻击有概率击飞玩家的武器

actors.mobs.bosses.dwarfgeneral.mej=恭喜你完成委托，法师新皮：晚宴邀请，现已解锁！

actors.mobs.bosses.dwarfsolider.attack_msg_1 = 誓死捍卫矮人的威严
actors.mobs.bosses.dwarfsolider.attack_msg_2 = 离开这里！你不属于这里！
actors.mobs.bosses.dwarfsolider.attack_msg_3 = 我们即为王朝的最后一道屏障！
actors.mobs.bosses.dwarfsolider.attack_msg_4 = 将军仍在，矮人仍在，而王朝一去不复返……
actors.mobs.bosses.dwarfsolider.attack_msg_5 = 罗伦斯殿下，你在哪里？
actors.mobs.bosses.dwarfsolider.attack_msg_6 = 我们最后的希望，也破灭了……
actors.mobs.bosses.dwarfsolider.attack_msg_7 = 将军，我们还能看见矮人帝国的未来吗？
actors.mobs.bosses.dwarfsolider.kicked = 你的武器被矮人角斗士击飞了……

actors.mobs.bosses.dwarffuze.name=矮人飞斧哥
actors.mobs.bosses.dwarffuze.desc=矮人帝国曾经最强大的势力“飞斧”的残党，因为后续招安和矮人将军一起协同行动\n\n攻击有概率造成自身伤害的一半的流血，不会近战攻击。

actors.mobs.bosses.dwarfsolider$focus.name=预见未来
actors.mobs.bosses.dwarfsolider$focus.desc=这个角斗士已经完全集中于目标的一举一动，似乎能预料到目标的下一步动作。\n\n预见未来的角斗士一定会格挡下一次物理攻击。如果预见成功，他们将获得20点奥术护盾，矮人角斗士攻击目标后预见自动消失。在移动时预见未来恢复地相对更快。\n\n脱战后效果消失或攻击目标后效果消失。
actors.mobs.bosses.dwarfsolider.parried=+20点奥术护盾
actors.mobs.bosses.dwarfsolider.future=预见未来成功！

actors.buffs.brokenarmor.name=无用之盾
actors.buffs.brokenarmor.desc=你的防御受“矮人将军”魔法的影响，最大和最小护甲值反而是你_武器伤害_的_四分之一_。\n\n如果没有武器，则_最低防御为0_，最高防御为英雄_赤手空拳伤害的是三分之一_。仅英雄受到该效果影响。\n\n剩余效果时长：%s回合

actors.blobs.brokenarmorfire.desc=无用且诡异的火焰正在这里闪闪发光，未被庇护的生物将被无用之盾效果诅咒。

actors.mobs.bosses.dwarfgeneral$armoreffect.name=虚无姿态
actors.mobs.bosses.dwarfgeneral$armoreffect.desc=被击中的仅仅是我的幽魂，将军处于虚无姿态时，受到的任何攻击限制为1，且闪避大幅度降低。\n\n将军累计受到5次伤害时，则会立刻召唤两个_矮人角斗士_并清理先前的角斗士,同时退出虚无姿态，并且此效果的冷却时间大幅度延长。\n\n离开此效果后累计伤害次数不会清零,下次效果触发后继续计算。\n\n剩余效果时长：%s回合

actors.mobs.bosses.dwarfgeneral$nohealdied.name=嗜血形态
actors.mobs.bosses.dwarfgeneral$nohealdied.desc=矮人将军在进入嗜血形态，每次攻击都有概率回血。\n\n但阈值不会超过800血量（第二阶段的起始点）\n\n剩余效果时长：%s回合。

actors.mobs.bosses.dwarfgeneral$magicattack.name=魔化形态
actors.mobs.bosses.dwarfgeneral$magicattack.desc=矮人将军在进入魔化形态后，每次攻击都有概率让敌人凋零。但必定造成降级效果。\n\n剩余效果时长：%s回合。

actors.mobs.bosses.dwarfgeneral$wither.name=凋零
actors.mobs.bosses.dwarfgeneral$wither.desc=你的生命正在被邪恶的魔法凋零……你必须做一下应急措施！\n\n在凋零状态下，你使用治疗药剂不会获得治疗效果。而是驱除凋零，在挑战中也同样生效。\n\n剩余效果时长：%s回合。
actors.mobs.bosses.dwarfgeneral$wither.on_kill=你的生命消逝殆尽了……

actors.mobs.bosses.dwarfgeneral.leap=我看见目标了！那里最好不要有人！

actors.mobs.bosses.dwarfgeneral.fuze=常言道,人人为我,我为人人。出来吧,我的战友们,让这场演出变得更盛大一点吧。
actors.mobs.bosses.dwarfgeneral.normal=看来你打算和我耗上了,挑战者,我遵从你的意见。那么,你来帮我清理一下"门户"吧。

actors.mobs.bosses.dwarfgeneral.spear_warn=哦，看来我正中靶心了！
actors.mobs.bosses.dwarfgeneral.notice=世界，以及矮人的未来，能否交予你呢？让我来“质检”一下吧。

actors.mobs.bosses.dwarfgeneral.wtf=你居然伤害我的战友，我不能饶恕你！
actors.mobs.bosses.dwarfgeneral.gotime=虚无的力量，是你无法触及的……
actors.mobs.bosses.dwarfgeneral.support=矮人角斗士：我们的主人有威胁了，快去支援！
actors.mobs.bosses.dwarfgeneral.wow=你们还在这里？好吧，挑战者，看来事情变得有趣起来了……

actors.mobs.bosses.dwarfgeneral.army_one=排兵布阵，全军列阵！！！
actors.mobs.bosses.dwarfgeneral.army_two=全体都有，立刻集合！！！
actors.mobs.bosses.dwarfgeneral.army_three=你不可能离开这里！！！
actors.mobs.bosses.dwarfgeneral.defeated=矮人将军已被击败......不，他的伤痕突然就愈合了。。他似乎有话要和你说。

actors.mobs.bosses.dwarfgeneral.died=......%s，你会一直朝着自己的信仰而战吗？

actors.mobs.bosses.armyflag.name=王庭军旗
actors.mobs.bosses.armyflag.desc=矮人帝国的军旗，象征着帝国昔日的辉煌。\n\n昔日的矮人帝国，而今昔只有一片废墟和亡魂诉说着她曾经的辉煌。\n\n_军旗存在期间，矮人将军获得无敌_\n\n且周围的敌人和友方周期获得_激素涌动增益_和_迟缓_效果。

actors.mobs.bosses.dwarfgeneralnpc.name=矮人将军
actors.mobs.bosses.dwarfgeneralnpc.desc=???

actors.mobs.bosses.dwarfgeneralntnpc.name=索林
actors.mobs.bosses.dwarfgeneralntnpc.desc=曾经的将军，如今的亡魂。但在漫长的路途中，他从未后悔……将军之道，就在其中……

actors.mobs.bosses.dwarfgeneralntnpc.goodbye=再见了，%s。
actors.mobs.bosses.dwarfgeneralntnpc.xms=他未曾离去。他是过去，亦是未来……

actors.mobs.bosses.dwarfgeneral.message6=干得不错啊，%s。
actors.mobs.bosses.dwarfgeneral.message7=你：你的伤痕怎么消失了？
actors.mobs.bosses.dwarfgeneral.message8=......哈哈哈哈，看来小恶魔没有告诉你啊。
actors.mobs.bosses.dwarfgeneral.message9=一个很简单的常识:你不能杀死一个已经死去的人。
actors.mobs.bosses.dwarfgeneral.message10=你：死去的人？！
actors.mobs.bosses.dwarfgeneral.message11=没错，这是我给小恶魔的委托。
actors.mobs.bosses.dwarfgeneral.message12=小恶魔会寻找强大的冒险者，把他或她带到‘我’的面前，只要能赢过我，就能获得一些装备。
actors.mobs.bosses.dwarfgeneral.message13=我呢，也能收获一些乐趣，或许这样还能找到新战友。
actors.mobs.bosses.dwarfgeneral.message14=你：关于你自己？
actors.mobs.bosses.dwarfgeneral.message15=我姓甚名谁，并不重要。
actors.mobs.bosses.dwarfgeneral.message16=我是一名矮人将军，以前是，现在也是。
actors.mobs.bosses.dwarfgeneral.message17=你：关于你的死......
actors.mobs.bosses.dwarfgeneral.message18=我不太清楚目前地面上有没有对这几十年的矮人帝国进行过研究。
actors.mobs.bosses.dwarfgeneral.message19=现任的国王，和真正的皇室没有任何关系。
actors.mobs.bosses.dwarfgeneral.message20=几十年前，一名能力高超的死灵法师刺杀了基本所有皇室成员，并控制了大臣，自己称帝。
actors.mobs.bosses.dwarfgeneral.message21=在他的统治下，原本还算是繁荣的矮人帝国就开始变的一蹶不振。
actors.mobs.bosses.dwarfgeneral.message22=他的统治方式全看他的心情，所有的事情都由他独裁，他想杀谁就杀谁，所有对他有意见的大臣都最终死于非命。
actors.mobs.bosses.dwarfgeneral.message23=直到我和另外一群志同道合的人，一同组建了反抗军。那天，我们不惜代价，终于杀入了王宫。
actors.mobs.bosses.dwarfgeneral.message24=可惜的是，死灵军最终还是包围了我们。彼时的我们也已经知道了自己的结局。
actors.mobs.bosses.dwarfgeneral.message25=但是，我们仍然没有放弃，我们奋力拼杀，直到最后，死灵军突然停止了攻击，他们的士官还在尝试劝降我们。
actors.mobs.bosses.dwarfgeneral.message26=你们肯定没有答应。
actors.mobs.bosses.dwarfgeneral.message27=嗯，所以我只向他们索取了一项权利。
actors.mobs.bosses.dwarfgeneral.message28=你：什么权力？
actors.mobs.bosses.dwarfgeneral.message29=自刎的权利。
actors.mobs.bosses.dwarfgeneral.message30=.............
actors.mobs.bosses.dwarfgeneral.message31=我们现在所站的地方，就是我们最后一次杀敌的地方。
actors.mobs.bosses.dwarfgeneral.message32=你：也许，我可以试试挑战他。
actors.mobs.bosses.dwarfgeneral.message33=.....不行。
actors.mobs.bosses.dwarfgeneral.message34=无论如何，你终归是杀了无数矮人的罪人。在这点上，你与那位暴君无异。
actors.mobs.bosses.dwarfgeneral.message35=我不能让你玷污矮人帝国，哪怕她现在已千苍百孔。
actors.mobs.bosses.dwarfgeneral.message36=关于矮人帝国的未来......
actors.mobs.bosses.dwarfgeneral.message37=......我出生于矮人帝国的鼎盛时期，见识过她最美丽的样子。
actors.mobs.bosses.dwarfgeneral.message38=自然，我也明白，现在的矮人帝国已是有多么不堪。
actors.mobs.bosses.dwarfgeneral.message39=我们，那些正生活在恐慌与贫穷的矮人们，那些一同逝去的战友们。
actors.mobs.bosses.dwarfgeneral.message40=我们都在寻找与期盼着她的变革。
actors.mobs.bosses.dwarfgeneral.message41=矮人帝国的历史仍未结束，而我们将为她翻开新的篇章。
actors.mobs.bosses.dwarfgeneral.message42=......身死亦无悔。
actors.mobs.bosses.dwarfgeneral.message43=好了，时间也差不多了。
actors.mobs.bosses.dwarfgeneral.message44=对了，我还是把名字告诉你吧:我叫索林（Thorin），如果你能出去的话......就帮我写篇传说故事什么的？
actors.mobs.bosses.dwarfgeneral.message45=总之，我们有缘再会吧，如果还有机会的话.........
#=======================================


actors.mobs.bosses.diamondknight.notice_2=我已多次提醒你不要杀我的子嗣，然而你如此不听劝告。今日，便要给你长长记性了！为保证公平决斗，你的十字架类型物品已暂时放在了我的子嗣处。
actors.mobs.bosses.diamondknight.now_go_2=那么，你真的以为可以与神抗衡吗？让我们来试试看吧！

actors.mobs.bosses.diamondknight.war_go=很久没有这么热血沸腾了！挑战者，或许你真的是这里唯一的光芒
actors.mobs.bosses.diamondknight.iswar_go=最大的敌人往往就是你自己，准备好和自己决一死战了吗？
actors.mobs.bosses.diamondknight.ok_go=好吧，让我们以最纯朴的战斗结束这次的较量吧。


actors.mobs.bosses.diamondknight.defeated_2=看来你还是有两下子的，不过你杀我子嗣的账，总有一天会全部清算！另外，我在来的路上杀死了一名刺客，他的面具就交给你了……
actors.mobs.bosses.diamondknight.defeated=真是一场有趣的战斗，挑战者，这次就算你赢了！另外，我在来的路上杀死了一名刺客，他的面具就交给你了……

actors.mobs.bosses.dcrystal.name=深蓝水晶
actors.mobs.bosses.dcrystal.desc=这是拟态之王的本体的一部分，它会在与本体在5距离半径且本体当前血量低于半血内进行治疗。

actors.mobs.bosses.tpdoor.name=神秘传送门
actors.mobs.bosses.tpdoor.desc=神秘传送门的力量与拟态王有着千丝万缕的联系，里面映射出了一个神秘的空间……
actors.mobs.bosses.tpdoor.lowdamage=你对传送门造成的伤害太低了，或许需要更强的力量才能击破它。（单次伤害至少20以上)
actors.mobs.bosses.tpdoor.quest_bad_game=盗版游戏！！！\n\n你正在游玩的可能是音量+2525的盗版魔绫像素地牢，为了确保你的游戏体验，请你使用正版魔绫像素地牢。点击下方链接以了解更多。
actors.mobs.bosses.tpdoor.enter_yes_game=访问官网并关闭游戏
actors.mobs.bosses.tpdoor.quest_tengu_prompt=嗯，看来君尚未做好充足的准备，莫得关系，吾只是考验你，倘吾无破我门，吾可重时。\n\n不知君意下如何？
actors.mobs.bosses.tpdoor.enter_yes=重置时间
actors.mobs.bosses.tpdoor.enter_no=我再想想
actors.mobs.bosses.diamondknight.ten=吾就再给你试试看吧。
actors.mobs.bosses.tpdoor.quest_tengu_really=吾确信前往？

actors.mobs.katydid.name=喷毒花
actors.mobs.katydid.desc=丛林中的活化植物，因为丛林的异变变得异常暴躁。常常对入侵者进行毒液喷射，它们的毒液有着极强的腐蚀性，所以非常危险。且自身较为灵活，必须趁其不备将其杀掉。

actors.mobs.salamander.name=深蓝蝾螈
actors.mobs.salamander.desc=来自森林的小生物，由于下方的邪恶力量侵蚀，它们已经由温顺变得凶猛。\n它们锋利的尾巴能穿透敌人，它们十分的聪明，且极其灵活，必须趁其不备将之杀掉。

actors.mobs.clearelemental.name=纯晶元素
actors.mobs.clearelemental.desc=来自森林自身的精华产物，但由于下方邪恶力量的不断侵犯，它们自身的力量已经消耗许多。虽然它们已经没有攻击能力，但为了保证森林最终不被完全侵蚀，它们会用剩余的力量驱赶每一个入侵森林的不速之客。

actors.mobs.bosses.notsync.crivusstarfruits.name=克璃诺斯-森林意志
actors.mobs.bosses.notsync.crivusstarfruits.desc=这颗硕大的果实是丛林中最美丽的陷阱，它会释放一种物质，迷惑周围的一切生物，使他们失去自我。\n\n身旁的触手还会将不慎走进的小动物们绞杀，腐化成缠绕在四周的瘴气。\n\n根据地表植物学家相关研究，它属于“克里弗斯之果“的变种，由于她有着非常美丽的外貌，地表的植物学家们也将它称为”克璃诺斯之果“，并戏称它是克里弗斯之果的姐姐。\n\n极少有冒险者能对这株植物作出描述，在得到的只言片语中，你唯一能确定的就是“它是森林至暗的中心”。\n\n另外，根据最新调查，它也算森林的意志……
actors.mobs.bosses.notsync.crivusstarfruits.notice=它正在不断的跳动，犹如一颗鲜活的心脏……
actors.mobs.bosses.notsync.crivusstarfruits.died=就在你以为它要爆炸前，所有的藤蔓都开始向它注入能量……，看起来他们非常团结。摧毁这些藤蔓，否则后果不堪设想……
actors.mobs.bosses.notsync.crivusstarfruits.ondeath=你错过了最佳良机，它终于彻底发怒，你被藤蔓缠住，再也不能动弹……

actors.mobs.bosses.notsync.crivusstarfruitslasher.name=晶化藤
actors.mobs.bosses.notsync.crivusstarfruitslasher.desc=藤蔓没有智慧，它们的存在价值就是保护果实。不论是不小心靠近果实的“小动物”，还是企图清理枯藤更进一步的冒险者，都被这些藤蔓绞死成孕育果实的肥料了。\n\n它们将周期性释放毒气到目标处，并周期用藤曼抓住目标进行猎食。与它的近亲不同，魔化藤由于可以挥发出更加强大的酸蚀气体曾被地表曦月协会评定为一级威胁！！！
actors.mobs.bosses.notsync.crivusstarfruitslasher.scorpion=捕 食 ，给 养 ……
actors.mobs.bosses.notsync.crivusstarfruits.anargy=就在触手全部死亡的一刻，你发现中心的果子变得异常狂暴……

actors.mobs.bosses.notsync.crivusstarfruitslasher.xling=_在克璃诺斯之果变得狂暴后，一团新的藤蔓从地下冒出，并变得更具威胁。然而和上次不同的是，这次的由于本体在不断传递触手能量，所以新的一批晶化藤完全无法被摧毁。唯一的方法是摧毁它的本体……_
actors.mobs.bosses.notsync.crivusstarfruitslasher.xlin=_由于本体现在变得虚弱，所以族群需要给予它新的力量，由于力量正在向本体注入，这让坚不可摧的它们变得脆弱不堪。你现在可以攻击它们了。_\n\n不过由于它们曾经猎杀了很多生物，所以对魔法拥有抗性，你无法通过魔法伤害它。

//森林质问
actors.mobs.bosses.notsync.crivusstarfruits.goodbye_1=你真的认为你能拯救森林吗？
actors.mobs.bosses.notsync.crivusstarfruits.goodbye_2=其实我们都有罪，我们谁也逃不脱即将到来的真正末日……
actors.mobs.bosses.notsync.crivusstarfruits.goodbye_3=腐化，毁灭……你们的罪孽终将被揭露……
actors.mobs.bosses.notsync.crivusstarfruits.goodbye_4=森林的命运，不再你我能决定……
actors.mobs.bosses.notsync.crivusstarfruits.goodbye_5=现在的森林，正处于一种平衡状态，为何你还要将它打破？
actors.mobs.bosses.notsync.crivusstarfruits.goodbye_6=纯晶封印了腐化的根源，而你们却在试图将它解开……
actors.mobs.bosses.notsync.crivusstarfruits.goodbye_7=我即为森林的意志，你们不可再继续前进……

actors.mobs.bosses.notsync.crivusstarfruits.dead_1=协助破坏森林平衡的你们，早就已经失去了理智。
actors.mobs.bosses.notsync.crivusstarfruits.dead_2=你们的罪恶，将永远伴随着你们的灵魂。
actors.mobs.bosses.notsync.crivusstarfruits.dead_3=你们应该在地狱，而不是在森林。

actors.mobs.bosses.notsync.crivusstarfruits.dead=森林的命运，会前往何处呢？

actors.mobs.bosses.notsync.crivusstarfruits.explo_kill=你被克璃诺斯的爆炸杀掉了……
actors.mobs.bosses.notsync.crivusstarfruits$rage.name=族群意识
actors.mobs.bosses.notsync.crivusstarfruits$rage.desc=它的子嗣正在将自己的能量给予本体，你感觉附近的能量非常不妙，应该尽快摧毁它的子嗣！或它本身！！！\n\n在最终阶段，如果族群让它回到93血及以上，一旦英雄被发现，每16回合遭遇_森林质问_技能，技能会造成}法术伤害} \n\n非英雄的盟友单位，每8回合遭遇_森林审判_技能，技能会造成{真实伤害{

actors.mobs.bosses.notsync.clearelemtguard.name=纯晶护卫长
actors.mobs.bosses.notsync.clearelemtguard.desc=这是一位全副武装的人类，装备着精良的护甲，看上去相当坚硬很难对付。\n\n他手里的大剑似乎在警告你远离他。但当你细细观察他的面貌时，不由得想起了丛林的纯晶元素。\n\n看起来他现在的状态不是很好，或许强大的卷轴可以帮助他……
actors.mobs.bosses.notsync.clearelemtguard.clear_1=你尝试净化他，但仍然看见黑气从中冒出，也许需要更多的祛邪卷轴
actors.mobs.bosses.notsync.clearelemtguard.clear_2=你终于净化了他，但他似乎仍然处于理智混乱状态，看来需要打一架了……
actors.mobs.bosses.notsync.clearelemtguard.attack=你是......！可恶，哪怕粉身碎骨，我也要在这里阻止你！！！
actors.mobs.bosses.notsync.clearelemtguard.kill=终于还是......没能挽回......

actors.mobs.bosses.notsync.clearelemtguardnpc.name=法伊娜
actors.mobs.bosses.notsync.clearelemtguardnpc.desc=这是一位全副武装的人类，装备着精良的护甲，看上去相当坚硬很难对付。\n\n他手里的大剑似乎在警告你远离他。但当你细细观察他的面貌时，不由得想起了丛林的纯晶元素。

actors.mobs.bosses.notsync.fayina.name=法伊娜
actors.mobs.bosses.notsync.fayina.desc=这是刚才那位全副武装的他吗？没想到盔甲下的面貌竟是如此美丽。
actors.mobs.bosses.notsync.fayina.message1=这套铠甲可真笨重，我先脱下来……嗯？
actors.mobs.bosses.notsync.fayina.message2=你竟然侥幸回来了？感觉怎么样？什么，你击败了火龙？别开玩笑了，你能活着回来已经是奇迹了。

actors.mobs.bosses.notsync.fayina.info=如果你的真的击败了火龙的话，你应该有一个火龙之心……
actors.mobs.bosses.notsync.fayina.take_firedragon_heart=给予火龙之心
actors.mobs.bosses.notsync.fayina.message3=这，这是火龙的心脏吗？！%s，你真的击败了火龙吗？

actors.mobs.bosses.notsync.fayina.info_2=在路上，你有没有看见......过去那些守卫们的遗体？
actors.mobs.bosses.notsync.fayina.take_cry=没有
actors.mobs.bosses.notsync.fayina.look=请看这个

actors.mobs.bosses.notsync.fayina.message4a=......啊，也是，都很久了吧，他们的遗体可能已经沉下去了。总之，%s，我代表绿林圣境感谢你，你的英勇与功绩将会被我们永远铭记。我会告诉其他纯晶护卫的，以后他们也会帮你的忙。现在，请让我一个人安静下......
actors.mobs.bosses.notsync.fayina.message4b=这是......纯晶元素......你找到他们了？
actors.mobs.bosses.notsync.fayina.message5=....好的，谢谢你。我会找个合适地方埋葬的。总之，%s，我代表绿林圣境感谢你，你的英勇与功绩将会被我们永远铭记。我会告诉其他纯晶护卫的，以后他们也会帮你的忙。现在，请让我一个人安静下......
actors.mobs.bosses.notsync.fayina.info_3=那么，现在能说实话了吗？
actors.mobs.bosses.notsync.fayina.i=继续对话

actors.mobs.bosses.notsync.fayina.message6=什么？我说的都是真话！我的确没有理由骗你！
actors.mobs.bosses.notsync.fayina.message7=唉，算了，先让我静静吧。
actors.mobs.bosses.notsync.fayina.message8=她看起来不像在撒谎，可是，肯定是有哪里不对......

actors.mobs.npcs.zero.zerotomb.name=苍白剑冢
actors.mobs.npcs.zero.zerotomb.desc=上面刻着一系列名字\n\n丛林已经得到净化。我们终将重逢，战友们。

actors.mobs.bosses.notsync.fayina.roll1=火龙事件已经平息，感谢你的帮忙，%s。
actors.mobs.bosses.notsync.fayina.roll2=每每望向这些剑冢，我总还能想起他们的模样……
actors.mobs.bosses.notsync.fayina.roll3=愿他们的灵魂得到安息，愿丛林永远苍绿。
actors.mobs.bosses.notsync.fayina.roll4=冒险者，你是我见过最勇敢的。
actors.mobs.bosses.notsync.fayina.roll5=霜月协会的会长似乎下落不明，也许她也被困在地牢里面了。
actors.mobs.bosses.notsync.fayina.roll6=我已经很久没有看见地表了，冒险者，谢谢你……
actors.mobs.bosses.notsync.fayina.roll7=看见这座墓碑了吗，这里曾经都是我的战友……
actors.mobs.bosses.notsync.fayina.roll8=如果你还想去讨伐火龙，我的棱镜也许能帮上忙。

actors.mobs.bosses.notsync.clearelemtguard.cant_enter_a=你需要寻找纯晶护卫长，只有他知晓解除封印的方法……
actors.mobs.bosses.notsync.clearelemtguard.cant_kill_fire=在没有处理掉威胁前无法离开这里……
actors.mobs.bosses.notsync.clearelemtguard.cant_enter_b=本局游戏探索深度已超过11层，无法再前往熔岩火林……
actors.mobs.bosses.notsync.clearelemtguard.cant_enter_c=洞穴已经坍塌，请不要打完全部的战斗再来讨伐火龙
actors.mobs.bosses.notsync.clearelemtguard.message1=.....你赢了，杀了我吧......

actors.mobs.bosses.notsync.clearelemtguard.message2=你......等等，你是冒险家？
actors.mobs.bosses.notsync.clearelemtguard.message3=抱歉......谢谢你救了我，我的记忆仍然停留在那个时间，把你当成敌人了。
actors.mobs.bosses.notsync.clearelemtguard.message4=我是圣境密林的护卫长，你可以叫我法伊娜。
actors.mobs.bosses.notsync.clearelemtguard.message5=不知多久以前，我们发现“奥克拉赫”之花似乎出现了被腐蚀的迹象，追根溯源，我们发现腐蚀的力量来自圣境密林的最底层，也就是熔岩地块区域。
actors.mobs.bosses.notsync.clearelemtguard.message6=我带着数名纯晶元素下到那里，发现不知何时，原本已据传沉睡了万年的火龙苏醒了，并把那里占为自己的巢穴。
actors.mobs.bosses.notsync.clearelemtguard.message7=原先生活在那里的生物也收到了腐蚀的影响，变成了只听从火龙命令的行尸走肉。
actors.mobs.bosses.notsync.clearelemtguard.message8=我们下到那里后便遭到了包围，尽管我挑选了我们之中最精英的守卫，我们还是因寡不敌众全部倒在了那里。最终，只剩下了我一个。
actors.mobs.bosses.notsync.clearelemtguard.message9=我记不太清最后发生了什么了，最后的记忆就是我被什么东西封印了，再然后就在这里看见了你......
actors.mobs.bosses.notsync.clearelemtguard.message10=对了，刚刚的袭击，真的很抱歉......

actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt=你要杀死“纯晶护卫长”吗？
actors.mobs.bosses.notsync.clearelemtguard.enter_yes=杀死他
actors.mobs.bosses.notsync.clearelemtguard.enter_no=扶起他

actors.mobs.bosses.notsync.clearelemtguard.reason_ling=%s，在你真的准备前往熔岩火林我要告诉你的是，火龙非常危险，而且里面已经一片死寂。\n\n你一定要万般小心，另外，那里曾经也是我和战友战斗的地方，如果可以的话，我希望你能找到_“剑冢"_，将他们带回来……
actors.mobs.bosses.notsync.clearelemtguard.enter_letsgo=立刻前往
actors.mobs.bosses.notsync.clearelemtguard.enter_nonx=暂不前往

actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt2=面对他的说辞……
actors.mobs.bosses.notsync.clearelemtguard.enter_yes2=真不幸！
actors.mobs.bosses.notsync.clearelemtguard.enter_no2=你在撒谎！

actors.mobs.bosses.notsync.clearelemtguard.sad_a=你将武器插进了他的胸口，他至始至终没有倒下。
actors.mobs.bosses.notsync.clearelemtguard.pro_a=你轻轻的扶起了他……


actors.mobs.bosses.notsync.clearelemtguard.sad_b=是啊，唉，我活下来又有什么用呢......嗯，总之谢谢你了。这个就给你了，算是我的一点歉意。
actors.mobs.bosses.notsync.clearelemtguard.pro_b=什么？我没必要对你撒谎，我讲的都是真话。

actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt3=可是，你说的话听起来很奇怪。
actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt4=我去吧。
actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt5=告诉我下去的方法。
actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt6=否则，圣境密林将化为腐化森林。
actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt7=绿林圣域也将受到污染。
actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt8=这难道也是你想看到的吗？

actors.mobs.bosses.notsync.clearelemtguard.enter=继续对话

actors.mobs.bosses.notsync.clearelemtguard.pro_c=如果你不愿相信就算了吧，反正这事已经发生了，圣境密林已经难逃厄运......
actors.mobs.bosses.notsync.clearelemtguard.pro_d=别开玩笑了，你这副装备下去不过是送死而已。
actors.mobs.bosses.notsync.clearelemtguard.pro_e=不行，我怎么能眼睁睁地看着别人向死亡走去？
actors.mobs.bosses.notsync.clearelemtguard.pro_f=………………
actors.mobs.bosses.notsync.clearelemtguard.pro_g=……………………
actors.mobs.bosses.notsync.clearelemtguard.pro_h=………………………………

actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt9=曾经，我遇到过一个冒险家，他告诉我要找到传说中的水晶之心，可最后，他却被偷袭，倒在了“奥克拉赫”之花之前。\n\n我还遇到过另一个冒险家，她告诉我她要镇压地牢的诅咒，可最后，她却被诅咒反噬，还让霜寒席卷了地牢。\n\n冒险家，我赞善你们人类的勇气，但是，我不希望这样的悲剧再次发生了......你真的去意已决？
actors.mobs.bosses.notsync.clearelemtguard.yesgo=是的

actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt10=好，对了，冒险家，你叫什么名字？
actors.mobs.bosses.notsync.clearelemtguard.myname=%s
actors.mobs.bosses.notsync.clearelemtguard.thanks=%s，我替圣境密林所有纯晶守卫者谢谢你的帮助！
actors.mobs.bosses.notsync.clearelemtguard.thanks2=%s，通往熔岩火林的封印已经解除，请你在本层寻找入口，一定要小心，希望你能活着回来……

actors.mobs.bosses.notsync.clearelemtguard.no_road=%s，我挡着你的道了吗？抱歉哦……

actors.mobs.bosses.notsync.clearelemtguard.quest_start_prompt11=在这一层下楼的楼梯里有个密道，我已经解除了那里的封印，另外，由于曾经我们和它交过手，路上应该有一些物资，也许可以帮到你。\n\n对了，这个给你，算是我代表密林守卫提供给的一点微小的帮助吧。
actors.mobs.bosses.notsync.clearelemtguard.let=出发吧

actors.mobs.bosses.notsync.clearelemtguard.namex=给予帮助？
actors.mobs.bosses.notsync.clearelemtguard.cashout_verify=看起来他现在的状态不是很好，或许祛邪卷轴可以帮助他……
actors.mobs.bosses.notsync.clearelemtguard.cashout_yes=是的，给予！
actors.mobs.bosses.notsync.clearelemtguard.cashout_no=不，我暂时不想。
actors.mobs.bosses.notsync.clearelemtguard.cashout_none=你的背包中没有更多的祛邪卷轴了……

####NEW

actors.mobs.bosses.qliphoth.name=克里弗斯之果
actors.mobs.bosses.qliphoth.explo_kill=在最后关头，克里弗斯之果巨大的爆炸将你炸的渣都不剩……
actors.mobs.bosses.qliphoth.desc=这颗鲜红的果实将周围一切生物都化作自身的养分。身旁的触手会将不慎走进的小动物们绞杀，腐化成缠绕在四周的瘴气。但当它们感受到你手上拿着的提灯时，却表现出畏惧火焰的样子。\n\n极少有冒险者能对这株植物作出描述，在得到的只言片语中，你唯一能确定的就是“它是森林至暗的中心”。
actors.mobs.bosses.qliphoth.notice=触手正在不断蠕动，试图靠近你。
actors.mobs.bosses.qliphoth.summon=中间的果子拍打着地面，新生的藤蔓卷土重来。
actors.mobs.bosses.qliphoth.an_argy=所有藤蔓都被摧毁，果子暴怒着拍打地面，它似乎要开始对你发起袭击了！
actors.mobs.bosses.qliphoth.dead=养分……汲取……失败……，果实破裂声中貌似夹杂着一丝悲鸣。
actors.mobs.bosses.qliphoth.onlyfish=_幻影鱼尚未死亡之前，果子处于无敌状态。_
actors.mobs.bosses.qliphothlasher.name=克里弗斯之藤
actors.mobs.bosses.qliphothlasher.desc=藤蔓没有智慧，它们的存在价值就是保护果实。不论是不小心靠近果实的“小动物”，还是企图清理枯藤更进一步的冒险者，都被这些藤蔓绞死成孕育果实的肥料了。\n\n_这根藤蔓将会周期性对距离4格内的可见英雄发起攻击，造成残废效果，并每回合回复两点血量。_\n\n对于非英雄单位，触手将伸出枝干将其捕获并蚕食。
actors.mobs.bosses.qliphothlasher.rankings_desc=被克里弗斯之果的藤蔓缠绕窒息而死.....
actors.mobs.bosses.crivusfruits$diedblobs.rankings_desc=被克里弗斯之果的红雾气体窒息而死.......
actors.mobs.bosses.crivusfruits$diedblobs.name= 致命红雾
actors.mobs.bosses.qliphoth$invisibility_fogs.desc=被果子绞死的生物形成的一个瘴气区域，你可能感觉到恶心，所以视野会降低。但这些尸骨形成的气体或许可以让果子的藤蔓认为你是死物。
actors.mobs.bosses.crivusfruits.name=克里弗斯之果
actors.mobs.bosses.crivusfruits.desc=这颗鲜红的果实将周围一切生物都化作自身的养分。身旁的触手会将不慎走进的小动物们绞杀，腐化成缠绕在四周的瘴气。但当它们感受到你手上拿着的提灯时，却表现出畏惧火焰的样子。\n\n极少有冒险者能对这株植物作出描述，在得到的只言片语中，你唯一能确定的就是“它是森林至暗的中心”。
actors.mobs.bosses.crivusfruits.notice=触手正在不断蠕动，试图靠近你
actors.mobs.bosses.crivusfruits.anargy=触手的蠕动变为猛烈抽搐，拍打中释放出更多有毒气体
actors.mobs.bosses.crivusfruits.died!!!=所有藤蔓都停止了抽动，果实的颜色似乎更加鲜红了
actors.mobs.bosses.crivusfruits.!!!=克里弗斯之果正在汲取魔力释放范围更大的红色毒雾!
actors.mobs.bosses.crivusfruits.dead=养分……汲取……失败……，果实破裂声中貌似夹杂着一丝悲鸣。
actors.mobs.bosses.crivusfruits.weapon=你已经连续3局未获得生命树，触发保底机制，同时你的保底机制次数重置为0。

actors.mobs.bosses.crivusfruits$diedblobs.desc=一团红色的毒雾从克里弗斯之果周围散发而出，你的潜意识告诉你这种东西会对你造成极大的伤害。
actors.mobs.bosses.crivusfruits$diedblobs.csed=果实爆开后迸射出一些气味清新的红色气体，用来做空气清新剂似乎挺不错的。

actors.mobs.bosses.crivusfruitslasher.name=魔化藤
actors.mobs.bosses.crivusfruitslasher.desc=藤蔓没有智慧，它们的存在价值就是保护果实。不论是不小心靠近果实的“小动物”，还是企图清理枯藤更进一步的冒险者，都被这些藤蔓绞死成孕育果实的肥料了。
actors.mobs.bosses.crivusfruitslasher.frost_kill=克里弗斯之果发出的酸蚀气雾彻底杀死了你……
actors.mobs.bosses.crivusfruits.frost_kill=克里弗斯之果发出的酸蚀气雾彻底杀死了你……

