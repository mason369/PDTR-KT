actors.mobs.npcs.magehand.name=法师之手
actors.mobs.npcs.magehand.desc=战斗巫女身旁的随从，能够通过各类法杖提供各类支援，并且自身完全无敌。
actors.mobs.npcs.magehand.wand_equipped=法师之手装配了%s，现在它将为你保驾护航。
