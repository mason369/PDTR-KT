actors.mobs.bosses.bossrush.rival.ellipsis=或许，你能拯救这里……

actors.mobs.bosses.bossrush.skygoo.blob=血雾气体\n这里散发着一股异常刺鼻的气体，无论是你还是怪物们都受不了。还是尽快从气体中脱身为好。
actors.mobs.bosses.bossrush.skygoo.rd=绝望的尽头，便是希望的光明。
actors.mobs.bosses.bossrush.skygoo.ss=用你的血换我的重生！
actors.mobs.bosses.bossrush.skygoo.zl=在烈焰与雷电中毁灭吧！
actors.mobs.bosses.bossrush.skygoo.leap=很快就到你家门口……
actors.mobs.bosses.bossrush.skygoo.name=天痕粘咕
actors.mobs.bosses.bossrush.skygoo.notice=发现入侵者，封闭所有出口！\n全员警戒，做好战斗准备。
actors.mobs.bosses.bossrush.skygoo.slime=出来吧，我的军队！交给你们了！
actors.mobs.bosses.bossrush.skygoo.defeated=你是我见过的第一个能与我匹敌的对手，我知道你的目的，我们还会再见面的！\n你们根本不懂_地下深处_有什么_可怕的东西_！\n我期待与你再次见面！
actors.mobs.bosses.bossrush.skygoo.run=天痕结束了本次战斗，并放你走了。
actors.mobs.bosses.bossrush.skygoo.!!!=你！
actors.mobs.bosses.bossrush.skygoo.pumpup=我不知道你的目的是什么，但必须将你处决！
actors.mobs.bosses.bossrush.skygoo.enraged=你彻底惹毛我了！
actors.mobs.bosses.bossrush.skygoo.lj=就这？就这？垃圾玩意，回家洗洗睡吧！
actors.mobs.bosses.bossrush.skygoo.gluuurp=你为何要让我毁约？
actors.mobs.bosses.bossrush.skygoo.rankings_desc=被天痕粘咕超度！
actors.mobs.bosses.bossrush.skygoo.desc=在那场灾难性事件后，丛林开始疯狂生长，曾经的它也渐渐被人遗忘，然后，这并没有让它就此放下一切，在这次特殊调查中，你见到了这位老朋友……。\n\nBossRush特殊头目
actors.mobs.bosses.bossrush.skygoo.zap_kill=闪电球将你彻底击杀…
actors.mobs.bosses.bossrush.skygoo.$lightningbolt.rankings_desc=被天痕粘咕用闪电制裁！

actors.mobs.npcs.hkd.name=小骑士
actors.mobs.npcs.hkd.desc=来自于另一个维度的访问者，正在旅馆这里休息……
actors.mobs.npcs.hkd.id_1=哇，你也来到这里了，啥，我为啥在这？因为这个地牢看上去很有趣的样子，所以我也下来了。
actors.mobs.npcs.hkd.id_2=接着深入的话，风险似乎太高了，而且我状态不佳，是时候该返程了，这东西我也用不上了，送你吧。
actors.mobs.npcs.hkd.id_3=前方路不平，山水有相逢，来日有缘再见啦。

### ZERO
actors.mobs.npcs.zero.hollowknight.name=小骑士
actors.mobs.npcs.zero.hollowknight.desc=来自另一个维度的访问者，正在旅馆这里休息……
actors.mobs.npcs.zero.hollowknight.message1=又是一个冒险者吗？这里可真热闹啊…我才来这里这么一段时间，就有这么多冒险者来到这里了。
actors.mobs.npcs.zero.hollowknight.message2=话说，我怎么感觉你很眼熟？呵，也许是我认错了吧，毕竟我见过这么多人了，那些人中肯定有跟你长得像的人，得，看在你眼熟的份子上，这东西就送给你吧。
actors.mobs.npcs.zero.hollowknight.message2b=话说，我怎么感觉你很眼熟？呵，也许是我认错了吧，毕竟我见过这么多人了，那些人中肯定有跟你长得像的人，得，看在你眼熟的份子上，这_1金币_就送给你吧。
actors.mobs.npcs.zero.hollowknight.message3=你也是和以前的那些人一样，要去那个叫地牢的地方吗？
actors.mobs.npcs.zero.hollowknight.message4=哦，你还在这呀，还不下地牢吗？啊，我为啥在这？我是个旅行者的了，一路飘飘荡荡就来到这了，在这里整顿歇息，也许过段时间我就会离开了？
actors.mobs.npcs.zero.hollowknight.message5=你是真的无聊啊，为啥还在听我讲话？你要真的无聊的话，应该下地牢啊？
actors.mobs.npcs.zero.hollowknight.message6=哇，你可真有毅力，如果真这么闲的话，要不要听听我旅游途中的经历？罢了，开玩笑，真讲起来，一天一夜都说不完。
actors.mobs.npcs.zero.hollowknight.message7=我讲都想累了…你可真有耐心啊，得得得，赶紧展开旅途吧，别跟我唠嗑了。

actors.mobs.npcs.zero.hollowknight.d1=我闪！
actors.mobs.npcs.zero.hollowknight.d2=我忍
actors.mobs.npcs.zero.hollowknight.d3=咋了？你心情不好吗？
actors.mobs.npcs.zero.hollowknight.d4=心情就算不好，这时候应该也发泄够了吧？
actors.mobs.npcs.zero.hollowknight.d5=我告诉你，我虽然脾气好，但我也是有极限的
actors.mobs.npcs.zero.hollowknight.d6=死！
actors.mobs.npcs.zero.hollowknight.kill=一股虚无的力量侵蚀了你……
actors.mobs.npcs.zero.hollowknight.rankings_desc=|被虚空侵蚀而亡|

actors.mobs.npcs.zero.waloke.name=罗恩

actors.mobs.npcs.zero.waloke.desc=在你首次拜访雪凛峡谷后，他来到了这里……\n\n你也许可以和他进行交流。
actors.mobs.npcs.zero.waloke.message1=你好，%s。我们又见面了……
actors.mobs.npcs.zero.waloke.message2=我叫罗恩，是商人的领主。在上次你通过莲娜试炼后，她便让我来到小镇这里等你。
actors.mobs.npcs.zero.waloke.message3=莲娜曾经也是五大魔女的代理人，直到那件事之后，一切都变了……
actors.mobs.npcs.zero.waloke.message4=现在，这个小镇远比你想象的更危机四伏。而时间线则是更加错综复杂的……
actors.mobs.npcs.zero.waloke.message5=你觉得自己足够了解这个世界吗？如果你觉得是的话，我这里有莲娜为你安排的一些地区调查……你可以通过小镇右上角的传送台前往。
actors.mobs.npcs.zero.waloke.message6=严格来讲，更算是多重宇宙的映像。这个世界不止一个你，在平行世界中，你可能还会经历更多……
actors.mobs.npcs.zero.waloke.message7=你需要前去调查这些平行宇宙，并发现能量来源，因为那场纵火案并不是意外，莲娜知道一切，但现在她不能开口……
actors.mobs.npcs.zero.waloke.message8=话就说到这里，另外由于在下是商人领主，所以仍然会收一点服务费。货币会使用那个女人发行的货币……
actors.mobs.npcs.zero.waloke.message9=嗯，当你今后调查到更多东西时，我会与你继续对话……，现在，祝你在异世界，平行宇宙的探索中好运……

actors.mobs.npcs.zero.waloke.descx=这里便是各个时间线的调查了，由于目前莲娜的力量还比较弱，所以目前能去的地方不多。\n\n另外，如果你前往那个被强大的怪物盘旋的地方，那里的莲娜是真正的魔女，你切记万分小心。\n\n启用后你还需要选择映像，然后才可开始调查。


actors.mobs.npcs.zero.waloke.quest_start_prompt=在进行正式调查前，你需要进行一些抉择……
actors.mobs.npcs.zero.waloke.easy=基本映像-简单
actors.mobs.npcs.zero.waloke.normal=试炼映像-常规
actors.mobs.npcs.zero.waloke.hard=炼狱映像-困难
actors.mobs.npcs.zero.waloke.hell=梦魇映像-噩梦
actors.mobs.npcs.zero.waloke.br_no_clear=必须游玩一局BossRush且获得_起始归一_隐藏徽章后才能游玩噩梦难度。

actors.mobs.npcs.zero.waloke.quest_start2_prompt=你将开始进行新的一轮深度调查，祝你好运！
actors.mobs.npcs.zero.waloke.randmode=立刻前往

actors.mobs.npcs.zero.luowhite.name=落白
actors.mobs.npcs.zero.luowhite.desc=一位带着方礼帽，披着斗篷的男性，据说是位有名的收藏家，他在这里经营着一家武器店，去看看能买到什么有用的吧。
actors.mobs.npcs.zero.luowhite.message_ice=欢迎光临，冒险者。看起来你是第一次来到这里吧，这30钴币给你当做见面礼了哦。
actors.mobs.npcs.zero.luowhite.message_ice2=欢迎光临，冒险者。看起来这个世界又进行了一些变化呢。这%d钴币就当做是我的礼物了。
actors.mobs.npcs.zero.luowhite.message1=欢迎光临，冒险者，想买些什么吗？
actors.mobs.npcs.zero.luowhite.descx=欢迎光临，%s，想买些什么吗？\n\n商店只进了这些货物，不过，开业福利，解锁传说武器时赠送一把战损版，先到先得，概不退货。
actors.mobs.npcs.zero.luowhite.message3=你来晚了，冒险者，这里已经售罄了。

actors.mobs.npcs.zero.whiteyan.name=白宴
actors.mobs.npcs.zero.whiteyan.desc=一位白发的少女，头发长的可以影响运动了。看起来天真呆然的样子，应该是十分友善的。
actors.mobs.npcs.zero.whiteyan.message1=哈啊~，是没见过的朋友吗，找我有什么事吗~
actors.mobs.npcs.zero.whiteyan.message2=想要去下面吗，为什么呢？下面很危险的，这么不爱惜生命吗？
actors.mobs.npcs.zero.whiteyan.message3=我头发为什么这么长？长长的不好看吗awa
actors.mobs.npcs.zero.whiteyan.message4=我和别人看起来不一样？那每个人肯定不一样啊
actors.mobs.npcs.zero.whiteyan.message5=特别的不一样？是不是更可爱？
actors.mobs.npcs.zero.whiteyan.message6=你是不决定下去了吗？这么有时间和我聊？
actors.mobs.npcs.zero.whiteyan.message7=哦！你是想从我这要东西是吧，和别人一样
actors.mobs.npcs.zero.whiteyan.message8=嗯？我怎么知道你从别人拿东西，那不重要
actors.mobs.npcs.zero.whiteyan.message9=嘿嘿，你为什么觉得我这一定有东西可以拿呢，我明明什么都没有
actors.mobs.npcs.zero.whiteyan.message10=真没有东西啦，你找我我也给不了你
actors.mobs.npcs.zero.whiteyan.message11=真没有东西，别这样闹
actors.mobs.npcs.zero.whiteyan.message12=我...
actors.mobs.npcs.zero.whiteyan.message13=......


actors.mobs.npcs.zero.yetyog.name=泡泡
actors.mobs.npcs.zero.yetyog.desc=不知为何，你隐约觉得眼前的少女和地牢最深处的存在有某种微妙的关系？不过至少现在，她看起来只是一位有些神秘的少女而已。
actors.mobs.npcs.zero.yetyog.message1=吾即全知，全能，亦全视。你也想触及时空的门扉吗？
actors.mobs.npcs.zero.yetyog.message2=你所追寻的，是世界的本质，是禁忌的知识，是无上的力量，还是说……
actors.mobs.npcs.zero.yetyog.message3=也许触及另一个纬度的智慧对你而言为时尚早，此时，也许对现实的部分揭露会对你更有价值一些。
actors.mobs.npcs.zero.yetyog.message4=我会一直注视着你的，孩子。
actors.mobs.npcs.zero.yetyog.def_verb_1=一切归于尘埃之时……
actors.mobs.npcs.zero.yetyog.def_verb_2=奈亚她商店的生意真的很不错呢……
actors.mobs.npcs.zero.yetyog.def_verb_3=孩子，不要怕，我们会一直注视着你的……

actors.mobs.npcs.zero.mint.n=正在睡觉的猫咪
actors.mobs.npcs.zero.mint.name=薄绿
actors.mobs.npcs.zero.mint.x=希望这本书能帮到你哦~，祝你冒险顺利~
actors.mobs.npcs.zero.mint.d=它压着一本陈旧的硬皮书。在真正被咬之前，没人知道这本书会不会咬人。
actors.mobs.npcs.zero.mint.desc=来自异界的兽耳娘，正在对打扰她睡觉的人表示疑惑。
actors.mobs.npcs.zero.mint.message1=你有没有问过自己，你的这份执着，究竟从何而来？
actors.mobs.npcs.zero.mint.message2=看起来你似乎什么也没有，要不要我变个魔术？就……送你一本书吧。
actors.mobs.npcs.zero.mint.message3=别眨眼，来看我变个魔术吧。
actors.mobs.npcs.zero.mint.message4=这本我变出来的书有着这个世界的印记，它应该能帮到你。嘿嘿，为什么我要帮你，我感觉你有一点像他，当然这是我们之间的秘密。绝对不可以告诉别人哦。
actors.mobs.npcs.zero.mint.message5=祝你旅途愉快，%s。诶，我怎么会知道你的名字，这是秘密哦~~

actors.mobs.npcs.zero.whiteling.name=澪
actors.mobs.npcs.zero.whiteling.desc=谁也不知道她从何处来，她偶尔会来到雪景旅馆休息。\n\n如果你遇到她了，不妨试试和她搭讪看看吧。
actors.mobs.npcs.zero.whiteling.message1=你好，%s，我们已经认识了有一段时间了吧。
actors.mobs.npcs.zero.whiteling.message2=我想你应该知道我是谁了。不过，由于一些因素，我现在仍然只能为你默默祈祷。
actors.mobs.npcs.zero.whiteling.message3=冬铃和莲娜她们都是好孩子呢，感谢你救了她们。而在更早之前我还关押了一名魔女，这是出于一点私人恩怨。讽刺的是，我和她都失去了曾经所珍视的东西……
actors.mobs.npcs.zero.whiteling.message4=%s，请继续调查下去吧。当然，如果遇到了那位魔女，请不要惊慌。她的本性是善良的，所以我选择将她长期囚禁，而非彻底处决。不过，我的力量有限，也无暇顾及于巩固那个封印了。希望你能让她放弃那些极端的想法，我们从来就不必为敌……
actors.mobs.npcs.zero.whiteling.a_message5=今天说的多了些，可能是因为新年的气氛让我想起了一些什么吧，还请你多多理解。带上这项链吧，它的力量虽然微弱，但也能为你抚平许多伤痛。
actors.mobs.npcs.zero.whiteling.b_message5=这杆法杖也请收下吧。如今它对我而言已无作用，但对你而言或许是冒险的一大助力。
actors.mobs.npcs.zero.whiteling.message6=时间差不多了，我们下次见吧，%s，祝你好运……
actors.mobs.npcs.zero.whiteling.c_message1=她已经不再理你，看起来像是睡着了……
actors.mobs.npcs.zero.whiteling.c_message2=周围盘旋起了水晶粒子，似乎在保护着她。
actors.mobs.npcs.zero.whiteling.c_message3=还是不要再打扰她了吧.......
actors.mobs.npcs.zero.whiteling.def_verb_1=愿世界祝福你……
actors.mobs.npcs.zero.whiteling.def_verb_2=你会获得救赎吗？

actors.mobs.npcs.zero.zako.name=喵音·椛
actors.mobs.npcs.zero.zako.desc=一只可爱的的天狗少女，萝卜地牢群的群宠之一，在这个地牢的任务是给大家提供饭菜(虽然不免费)。走过路过就尝一尝吧。\n\n对了，不要叫她杂鱼酱哦。小心她生气哦。
###First
actors.mobs.npcs.zero.zako.message1=你好惹！你也是要去地牢吗，唔——那里很危险呢，一定要小心哦。
###Second
actors.mobs.npcs.zero.zako.message2=啊，对了 这个给你哦。
actors.mobs.npcs.zero.zako.message3=啊，什么 有点湿？
actors.mobs.npcs.zero.zako.message4=唔。。。好像是我睡觉的时候流的口水啦\n\n可恶！才 才不是杂鱼！
###SRD
actors.mobs.npcs.zero.zako.message5=咕，人家不是杂鱼啊！
actors.mobs.npcs.zero.zako.message6=可恶。。。再叫我杂鱼的话……
actors.mobs.npcs.zero.zako.message7=唔？ 你要走了吗\n\n如果。。。如果回来的话我就允许你叫我  叫我杂鱼
###Amulet
actors.mobs.npcs.zero.zako.message8=唔！回来了呢！算了，开心就好呢，虽然还是喊我杂鱼。。。

actors.mobs.npcs.zero.mooncat.name=月华
actors.mobs.npcs.zero.mooncat.desc=这是一个外貌似猫的人形生物，通体光滑雪白。据传闻称其曾经是盾卫或废品商人之类的，不过他看起来什么也没带。
actors.mobs.npcs.zero.mooncat.amulet_desc=一个外貌似猫的人形生物，不过他拿着一张巨大的盾。
actors.mobs.npcs.zero.mooncat.def_verb_1=干什么！
actors.mobs.npcs.zero.mooncat.def_verb_2=你这小孩！
actors.mobs.npcs.zero.mooncat.message1=我曾经是个盾卫，直到我的盾被偷了。
actors.mobs.npcs.zero.mooncat.message2=其实我还有一柄单手剑，不过也被偷了。
actors.mobs.npcs.zero.mooncat.message3=这个给你，希望你能用得上。
actors.mobs.npcs.zero.mooncat.message4=祝你好运，冒险者。

actors.mobs.npcs.zero.gudazi.name=古达子
actors.mobs.npcs.zero.gudazi.desc=来自异邦的英雄，不远万里从罗德尔的迦勒底来到此处，不知道祂是否要在这里寻找些什么。
actors.mobs.npcs.zero.gudazi.message1=你好啊又见面了。
actors.mobs.npcs.zero.gudazi.message2=如果不着急的话就陪我们在篝火边坐一坐吧，感受一下这难得的温暖。
actors.mobs.npcs.zero.gudazi.message3=啊对了我们现在正在烤肉你要来一块吗？
actors.mobs.npcs.zero.gudazi.message4=你是不是觉得这个城镇太荒凉了？没关系之后还会有更多人过来的。
actors.mobs.npcs.zero.gudazi.message5=哦对了其实最危险不是地牢里面，最危险的其实是地面。
actors.mobs.npcs.zero.gudazi.message6=可惜了这里没有酒馆不然我还能去抽两张卡...
actors.mobs.npcs.zero.gudazi.message7=啊~好想抽卡.....
actors.mobs.npcs.zero.gudazi.message8=我已经没有什么可以给你了，不过也许你能去和别人说说话也许他们还会有什么东西给你。

actors.mobs.npcs.zero.gudazi.message9=等等,我看你身上钱还不少的样子能借我300吗？我应该会还你的。
actors.mobs.npcs.zero.gudazi.message10=如果你给我点钱我会在之后的路上给予你一些帮助。

actors.mobs.npcs.zero.gudazi.message11=你果然很强啊,%s,居然可以达到这个地方!
actors.mobs.npcs.zero.gudazi.message12=有一个坏消息，下面的某些东西不想让我继续下去我所以我已经不能继续向下了。
actors.mobs.npcs.zero.gudazi.message13=不过好消息是托你的福我已经找到了足量的薪柴可以烧了。
actors.mobs.npcs.zero.gudazi.message14=你要注意一下接下来的路会很黑，这个篝火就留给你，接下来的路我不能陪你了，之后再见吧,%s。
actors.mobs.npcs.zero.gudazi.def_verb_1=哈？
actors.mobs.npcs.zero.gudazi.def_verb_2=唔……
actors.mobs.npcs.zero.gudazi.level4=又见面了这是说好的谢礼，好了我还有点事之后再见吧拜！
actors.mobs.npcs.zero.gudazi.level9=啊你也来到这里了吗，多亏你给我的钱让我搞到了不少好东西,这两块石头就给你了希望能对接下来的你有所帮助。那我先走啦，下次见！
actors.mobs.npcs.zero.gudazi.level14=啊真巧你也在这儿啊,刚好我做了一点东西就送你一些吧，好了我也得走了之后再见吧。
actors.mobs.npcs.zero.gudazi.dead=古达子已被遣返......
actors.mobs.npcs.heallanfire.name=生命之火
actors.mobs.npcs.heallanfire.desc=古达子留下的篝火，可以在危急关头救你一命！
actors.mobs.npcs.heallanfire.ssss=你吸收了生命之火的力量，你感觉伤口完全愈合了！

actors.mobs.npcs.zero.gudazi.quest_start_prompt=冒险家，你愿意给我300金币吗？
actors.mobs.npcs.zero.gudazi.enter_yes=给了！
actors.mobs.npcs.zero.gudazi.enter_no=没钱！

actors.mobs.npcs.zero.gudazi.good=感谢！之后再见吧，我会在下面等你的。
actors.mobs.npcs.zero.gudazi.not=那就算了，祝你旅途顺利。

actors.mobs.npcs.zero.kongfu.name=鸽子
actors.mobs.npcs.zero.kongfu.desc=你并不知晓这位脸色苍白的男人来自何方，姓甚名谁，只知道人们称呼他为“鸽子"。
actors.mobs.npcs.zero.kongfu.a_message1=我老想吃鸽子了。最近被饼折磨的吃什么,吐什么，然后特别特别想吃鸽子。。。可惜饼太多了。。。对了，你喜欢吃肉馅饼吗，喜欢的话分你点吧。。。
actors.mobs.npcs.zero.kongfu.b_message1=:嗯？你已经拿到水晶之心了？那就祝贺你吧。顺便，我有个不请之请，希望你能去地表带几只鸽子给我，我老想吃鸽子了。。。
actors.mobs.npcs.zero.kongfu.c_message1=怎么了，冒险者？你难道还想吃肉馅饼吗？食物可不能多吃啊，一个足矣！好了，我要继续浪费时间在那该死的饼上了，祝你好运，冒险者。
actors.mobs.npcs.zero.kongfu.def_verb_1=惹到我你算是惹到棉花了

actors.mobs.npcs.zero.moruos.name=摩诺丝
actors.mobs.npcs.zero.moruos.desc=雪景旅馆的老板娘，据说她见过了无数的冒险者来到这地牢，他们大多一去不返，但也有些能荣耀般归来……
actors.mobs.npcs.zero.moruos.message1=冒险者，欢迎来到雪景小镇，我是这里的老板娘。
actors.mobs.npcs.zero.moruos.message2=过去几年，你似乎探索了不少地牢深处的奥秘。
actors.mobs.npcs.zero.moruos.message3=感觉累了的话，可以前往旅馆2层休息下……
###13挑
actors.mobs.npcs.zero.moruos.message4=看来你已经经历过一些轮回了，或许你将面临更加凶险的环境，把这瓶药剂也带上吧。
actors.mobs.npcs.zero.moruos.message5=%s，继续调查下去吧，只有这样，我们才有希望……

actors.mobs.npcs.zero.moruos.roll1=我们这里之所以叫雪景小镇，是因为这里的暴风雪就没有停过……
actors.mobs.npcs.zero.moruos.roll2=我曾经见到一位蓝发少女，她说她要拯救地牢，而当她去了后就再也没有回来……
actors.mobs.npcs.zero.moruos.roll3=旅馆偶尔可能会有一位白发女仆来这里休息，但她身上有一股神秘的力量，你也许能遇见她……
actors.mobs.npcs.zero.moruos.roll4=雪景小镇是地表三巨头霜落帝国一个核心地块，通往地牢的入口也在小镇的右上角……
actors.mobs.npcs.zero.moruos.roll5=有一些时候，我在思考一个问题：“为什么像你这样的冒险家要前往地牢，我怀疑背后有沉默的真相。”当然，我可能多虑了，你就当我什么都没说就行啦~
actors.mobs.npcs.zero.moruos.roll6=%s,路上小心……，一定要活着归来哦~
actors.mobs.npcs.zero.moruos.roll7=你有见过纯晶元素吗？他们曾经是勇士，但现在却变成了这样……
actors.mobs.npcs.zero.moruos.roll8=如果你遇到了纯晶护卫长，请一定要救她，并且不要让她绝望……

actors.mobs.npcs.zero.qinyuewolf.name=秦月
actors.mobs.npcs.zero.qinyuewolf.desc=长着兽耳的少年，看毛色.......应该是狼人？看上去很好骗。
actors.mobs.npcs.zero.qinyuewolf.a_message1=你好呀，嗯......你是冒险者吧。
actors.mobs.npcs.zero.qinyuewolf.a_message2=我是秦月，一名正在游历四方的旅行者，也是一名小说家。
actors.mobs.npcs.zero.qinyuewolf.a_message3=希望你旅途一切顺利。
actors.mobs.npcs.zero.qinyuewolf.b_message1=啊，对了，来的时候我买了几瓶药水，相遇即是有缘，送你一瓶吧。
actors.mobs.npcs.zero.qinyuewolf.b_message2=既然收下了这瓶药水，就一定要回来给我讲讲你在地牢里的故事哦。
actors.mobs.npcs.zero.qinyuewolf.b_message3=......一定要以“人”的身份回来。
actors.mobs.npcs.zero.qinyuewolf.c_message1=路上小心，回头见。
actors.mobs.npcs.zero.qinyuewolf.d_message1=欢迎回来！自你进入地牢已经过去好几天了。
actors.mobs.npcs.zero.qinyuewolf.d_message2=既然拿到了水晶之心，就先好好休息下吧。
actors.mobs.npcs.zero.qinyuewolf.e_message1=这是水晶之心......？......算了，没什么。

actors.mobs.npcs.zero.qinyuewolf.bd_message1=嗯......啊，是%s啊
actors.mobs.npcs.zero.qinyuewolf.bd_message2=刚刚在想事情......嗯，是在构思故事呢，我可是小说家啊。
actors.mobs.npcs.zero.qinyuewolf.bd_message3=不过虽然是这样说，短文什么的也写了些，我其实还是没有属于自己的作品呢。作品计划倒是有了不少。
actors.mobs.npcs.zero.qinyuewolf.bd_message4=对了，你是准备去冒险了吧，来来来，这个给你。
actors.mobs.npcs.zero.qinyuewolf.bd_message5=上面是我没写完的作品和游记，冒险休息时可以看看放松下。
actors.mobs.npcs.zero.qinyuewolf.bd_message6=等你回来的时候，记得给我提供些灵感的说！
actors.mobs.npcs.zero.qinyuewolf.bd_message7=希望没错别字......啊，弄丢了也没关系，手稿还在我这呢，那本是用法术复制的。
actors.mobs.npcs.zero.qinyuewolf.bd_message8=那么，等你回来啦。

actors.buffs.clearbleesdgoodbuff.blessqinyue.name=夜猫子
actors.buffs.clearbleesdgoodbuff.blessqinyue.desc=在夜间行动时，获得buff’夜猫子’，移动速度+25%%，闪避率提高10%%，熬夜的时候确实更有精神些......\n\n呃，不管怎么说，还是早睡为妙。


actors.mobs.npcs.zero.smallleaf.name=小叶
actors.mobs.npcs.zero.smallleaf.desc=地上世界名气最大的探险家之一，据说她探秘过不少恐怖的地牢并安全生还，还有实际上是某小世界创世之神的谣言……不过你并未看出这位少女的非人之处。
actors.mobs.npcs.zero.smallleaf.amulet_desc=强风鼓动着风衣猎猎作响，眼前的少女似乎有一种独特的气质
actors.mobs.npcs.zero.smallleaf.descofpropchange = 又见面了呢，冒险者，你身上似乎有一些比较奇特的东西，可以交给我看看吗？
actors.mobs.npcs.zero.smallleaf.message1=你好，冒险者。我暂时作为雪景小镇的一员欢迎你。

actors.mobs.npcs.zero.smallleaf.a_message2=你的短剑……我从没见过这样稀有的附魔。
actors.mobs.npcs.zero.smallleaf.b_message2=真是精品。
actors.mobs.npcs.zero.smallleaf.c_message2=奇特的披风，它似乎与某种生命紧紧相连。
actors.mobs.npcs.zero.smallleaf.d_message2=嗯，有种自然的感觉。
actors.mobs.npcs.zero.smallleaf.e_message2=上乘的利剑。


actors.mobs.npcs.zero.smallleaf.amulet_message3=我一直相信着你的能力。
actors.mobs.npcs.zero.smallleaf.amulet_message4=呼，我也有点累.......
actors.mobs.npcs.zero.smallleaf.amulet_message5=该休息了，为下次更辉煌的征程做准备。

actors.mobs.npcs.zero.smallleaf.message3=准备好，我也该出发了……
actors.mobs.npcs.zero.smallleaf.message4=姐姐，你怎么来了？！我马上就回去，马上，啊～
actors.mobs.npcs.zero.smallleaf.message5=我的衣服丢了，难道落在这里？只有下去看看才知道。
actors.mobs.npcs.zero.smallleaf.message6=就算紧握法杖，充能也不会立刻就增加。安排好一切你就能更好的活下去。
actors.mobs.npcs.zero.smallleaf.message7=冒险者，一切小心。
actors.mobs.npcs.zero.smallleaf.def_verb_1=现在还不是时候……
actors.mobs.npcs.zero.smallleaf.def_verb_2=走火了？

actors.mobs.npcs.zero.smallleaf.victory=辉煌的得胜。
actors.mobs.npcs.zero.smallleaf.wtf_sister=这些，还有这些……都给你了！快拿着，我可不想这些东西被我姐搜出来。

actors.mobs.npcs.smallleafharddungeon.name = 小叶
actors.mobs.npcs.smallleafharddungeon.title = 小叶的思考
actors.mobs.npcs.smallleafharddungeon.desc = 地表世界最负盛名的探险家之一，传闻她曾深入诸多诅咒地牢并全身而退。亦有流言称其真实身份是某小世界的创世之神……但从这位少女身上，你尚未窥见一丝非人的痕迹。
actors.mobs.npcs.smallleafharddungeon.message = 这些物品之上交织着两种非常独特的魔力……你要我尝试激发某一种魔力吗？
