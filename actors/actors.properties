actors.mobs.bosses.hollow.morphs.endtalk=你确实很强，与我对话，让我们结束这场奇迹般的旅途吧！

actors.mobs.bosses.hollow.mycoreheart.name=宇宙之心
actors.mobs.bosses.hollow.mycoreheart.desc=一个巨大的核心，其中包含了宇宙的奥秘和能量。\n\n墨菲厄斯企图让核心腐化，为它所用，绝不能让祂得逞！！！\n\n友好单位，非英雄单位攻击核心时会立刻造成敌方大额流血，宇宙之心每次受到的伤害固定为1。\n\n修复世界支柱让宇宙之心完全重启，每防守5波给予一次修复权限！
actors.mobs.bosses.hollow.mycoreheart.gethp=你的英勇防卫，我看在眼里，宇宙之心似乎在和你产生共鸣……
actors.mobs.bosses.hollow.mycoreheart.not_count=你没有修复世界支柱的次数，防守更多波次敌人以获得更多！！！--目前总修复次数：%s。

actors.mobs.bosses.hollow.mycoreheart.repaier=修复此世界支柱？修复需要消耗25回合，修复成功后，将获得对应世界支柱加成。
