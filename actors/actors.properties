actors.mobs.npcs.magehand.desc_staff=老魔杖：%s
actors.mobs.npcs.magehand$handshield.name=有形之手
actors.mobs.npcs.magehand$handshield.desc=法师之手汲取了护盾的精华，能在短时间使你的防御大幅提升，使你能更好地抵御物理攻击。\n\n当前增加的护甲值：0~%d。\n距离效果结束还有：%s 回合。
actors.mobs.npcs.magehand$wndmagehand.cant_unidentified=你还没有鉴定这个法杖，无法装配在法师之手上。
actors.mobs.npcs.magehand$wndmagehand.cant_equip=你只能在法师之手上装配未装备在自身的老魔杖。

actors.mobs.npcs.magehand$magehandcontrol.hand=法师之手

actors.mobs.npcs.magehand$wndmagehand.title=法师之手控制器
actors.mobs.npcs.magehand$wndmagehand.desc=为法师之手装备法杖，所有法杖施法后的冷却为3回合。\n\n只有装配了老魔杖法师之手才可以近战，法杖施法总是高于近战，除非处于冷却期间或装配的法杖暂无充能。
actors.mobs.npcs.magehand$wndmagehand.wand_prompt=选择要装备的法杖
actors.mobs.npcs.magehand$magehandcontrol.name=法师之手控制器
actors.mobs.npcs.magehand$magehandcontrol.desc=控制法师之手的法杖装备，可以装配各类法杖，瞬移，攻击，巡查等一系列功能。\n\n你可以点击装配法杖进行装配，或使用游戏屏幕右下角的快捷按钮。
actors.mobs.npcs.magehand$magehandcontrol.ac_hand=装配法杖
