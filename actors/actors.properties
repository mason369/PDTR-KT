actors.mobs.npcs.lanfire.name=篝火
actors.mobs.npcs.lanfire.desc=温暖的篝火可以降低寒冷，给予冒险者光明的希望。
actors.mobs.npcs.lanfire.meattitle=想烤肉吗？
actors.mobs.npcs.lanfire.meatdesc=在篝火烤肉将会花费一段时间，但你可以在烤肉结束后回复温度值。
actors.mobs.npcs.lanfire.one_meat=烤一块肉_(3回合)_
actors.mobs.npcs.lanfire.three_meat=烤三块肉_(9回合)_
actors.mobs.npcs.lanfire.all_meat=烤全部肉_(
actors.mobs.npcs.lanfire.cancel=取消烤肉
actors.mobs.npcs.lanfire.round=回合)_
actors.mobs.npcs.lanfire.cook_one=你烹饪了一个神秘的肉，回复了少量的温度。
actors.mobs.npcs.lanfire.cook_three=你烹饪了三个神秘的肉，回复了一些的温度。
actors.mobs.npcs.lanfire.cook_none=你并没有3个神秘的肉！
actors.mobs.npcs.lanfire.cook_all=你将所有神秘的肉全部烹饪了，同时回复了大量的温度。
actors.mobs.npcs.lanfire.enter=篝火的温暖照亮每一个在寒冷中徒步的冒险者，在寒冷而又凛冽的地牢中，这里是唯一的休息站。
actors.mobs.npcs.lanfire.leave=离开温暖的篝火休息站，前方迎面而来的又是凛冽的寒风。

actors.buffs.icesworddown.name=刀锋寒冻
actors.buffs.icesworddown.desc=地牢的寒冷已经开始影响到你的武器，现在你的物理伤害会进行一定程度的下降。寒冷值越高，伤害下降越大。\n\n地牢的寒冷是由深处的暗黑能量驱使的，随着不断的深入地牢，寒冷会越来越刺入骨髓，从而造成更加急剧的威胁。要降低寒冷，可以寻找篝火房间，这里是能}缓慢回复温度的区域}。当然，在后面的探索中，你也会寻找到更多降低寒冷的手段。
actors.buffs.icesworddown.ice=\n\n当前玩家物理伤害为：_

actors.buffs.nyctophobia.name=光芒前路
actors.buffs.nyctophobia.name2=灯火摇曳
actors.buffs.nyctophobia.name3=微暗寂光
actors.buffs.nyctophobia.name4=静谧光束
actors.buffs.nyctophobia.name5=黑暗蚕食
actors.buffs.nyctophobia.name6=寂灭如寞

actors.buffs.nyctophobia.ondeath=无尽的黑暗涌入了你的意识，你最终被黑暗拖入了深渊...

actors.buffs.nyctophobia.desc=灯火一路向前，你信心满满。
actors.buffs.nyctophobia.desc2=灯火摇曳不定，但你仍然无所畏惧。
actors.buffs.nyctophobia.desc3=灯火开始变得更加微弱，你开始对自己的信心产生了怀疑。
actors.buffs.nyctophobia.desc4=灯火的光束已经变得静谧，你感到生命在逐渐离你而去。\n\n低灯火下将更容易触发Debuff加成。
actors.buffs.nyctophobia.desc5=灯火正在变得十分微弱，你感觉自己注定失败!
actors.buffs.nyctophobia.desc6=灯火完全熄灭了，前方有什么等着你？

actors.buffs.lighs.name=提灯信仰
actors.buffs.lighs.desc=即使是在最黑暗的地牢中，提灯发出的温暖光芒也会让你一路灯火前行。\n\n当提灯激活时，你的灯火值将持续回复。
actors.buffs.lighs.tip=在遗物状态下无法点亮提灯

actors.buffs.puresoul.lanter=光芒前路
actors.buffs.puresoul.desc_intro_lanter=你的信心就犹如你的灯火一样，光芒且明亮。\n\n当前灯火值：%s点\n\n
actors.buffs.puresoul.desc=灯火前行，光芒前路。没有什么东西可以影响到你。

### Magic Say debuffs
actors.buffs.magicgirldebuff.magicgirlsaynostr.name=魔女的低语-无力
actors.buffs.magicgirldebuff.magicgirlsaynostr.desc=无力将会吞噬你自己，而幕后黑手仍然在背后暗暗发笑。\n\n本大层力量将会-1点，下一大层恢复。

actors.buffs.magicgirldebuff.magicgirlsaycursed.name=魔女的低语-束缚
actors.buffs.magicgirldebuff.magicgirlsaycursed.desc=束缚只是我的一个考验，而失去信心的你。想必比我这个考验更可怕吧。\n\n装备会被诅咒，效果失效装备的(武器/护甲)会被净化但会被赋予10回合降级。

actors.buffs.magicgirldebuff.magicgirlsaykill.name=魔女的低语-审判
actors.buffs.magicgirldebuff.magicgirlsaykill.desc=灯火摇摆不定，朦胧中你似乎看见了一个魔女向你挥起了剑。(一切是你们咎由自取)\n\n本大层英雄近战伤害降低至90%%。

actors.buffs.magicgirldebuff.magicgirlsayslowy.name=魔女的低语-迟钝
actors.buffs.magicgirldebuff.magicgirlsayslowy.desc=缓慢的走向死亡吧……\n\n本大层英雄每移动10回合获得3回合残废。

actors.buffs.magicgirldebuff.magicgirlsaymoneymore.name=魔女的低语-贪婪
actors.buffs.magicgirldebuff.magicgirlsaymoneymore.desc=贪婪的欲望是人类的本质\n\n本大层商店的价格除十字架和食物和治疗药水涨价到2.5倍，其他正常价格。

actors.buffs.magicgirldebuff.magicgirlsaytimelast.name=魔女的低语-流逝
actors.buffs.magicgirldebuff.magicgirlsaytimelast.desc=流逝的是时间，不变的是地牢的模样。\n\n本大层每隔一段时间英雄获得随机火焰，中毒，流血其中之一。

### Good Blees Buffs
actors.buffs.clearbleesdgoodbuff.blessgoodstr.name=纯洁的祝福-坚毅
actors.buffs.clearbleesdgoodbuff.blessgoodstr.desc=坚毅是我们不屈的斗志!\n\n本大层玩家额外追加2点力量。

actors.buffs.clearbleesdgoodbuff.blessnomoney.name=纯洁的祝福-富饶
actors.buffs.clearbleesdgoodbuff.blessnomoney.desc=魔女的气息在我们身旁徘徊，商人们一定会对你毕恭毕敬。\n\n本大层商店全场打6折。

actors.buffs.clearbleesdgoodbuff.blessmobdied.name=纯洁的祝福-安息
actors.buffs.clearbleesdgoodbuff.blessmobdied.desc=安息吧！怪物们!!!\n\n本大层英雄物理伤害x1.5!

actors.buffs.clearbleesdgoodbuff.blessmixshiled.name=纯洁的祝福-守护
actors.buffs.clearbleesdgoodbuff.blessmixshiled.desc=守护我们最后的种子！\n\n本大层英雄在血满且不拥有灯火护盾的的情况下每270回合获得一些护盾。
actors.buffs.clearbleesdgoodbuff.blessmixshiled.tip=你的血量已满，奖励你%s点护盾值。

actors.buffs.clearbleesdgoodbuff.blessmixshiled$xsbarrier.name=灯火护盾
actors.buffs.clearbleesdgoodbuff.blessmixshiled$xsbarrier.desc=一团可以抵挡全部伤害的能量屏障。\n\n只要灯火护盾的能量仍然存在，它将完全抵挡单位所受到的任何伤害。在未受到伤害的时候还会缓慢回复护盾。\n\n护盾能量剩余：%d。

actors.buffs.clearbleesdgoodbuff.blesslingjing.name=棱镜力场
actors.buffs.clearbleesdgoodbuff.blesslingjing.desc=每75回合产生一个20点护盾。

actors.buffs.clearbleesdgoodbuff.blesslingjing$xsbarrier.name=丛林守护之盾
actors.buffs.clearbleesdgoodbuff.blesslingjing$xsbarrier.desc=一团可以抵挡全部伤害的能量屏障。\n\n只要护盾的能量仍然存在，它将完全抵挡单位所受到的任何伤害。在未受到伤害的时候还会缓慢回复护盾。\n\n护盾能量剩余：%d。

actors.buffs.clearbleesdgoodbuff.blessimmune.name=纯洁的祝福-隐没
actors.buffs.clearbleesdgoodbuff.blessimmune.desc=隐没在这人群之中，我们便是超凡脱俗的个体\n\n本大层英雄免疫魔法效果和减少25%的所有伤害以及无视血色哨卫的伤害。\n\n但灯火扣减会略微加速。

actors.buffs.clearbleesdgoodbuff.blessgoread.name=纯洁的祝福-前路
actors.buffs.clearbleesdgoodbuff.blessgoread.desc=行走在这令人惧怕的地牢中，灯火是前路的指引\n\n本大层英雄灯火值高于90%且不处于极度饥饿的情况下，每3回合进行生命额外回复。（如果开启寂灭灯火，60满灯火才可生效）
actors.buffs.clearbleesdgoodbuff.blessgoread.desc_rest=行走在这令人惧怕的地牢中，灯火是前路的指引\n\n你现在处于极度饥饿状态，前路效果已经暂时失效。
actors.buffs.clearbleesdgoodbuff.blessgoread.desc_lanter=行走在这令人惧怕的地牢中，灯火是前路的指引\n\n你现在处于灯火低于90，如果是寂灭灯火需要为60，前路效果已经暂时失效。

actors.buffs.clearbleesdgoodbuff.blessanmy.name=纯洁的祝福-共生
actors.buffs.clearbleesdgoodbuff.blessanmy.desc=昏暗的地牢，其实仍然可以共生共存。\n\n本大层玩家获得_“共生法杖”_，可在每层选择一个怪物成为你的盟友，该法杖无法升级，且Buff效果消失后自动消失。(_共生只是为了生存，我们所做的只有拯救自己_)

actors.buffs.propbuff.name = 饰品投影
actors.buffs.propbuff.desc = 你感到身上的某些饰品逐渐变得温热起来，似乎会每隔一段时间给予你不同的力量

actors.buffs.smoking.name = 吸烟
actors.buffs.smoking.desc = 你正在使用锐刻五代，散发出大量可阻挡视野的烟雾

