actors.mobs.bosses.hollow.bad.towermindbad.name=思维之柱-损坏
actors.mobs.bosses.hollow.bad.towermindbad.desc=一座高耸的石柱，展现出无常思绪的样貌。\n\n_此柱体已损坏，修复后，此柱体让敌人获得周期性晕眩效果，而英雄获得周期净化屏障效果。_
