actors.mobs.npcs.firemagicdiednpc.name=浊焰魔女-莲娜
actors.mobs.npcs.firemagicdiednpc.desc=曾经是翼绫的护法之一,因为大火事件被地表三巨头怀疑,逃亡到了雪凛峡谷……\n\n被当时的商人领主给收养,现在,她是雪凛峡谷的守护之神……
actors.mobs.npcs.firemagicdiednpc.talk_1=%s,你的战斗技巧确实让我刮目相看。
actors.mobs.npcs.firemagicdiednpc.talk_2=不过，抢劫商店这种事情，希望你下次不要再做了。
actors.mobs.npcs.firemagicdiednpc.talk_3=对了，我记得我的姐姐冬铃在地牢里面。如果你见到了她，务必救救她……
actors.mobs.npcs.firemagicdiednpc.talk_4=我的话已经说完了……,拿下这些礼品吧，它会让你在旅程上更加轻松的……
actors.mobs.npcs.firemagicdiednpc.talk_5=%s,和你刚刚决斗过后,我有一点累了…… 接下来,商人领主会告诉你后续事宜……

actors.mobs.npcs.null.name=???
actors.mobs.npcs.null.desc=???
actors.mobs.npcs.null.why=你:你……是谁？
actors.mobs.npcs.shopking.talk=我知道你被送到这里的缘由。
actors.mobs.npcs.null.why_2=你:…………
actors.mobs.npcs.shopking.talk_2=抢劫商店的事我可以睁一只眼闭一只眼，但你必须离开这里。
actors.mobs.npcs.null.why_3=你:如果我说不呢?
actors.mobs.npcs.shopking.talk_3=……或者帮我们一个忙。
actors.mobs.npcs.shopking.talk_4=雪凛峡谷的深处，是莲娜的居所。如果你认为自己有那胆量，就去挑战她吧。
actors.mobs.npcs.shopking.talk_5=如果不想冒这个险，往左走可以回去。
actors.mobs.npcs.shopking.talk_6=别当个懦夫，你杀我们的守卫时可是很勇敢的。
actors.mobs.npcs.shopking.talk_7=做出你的选择吧!
actors.mobs.npcs.shopking.talk_8=%s,你这个并不算很明智的选择，但勇气可嘉。
actors.mobs.npcs.shopking.talk_9=如果你准备好了,那就随我一起见她吧!
actors.mobs.npcs.nulldied.talk_x=……
actors.mobs.npcs.nulldied.talk_r=商人领主:%s,接下来,就靠你自己了!
actors.mobs.npcs.nulldied.name=商人领主
actors.mobs.npcs.nulldied.desc=雪凛峡谷的商人领主，正是他建立了商人这个势力。

actors.mobs.npcs.nulldiedto.talk_x=不错，现在，是你尽情挑选商品的时间。

actors.mobs.npcs.nulldiedto.name=商人领主
actors.mobs.npcs.nulldiedto.desc=雪凛峡谷的商人领主，正是他建立了商人这个势力。
actors.mobs.npcs.nulldiedto.leave=冒险家，快通过水晶之心离开这里吧……



actors.mobs.npcs.nulldiedto.namex=水晶意志
actors.mobs.npcs.nulldiedto.descx=衪并不是商人领主，而是水晶之心的意志。衪正在等待你！

actors.mobs.npcs.nulldiedto.talk_a=这里居然还有活人？哦，是你！
actors.mobs.npcs.nulldiedto.talk_b=冒险家，有一股邪恶，阴冷却强大的力量正在向外溢出，看起来似乎只有你能改变这个局面了。
actors.mobs.npcs.nulldiedto.talk_c=下面没什么生物，也许是那股力量做的。幸存下来的只有那些拥有一定实力的家伙。
actors.mobs.npcs.nulldiedto.talk_d=水晶之心正在抗拒这股力量，入口因为这股抗拒之力变成了这种样子。
actors.mobs.npcs.nulldiedto.talk_e=下面的地形也许会有所不同，这些都是抗拒之力的具体表现。
actors.mobs.npcs.nulldiedto.talk_f=祝你好运，冒险家。我这里也提供一点帮助你压制不明力量的东西——当然，是得花钱的。

actors.mobs.npcs.nulldiedto.talk_g=冒险家，我们又见面了。我担心你接下来的路程，所以又来帮助你了。
actors.mobs.npcs.nulldiedto.talk_h=祝你好运，冒险家。我这里也提供一点帮助你压制不明力量的东西——当然，是得花钱的。

actors.mobs.npcs.nulldiedto.talk_i=冒险家，正如我之前所说。有一股邪恶，阴冷却强大的力量正在向外溢出，而能量点就在这更深的下方。
actors.mobs.npcs.nulldiedto.talk_j=但是由于某位的到来，你现在还不能前往那里找死，所以你先暂时别急着去那里……

actors.mobs.npcs.nulldiedto.talk_k=DMZERO已经彻底被摧毁了，冒险家，干的不错。
actors.mobs.npcs.nulldiedto.talk_l=冒险家，或许你真的是衪的救世主。
actors.mobs.npcs.nulldiedto.talk_m=感谢你这次的地牢调查行动，我会很快将这里给恢复到最初的样子。
actors.mobs.npcs.nulldiedto.talk_n=冒险家，这只是一个开始。你未来的艰辛坎坷之路，就要来了！
actors.mobs.npcs.nulldiedto.talk_o=冒险家，现在你可以通过水晶之心离开这里了。谢谢你这次帮忙，我会在衪回来后告诉你的丰功伟绩的。

