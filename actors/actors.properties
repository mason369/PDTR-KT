actors.buffs.sanity.normal_desc=_一次次踏入地牢只会使自己的理智逐渐丧失。\n\n_你已不知道是何时再来到这个地牢，但邪恶的诡异气氛扑面而来。这次你进入地牢你感觉到了一种名为理智的存在。但你却不知道何时会因失去理智而被地牢吞噬，至少不是现在。\n\n}目前理智为:%s点}\n\n}你现在非常的理智，因此你完全不用担心任何事情}

actors.buffs.sanity.crazy_desc=_由于没有光芒的照耀或因为怪物的精神摧残，你现在已经有一点的不理智了。_\n\n}目前理智为:%s点}\n\n}你现在有一点失去理智，建议还是尽管想办法振作起来。}

actors.buffs.sanity.died_desc=]理智已经离你而去，臆想的怪物，残破的信念，堕落的灵魂，你的恐惧已经成为了了现实]\n\n]目前理智为:%s点]\n\n]你已经快要完全丧失理智了，你能感受到自己的灵魂正在被蚕食，如果还不想办法恢复自己的理智，那么自己将会变成下一个怪物！

