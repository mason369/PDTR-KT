levels.hollow.moveboxhollowactorlevel$threelet_go.quest_start_prompt=搜打撤，听到这个词语，你是否想起了一些游戏？在剧院演出的最后一幕中，你将前往剧院为你模拟的一个巨大地图，这里有着各区域心怀不甘的怪物的恐怖变种，但同样的，也会有诸多宝藏等待你。完成这最后一场演出，你将正式与我见面！
levels.hollow.moveboxhollowactorlevel$threelet_go.enter_yes=第三幕-全面搜查-演出开始
levels.hollow.moveboxhollowactorlevel$threelet_go.enter_no=稍后再说
