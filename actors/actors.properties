windows.wndpacmanreadygo.title=第一幕-吃豆人
windows.wndpacmanreadygo.message=《吃豆人》（Pac-Man）是由_日本游戏设计师岩谷彻_开发，原名“Puck-Man”源于日语拟声词，形象灵感来自披萨缺角和汉字“口”。\n\n在吃豆人45周年之际，冒险者？不，玩家，我诚邀你来到此剧院进行演出，但为了节目的趣味性，你只能携带4件物品，且只能是武器/护甲/戒指/神器，并且移动速度和攻击距离均锁定为1。我还会为你调配一柄专属的+10魔弹法杖。\n\n一旦你准备好，演出随时都可以开始。
windows.wndpacmanreadygo.confirm=第一幕-吃豆人-演出开始

