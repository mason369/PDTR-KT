actors.mobs.greendiamndmimic.name=翡翠宝箱怪
actors.mobs.greendiamndmimic.reveal=哦！这不是真正的绿宝石宝箱，你被耍了！！！
actors.mobs.greendiamndmimic.hidden_name=绿宝石宝箱
actors.mobs.greendiamndmimic.hidden_desc=在每年8月，最初的原始地牢创造者的光辉会影响着每个衍生的平行世界地牢。\n\n你需要一枚绿宝石钥匙才能打开它，以获得里面的同频共振奖励。
actors.mobs.greendiamndmimic.desc=宝箱怪是一种能随意改变外形的魔法生物。在地牢里它们几乎一直以宝箱形态出现，因为这样总能吸引疏于防备的冒险家。\n\n翡翠宝箱怪与黑檀类似，但更加危险。一旦有人去尝试开启它，将会造成一次巨大伤害并附带中毒/残废/失明/三种效果其中一种，并发出警报，在死亡前会自爆。
actors.mobs.greendiamndmimic.explo_kill=你被翡翠宝箱怪的爆炸杀掉了……

