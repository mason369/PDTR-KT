actors.mobs.bosses.hollow.bad.towertimebad.desc=一座高耸的石柱，展现出扭曲时间的样貌。\n\n_此柱体已损坏，修复后，此柱体让敌人获得周期性残废效果，而英雄获得周期极速效果。_
