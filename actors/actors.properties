actors.hero.hero.leave_chest=这里是拟态之王的异次元维度，入口和出口都被封死了，也许击杀巡逻的宝箱怪可以逃出来……
actors.hero.hero.gold_common_desc=恭喜你完成了本次金蝶旅程，但金蝶的谜团依然扑朔迷离，敬请期待2026金蝶3.0版本。

actors.hero.hero.not_move=推箱子模式不能斜向和多格移动。

