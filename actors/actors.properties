actors.buffs.status.magicabsorb.desc=魔力汲取中介效果计数，开发模式测试，正式效果不会显示该Buff。\n\n距离效果触发还有：%s 回合。

### OLD BATTLEMAGE
actors.hero.herosubclass.oldbattlemage=<#8C9EFF>战斗巫女<RGB>
actors.hero.herosubclass.oldbattlemage_desc=战斗巫女使用魔杖近战时会附带类似附魔的额外效果，效果取决于魔杖所灌注的法杖种类，每种法杖各不相同。用魔杖近战打击还会为其恢复0.5点充能。
actors.hero.herosubclass.oldbattlemage_short_desc=_战斗巫女_在使用魔杖近战攻击时会附带额外的法术效果。这些效果取决于魔杖内灌注的法杖种类。

actors.hero.talent.repower_attack.title=蓄能打击
actors.hero.talent.repower_attack.desc=_+1：_战斗巫女使用魔杖施法后，魔杖的首次近战攻击将造成_16%额外伤害_，且额外效果具有_50%强度提升_。\n\n_+2：_战斗巫女使用魔杖施法后，魔杖的首次近战攻击将造成_33%额外伤害_，且额外效果具有_100%强度提升_。\n\n_+3：_战斗巫女使用魔杖施法后，魔杖的首次近战攻击将造成_50%额外伤害_，且额外效果具有_150%强度提升_。

actors.hero.talent.charge_magic.title=充能秘术
actors.hero.talent.charge_magic.desc=_+1：_当战斗巫女用魔杖近战击中敌人时，会获得相当于_0.5回合_的神器充能效果。\n\n_+2：_当战斗巫女用魔杖近战击中敌人时，会获得相当于_1回合_的神器充能效果。\n\n_+3：_当战斗巫女用魔杖近战击中敌人时，会获得相当于_1.5回合_的神器充能效果。

actors.hero.talent.shielding_block.title=盈能屏障
actors.hero.talent.shielding_block.desc=_+1：_战斗巫女的魔杖满充能时，其上的每级升级都会在他下一次使用魔杖施法时使自身获得_0.67点护盾_。\n\n_+2：_战斗巫女的魔杖满充能时，其上的每级升级都会在他下一次使用魔杖施法时使自身获得_1.33点护盾_。\n\n_+3：_战斗巫女的魔杖满充能时，其上的每级升级都会在他下一次使用魔杖施法时使自身获得_2点护盾_。

### RARE MOBS
actors.mobs.rare.giantflowerslime.name=巨型繁花史莱姆
actors.mobs.rare.giantflowerslime.desc=相对来说比较稀有的繁花史莱姆，因为体型更大导致粘上了更多的植物和种子，并因此导致攻击可能会产生植物的效果。

actors.mobs.rare.newborncrab.name=新生螃蟹
actors.mobs.rare.newborncrab.desc=丛林螃蟹的青年体，甲壳还未发育成熟，因此防御会更脆弱，但是速度会更快，动作会更灵活。

actors.mobs.rare.dm111.name=dm-111
actors.mobs.rare.dm111.desc=dm100的加强版本，其实是第一版加强，但是第二版已经叫dm200了，拥有更强的火力，更厚重的装甲，并且可以蓄力放电制服犯人，但是引擎没有跟上，所以移动速度会更慢。
actors.mobs.rare.dm111.zap_kill=闪电球将你彻底击杀…

actors.mobs.rare.guardcapital.name=狱卒小队长
actors.mobs.rare.guardcapital.desc=作为狱卒的小头领，相比其他狱卒更加强壮，但不使用锁链将犯人拉近而是更习惯将犯人击退或配合其他狱卒远程攻击。

actors.mobs.rare.verycoldrat.name=极寒冰鼠
actors.mobs.rare.verycoldrat.desc=长期的寒冷环境与冰系魔力导致其体内魔力狂暴而又非常不稳定，切记小心。
actors.mobs.rare.verycoldrat.bomb=周围的空气开始迅速凝结，可能有什么事情要发生了。

actors.mobs.rare.bloodsswarm.name=血红蝇群
actors.mobs.rare.bloodsswarm.desc=因为过于寒冷导致血红苍蝇依靠挤一起取暖，一起行动，攻击会导致它们分裂开，非常危险。

actors.mobs.rare.ghoulplus.name=矮人尸山
actors.mobs.rare.ghoulplus.desc=矮人尸群拥有可以源源不断战斗的能力，但是魔法总是不那么可靠，所以他们在恢复的时候粘到一起了，并且在不停的吸收其他的尸群。

actors.mobs.rare.warlockhead.name=矮人首席术士
actors.mobs.rare.warlockhead.desc=矮人术士是矮人中的掌权者，而这位更是术士的领导者，他对黑暗魔法的掌握远超其他术士，可以对目标造成更加严重的影响。

actors.mobs.rare.demonfodder.name=“恶魔盛宴”
actors.mobs.rare.demonfodder.desc=恶魔世界中非原生的存在，天生比正常的恶魔弱小。通过被其他的恶魔蚕食，它会成为强大恶魔的一部分。
actors.mobs.rare.demonfodder.leap=“恶魔盛宴”正在准备扑杀……

actors.mobs.rare.spawnevil.name=恶孽血巢
actors.mobs.rare.spawnevil.desc=这一团矮人血肉比其他血巢更加活跃，浓厚的血气和死气正是恶魔们最好的食粮。
actors.mobs.rare.spawnevil.on_death=此处的恶魔能量似乎随着血巢的毁灭而有所减弱。

actors.mobs.rare.deadeye.name=毁灭魔眼
actors.mobs.rare.deadeye.desc=魔眼是一种邪眼的变体，拥有和邪眼一样的能力，但是比邪眼更容易发现敌人，其的死亡凝视比邪眼更具破坏性，也许你不应该和他硬碰硬
actors.mobs.rare.deadeye.disintegrate=毁灭魔眼的死亡凝视摧毁了你的：
actors.mobs.rare.deadeye.and=和
actors.mobs.rare.deadeye.deathgaze_kill=死亡凝视夺取了你的生命…




### Kuzimi
actors.mobs.npcs.hiro.name=久住
actors.mobs.npcs.hiro.desc=为重点惩戒对象单独关押的囚犯，原先是时间魔女，现已被卸除魔女之名。来自翼绫的枷锁让她如今无法大量动用魔力，连离开这里都是天方夜谭。
actors.mobs.npcs.hiro.hello=你好啊，%s。
actors.mobs.npcs.hiro.talk_hello=初次见面，我先自我介绍一下吧，我叫久住，算是这所监狱的重点关照对象。
actors.mobs.npcs.hiro.talk_hello_no=这是我们的第%s次见面了。不需要我再做自我介绍了吧？

actors.mobs.npcs.hiro.talk_ano_1=请不要如此戒备，我没有恶意。我有一笔交易想和你谈谈，要听听吗？
actors.mobs.npcs.hiro.talk_ano_2=如果你在地牢外遇见了沅汐，请告诉她，我早已过世了……作为交换，我会为你的旅途提供一些帮助。
actors.mobs.npcs.hiro.talk_ano_3=……你是同意了吗？
actors.mobs.npcs.hiro.talk_ano_4=十分感谢……如我所言，这是给你的谢礼。
actors.mobs.npcs.hiro.talk_ano_5=当然，我们的交易还会继续。带上它吧。

actors.mobs.npcs.hiro.talk_cno_1=祝一路平安……
actors.mobs.npcs.hiro.talk_cno_2=请一定要活着离开地牢。

actors.mobs.npcs.hiro.talk_btk_1=谢谢你……
actors.mobs.npcs.hiro.talk_btk_2=这朵花真的很漂亮，就和原先的那朵一样。
actors.mobs.npcs.hiro.talk_btk_3=该说你身上有沅汐的影子吗…？

actors.mobs.npcs.hiro.talk_btk_4=不，我能察觉到，你身上的某些东西似乎发生了永远的改变。
actors.mobs.npcs.hiro.talk_btk_5=也许你自己也没有意识到这一点。你若想要看看你的过去，就把那面具交给我吧。

actors.mobs.npcs.hiro.talk_hiro=与此同时，久住握住了你的手，你感觉一股暖流流向了时之花……

actors.mobs.npcs.hiro.talk_ctk_1=这是一个重大的选择呢……希望你不会后悔。

actors.mobs.npcs.hiro.quest_start_prompt=要探寻你的过去吗？
actors.mobs.npcs.hiro.enter_yes=是
actors.mobs.npcs.hiro.enter_no=否

actors.mobs.npcs.hiro.def_verb=
actors.mobs.npcs.hiro.def_verb_3=你的行为没什么必要。

actors.buffs.hunger$hungerstats.name=饥饿
actors.buffs.hunger$hungerstats.desc=你能感受到自己的肚子在不断寻求食物，不过还不算那么严重。\n\n饥饿会在你在地牢里花费时间的同时缓慢累计，直到你饿得难以忍受。在你极度饥饿时生命值会停止回复并且开始缓慢减少 。\n\n合理利用食物非常重要！如果你有足够的生命值来维持饥饿，你就该等到一会儿食物更多的时候再吃。正确的配给可以让食物更有效地发挥作用！

actors.buffs.hunger$starvingstats.name=极度饥饿
actors.buffs.hunger$starvingstats.desc=你的饥饿程度已经危及生命了。\n\n饥饿会在你在地牢里花费时间的同时缓慢累计，直到你饿得难以忍受。在你极度饥饿时生命值会停止回复并且开始缓慢减少 。\n\n合理利用食物非常重要！如果你有足够的生命值来维持饥饿，你就该等到一会儿食物更多的时候再吃。正确的配给可以让食物更有效地发挥作用！

actors.buffs.allybuff.name=无法结盟

actors.buffs.sleep.name=沉睡
actors.blobs.corrosivegas.name=酸蚀气体
actors.blobs.confusiongas.name=晕眩气体
actors.blobs.toxicgas.name=毒气气体
actors.blobs.brokenarmorfire.name=无用之盾气体
actors.blobs.blob.name=All Blobs
actors.buffs.buff.name=All Buff



### 五周年
actors.mobs.npcs.zero.fiveyears.mintcat.name=薄绿
actors.mobs.npcs.zero.fiveyears.mintcat.desc=薄绿喜欢躲在自己的秘密基地安静地读书，也喜欢和朋友们一起玩闹，她喜欢爬树，喜欢冒险，喜欢所有新奇而有趣的东西。\n她会小步小步地跟随在信任的人身后，也会突然被其他东西吸引，蹦蹦跳跳地离开。\n如果收到了来自女孩的小礼物，就算只是一块其貌不扬还沾着泥土的矿石，也请收下吧，那一定都是她很喜欢的东西，无论如何都想要与你分享。\n\n春节时期，她换上了融入中华韵味的盛装，举着 “大吉” 横幅蹦蹦跳跳地凑到你面前，要把一整年的好运都送给你。
actors.mobs.npcs.zero.mint.message1_ny=新年快乐，%s。
actors.mobs.npcs.zero.mint.message2_ny=地牢里危机重重，不要踩到陷阱或是掉进坑里哦~
actors.mobs.npcs.zero.mint.message3_ny=这是我的一点心意，祝你一路顺风。诶，我怎么会知道你的名字？这是秘密哦~~

actors.mobs.npcs.zero.fiveyears.sdragonblue.name=小蓝
actors.mobs.npcs.zero.fiveyears.sdragonblue.desc=一位蓝发的一位小龙女，新年还换上了一套红衣服，一定是未来的龙皇吧？
actors.mobs.npcs.zero.fiveyears.sdragonblue.messages1=新的一年年里记得好好吃饭呀……
actors.mobs.npcs.zero.fiveyears.sdragonblue.messages2=没人聊天呢……有人说话也挺好的
actors.mobs.npcs.zero.fiveyears.sdragonblue.messages3=记得活着回来呀……

actors.mobs.npcs.zero.fiveyears.dreamlezinewyears.name=晓梦
actors.mobs.npcs.zero.fiveyears.dreamlezinewyears.desc=一位来自未知世界的访客……
actors.mobs.npcs.zero.fiveyears.dreamlezinewyears.messages1=从某种意义来说…年兽可能也是神仙？
actors.mobs.npcs.zero.fiveyears.dreamlezinewyears.messages2=我应该找个机会去把那大眼珠子炸了，但是泡泡在这里我有点怂…
actors.mobs.npcs.zero.fiveyears.dreamlezinewyears.messages3=好吧，开个玩笑，新年快乐！
actors.mobs.npcs.zero.fiveyears.dreamlezinewyears.messages4=其他人怎么还不过来，再不过来我要吃完了（｡ò ∀ ó｡）

actors.mobs.npcs.zero.fiveyears.mengdongxynewyears.name=孟冬下元
actors.mobs.npcs.zero.fiveyears.mengdongxynewyears.desc=一位斗篷下的神秘人，似乎在说地牢决斗的事情……
actors.mobs.npcs.zero.fiveyears.mengdongxynewyears.messages1=新年好啊朋友，这是给你的，新春卡包。
actors.mobs.npcs.zero.fiveyears.mengdongxynewyears.messages2=有抽到什么高罕卡吗，有空来打牌啊。
actors.mobs.npcs.zero.fiveyears.mengdongxynewyears.messages3=这道魔法烤绵羊味道不错，再撒点烈焰花粉就更好了。

actors.mobs.npcs.zero.fiveyears.slylnewyears.name=冷
actors.mobs.npcs.zero.fiveyears.slylnewyears.desc=没有人知道她的身份，她总是对即将前往圣境密林的冒险者默默注视着……
actors.mobs.npcs.zero.fiveyears.slylnewyears.messages1=歌一曲，酒一觞，邀君醉琼浆，东风盈暖房。
actors.mobs.npcs.zero.fiveyears.slylnewyears.messages2=长空穹宇飞玉屑，千树黄金缕，万里起福灯。
actors.mobs.npcs.zero.fiveyears.slylnewyears.messages3=金龙潜翔祥云瑞，雾隐星河灯火明。
actors.mobs.npcs.zero.fiveyears.slylnewyears.messages4=瑞雪映门阙，华章待奏鸣，祈年丰殷驻春风。

actors.mobs.npcs.zero.fiveyears.deepseanewyears.name=深海
actors.mobs.npcs.zero.fiveyears.deepseanewyears.desc=原本该出现在海边的家伙，此刻正在参加一场晚会，靠近后会听到她嘀嘀咕咕的抱怨餐桌上怎么没有大饼。
actors.mobs.npcs.zero.fiveyears.deepseanewyears.messages1=新年快乐～\n\n杂鱼酱，新的一年有没有长进呐？这份‘险境求生饼’送给你，我曾经在海里迷路时靠它撑了三天，嘛，希望你不会迷路啦。
actors.mobs.npcs.zero.fiveyears.deepseanewyears.messages2=吃了我的饼，就算是我罩的了。
actors.mobs.npcs.zero.fiveyears.deepseanewyears.messages3=新年别学我一直摸鱼啊杂鱼～
actors.mobs.npcs.zero.fiveyears.deepseanewyears.messages4=愿你来年的旅途...有趣到让我也想跟着去瞧瞧。

actors.mobs.npcs.zero.fiveyears.luowhitenewyears.name=落白
actors.mobs.npcs.zero.fiveyears.luowhitenewyears.desc=透过橙色的凌空大盾，是那位头上长角的收藏家，他咋跑旅馆里卖武器来了？
actors.mobs.npcs.zero.fiveyears.luowhitenewyears.messages1=新年又见雪飞花，瑞雪再兆丰收年，今年的佳肴格外美味呢。
actors.mobs.npcs.zero.fiveyears.luowhitenewyears.messages2=万家灯火通明，邀你我共赏华灯盛放。
actors.mobs.npcs.zero.fiveyears.luowhitenewyears.messages3=这个你收好，传说可以破财消灾，辟邪惩恶。
actors.mobs.npcs.zero.fiveyears.luowhitenewyears$lfroad.name=灯火通明
actors.mobs.npcs.zero.fiveyears.luowhitenewyears$lfroad.desc=做工精美的方形灯笼，点亮它便能探明前路。

actors.mobs.npcs.zero.fiveyears.firemagicgirlnewyears.name=莲娜
actors.mobs.npcs.zero.fiveyears.firemagicgirlnewyears.desc=理所当然地，她和地牢内的“莲娜”一模一样，并且知道你抢劫的事实，让你十分心虚。好在她是真实的莲娜，且接受了你的帮助，看上去不像要找你算账。\n\n新年的到来，也让她放下手头上的琐事，亲自驾临雪景小镇，来和妹妹短暂团聚。
actors.mobs.npcs.zero.fiveyears.firemagicgirlnewyears.messages1=哟，这不是这几年总在商店里零元购的%s嘛。
actors.mobs.npcs.zero.fiveyears.firemagicgirlnewyears.messages2=今天是喜庆的日子，你先前所做的那些事，眼下就先按下不表了。
actors.mobs.npcs.zero.fiveyears.firemagicgirlnewyears.messages3=当然，是你的出现，让我和妹妹得以挣脱无解的宿命。也正因如此，我才能在这里，与妹妹好好团聚。
actors.mobs.npcs.zero.fiveyears.firemagicgirlnewyears.messages4=其实我们还有一位大姐，只是她远在幽深的深海之中，或许有一天你可以见到她……
actors.mobs.npcs.zero.fiveyears.firemagicgirlnewyears.messages5=虽然我们现在并非敌对关系，但我在地牢之内的映象对你未必友好，小心点喽。
actors.mobs.npcs.zero.fiveyears.firemagicgirlnewyears.messages6=新年快乐，%s。我还要和妹妹多说说话，就不打扰你啦。

actors.mobs.npcs.zero.fiveyears.icemagicgirlnewyears.name=冬铃
actors.mobs.npcs.zero.fiveyears.icemagicgirlnewyears.desc=通过你的帮助，“冰雪魔女”得以从黑魔法的腐蚀中脱出，她的正身也与你成为了朋友。新年的到来，也让她和姐姐得以放下手头上的琐事短暂团聚。
actors.mobs.npcs.zero.fiveyears.icemagicgirlnewyears.messages1=我曾为了执念深入地牢，这意念驱使着我放下人性，步入混沌……
actors.mobs.npcs.zero.fiveyears.icemagicgirlnewyears.messages2=也正因如此，我落入了祂的圈套，沦为任凭摆布的傀儡。
actors.mobs.npcs.zero.fiveyears.icemagicgirlnewyears.messages3=多谢你将我从迷梦中唤醒，也多谢你助力我的姐姐在无止轮回中寻回自我。
actors.mobs.npcs.zero.fiveyears.icemagicgirlnewyears.messages4=我在意识完全丧失之前，将我的经历以日记的形式写作了一本书。似乎，如今它已经广为流传了。
actors.mobs.npcs.zero.fiveyears.icemagicgirlnewyears.messages5=你可能看过了，不过还是给你一本吧。这本书对于你破解地牢的谜团或许有所帮助。
actors.mobs.npcs.zero.fiveyears.icemagicgirlnewyears.messages6=对了，还有一个不情之请——我们的大姐，现在正在深海，和我们失联许久了，如果你能找到她的话，请告诉我她的近况，顺带告诉她，我们一切安好……
actors.mobs.npcs.zero.fiveyears.icemagicgirlnewyears.messages7=说的有点多了吧，不浪费你太多时间了，把这些东西拿上吧。祝你新年快乐哦，%s。

actors.mobs.npcs.zero.fiveyears.yuyenewyears.name=雨夜
actors.mobs.npcs.zero.fiveyears.yuyenewyears.desc=穿着一披蓝色斗篷的怪人，斗篷之下会是什么呢？
actors.mobs.npcs.zero.fiveyears.yuyenewyears.messages1=我们都是城市的河流。\n我们孤独，但在同一个时代，汇流向海。
actors.mobs.npcs.zero.fiveyears.yuyenewyears.messages2=很多年后，我们都将再一次回到这里。只是那时候我已不再是我，你也不再是你。\n珍惜当下吧；珍惜这个值得期待的过去的未来，也珍惜这个值得回忆的未来的过去。
actors.mobs.npcs.zero.fiveyears.yuyenewyears.messages3=愿时间自有温柔的双手，庇佑你，迷途的旅人。

actors.mobs.npcs.zero.fiveyears.nyznewyears.name=奈亚子
actors.mobs.npcs.zero.fiveyears.nyznewyears.desc=自翼绫事件后就一直在地牢调查的商人。主要售卖炸弹产品和一些神秘的书。
actors.mobs.npcs.zero.fiveyears.nyznewyears.messages1=年新乐快！！！
actors.mobs.npcs.zero.fiveyears.nyznewyears.messages2=“嗨呀！从混沌虚空给你的‘新春祝福’哦～”
actors.mobs.npcs.zero.fiveyears.nyznewyears.messages3=新年快乐，你知道吗？ling或许患上恋咕癖，所以古堡才....无法回答

actors.mobs.npcs.zero.fiveyears.mooncatnewyears.name=月华
actors.mobs.npcs.zero.fiveyears.mooncatnewyears.desc=这是一个外貌似猫的人形生物，通体光滑雪白。据传闻称其曾经是盾卫或废品商人之类的，不过他看起来什么也没带。
actors.mobs.npcs.zero.fiveyears.mooncatnewyears.messages1=又一年过去了，虽然我还是猫人。
actors.mobs.npcs.zero.fiveyears.mooncatnewyears.messages2=这个拿着，就当是我给你的小小礼物，不过它可能不太听话。
actors.mobs.npcs.zero.fiveyears.mooncatnewyears.messages3=我在寻找能让我变回去的方法……
actors.mobs.npcs.zero.fiveyears.mooncatnewyears.messages4=新年快乐，祝你不会被什么兽化怪物咬。

actors.mobs.npcs.zero.fiveyears.gudazinewyears.name=古达子
actors.mobs.npcs.zero.fiveyears.gudazinewyears.desc=来自异邦的英雄，不远万里从罗德尔的迦勒底来到此处，不知道祂是否要在这里寻找些什么。
actors.mobs.npcs.zero.fiveyears.gudazinewyears.messages1=新年好啊冒险家！多亏了你们我今年收到的金币比去年更多了。
actors.mobs.npcs.zero.fiveyears.gudazinewyears.messages2=不过这地方也没银行啥的我就只能堆在这里了还好小镇没有小偷……
actors.mobs.npcs.zero.fiveyears.gudazinewyears.messages3=啊对了冒险家为了感谢些日子你对我的照顾你就从这堆金币里面拿一些走吧，就当是新年红包了。
actors.mobs.npcs.zero.fiveyears.gudazinewyears.messages4=那么再见了希望新的一年你还是能来多多资助我，这样我就能换更多衣服了……（小声）

actors.mobs.npcs.zero.fiveyears.sheepnewyears.name=魔法绵羊
actors.mobs.npcs.zero.fiveyears.sheepnewyears.desc=这是一只魔法绵羊。为什么叫它魔法绵羊？因为你杀不死它。它会做的事情只有边反刍边对你翻白眼。
actors.mobs.npcs.zero.fiveyears.sheepnewyears.messages1=祝你新年快乐咩，也祝你新年不被绵羊卡住咩，我的羊毛里有一个东西你可以拿走咩。
actors.mobs.npcs.zero.fiveyears.sheepnewyears.messages2=咩咩咩咩咩?
actors.mobs.npcs.zero.fiveyears.sheepnewyears.messages3=咩～再次祝你新年快乐哦～

actors.mobs.npcs.zero.fiveyears.zakoflowernewyears.name=喵音·椛
actors.mobs.npcs.zero.fiveyears.zakoflowernewyears.desc=一只可爱的的天狗少女，萝卜地牢群的群宠之一，在这个地牢的任务是给大家提供饭菜(虽然不免费)。走过路过就尝一尝吧。\n\n对了，不要叫她杂鱼酱哦。小心她生气哦。
actors.mobs.npcs.zero.fiveyears.zakoflowernewyears.messages1=燃烛提笔祝语，祈求魔绫永固。
actors.mobs.npcs.zero.fiveyears.zakoflowernewyears.messages2=来，吃了这个饼吧，祝你马到成功哦！
actors.mobs.npcs.zero.fiveyears.zakoflowernewyears.messages3=什么！本咕不是胖，本咕是大胃袋。


actors.mobs.npcs.zero.fiveyears.smallleafnewyears.name=小叶
actors.mobs.npcs.zero.fiveyears.smallleafnewyears.desc=地上世界名气最大的探险家之一，据说她探秘过不少恐怖的地牢并安全生还，还有实际上是某小世界创世之神的谣言……不过你并未看出这位少女的非人之处。
actors.mobs.npcs.zero.fiveyears.smallleafnewyears.message1=又是一年春来到，看来得送你点实在的东西。
actors.mobs.npcs.zero.fiveyears.smallleafnewyears.message2=这世界上还有许多地牢等着你。

actors.mobs.npcs.zero.fiveyears.qinlinewyears.name=琴里
actors.mobs.npcs.zero.fiveyears.qinlinewyears.desc=气流在这位少女周围有规则的涌动起来，清风总让人感到舒适和和煦，这也是她带给你的直观感受。
actors.mobs.npcs.zero.fiveyears.qinlinewyears.messages1=新年大吉事事如意，征途平安鬼怪见愁。
actors.mobs.npcs.zero.fiveyears.qinlinewyears.messages2=送你武器寻访凭证，抽个卡看看实力。

actors.mobs.npcs.zero.fiveyears.moruosnewyears.name=摩诺丝
actors.mobs.npcs.zero.fiveyears.moruosnewyears.desc=雪景旅馆的老板娘，据说她见过了无数的冒险者来到这地牢，他们大多一去不返，但也有些能荣耀般归来……
actors.mobs.npcs.zero.fiveyears.moruosnewyears.messages1=%s，欢迎来到雪景旅馆，我是这里的老板娘。
actors.mobs.npcs.zero.fiveyears.moruosnewyears.messages2=近期这里正在举办宴会，和他们聊聊吧。
actors.mobs.npcs.zero.fiveyears.moruosnewyears.messages3=当然，新的一年，我也有一份礼物给你。
actors.mobs.npcs.zero.fiveyears.moruosnewyears.messages4=感觉累了的话，可以前往2楼休息一下哦。
actors.mobs.npcs.zero.fiveyears.moruosnewyears.messages5=祝你能在新的一年探索到更多秘密，当然，这里永远会是属于你的“安全屋”。

actors.mobs.npcs.zero.fiveyears.obsirnewyears.name=ZIOM-Observe-sir
actors.mobs.npcs.zero.fiveyears.obsirnewyears.desc=穿着黑西装的神秘人，头上戴着有各种颜色的帽子，而且他的样子的皮肤根本不像人类。\n据说他跟"奸商"有一些有趣的事情。\n这人本身就不存在这个世界，但究竟为什么会在这里始终是个谜。\n\n死亡并非终点。
actors.mobs.npcs.zero.fiveyears.obsirnewyears.messages1=新年好朋友，有没有拿炸弹去炸怪了?如果没有我这刚好有一个“爆竹”。
actors.mobs.npcs.zero.fiveyears.obsirnewyears.messages2=果然即使过年了我还得上班，呃啊。
actors.mobs.npcs.zero.fiveyears.obsirnewyears.messages3=我一直都在看着你....

actors.mobs.npcs.zero.fiveyears.pinklingnewyears.name = 紫澪
actors.mobs.npcs.zero.fiveyears.pinklingnewyears.desc = 一位始终微笑着的少女。她天真活泼乃至略带稚气的容颜，很好的将她资深冒险家的身份隐藏了起来。她长久伫立于此，迎接一位又一位冒险家。
actors.mobs.npcs.zero.fiveyears.pinklingnewyears.messages1 = 总算到了呢，诶，你好呀！
actors.mobs.npcs.zero.fiveyears.pinklingnewyears.messages2 = 你说你没见过我？昂～我是紫澪，一位冒险家。此前我一直在外调查深海相关事宜，长久未归，现在回来雪景小镇过年啦。
actors.mobs.npcs.zero.fiveyears.pinklingnewyears.messages3 = 听说你帮了冬玲和莲娜一把？看来你不简单嘛，这两姐妹的忙可不好帮。(小声)这两位平时凶得很，一点也不好说话呢。
actors.mobs.npcs.zero.fiveyears.pinklingnewyears.messages4 = 这边难得这么热闹，如果你不是很急的话，不妨多待一会再走吧。
actors.mobs.npcs.zero.fiveyears.pinklingnewyears.messages5= 唔……看来你很赶啊。那好吧，新年快乐哦，祝你的地牢之旅马到成功！

actors.mobs.npcs.zero.fiveyears.yogstsnewyears.name=泡泡
actors.mobs.npcs.zero.fiveyears.yogstsnewyears.desc=不知为何，你隐约觉得眼前的少女和地牢最深处的存在有某种微妙的关系？不过至少现在，她看起来只是一位有些神秘的少女而已。
actors.mobs.npcs.zero.fiveyears.yogstsnewyears.messages1=呼……人类的祝福语该怎么说呢？新的一年，也向我展现些“有趣”的事吧？
actors.mobs.npcs.zero.fiveyears.yogstsnewyears.messages2=根据人类的习俗，也是对你过去一年的嘉奖，这次就特许你挑选想要的新年礼物吧？是知识，赐福，还是财富呢？
actors.mobs.npcs.zero.fiveyears.yogstsnewyears.knows=知识
actors.mobs.npcs.zero.fiveyears.yogstsnewyears.money=赐福
actors.mobs.npcs.zero.fiveyears.yogstsnewyears.wealth=财富
actors.mobs.npcs.zero.fiveyears.yogstsnewyears.all=我全都要！
actors.mobs.npcs.zero.fiveyears.yogstsnewyears.messages3=那么，祝你好运，小家伙，好好运用这份难得的馈赠吧。
actors.mobs.npcs.zero.fiveyears.yogstsnewyears.messages4=太贪婪可不是好孩子哦，也许未来某天，我会因为某些原因允许你稍微贪心一点？不过不是现在呢。
actors.mobs.npcs.zero.fiveyears.yogstsnewyears.messages5=一路顺风，小家伙。

actors.mobs.npcs.zero.fiveyears.autoshopbotnewyears.name=自动食物制作机EX
actors.mobs.npcs.zero.fiveyears.autoshopbotnewyears.desc=这台食物机经过了深度改造。现在，它不仅能够发挥普通食物机的作用，还能够直接制作食物。由于提供了今天的菜肴，此刻它也成为了餐桌上的一员。
actors.mobs.npcs.zero.fiveyears.autoshopbotnewyears.messages1=您所发起的请求已经被响应。正在制作中……
actors.mobs.npcs.zero.fiveyears.autoshopbotnewyears.messages2=制作已完成，请及时取走菜品。
actors.mobs.npcs.zero.fiveyears.autoshopbotnewyears.messages3=您所发起的请求未能被响应，正在进行自检……
actors.mobs.npcs.zero.fiveyears.autoshopbotnewyears.messages4=当前无法生成食物，请耐心等待。

actors.mobs.npcs.zero.fiveyears.choconewyears.name=Choco
actors.mobs.npcs.zero.fiveyears.choconewyears.desc=这位少女看起来有些慵懒，也或许只是没来得及打理才赶来了新春宴会，她似乎不是很适应这里的氛围……
actors.mobs.npcs.zero.fiveyears.choconewyears.messages1=我是choco，需要的话，可以来找我帮忙～（眨眼）

actors.mobs.npcs.zero.fiveyears.pinkfoxnewyears.name=夏渔雾溟
actors.mobs.npcs.zero.fiveyears.pinkfoxnewyears.desc=一位幻化为人型的九尾狐狸，据说掌握金蝶的魔法，可以提供金蝶法阵为你提供嬗变法则。
actors.mobs.npcs.zero.fiveyears.pinkfoxnewyears.messages1=我要去修炼了，尽快修炼成为九尾才是正事，不过我现在饿坏了等着开饭。（肚子发出咕咕的声音）
actors.mobs.npcs.zero.fiveyears.pinkfoxnewyears.messages2=说了别打扰我，这样，看到那个羊了吗，去■它吧。
actors.mobs.npcs.zero.fiveyears.pinkfoxnewyears.messages3=怎么又来，好吧，祝你新年快乐。

actors.mobs.npcs.zero.fiveyears.qianyuedeepnewyears.name=浅月深白
actors.mobs.npcs.zero.fiveyears.qianyuedeepnewyears.desc=永远懒洋洋的异世访客。他似乎已经放下过去的某个执念了。
actors.mobs.npcs.zero.fiveyears.qianyuedeepnewyears.messages1=来啦来啦，主角果然是压轴出场的吗~
actors.mobs.npcs.zero.fiveyears.qianyuedeepnewyears.messages2=欸嘿嘿，新年快乐呐。又一年过去了，时间过得真快呢。
actors.mobs.npcs.zero.fiveyears.qianyuedeepnewyears.messages3=我啊，我已经不打算回去了，就这样在这里挺好的。
actors.mobs.npcs.zero.fiveyears.qianyuedeepnewyears.messages4=哎呀今天就别想那些有的没的了，好好享受吧~

actors.mobs.npcs.zero.fiveyears.hknewyears.name=小骑士
actors.mobs.npcs.zero.fiveyears.hknewyears.desc=来自于另一个维度的访问者，正在旅馆这里休息……
actors.mobs.npcs.zero.fiveyears.hknewyears.messages1=咕咕嘎嘎！你瞅啥，这么多人在旁边站着，为什么就来找我唠嗑？
actors.mobs.npcs.zero.fiveyears.hknewyears.messages2=新年了？哦，时间过得真快呀，转眼间这颗球又绕一圈了。
actors.mobs.npcs.zero.fiveyears.hknewyears.messages3=这个给你吧，新的一年我会继续进地牢跟你抢东西的 ╮(‵▽′)╭
actors.mobs.npcs.zero.fiveyears.hknewyears.messages4=别生气，反正你速度也没我快，抢不过我。

actors.mobs.npcs.zero.fiveyears.nxhyfiveyears.name=那些回忆
actors.mobs.npcs.zero.fiveyears.nxhyfiveyears.desc=那些回忆——一位来历神秘的地牢商人。他知晓许多年前地牢深处发生的一切真相，却始终缄口不言。\n\n曾是仗剑天涯的侠客，如今隐于黑暗之中，为往来冒险者提供补给与物资，却从不会提醒他们此地潜藏的致命危险。
actors.mobs.npcs.zero.fiveyears.nxhyfiveyears.messages1=新岁倏至，辞暮迎春。古堡千载，何以赠新？
actors.mobs.npcs.zero.fiveyears.nxhyfiveyears.messages2=地牢是令人很头疼的地方，但是此时是新年，我会送你一些东西，帮助你通关。
actors.mobs.npcs.zero.fiveyears.nxhyfiveyears.messages3=你还记得我卖的神奇法杖吗？已经是很多年前了。魔绫地牢也陪伴了大家走过了很多年。
actors.mobs.npcs.zero.fiveyears.nxhyfiveyears.messages4=“时间永远分岔，通向无数的将来”，现实世界的你又在做什么呢？
actors.mobs.npcs.zero.fiveyears.nxhyfiveyears$molotovblazebrew.name=莫洛托夫烈焰特调
actors.mobs.npcs.zero.fiveyears.nxhyfiveyears$molotovblazebrew.desc=一瓶冒着火星的琥珀色烈酒，瓶塞缠裹着浸油火绒。\n\n饮用后可获得治疗、激素涌动、极速与火焰之力加持，但酒性刚烈，饮用后会短暂头晕目眩。

actors.mobs.npcs.zero.fiveyears.archettonewyears.name=弦
actors.mobs.npcs.zero.fiveyears.archettonewyears.desc=自称是一名游历至此的旅人，不知为何，你总觉得在哪里见过她。
actors.mobs.npcs.zero.fiveyears.archettonewyears.messages1=%s，你好呀，唔，没见过我？没关系，在此之前我可是一直在看着你哦。
actors.mobs.npcs.zero.fiveyears.archettonewyears.messages2=做个自我介绍吧，我名弦，是一名游历四方的旅人，如今也是刚到这座小镇不久，很高兴与你相识。
actors.mobs.npcs.zero.fiveyears.archettonewyears.messages3=%s，你又来了呀，上次的旅行体验如何呢，不便透露吗，那好吧。
actors.mobs.npcs.zero.fiveyears.archettonewyears.messages4=这里有一些很新奇的东西，看来并不会无聊呢。
actors.mobs.npcs.zero.fiveyears.archettonewyears.messages5=对了，这是给你的礼物。
actors.mobs.npcs.zero.fiveyears.archettonewyears.messages6=一帆风顺哦，nya~。

actors.mobs.npcs.zero.fiveyears.whiteyannewyears.name=白宴
actors.mobs.npcs.zero.fiveyears.whiteyannewyears.desc=一位白发的少女，头发长的可以影响运动了。看起来天真呆然的样子，应该是十分友善的。
actors.mobs.npcs.zero.fiveyears.whiteyannewyears.messages1=新的一年又到了，不过我怎么感觉过了两个年一样，就好像我刚来不久。
actors.mobs.npcs.zero.fiveyears.whiteyannewyears.messages2=年就是这样，过的很快又很单一一样，和地牢一样进去又出来，生活日复一日。
actors.mobs.npcs.zero.fiveyears.whiteyannewyears.messages3=不过，也和年一样，带有些许变化，让世界变得有趣很多呢，地牢也是如此。
actors.mobs.npcs.zero.fiveyears.whiteyannewyears.messages4=还有，能吃是福，一定要好好多吃饭呀，来这个给你，包含我家人的一份噢。

actors.mobs.npcs.zero.fiveyears.whiteyannewyears$flowercake.name=桃花饼
actors.mobs.npcs.zero.fiveyears.whiteyannewyears$flowercake.desc=白宴家乡的桃花饼，是她最喜爱的点心。\n\n即便你尚未踏足桃源岛，她仍在春节之际，将这份独一份的滋味赠予你，愿它能在地牢之中助你一臂之力。
actors.mobs.npcs.zero.fiveyears.whiteyannewyears$flowercake.eat_msg=<#FF4270>清甜软糯，满是桃源的花香。<RGB>

actors.mobs.npcs.zero.fiveyears.atrinewyears.name=萝卜子
actors.mobs.npcs.zero.fiveyears.atrinewyears.desc=看上去是一个普通的女孩，新年佳节，她也来到了餐桌旁边参加盛宴。
actors.mobs.npcs.zero.fiveyears.atrinewyears.messages1=啊，新年快乐，%s。
actors.mobs.npcs.zero.fiveyears.atrinewyears.messages2=虽然我不清楚对新年对你们意味着什么，不过旅馆里飘来了好闻的香味，所以那一定是令人愉悦的日子，对吧？

actors.mobs.npcs.zero.fiveyears.bzmdrnewyears.name=Bzmdr
actors.mobs.npcs.zero.fiveyears.bzmdrnewyears.desc=一位神秘的少年，穿一身黑，看起来不太好相处，他常常出现在旅馆，或许你可以和他聊一聊。
actors.mobs.npcs.zero.fiveyears.bzmdrnewyears.messages1=新年快乐啊，又过了一年呢。
actors.mobs.npcs.zero.fiveyears.bzmdrnewyears.messages2=新的一年要不要体验一点点“小”挑战呢。
actors.mobs.npcs.zero.fiveyears.bzmdrnewyears.messages3=那拿着这个吧。
actors.mobs.npcs.zero.fiveyears.bzmdrnewyears.messages4=那好吧，如果想挑战可以再来找我。
actors.mobs.npcs.zero.fiveyears.bzmdrnewyears.yes=是
actors.mobs.npcs.zero.fiveyears.bzmdrnewyears.no=否

actors.mobs.npcs.zero.fiveyears.bzmdrnewyears$bzmdrgift.name=bzmdr的“礼物”
actors.mobs.npcs.zero.fiveyears.bzmdrnewyears$bzmdrgift.name_end=终末之礼
actors.mobs.npcs.zero.fiveyears.bzmdrnewyears$bzmdrgift.desc=一个黑色盒子，打开后里面仍是同样大小的黑盒，仿佛永远也无法开完。\n\n最好还是不要将它丢弃。\n\n每首次进入下层时，会随机获得以下效果之一，且可叠加：\n_-_ 怪物移动速度临时提升20%%\n_-_ 怪物攻击力提升25%%\n_-_ 怪物视野临时+2\n_-_ 英雄力量临时+2\n_-_ 英雄视野临时+2\n\n每次击败核心Boss后所有累加的效果都将重置。\n\n英雄当前加成：\n力量加成：+%s\n视野加成：+%s
actors.mobs.npcs.zero.fiveyears.bzmdrnewyears$bzmdrgift.magic=这物品中邪恶的魔力将它死死锁在你的背包里，你根本无法丢弃。
actors.mobs.npcs.zero.fiveyears.bzmdrnewyears.def_verb_1=你想干什么……
actors.mobs.npcs.zero.fiveyears.bzmdrnewyears.def_verb_2=找不到事情做就快点踏上征途。
actors.buffs.championenemy$unnamebless.name=未定义的权能
actors.buffs.championenemy$unnamebless.desc=神秘的权能正在影响着地牢的一切生物，小心行事！拥有此效果将得到以下加成\n\n_-_ 移速常规加成：+%s%%\n_-_ 物理伤害加成：+%s%%\n_-_ 常规视野加成：+%s

actors.mobs.npcs.zero.fiveyears.kongfunewyears.name=鸽子
actors.mobs.npcs.zero.fiveyears.kongfunewyears.desc=你并不知晓这位脸色苍白的男人来自何方，姓甚名谁，只知道人们称呼他为“鸽子"。
actors.mobs.npcs.zero.fiveyears.kongfunewyears.messages1=我老想吃鸽子了。最近被饼折磨的吃什么,吐什么，然后特别特别想吃鸽子。。。可惜饼太多了。。。对了，你喜欢吃肉馅饼吗，喜欢的话分你点吧。。。
actors.mobs.npcs.zero.fiveyears.kongfunewyears.messages2=怎么了，冒险者？你难道还想吃肉馅饼吗？食物可不能多吃啊，一个足矣！好了，我要继续浪费时间在那该死的饼上了，祝你好运，冒险者。

actors.mobs.npcs.extra.kuzuminewyears.name=久住
actors.mobs.npcs.extra.kuzuminewyears.desc=作为重点惩戒对象单独关押的囚犯，原先是时间魔女，现已被卸除魔女之名。来自翼绫的枷锁让她如今无法大量动用魔力，连离开这里都是天方夜谭。
actors.mobs.npcs.extra.kuzuminewyears.messages1=你好啊，%s。
actors.mobs.npcs.extra.kuzuminewyears.messages2=被关在这里我也没有好送给你的……要不你把这个拿着吧，就当是我的新年礼物了。
actors.mobs.npcs.extra.kuzuminewyears.messages3=咕，好饿……你能给我些吃的吗？
actors.mobs.npcs.extra.kuzuminewyears.messages5=你要留在这里陪我吗？不，你不属于这里，快踏上征途吧……
actors.mobs.npcs.extra.kuzuminewyears.yes=是
actors.mobs.npcs.extra.kuzuminewyears.no=否
actors.mobs.npcs.extra.kuzuminewyears.inv_title=请投喂久住，谢谢喵
actors.mobs.npcs.extra.kuzuminewyears.empty_1=你答应要请久住吃点好吃的，将手伸进你的背包翻找起来……
actors.mobs.npcs.extra.kuzuminewyears.empty_2=久住用期待的眼神看着你，你什么都没有拿出来，把两只空手摊开看着她。
actors.mobs.npcs.extra.kuzuminewyears.empty_3=“哈！”她扑上来咬了你一口！“那就吃你！”
actors.mobs.npcs.extra.kuzuminewyears.thanks=哇这个真的可以给我吃吗？谢谢喵～作为报答，收下这份祝福吧。
actors.mobs.npcs.extra.kuzuminewyears$2.rankings_desc=<#ff0000>死于饿人……<RGB>
actors.mobs.npcs.extra.kuzuminewyears.kill=<#ff0000>你被饥饿的久住啃死了……<RGB>
actors.mobs.npcs.extra.kuzuminewyears.anary=“哈！”她又咬了你一口！
actors.mobs.npcs.extra.kuzuminewyears.messages4=我看到你在摆弄那朵花儿，莫非只是单纯的想当成饰品吗？如果你想让它发挥一些实际作用的话，可以把它给我一下。可能会有点疼哦～

actors.mobs.bosses.notsync.fayinasaybye.name=法伊娜
actors.mobs.bosses.notsync.fayinasaybye.desc=她静静伫立在剑冢前，沉湎于往昔的回忆。火龙事件已然落幕，森林重归平静，可曾与她并肩饮酒、相伴同行的挚友早已不在，只剩她孤身一人，守着满冢旧剑，念着逝去的故人。
actors.mobs.bosses.notsync.fayinasaybye.messages1=......啊。
actors.mobs.bosses.notsync.fayinasaybye.messages2=嗯，我不冷，我很好，我过会就会回去，不用担心我，谢谢。
actors.mobs.bosses.notsync.fayinasaybye.messages3=法伊娜没再说话，你看着她将瓶中剩下的酒一饮而尽。
actors.mobs.bosses.notsync.fayinasaybye.messages4=.....
actors.mobs.bosses.notsync.fayinasaybye.messages5=其实你也知道......这里是什么地方。
actors.mobs.bosses.notsync.fayinasaybye.messages6=我不知道我被困了多久，可在我记忆中，上次我们一起喝酒，仿佛就是前几周的事情。
actors.mobs.bosses.notsync.fayinasaybye.messages7=我们之中身高最高的那个叫利欧，他不仅个子高，人也很热情，我们的剑坏了都是他帮忙修的。
actors.mobs.bosses.notsync.fayinasaybye.messages8=他也还挺能喝酒的，我上次看他喝了两三瓶下去还在和莎拉聊天。
actors.mobs.bosses.notsync.fayinasaybye.messages9=莎拉也是很热情的人，她会给我们写卷轴，而且我们喝酒就是她组织的，不过她的酒量却不太好.....
actors.mobs.bosses.notsync.fayinasaybye.messages10=法伊娜试图再喝一口酒，可酒瓶里什么也没有。
actors.mobs.bosses.notsync.fayinasaybye.messages11=.....
actors.mobs.bosses.notsync.fayinasaybye.messages12=现在只剩我一个人了。
