custom.utils.plot.hollow.minigame.morphspacmanendplot.message1=演出的第一幕已经结束。
custom.utils.plot.hollow.minigame.morphspacmanendplot.message2=为什么我不是观众，而是出演者？
custom.utils.plot.hollow.minigame.morphspacmanendplot.message3=邀请函从来就不是只给观众的，对吧？
custom.utils.plot.hollow.minigame.morphspacmanendplot.message4a=你必须承认我的目光独到。你是一个天生的伟大演员，这一点你自己也才发现，不是吗？
custom.utils.plot.hollow.minigame.morphspacmanendplot.message4b=但我不希望你仅仅为此而故意砸我的场子，这可不是一位合格的冒险家该展现的素养。
custom.utils.plot.hollow.minigame.morphspacmanendplot.message4c=而且，你干的不错，不是吗？至少，观众们都期待着下一环节呢。
