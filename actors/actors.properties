actors.mobs.bosses.firemagicdied.name=浊焰魔女-莲娜
actors.mobs.bosses.firemagicdied.desc=雪凛峡谷的守护神，商人们的老大。因为你的抢劫商店一事，一场恶战不可避免，无论你有什么理由，先打一架再说吧。
actors.mobs.bosses.firemagicdied.go=%s,吾乃浊焰的化身,你必将受到正义的审判……

actors.mobs.bosses.firemagicdied.cold=周围的空气正在变冷……
actors.mobs.bosses.firemagicdied.wakeup=冰雪魔女已苏醒！
actors.mobs.bosses.firemagicdied.sister=妹妹？算了，现在还不是闲谈的时候。让我们一起审判%s吧。
actors.mobs.bosses.firemagicdied.sad=妹妹！为什么就这样消失了，你原来也是幻象吗？那你，%s，也和她一起陪葬吧！

