custom.utils.plot.hollow.minigame.morphspacmanendplot$twolet_go.game=第二幕-推箱子
custom.utils.plot.hollow.minigame.morphspacmanendplot$twolet_go.quest_start_prompt=《推箱子》（Sokoban）是由_日本游戏设计师今林宏行_首创。玩法通俗易懂，箱子只可以推，不可以拉， 而且一次只能推动一个，胜利条件就是把所有的箱子都推到目的地。\n\n在推箱子44周年之际，我们的第二幕演出将与此项目共演。目标非常明确，在时间消耗完毕前完成推箱子，消耗额外时间则会扣除积分。你还可以局内重置，但这会导致演出不那么完美，所以要扣分，一旦你完成了推箱子或者得分降低为0，那么本场演出将结束。
custom.utils.plot.hollow.minigame.morphspacmanendplot$twolet_go.enter_yes=第二幕-推箱子-演出开始
custom.utils.plot.hollow.minigame.morphspacmanendplot$twolet_go.enter_no=稍后再说

