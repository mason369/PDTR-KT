actors.mobs.slimeprincess.desc=史莱姆公主，一个比Yog更强大的存在。她的力量诞生于300年前翼绫的手中,是翼绫曾经的宠物精灵。因为那场大火，翼绫从此了无音信。而她也来到了这个无人问津的古堡，在这里沉睡着，直到你的到来……吵醒了这个上古原始精灵……

