actors.mobs.bosses.hollow.morphs.name=墨菲厄斯
actors.mobs.bosses.hollow.morphs.desc=无法理解，无法解析。认知模块出现错误，无法解析此数据。\n\n古堡真正的东道主，但同时也是不可名状的外神之一。\n\n祂想拉你成为神，但你毅然拒绝！\n\n由于你见到了神的面貌，你不可能再活着出去！现在，必须直面祂了\n\n<#772F9C>完全无敌，但可以通过击败附近的塔来削弱祂的力量<RGB>
