actors.mobs.npcs.zero.question.warning_1=你应该知道的……赌博是犯法的！
actors.mobs.npcs.zero.question.warning_2=你还想着用你那空空如也的钱包换来一生财富???你只会为你提前预备好死亡的坟墓！！！
actors.mobs.npcs.zero.question.warning_3=疯子……我会拿走你那贪婪的灵魂的！
actors.mobs.npcs.zero.question.warning_4=好了……我会压上一样的筹码，这样输起来也不会太难堪。
actors.mobs.npcs.zero.question.message1_1=真不知道你们怎么想的，来到这座小镇目的就是为了下地牢寻死。
actors.mobs.npcs.zero.question.message1_2=只是取得水晶之心吗？我本以为属于我的战斗应该就到了……
actors.mobs.npcs.zero.question.message1_3=又死了一遍吗……
actors.mobs.npcs.zero.question.message2_1=……
