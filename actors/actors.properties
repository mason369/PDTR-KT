actors.mobs.bosses.hollow.bad.towermindbad.desc_x=一座高耸的石柱，展现出无常思绪的样貌。\n\n_此柱体已完全修复，此柱体让敌人获得周期性晕眩效果，而英雄获得周期净化屏障效果。_

actors.mobs.bosses.hollow.towergods.name=神明之柱
actors.mobs.bosses.hollow.towergods.desc=一座高耸的石柱，展现出神圣十字的样貌。\n神明起源于此，周天信仰汇聚于此。\n“神明，宇宙意志与权柄的具现。”\n宇宙无言，唯有神明能向你展示这份崇高。勿要为自己的渺小彷徨，一同来追随祂们的脚步。\n\n远道而来之人，忽略这傲慢诳语。\n祂自视甚高，殊不知于宇宙而言祂亦是不值一提。\n去击溃这一份狂傲，为神明二字正名。

actors.mobs.bosses.hollow.towertime.name=时间之柱
actors.mobs.bosses.hollow.towertime.desc=一座高耸的石柱，展现出扭曲时间的样貌。\n历史的洪流凝结于此，述说着宇宙的记忆。\n“时间，宇宙中恒常不变之物。”\n箴言被如此铭刻在石柱之上。\n从宇宙有记忆开始，时间就随其同行。从时间的彼端至此，它仍在悄无声息的前进。\n\n远道而来之人，勿要被表象所惑。\n时间从未开口述说自身，悖论是神明的谎言。\n请为我们扫除虚妄，寻回时间最初的准线。

actors.mobs.bosses.hollow.towermachine.name=机械之柱
actors.mobs.bosses.hollow.towermachine.desc=一座高耸的石柱，展现出轮齿机械的样貌。\n它以齿轮的交错阐述秩序，展现原始律动的巨大能量。\n“机械，科技与秩序的象征。”\n一个空有熵增的宇宙是空虚混乱的，唯有秩序能为宇宙万物指明正道。\n\n远道而来之人，摒弃这无用之物。\n机械始于人的巧思，而非神明，秩序同样由自我维持。\n来拆毁这偷来的造物，自己来定义秩序。

actors.mobs.bosses.hollow.towermind.name=思维之柱
actors.mobs.bosses.hollow.towermind.desc=一座高耸的石柱，展现出无常思绪的样貌。\n遍宇灵光汇聚于此，述说着宇宙的思绪。\n“思维，宇宙中最伟大的力量。”\n箴言被如此铭刻在石柱之上。\n从前，物质主导着宇宙的发展方向。始于一个想法，宇宙有了自己的思维与意志，真正拥有了生命。\n\n远道而来之人，无视这虚与委蛇。\n神明将其思维强加于宇宙，僭越者所述皆为妄言。\n请为我们扫除谬论，澄清宇宙的所思所想。

actors.mobs.bosses.hollow.yogsoul$attackdamagemagic.name=深空恶意
actors.mobs.bosses.hollow.yogsoul$attackdamagemagic.desc=来自犹格·索托斯的恶意附着在黑山羊-莎布·尼古拉丝，奈亚·拉托提普，以及祂自己身上\n\n祂们周围7*7范围内的敌人每回合将受到_4心魔损伤_。\n\n剩余回合时长：%s回合。

actors.mobs.bosses.hollow.shubniggurath$diedgalaxy$bombitem.name=秩序之石
actors.mobs.bosses.hollow.shubniggurath$diedgalaxy$bombitem.desc=智者们熟知世间的一切象征都并非空洞无物，而示于此处之事便是其中之一……这种力量无可名状、不可言喻，亦无法被常人所理解；它只可存在于某些掩盖其本质的纬纱之下，存在于某些诗意盎然的离奇故事中
actors.mobs.bosses.hollow.shubniggurath$diedgalaxy$bombitem.cant_pickup=你无法拾取这个秩序之石

actors.mobs.bosses.hollow.nyarlathotep.name=奈亚·拉托提普
actors.mobs.bosses.hollow.nyarlathotep.desc=超越光与暗的领域，直达于难以抑止的太虚；就在这座隐藏在宇宙之中的、令人作呕的墓地里，从超越时间、超越想象的黑暗房间中传来疯狂敲打巨鼓的声响，以及长笛细微、单调、亵渎的音色。应和这可憎的敲击和吹奏，那些庞大而黑暗的终极之神——那些盲目、喑哑、痴愚的蕃神们——正缓慢、笨拙、荒谬地跳起舞蹈。而它们的灵魂就是奈亚拉托提普。\n\n这是它在这个宇宙的化身之一，但灵魂早已不在，祂利用它来传播混沌，传播痴愚……\n\n_攻击时有 50% 概率在场上创建一个不隐藏的随机陷阱（不含造成上下楼效果的陷阱）\n玩家直接踩到陷阱时受到 10 点心魔损伤（翻倍后为 20 点）\n奈亚子的近战攻击会造成 7~14 点心魔损伤。\n奈亚子丢失目标时，每 3 回合会在场上随机位置瞬移。\n\n真实心魔（被动）：奈亚子在场期间，玩家受到的心魔损伤翻倍；且玩家每次受到心魔损伤时，会同时受到相当于该损伤值 50%~100% 的魔法伤害。通过 “真实心魔” 效果造成的魔法伤害，将为场上所有单位回复对应数值的生命值。_

actors.mobs.bosses.hollow.yogsoul.name=犹格·索托斯
actors.mobs.bosses.hollow.yogsoul.desc=犹格·索托斯知晓大门所在。因为犹格·索托斯即是门，犹格·索托斯即是门匙，即是看门者。过去在她，现在在她，未来亦在她，因为万物皆在犹格·索托斯。她知晓旧日支配者曾于何处突破；她亦知晓旧日支配者将于何处再次突破。她知晓这世上的哪些土地曾饱受彼之蹂躏；其也知晓哪些土地仍旧承载彼之践踏；她亦知晓为何当彼践踏受难之土时，却无人得以眼见彼之容貌……犹格·索托斯即是门之匙，凭借此门无数空间在此汇聚。\n\n这是它在这个宇宙的化身之一，但灵魂早已不在，祂利用它来执行秩序，传承规则……\n\n_当近身无目标时，持续引导施法，按固定回合循环触发以下效果：\n每 5 回合，为场上所有友军提升 5% 初始生命值上限，并立即回复 5% 最大生命值，持续巩固团队生存能力。\n每 10 回合，使场上所有友军获得持续 5 回合的心魔侵蚀光环，对自身 7×7 范围内的敌方单位每回合造成 4 点心魔损伤，形成区域压制态势。\n每 15 回合，自身根据已损失生命值回复 10%~20% 最大生命值。_

actors.mobs.bosses.hollow.shubniggurath.name=莎布·尼古拉丝
actors.mobs.bosses.hollow.shubniggurath.desc=她是万物之母，不可言喻者的妻子。有说法称它生出了包括克苏鲁在内的几乎所有的旧日支配者，乃至一切生命，甚至一切修复、孕育生命的咒术可能都与其有关。\n\n这是它在这个宇宙的化身之一，但是是一具没有灵魂的空壳，祂利用它来传播瘟疫，传播绝望……\n\n_当受到物理攻击时，分裂为两个个体，分别继承原有的一半血量，分身继承本体的全部机制。\n若连续 8 回合未受到伤害，则自动分裂一次，两个分身都能全额继承原有血量。\n黑山羊无基础伤害，但若分裂在玩家视野中发生，玩家将受到 8 点心魔损伤。\n黑山羊分身存在时，本体始终无法死亡，且本体血量降为0后立刻回复至1000，重置血量5次后即可无视分身斩杀本体并消灭场上所有分身。\n黑山羊与她的分身至多存在18个，超过无法自动分裂，攻击也无法再分裂。_

actors.mobs.mob.name_old=往日的幻影
actors.mobs.mob.desc_old=来自墨菲厄斯召唤的怪物，其形态与地牢的怪物高度相似。但它们将优先锁定宇宙之心进行攻击，请你务必保卫好宇宙之心！！！

actors.mobs.bosses.hollow.towermachine$starcanon.name=星空粒子高爆弹
actors.mobs.bosses.hollow.towermachine$starcanon.desc=由机械之柱发射出的爆弹，似乎可以引爆星空。不过由于机械之柱年久失修，爆弹威力大打折扣。不过虽说不能引爆星空，但炸死几个平平常常的生物还是没什么问题。\n\n你还在看描述？瓜兮兮的，快跑！！！不然你就只能在这里等死了！
actors.mobs.bosses.hollow.towermachine.starcanon_kill=你被星空粒子高爆弹炸的四分五裂，消散在宇宙之中……

actors.mobs.bosses.hollow.towertime$dreamfireghost.name=星空怨灵
actors.mobs.bosses.hollow.towertime$dreamfireghost.desc=被时间之柱拟构出来的怨灵，可以造成磷火伤害。

actors.mobs.bosses.hollow.towermachine$deadalive.name=亡者归来
actors.mobs.bosses.hollow.towermachine$deadalive.desc=这个生物已经被机械之柱复活，不过由于机械之柱的力量残缺，它很快将会再次回归宇宙的怀抱。\n\n此生物将在%s回合彻底消逝。

actors.mobs.bosses.hollow.towermachine$machineattackcooleddown.name=重装弹药……
actors.mobs.bosses.hollow.towermachine$machineattackcooleddown.desc=机械之柱正在重新填装弹药，在此期间将不能进行任何攻击。\n\n%s回合后，机械之柱将填装完成。

actors.mobs.bosses.hollow.towergods$attackup_palf.name=神圣裁决
actors.mobs.bosses.hollow.towergods$attackup_palf.desc=神明之柱的赐予你的力量，将使得你的伤害提升50%%。\n\n剩余效果时长：%s回合

actors.mobs.bosses.hollow.double_towergods$attackup_palf.name=神圣审判
actors.mobs.bosses.hollow.double_towergods$attackup_palf.desc=神明之柱的赐予你的力量，将使得你的伤害提升100%%。\n\n剩余效果时长：%s回合

actors.mobs.bosses.hollow.towermind$mindcore.name=思想混沌模块
actors.mobs.bosses.hollow.towermind$mindcore.desc=混沌的思想，可以让你感受到宇宙诞生之初的混乱。\n\n思维之柱尚未被摧毁时，此单位无法死亡。但0血会吐出被缴械的物品。
actors.mobs.bosses.hollow.towermind$mindcore.desc_items=这个模块上已经存在一个被缴械的物品：_%s_。

actors.mobs.bosses.hollow.towermind.yell_steal_item=思想正在侵蚀你，你感觉你的%s被缴械了！

actors.mobs.bosses.hollow.towerparalysis.name=柱体瘫痪
actors.mobs.bosses.hollow.towerparalysis.desc=因为其他柱子被击破了，这些柱子将会瘫痪一段时间。在此期间柱子将无法释放任何技能，且受到的伤害提升25%%。\n\n剩余效果时长：%s回合

actors.mobs.npcs.zero.whitelingland.name=澪
actors.mobs.npcs.zero.whitelingland.desc=在一次次的冒险中，她看见了你的努力，她现在站在暴风雪中，但她周围的风雪却异常的平静。\n\n如果你遇到她了，不妨试试和她搭讪看看吧。
actors.mobs.npcs.zero.whitelingland.message1=你好啊，%s。欢迎你再次来到雪景小镇。
actors.mobs.npcs.zero.whitelingland.message2=我的真实身份？抱歉，我现在还不能告诉你。
actors.mobs.npcs.zero.whitelingland.message3=为什么在我附近没有风雪肆虐？我不知道，或许，只是因为我不在乎吧……
actors.mobs.npcs.zero.whitelingland.message4=我在旅馆外的雪地找到了一些补给，也许可以帮到你.......\n\n除了这个补给，我这里还有更多补给，不过我需要你支付一定的费用。
actors.mobs.npcs.zero.whitelingland.a_message5=哦，对了，相逢即是有缘，我这里还有一串项链，便送给你吧。请戴上它吧，希望有这微薄的力量能对你有所帮助。
actors.mobs.npcs.zero.whitelingland.b_message5=这补给也许可以帮到你，希望你能喜欢。
actors.mobs.npcs.zero.whitelingland.message6=时间差不多了，我们下次见吧，%s，祝你好运……
actors.mobs.npcs.zero.whitelingland.c_message1=她已经不再理你，看起来像是睡着了……
actors.mobs.npcs.zero.whitelingland.c_message2=周围盘旋起了水晶粒子，似乎在保护着她。
actors.mobs.npcs.zero.whitelingland.c_message3=还是不要再打扰她了吧.......
actors.mobs.npcs.zero.whitelingland.def_verb_1=愿世界祝福你……
actors.mobs.npcs.zero.whitelingland.def_verb_2=你会获得救赎吗？

actors.buffs.status.ankhcount.name=重生限制
actors.buffs.status.ankhcount.desc=你已经被魔女诅咒，你手中的重生十字架暂时被魔女收回，只有在死亡或者击败魔女后才能获得，并且所有十字架会在返还时移除祝福效果。\n\n当前十字架数量：%s

actors.buffs.status.whiteblastswordstatus.name=白浪·判决
actors.buffs.status.whiteblastswordstatus.desc=对以自身为中心造成相当于攻击力120%%的物理伤害并使其周围所有敌人眩晕8回合，然后给予周围所有敌人%s层中毒。
actors.buffs.status.whiteblastswordstatus.active_skills=释放技能

actors.mobs.npcs.hollow.slicegirl.name=幽寂
actors.mobs.npcs.hollow.slicegirl.desc=一个穿着华丽法袍的少女，她似乎在看着你，但你却看不清她的眼神。
actors.mobs.npcs.hollow.slicegirl.message1=请稍等一下......
actors.mobs.npcs.hollow.slicegirl.message2=你是冒险家吗?
actors.mobs.npcs.hollow.slicegirl.choice1=(点头)
actors.mobs.npcs.hollow.slicegirl.message3=冒险家，请你务必阻止墨菲厄斯......
actors.mobs.npcs.hollow.slicegirl.message4=这座古堡可能只是他计划的开始，没人知道他还会做出什么出格的事情来！
actors.mobs.npcs.hollow.slicegirl.choice2=(询问名字)
actors.mobs.npcs.hollow.slicegirl.message5=你可以叫我幽寂，你叫我什么都可以。
actors.mobs.npcs.hollow.slicegirl.message6=冒险家，我们得抓紧了。我的祝福会帮到你的，我会在深处等着你……

actors.buffs.status.slicedeadbless.name=幽寂祝福
actors.buffs.status.slicedeadbless.desc=和名为幽寂的少女对话后获得的祝福，但你目前并没有感觉有什么用……
actors.buffs.status.slicedeadbless.desc_plus1=你感觉有一股强大的能量环绕在你周围，离你最近的敌人将受到一次_闪电光束攻击_，造成_%s点伤害_。
actors.buffs.status.slicedeadbless.desc_plus2=你感觉自己健步如飞……--获得1.25倍全局移速加成。
actors.buffs.status.slicedeadbless.desc_plus3=你感觉自己力大无穷--获得临时力量+3
actors.buffs.status.slicedeadbless.desc_plus4=你在陷入最后的绝境时，将会获得救赎……\n\n[？？？]
actors.buffs.status.slicedeadbless.desc_cooldown=闪电光束恢复：%s回合
actors.buffs.status.slicedeadbless.bless=当前祝福强度：%s

actors.mobs.npcs.hollow.slicealter.name=？？？
actors.mobs.npcs.hollow.slicealter.desc=在一个石制的台子上放着一块类似人形的物品。\n\n这是用来干什么的?
actors.mobs.npcs.hollow.slicealter.message1=啊，冒险家，你怎么了?
actors.mobs.npcs.hollow.slicealter.message2=头有点晕......
actors.mobs.npcs.hollow.slicealter.message3=我们在这里休息一下吧，看来祂的法术增强了。
actors.mobs.npcs.hollow.slicealter.message4=你没有感觉吗?
actors.mobs.npcs.hollow.slicealter.message5=……

custom.utils.plot.hollow.slicedogplot.message1=唉?刻耳柏洛斯怎么在这里?
custom.utils.plot.hollow.slicedogplot.message2=好像是在这休息呢。
custom.utils.plot.hollow.slicedogplot.message3=刻耳柏洛斯静静地趴在地上，好像睡着了。

### Holiday Event
custom.utils.gregorian.dwj=活动-端午节
custom.utils.gregorian.dwj_desc=端午节活动期间，地牢生成不同类型的_粽子_\n未完成过_鱼人号_的玩家将会通过巨魔铁匠前往\n\n已经完成过鱼人号的玩家不会再次前往此地方\n<#299947>祝各位端午安康！玩得高兴！<RGB>

custom.utils.gregorian.hween=命运之韵-古堡谜团
custom.utils.gregorian.hween_desc=地牢之外，<#F00>不祥的血月<RGB>悄然升起。并且根据曦月冒险家协会调查，地牢的深处出现了异动，协会要求各位立刻前往地牢调查！\n\n<#6E2E95>古堡活动第一阶段现已开启！祝各位玩得高兴！<RGB>\n\n<#FF8400>血月期间，古堡事件开启，肉馅饼替换为南瓜派。<RGB>\n\n古堡进入指南：\n1.每大层猎杀魂灵精英，在_4，9，14，19，23层_必定生成魂灵精英。注意如果_先前的精英未猎杀，则后面的仍会生成，但是由于漏了之前的，你的灵魂碎片类型将不够_，那么你的古堡先决条件就已经不满足。\n2.背包中携带_五大灵魂碎片_，前往24层神秘房间共鸣碎片后即可前往古堡。\n\n古堡进阶指南：\n_-_ 至少完成一次冥河结局，即可在27层发现隐藏道路，前往开启，进入古堡第二阶段故事

custom.utils.gregorian.none=魔绫活动板
custom.utils.gregorian.none_desc=当前无任何活动区间，或你在启动游戏时网络出现故障。\n\n如果是第二类情况，请你开启游戏前保持网络畅通，以获取最新活动数据。
custom.utils.gregorian.remaining_days=剩余天数: %s日
custom.utils.gregorian.remaining_full=%s小时 %s分钟 %s秒

custom.utils.gregorian.dev_birthday=绫的生日庆典
custom.utils.gregorian.dev_birthday_desc=感谢大家支持《魔绫像素地牢》！\n\n绫的生日活动期间，开局随机赠1个有益藏品、2瓶核子可乐与1个祝福重生十字架。\n\n旅馆NPC「澪」固定生成，Boss钴币掉落翻倍。

custom.utils.gregorian.cyj=活动-重阳节
custom.utils.gregorian.cyj_desc=活动还未加载……

custom.utils.gregorian.mej=特别委托-晚宴邀请
custom.utils.gregorian.mej_desc=在新版本使用_战斗巫女_击败矮人将军后。\n\n可获得限定皮肤：_晚宴邀请_服装。\n\n活动结束后，需在下个版本更新后以_1500钴币_购买。


custom.utils.gregorian.gqj=活动-国庆节
custom.utils.gregorian.gqj_desc=<#ffff00>锦绣山河披盛装，万家灯火映辉煌；共祝华夏永昌盛，国泰民安岁月长！<RGB>\n\n国庆节期间，常规0层生成2个盲盒+一个根骨秘药。\n\n并且在非_缩产节食_挑战下，食物恢复的饱腹度+30点。\n\n<#f00> 以我初心敬党心，以我奋斗敬时代。致敬伟大祖国，生日快乐！<RGB>

custom.utils.gregorian.zqj=活动-中秋节
custom.utils.gregorian.zqj_desc=<#ffff00>皓月当空洒清辉，中秋良宵念挚心。祝愿佳节多好运，月圆人圆事事圆。<RGB>\n\n中秋期间，悲伤幽灵特别任务生成，完成后获得限定徽章。

custom.utils.gregorian.cj=五载同行，共赴新程
custom.utils.gregorian.cj_desc=五年携手相伴，我们并肩走过风雨与荣光；新征程已启，愿继续同心同行，奔赴更美好的未来。\n\n五周年庆典期间将有以下效果：\n_-_ 法伊娜新年特别剧情\n_-_ 击败Boss的钴币将双倍掉落\n_-_ 清蒸荷叶鱼替换肉馅饼生成\n_-_ 桃源祈愿活动复刻，低于13挑时，地牢内有55%概率生成桃园祈愿间

custom.utils.gregorian.pqj=复刻-桃源祈愿
custom.utils.gregorian.pqj_desc=地牢深处将55%概率生成 「桃源祈愿间」 \n\n通过支付钴币，获得奖励，为你的冒险添灯加彩！！！

custom.utils.gregorian.yx=欢天喜地闹元宵-预载
custom.utils.gregorian.yx_desc=活动下个版本载入

custom.utils.gregorian.no_activity=无活动
custom.utils.gregorian.end_activity=活动已结束

actors.buffs.championenemy$deadsoulcrack.name=魂灵精英
actors.buffs.championenemy$deadsoulcrack.desc=魂灵精英死亡时掉落灵魂碎片，且免疫所有气体。

actors.mobs.npcs.hollow.cerbussleep.name=睡着的刻耳柏洛斯
actors.mobs.npcs.hollow.cerbussleep.desc=一只大狗正在这里熟睡，安全起见，建议还是不要去打扰它……
actors.mobs.npcs.hollow.cerbussleep.sleep=刻耳柏洛斯静静地趴在地上，好像睡着了。
actors.mobs.npcs.hollow.cerbussleep.touch_good=你轻轻地抚摸着刻耳柏洛斯，毛发很暖和，刻耳柏洛斯似乎没什么反应。
actors.mobs.npcs.hollow.cerbussleep.touch_dog=刻耳柏洛斯好像有些生气了......

actors.mobs.hollow.minigame.ghost_anger.name=红色幽灵
actors.mobs.hollow.minigame.ghost_anger.desc=在迷宫中巡逻，会一直锁定对这里有威胁的你！

actors.mobs.hollow.minigame.ghost_pink.name=粉色幽灵
actors.mobs.hollow.minigame.ghost_pink.desc=在迷宫中巡逻，喜欢和其他幽灵结伴同行。

actors.mobs.hollow.minigame.ghost_smart.name=橙色幽灵
actors.mobs.hollow.minigame.ghost_smart.desc=在迷宫中巡逻，很难猜到下一步它如何行动。好在它偶尔与其他幽灵同行。

actors.mobs.hollow.minigame.ghost_junko.name=青色幽灵
actors.mobs.hollow.minigame.ghost_junko.desc=在迷宫中巡逻，十分的聪明，偶尔还会和红色幽灵从不同方向包围入侵者。

levels.hollow.moveboxhollowactorlevel$box.name=箱子
levels.hollow.moveboxhollowactorlevel$box.desc=可以推向直线任意位置的一个箱子，致敬推箱子游戏。

levels.rooms.hollow.locked.goldmobsroom$guard.name=豺狼巡捕
levels.rooms.hollow.locked.goldmobsroom$guard.desc=在自己的宝藏领地巡逻。如果被它发现，你将陷入一场恶战。

actors.mobs.hollow.allsearch.shadowhunstman.name=影子猎人
actors.mobs.hollow.allsearch.shadowhunstman.desc=已经完全失去理智的猎人，可以持续恢复生命。受到非魔法伤害时，将反射本次伤害的20%给敌人。很难想象会有这样的怪物存在于这里。

levels.rooms.hollow.utils.mobsutilsroom$redgolem.name=血红魔像
levels.rooms.hollow.utils.mobsutilsroom$redgolem.desc=血红魔像组长是矮人精英们试图利用魔法的新应用弥补机械设备长久以来的缺陷的产物。它们虽不似DM-300那样庞大笨重，但仍具有不可小觑的破坏力。\n\n烈焰魔像组长和普通魔像不同，它因为更加灵活且矮小，能通过门，而且矮人给它注入的魔法可以附加火和毒的力量。\n\n不过它的本体相当脆弱，这应该是它没有被量产的根本原因。

levels.rooms.hollow.utils.mobsutilsroom$redsnake.name=血红巨蛇
levels.rooms.hollow.utils.mobsutilsroom$redsnake.desc=曾经是下水道的精英生物，因为掌握极其强大的麻痹魔法，被派到这里来维持秩序。\n\n牺牲了自身的闪避，换来了极高的血量和发射魔弹有概率导致释放麻痹气体。

levels.rooms.hollow.utils.mobsutilsroom$redtorchhuntsman.name=血红赏金猎人组长
levels.rooms.hollow.utils.mobsutilsroom$redtorchhuntsman.desc=这些赏金猎人曾经想来到这个地牢终结最终的黑暗，没想到现在却被地牢暗处的黑暗魔力给腐蚀。现在他们毫无神志，这些生物游荡在监狱附近，等待下一个来到这个地牢的可怜人。\n\n他们身经百战，因此更加危险，务必小心！

levels.rooms.hollow.utils.mobsutilsroom$redmagicshieldman.name=血红魔盾猎人组长
levels.rooms.hollow.utils.mobsutilsroom$redmagicshieldman.desc=曾经去过_水晶之城_的他们，现在已经完全堕入疯狂。\n\n他们的唯一愿望就是:阻止任何一个前进的_冒险者_\n\n受此地区环境影响，它变得更加疯狂，变得_更加健壮且具有威胁_，并且<#f00>敌我不分<RGB>！
levels.rooms.hollow.utils.mobsutilsroom$redmagicshieldman$deadsora.name=狂暴
levels.rooms.hollow.utils.mobsutilsroom$redmagicshieldman$deadsora.desc=这个猎人组长的死亡已经不可避免，但他想拉你作为陪葬品！\n\n时间的推移或是外界的伤害都会消磨护盾。在护盾消散殆尽之际，他彻底消亡。然而，一定要小心，在这一阶段猎人转变为_四连击_且有敌人倒下时_可延续狂暴时间_！\n\n剩余的护盾：%d。

levels.hollow.allsearchhollowactorlevel$recordtimedead.name=隐秘行动
levels.hollow.allsearchhollowactorlevel$recordtimedead.desc=我们即将开始行动，再次确认行动目标。\n\n猎杀敌人，获取奖励，务必边打边搜，最后尽快安全撤离！\n\n牢记以下事项，交战搜索，搞定就撤！\n\n距离被敌军总部发现还有：%s回合。

levels.rooms.hollow.utils.mobsutilsroom$redspider.name=血红巨型蜘蛛组长
levels.rooms.hollow.utils.mobsutilsroom$redspider.desc=红色而多毛的巨型蜘蛛们会试着去躲避直接的战斗，它们更喜欢在远处等待其猎物卷入电网，在剧毒中慢慢死去。它们也能向远处喷吐电网，让其中的敌人被电的酥脆。

levels.rooms.hollow.utils.mobsutilsroom$redshaman.name=血红萨满长老组长
levels.rooms.hollow.utils.mobsutilsroom$redshaman.desc==豺狼家族最年长的豺狼，你光看着这个血红的骷髅头就知道这东西并不好惹。它相当具有威胁，尽量不要去招惹它！

actors.buffs.status.scoreminigame.name=剧院演出计分板
actors.buffs.status.scoreminigame.desc=演出现在正式开始，你是否能完成这场盛大的演出？
