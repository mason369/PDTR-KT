actors.buffs.status.foundchest.name=宝藏搜寻
actors.buffs.status.foundchest.desc=你来到了拟态王的宝藏区域，看起来你还能搜查_%s/5个_宝箱怪，然后这里就会变得不稳定，从而导致其他宝箱怪魂飞魄散离开这里！\n\n偶尔还能看见拟态王的幼年形态，但由于这里时空错乱，你无法将它杀死……

actors.buffs.herodisguise.name=伪装
actors.buffs.herodisguise.desc=幻术魔法改变了你的外貌！虽然此效果是完全装饰性的，但无论如何感觉起来还是很奇怪。\n\n伪装效果剩余时长：%s回合

actors.buffs.greaterhaste.name=瞬间移动
actors.buffs.greaterhaste.desc=惊人的速度加成效果使得一切都好像在此刻静止了。\n\n在瞬间移动的效果下，移动完全不消耗回合，但其它行动的速度仍旧。每一格移动都会消耗一回合瞬间移动。\n\n瞬间移动剩余回合数：%d

actors.mobs.bosses.peach.whiteyan.name=白宴
actors.mobs.bosses.peach.whiteyan.desc=桃源岛中的神秘少女，据传她是此地人民所信奉的守护神。

actors.mobs.bosses.galaxy.servantavgomon.name=亚弗戈蒙之仆
actors.mobs.bosses.galaxy.servantavgomon.desc=信奉亚弗戈蒙的未知种族，虽说信奉亚弗戈蒙，但由于亚弗戈蒙太过暴怒，也有相当一部分教徒会追随在塔维尔左右。
actors.mobs.bosses.galaxy.servantavgomon.scorpion=逃避是一种错误的选择！

