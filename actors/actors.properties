actors.mobs.ebonymimic.name=黑檀宝箱怪
actors.mobs.ebonymimic.reveal=那里有一个宝箱怪！
actors.mobs.ebonymimic.hidden_name=可疑的轮廓
actors.mobs.ebonymimic.hidden_desc=那里似乎有什么东西，但它几乎是完全透明的。
actors.mobs.ebonymimic.desc=宝箱怪是一种能随意改变外形的魔法生物。在地牢里它们几乎一直以宝箱形态出现，因为这样总能吸引疏于防备的冒险家。\n\n黑檀宝箱怪是能使自身变得几乎隐形的极强宝箱怪。它们会潜伏在冒险家可能与之互动的事物上，不过它们也含有属于自己的财宝。


actors.mobs.dragon.piraland.name=变异食人鱼
actors.mobs.dragon.piraland.desc=这些原本温和的动物因为异常的能量波动，变得暴躁且危险。现在它们甚至可以离开水的束缚捕食周围的一切生物作为食物。\n\n_特殊效果：在水上行走时移速提升10%_

actors.mobs.dragon.ricerat.name=糯米老鼠
actors.mobs.dragon.ricerat.desc=来自地下的异变已经连老鼠也被感染到了，现在它们闻起来似乎有一股糯米的味道，但仍然具有非常大的威胁。\n\n必须寻找到异变源头并处理问题源头才能解决此次异变。
actors.mobs.dragon.ricerat.frost_kill=神秘的力量将你冲击成粉碎……

actors.mobs.dragon.pirahaking.name=始祖食人鱼-鱼人号
actors.mobs.dragon.pirahaking.desc=自己辜负的，不可挽回。闭上眼，拥抱黑暗。\n\n一声叹息，任由绝望弥漫。\n\n名利，责任，理想，一切在这里结束。\n\n它似乎有多种情感混杂在一起，也许这就是异变的根本原因。击败鱼人号，让这一切重回寂静。
actors.mobs.dragon.pirahaking.spear=寒冷将会“伴你同行”。
actors.mobs.dragon.pirahaking.nowater=鱼人号搁浅了！但它进行了传送！
actors.mobs.dragon.pirahaking.notice=我会让你的灵魂与我们共舞！
actors.mobs.dragon.pirahaking.leap=静静等待毁灭的降临吧。
actors.mobs.dragon.pirahaking.teleport_away=任何区域都是我行走的证明！
actors.mobs.dragon.pirahaking.defeated=…………

levels.rooms.standard.bloodcrystalroom$bloodcrt.name=猩红结晶
levels.rooms.standard.bloodcrystalroom$bloodcrt.desc=猩红结晶将周期性给予全敌人各种增幅效果，从以下效果抽取\n\n_-_1.愤怒：一股猛烈的怒火在你体内燃烧，增加你50%的物理攻击伤害。\n_-_2.奥术护盾20点，可随时间衰减。\n_-_3.磷火审判10回合，可随时间衰减。\n_-_4.免疫魔法效果10回合，可随时间衰减。\n_-_5.火焰之力15回合，可随时间衰减。\n_-_6.晶触之力15回合，可随时间衰减。
levels.rooms.standard.bloodcrystalroom$bloodcrt.desc_info=当前楼层的结晶将_每%s回合_给予全敌人增益

actors.mobs.npcs.zero.zerodreamshop.name=兰梦洛
actors.mobs.npcs.zero.zerodreamshop.desc=来路不明的时装商人，售卖可以让你摇身一变的时装。
actors.mobs.npcs.zero.zerodreamshop.message1=你好，欢迎来到我的时装商店。
actors.mobs.npcs.zero.zerodreamshop.message2=多买点新衣服，你也会新的感觉哦。
actors.mobs.npcs.zero.zerodreamshop.message3=要想购买时装，你需要用一种蓝色钴币与我交换。
actors.mobs.npcs.zero.zerodreamshop.message4=不同的商品钴币价格不同，欢迎你前来挑选。

actors.mobs.npcs.zero.zerodreamshop.descx=请随意挑选，日后还会更新更多时装。\n\n启用时装后，请到选择角色界面切换皮肤。\n\n皮肤一旦生效后全局生效，护甲无法再影响皮肤状态。
actors.mobs.npcs.zero.zerodreamshop.no=你的钴币不足，请有足够的钴币再回来购买。
actors.mobs.npcs.zero.zerodreamshop.no_skin=你并没有时装自选凭证！
