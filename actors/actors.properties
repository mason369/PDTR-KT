actors.mobs.bosses.dwarfmaster.desc=前矮人王国正规军，如今已经被邪恶魔法腐蚀同化。\n\n他仍然记得矮人王国曾经的辉煌，也记得矮人王国最后的灭亡。他明显认为到来的你是入侵者，小心行事，他作为前矮人王国的正规军首领，作风往往比现阶段的矮人国王更加残暴。\n\n失败不代表一切，死亡不代表结束。
