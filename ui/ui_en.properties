ui.changelist.mlpd.vm0_5_x_changes.newnpc1=New NPC--REN-33
ui.changelist.mlpd.vm0_5_x_changes.renlogs=The traveler from an unknown faraway land, speaking the dialects of Luoyue and Siam, holding the fragrance of lotus stalks in his hands, greets you.\n-This person is always insane, always talking to himself at the entrance of Floor 0.


ui.changelist.mlpd.vm0_5_x_changes.kotlinsi=KotLin
ui.changelist.mlpd.vm0_5_x_changes.kotlinlogs=This is the first time to add _KotLin_, which is currently mainly used for game operation stability.\n-Future versions will make better use of the _KotLin_ language.


ui.changelist.mlpd.vm0_5_x_changes.dev5=Development log
ui.changelist.mlpd.vm0_5_x_changes.dev5logs=This is the last update before college.\n-I know my Java skills are not good enough, but I still bring you version 0.5.\nI hope you have fun.\n\n-2021-9-10-Release


ui.changelist.mlpd.vm0_5_x_changes.jq1=Shadow Rogue Enhancement
ui.changelist.mlpd.vm0_5_x_changes.jq1logs=Health and attack increased. Escape speed increased.


ui.changelist.mlpd.vm0_5_x_changes.xr1=Energy Tower
ui.changelist.mlpd.vm0_5_x_changes.xr1logs=Health reduced from 400 to 150.


ui.changelist.mlpd.vm0_5_x_changes.jq2=Red Ghost Returns
ui.changelist.mlpd.vm0_5_x_changes.jq2logs=Refreshed on the mine layer!


ui.changelist.mlpd.vm0_5_x_changes.newnpc2=ZIOM_Observe-sir
ui.changelist.mlpd.vm0_5_x_changes.obsirlogs=A mysterious man in a black suit, with a hat of various colors on his head, and his skin doesn't look like a human at all. \nIt is said that he has some interesting things with the "profiteer". \nThis man himself does not exist in this world, but why he is here is always a mystery. \n--Death is not the end


ui.changelist.mlpd.vm0_5_x_changes.newnpc3=Frost falls and rain cools
ui.changelist.mlpd.vm0_5_x_changes.slyllogs=The Queen of the Polar Regions is currently investigating the magical changes in the dungeon.


ui.changelist.mlpd.vm0_5_x_changes.newnpc5=Nayako
ui.changelist.mlpd.vm0_5_x_changes.nyzlogs=He is engaged in investigating dungeon anomalies and is also a businessman who likes to sell bombs.


ui.changelist.mlpd.vm0_5_x_changes.newnpc4=Those memories
ui.changelist.mlpd.vm0_5_x_changes.nxhylogs=His origin is unknown, but everyone knows that he is a big boss. His shop is located on the prison floor. If you meet him, be sure to buy something before leaving.


ui.changelist.mlpd.vm0_5_x_changes.newmimic=Diamond Chest King
ui.changelist.mlpd.vm0_5_x_changes.newmimiclogs=It is said to be the king of the treasure chest monsters. \nIts habitat is _heavily guarded_, and if you disturb them, you will definitely die.


ui.changelist.mlpd.vm0_5_x_changes.newwand=Dreadstorm Staff
ui.changelist.mlpd.vm0_5_x_changes.newwandlogs=This staff can emit _fear waves_, and nearby enemies will flee. \nIt can also generate _storms_, rendering all surrounding traps ineffective and turning them into _water ground_.


ui.changelist.mlpd.vm0_5_x_changes.newfood=Universal Healing Drink
ui.changelist.mlpd.vm0_5_x_changes.newfoodlogs=The products of Memories are of the highest quality. \nAvailable in the Memories Store!


ui.changelist.mlpd.vm0_5_x_changes.newsp=Details optimization
ui.changelist.mlpd.vm0_5_x_changes.newsplogs=1. Optimized the main interface [thanks to Tianscar]\n-2. The monster's health value can now be seen [view with a magnifying glass]\n-3. Removed the quick attack bar\n-4. The boss's health bar can see the number. \n-5. Basic bottom-level optimization


ui.changelist.mlpd.vm0_5_x_changes.bug_0505=1.Fixed the crash issue under Android 10 caused by empty ShortBuff method\n-2.Fixed the ghost generation issue.


ui.changelist.mlpd.vm0_5_x_changes.challengegd=Challenge Changes
ui.changelist.mlpd.vm0_5_x_changes.challengegdlogs=€Don't Starve€ now deducts 20% of your health instead of 50%.


ui.changelist.mlpd.vm0_5_x_changes.newmisc=Miscellaneous optimizations
ui.changelist.mlpd.vm0_5_x_changes.newmisclogs=1. Optimized some interfaces\n-2. Corrected some screen ratio issues.


ui.changelist.mlpd.vm0_5_x_changes.newitem=New item: Gold Treasure
ui.changelist.mlpd.vm0_5_x_changes.newitemlogs=Try giving it to the merchant, there might be a surprise.


ui.changelist.mlpd.vm0_5_x_changes.newstory=Character background
ui.changelist.mlpd.vm0_5_x_changes.newstorylogs=Character backgrounds have been added, in preparation for 0.6.


ui.changelist.mlpd.vm0_5_x_changes.cau1=Tianhen Sticky
ui.changelist.mlpd.vm0_5_x_changes.caulogs=For the promise, I have waited 300 years! \n\nBut where are you? \n\nThe changes to Sticky Goo are as follows:\n\n1. HP increased to $240\n2. Attack method changed, please try it yourself. \n3. Drops changed\n4. Optimized BOSS dialogue mode. \n5. Sticky Goo will not recover HP when entering water. \n6. When HP is lower than 20%, there is a 30% chance to trigger life healing\n7. It may summon reinforcements on this floor to help fight. \n8. May trigger $Explosive Curse$\n9. Specific monsters will be refreshed on this floor\n10. Skymark is more targeted at kite-flying players\n11. Other fixes\n\nMiscellaneous changes:\n1. Remove the dwarf king's _key_\n2. A _garden_ and _piranha house_ are fixed on the fifth floor.


ui.changelist.mlpd.vm0_5_x_changes.kage1=Shadow Rogue
ui.changelist.mlpd.vm0_5_x_changes.kagelogs=If a spell fails, it is possible to release €Explosive Fire Curse€.


ui.changelist.mlpd.vm0_5_x_changes.cold=Ice and Snow Polar Layer
ui.changelist.mlpd.vm0_5_x_changes.coldlogs=The forest layer is now changed to ice layer, more terrain monsters will be added in the future.\nMore special rooms and normal rooms will be generated in the ice layer.


ui.changelist.mlpd.vm0_5_x_changes.bug_0507=1. Fixed the issue of Trolls respawning in the mines\n2. Fixed the issue of Dungeon spawn confusion\n3. Completely removed the Quick Attack Bar


ui.changelist.mlpd.vm0_5_x_changes.coldrat=New monster: Ice Rat
ui.changelist.mlpd.vm0_5_x_changes.coldratlogs=Creatures created by the polar regions and unknown magic. They are extremely hostile to adventurers, and their bodies are full of magic due to long-term exposure to unknown magic. They will use their own methods to stop adventurers from moving forward.


ui.changelist.mlpd.vm0_5_x_changes.redswarm=New monster: Red Swarm
ui.changelist.mlpd.vm0_5_x_changes.redswarmlogs=The combination of freezing weather and dark magic created these creatures, and they will use ice and fire to show adventurers who's boss.\nTread carefully.


ui.changelist.mlpd.vm0_5_x_changes.dm300=DM720 changes
ui.changelist.mlpd.vm0_5_x_changes.dm300logs=The changes are as follows:\n\n1. The HP of the Energy Tower is adjusted back to 400, and the Electricity attribute is removed. \n2. DM200 is added. \nDM720 HP is increased


ui.changelist.mlpd.vm0_5_x_changes.goo3=Goo changes
ui.changelist.mlpd.vm0_5_x_changes.goo3logs=The changes are as follows:\n\n1. Correction of blood recovery logic error\n2. Removed poison buff


ui.changelist.mlpd.vm0_5_x_changes.dev6=Development log
ui.changelist.mlpd.vm0_5_x_changes.dev6logs=2021-10-6\n\nAs I promised before, I will continue to bring you more things. After this update, the development will be suspended for a while. \n\nI need more time to deal with my academic problems. Don't worry, I will bring more surprises when I come back again.


ui.changelist.mlpd.vm0_5_x_changes.j1=0-520 version update commemoration
ui.changelist.mlpd.vm0_5_x_changes.j1logs=Unconsciously, I have been developing the dungeon for more than half a year. \n\nI was confused and gave up in the middle. But I persisted in the end. Life is short and it passes by in the blink of an eye. \n\nEveryone will return to nature in the future, so we must fight bravely while we are young. \n\n0520 version commemoration. 0=Ling. Thank you for your support along the way, I will continue to work hard.


ui.changelist.mlpd.vm0_5_x_changes.new1cs=Added 2 new challenges
ui.changelist.mlpd.vm0_5_x_changes.new1cslogs=Nonsense\n\nWhen you lose _upgrades_, _money_, and _crosses_, can you still continue the adventure? \n\nThe health is 120 drops of blood, you can't upgrade, and you can't get gold coins. \n\nThe second challenge: Legion Contract!


ui.changelist.mlpd.vm0_5_x_changes.new2cs=Underground migration && miscellaneous changes
ui.changelist.mlpd.vm0_5_x_changes.new2cslogs=The underlying layer has been migrated to 0.9.2b.\n\nNow spawns two random potions, a fixed cross, a fixed engraving, two random scrolls, a fixed meat pie, and a random stone.


ui.changelist.mlpd.vm0_5_x_changes.kotlinss=KotLin removed
ui.changelist.mlpd.vm0_5_x_changes.kotlinsslogs=KT is no longer used because the bottom layer of the dungeon has been optimized.


ui.changelist.mlpd.vm0_5_x_changes.sss=BOSS layer
ui.changelist.mlpd.vm0_5_x_changes.ssslogs=Boss levels now have traps, and some boss levels have extra rooms and monsters. \n\nBy the way, if the boss dies, all other monsters on the level will die as well.


ui.changelist.mlpd.vm0_5_x_changes.bug_0520=Bug Fixes\n\n-_1_: Corrected the health of Phantom Thief\n-_2_: Fixed the issue where the boss died but the monsters were still alive\n-_3_: Fixed the issue where DM300 generated errors\n-_4_: Fixed the issue where Legion Contract had too many monsters and could not load the next level\n_5_: Fixed the issue where the Necromancer crashed.


ui.changelist.mlpd.vm0_5_x_changes.bossc1=Tengu changes
ui.changelist.mlpd.vm0_5_x_changes.bossc1logs=_Tengu_ now splits into _Little Tengu_ when attacking,\nto help in the battle. Little Tengu will bring some danger to the player and may cause _bleeding damage_. \nWhen _Da Tengu_ reaches half health_, he will enter _Berserk Mode_. \nIn Berserk Mode, every time Tengu throws something, it will cause _fire_. At the same time, _Little Tengu Berserk Form_ will also spit fire. \nUnlike Da Tengu, _Little Tengu's fire spitting takes _2_ rounds to start. And the fire spitting is not infinite. After the _fire spitting ammunition_ is used up, _Little Tengu will fight in close combat_. \nThe lower the Da Tengu's health, the higher the _fire spitting frequency_. At the same time, _More Little Tengu_ will be summoned. \nWhen Da Tengu dies, all other monsters will automatically die. \nNote: Little Tengu will not give you any experience!


ui.changelist.mlpd.vm0_5_x_changes.goo4logs=Changes are as follows:\n\n1. HP changed back to 80 HP\n\n2. Frost Debuff added\n\n3. Lightning Chain Ball, same as DM100\n\n4. May summon enemies on this floor (only rats and slimes)\n\n5. Strengthen attack and add poison debuff\n\n6. Water HP recovery is added back.


ui.changelist.mlpd.vm0_5_x_changes.dm3004=DM-300 changes
ui.changelist.mlpd.vm0_5_x_changes.dm3004logs=DM300 summons monsters every time you switch modes.


ui.changelist.mlpd.vm0_5_x_changes.newsc=The 4th Quest - The Old Staff Maker
ui.changelist.mlpd.vm0_5_x_changes.newsclogs=Defeat the Necromancer and get a high reward!


ui.changelist.mlpd.vm0_5_x_changes.newsc1=Death Lord
ui.changelist.mlpd.vm0_5_x_changes.newsc1logs=The leader of the Necromancer Cult. Defeating him will put the Necromancers to rest.


ui.changelist.mlpd.vm0_5_x_changes.newmisc1=Miscellaneous Changes - S
ui.changelist.mlpd.vm0_5_x_changes.newmisc1logs=1. The maximum capacity of water bag is now changed to _10_\n\n2. Some talents have been changed.


ui.changelist.mlpd.vm0_5_x_changes.dev7=BOSS floor randomization
ui.changelist.mlpd.vm0_5_x_changes.dev7logs=Boss is no longer monotonous. Come and have fun with the boss!


ui.changelist.mlpd.vm0_5_x_changes.musica=Original music snow layer implemented &&materials implemented
ui.changelist.mlpd.vm0_5_x_changes.musicalogs=Original work by author_Prohonor_! \n\nThanks to the original work of author_Quilt_!


ui.changelist.mlpd.vm0_5_x_changes.ksx=Added random text to the loading screen
ui.changelist.mlpd.vm0_5_x_changes.ksxlogs=MLPD! ! !


ui.changelist.mlpd.vm0_5_x_changes.sca=New Item - Cross of Dead Essence
ui.changelist.mlpd.vm0_5_x_changes.scalogs=Quest Item\n\nGive it to the old staff maker to receive a high reward!


ui.changelist.mlpd.vm0_5_x_changes.newitems=Quicklime Solid Ideal Reagent
ui.changelist.mlpd.vm0_5_x_changes.newitemslogs=Officially implemented!


ui.changelist.mlpd.vm0_5_x_changes.eme=New Fire Elemental Quest Upgrade
ui.changelist.mlpd.vm0_5_x_changes.emelogs=No need to summon now, just find the room!


ui.changelist.mlpd.vm0_5_x_changes.alks=Alchemy recipe updated with a new recipe
ui.changelist.mlpd.vm0_5_x_changes.alkslogs=Please refer to the Alchemy-Meat section for details!


ui.changelist.mlpd.vm0_5_x_changes.bagsd=New achievements
ui.changelist.mlpd.vm0_5_x_changes.bagsdlogs=Added 6 new achievements! Check them out for yourself in the badges interface.


ui.changelist.mlpd.vm0_5_x_changes.new1css=Devil's Water changed to Muddy Water
ui.changelist.mlpd.vm0_5_x_changes.new1csslogs=For detailed information, please refer to the challenge description.


ui.changelist.mlpd.vm0_5_x_changes.king=New BOSS - Slime Prince
ui.changelist.mlpd.vm0_5_x_changes.kinglogs=Terraria! Of course this boss is not simple!


ui.changelist.mlpd.vm0_5_x_changes.dm7204=New BOSS-DM720
ui.changelist.mlpd.vm0_5_x_changes.dm7204logs=The ultimate weapon in the mines!


ui.changelist.mlpd.vm0_5_x_changes.ax=New BOSS - Ice Witch
ui.changelist.mlpd.vm0_5_x_changes.axlogs=The queen of the ice layer, but definitely not our friend.\n\n--Stay tuned!


ui.changelist.mlpd.vm0_5_x_changes.axs=New system
ui.changelist.mlpd.vm0_5_x_changes.axslogs=SAN value system. \n\n--Stay tuned!


ui.changelist.mlpd.vm0_5_x_changes.axa=Dwarf King Rework
ui.changelist.mlpd.vm0_5_x_changes.axalogs=Big Changes to the Dwarf King\n\n--Stay tuned!


ui.changelist.mlpd.vm0_5_x_changes.axx=The Ancient Gods are about to undergo a major change
ui.changelist.mlpd.vm0_5_x_changes.axxlogs=Stay tuned!


ui.changelist.mlpd.vm0_5_x_changes.axss=That's not all!
ui.changelist.mlpd.vm0_5_x_changes.axsslogs=There will be more in 0.6, so I won't mention it here. \n\nSee you in 0.6!


ui.changelist.mlpd.vm0_5_x_changes.dead=New Monster - Necromancer
ui.changelist.mlpd.vm0_5_x_changes.deadlogs=Mysterious inhabitants live in the mines. It is said that the fire ghosts in the mines are their masterpiece.


ui.changelist.mlpd.vm0_5_x_changes.sm=New Monster - Elder Shaman
ui.changelist.mlpd.vm0_5_x_changes.smlogs=Elite Shamans inhabit the Mineral Layer. You will never engage them in battle.


ui.changelist.mlpd.vm0_5_x_changes.zlps=New Challenge - Shattered
ui.changelist.mlpd.vm0_5_x_changes.zlpslogs=A strange change has occurred in the dungeon, completing something that can permanently buff your starting items!


ui.changelist.mlpd.vm0_5_x_changes.bug_0509=Bug Fixes\n\n-_1_-: Fixed the problem that the famine contract did not take effect\n\n-_2_: Fixed the problem that the guardian trap crashed


ui.changelist.mlpd.vm0_5_x_changes.bug_0510=Bug fixes\n\n-_1_-: Fixed the crash when the necromancer dies\n\n-_2_: Fixed the crash when the old tengu died


ui.changelist.mlpd.vm0_5_x_changes.newwepaon=New things added to weapon generation
ui.changelist.mlpd.vm0_5_x_changes.newwepaonlogs=1. Black Dog Claw\n\n2. Jungle Stinger\n3. Red Devil Sword\n4. Bomb Dagger


ui.changelist.mlpd.vm0_5_x_changes.newwepaon1=New weapon - Jade Grey Double Blade
ui.changelist.mlpd.vm0_5_x_changes.newwepaon1logs=A masterpiece from the dwarven craftsman _Mr.LunRes_. Wait, this name sounds familiar!


ui.changelist.mlpd.vm0_5_x_changes.newwepaon2=New weapon - Frost Whip
ui.changelist.mlpd.vm0_5_x_changes.newwepaon2logs=The snowy environment of the dungeon creates legendary weapons.


ui.changelist.mlpd.vm0_5_x_changes.newwepaon3=New weapon - Platinum Truesilver Warhammer Greatsword
ui.changelist.mlpd.vm0_5_x_changes.newwepaon3logs=Only a hero can wield this legendary weapon.


ui.changelist.mlpd.vm0_5_x_changes.challs2=Challenge Changes - Shattered
ui.changelist.mlpd.vm0_5_x_changes.challs2logs=You can be resurrected three times for free!


ui.changelist.mlpd.vm0_5_x_changes.challs3=Challenge Changes - Muddy Water
ui.changelist.mlpd.vm0_5_x_changes.challs3logs=9 quicklimes will be given at the start!


ui.changelist.mlpd.vm0_5_x_changes.crashsx=New crash interface
ui.changelist.mlpd.vm0_5_x_changes.crashsxlogs=Crash screen 2.0 is now available! Power By UCE Handler!


ui.changelist.mlpd.vm0_5_x_changes.ankh=Ankh Changes
ui.changelist.mlpd.vm0_5_x_changes.ankhlogs=The cross is now more powerful, granting a short-term healing effect after resurrection.


ui.changelist.mlpd.vm0_5_x_changes.dg24=New Secret Scroll - Flame Demon Secret Scroll
ui.changelist.mlpd.vm0_5_x_changes.dg24logs=Synthesis plan: Go to the alchemy synthesis table to check (


ui.changelist.mlpd.vm0_5_x_changes.dg26=New Secret Scroll - Rose Secret Scroll
ui.changelist.mlpd.vm0_5_x_changes.dg26logs=Synthesis plan: Go to the alchemy synthesis table to check (


ui.changelist.mlpd.vm0_5_x_changes.dg12=Fragmented Changes
ui.changelist.mlpd.vm0_5_x_changes.dg12logs=6-10 refresh to the most mine layer monsters, the most mine sequence group\n\n11-15 refresh to the most city layer monsters, the most city sequence group\n\n16-20 refresh to the most demon layer monsters, the most city sequence group\n\n21-25 fixed demon layer monsters are randomly won in the 0th to 6th sequence


ui.changelist.mlpd.vm0_5_x_changes.bug_0535=Removed Necromancer, but existing saves already loaded cannot be fixed.


ui.changelist.mlpd.vm0_5_x_changes.bug_0536=Fixed negative gold count.


ui.changelist.mlpd.vm0_5_x_changes.bat=New monster: Brown Bat
ui.changelist.mlpd.vm0_5_x_changes.batlogs=Dangerous and unpredictable dungeon dwellers whose attacks can blind you.\n\nOnce dead, they have a big surprise for you.\n\nThey spawn on the Prison Level!


ui.changelist.mlpd.vm0_5_x_changes.kingno=Slime Prince Changes
ui.changelist.mlpd.vm0_5_x_changes.kingnologs=1. Reduced dodge value\n-2. Reduced health\n-3. Attack speed increased, summoned monsters will no longer drop any items after being defeated.\n-Full health to start instant kill mode


ui.changelist.mlpd.vm0_5_x_changes.hxblr=Blood Moon Spellshield Hunter Changes
ui.changelist.mlpd.vm0_5_x_changes.hxblrlogs=1. Health randomization value has been reduced! \n-2. If you are hit hard by a hunter, you will be triggered to {Curse Burning{. \n-3. Blood Moon Shield Hunter is now less likely to knock your weapon away.


ui.changelist.mlpd.vm0_5_x_changes.fireball=New mechanic: Asking for trouble
ui.changelist.mlpd.vm0_5_x_changes.fireballlogs=If you haven't dealt with the Ice Crystals in the Ice Mine or the Demon Layer stuff, then the boss will be the hardest to beat.


ui.changelist.mlpd.vm0_5_x_changes.luzus=Luzus Pearl Bottle-Official Version
ui.changelist.mlpd.vm0_5_x_changes.luzuslogs=Through one afternoon of DameDame\n-Dew Drop Bottles have undergone a massive overhaul\n-Now public data:\n-Upgrades by character level, every 5 levels\n-_+0 No attributes_\n-+1 Dew Drops_3 or more available_Guardian Magic I_ (Gives 5 turns of Arcane Shield)\n-+2 Dew Drops_5 or more available_Guardian Magic II_ (Gives 10 turns of Arcane Shield, 10 turns of Extreme Speed)\n-+2 Dew Drops_6 or more available_Judgment of Dew I_ (Gives Fear + Poison to all enemies on the map)\n-+4 Dew Drops_7 or more available_Guardian Magic III_ (Rose Ward 8 turns, Extreme Speed 8 turns, Fullness 20 turns, Phosphorus Path 12 turns, Vision 8 turns, Healing for a while)\n-+4 Dew Drops_8_and above can use_Fairy Dew Judgment II_(All enemies on the map will be surrounded by phosphorous fire, floating, and stunned for a period of time)\n\n_Using these skills will subtract the corresponding amount of dew drops_


