ui.changelist.mlpd.vm0_5_x_changes.newbookslogs=Now you can get books in the dungeon, and use them to investigate the truth. \n\nRead them to get blessings, and have a chance to get advanced blessings. \n\nCustom books contributed by players will be displayed as entertainment.


