ui.changelist.mlpd.vm0_6_7_x_changes.bug_06x86=1: The demon blood nest summoned in developer mode can move and attack. The attack has no animation and takes a long time. There is no animation when moving, and the texture and actual position will be different after moving (solved, solution: remove)\n2: Fixed the developer mode summoning smoke body actually summoned acid liquid\n3: The ghost mooncake will disappear when the meal reduction diet is turned on (ling knows) (solved, solution: food will be generated normally from now on)\n4: The damage of the Azure Gray Double Blade is fixed, and polarization, rest, strengthening rune, and additional strength cannot be affected\n5: A rotten plum seed will appear after the rotten plum effect of the seed shoes is used\n6: After the achievement of the law of the jungle is obtained, every death of a monster will be reported in the lower right corner (ling knows Known) (Pandora has fixed this problem)\n7: The Flame Wave Staff has only 2 points of charge when it is added to one (Ling knows it) (Handled, handled by changing to upgrade function)\n8: The Mimic King's treasure will disappear if the first subsequent treasure is not obtained (Ling knows it) (Pandora has fixed this problem, Ling has made improvements)\n9: The crystal treasure box monster will fly (Pandora has fixed this problem)\n10: Some boss walls will disappear, presumably because of the suspension bridge floor (Tried to fix, player verification is required)\n11: br can go to floors after the 28th floor through the elevator\n12: The Symbiotic Staff can be upgraded through Arcane Polyester (Ling knows it)\n13: The Hypnotic Rune has two effects\n14: Some icons in the quick synthesis table are wrong (handled)\n15: Fixed some floor conversion errors.


