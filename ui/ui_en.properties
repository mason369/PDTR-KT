ui.changelist.mlpd.vm0_5_x_changes.seed=Map Seed System
ui.changelist.mlpd.vm0_5_x_changes.seedlogs=You can enter any character into the seed box, and then get it through the letters in the game. \n-Please note that the seed is only valid if the letter display sequence in the game is valid. \n-For example, if you enter "HappyNewYear", the sequence number is "XEOMCZLHX". \n-Then you can use your constant code or universal sequence code number when sharing it with friends. \n-Have fun playing the game!


ui.changelist.mlpd.vm0_5_x_changes.bug_05x10=1.Fix the keyless issue. \n-2.Fix the crash issue in some areas


ui.changelist.mlpd.vm0_5_x_changes.bug_05x12=1. Fixed the issue that the EX Ancient God Challenge Badge does not drop the commission. \n-2. Fixed the issue that some areas crashed\n-3. Fixed the issue that the Slime Prince crashed the commission and adjusted the properties


ui.changelist.mlpd.vm0_5_x_changes.exsg=New Challenge: Potion of Hysteria
ui.changelist.mlpd.vm0_5_x_changes.exsglogs=Detailed rules for potion hysteria:\nStrength potion -1 strength\nClairvoyance potion will make you blind for 5 turns\nInvisibility potion will make you roar immediately\nExperience potion will make you bleed for 6 turns\nSpeed potion will make you disabled for 8 turns\n==========================\nMeat stew will upgrade you\nFrozen raw meat slices will give you arcane shield\nMeat pie will give you speed for 8 turns and +1 strength\nFor some reason, you feel that most positive potions are poisonous!\nSome potions are completely debuffed, high-level potions are not affected, but food will be very useful!\n\nRewards for passing: 1500 initial gold coins, 2 experience potions


ui.changelist.mlpd.vm0_5_x_changes.bug_05x13=-1.Fixed the bug of throwing food. \n-2.Fixed the problem of looting system


ui.changelist.mlpd.vm0_5_x_changes.wids2=Ice Witch V2.0
ui.changelist.mlpd.vm0_5_x_changes.wids2logs=Ice Witch has been extensively rebuilt, now the stats are as follows:\n\nHP: 600\nThere are three stages in total\n\nStage 1: 200-600 HP! \nNormal attack + Crystal Tower + Ice Golem\n\nStage 2: 200-50 HP\nGet more Buffs in the water\n\nStage 3: 50-0 HP, defense greatly improved!


ui.changelist.mlpd.vm0_5_x_changes.shop12=Shop Looting System V2.5
ui.changelist.mlpd.vm0_5_x_changes.shop12logs=The button for shop robbery has been changed. If you choose the button for embarking on a journey, the items will be kept but the health will be reduced to 5, and the strength and level will be reset! The character will be sent back to the first floor! \n\nChoosing reverse forgiveness will read the last game progress. (If you exit and re-enter the game after the robbery, it will be useless. You must defeat the boss or choose to embark on a journey)\n\nRecall that you can now just rob and escape! And no more monsters will be released! The floors of memories have been changed to 9 and 18!


