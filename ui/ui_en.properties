ui.changelist.mlpd.vm0_5_x_changes.dev8=Development log
ui.changelist.mlpd.vm0_5_x_changes.dev8logs=This is the last update at the end of the first semester of my freshman year.\n-In the future, I will take a break.\n-On the one hand, I will continue to improve my programming skills, and on the other hand, I will do some other important things.\n\nAnyway, thank you for your support of Magic Dungeon.\n\n2022-1-17-Release!


