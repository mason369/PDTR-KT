ui.changelist.mlpd.vm0_5_x_changes.new6w2=New weapon: Imperial Sword
ui.changelist.mlpd.vm0_5_x_changes.new6w2logs=This imperial sword can cut down monsters and leaders. \n\nIt absorbs the positive energy of heaven and earth, contains the essence of the sun and the moon, and is an ancient divine object that can cut through all obstacles and is invincible.


