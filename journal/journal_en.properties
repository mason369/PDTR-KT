journal.document.intros.dungeon.title=Dungeon
journal.document.intros.dungeon.body=Before you, many heroes from the surface have set foot in this dungeon, but most of them never return. \n\nLegend has it that the almighty Yendor Amulet is hidden in the deepest part of the dungeon, guarded by an ancient evil from the abyss. Even now, dark energy radiates from underground, infiltrating all the way to the surface town. \n\nAre you ready to break through the dungeon and explore the secrets of the amulet? It's time to start your own adventure!


journal.document.intros.sewers.title=Sacred Forest
journal.document.intros.sewers.body=The surface of the dungeon is made up of lush trees. Although we haven't entered the dungeon yet, the dark energy deep underground has already penetrated to the surface. \nThe trees here are denser than other places, and it is difficult to see the sun even during the day. \nBut the influence of the dark energy here seems to be limited to this - if you don't care about the inexplicable small creatures, then this place is no different from other dense forests.


journal.document.intros.prison.title=Ice Prison
journal.document.intros.prison.body=The cold air from the Crystal Heart combined with the moisture from the trees on the ground turned into snowflakes that fell on this old prison. \n\nIt is colder here than on the ground, but not cold enough to make people shiver. \n\nThe prison is now devoid of life, and undead creatures and dead spirits occupy this dilapidated ruin.


journal.document.intros.caves.title=Ice and Snow Caves
journal.document.intros.caves.body=The storm stops here, but it gets colder ahead. This cavern, which leads down from an abandoned prison, has long been empty and now covered in ice. It is too deep and difficult for a city to explore, and the extremely scarce minerals do not arouse the interest of the dwarves. There was once a trading post established here for both factions, but after the decline of the dwarven kingdom, only the ubiquitous gnolls and underground creatures still live here.


journal.document.intros.city.title=Ruins of the Abandoned City
journal.document.intros.city.body=The Dwarven City was once the most magnificent of all the Dwarven city-states. In its heyday, the Dwarves created a number of strange machines infused with magic, which allowed them to rapidly expand the Dwarven city-state. \n\nBut suddenly one day, the gates of the city-state were closed, and the outside world has never heard of the Dwarves since then. According to several Dwarves who managed to escape, a mad Dwarf usurped the throne and used the dark magic he controlled to consolidate his rule.


journal.document.intros.halls.title=Demon's Frontier
journal.document.intros.halls.body=The halls deep within the Dwarven Capital have been twisted by demonic forces. In the past, these halls were ruled by the elite warlocks of the Dwarven King, but they seem to have been replaced by something more sinister and powerful...\n\nDemonic creatures inhabit these halls. A chilling dark will dominates them. If the Dwarven King is not the source of corruption, then the real one must be hiding here! \n\nBe careful on the road, few adventurers can make it all the way here...



