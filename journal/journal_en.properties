journal.document.adventurers_guide.title=Dungeon Adventurers Guide
journal.document.adventurers_guide.intro.title=Basic Introduction
journal.document.adventurers_guide.intro.body=Welcome, brave adventurer! \n\nYou are holding a hardcover copy of the Dungeon Adventurer's Guide! This guide is filled with tips and tricks to help new adventurers survive and improve their abilities! \n\nWhile you can read it all in one sitting, it's best to think of it as a reference book. When you are confused about some of the rules in the dungeon, remember to come back and consult this book. \n\nMay your wisdom guide you to the end, and remember: \nDon't panic! \n\n(Whenever the guide icon in the upper right corner flashes, it means it has new knowledge to tell you! Also, it looks like some parts of this book have been torn off by previous people. Perhaps you can find these fragments in the dungeon?)
journal.document.adventurers_guide.examining.title=Examining the Surroundings
journal.document.adventurers_guide.examining.body=Be in awe and curious about the unknown! \n\nRush forward without thinking can get you into trouble or even death. \n\nYou can stop at any time during the game to examine the surrounding objects and environment, and come up with the best way to defeat the enemy. Rushing into the enemy group is never the best choice. \n\nThe action of inspection is completed instantly. When inspecting, nothing can change in time. So it won't hurt to develop a habit of inspecting new things. \n\n(This function is provided by the magnifying glass button. Click it once and you can select the target to inspect. You can also click the icons of each state to understand their specific effects.)
journal.document.adventurers_guide.surprise_attacks.title=Ambush
journal.document.adventurers_guide.surprise_attacks.body="Haha! Didn't expect that!"\n\nAn attack made when out of the enemy's field of vision or just entering its field of vision will always hit. Even the most agile enemies cannot escape this ambush, and this technique is particularly useful against ghosts and giant snakes. \n\nThe most basic environmental element for an ambush is a door. If an enemy is chasing you through a door, the moment he pushes the door open is your best opportunity to ambush. \n\nThere are many more ways to ambush that I will not go into detail here, and I will wait for you to discover them yourself. When you successfully perform an ambush, a yellow exclamation mark will flash on the enemy you ambushed.
journal.document.adventurers_guide.identifying.title=Identifying Items
journal.document.adventurers_guide.identifying.body=Not all items are completely understood when you first see them! \n\nThe colors of potions and patterns of scrolls are completely random in each dungeon. Equipment may have unique appearances, but they may also have different properties. If you are lucky, the unidentified equipment in your hand may be a strengthened and exquisite item. But it is also very likely to be cursed! Accidentally wearing a cursed equipment may not put you in a desperate situation immediately, but it is definitely not a good thing. \n\nIdentification, upgrading, and exorcism scrolls can greatly reduce the risk of unidentified items. \n\n(You can find all the items you have identified in the item list in the journal)
journal.document.adventurers_guide.food.title=Dances with Hunger
journal.document.adventurers_guide.food.body=In the dungeon, it is very important to save food! \n\nOne of the most basic ways to improve your survival rate in the dungeon is to eat properly. \n\nHunger ultimately affects your health: health will slowly recover during normal times, and health will slowly drain when you are extremely hungry. Although losing life due to hunger is a very bad thing, as long as you are still alive, your adventure will not end. \n\nIn the dungeon, health and hunger should be treated as resources. For example, when your health is full, the natural recovery from the non-starvation state will be wasted. Don't always think about eating too much! \n\nProperly allocating food according to your current health status can significantly reduce your chance of dying from hunger.
journal.document.adventurers_guide.dieing.title=Failure of Seeing Directly
journal.document.adventurers_guide.dieing.body=Failure is the mother of success! \n\nUnfortunately, being a dungeon adventurer is a very dangerous and challenging profession, and most adventurers will die in the depths of the dungeon. Luck is important, but using some tricks can make your adventure more successful. \n\nAlso, if you encounter a very bad situation, running away is not a shameful decision. Leaving the dangerous floor or going directly back to the top of the dungeon will give you enough time to prepare for the next battle. This may not necessarily help you avoid a death. \n\n(You may fail on the first few attempts, after all, this game is not easy! So, take it step by step, practice slowly, and you will find that you will get closer and closer to victory.)
journal.document.adventurers_guide.searching.title=Searching Carefully
journal.document.adventurers_guide.searching.body=Don't rush around! \n\nDungeons are filled with secret doors and traps that are often not immediately apparent upon first sight. If you think something is off in an area, searching the area carefully may be a good idea, even if it takes some valuable time. \n\nSearching can reveal secret doors in your walls and traps in the floor. \n\n(By double-clicking the magnifying glass button, you can search all nearby cells. Anything hidden will be revealed.)
journal.document.adventurers_guide.strength.title=Strength of the Body
journal.document.adventurers_guide.strength.body=You need strength! \n\nYou don't have time to train to master new weapons and armor in the dungeons, so you can only use them effectively by brute force. \n\nStrength potions can directly improve your physical fitness, and are the most effective way to meet the strength requirements of high-level equipment. \n\nIt is very important to take on heavier and stronger high-level weapons and armor, but you can't completely ignore low-level equipment that can be used quickly. When you go deep enough into the dungeon, high-level equipment can provide you with great help, but the premise is that you can go deep into the dungeon!
journal.document.adventurers_guide.upgrades.title=To do good things, you must first sharpen your tools.
journal.document.adventurers_guide.upgrades.body=Using upgraded gear can help you get more done with less effort! \n\nThe deeper you go into a dungeon, the more you'll rely on enhanced gear. \n\nHigher-level weapons and armor can benefit more from upgrades, and their strength requirements can be slightly reduced. While items such as staves, rings, and artifacts don't require strength, they can provide stronger assistance after upgrading. \n\nThe proper allocation of upgrade scrolls is one of the key factors in winning a dungeon. The most successful adventurers often have good upgraded gear.
journal.document.adventurers_guide.looting.title=Looting Tips
journal.document.adventurers_guide.looting.body=Looting is an essential part of your adventure! \n\nSpecial rooms always have better items than regular rooms. Some special rooms are locked or blocked by obstacles. \n\nOf course, if such a room appears, there must be a corresponding item on this floor - a key or other item to help you remove the obstacles here. \n\nThe number of strength potions and upgrade scrolls you have looted is an important criterion for your dungeon exploration. Each dungeon area has 3 upgrade scrolls and 2 bottles of strength potions. \n\n(You can check the journal bar in the upper right corner to see the current keys you have and the special rooms you have encountered.)
journal.document.adventurers_guide.levelling.title=Experience Gained
journal.document.adventurers_guide.levelling.body=What doesn't kill you makes you stronger! \n\nAs you defeat more enemies, your combat experience increases. The experience level you gain determines your chance to hit with each attack, your ability to dodge enemy attacks, and the total amount of health you have. \n\nYour experience level has a significant impact on combat. It is strongly recommended that you have a level at least equal to the level of the dungeon you are on. \n\nIt may be tempting to speed through a dungeon to avoid exploration and combat, but doing so will result in you missing out on supplies and experience points. \n\n(You can see your character's status, including experience and level, in the status bar in the corner of the screen. Click the hero icon for more information)
journal.document.adventurers_guide.positioning.title=Fighting in the Right Place
journal.document.adventurers_guide.positioning.body=Move! \n\nWhen fighting enemies, proper strategy is as important as powerful equipment. Severe situations such as being surrounded by powerful enemies can be avoided. \n\nFor example, narrow corridors are a very common type of terrain in dungeons, which allows you to face only one enemy at a time. These corridors are often adjacent to doorways, which can be used to launch ambushes! \n\nMake reasonable decisions and use various environmental features - grass, water, traps - to your advantage. \n\nFoolish enemies seem to line up in front of your wisdom.
journal.document.adventurers_guide.magic.title=Magic Attacks
journal.document.adventurers_guide.magic.body=Magic is powerful! \n\nMagic attacks penetrate armor and are extremely difficult to dodge. \n\nThis means that a staff is very reliable at dealing damage, but it also makes enemy magical creatures extremely dangerous. \n\nHowever, magic attacks also have weaknesses. A staff that has been depleted of its charge is a useless short stick that takes time to recover. Enemy magic attacks also have weaknesses. \n\nWhen facing enemy magic attacks, it is always more effective to learn how to dodge these spells rather than just take the damage.


journal.document.adventurers_guide.killboss.title=The Last Stand
journal.document.adventurers_guide.killboss.body=Defeating the Boss is an important challenge. At the end of each large level, a powerful Boss character will appear. This is a critical moment to test the player's equipment and skills. If you don't have good enough equipment and some skills, you may be helpless in front of the Boss. \n\nTo explore further in the game, players must act cautiously and take every step carefully. This means that players need to develop an effective game strategy. Different Bosses have different ways of beating, so in the process of exploration, players may encounter various difficult Bosses. Understanding the weaknesses of each Boss and the corresponding fighting methods is the key to your progress in the game exploration. \n\nFacing powerful Bosses, show your courage and wisdom, and get rich rewards and further exploration opportunities by defeating them. Remember, each Boss is a challenge, but also an opportunity to grow and improve. Only by constantly learning and improving yourself can you go further in the game and become a true adventurer.


journal.document.adventurers_guide.waterbless.title=Water Blessing Enhancement
journal.document.adventurers_guide.waterbless.body=It is true that the dungeon is dangerous, but fortunately, the waters still have the power left by Him. \n\nWhen exploring, the first three layers have the blessing of the water spirit, giving players different blessing effects. \n\nBut if the water is too turbid, His bonus will be invalid. \n\nExploring the dungeon is an extremely dangerous thing. Even with His help, there are still many adventurers who never return. \n\nWill you become turbid like the water here with the traces of time and eventually lose your clarity and lose yourself, or will you step through the water with confidence, and walk through the dungeon with your head held high under His and your confidence?


journal.document.adventurers_guide.lanterfire.title=The Lanterfire Path
journal.document.adventurers_guide.lanterfire.body=The lantern leads the way, and the light moves forward. In the high-rise environment, the game will add a lantern mechanism for you. \n\nThe lantern will automatically deduct over time from the 6th floor, and the lantern effect will be removed every time any boss is defeated. If your lantern energy is low, you will encounter the whisper of the witch, and she will make it difficult for you to move forward on the subsequent road. Fortunately, you have a lantern at the beginning, and the energy of the lantern can allow you to slowly restore the lantern, but please note that the energy of the lantern is limited. However, you can also buy lamp oil in the subsequent store. As you explore deeper, you may find more blessings and curses of the lantern. In any case, may the lantern illuminate your way forward! ! !


journal.document.adventurers_guide.alchemy.title=Alchemy and Accessories
journal.document.adventurers_guide.alchemy.body=If you find some consumables that are not very useful, you can try to put them into the cauldron as raw materials! These consumables can be used in established crafting recipes, or they can be converted into universal alchemical energy. \n\nAccessories are a special type of item that can be obtained through alchemy. They can provide a variety of benefits, and only consume a small amount of alchemical energy and a magical catalyst when they are refined. \n\n(You can find the first alchemical cauldron on the third or fourth floor of the dungeon. Next to the alchemical cauldron, you can also find a fragment of the Alchemy Guide.)


journal.document.adventurers_guide.readyherobook.title=The Book of Heroes
journal.document.adventurers_guide.readyherobook.body=There are many legends in the dungeon, which are recorded in books. These books can bring good benefits to your adventure. To get these books, find the mysterious merchant who sells books. \n\nBy purchasing books, reading about historical events, and trying to comprehend the power in the books, you can stimulate your potential and make yourself able to sweep away thousands of enemies. \n\nBut please note that the blessing effect given by the books is limited in duration, so please use them reasonably. \n\nP.S.: You can also buy any item from the terminal seven times to let this merchant settle in the initial layer, so that you can grow outside the game in the future.


journal.document.alchemy_guide.title=Alchemy Guide
journal.document.alchemy_guide.potions.title=Introduction and Getting Started Recipes
journal.document.alchemy_guide.potions.body=Welcome to Alchemy in Action! \n\nThe cauldron allows you to create a wide variety of items following recipes. You can throw this book away and start coming up with new recipes on your own. Or read on for a detailed guide! \n\nWe'll start with the classic recipe: throw three random seeds into the cauldron to brew a potion! \n\nEach type of seed has a corresponding potion. The potion you brew may be related to one of the seeds you used, or it may be completely random. Using more seeds of the same type will reduce the chance of a random potion.
journal.document.alchemy_guide.stones.title=Forging Runes
journal.document.alchemy_guide.stones.body=Put a scroll and two stones into the cauldron to infuse the scroll's magic into the stones. This is a rune stone!
journal.document.alchemy_guide.energy_food.title=Alchemy Energy and Food Cooking
journal.document.alchemy_guide.energy_food.body=Many recipes require alchemical energy crystals, which can be extracted from consumables using an alchemical cauldron. For example: seeds contain 2 energy, stones contain 3 energy, scrolls and potions contain 6 energy.
journal.document.alchemy_guide.exotic_potions.title=Brewing Potions
journal.document.alchemy_guide.exotic_potions.body=Ordinary potions can be infused with alchemical energy, transforming them into flasks. Flasks have more powerful effects, but usually work in a different way than the original potion.
journal.document.alchemy_guide.exotic_scrolls.title=Alchemy Scrolls
journal.document.alchemy_guide.exotic_scrolls.body=An exotic scroll is obtained by combining a scroll with some alchemical energy. An exotic scroll is more powerful than a flask, but obviously more expensive.
journal.document.alchemy_guide.bombs.title=Alchemy Bombs
journal.document.alchemy_guide.bombs.body=A standard black powder bomb can be crafted with a specific item to create a reinforced bomb.
journal.document.alchemy_guide.weapons.title=Enhanced Weapons
journal.document.alchemy_guide.weapons.body=Thrown weapons and staves can also participate in alchemical reactions! \n\nEach thrown object can be melted into a certain amount of liquid crystal, enough to completely repair a single thrown object of the same rank and level. \n\nStaves can be broken into a certain amount of arcane polyester, enough to upgrade two staves of the same level. You cannot upgrade a stave above +3 using this method.
journal.document.alchemy_guide.catalysts.title=Refine Catalysts
journal.document.alchemy_guide.catalysts.body=A catalyst can be crafted from a scroll or potion and a seed or rune. If the ingredients are compatible, no alchemical energy is consumed.\n\nThe primary use of a catalyst is as an alchemical ingredient in the recipes on the next two pages, but it can also be used directly to obtain a random effect.
journal.document.alchemy_guide.brews_elixirs.title=Brew Potions and Elixirs
journal.document.alchemy_guide.brews_elixirs.body=Potions and elixirs are advanced, single-use elixirs with a wide variety of effects.
journal.document.alchemy_guide.spells.title=Extract Crystal
journal.document.alchemy_guide.spells.body=Spellcrystals are spells encapsulated in crystals that have various effects for different purposes and allow for multiple uses.


journal.document.alchemy_guide.wands.title=High-Level Items
journal.document.alchemy_guide.wands.body=High-level items are the ultimate in the dungeon. Refining them requires a lot of alchemical energy and a variety of raw materials. However, their effects are also unparalleled! \n\nHigh-level staff: After refining, you will randomly get level 2-4, but get a more powerful effect\n\nHigh-level scroll: After refining, it will be identified and have a more powerful effect\n\nHigh-level weapon: After refining, you will get a very powerful effect bonus to help you explore and adventure.






