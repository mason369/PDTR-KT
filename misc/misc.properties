paswordbadges$badge.brcler.desc=BR的调查终于告一段落，然而危机仍然还在远方……

paswordbadges$badge.saka_died.title=远古生物档案调查员
paswordbadges$badge.saka_died.desc=击败栖息在阴暗水潭的神秘古生物

paswordbadges$badge.reset_day.title=重见天日？
paswordbadges$badge.reset_day.desc=携带神秘生物的遗物离开地牢，完成它未尽的心愿。

paswordbadges$badge.take_item.title=宝藏探索者
paswordbadges$badge.take_item.desc=获得宝藏迷宫的三个隐藏宝藏，切记，对决不是拟态王的本意。

paswordbadges$badge.big_x.title=突变风波
paswordbadges$badge.big_x.desc=基因突变开启通关！你见证了地牢的突变体，同时也看见了玩火必自焚的道理……\n\n徽章奖励：随机护甲(旅馆老板娘前台处)

paswordbadges$badge.exsg.title=大症若愚
paswordbadges$badge.exsg.desc=药水癔症只是一个假象，你仍然坚持过来了！\n\n徽章奖励：每局额外3钴币(击败5层后自动结算)，每局额外400金币

paswordbadges$badge.godd_make.title=暗室逢灯
paswordbadges$badge.godd_make.desc=累计完成老杖匠的全部委托任务，现在，是他回报恩人的时候了。\n\n徽章奖励：随机戒指(旅馆老板娘前台处)

paswordbadges$badge.zqj_ghost.title=映月离合之殇
paswordbadges$badge.zqj_ghost.desc=完成悲伤幽灵的中秋时期特别任务。\n\n[你太棒了，我所深爱着的搭档[

paswordbadges$badge.night_cat.title=不眠之夜
paswordbadges$badge.night_cat.desc=在夜间通关一次。\n\n[再玩一局就睡觉……睡觉了，啊？怎么早上七点了?!

paswordbadges$badge.pray_legend.title =金色传说！
paswordbadges$badge.pray_legend.desc =在祈愿活动中得到传说级以上等级的物品

paswordbadges$badge.pray_mythology.title=……神话再现！
paswordbadges$badge.pray_mythology.desc=你是电！你是光！你是唯一的神话！\n\n在祈愿活动中得到神话级的奖励

badges$badge.hollowcity.title=狂欢之巅
badges$badge.hollowcity.desc=完成古堡探险

badges$badge.woc_money_girl.title=专 业 团 队
badges$badge.woc_money_girl.desc=在古堡中遭遇一次”喜 从 箱 来 “

badges$badge.master.title=剧院新星
badges$badge.master.desc=在三大演出的首次演出中，演出质量综合评估为S级。

badges$badge.master_two.title=知名演员
badges$badge.master_two.desc=在三大演出的前两次演出中，演出质量综合评估均为S级。

badges$badge.master_three.title=金奖影帝
badges$badge.master_three.desc=在三大演出中的所有演出中，演出质量综合评估均为S级。

badges$badge.kill_dog.title=直面恶犬
badges$badge.kill_dog.desc=-不就是异界的一只狗嘛，有什么好怕的？\n\n_击败刻耳柏洛斯,来自地狱的使者。_

paswordbadges$badge.hellorworld.title=终末赞歌
paswordbadges$badge.hellorworld.desc=在混沌不堪的未来时间线，你仍然战胜了残酷的环境。当你击败祂你感到眼前一黑，醒来后，你发现你回到了正常生活。周围的一切都是如此的真实。\n\n_完成孤城挑战_

paswordbadges$badge.pink_ling.title=邂逅澪神
paswordbadges$badge.pink_ling.desc=在雪景旅馆中，你遇到了一位力量早已不如的以前的一位神识化身，但她仍然在守护这里……

paswordbadges$badge.whatsup.title=懵患开局
paswordbadges$badge.whatsup.desc=噫！好！我中了！！！\n\n(白嫖不规范 金币砍“一瓣”)

paswordbadges$badge.sworddream.title=战士的归宿
paswordbadges$badge.sworddream.desc=时间会让人淡忘一切，但英雄的事迹仍被世人谈起。\n\n丛林已经得到初步净化。我们终将重逢，战友们。

badges$badge.kill_clsister.title=毒果围剿密令
badges$badge.kill_clsister.desc=击杀盘踞在森林底部的变种果子\n\n克里弗斯的“姐姐”

badges$badge.kill_fire_dragon.title=驯龙高手
badges$badge.kill_fire_dragon.desc=击退盘旋在密林深处的熔岩火龙\n\n火龙仍未真正死亡，丛林的命运齿轮只是刚刚开始……\n\n徽章奖励：法伊娜入驻小镇

paswordbadges$badge.king_isto.title=王庭和约
paswordbadges$badge.king_isto.desc=生当作人杰，死亦为鬼雄。\n\n（永久解锁生成矮人将军专武“王庭和约”)

paswordbadges$badge.kill_dwg.title=矮人的愿景
paswordbadges$badge.kill_dwg.desc=他未曾离去。他是过去，亦是未来。

paswordbadges$badge.hero_clre.title=勇敢者的印记
paswordbadges$badge.hero_clre.desc=Bzmdr已见证了你的毅力，你现在可以揭开孤城更为混沌的一面了。\n\n孤城Bzmdr将额外赠予 终末礼物



challenges.no_food=缩餐节食
challenges.no_food_desc=食物本就稀缺，但你还需要注意节食！\n\n・使用各类食物与丰饶之角的饱腹效果为原本的三分之一。\n・其他恢复饥饿的机制不受影响。
challenges.no_armor=信念护体
challenges.no_armor_desc=要相信自己，因为不能相信护甲了！\n\n・护甲被升级时增长的防御力大幅降低。\n・灵壤守护者的防御力大幅降低。
challenges.no_healing=恐药异症
challenges.no_healing_desc=治疗药水真是种好东西，可惜你对它过敏！\n\n・治疗药水以及使用治疗药水炼制的道具将无法治愈英雄，反而会使英雄中毒。\n・炼金催化剂不会随机到治愈英雄或使英雄中毒的效果。\n・这些道具对其他角色依然发挥正常效果。
challenges.no_herbalism=荒芜之地
challenges.no_herbalism_desc=这个晦气的地牢里连干净的水都没有了……\n\n- 移除露珠\n- 移除所有特殊植物\n- 高草依然会掉落种子，但种子不会生根发芽
challenges.swarm_intelligence=集群智能
challenges.swarm_intelligence_desc=要小心了，地牢里的怪物们也在学习进步！\n\n- 当你被敌人发现时，附近的其他敌人也会被吸引到那里。
challenges.darkness=没入黑暗
challenges.darkness_desc=地牢毕竟是在地下嘛！\n\n- 视野范围显著缩小\n- 每层都会出现一根火把\n- 照明效果持续时间缩短
challenges.no_scrolls=禁忌咒文
challenges.no_scrolls_desc=其中一种卷轴符文会变得更稀有。只不过，每次都是最有用的那种。\n\n- 移除地牢中半数的升级卷轴
rankings$record.something=在黑暗中被击杀

challenges.aquaphobia=污泥浊水
challenges.aquaphobia_desc=因为地牢上方的生活污染，水已经被污染了，你需要小心谨慎\n\n_-_ 你踩踏过的水会变为仅对你有效的污泥地块，进入污泥地块会为你附加淤泥浸染负面效果，并且身上大部分的负面效果的剩余回合时间不会低于5回合。\n_-_ 全水地形感觉在获得后还会再有概率80%变成普通地形\n_-_ 每大层会额外产生食人鱼房间\n_-_ 常规商店额外追加“生石灰固体理想合剂"

challenges.champion_enemies=精英战场
challenges.champion_enemies_desc=会升级的不止你一个！\n\n・普通敌人刷出时有 1/8 的机率拥有特殊的精英属性。\n・精英敌人刷出时会立即醒来。\n・精英敌人免疫腐化效果。\n\n精英敌人有9种：\n_烈焰（橙色）：_ 近战伤害 +25% 且带有点燃效果，免疫火焰，死亡时如果周围没水会引燃周围。\n_索敌（紫色）：_ 近战伤害 +25%，近战范围 +4。\n_敌法（绿色）：_ 受到伤害 -25%，且对于法术伤害拥有额外50%的伤害减免。\n_巨型（蓝色）：_ 受到伤害 -75%，近战范围 +1，无法进入门与过道。\n_祝福（黄色）：_ 精准与躲避 +200%。\n_成长（红色）：_ 精准、躲避、攻击伤害与有效生命值 +20%。每过 3 回合会再增长 1%。\n_鬼磷（天蓝色）：_ 近战伤害 +15% 且带有磷火效果，免疫火焰与磷火，死亡时会引燃周围。\n_苦痛（暗紫色）：_半血后，受到的伤害延缓释放，近战伤害+25%

actors.char.aquaphobia=你受到了来自水的伤害！
challenges.pro=}开发者模式}
challenges.pro_desc=供测试和开发使用\n1.可以随意上下楼\n2.可以电子斗蛐蛐\n3.还有更多，欢迎探索\n\n(注意：开发者模式不计入徽章数，也不计入挑战徽章奖励。
challenges.traditional = 现实之声-T1挑战
challenges.hard = 梦境之声-T2挑战
challenges.warning = 寻觅之声-T3挑战
challenges.test = 测试时间-DEBUG

challenges.rlpt = 支离破碎
challenges.rlpt_desc=【平衡：开启金蝶此挑战失效但挑战数量仍记入】\n\n地下涌动的神秘力量正在渐渐腐蚀这里，这里不过是而言是另一场噩梦。\n\n从第6层开始，每区倒数两层（例如8，9层），会有概率产生此挑战的精英怪或下区敌人入侵。\n\n并且还会遭遇各种新的怪物，它们的都相当具有威胁，所以一定要小心谨慎，步步为营。\n\n特殊怪物名单如下：\n\n1、影子盗贼(2区)\n2、兽型猎人(3区)\n3A、烈焰幽灵(4区)精英变种：猩红大盗\n3B、元素怪变种：诡异磷魂\n4、恐怖博士(5区)附属产物:自爆意象体

challenges.sbsg = 基因突变
challenges.sbsg_desc=地牢中的神秘魔力导致部分生物发生变异。\n\n所有生物都会因为突变激素而变得各不相同，给探索地牢带来更大的困难。\n敌人共有6种突变类型，除“爆炸体”概率为5%外，其余类型权重一致：\n\n_突变失败体_：全局移速提升30%，攻击降低35%。\n\n_突变爆炸体_：全局移速降低50%，攻击力降低30%，但死亡时会产生爆炸伤害。\n\n_突变完全体_：全局移速提升50%，攻击力提高25%，且拥有10%伤害减免。\n\n_突变危险体_：攻击力提升20%，攻击有10%概率造成流血。死亡时有5%概率立刻向本层发出警报。\n\n_突变烟雾体_：攻击力减少10%，攻击范围+1，攻击敌人时有10%概率造成眩晕。\n\n_突变相位体_：在前4次攻击命中敌人后会随机传送，并且不处于你视野中时可缓慢回复生命。\n\n特别说明：若开启“精英强敌”，词条可与精英词条共存于同一怪物，届时你将遭遇更大的挑战。\n\n此外，拥有移速变动的怪物不再享受“孤城模式”加成。当存在“爆炸体”基因效果时，其他移速效果不再生效；否则，移速效果将进行乘算。

challenges.exsg = 药水癔症
challenges.exsg_desc=药水癔症详细规则：\n力量药水替换为软肋药剂，但在力量低于11点时效果正常\n灵视药剂替换为瞎眼药剂\n隐形药剂替换为挑衅药剂\n极速药剂替换为断腿药剂，但在血晶哨位存在时不受影响\n==========================\n全肉大饼-吃后立刻获得8回合极速,且有大概率+1力量\n\n(_大饼获取力量每区拥有上限\n\n大层/限制获取(1/2/3/4/5 大层，1/2/2/1/1 次)_\n\n高级药水_(合剂/魔药)_不受影响\n不知道何种原因，大部分正面药水你都感觉有毒！\n你的臆想会导致药水有毒,但食物却会很有用！而且地牢里面还会追加自动售货机，会售卖一些更加高级的东西。

challenges.warling = 战术对抗(下线)
challenges.warling_desc=很显然，怪物已经受够你了，现在，你不会好过了。\n\n你遭遇的敌人将会更加聪明或者更加愚钝(各占50%)\n\n1.愚钝的敌人大部分时间会跟着聪明的敌人，且种族必须一致（也就是老鼠跟老鼠）\n\n2.聪明的敌人在血量小于等于50%并脱战后，会寻找周围的有益植物并获得各种增益并将地块更新为水地形，愚钝的敌人则会完全随机踩植物\n\n3.(12层之后)聪明的敌人在产生时有10%的概率变成突变酸液体，孩子们,我_坠机_了\n\n45.聪明的敌人在发现玩家后会构建竞技场_Boss,NPC,子层除外_

challenges.morelevel=变幻莫测
challenges.morelevel_desc=地牢在时间的熏陶之下中渐渐的诞生了更多地形，这次探索地牢谁知道能遇到什么？\n\n新增6种全新地形感知,1种特定地形感知。\n\n开启此挑战，稀有怪生成概率全局提升10%。\n\n_-_刀山火海层：陷阱大幅度增加。并且在变幻莫测中不再出现常规陷阱层。\n\n_-_超巨大化层：地形变大与怪物变多，且资源变多。并且在变幻莫测中不再出现常规大层。\n\n_-_空城计谋层：本层敌人和物资减少和降低，击败敌人有概率获得额外资源奖励。\n\n_-_精英强敌层：本层必定刷新特别敌人，且此敌人不会睡觉。\n\n_-_血腥结晶层：本层有一个额外房间，将周期给予敌人各种增益效果。\n\n_-_三井祝福层：本层出现固定三井房，，并且刷怪速度略微降低。三井只能选一个，且地图上有其他井使用后其他井也是完全失效。\n\n_-_特殊领袖层：固定层数出现\n_-_隐秘4层-Boss：粘咕\n_-_隐秘8层-Boss：天罚

challenges.dhxd =寂灭灯火
challenges.dhxd_desc= 灯火指引着前进的道路，提灯引路，灯火前行! \n\n此为10挑以上的特殊机制，在10挑以上自动开启，但你也可以开启这个挑战使灯火更加刺激!\n\n_常规灯火详情说明长按这个挑战的按钮可查阅_\n\n挑战说明：\n_-_1.灯火能量将至多72\n_-_2.在低于30灯火能量后，稀有怪生成概率全局提升35%！\n_-_3.商店贩卖的灯油将更稀少，同时灯油价格也会更加昂贵\n_-_4.如果灯火能量低于10，将周期性传送本层敌人在英雄附近\n_-_5.开启此挑战后，低于20灯火，所有敌人的近战攻击均有可能造成灯火能量降低\n_-_5.如果含有黑暗挑战状态，灯火能量自然扣减额外+2！\n\n_-_注意：开启本挑战才_计数为一个挑战_，常规灯火不计入挑战。

challenges.dhxd_moredesc=灯火前路常规机制说明\n\n1.追加灯火祝福和魔女诅咒机制，灯火会随着深入楼后进行降低\n2.在较低的灯火下死亡会精神崩溃，证生自己的暗影，随着自身等级追加，暗影会越来越强.\n3.追加提灯和灯油，合理使用这些道具，让自己能在灯火祝福中活下去！如果不幸遭到魔女的诅咒，也不会让你陷入绝境.\n灯火不灭，希望仍在，提灯引路，灯火前行！

challenges.cs=终幕-孤城迷境
challenges.cs_desc=时间似乎失去了控制。你被吸入一个时空漩涡，反复的在这里轮回。\n\n迷失在一个充满危险的未来世界中。在这个世界中，资源日益稀缺，敌人强大而残忍。\n\n在这里，你虽是英雄身份，但是在这里人人均为普通人。末日的景象在这里浮现，资源早已枯竭，留下的只有残骸和由无尽的瘴气形成的幻影，一不小心就可能丧命。\n\n在用常识无法解释的这里，昼夜交替的法则也正在默默进行。这将也带来更大的挑战。在这个危机四伏的旅程中，你需要谨慎选择行动，找寻稀缺的资源，并尽力探索这片孤城，努力的生存下去吧。\n\n挑战说明：\n_-_1.地牢物品生成大幅度减少,0层地形改变，大部分补给移除。\n_-_2.敌人初始就是醒着的，敌人稀少但个个都是精英。因为弱小的已经被优胜劣汰了。\n_-_3.部分楼层追加特别补给房\n_-_4.所有领袖级的敌人伤害提升至1.25x。\n_-_5.昼夜更替，部分怪物在夜晚拥有更强的攻击性。\n_-_6.从第3层到第24层怪物有25%的概率拥有特别Buff:孤城印记。\n_-_7.孤城英雄移速提升10%。

challenges.no_armorx = 这片大地吃布甲之外的护甲从不挑食,侦查到非布甲的护甲，系统已自动移除。


kill=\n_冰雪魔女:_\n_-_生命+25%\n_-_ 水中召唤的仆从更多\n-击败时必定掉落紫金宝石护符\n_矮人大师:_\n_-_ 致命技能更加频繁\n_-_ 生命值+50%\n-击败时必定掉落自然神圣护符\n_史莱姆王:_\n_-_ 生命值+100%\n_-_ 伤害更高,速度更快\n_-_ 在开局额外召唤豺狼诡术师,巨钳螃蟹,腐臭老鼠,蚀化史莱姆\n_-_ 击败时必定掉落凝胶手套\n_DM720:_\n_-_ 获得全新技能\n_-_ 击败时必定掉落DM150控制终端[尚未完成]

challenges.stronger_bosses=绝命头目
challenges.stronger_bosses_desc=这项挑战让挑战 Boss 变得更有挑战性了！\n开启后你将遭遇更加强大的 Boss,\n以及额外的积分和永久货币奖励和更好的战利品!!!\n还等什么，立刻开始你的行动吧！！！\n\n注意：BossRush直接默认绝命头目开启，且部分BR独占头目无此加成。\n\n}第一区域-圣境密林层}\n\n_A.克里弗斯之果(加强效果预览)：_\n_-_ 全局阶段：\n_-_ 地形发生改变，出现额外两个炸弹补给\n_-_ 第一阶段：\n_-_ 整场藤蔓护甲大幅度提升，整场攻击变为法术伤害，攻击延迟变为4回合\n_-_ 第二阶段：\n_-_ 出现两个纯晶元素，投掷武器补给大幅度降低\n_-_ 第三阶段：\n_-_ 净化药水提供大幅度降低，且出现两个加强版幻影鱼\n_-_ 钴币额外奖励：10\n\n_B.奥克拉赫之花(加强效果预览-WIP)：_\n即将到来\n\n[第二区域-冰雪监狱层[\n\n_A.天狗(加强效果预览)：_\n_-_ 生命 +25%\n_-_ 第一阶段：\n_-_ 陷阱更加致命\n_-_ 第二阶段：\n_-_ 技能频率更高\n_-_ 钴币额外奖励：10\n\n_B.拟态之王(加强效果预览)：_\n_-_ 每次拾取宝物拟态王都会变得更加强大\n_-_ 水晶塔还会周期给予拟态王奥术护盾效果,并且血量大幅度提升\n_-_ 宝藏迷宫追加拟态王幼年形态和黑檀宝箱怪（不透明度提升至45%）\n_-_ 拟态王模拟成你的样子时候，还会获得你护甲总量的三分之一，如果目标护甲0，则固定7护甲\n_-_ 拟态王的普攻伤害提升15%，流血技能更加致命\n_-_ 拟态王的三阶段地图后有概率携带小击退效果\n_-_ 钴币额外奖励：40\n\n_C.暗黑天狗(加强效果预览-WIP)_\n即将到来\n\n]第三区域-冰雪熔洞层]\n\n_A.DM-300(加强效果预览)：_\n_-_ 全局阶段：\n_-_ 生命 +75%\n_-_ 能量塔更坚固.需要摧毁更多能量塔\n_-_ 技能频率更高，威力也更强大\n_-_ 超载时移动速度更高\n_-_ 击败时必掉落_随机一枚戒指_\n\n_B.DM-720(加强效果预览)：_\n_-_ 全局阶段：机甲生命值 +50%\n_-_ 自动驾驶：血月猎人长老会在{剩余2塔时进入战场{ ，但自身攻击造成的伤害会降低\n_-_ 坚不可摧：需要摧毁全部能量塔，能量塔生命值减半\n_-_ 心无旁骛：DM-720被摧毁前血月猎人{完全无敌{ \n_-_ 险峻地势：地形有所不同\n_-_ 战斗结束后奖励更多\n\n_C.冰雪魔女-冬铃(加强效果预览-WIP)：_\n即将到来\n\n|第四区域-废都遗址层|\n\n_A.矮人国王(加强效果预览)：_\n_-_ 全局阶段\n_-_ 生命 +50%\n_-_ 整场战斗内召唤的随从都更强大\n_-_ 第一阶段：技能与召唤频率都更高\n_-_ 第二阶段：额外召唤霜冻魔像和重甲豺狼，重甲豺狼只有原本的62.5%血量。\n_-_ 第三阶段：生命值 +100%，召唤频率更高\n_-_ 第四阶段：最终决战追加最大血量的20%护盾。\n\n_B.矮人将军(加强效果预览-WIP)：敬请期待_\n\n[第五区域-恶魔郊区[\n_A.Yog-Dzewa(加强效果预览)：_\n_-_ 同时召唤两个古神之拳！\n_-_ 二阶段额外召唤寒冰与鬼磷拳头\n_-_ 激光攻击伤害 +60%\n_-_ 召唤更强大的随从\n_B.极度恐惧-水晶意志(加强效果预览-WIP)：_\n即将到来\n\n*额外区域-EX头目*\n远古遗迹-萨卡班甲鱼\n_-_ 地图视野大幅度减小\n_-_ 萨卡班甲鱼的技能更加致命\n\n炙热洞穴-熔岩火龙\n_-_ 地图地形发生变化\n_-_ 每4次攻击后，直接捕获场上元素\n_-_ 第二阶段无敌时间更长，但回复血量只有80。

