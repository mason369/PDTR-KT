challenges.blood_died_desc=你与祂签订契约，成为血族的一员，你在渴求鲜血与混乱的力量...\n\n_-_你渴望<#f00>鲜血<RGB>，从第3层开始，非Boss层时，你不会<#0f0>自然回复生命<RGB>，而是会逐渐流失，随着探索的深入这种力量变得愈发危险。\n_-_你的每次物理攻击均具有<#f00>吸血效果：当前伤害的20%-45%<RGB>，近战武器攻击敌方时有10%概率造成<#f00>双倍伤害<RGB>\n_-_治疗药剂的治愈效果_大幅度下降_\n_-_在此模式中移除 <#0f0>阳春草之种<RGB> 和 <#f00>蓄血圣杯<RGB>

paswordbadges$badge.blood_king.title=血族新生
paswordbadges$badge.blood_king.desc=你通过了祂的试炼，现在你是新生的血族成员之一。\n\n徽章奖励：\n-0层落白商店附近生成<#f00>血族之书<RGB>，在15层前可以抵御一次致死攻击，并且对本层所有敌人造成一次致死攻击。（Boss除外）\n主动使用获得无敌10回合，并且立刻回复全部血量。

