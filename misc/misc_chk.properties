paswordbadges$badge.allchsx.title=水晶聖代
paswordbadges$badge.allchsx.desc=你成功從恐怖的地牢脫身而出，曦月冒險家協會的首領誠邀你前往參加宴會！\n\n開啟13項以上挑戰通關,曦月冒險家協會將首領製作了一個水晶之心大聖代肯定了你本次的地牢之旅。\n\n_你當前最高挑戰通過記錄：%s挑。_

paswordbadges$badge.godchsx.title=聖殿勳章
paswordbadges$badge.godchsx.desc=你已經成功突破了終極考驗，回到地表，地表聯盟賜予你聖殿勳章。\n\n開啟15項以上挑戰通關，榮華富貴的生活正在向你走來，然而這只是一個開始......\n\n_你當前最高挑戰通過記錄：%s挑。_

