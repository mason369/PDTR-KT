paswordbadges$badge.firegirl.desc=重創雪凜峽谷的聖火魔女，讓她接納你。

paswordbadges$badge.drawf_head.title=“舊時代”的終結
paswordbadges$badge.drawf_head.desc=擊敗矮人武將，讓他從詛咒中解脫。

paswordbadges$badge.brcler.title=起始歸一
paswordbadges$badge.brcler.desc=BR的調查終於告一段落，然而危機仍然還在遠方……

paswordbadges$badge.saka_died.title=遠古生物檔案調查員
paswordbadges$badge.saka_died.desc=擊敗棲息在陰暗水潭的神秘古生物

paswordbadges$badge.reset_day.title=重見天日？
paswordbadges$badge.reset_day.desc=攜帶神秘生物的遺物離開地牢，完成它未盡的心願。

paswordbadges$badge.take_item.title=寶藏探索者
paswordbadges$badge.take_item.desc=獲得寶藏迷宮的三個隱藏寶藏，切記，對決不是擬態王的本意。

paswordbadges$badge.big_x.title=突變風波
paswordbadges$badge.big_x.desc=基因突變開啟通關！你見證了地牢的突變體，同時也看見了玩火必自焚的道理……\n\n徽章獎勵：隨機護甲(旅館老闆娘櫃臺處)

paswordbadges$badge.exsg.title=大症若愚
paswordbadges$badge.exsg.desc=藥水癔症只是一個假象，你仍然堅持過來了！\n\n徽章獎勵：每局額外3鈷幣(擊敗5層後自動結算)，每局額外400金幣

paswordbadges$badge.godd_make.title=暗室逢燈
paswordbadges$badge.godd_make.desc=累計完成老杖匠的全部委託任務，現在，是他回報恩人的時候了。\n\n徽章獎勵：隨機戒指(旅館老闆娘櫃臺處)

paswordbadges$badge.zqj_ghost.title=映月離合之殤
paswordbadges$badge.zqj_ghost.desc=完成悲傷幽靈的中秋時期特別任務。\n\n[你太棒了，我所深愛著的搭檔[

paswordbadges$badge.night_cat.title=不眠之夜
paswordbadges$badge.night_cat.desc=在夜間通關一次。\n\n[再玩一局就睡覺……睡覺了，啊？怎麼早上七點了?!

paswordbadges$badge.pray_legend.title =金色傳說！
paswordbadges$badge.pray_legend.desc =在祈願活動中得到傳說級以上等級的物品

paswordbadges$badge.pray_mythology.title=……神話再現！
paswordbadges$badge.pray_mythology.desc=你是電！你是光！你是唯一的神話！\n\n在祈願活動中得到神話級的獎勵

badges$badge.hollowcity.title=狂歡之巔
badges$badge.hollowcity.desc=完成古堡探險

badges$badge.woc_money_girl.title=專 業 團 隊
badges$badge.woc_money_girl.desc=在古堡中遭遇一次”喜 從 箱 來 “

badges$badge.master.title=劇院新星
badges$badge.master.desc=在三大演出的首次演出中，演出質量綜合評估為S級。

badges$badge.master_two.title=知名演員
badges$badge.master_two.desc=在三大演出的前兩次演出中，演出質量綜合評估均為S級。

badges$badge.master_three.title=金獎影帝
badges$badge.master_three.desc=在三大演出中的所有演出中，演出質量綜合評估均為S級。

badges$badge.kill_dog.title=面對惡犬
badges$badge.kill_dog.desc=-不就是異界的一隻狗嘛，有什麼好怕的？\n\n_擊敗刻耳柏洛斯,來自地獄的使者。_

paswordbadges$badge.hellorworld.title=終末讚歌
paswordbadges$badge.hellorworld.desc=在混沌不堪的未來時間線，你仍然戰勝了殘酷的環境。當你擊敗祂你感到眼前一黑，醒來後，你發現你回到了正常生活。周圍的一切都是如此的真實。\n\n_完成孤城挑戰_

paswordbadges$badge.pink_ling.title=邂逅澪神
paswordbadges$badge.pink_ling.desc=在雪景旅館中，你遇到了一位力量早已不如的以前的一位神識化身，但她仍然在守護這裡……

paswordbadges$badge.whatsup.title=懵患開局
paswordbadges$badge.whatsup.desc=噫！好！我中了！！！\n\n(白嫖不規範 金幣砍“一瓣”)

paswordbadges$badge.sworddream.title=戰士的歸宿
paswordbadges$badge.sworddream.desc=時間會讓人淡忘一切，但英雄的事跡仍被世人談起。\n\n叢林已經得到初步淨化。我們終將重逢，戰友們。

badges$badge.kill_clsister.title=毒果圍剿密令
badges$badge.kill_clsister.desc=擊殺盤踞在森林底部的變種果子\n\n克里弗斯的“姐姐”

badges$badge.kill_fire_dragon.title=馴龍高手
badges$badge.kill_fire_dragon.desc=擊退盤旋在密林深處的熔岩火龍\n\n火龍仍未真正死亡，叢林的命運齒輪只是剛剛開始……\n\n徽章獎勵：法伊娜入駐小鎮

paswordbadges$badge.king_isto.title=王庭和約
paswordbadges$badge.king_isto.desc=生當作人傑，死亦為鬼雄。\n\n（永久解鎖生成矮人將軍專武“王庭和約”)

paswordbadges$badge.kill_dwg.title=矮人的願景
paswordbadges$badge.kill_dwg.desc=他未曾離去。他是過去，亦是未來。

paswordbadges$badge.one_pouch.title=一“拳”超人
paswordbadges$badge.one_pouch.desc=在返程後，無論以任何方式殺死任意類型的拳頭！！！

challenges.no_food=縮餐節食
challenges.no_food_desc=食物本就稀缺，但你還需要注意節食！\n\n・使用各類食物與豐饒之角的飽腹效果為原本的三分之一。\n・其他恢復飢餓的機制不受影響。
challenges.no_armor=信念護體
challenges.no_armor_desc=要相信自己，因為不能相信護甲了！\n\n・護甲被升級時增長的防禦力大幅降低。\n・靈壤守護者的防禦力大幅降低。
challenges.no_healing=恐藥異症
challenges.no_healing_desc=治療藥水真是種好東西，可惜你對它過敏！\n\n・治療藥水以及使用治療藥水煉製的道具將無法治癒英雄，反而會使英雄中毒。\n・煉金催化劑不會隨機到治癒英雄或使英雄中毒的效果。\n・這些道具對其他角色依然發揮正常效果。
challenges.no_herbalism=荒蕪之地
challenges.no_herbalism_desc=這個晦氣的地牢裡連乾淨的水都沒有了……\n\n- 移除露珠\n- 移除所有特殊植物\n- 高草依然會掉落種子，但種子不會生根發芽
challenges.swarm_intelligence=集群智慧
challenges.swarm_intelligence_desc=要小心了，地牢裡的怪物們也在學習進步！\n\n- 當你被敵人發現時，附近的其他敵人也會被吸引到那裡。
challenges.darkness=沒入黑暗
challenges.darkness_desc=地牢畢竟是在地下嘛！\n\n- 視野範圍顯著縮小\n- 每層都會出現一根火把\n- 照明效果持續時間縮短
challenges.no_scrolls=禁忌咒文
challenges.no_scrolls_desc=其中一種卷軸符文會變得更稀有。只不過，每次都是最有用的那種。\n\n- 移除地牢中半數的升級卷軸
rankings$record.something=在黑暗中被擊殺

challenges.aquaphobia=汙泥濁水
challenges.aquaphobia_desc=因為地牢上方的生活汙染，水已經被汙染了，你需要小心謹慎\n\n_-_ 你踩踏過的水會變為僅對你有效的汙泥地塊，進入汙泥地塊會為你附加淤泥浸染負面效果，並且身上大部分的負面效果的剩餘回合時間不會低於5回合。\n_-_ 全水地形感覺在獲得後還會再有機率80%變成普通地形\n_-_ 每大層會額外產生食人魚房間\n_-_ 常規商店額外追加“生石灰固體理想合劑"

challenges.champion_enemies=精英戰場
challenges.champion_enemies_desc=會升級的不止你一個！\n\n・普通敵人刷出時有 1/8 的機率擁有特殊的精英屬性。\n・精英敵人刷出時會立即醒來。\n・精英敵人免疫腐化效果。\n\n精英敵人有9種：\n_烈焰（橙色）：_ 近戰傷害 +25% 且帶有點燃效果，免疫火焰，死亡時如果周圍沒水會引燃周圍。\n_索敵（紫色）：_ 近戰傷害 +25%，近戰範圍 +4。\n_敵法（綠色）：_ 受到傷害 -25%，且對於法術傷害擁有額外50%的傷害減免。\n_巨型（藍色）：_ 受到傷害 -75%，近戰範圍 +1，無法進入門與過道。\n_祝福（黃色）：_ 精準與躲避 +200%。\n_成長（紅色）：_ 精準、躲避、攻擊傷害與有效生命值 +20%。每過 3 回合會再增長 1%。\n_鬼磷（天藍色）：_ 近戰傷害 +15% 且帶有磷火效果，免疫火焰與磷火，死亡時會引燃周圍。\n_苦痛（暗紫色）：_半血後，受到的傷害延緩釋放，近戰傷害+25%

actors.char.aquaphobia=你受到了來自水的傷害！
challenges.pro=}開發者模式}
challenges.pro_desc=供測試和開發使用\n1.可以隨意上下樓\n2.可以電子鬥蟋蟀\n3.還有更多，歡迎探索\n\n(注意：開發者模式不計入徽章數，也不計入挑戰徽章獎勵。
challenges.traditional = 現實之聲-T1挑戰
challenges.hard = 夢境之聲-T2挑戰
challenges.warning = 尋覓之聲-T3挑戰
challenges.test = 測試時間-DEBUG

challenges.rlpt = 支離破碎
challenges.rlpt_desc=【平衡：開啟金蝶此挑戰失效但挑戰數量仍記入】\n\n地下湧動的神秘力量正在漸漸腐蝕這裡，這裡不過是而言是另一場噩夢。\n\n從第6層開始，每區倒數兩層（例如8，9層），會有機率產生此挑戰的精英怪或下區敵人入侵。\n\n並且還會遭遇各種新的怪物，它們的都相當具有威脅，所以一定要小心謹慎，步步為營。\n\n特殊怪物名單如下：\n\n1、影子盜賊(2區)\n2、獸型獵人(3區)\n3A、烈焰幽靈(4區)精英變種：猩紅大盜\n3B、元素怪變種：詭異磷魂\n4、恐怖博士(5區)附屬產物:自爆意象體

challenges.sbsg = 基因突變
challenges.sbsg_desc=地牢中的神秘魔力導致部分生物發生變異。\n\n所有生物都會因為突變激素而變得各不相同，給探索地牢帶來更大的困難。\n敵人共有6種突變類型，除“爆炸體”機率為5%外，其餘類型權重一致：\n\n_突變失敗體_：全局移速提升30%，攻擊降低35%。\n\n_突變爆炸體_：全局移速降低50%，攻擊力降低30%，但死亡時會產生爆炸傷害。\n\n_突變完全體_：全局移速提升50%，攻擊力提高25%，且擁有10%傷害減免。\n\n_突變危險體_：攻擊力提升20%，攻擊有10%機率造成流血。死亡時有5%機率立刻向本層發出警報。\n\n_突變煙霧體_：攻擊力減少10%，攻擊範圍+1，攻擊敵人時有10%機率造成眩暈。\n\n_突變相位體_：在前4次攻擊命中敵人後會隨機傳送，並且不處於你視野中時可緩慢回復生命。\n\n特別說明：若開啟“精英強敵”，詞條可與精英詞條共存於同一怪物，屆時你將遭遇更大的挑戰。\n\n此外，擁有移速變動的怪物不再享受“孤城模式”加成。當存在“爆炸體”基因效果時，其他移速效果不再生效；否則，移速效果將進行乘算。

challenges.exsg = 藥水癔症
challenges.exsg_desc=藥水癔症詳細規則：\n力量藥水替換為弱點藥劑，但在力量低於11點時效果正常\n靈視藥劑替換為瞎眼藥劑\n隱形藥劑替換為挑釁藥劑\n極速藥劑替換為斷腿藥劑，但在血晶哨位存在時不受影響\n==========================\n全肉大餅-吃後立刻獲得8回合極速,且有高機率+1力量\n\n(_大餅獲取力量每區擁有上限\n\n大層/限制獲取(1/2/3/4/5 大層，1/2/2/1/1 次)_\n\n高級藥水_(合劑/魔藥)_不受影響\n不知道何種原因，大部分正面藥水你都感覺有毒！\n你的臆想會導致藥水有毒,但食物卻會很有用！而且地牢裡面還會追加自動販賣機，會售賣一些更加高級的東西。

challenges.warling = 戰術對抗(下線)
challenges.warling_desc=很顯然，怪物已經受夠你了，現在，你不會好過了。\n\n你遭遇的敵人將會更加聰明或者更加愚鈍(各占50%)\n\n1.愚鈍的敵人大部分時間會跟著聰明的敵人，且種族必須一致（也就是老鼠跟老鼠）\n\n2.聰明的敵人在血量小於等於50%並脫戰後，會尋找周圍的有益植物並獲得各種增益並將地塊更新為水地形，愚鈍的敵人則會完全隨機踩植物\n\n3.(12層之後)聰明的敵人在產生時有10%的機率變成突變酸液體，孩子們,我_墜機_了\n\n45.聰明的敵人在發現玩家後會構建競技場_Boss,NPC,子層除外_

challenges.morelevel=變幻莫測
challenges.morelevel_desc=地牢在時間的薰陶之下中漸漸的誕生了更多地形，這次探索地牢誰知道能遇到什麼？\n\n新增6種全新地形感知,1種特定地形感知。\n\n開啟此挑戰，稀有怪生成機率全局提升10%。\n\n_-_刀山火海層：陷阱大幅度增加。並且在變幻莫測中不再出現常規陷阱層。\n\n_-_超巨大化層：地形變大與怪物變多，且資源變多。並且在變幻莫測中不再出現常規大層。\n\n_-_空城計謀層：本層敵人和物資減少和降低，擊敗敵人有機率獲得額外資源獎勵。\n\n_-_精英強敵層：本層必定刷新特別敵人，且此敵人不會睡覺。\n\n_-_血腥結晶層：本層有一個額外房間，將週期給予敵人各種增益效果。\n\n_-_三井祝福層：本層出現固定三井房，，並且刷怪速度略微降低。三井只能選一個，且地圖上有其他井使用後其他井也是完全失效。\n\n_-_特殊領袖層：固定層數出現\n_-_隱秘4層-Boss：粘咕\n_-_隱秘8層-Boss：天罰

challenges.dhxd =寂滅燈火
challenges.dhxd_desc= 燈火指引著前進的道路，提燈引路，燈火前行! \n\n此為10挑以上的特殊機制，在10挑以上自動開啟，但你也可以開啟這個挑戰使燈火更加刺激!\n\n_常規燈火詳情說明長按這個挑戰的按鈕可查閱_\n\n挑戰說明：\n_-_1.燈火能量將至多72\n_-_2.在低於30燈火能量後，稀有怪生成機率全局提升35%！\n_-_3.商店販賣的燈油將更稀少，同時燈油價格也會更加昂貴\n_-_4.如果燈火能量低於10，將週期性傳送本層敵人在英雄附近\n_-_5.開啟此挑戰後，低於20燈火，所有敵人的近戰攻擊均有可能造成燈火能量降低\n_-_5.如果含有黑暗挑戰狀態，燈火能量自然扣減額外+2！\n\n_-_注意：開啟本挑戰才_計數為一個挑戰_，常規燈火不計入挑戰。

challenges.dhxd_moredesc=燈火前路常規機制說明\n\n1.追加燈火祝福和魔女詛咒機制，燈火會隨著深入樓後進行降低\n2.在較低的燈火下死亡會精神崩潰，證生自己的暗影，隨著自身等級追加，暗影會越來越強.\n3.追加提燈和燈油，合理使用這些道具，讓自己能在燈火祝福中活下去！如果不幸遭到魔女的詛咒，也不會讓你陷入絕境.\n燈火不滅，希望仍在，提燈引路，燈火前行！

challenges.cs=終幕-孤城迷境
challenges.cs_desc=時間似乎失去了控制。你被吸入一個時空漩渦，反覆的在這裡輪迴。\n\n迷失在一個充滿危險的未來世界中。在這個世界中，資源日益稀缺，敵人強大而殘忍。\n\n在這裡，你雖是英雄身份，但是在這裡人人均為普通人。末日的景象在這裡浮現，資源早已枯竭，留下的只有殘骸和由無盡的瘴氣形成的幻影，一不小心就可能喪命。\n\n在用常識無法解釋的這裡，晝夜交替的法則也正在默默進行。這將也帶來更大的挑戰。在這個危機四伏的旅程中，你需要謹慎選擇行動，找尋稀缺的資源，並盡力探索這片孤城，努力的生存下去吧。\n\n挑戰說明：\n_-_1.地牢物品生成大幅度減少,0層地形改變，大部分補給移除。\n_-_2.敵人初始就是醒著的，敵人稀少但個個都是精英。因為弱小的已經被優勝劣汰了。\n_-_3.部分樓層追加特別補給房\n_-_4.所有領袖級的敵人傷害提升至1.25x。\n_-_5.晝夜更替，部分怪物在夜晚擁有更強的攻擊性。\n_-_6.從第3層到第24層怪物有25%的機率擁有特別Buff:孤城印記。\n_-_7.孤城英雄移速提升10%。

challenges.no_armorx = 這片大地吃布甲之外的護甲從不挑食,偵查到非布甲的護甲，系統已自動移除。


kill=\n_冰雪魔女:_\n_-_生命+25%\n_-_ 水中召喚的僕從更多\n-擊敗時必定掉落紫金寶石護符\n_矮人大師:_\n_-_ 致命技能更加頻繁\n_-_ 生命值+50%\n-擊敗時必定掉落自然神聖護符\n_史萊姆王:_\n_-_ 生命值+100%\n_-_ 傷害更高,速度更快\n_-_ 在開局額外召喚豺狼詭術師,巨鉗螃蟹,腐臭老鼠,蝕化史萊姆\n_-_ 擊敗時必定掉落凝膠手套\n_DM720:_\n_-_ 獲得全新技能\n_-_ 擊敗時必定掉落DM150控制終端[尚未完成]

challenges.stronger_bosses=絕命頭目
challenges.stronger_bosses_desc=這項挑戰讓挑戰 Boss 變得更有挑戰性了！\n開啟後你將遭遇更加強大的 Boss,\n以及額外的積分和永久貨幣獎勵和更好的戰利品!!!\n還等什麼，立刻開始你的行動吧！！！\n\n注意：BossRush直接默認絕命頭目開啟，且部分BR獨占頭目無此加成。\n\n}第一區域-聖境密林層}\n\n_A.克里弗斯之果(加強效果預覽)：_\n_-_ 全局階段：\n_-_ 地形發生改變，出現額外兩個炸彈補給\n_-_ 第一階段：\n_-_ 整場藤蔓護甲大幅度提升，整場攻擊變為法術傷害，攻擊延遲變為4回合\n_-_ 第二階段：\n_-_ 出現兩個純晶元素，投擲武器補給大幅度降低\n_-_ 第三階段：\n_-_ 淨化藥水提供大幅度降低，且出現兩個加強版幻影魚\n_-_ 鈷幣額外獎勵：10\n\n_B.奧克拉赫之花(加強效果預覽-WIP)：_\n即將到來\n\n[第二區域-冰雪監獄層[\n\n_A.天狗(加強效果預覽)：_\n_-_ 生命 +25%\n_-_ 第一階段：\n_-_ 陷阱更加致命\n_-_ 第二階段：\n_-_ 技能頻率更高\n_-_ 鈷幣額外獎勵：10\n\n_B.擬態之王(加強效果預覽)：_\n_-_ 每次拾取寶物擬態王都會變得更加強大\n_-_ 水晶塔還會週期給予擬態王奧術護盾效果,並且血量大幅度提升\n_-_ 寶藏迷宮追加擬態王幼年形態和黑檀寶箱怪（不透明度提升至45%）\n_-_ 擬態王模擬成你的樣子時候，還會獲得你護甲總量的三分之一，如果目標護甲0，則固定7護甲\n_-_ 擬態王的普攻傷害提升15%，流血技能更加致命\n_-_ 擬態王的三階段地圖後有機率攜帶小擊退效果\n_-_ 鈷幣額外獎勵：40\n\n_C.暗黑天狗(加強效果預覽-WIP)_\n即將到來\n\n]第三區域-冰雪熔洞層]\n\n_A.DM-300(加強效果預覽)：_\n_-_ 全局階段：\n_-_ 生命 +75%\n_-_ 能量塔更堅固.需要摧毀更多能量塔\n_-_ 技能頻率更高，威力也更強大\n_-_ 超載時移動速度更高\n_-_ 擊敗時必掉落_隨機一枚戒指_\n\n_B.DM-720(加強效果預覽)：_\n_-_ 全局階段：機甲生命值 +50%\n_-_ 自動駕駛：血月獵人長老會在{剩餘2塔時進入戰場{ ，但自身攻擊造成的傷害會降低\n_-_ 堅不可摧：需要摧毀全部能量塔，能量塔生命值減半\n_-_ 心無旁騖：DM-720被摧毀前血月獵人{完全無敵{ \n_-_ 險峻地勢：地形有所不同\n_-_ 戰鬥結束後獎勵更多\n\n_C.冰雪魔女-冬鈴(加強效果預覽-WIP)：_\n即將到來\n\n|第四區域-廢都遺址層|\n\n_A.矮人國王(加強效果預覽)：_\n_-_ 全局階段\n_-_ 生命 +50%\n_-_ 整場戰鬥內召喚的隨從都更強大\n_-_ 第一階段：技能與召喚頻率都更高\n_-_ 第二階段：額外召喚霜凍魔像和重甲豺狼，重甲豺狼只有原本的62.5%血量。\n_-_ 第三階段：生命值 +100%，召喚頻率更高\n_-_ 第四階段：最終決戰追加最大血量的20%護盾。\n\n_B.矮人將軍(加強效果預覽-WIP)：敬請期待_\n\n[第五區域-惡魔郊區[\n_A.Yog-Dzewa(加強效果預覽)：_\n_-_ 同時召喚兩個古神之拳！\n_-_ 二階段額外召喚寒冰與鬼磷拳頭\n_-_ 雷射攻擊傷害 +60%\n_-_ 召喚更強大的隨從\n_B.極度恐懼-水晶意志(加強效果預覽-WIP)：_\n即將到來\n\n*額外區域-EX頭目*\n遠古遺跡-薩卡班甲魚\n_-_ 地圖視野大幅度減小\n_-_ 薩卡班甲魚的技能更加致命\n\n炙熱洞穴-熔岩火龍\n_-_ 地圖地形發生變化\n_-_ 每4次攻擊後，直接捕獲場上元素\n_-_ 第二階段無敵時間更長，但回復血量只有80。

