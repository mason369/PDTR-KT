badges$badge.kill_mores.title=幽寂之夢
badges$badge.kill_mores.desc=當你猛地從床上醒來時，夢的真實性讓你半天緩不過來。但，這真的只是一場夢嗎？\n\n恭喜完成淵落古堡外傳真結局\n\n_法師限定皮膚：幽寂魔女私服，已解鎖。_

