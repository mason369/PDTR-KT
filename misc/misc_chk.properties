challenges.blood_died=血族契約
challenges.blood_died_desc=你與祂簽訂契約，成為血族的一員，你在渴求鮮血與混亂的力量...\n\n_-_你渴望<#f00>鮮血<RGB>，從第3層開始，非Boss層時，你不會<#0f0>自然回復生命<RGB>，而是會逐漸流失，隨著探索的深入這種力量變得越來越危險。\n_-_你的每次物理攻擊均具有<#f00>吸血效果：當前傷害的20%-45%<RGB>，近戰武器攻擊敵方時有10%機率造成<#f00>雙倍傷害<RGB>\n_-_治療藥劑的治癒效果_大幅度下降_\n_-_在此模式中移除 <#0f0>陽春草之種<RGB> 和 <#f00>蓄血聖杯<RGB>

paswordbadges$badge.blood_king.title=血族新生
paswordbadges$badge.blood_king.desc=你通過了祂的試煉，現在你是新生的血族成員之一。\n\n徽章獎勵：\n-0層落白商店附近生成<#f00>血族之書<RGB>，在15層前可以抵禦一次致死攻擊，並且對本層所有敵人造成一次致死攻擊。（Boss除外）\n主動使用獲得無敵10回合，並且立刻回復全部血量。

