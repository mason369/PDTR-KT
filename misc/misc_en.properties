challenges.no_armor_desc=You'll need faith in yourself, as your armor won't do much!\n\n- Base blocking power reduced for all armor except cloth\n- All armor now gains very little blocking when upgraded\n- Earthen guardian's defensive power is also significantly reduced.
challenges.no_healing=Pharmacophobia
challenges.no_healing_desc=Healing potions sure are handy, unfortunately you're allergic!\n\n- Potions of healing, and items made using potions of healing, poison the hero instead of healing them\n- Alchemical catalysts cannot randomly poison or heal the hero\n- These items still work normally for other characters
challenges.no_herbalism=Barren land
challenges.no_herbalism_desc=There seems to be no clean water left in this accursed dungeon...\n\n- Dew drops are removed\n- Plants are removed\n- Seeds still appear, but will not take root
challenges.swarm_intelligence=Swarm intelligence
challenges.swarm_intelligence_desc=Watch out, the dungeon monsters are getting smarter!\n\n- When an enemy notices you, nearby enemies are drawn to that location
challenges.darkness=Into darkness
challenges.darkness_desc=It is a dungeon after all!\n\n- Regular visible distance dramatically reduced\n- A torch appears on each floor\n- Light buff lasts for less time
challenges.no_scrolls=Forbidden runes
challenges.no_scrolls_desc=A certain rune is harder to find. Unfortunately, it's always the most useful one.\n\n- Half of the dungeon's upgrades scrolls are removed
rankings$record.something=Killed by Something


challenges.aquaphobia=_Sludge water_
challenges.aquaphobia_desc=The water has been polluted by the city above__, now you are _blinded_ and _crippled_ when you touch it. \nAt the same time, you can start to get _10 quicklime ideal reagents_! _


challenges.champion_enemies=_Hostile champions_
challenges.champion_enemies_desc=You're not the only one who can level up!\n\n- Regular enemies have a 1/8 chance to spawn with a special champion buff.\n- Champions wake up if they spawn asleep\n- The hero knows when a champion spawns\n- Champions are immune to corruption\n\nThere are seven types of champion enemy:\n_Blazing (orange):_ +25% melee damage, ignites on hit, immune to fire, spreads flames on death\n_Projecting (purple):_ +25% melee damage, can attack anything they see\n_Antimagic (green):_ -25% damage taken, immune to magical effects\n_Giant (blue):_ -75% damage taken, +1 melee range, cannot move into tunnels\n_Blessed (yellow):_ +200% accuracy, +200% evasion\n_Growing (red):_ +20% accuracy, evasion, damage, and effective HP. Increases by 1% every 3 turns.\n_Ghost Ling (Sky Blue): _ Melee damage +65% with Phosphorus Fire effect, immune to fire and Phosphorus Fire, ignites the surrounding area upon death.


actors.char.aquaphobia=You are hurt by water!
challenges.pro=_Developer mode_
challenges.pro_desc=Annotated version? \nStarting with _almost all items_! At the same time, you will not be able to pass the level!
challenges.traditional = Vanilla Mode - T1
challenges.hard = Valhalla Mode - T2
challenges.warning = Danger Mode - T3
challenges.test = Debug - Mod


challenges.rlpt = Fragmented
challenges.rlpt_desc=The magic of the dungeon is eroding this place, and reality is nothing but a nightmare. \n\nAfter defeating the boss on the fifth floor, all floors and monsters will be random! ! ! \n\nSpecial Instructions: The Rogue opening cloak is replaced with 5 invisibility potions. \n\nEnable this challenge, you can get 3 free resurrection chances.


challenges.sbsg = Mutant Behemoth
challenges.sbsg_desc=Humans recall the fear of being dominated by giants\n- All creatures mutate hormones to become larger, but some become smaller due to some other adverse effect. \n- The size of the creature determines their movement speed, defense, evasion and melee damage. \n- Your extreme hunger will also become more deadly. 


challenges.exsg = Potion Illness
challenges.exsg_desc=Potion Illness Rules?\n-PotionOfStrength Strength:-1\n-PotionOfMindVision NoEye:5 Round\n-Stealth potion roars immediately after drinking\n-Bleed for 6 rounds immediately after drinking the experience medicine\n-After drinking the super fast potion, you will be cripple for 8 rounds immediately\n==========================\nGet 8 rounds of extreme speed immediately after eating small rations\n Upgrade immediately after eating stew  \n Get an arcane shield after eating frozen raw meat\n Get 8 rounds of extreme speed and+1 strength immediately after eating whole meat pancake  \n Don't know why, most good potions are poisonous! \n Some potions are completely in DeBuff, but the food will be very useful

challenges.morelevel=Unpredictable
challenges.morelevel_desc=Dungeons have gradually developed more terrains over time. Who knows what you will encounter when exploring the dungeon this time? \n\nAdded 6 new terrain perceptions and 1 special terrain perception. \n\n_-_Sword Mountain and Fire Sea Layer: Traps have increased significantly. And the regular trap layer will no longer appear in Unpredictable. \n\n_-_Super Giant Layer: The terrain becomes larger and more monsters, and the resources become more abundant. And the regular large layer will no longer appear in Unpredictable. \n\n_-_Empty City Strategy Layer: The number of enemies and supplies on this layer is reduced and lowered. Defeating enemies has a chance to get extra resource rewards. \n\n_-_Elite Strong Enemy Layer: Special enemies will definitely spawn on this layer, and these enemies will not sleep. \n\n_-_Blood Crystal Layer: There is an extra room on this layer, which will periodically give enemies various buffs. \n\n_-_Three Wells Blessing Layer: Fixed three wells appear on this layer, and the monster spawning speed is slightly reduced. \n\n_-_Special leader layer: fixed number of layers appear\n_-_Secret 4th layer - Boss: Sticky Goo\n_-_Secret 8th layer - Boss: Heavenly Punishment


challenges.dhxd =Candle Fire Road
challenges.dhxd_desc= Lights guide the way forward. Lanterns lead the way. Lights lead the way! [This is a special mechanism for you must open more than 3 Challenges that than work, but you can also open it directly!]


challenges.dhxd_moredesc=General mechanics of the road ahead\n\n1. Added blessing of lights and witch's curse mechanics. The lights will decrease as you go deeper into the building\n2. If you die under low lights, you will have a mental breakdown and create your own shadow. As your level increases, the shadow will become stronger.\n3. Added lanterns and lamp oil. Use these items properly to survive in the blessing of lights! If you are unfortunately cursed by the witch, you will not fall into despair.\nThe lights are not extinguished, and hope is still there. Lanterns lead the way, and the lights move forward!


challenges.cs=Final Scene - Lonely City
challenges.cs_desc=Time seems to be out of control. You are sucked into a time and space vortex, and reincarnate here repeatedly. \n\nLost in a dangerous future world. In this world, resources are becoming increasingly scarce, and the enemies are powerful and cruel. \n\nHere, although you are a hero, everyone here is an ordinary person. The scene of doomsday emerges here, and resources have long been exhausted. Only debris and phantoms formed by endless miasma are left. If you are not careful, you may die. \n\nHere, which cannot be explained by common sense, the law of day and night is also silently going on. This will also bring greater challenges. In this dangerous journey, you need to choose your actions carefully, find scarce resources, and try your best to explore this lonely city and survive. \n\nChallenge description: \n_-_1. The generation of dungeon items is greatly reduced, the terrain of the 0th floor is changed, and most of the supplies are removed. \n_-_2. All enemies have elite or mutant attributes greatly improved\n(If the pre-challenge is not opened, the refresh rare monsters will be greatly improved)\n_-_3. The enemies are awake at the beginning. The enemies are rare but all of them are elite. Because the weak ones have been eliminated by the survival of the fittest. \n_-_4. Special supply rooms are added to some floors\n_-_5. The damage of all leader-level enemies is increased to 1.25x. \n_-_6. Day and night change, some monsters are more aggressive at night. \n_-_7. From the 3rd to the 24th floor, the monsters have a 25% chance of having a special buff: Lonely City Mark. \n8. The movement speed of the Lonely City hero is increased by 10%.


challenges.no_armorx = This land is not picky about armor other than cloth. If any non-cloth armor is detected, it will be automatically removed.




kill=\n_Ice Witch:_\n_-_+25% HP\n_-_ More minions summoned from water\n- Will definitely drop the Purple Gem Amulet when defeated\n_Dwarf Master:_\n_-_ More frequent deadly skills\n_-_ +50% HP\n- Will definitely drop the Nature's Holy Amulet when defeated\n_Slime King:_\n_-_ +100% HP\n_-_ Higher damage, faster speed\n_-_ Additional summons of Jackal Trickster, Giant Claw Crab, Rancid Rat, and Corrupted Slime at the start\n_-_ Will definitely drop the Gel Gloves when defeated\n_DM720:_\n_-_ Gain new skills\n_-_ Will definitely drop the DM150 Control Terminal when defeated [Not yet completed]


challenges.stronger_bosses=Badder bosses
challenges.stronger_bosses_desc=Bosses are much tougher with this challenge!\n\n_Goo:_ +20% health\n_-_ Healing in water ramps up, to 3/turn\n_-_ Pumps up in 1 turn instead of 2\n_Tengu:_ +25% health\n_-_ Phase 1: traps are much deadlier\n_-_ Phase 2: abilities are more frequent\n_DM-300:_ +33% health\n_-_ Pylons are tougher and 3 activate\n_-_ Abilities are more powerful and frequent\n_-_ DM-300 is faster when supercharged\n_-_ Exposed wires are twice as common\n_Dwarf King:_ +50% health\n_-_ Minions are stronger in all phases\n_-_ Phase 1: faster abilities and summons\n_-_ Phase 2: 2 more minions per round\n_-_ Phase 3: 2x health, faster summons\n_Yog-Dzewa:_\n_-_ Two fists are summoned at a time!\n_-_ +60% laser damage\n_-_ Stronger minions


