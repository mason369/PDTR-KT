challenges.blood_died=Blood Died
challenges.blood_died_desc=You signed a contract with him and became a member of the vampire clan. You are thirsty for blood and the power of chaos...\n\n_-_You are thirsty for <#f00>blood<RGB>. Starting from the 3rd level, when you are not on the boss level, you will not <#0f0>recover your life<RGB> naturally, but will gradually lose it. As you explore deeper, this power becomes more and more dangerous.\n_-_Each of your physical attacks has a <#f00>blood-sucking effect: 20%-45% of the current damage<RGB>, and there is a 10% chance of causing <#f00>double damage<RGB> when attacking the enemy with melee weapons\n_-_The healing effect of the healing potion is greatly reduced\n_-_In this mode, <#0f0>Sunflower Seed<RGB> and <#f00>Blood Grail<RGB> are removed


paswordbadges$badge.blood_king.title=The new blood king
paswordbadges$badge.blood_king.desc=You have passed His test, and now you are one of the new blood clan members.\n\nBadge Reward:\nA <#f00>Blood Clan Book <RGB> is generated near the Luobai Shop on the -0th floor. It can resist a fatal attack before the 15th floor, and cause a fatal attack to all enemies on this floor. (Except Boss)\nActively use it to gain invincibility for 10 rounds, and immediately restore all health points.


